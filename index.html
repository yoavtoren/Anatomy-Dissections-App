    {h:"Glutamatergic system (Glu)", p:"Excitatory (most common neurotransmitter in brain). Production: all cortical descending pathways. Projections: associative cortical pathways; dentothalamic tract; many descending brainstem tracts."},
    {img:"neurotransmitters.jpg", caption:"CNS neurotransmitter systems"}
  ]
},


"neural-crest":{parent:"plexuses",title:"Neural crest derivatives",
  body:[
    {h:"Origin", p:"Cells at the lateral border of neuroectoderm dissociate during neural fold elevation/fusion &rarr; epithelium-to-mesenchymal transition &rarr; migrate to periphery &rarr; differentiate into many cell types."},
    {h:"Cranial neural crest", list:[
      "Migrates dorsolaterally &rarr; craniofacial mesenchyme",
      "Cranial ganglia + glial cells",
      "Craniofacial skeleton",
      "Odontoblasts"
    ]},
    {h:"Trunk neural crest", list:[
      "Dorsal pathway (through dermis into ectoderm via basal lamina holes) &rarr; melanocytes",
      "Ventral pathway (through anterior half of each somite &rarr; sclerotome) &rarr; dorsal root ganglia · sympathetic ganglia · Schwann cells · adrenal medulla chromaffin cells"
    ]},
    {h:"Vagal + sacral neural crest", p:"Enteric ganglia · parasympathetic ganglia."},
    {h:"Cardiac neural crest", p:"Musculo-connective tissue of large arteries · part of conotruncal septum."},
    {img:"neural-crest.jpg", caption:"Neural crest derivatives"}
  ]
},

"spinal-nerve-structure":{parent:"spinal",title:"Spinal nerve structure (rami, rami communicantes, autonomic fibres)",
  body:[
    {h:"Fibre types in peripheral nerves", list:[
      "Somatomotor (efferent) — striated body wall + limb muscles; voluntary",
      "Somatosensory (afferent) — body wall + limb skin + muscle; mechano-, exterocep-, propriocep-, thermoreceptors",
      "Visceromotor (efferent / autonomic) — smooth muscle, myocardium, glands, blood vessels",
      "Viscerosensory (afferent) — viscera; baroreceptors, chemoreceptors, wall tension, pain, chemical stimuli"
    ]},
    {h:"Roots and trunk", list:[
      "Anterior (motor) root — visceromotor + somatomotor &rarr; efferent",
      "Posterior (sensory) root with dorsal root ganglion — viscerosensory + somatosensory &rarr; afferent",
      "Dorsal root ganglion (DRG) — cluster of pseudo-unipolar neuronal cell bodies in intervertebral foramen; from neural crest cells"
    ]},
    {h:"Branches of trunk", list:[
      "Meningeal branch — to spinal meninges; recurrent sensory branch to annulus fibrosus",
      "Anterior branch (ventral ramus) — motor + sensory to anterior + lateral trunk + limbs; forms plexuses",
      "Posterior branch (dorsal ramus) — smaller; deep back muscles, gluteal region, paravertebral skin; segmental",
      "White ramus communicans — myelinated preganglionic axons &rarr; sympathetic chain ganglion. Only T1–L2",
      "Gray ramus communicans — non-myelinated postganglionic axons; loops back into spinal nerve. All spinal nerves."
    ]},
    {h:"Autonomic fibre distribution", list:[
      "Sympathetic — cell bodies in lateral horn T1–L2; preganglionic short &rarr; paravertebral ganglia; postganglionic long. Cervical spinal nerves carry NO autonomic fibres of their own; rely on ascending sympathetics.",
      "Parasympathetic — long preganglionic, short postganglionic; ganglia near or in target organ. Cranial CN III, VII, IX, X + S2–S4 (craniosacral outflow)",
      "Visceral afferents — cell bodies in DRG or sensory cranial ganglia"
    ]},
    {img:"spinal-nerve.jpg", caption:"Spinal nerve structure"}
  ]
},

"sacral-parasympathetic":{parent:"ans",title:"Sacral parasympathetic outflow",
  body:[
    {h:"Cell bodies & pathway", p:"Gray matter S2–S4 (no lateral horns at this level). Axons leave via anterior ramus (visceromotor fibres) &rarr; form pelvic splanchnic nerves."},
    {h:"Targets", list:[
      "Distal 1/3 transverse colon, descending colon, sigmoid colon, rectum",
      "Detrusor (bladder wall) contraction; internal urethral sphincter inhibition",
      "Inhibits internal anal sphincter",
      "Genital — 'Point and Shoot': Para = erection (point); Sympa = ejaculation (shoot)"
    ]},
    {h:"Synapse location", p:"Synapse near viscera in hypogastric plexus or in cranial ganglia (submandibular, pterygopalatine, otic, ciliary). Afferent fibres — DRG or sensory cranial ganglia."},
    {img:"sacral-parasympathetic.jpg", caption:"Sacral parasympathetic outflow"}
  ]
},

"dermatomes-heads-zones":{parent:"spinal",title:"Segmental innervation, dermatomes, Head's zones (referred pain)",
  body:[
    {h:"Dermatomes", p:"A skin area mainly supplied by a single dorsal root spinal nerve = dermatome. No C1 dermatome — first cervical typically lacks sensory root (no DRG); 30 dermatomes (C2–Co1)."},
    {h:"Key dermatomes", list:[
      "C2 — posterior scalp",
      "C7 — middle finger",
      "T4–T5 — line through nipples",
      "T10 — umbilicus",
      "L1–L2 — boundary at groin"
    ]},
    {h:"Dermatome arrangement", list:[
      "Thorax — disc-like from posterior to anterior median plane",
      "Limbs — longitudinal along the limb",
      "Face — by trigeminal divisions",
      "Posterior scalp + neck — by cervical nerves"
    ]},
    {h:"Overlap and clinical significance", p:"Adjacent dermatome overlap — must damage 3 adjacent spinal nerves to fully lose sensation. Radicular pain radiates along distribution of a spinal nerve root (compression/inflammation/herniated disc); sciatica = most common."},
    {h:"Head's zones (referred pain)", list:[
      "Diaphragm (C3–C5) &rarr; shoulder tip",
      "Heart (C8–T4) &rarr; angina referred to left arm/shoulder/jaw",
      "Esophagus (T4–T9) &rarr; middle of sternum",
      "Stomach (T6–T10) &rarr; epigastrium + left thorax",
      "Liver, gallbladder (T7–T9) &rarr; right subcostal, under right scapula, neck",
      "Appendix (T11–T12)",
      "Kidney (T10–L1)",
      "Uterine cervix + prostate (S2–S4)"
    ]},
    {img:"dermatomes-heads-zones.jpg", caption:"Dermatomes and Head's zones"}
  ]
},

"sensory-receptors":{parent:"plexuses",title:"Sensory receptors",
  body:[
    {h:"By complexity", list:[
      "Free nerve endings — minimal/no specialization (nociception, temperature)",
      "Encapsulated nerve endings — terminal CT capsule (Pacinian, Meissner, Ruffini, Krause)",
      "Sense organs — special senses (vision, hearing, smell, taste, equilibrium)"
    ]},
    {h:"By location", list:[
      "Exteroceptors — surface of body; tactile, pain, temperature; vision, hearing, smell, taste",
      "Interoceptors (visceroceptors) — viscera + blood vessels; with ANS sensory fibres",
      "Proprioceptors — skeletal muscle, tendons, ligaments, joints; body position + physical state"
    ]},
    {h:"By stimulus type", list:[
      "Mechanoreceptors — physical force (pressure, stretch, blood pressure)",
      "Photoreceptors — light",
      "Thermoreceptors — temperature",
      "Chemoreceptors — dissolved chemicals (taste, smell, blood gases, pH)",
      "Nociceptors — tissue damage / pain stimuli"
    ]},
    {img:"sensory-receptors.jpg", caption:"Sensory receptors"}
  ]
},

"nerve-regeneration":{parent:"plexuses",title:"Peripheral nerve regeneration (Wallerian degeneration)",
  body:[
    {h:"Capacity", p:"PNS regenerates significantly (CNS regeneration is poor)."},
    {h:"Mechanism", list:[
      "After injury &rarr; pro-growth gene activation &rarr; reformation of growth cone",
      "Schwann cells secrete chemotactic factors guiding regrowth",
      "Phagocytes + Schwann cells + macrophages migrate to lesion &rarr; clear inhibitory debris"
    ]},
    {h:"Definitions", list:[
      "Proximal segment — connected to cell body. Swells, retrograde degeneration; once cleared, sprouts axons with growth cones",
      "Distal segment — undergoes Wallerian degeneration within hours: axons + myelin degenerate, but endoneurium remains as a tube directing regrowth"
    ]},
    {h:"Regeneration", list:[
      "Proximal axons regrow if cell body intact + endoneurial tube contacted",
      "Schwann cells form bands of Bungner along endoneurial tube — preserve channel + guide axon",
      "Schwann cells + macrophages release neurotrophic factors",
      "Growth rate — 2 mm/day (small nerves), 5 mm/day (large nerves)"
    ]},
    {img:"nerve-regeneration.jpg", caption:"Peripheral nerve regeneration — Wallerian degeneration"}
  ]
},

"cervical-plexus-detail":{parent:"plexuses",title:"Cervical plexus",
  body:[
    {h:"Origin & location", p:"Anterior rami C1–C4. Anteromedial to levator scapulae + middle scalene; deep to SCM (in posterior triangle)."},
    {h:"Motor branches", list:[
      "C1–C2 fibres travel briefly with CN XII then split: Thyrohyoid n. (thyrohyoid m.) + Geniohyoid n. (geniohyoid m.) + Superior root of ansa cervicalis",
      "C2–C3 form the inferior root of ansa cervicalis",
      "Ansa cervicalis branches: Superior omohyoid n. (sup. belly) · Sternothyroid n. · Sternohyoid n. · Inferior omohyoid n. (inf. belly)",
      "Phrenic n. (C3–C5) — diaphragm; injury above C5 &rarr; respiratory failure"
    ]},
    {h:"Sensory branches ('Lets Go To Sleep')", list:[
      "C2–C3: Great auricular n. — parotid + mastoid skin",
      "C2–C3: Lesser occipital n. — posterior scalp",
      "C2–C3: Transverse cervical n. — anterior cervical skin (over SCM)",
      "C3–C4: Supraclavicular nn. — lower lateral + anterior chest skin"
    ]},
    {h:"Erb's point (punctum nervosum)", p:"Sensory cervical nerves emerge here (middle posterior border of SCM); regional anaesthesia landmark."},
    {img:"cervical-plexus.jpg", caption:"Cervical plexus"}
  ]
},

"brachial-plexus-detail":{parent:"plexuses",title:"Brachial plexus — supraclavicular and infraclavicular",
  body:[
    {h:"Origin & organization ('Real Texans Drink Cold Beer')", p:"Anterior rami C5–T1. Roots &rarr; Trunks &rarr; Divisions &rarr; Cords &rarr; Branches."},
    {h:"Trunks, divisions & cords", list:[
      "Trunks: superior (C5+C6) · middle (C7) · inferior (C8+T1) — in scalene fissure",
      "Divisions: anterior + posterior of each trunk (behind clavicle)",
      "Cords: lateral (anterior divisions of upper + middle) · posterior (all 3 posterior divisions) · medial (anterior division of lower trunk)"
    ]},
    {h:"Supraclavicular branches", list:[
      "Dorsal scapular n. (C5) — levator scapulae + rhomboids",
      "Long thoracic n. (C5–C7) — serratus anterior",
      "Suprascapular n. (C5–C6) — supraspinatus + infraspinatus",
      "N. to subclavius (C5–C6)"
    ]},
    {h:"Terminal (infraclavicular) branch distributions", list:[
      "Musculocutaneous — cutaneous: lateral forearm; motor: coracobrachialis, brachialis, biceps brachii",
      "Axillary — cutaneous: posterior + lateral border of deltoid; motor: deltoid + teres minor",
      "Radial — cutaneous: posterior + lateral arm + dorsum of hand + thumb; motor: triceps + anconeus + brachioradialis + extensors",
      "Median — cutaneous: ventral + lateral 2/3 hand + digits 2–3; motor: pronator teres + pronator quadratus + FCR + PL + FDS + radial half FDP + thenar mm.",
      "Ulnar — cutaneous: ventral + dorsal 1/3 of hand; motor: adductor pollicis + ulnar half FDP + FCU + hypothenar mm."
    ]},
    {img:"brachial-plexus.jpg", caption:"Brachial plexus"}
  ]
},

"axillary-nerve":{parent:"plexuses",title:"Axillary nerve + palsy",
  body:[
    {h:"Origin & course", p:"Posterior cord of brachial plexus (C5–C6). Through quadrangular space (teres major, teres minor, humerus, long head of triceps brachii) with the posterior circumflex humeral a.; circles surgical neck of humerus."},
    {h:"Motor & sensory", list:[
      "Motor: deltoid + teres minor",
      "Sensory: superior lateral cutaneous n. of arm &rarr; lateral shoulder ('regimental badge' area)"
    ]},
    {h:"Palsy", list:[
      "Loss of arm abduction (deltoid)",
      "Sensory loss superolateral arm",
      "Prolonged &rarr; atrophy + loss of dome shape of shoulder",
      "Common cause: humeral fracture (surgical neck) + shoulder dislocation"
    ]},
    {img:"axillary-n.jpg", caption:"Axillary nerve and palsy"}
  ]
},

"radial-nerve":{parent:"plexuses",title:"Radial nerve + palsy",
  body:[
    {h:"Origin & course", p:"Posterior cord (C5–T1). Axillary region &rarr; exits via triangular interval &rarr; radial groove (radial canal) with deep brachial vessels (between medial + lateral heads of triceps) &rarr; laterally &rarr; between brachialis and brachioradialis &rarr; cubital fossa &rarr; divides into: Deep branch (PIN — posterior interosseous n.) through supinator canal; Superficial branch — sensory of dorsal hand + lateral 3.5 digits."},
    {h:"Branches", list:[
      "Muscular — triceps + posterior + lateral compartment of forearm",
      "Inferior lateral brachial cutaneous n. — distal deltoid",
      "Posterior cutaneous n. of arm — posterior arm",
      "Posterior cutaneous n. of forearm — posterior forearm",
      "Superficial branch — dorsum of hand + lateral 3.5 digits"
    ]},
    {h:"Palsy", list:[
      "Proximal (before division) — wrist drop (loss of brachial extensors + wrist extensors)",
      "Deep branch (PIN) — inability to extend thumb + digits",
      "Common cause: humeral midshaft fracture (radial groove); 'Saturday night palsy' (axilla compression); crutch palsy"
    ]},
    {img:"radial-n.jpg", caption:"Radial nerve and palsy"}
  ]
},

"median-nerve":{parent:"plexuses",title:"Median nerve + palsy",
  body:[
    {h:"Origin & course", p:"C5–T1, from lateral + medial cords. Initially anterolateral to axillary a.; lateral to brachial a. through arm; crosses brachial a. at mid-humerus to lie medial; through cubital fossa. Beneath bicipital aponeurosis; leaves cubital fossa between two heads of pronator teres. Gives anterior interosseous branch. In forearm between FDS and FDP. Through carpal tunnel (deep to flexor retinaculum)."},
    {h:"Terminal branches", list:[
      "Recurrent muscular branch — thenar mm. (APB, FPB, opponens pollicis)",
      "Palmar digital nerves — 1st + 2nd lumbricals + sensory (lateral 3.5 digits)",
      "Palmar cutaneous branch — exits 5 cm proximal to wrist above retinaculum (spared in carpal tunnel syndrome)"
    ]},
    {h:"Palsy", list:[
      "Loss of thumb abduction + opposition (thenar paralysis)",
      "Hand of Benediction — when asked to make a fist, digits 2–3 cannot flex at MCP/IP (FDS, lateral half FDP)",
      "Carpal tunnel syndrome — pressure in carpal tunnel; thenar atrophy + sensory loss palmar lateral 3.5 digits; palmar cutaneous spared"
    ]},
    {img:"median-n.jpg", caption:"Median nerve and palsy"}
  ]
},

"ulnar-nerve":{parent:"plexuses",title:"Ulnar nerve + palsy",
  body:[
    {h:"Origin & course", p:"Medial cord (C8–T1). Medial to axillary a. &rarr; medial to brachial a. &rarr; leaves anterior compartment by piercing medial intermuscular septum at mid-humerus &rarr; posterior to medial humeral epicondyle &rarr; enters forearm between two heads of FCU. In hand: passes superficial to flexor retinaculum through Guyon's canal &rarr; divides at pisiform."},
    {h:"Branches", list:[
      "Superficial terminal branch — palmar; digital sensory; supplies palmaris brevis",
      "Deep terminal branch — through hypothenar (between FDM + ADM); runs with deep palmar arch; ends in adductor pollicis",
      "Dorsal cutaneous branch — 5 cm proximal to wrist; medial dorsum of hand + medial 1.5 digits"
    ]},
    {h:"Palsy", list:[
      "Claw hand — digits 4 + 5 flexed at IP joints, extended at MCP; patient can't open palm",
      "Loss of sensation of medial 1.5 digits",
      "Compression at cubital tunnel (medial epicondyle) or at wrist (Guyon's canal)",
      "'Funny bone' hit at medial epicondyle"
    ]},
    {img:"ulnar-n.jpg", caption:"Ulnar nerve and palsy"}
  ]
},

"head-neck-innervation":{parent:"plexuses",title:"Skin + motor innervation of head and neck",
  body:[
    {h:"Skin of head", list:[
      "Face — trigeminal: V1 (ophthalmic), V2 (maxillary), V3 (mandibular)",
      "Greater occipital n. — posterior rami of spinal nerves",
      "Cervical plexus — lesser occipital + great auricular nn.",
      "Ear — small contribution from auricular branch of CN X (Arnold's n.)"
    ]},
    {h:"Skin of neck", list:[
      "Posterior — posterior rami of spinal nerves",
      "Anterior — transverse cervical n. (cervical plexus)",
      "Upper lateral — lesser occipital + great auricular nn.",
      "Lower lateral — supraclavicular nn.",
      "All sensory cervical plexus nerves emerge through superficial fascia at Erb's point (middle of posterior border of SCM)"
    ]},
    {img:"head-neck-innervation.jpg", caption:"Head and neck skin innervation"}
  ]
},

"lumbar-plexus-detail":{parent:"plexuses",title:"Lumbar plexus",
  body:[
    {h:"Roots", p:"Anterior branches of T12–L4 (some include L5 contribution to lumbosacral trunk). Branches run posterior to kidneys."},
    {h:"Branches (SIIGLOFL)", list:[
      "Subcostal n. (T12) — runs along 12th rib; lateral cutaneous branch toward iliac crest; abdominal mm.",
      "Iliohypogastric n. (L1) — anterior cutaneous br. (abdomen) + lateral cutaneous br. (upper lateral hip)",
      "Ilioinguinal n. (L1) — between internal oblique + transversus abdominis &rarr; enters inguinal canal",
      "Genitofemoral n. (L1–L2) — genital br. (inside spermatic cord through inguinal canal) + femoral br. (vascular space of subinguinal area)",
      "Lateral femoral cutaneous n. (L2–L3) — through muscular space of subinguinal area",
      "Femoral n. (L2–L4) — lateral to psoas major; muscular space; motor + cutaneous; gives saphenous n. through adductor canal",
      "Obturator n. (L2–L4) — medial to psoas major; inferiorly &rarr; obturator canal; motor + cutaneous",
      "Lumbosacral trunk (L4–L5 contribution) — joins sacral plexus"
    ]},
    {img:"lumbar-plexus.jpg", caption:"Lumbar plexus"}
  ]
},

"femoral-nerve":{parent:"plexuses",title:"Femoral nerve detail",
  body:[
    {h:"Course", p:"Lateral to psoas major; muscular space of subinguinal area &rarr; lateral to psoas major."},
    {h:"Branches in subinguinal area", list:[
      "Motor — quadriceps femoris (rectus femoris + 3 vasti), sartorius, iliacus, pectineus",
      "Sensory — anterior thigh",
      "Saphenous n. (medial) — runs in adductor canal; cutaneous in leg + foot (medial)"
    ]},
    {img:"femoral-n.jpg", caption:"Femoral nerve detail"}
  ]
},

"sacral-plexus-detail":{parent:"plexuses",title:"Sacral plexus + branches + sciatic palsy",
  body:[
    {h:"Roots", p:"L4–S4 (lumbosacral trunk + S1–S4)."},
    {h:"Branches", list:[
      "Superior gluteal n. (L4–S1) — through suprapiriform foramen; gluteus medius/minimus + TFL",
      "Inferior gluteal n. (L5–S2) — through infrapiriform foramen; gluteus maximus",
      "Posterior cutaneous femoral n. (S1–S3) — infrapiriform foramen; posterior thigh skin",
      "Pudendal n. (S2–S4) — infrapiriform foramen &rarr; around ischial spine &rarr; lesser sciatic foramen &rarr; ischio-anal fossa (in pudendal canal). Branches: inferior rectal n., perineal n., dorsal n. of penis/clitoris",
      "Sciatic n. (L4–S3) — through infrapiriform foramen; runs on posterior thigh &rarr; enters popliteal fossa &rarr; divides into common fibular + tibial nn."
    ]},
    {h:"Sciatic nerve divisions", list:[
      "Common fibular (peroneal) n. — superficial fibular (fibularis longus + brevis; cutaneous lateral lower leg); deep fibular (extensors of foot: TA, EHL, EDL, EDB)",
      "Tibial n. — sural n. (cutaneous posterior lateral leg + foot); motor to soleus, gastrocnemius, tibialis posterior, FHL, FDL; divides into medial + lateral plantar nn. + medial calcaneal n."
    ]},
    {h:"Common fibular palsy", list:[
      "Foot drop — loss of extensors + lateral muscles",
      "Most common LE palsy due to superficial location + proximity to knee",
      "Cause — fibular fracture (proximal) or knee over-extension"
    ]},
    {img:"sacral-plexus.jpg", caption:"Sacral plexus and sciatic nerve palsy"}
  ]
},


"trigeminal-v1-v2":{parent:"cn",title:"Trigeminal nerve V1 (ophthalmic) + V2 (maxillary) + sensory nuclei",
  body:[
    {h:"Trigeminal nerve overview", p:"Largest CN; spans whole brainstem + extends into upper cervical cord. Contains somatomotor + somatosensory fibres. Trigeminal ganglion in trigeminal impression. Branches: V1 ophthalmic (sensory only); V2 maxillary (sensory only); V3 mandibular (sensory + motor)."},
    {h:"Sensory nuclei", list:[
      "Spinal nucleus of CN V (medulla + cervical cord C1–C3) — crude touch, pain, temperature, pressure, proprioception of face",
      "Principal sensory nucleus (pons) — fine touch, vibration, some proprioception (jaw)",
      "Mesencephalic nucleus (most dorsal, mesencephalon) — proprioception of masticatory, mimetic, extra-ocular muscles. Feedback loop with motor nucleus &rarr; optimal mastication tension + protective inhibition"
    ]},
    {h:"Motor nucleus (pons)", p:"Innervates muscles of 1st pharyngeal arch: muscles of mastication + tensor tympani + tensor veli palatini + anterior belly of digastric + mylohyoid."},
    {h:"Ophthalmic nerve (V1)", list:[
      "Sensory: upper face, dura mater, orbit + content, part of nasal mucosa + paranasal sinuses",
      "Course: trigeminal ganglion &rarr; lateral wall of cavernous sinus &rarr; divides into 3 main branches through SOF: frontal, lacrimal, nasociliary",
      "Frontal n. &rarr; supratrochlear n. (medial eyelid skin + forehead) + supraorbital n. (upper eyelid + forehead)",
      "Lacrimal n. &rarr; lacrimal gland + adjacent skin. Receives parasympathetic from pterygopalatine ganglion via zygomatic n. (V2)",
      "Nasociliary n. &rarr; communicating br. with ciliary ganglion + long ciliary nn. + posterior ethmoidal n. + anterior ethmoidal n. (frontal sinus, nasal mucosa, skin of nose tip + dorsum) + infratrochlear n.",
      "Damage &rarr; sensation loss in upper face. Test = corneal reflex"
    ]},
    {h:"Maxillary nerve (V2)", list:[
      "Sensory: middle face, upper teeth, parts of nasal/oral/nasopharyngeal mucosa",
      "Course: trigeminal ganglion &rarr; lateral wall of cavernous sinus &rarr; through foramen rotundum &rarr; pterygopalatine fossa",
      "Zygomatic n. &rarr; through inferior orbital fissure; divides into zygomaticotemporal n. (temporal fossa) + zygomaticofacial n. (upper cheek); carries parasympathetics from pterygopalatine ganglion &rarr; lacrimal n.",
      "Infraorbital n. &rarr; through inferior orbital fissure &rarr; gives posterior/middle/anterior superior alveolar nn. (teeth + gingiva) &rarr; exits infraorbital foramen &rarr; skin between lower eyelid + upper lip",
      "Pterygopalatine ganglion &rarr; receives parasympathetic via greater petrosal n. (CN VII) + sympathetic via deep petrosal n. &rarr; join as n. of pterygoid canal (Vidian) &rarr; nasal, palatine, lacrimal, pharyngeal glands"
    ]},
    {img:"cn5-v1-v2.jpg", caption:"Trigeminal nerve V1 and V2"}
  ]
},

"trigeminal-v3":{parent:"cn",title:"Trigeminal V3 (mandibular) + parasympathetic ganglia (submandibular, otic)",
  body:[
    {h:"V3 overview", p:"Mixed: GSE (motor) + GSA (sensory). Sensory: skin of lower face, oral mucosa, lower teeth + gingiva. Motor: muscles of 1st pharyngeal arch (incl. all muscles of mastication). Leaves trigeminal ganglion as sensory only; through foramen ovale gains somatomotor fibres from ventral pons."},
    {h:"Anterior division (mostly motor + buccal)", list:[
      "Deep temporal nn. (SVE) — innervate temporalis m.",
      "Lateral + medial pterygoid nn. (SVE) — pierce muscles",
      "Masseteric n. (SVE) — over mandibular notch &rarr; masseter (and TMJ)",
      "Buccal n. (SS only) — small skin area + buccal mucosa"
    ]},
    {h:"Posterior division (mostly sensory)", list:[
      "Auriculotemporal n. — encircles middle meningeal a.; receives GVM parasympathetic from lesser petrosal n. via otic ganglion (CN IX origin) &rarr; parotid innervation",
      "Inferior alveolar n. — lower teeth; through mandibular canal &rarr; mental foramen &rarr; mental n. (chin skin); contains motor for mylohyoid + anterior belly of digastric",
      "Lingual n. — somatosensory anterior 2/3 of tongue; associated with submandibular ganglion"
    ]},
    {h:"Submandibular ganglion", p:"Above submandibular gland on hyoglossus, below lingual n. Parasympathetic preganglionic from CN VII via chorda tympani &rarr; joins lingual n. &rarr; ganglion. Postganglionic &rarr; submandibular + sublingual + lingual glands. Sympathetic — from facial a. plexus, no synapse."},
    {h:"Otic ganglion", p:"In infratemporal fossa, medial to V3, below foramen ovale. Parasympathetic preganglionic from CN IX via lesser petrosal n. &rarr; ganglion &rarr; postganglionic via auriculotemporal br. of V3 &rarr; parotid gland. Sympathetic — from middle meningeal a. plexus, pass through."},
    {img:"cn5-v3.jpg", caption:"Trigeminal nerve V3 and parasympathetic ganglia"}
  ]
},

"cn-3-4-6":{parent:"cn",title:"Oculomotor (CN III) + Trochlear (CN IV) + Abducens (CN VI)",
  body:[
    {h:"Oculomotor (CN III)", list:[
      "GSE — LPS + 4 of 6 EOMs (medial, superior, inferior recti + inferior oblique)",
      "GVE preganglionic — ciliary ganglion &rarr; postganglionic &rarr; sphincter pupillae (constriction) + ciliary muscle (accommodation)",
      "Nuclei (midbrain): oculomotor nucleus (GSE) + Edinger-Westphal nuclei (GVE/parasympathetic)",
      "Course: midbrain &rarr; interpeduncular fossa &rarr; lateral wall of cavernous sinus &rarr; SOF within tendinous ring &rarr; divides into superior division (LPS + superior rectus) + inferior division",
      "Damage: ptosis (LPS), mydriasis (parasympathetic loss), inability to move eye, double vision, 'down + out' eyeball position"
    ]},
    {h:"Trochlear (CN IV)", list:[
      "Only somatomotor; nucleus posterior midbrain, just below oculomotor",
      "Function: superior oblique m.",
      "Course: exits dorsal aspect of midbrain (only CN to do so); longest intracranial course of any CN; lateral wall of cavernous sinus &rarr; SOF (superolateral to tendinous ring, outside it) &rarr; SO"
    ]},
    {h:"Abducens (CN VI)", list:[
      "Only somatomotor; nucleus pons, near median plane; function: lateral rectus",
      "Course: emerges between pons + medulla &rarr; pierces dura &rarr; bends over petrous ridge of temporal bone &rarr; through cavernous sinus (within sinus, alongside ICA — vulnerable in cavernous sinus syndromes) &rarr; SOF &rarr; through tendinous ring &rarr; LR"
    ]},
    {h:"Annulus of Zinn (tendinous ring)", p:"Common origin of 4 rectus muscles at orbital apex around optic n. CN III (superior + inferior divisions), CN VI, nasociliary n., and ophthalmic v. pass through it."},
    {img:"cn-3-4-6.jpg", caption:"Oculomotor, trochlear, and abducens nerves"}
  ]
},

"facial-nerve-detail":{parent:"cn",title:"Facial nerve (CN VII)",
  body:[
    {h:"Overview & nuclei", p:"Origin: 2nd pharyngeal arch. Innervates all facial muscles + others. Two roots emerge from pons near cerebellopontine angle: Motor root (somatomotor) + Intermediate nerve of Wrisberg (visceromotor + special sensory). Motor nucleus (in pons) — fibres arch around abducens nucleus forming facial colliculus. Superior salivatory nucleus — parasympathetic for lacrimal, nasal, palatine, submandibular, sublingual glands. Gustatory nucleus (part of nucleus solitarius) — taste from chorda tympani."},
    {h:"Course", p:"Facial nerve &rarr; internal acoustic meatus &rarr; geniculate ganglion (special sensory) &rarr; facial canal &rarr; stylomastoid foramen &rarr; enters parotid gland &rarr; splits &rarr; forms parotid plexus &rarr; 5 terminal branches."},
    {h:"Branches within facial canal", list:[
      "Greater petrosal n. — at geniculate ganglion; parasympathetic + taste; joins deep petrosal &rarr; n. of pterygoid canal &rarr; pterygopalatine ganglion &rarr; nasal, palatine, lacrimal, pharyngeal glands",
      "N. to stapedius — mastoid part of canal",
      "Chorda tympani — through tympanic cavity &rarr; exits via petrotympanic fissure &rarr; joins lingual n. (V3) &rarr; submandibular ganglion &rarr; submandibular + sublingual glands; also taste anterior 2/3 of tongue"
    ]},
    {h:"Branches after stylomastoid foramen", list:[
      "Posterior auricular n. — mastoid; occipital br. (occipitofrontalis) + auricular br. (auricular muscles)",
      "Digastric branch — posterior belly of digastric + stylohyoid"
    ]},
    {h:"Parotid plexus terminal branches (TZBMC)", list:[
      "Temporal — frontalis, orbicularis oculi (forehead/temple)",
      "Zygomatic — orbicularis oculi (lower) + zygomatic muscles + nose",
      "Buccal — buccinator + orbicularis oris + zygomatic + cheek",
      "Marginal mandibular — chin + lower lip muscles",
      "Cervical — platysma"
    ]},
    {h:"Facial nerve palsy", list:[
      "Central (UMN) — paralysis of inferior facial muscles contralaterally; forehead spared (bilateral cortical innervation)",
      "Peripheral (LMN, after chorda tympani) — all facial muscles affected ipsilaterally",
      "At geniculate ganglion — taste loss + lacrimal loss + salivation loss + motor loss",
      "Causes: tumor, inflammation, virus (herpes), temporal bone fracture; idiopathic = Bell's palsy"
    ]},
    {img:"cn-7.jpg", caption:"Facial nerve (CN VII)"}
  ]
},

"glossopharyngeal-nerve":{parent:"cn",title:"Glossopharyngeal nerve (CN IX)",
  body:[
    {h:"Function & nuclei", p:"Sensory to middle ear, parts of tongue + pharynx; motor to pharyngeal muscles. Nuclei (medulla, behind olive, above vagus): Nucleus ambiguus (somatomotor &rarr; stylopharyngeus); Inferior salivatory nucleus (parasympathetic GVM &rarr; parotid + buccal glands); Nucleus of solitary tract (viscerosensory + taste); Spinal nucleus of CN V (somatosensory)."},
    {h:"Course", p:"Medulla oblongata &rarr; jugular foramen (forms superior ganglion above + inferior/petrosal ganglion below) &rarr; between ICA + IJV &rarr; enters pharyngeal wall &rarr; forms pharyngeal plexus."},
    {h:"Branches", list:[
      "Tympanic br. (Jacobson's n.) — through petrous temporal bone &rarr; middle ear &rarr; tympanic plexus (innervates tympanic cavity + auditory tube mucosa). Continues as lesser petrosal n. &rarr; foramen ovale &rarr; otic ganglion &rarr; parotid gland",
      "Stylopharyngeus br. — to stylopharyngeus",
      "Pharyngeal br. — joins vagus + sympathetic trunk &rarr; pharyngeal plexus (motor + sensory pharyngeal muscles, mucosa, soft palate)",
      "Tonsillar brs. — palatine tonsil + palatoglossal/palatopharyngeal arches (sensory)",
      "Lingual br. — sensory + taste posterior 1/3 of tongue + vallate papillae",
      "Carotid br. (Hering's n.) — carotid sinus (baroreceptor — mechanoreceptors) + carotid body (chemoreceptor — O2/CO2). Sends info to nucleus solitarius."
    ]},
    {img:"cn-9.jpg", caption:"Glossopharyngeal nerve (CN IX)"}
  ]
},

"vagus-nerve-detail":{parent:"cn",title:"Vagus nerve (CN X)",
  body:[
    {h:"Function & nuclei", p:"Strongest parasympathetic nerve; innervates head + thorax + abdomen. Nuclei (medulla): Nucleus ambiguus (somatomotor &rarr; soft palate, pharynx, larynx); Posterior nucleus of vagus (dorsal motor — parasympathetic GVM &rarr; smooth muscle + glands + myocardium + cardiac conducting system); Nucleus of solitary tract (viscerosensory + special sensory — taste from epiglottis, vallecula, root of tongue); Spinal nucleus of CN V (somatosensory: parts of auricle, EAM, dura, mucosa of larynx + pharynx)."},
    {h:"Course", p:"Behind olive &rarr; jugular foramen &rarr; forms superior (jugular) ganglion + inferior (nodose) ganglion below &rarr; carotid sheath with IJV + ICA &rarr; divides into cervical, thoracic, abdominal parts."},
    {h:"Cervical part", list:[
      "Superior ganglion — somatosensory cell bodies; branches: meningeal br. (posterior cranial fossa); auricular br. (Arnold's n. — ear skin)",
      "Pharyngeal brs. — pharyngeal plexus (with CN IX + sympathetic). Motor to soft palate + pharyngeal muscles",
      "Superior laryngeal n. — external branch (mixed; cricothyroid + parasympathetic + viscerosensory to thyroid + parathyroid); internal branch (sensory; mucosa of larynx above vocal folds, root of tongue, epiglottis)",
      "Recurrent laryngeal n. — left over aortic arch; right across right subclavian a.; terminal = inferior laryngeal n. (laryngeal muscles except cricothyroid + laryngeal mucosa below vocal folds)",
      "Cardiac brs. — superior cervical + inferior cervical + thoracic cardiac &rarr; cardiac plexus"
    ]},
    {h:"Thoracic part", list:[
      "Bronchial brs. — viscerosensory + visceromotor for bronchial mucosa + glands + smooth muscle",
      "Pulmonary plexus — mixed (sympathetic + parasympathetic)",
      "Esophageal plexus — visceromotor + viscerosensory for esophageal mucosa + glands + muscle"
    ]},
    {h:"Abdominal part", p:"Anterior + posterior gastric brs.; hepatic brs.; renal brs.; celiac brs. Plexuses for adrenals, kidneys, pancreas, ovaries, testes, small intestine, cecum, ascending colon, 2/3 transverse colon (until Cannon-Bohm point where sacral parasympathetic takes over)."},
    {img:"cn-10.jpg", caption:"Vagus nerve (CN X)"}
  ]
},

"cn-11-12":{parent:"cn",title:"Accessory (CN XI) + Hypoglossal (CN XII)",
  body:[
    {h:"Accessory (CN XI)", list:[
      "Exclusively somatomotor; union of cranial + spinal roots",
      "Cranial root — from nucleus ambiguus; emerges from anterior medulla; joins spinal root",
      "Spinal root — from anterior gray of cord C1–C5; ascends through foramen magnum &rarr; joins cranial root in posterior cranial fossa",
      "Both leave skull through jugular foramen &rarr; separate: internal (cranial) branch &rarr; joins vagus &rarr; adds SVE fibres to laryngeal innervation; external (spinal) branch &rarr; descends posterior to IJV &rarr; SCM (innervates) &rarr; posterior triangle &rarr; trapezius (innervates)",
      "Lesion — head tilt + arm cannot be lifted above horizontal plane"
    ]},
    {h:"Hypoglossal (CN XII)", list:[
      "Exclusively somatomotor; tongue muscles",
      "Nucleus — hypoglossal nucleus in medulla; 10–15 rootlets fuse + exit through hypoglossal canal",
      "Cervical contribution — C1 + C2 fibres join hypoglossal after canal exit (NOT hypoglossal fibres); from these joining fibres branches the superior root of deep ansa cervicalis",
      "Innervation: all intrinsic tongue muscles + most extrinsic (genioglossus, hyoglossus, styloglossus). Palatoglossus &rarr; supplied by CN X"
    ]},
    {img:"cn-11-12.jpg", caption:"Accessory (CN XI) and Hypoglossal (CN XII)"}
  ]
},

"cervical-thoracic-sympathetic":{parent:"ans",title:"Cervical + thoracic sympathetic system",
  body:[
    {h:"General pathway", p:"Sympathetic = thoracolumbar (T1–L2). Largest part of ANS. Cell bodies in lateral horn T1–L2. Myelinated preganglionic axons leave lateral horn via anterior root &rarr; white communicating br. &rarr; paravertebral ganglia of sympathetic trunk (in front of transverse processes)."},
    {h:"Sympathetic trunk ganglia", list:[
      "3 cervical",
      "10–12 thoracic",
      "4 lumbar",
      "4 sacral",
      "1 unpaired ganglion impar on coccyx",
      "All connected by interganglionic branches"
    ]},
    {h:"Distribution patterns", list:[
      "Synapse + return — gray ramus communicans (non-myelinated) &rarr; spinal nerve &rarr; smooth muscle of vessels, sweat glands, arrector pili, skin",
      "Ascending/descending — fibres ascend in trunk to cervical ganglia (cervical spinal nerves carry NO autonomic fibres of their own); after synapse, post-ganglionic fibres enter cervical spinal nerve via gray ramus",
      "Bypass — preganglionic fibres pass through ganglion without synapsing &rarr; form splanchnic nerves &rarr; synapse in prevertebral ganglia &rarr; post-ganglionic to viscera"
    ]},
    {h:"Cervical ganglia", list:[
      "Superior cervical ganglion (SCG) — largest; at C2–C3. Postganglionic axons hitchhike on internal + external carotid aa. &rarr; meninges, eyes, glands of head. Gives superior cardiac n.",
      "Middle cervical ganglion — smallest; at C6. Targets heart + neck",
      "Inferior cervical ganglion — usually fused with 1st thoracic = stellate ganglion (cervicothoracic). Postganglionic plexuses around subclavian + vertebral aa.; gives inferior cardiac n. Subclavian ansa (loop) between middle + inferior cervical over subclavian a."
    ]},
    {h:"Upper thoracic ganglia (T1–T4)", p:"Heart, lungs, glands (submandibular, sublingual, parotid, lacrimal). Innervation reaches thorax via cardiopulmonary splanchnic nerves &rarr; cardiac plexus + pulmonary plexus + esophageal plexus."},
    {img:"cervical-thoracic-sympathetic.jpg", caption:"Cervical and thoracic sympathetic system"}
  ]
},

"abdominopelvic-sympathetic":{parent:"ans",title:"Abdominopelvic sympathetic system + splanchnic nerves",
  body:[
    {h:"Splanchnic nerves overview", p:"Pre-ganglionic fibres bypassing sympathetic trunk &rarr; synapse in prevertebral ganglia around aorta. All sympathetic origins = T1–L2; some ascend/descend."},
    {h:"Thoracic splanchnic nerves", list:[
      "Greater thoracic splanchnic (T5–T9) &rarr; celiac ganglia",
      "Lesser thoracic splanchnic (T10–T11) &rarr; superior mesenteric + aorticorenal ganglia",
      "Least thoracic splanchnic (T12) &rarr; aorticorenal ganglia"
    ]},
    {h:"Lumbar + sacral splanchnic", list:[
      "Lumbar splanchnic (L1–L2) &rarr; inferior mesenteric ganglia",
      "Sacral splanchnic (post-ganglionic, from sacral sympathetic chain) &rarr; superior hypogastric ganglia",
      "Note: sacral splanchnic = sympathetic; pelvic splanchnic = parasympathetic. Do not confuse."
    ]},
    {h:"Post-ganglionic distribution", p:"Post-ganglionic fibres travel along blood vessels to target organs (e.g. liver &rarr; celiac trunk &rarr; common hepatic &rarr; proper hepatic &rarr; right + left hepatic branches; sympathetic from celiac plexus follows)."},
    {img:"abdominopelvic-sympathetic.jpg", caption:"Abdominopelvic sympathetic system"}
  ]
},

"cranio-sacral-parasympathetic":{parent:"ans",title:"Cranial + sacral parasympathetic system",
  body:[
    {h:"Pre-synaptic cell bodies", list:[
      "Brainstem gray (cranial outflow)",
      "Sacral cord S2–S4 (sacral outflow)"
    ]},
    {h:"Cranial outflow nuclei", list:[
      "CN III — Edinger-Westphal nucleus",
      "CN VII — superior salivatory + lacrimatory nuclei",
      "CN IX — inferior salivatory nucleus",
      "CN X — dorsal nucleus of vagus"
    ]},
    {h:"Mechanism", p:"Pre-synaptic fibre — very long; each synapses with ~3 post-synaptic via ACh. Ganglion — very close to or embedded in target organ. Post-synaptic fibre — very short; releases ACh."},
    {h:"Cranial outflow targets", list:[
      "CN III — ciliary ganglion &rarr; sphincter pupillae + ciliary muscle",
      "CN VII: greater petrosal n. &rarr; pterygopalatine ganglion &rarr; lacrimal gland + nasal/palatine/pharyngeal glands; chorda tympani &rarr; submandibular ganglion &rarr; submandibular + sublingual glands",
      "CN IX — lesser petrosal n. &rarr; otic ganglion &rarr; parotid (via auriculotemporal n. of V3)",
      "CN X — cervical part &rarr; cardiac branches &rarr; heart; thoracic part &rarr; pulmonary plexus, esophageal plexus; abdominal part &rarr; vagal trunks &rarr; abdominal viscera + myenteric + submucosal plexi"
    ]},
    {h:"Sacral outflow", p:"Pre-synaptic from S2–S4 &rarr; pelvic splanchnic nerves &rarr; synapse in inferior hypogastric plexus or pelvic ganglia. Function: GIT past Cannon-Bohm point (descending colon, sigmoid, rectum, anus); bladder; erectile bodies + internal genitalia."},
    {h:"Cannon-Bohm point", p:"Splenic flexure; border between cranial (vagal) and sacral parasympathetic territories."},
    {img:"cranio-sacral-parasympathetic.jpg", caption:"Cranio-sacral parasympathetic system"}
  ]
},

"abdominal-pelvic-plexuses":{parent:"ans",title:"Abdominal + pelvic autonomic plexuses + enteric nervous system",
  body:[
    {h:"Aortic abdominal plexus", p:"Surrounds abdominal aorta; splits into 2 iliac plexuses at aortic bifurcation. Sympathetic input from greater splanchnic (T5–T9), lesser splanchnic (T10–T11), least splanchnic (T12), lumbar splanchnic (L1–L2). Parasympathetic input from CN X (celiac, gastric, hepatic, renal brs.)."},
    {h:"Subplexuses of aortic abdominal plexus", list:[
      "Celiac plexus — around celiac trunk; right + left celiac ganglia; follow branches: hepatic (liver), splenic, pancreatic, renal + suprarenal (aorticorenal ganglia)",
      "Superior mesenteric plexus — at origin of SMA; small intestine + large intestine from major duodenal papilla &rarr; left colic flexure (Cannon-Bohm). Superior mesenteric ganglion (unpaired) at origin of artery",
      "Inferior mesenteric plexus — at level of IMA. Parasympathetic fibres from sacral. Innervates descending colon, sigmoid, rectal ampulla. Inferior mesenteric ganglion at origin of artery",
      "Testicular/ovarian plexus — innervates gonads, follows vessels",
      "Ureteric plexus — ureters"
    ]},
    {h:"Pelvic plexuses", list:[
      "Superior hypogastric plexus (presacral n.) — continuation of abdominal aortic plexus &rarr; splits into right + left hypogastric nn.; lumbar + sacral splanchnic L4–S1",
      "Inferior hypogastric plexus (pelvic plexus) — mixed; lateral to rectum into lesser pelvis; sympathetic (hypogastric n. + sacral splanchnic) + parasympathetic (pelvic splanchnic S2–S4)"
    ]},
    {h:"Pelvic sub-plexuses", list:[
      "Rectal plexus — rectum",
      "Vesical + ureteric plexus — bladder + pelvic ureter",
      "Prostatic plexus — prostate, prostatic urethra, urethra, seminal gland",
      "Deferential plexus — ductus deferens",
      "Uterovaginal plexus — ovaries, uterus, vagina",
      "Cavernous plexus of clitoris/penis — cavernous bodies"
    ]},
    {h:"Enteric nervous system", list:[
      "From esophagus to anus",
      "Submucosal (Meissner's) plexus — in submucosa; controls glands + intestinal blood supply",
      "Myenteric (Auerbach's) plexus — between inner circular + outer longitudinal smooth muscle; controls peristalsis",
      "Can act independently; uses CNS-like neurotransmitters; more neurons than spinal cord ('second brain')",
      "Cells: unipolar + bipolar neurons + supporting cells (astrocyte-like, from neural crest)"
    ]},
    {img:"abd-pelvic-plexuses.jpg", caption:"Abdominal and pelvic autonomic plexuses"}
  ]
},

};

function viewCnsSub(id){
    const d = CNS_DETAILS[id];
    if(!d) return `<p>Section not found: ${id}</p>`;
    const sec = CNS_PNS[d.parent];
    return `
    <div class="crumbs">
        <a href="#/cns-pns">CNS / PNS</a> &rsaquo;
        <span>${sec?sec.title:""}</span> &rsaquo;
        <span>${d.title}</span>
    </div>
    <div class="region-header">
        <h1>${d.title}</h1>
    </div>
    <div class="section">
        ${renderBlocks(d.body)}
    </div>
    <div style="margin-top:18px"><a class="btn ghost" href="#/cns-pns">← Back to CNS / PNS</a></div>
    `;
}

/* ====================================================================
   ROUTER
   ==================================================================== */
function route(){
    const h = location.hash || "#/welcome";
    const app = document.getElementById("app");
    let html = "";
    if(h==="#/welcome" || h==="#/" || h===""){
        html = viewWelcome();
    } else if(h==="#/terms"){
        html = viewTerms();
    } else if(h==="#/topography"){
        html = viewTopography();
    } else if(h==="#/cns-pns"){
        html = viewCnsPns();
    } else if(h.startsWith("#/region/")){
        html = viewRegion(h.replace("#/region/",""));
    } else if(h.startsWith("#/sub/")){
        html = viewSub(h.replace("#/sub/",""));
    } else if(h.startsWith("#/cns/")){
        html = viewCnsSub(h.replace("#/cns/",""));
    } else {
        html = viewWelcome();
    }
    app.innerHTML = html;
    setActiveNav();
    applyStoredImages();
    colorizeBlocks();

    // Initialize body map after topography HTML is injected
    if(h==="#/topography"){
        bm.cur=[0,0,400,720]; bm.tgt=[0,0,400,720]; bm.active=null;
        if(bm.raf){cancelAnimationFrame(bm.raf);bm.raf=null;}
        bmUpdatePanel(null);
    }

    // Wire up Term Library search
    if(h==="#/terms"){
        renderTermList();
        document.getElementById("termq").addEventListener("input", renderTermList);
        document.getElementById("termcat").addEventListener("change", renderTermList);
    }
    window.scrollTo({top:0, behavior:"instant"});
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
window.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLightbox(); });
