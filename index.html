    {q:3,  text:'Connection of bones, structure and types of joints', content:`<div><div><h2>Q3 — Connection of Bones — Structure & Types of Joints</h2><p style="margin-top:4px">From immovable fusion to the freely mobile synovial joint</p></div><p><strong>Joints</strong> are connections between the bones of the skeleton. Two main types: <strong>synarthrosis</strong> (bones connected by connective tissue — no cavity) vs <strong>diarthrosis</strong> (synovial joint — articulating surfaces separated by a joint cavity).</p><h3>Classification by Movability</h3><ul><li><strong>Synarthrosis</strong> — immovable</li><li><strong>Amphiarthrosis</strong> — partially movable</li><li><strong>Diarthrosis</strong> — movable (synovial)</li></ul><h3>Synarthrosis — Immovable (3 types by connective tissue)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Connective Tissue</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Examples</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Syndesmosis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fibrous CT (ligaments, tendons)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Gomphosis (teeth in alveolar bone); Sutures — plana (planes), squamosa (overlapping), serrata (saw-like)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synchondrosis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hyaline cartilage</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Growth plate (epiphysis–diaphysis in childhood); sternum–ribs junction</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synostosis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Bone matrix</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Epiphysis–diaphysis in adults; sacrum vertebrae — hardest, most immovable; ossified from another joint</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Key distinction:</strong> Synchondrosis = hyaline cartilage (synarthrosis). Symphysis = fibrous cartilage (amphiarthrosis). Do not confuse these two.</p></div><h3>Amphiarthrosis — Partially Movable</h3><p><strong>Symphysis</strong> = joint made of <strong>fibrous cartilage</strong>. Examples: pubic symphysis, joints between vertebrae, interosseous membranes (tibia–fibula, ulna–radius).</p><h3>Diarthrosis — Synovial Joint Structure</h3><p>Joints with <strong>articulating surfaces with a cavity</strong> = synovial joints. The joint capsule has 5 components:</p><ol><li><strong>Articular cartilage</strong> — hyaline cartilage covering the bone ends at the articulation.</li><li><strong>Synovial fluid</strong> — supplies nutrients to the articular cartilage; lubricates the joint.</li><li><strong>Fibrous membrane / layer</strong> — dense CT; mechanical support; external layer of the joint capsule.</li><li><strong>Synovial membrane / layer</strong> — produces synovial fluid; lines the inner side of the articular capsule; supplied by blood vessels.</li><li><strong>Articular / joint cavity</strong> — space between the articular surfaces, filled with synovial fluid.</li></ol><h3>Additional Features of Synovial Joints</h3><ul><li><strong>Synovial folds</strong> — folds of synovial membrane; enlarge the surface area; contain synovial villi.</li><li><strong>Discs / menisci</strong> (crescent-shaped) — fibrous cartilage; compensate for imperfect articular surface shapes; disperse body weight + reduce friction.</li><li><strong>Labrum</strong> — elevated fibrocartilaginous margin that deepens the articular cavity.</li><li><strong>Bursae</strong> — synovial fluid sacs; cushion between bones, tendons, and muscles; reduce friction.</li><li><strong>Fat pads</strong> — fill spaces in the joint cavity; 'internal streamlining'.</li><li><strong>Ligaments</strong> — dense CT; support + stabilize + limit movement.</li><li><strong>Articular muscle</strong> — prevents the capsule from being caught between bones during movement.</li></ul><h3>Classification of Diarthroses</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Criterion</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Types</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">By articulation (elements)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple (2 bones) · Compound (>2 bones) · Complex (cavity divided by disc/meniscus — e.g. knee)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">By number of axes</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Monoaxial · Biaxial · Triaxial</td></tr></tbody></table><h3>Joint Shapes & Movements</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Shape</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Axes</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Example</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ball & socket (spheroidal)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Triaxial — 3 perpendicular planes; large ROM</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shoulder joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Triaxial (limited sliding); strong ligaments</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Zygapophyseal joints</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hinge (trochlear)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Monoaxial (perpendicular axis)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Humero-ulnar joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pivot</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Monoaxial (parallel axis)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Radioulnar joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ellipsoid</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Biaxial — flexion/extension + ab/adduction</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Wrist joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Saddle</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Biaxial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Thumb (1st CMC)</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Joint movement is limited by:</strong> (1) shape of fossa and head, (2) ligaments, (3) close bony projections, (4) soft tissue size (muscles, fat). Basic position = anatomical position. Natural position = most relaxed capsule.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Synarthrosis (no cavity): syndesmosis (fibrous) · synchondrosis (hyaline cartilage) · synostosis (bone)</li><li>Amphiarthrosis = symphysis = fibrous cartilage</li><li>Synovial joint: articular cartilage + synovial fluid + fibrous + synovial membrane + cavity</li><li>Shoulder = ball-socket | Wrist = ellipsoid | Thumb = saddle | Radioulnar = pivot | Knee = complex</li></ul></div></div>`},
    {q:4,  text:'The osseous nasal cavity, relations to neighboring structures', content:`<div><div><h2>Q4 — The Osseous Nasal Cavity</h2><p style="margin-top:4px">Boundaries, lateral wall, conchae, meatuses, paranasal sinuses</p></div><p>The <strong>nasal cavity</strong> is the space inside the nose. It lies above the bone forming the roof of the mouth and curves down to join the throat. The nasal cavity is divided into right and left cavities by the <strong>nasal septum</strong>.</p><h3>Boundaries</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Boundary</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Bones</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Roof</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Frontal + nasal bones (anterior) · Cribriform plate of ethmoid (middle) · Body of sphenoid (posterior)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Floor</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Palatine process of maxilla + horizontal plate of palatine bone = hard palate</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral wall</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior, middle, inferior nasal conchae · nasal surface of maxilla · labyrinth of ethmoid · lacrimal bone · medial pterygoid plate of sphenoid</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial wall (septum)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Perpendicular plate of ethmoid · vomer · septal cartilages</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Note on conchae:</strong> Superior and middle conchae are part of the <strong>ethmoid bone</strong>. The <strong>inferior concha</strong> is a separate bone joined to the maxilla.</p></div><h3>Three Regions Within Each Cavity</h3><ul><li><strong>Nasal vestibule</strong> — internal to the nostrils; lined by skin.</li><li><strong>Respiratory region</strong> — rich neurovascular supply; lined by respiratory epithelium (ciliated + mucous cells).</li><li><strong>Olfactory region</strong> — apex of the cavity; lined by olfactory epithelium with olfaction receptors and Bowman's glands.</li></ul><h3>Paranasal Sinuses</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Sinus</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Location</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Drains into</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Frontal sinuses</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior anterior</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle meatus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ethmoid sinuses (anterior/middle)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle meatus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ethmoid sinuses (posterior)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior meatus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Maxillary sinuses (paired)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle meatus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sphenoid sinuses</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Posterior</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Spheno-ethmoidal recess (posterior roof)</td></tr></tbody></table><div style="background:#f1f5f9"><p>All paranasal sinuses <strong>except the sphenoid</strong> drain via ostia on the <strong>lateral wall</strong>. The sphenoid drains into the <strong>posterior roof (spheno-ethmoidal recess)</strong>.</p></div><h3>Meatuses — Drainage Summary</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Meatus</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Location</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">What drains here</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior meatus</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between roof and middle concha</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sphenoidal sinus + posterior ethmoidal sinus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle meatus</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between middle and inferior conchae</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior + middle ethmoidal cells · frontal sinus · maxillary sinus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior meatus</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between inferior concha and floor</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Nasolacrimal duct</td></tr></tbody></table><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Roof: frontal/nasal → cribriform plate (ethmoid) → sphenoid body</li><li>Inferior concha = separate bone; superior + middle conchae = ethmoid</li><li>3 regions: vestibule (skin) · respiratory (ciliated epithelium) · olfactory (olfaction receptors)</li><li>All sinuses → lateral wall meatuses EXCEPT sphenoid → spheno-ethmoidal recess</li><li>Inferior meatus ← nasolacrimal duct; Middle ← frontal + maxillary + anterior ethmoidal</li></ul></div></div>`},
    {q:5,  text:'Bony orbit: walls, relation to neighboring structures, passages', content:`<div><div><h2>Q5 — Bony Orbit — Walls, Relations & Passages</h2><p style="margin-top:4px">Seven bones, four walls, three passages</p></div><p>The orbit is an <strong>irregular four-sided pyramid</strong> on either side of the root of the nose. Base = orbital opening; Apex = optic canal. The axis is directed <strong>posteriorly and medially</strong>. The medial walls are <strong>parallel</strong>. The medial and lateral walls form a <strong>45° angle</strong>.</p><h3>Seven Bones of the Orbit</h3><p>Maxilla · Zygomatic · Frontal · Ethmoid · Lacrimal · Sphenoid · Palatine</p><h3>Walls of the Orbit</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Wall</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Bones</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Roof</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Orbital part of frontal bone + sphenoid bone</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial wall</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Maxilla · lacrimal bone · ethmoid bone · sphenoid bone</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral wall</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Zygomatic bone + greater wing of sphenoid</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Floor</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Orbital surface of maxilla (main) + small parts of zygomatic + palatine bones</td></tr></tbody></table><h3>Neighboring Structures</h3><ul><li><strong>Periorbita</strong> — periosteum lining the orbital bones; sends extensions into the eyelids as <strong>orbital septa</strong>.</li><li><strong>Annulus of Zinn</strong> (common tendinous ring) — ring of fibrous tissue surrounding the optic nerve at the orbital apex; <strong>common origin of all 4 rectus muscles</strong>.</li></ul><h3>Eyelid Layers (anterior → posterior)</h3><p>Skin → Subcutaneous tissue → <strong>Orbicularis oculi</strong> (voluntary muscle) → <strong>Orbital septum</strong> → <strong>Tarsus</strong> (dense CT plates; attached medially by medial palpebral ligament to anterior lacrimal crest; laterally by lateral palpebral ligament to orbital tubercle of zygomatic) → <strong>Conjunctiva</strong> (produces mucus + tears; immune surveillance; prevents microbe entry).</p><h3>Passages of the Orbit</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Passage</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Location</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Opens to</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Contents</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Optic canal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between two roots of lesser wing of sphenoid</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle cranial fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Optic nerve (CN II) + ophthalmic artery</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior orbital fissure</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral to optic canal; between roof and lateral wall</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle cranial fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">CN III, IV, VI · lacrimal/frontal/nasociliary branches of CN V1 · superior ophthalmic vein</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior orbital fissure</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between lateral wall and floor</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Infratemporal fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Infraorbital nerve (CN V2) · maxillary nerve</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ethmoidal foramina</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Junction of frontal + ethmoid bones</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ethmoid sinuses, ant. cranial fossa, nasal cavity</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior + posterior ethmoidal vessels and nerves</td></tr></tbody></table><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>7 bones: Maxilla · Zygomatic · Frontal · Ethmoid · Lacrimal · Sphenoid · Palatine</li><li>Axis = posterior + medial; medial walls parallel; medial-lateral angle = 45°</li><li>Optic canal → CN II + ophthalmic artery → middle cranial fossa</li><li>Superior orbital fissure → CN III, IV, VI, V1, superior ophthalmic vein</li><li>Inferior orbital fissure → CN V2 → infratemporal fossa</li><li>Annulus of Zinn = common origin of all 4 rectus muscles</li></ul></div></div>`},
    {q:6,  text:'Skull, skull of the neonate and its development; vertebral column and its development, connections, curvatures and motility', content:`<div><div><h2>Q6 — Skull & Vertebral Column</h2><p style="margin-top:4px">Development, connections, curvatures and motility — two-part question</p></div><h3>Part 1 — The Skull</h3><p>The skull has two parts: <strong>Neurocranium</strong> (houses the brain) and <strong>Viscerocranium</strong> (the face).</p><h3>Neurocranium</h3><ul><li><strong>Membranous part (calvaria)</strong> — flat bones surrounding the brain vault. Derived from neural crest cells (pituitary → frontal) + paraxial mesoderm (posterior). <strong>Intramembranous ossification.</strong> Bones: frontal, parietal, occipital.</li><li><strong>Cartilaginous part (chondrocranium)</strong> — base of the skull. <strong>Endochondral ossification.</strong> Bones: ethmoid, sphenoid, temporal. Divided at the <strong>sella turcica</strong> (where notochord ends) into prechordal (neural-crest) and chordal (occipital-somitomere) areas.</li></ul><div style="background:#f1f5f9"><p><strong>Pneumatized skull bones:</strong> Sphenoid, ethmoid, temporal, and frontal bones contain air cells/sinuses.</p></div><h3>Sutures & Fontanelles of the Neonate</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Structure</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Shape / Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ossifies</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Landmark formed</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior fontanelle</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Diamond-shaped</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">~3 years</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Bregma</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Posterior fontanelle</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Triangular</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">~3 months</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lambda</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sphenoid fontanelle (paired)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">—</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">6th month</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pterion</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Mastoid fontanelle (paired)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">—</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">18 months</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Asterion — weakest part of skull</td></tr></tbody></table><div style="background:#f1f5f9"><p>Sutures allow skull bones to slightly <strong>overlap during delivery</strong> (molding). Fontanelles allow the brain to grow with the skull.</p></div><h3>Viscerocranium — Facial Skeleton</h3><p><strong>All viscerocranium bones form via intramembranous ossification.</strong> Derived from the 1st and 2nd pharyngeal arches.</p><ul><li><strong>1st pharyngeal arch — dorsal (maxillary process):</strong> maxilla, zygomatic, temporal (part).</li><li><strong>1st pharyngeal arch — ventral (mandibular process):</strong> mandible (from mesenchyme around Meckel's cartilage) + incus + malleus (first bones to ossify).</li><li><strong>2nd pharyngeal arch:</strong> stapes.</li></ul><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Anencephaly — anterior neural pore fails to close → no skull vault → incompatible with life. Meningocele — partial vault missing, dura mater protrudes. Meningomyelocele — brain herniates into the dura protrusion.</p></div><h3>Cranial Fossae</h3><ul><li><strong>Anterior cranial fossa</strong> — contains the frontal lobes.</li><li><strong>Middle cranial fossa</strong> — separated from posterior by the clivus and petrous crest.</li><li><strong>Posterior cranial fossa</strong> — between the foramen magnum and cerebellar tentorium; contains the brainstem and cerebellum.</li></ul><hr style="border:none;border-top:1px solid #e8ecf3;margin:32px 0"><h3>Part 2 — The Vertebral Column</h3><p><strong>33 vertebrae:</strong> 7 cervical · 12 thoracic · 5 lumbar · 5 fused sacral · 4 fused coccygeal. Spongy bone covered by thin compact bone; highly hematopoietic red marrow. Vertebral arches = 2 pedicles + 2 laminae + vertebral body → vertebral foramen → <strong>vertebral canal</strong> (spinal cord + nerve roots; nerves exit via intervertebral foramina).</p><h3>Differences Between Vertebra Types</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Body</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Foramen</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Transverse Process</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Spinous Process</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">7 Cervical</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Small, kidney-shaped</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Triangular</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse foramen (vertebral a. + v.) + groove for spinal nerve</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Bifid (except C1 + C7)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">12 Thoracic</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Heart-shaped, tall as wide</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Rounded/diamond</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse costal facet (rib tubercle); absent T11/T12</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Long, caudally directed; 2 demi costal facets</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">5 Lumbar</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tall, wide, kidney-shaped</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Triangular</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costal process (embryological rib remnant); mammillary + accessory processes</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flat, quadrate from the side</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sacral (S1–S5 fused)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fused</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior foramina → sacral canal; posterior → 4 pairs</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fused → lateral sacral crests</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">S1–S4 → median sacral crest; S5 absent → sacral hiatus</td></tr></tbody></table><h3>Development of the Vertebral Column</h3><p><strong>Ventromedial somites (sclerotome)</strong> undergo epithelial-to-mesenchyme transition → migrate toward the notochord and neural tube. Each sclerotome divides into upper and lower halves. The <strong>lower half fuses with the upper half of the sclerotome below</strong> → re-segmentation. Vertebral development is therefore <strong>intersegmental</strong>.</p><p>The <strong>notochord degenerates</strong> within the vertebral bodies but <strong>expands between vertebrae</strong> → forms the <strong>nucleus pulposus</strong>. Mesenchyme forms the <strong>annulus fibrosus</strong> around it.</p><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Spina bifida occulta — vertebral arch doesn't close, no CNS migration. Meningomyelocele — spinal cord + meninges protrude. Cystica meningomyelocele — posterior neural pore doesn't close; spinal cord exposed. Scoliosis — lateral curve, pathologic when distinct; wedging + rotation of vertebrae.</p></div><h3>Curvatures of the Vertebral Column</h3><ul><li><strong>Primary curvatures (kyphosis)</strong> — dorsal convexity; form in the fetal period. Thoracic kyphosis + sacral kyphosis.</li><li><strong>Secondary curvatures (lordosis)</strong> — ventral convexity; form postnatally. Cervical lordosis (when child raises head) + lumbar lordosis (when child stands and walks).</li></ul><h3>Vertebral Connections — Key Ligaments</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ligament</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Location</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Function</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior longitudinal lig.</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ventral surface of vertebral bodies, C1–S1</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Stabilizes + fixates the column</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Posterior longitudinal lig.</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dorsal surface inside the vertebral canal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents disc prolapse into the canal; fused with discs</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tectorial membrane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Cranial continuation → through foramen magnum</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Covers median atlanto-axial joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ligamenta flava (elastic CT)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Between vertebral arches</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Maintains erect posture; allows passive extension</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Nuchal ligament</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">C7 → external occipital protuberance</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Cranial continuation of supraspinous ligament</td></tr></tbody></table><h3>Intervertebral Disc</h3><ul><li><strong>Annulus fibrosus</strong> — ring of fibrous cartilage; constitutes most of the disc mass.</li><li><strong>Nucleus pulposus</strong> — spherical, incompressible, gel-like; in the center; derived from the notochord.</li></ul><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Disc herniation: wear and tear reduces nucleus pulposus pressure → annulus fibrosus loosens → disc material displaced. Pulposus herniation = nucleus pulposus pushed through the annulus fibrosus.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Skull: calvaria = intramembranous; skull base = endochondral; all viscerocranium = intramembranous</li><li>Fontanelles: anterior (3 yrs/bregma) · posterior (3 mo/lambda) · sphenoid (6 mo/pterion) · mastoid (18 mo/asterion = weakest)</li><li>33 vertebrae; spinal nerves exit via intervertebral foramina</li><li>Vertebral re-segmentation → intersegmental development; nucleus pulposus = notochord remnant</li><li>Primary curvatures (kyphosis, fetal): thoracic + sacral. Secondary (lordosis, postnatal): cervical + lumbar</li></ul></div></div>`},
    {q:7,  text:'Craniovertebral joint: structure and movements', content:`<div><div><h2>Q7 — Craniovertebral Joints</h2><p style="margin-top:4px">Atlanto-occipital + atlanto-axial joints: structure and movements</p></div><p>The <strong>craniovertebral joints</strong> connect the occipital bone to the atlas (C1) and the atlas to the axis (C2).</p><h3>1) Atlanto-Occipital Joint (Paired)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple, synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ellipsoid — ovoid process in elongated cavity → allows flexion, extension, abduction, adduction</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Occipital condyle</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior articular facet of the atlas (C1)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ligaments</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior atlanto-occipital membrane (continuation of anterior longitudinal lig.) + Posterior atlanto-occipital membrane (continuation of ligamenta flava)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Movements</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anteflexion, retroflexion, slight lateral flexion ('nodding' yes)</td></tr></tbody></table><h3>2) Median Atlanto-Axial Joint (Unpaired)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple, synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pivot — parallel axis</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dens of axis (odontoid process of C2)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior articular facet of atlas + transverse ligament of atlas</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ligaments</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse lig. of atlas · cruciform lig. · apical lig. of dens (→ anterior margin of foramen magnum) · alar ligaments (limit rotation) · tectorial membrane</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Movements</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Rotation left and right ('shaking head' no)</td></tr></tbody></table><h3>3) Lateral Atlanto-Axial Joint (Paired)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple, synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articulation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior articular process of C1 + superior articular process of C2</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Movements</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sliding; allows rotation</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Movements summary:</strong> Atlanto-occipital = flexion/extension (nodding). Atlanto-axial = rotation (~50% of total cervical rotation). Alar ligaments limit rotation. Tectorial membrane = cranial continuation of the posterior longitudinal ligament.</p></div><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Dens fracture (e.g., from axial loading) is dangerous — the dens can compress the spinal cord. The transverse ligament of the atlas normally holds the dens; its rupture causes atlanto-axial instability.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Atlanto-occipital: ellipsoid; occipital condyle + superior facet of atlas; nodding (yes)</li><li>Median atlanto-axial: pivot; dens of axis + anterior facet of atlas + transverse lig.; rotation (no)</li><li>Alar ligaments limit rotation; tectorial membrane = cranial continuation of posterior longitudinal lig.</li></ul></div></div>`},
    {q:8,  text:'Skeleton of the thorax and its development, connections and motility of ribs', content:`<div><div><h2>Q8 — Skeleton of the Thorax — Development, Connections & Motility of Ribs</h2><p style="margin-top:4px">Sternum, ribs, costal cartilages, thoracic apertures</p></div><p>The thoracic skeleton = <strong>12 thoracic vertebrae + 12 pairs of ribs + sternum</strong>. Together they protect the thoracic organs and provide the mechanical advantage for breathing.</p><h3>The Sternum</h3><ul><li><strong>Manubrium</strong> — superior; has a jugular (suprasternal) notch at the top.</li><li><strong>Body (corpus sterni)</strong> — middle, longest part; connects to ribs 2–7 via costal cartilages.</li><li><strong>Xiphoid process</strong> — inferior bony/cartilaginous tip; ossifies progressively.</li></ul><div style="background:#f1f5f9"><p><strong>Sternal angle (Angle of Louis):</strong> junction of manubrium + body. Marks the attachment of <strong>rib 2</strong>, the level of the <strong>aortic arch</strong>, and the <strong>T4/T5</strong> vertebral level.</p></div><h3>Classification of Ribs</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Category</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ribs</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">True ribs (vertebrosternal)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">1–7</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Each has its own costal cartilage connecting directly to the sternum</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">False ribs (vertebrochondral)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">8–10</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Connect to the sternum indirectly via the costal cartilage of rib 7</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Floating ribs (vertebral)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">11–12</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">No anterior attachment; end free in muscle</td></tr></tbody></table><h3>Structure of a Typical Rib (3–9)</h3><ul><li><strong>Head</strong> — two articular facets (superior + inferior demi-facets); articulates with the vertebral body.</li><li><strong>Neck</strong> — between head and tubercle.</li><li><strong>Tubercle</strong> — articulates with the transverse costal facet of the vertebra.</li><li><strong>Body (shaft)</strong> — curved; has a <strong>costal groove</strong> on the inferior inner surface protecting the intercostal neurovascular bundle (vein · artery · nerve, from superior to inferior).</li><li><strong>Costal cartilage</strong> — connects the anterior rib end to the sternum or the next rib's cartilage.</li></ul><div style="background:#f1f5f9"><p>Atypical ribs: Rib 1 — shortest, flattest, most curved; groove for subclavian vessels. Ribs 11–12 — no neck, no tubercle; free ends.</p></div><h3>Connections of Ribs — Joints</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Joint</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Articulation</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costovertebral joint</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synovial, plane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Head of rib ↔ demi-costal facets of adjacent vertebrae (+ intervertebral disc)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costotransverse joint</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synovial, plane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Rib tubercle ↔ transverse costal facet (absent T11, T12)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costosternal joint — rib 1</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synchondrosis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costal cartilage of rib 1 ↔ manubrium (immovable)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costosternal joints — ribs 2–7</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Synovial, plane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Costal cartilages ↔ sternum (movable)</td></tr></tbody></table><h3>Development of Ribs</h3><p>Ribs develop from <strong>costal processes of the thoracic vertebrae</strong>. In cervical and lumbar regions, costal processes normally remain as transverse processes; occasionally they fully ossify → <strong>cervical rib</strong> or <strong>lumbar rib</strong>.</p><h3>Thoracic Apertures</h3><ul><li><strong>Superior aperture (thoracic inlet)</strong> — boundaries: T1 (posterior) + 1st ribs (lateral) + manubrium (anterior). Contains trachea, esophagus, major vessels, nerves.</li><li><strong>Inferior aperture (thoracic outlet)</strong> — boundaries: T12 + ribs 11–12 + costal arch + xiphoid. Closed by the <strong>diaphragm</strong>.</li></ul><h3>Motility of Ribs — Breathing</h3><ul><li><strong>Pump-handle movement</strong> (ribs 1–6) — ribs elevate and move anteriorly and superiorly → increases <strong>anteroposterior diameter</strong> of the thorax.</li><li><strong>Bucket-handle movement</strong> (ribs 7–10) — ribs swing laterally and superiorly → increases <strong>transverse diameter</strong> of the thorax.</li></ul><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Thorax = 12 thoracic vertebrae + 12 pairs of ribs + sternum (manubrium + body + xiphoid)</li><li>True ribs 1-7 (own cartilage) | False 8-10 (via rib 7) | Floating 11-12 (free)</li><li>Sternal angle = rib 2 attachment = T4/T5 level = aortic arch level</li><li>Costal groove: VAN (vein-artery-nerve) from superior to inferior</li><li>Pump-handle (upper ribs) → AP diameter ↑; bucket-handle (lower ribs) → transverse diameter ↑</li></ul></div></div>`},
    {q:9,  text:'Temporomandibular joint: structure and motility', content:`<div><div><h2>Q9 — Temporomandibular Joint — Structure & Motility</h2><p style="margin-top:4px">The jaw joint: a complex bicondylar synovial joint with an articular disc</p></div><p>The <strong>temporomandibular joint (TMJ)</strong> is the articulation between the <strong>condylar process of the mandible</strong> and the <strong>mandibular fossa + articular eminence of the temporal bone</strong>. It is a <strong>complex synovial joint</strong> divided by a <strong>fibrocartilaginous disc</strong> into two compartments.</p><h3>Structure</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Complex synovial joint (disc divides cavity into 2 compartments)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Bicondylar</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Condylar head of the mandible</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Mandibular fossa + articular eminence of temporal bone</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular disc</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fibrocartilaginous; divides joint into superior (disc–temporal) and inferior (disc–mandibular) compartments</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Capsule</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lax fibrous capsule — allows wide range of motion</td></tr></tbody></table><h3>Ligaments</h3><ul><li><strong>Lateral (temporomandibular) ligament</strong> — main intrinsic ligament; zygomatic arch → neck of mandible; limits posterior displacement.</li><li><strong>Sphenomandibular ligament</strong> — spine of sphenoid → lingula of mandible; limits inferior + lateral displacement.</li><li><strong>Stylomandibular ligament</strong> — styloid process → angle of mandible; limits anterior displacement.</li></ul><h3>Compartments and Movements</h3><ul><li><strong>Superior compartment</strong> (disc–temporal) — <strong>translatory (gliding)</strong> movement: protrusion and retrusion.</li><li><strong>Inferior compartment</strong> (disc–mandibular) — <strong>rotatory</strong> movement: depression and elevation (opening and closing).</li></ul><h3>Movements and Muscles</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Movement</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Muscles</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Depression (opening)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral pterygoid, digastric, mylohyoid</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Elevation (closing)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Masseter, temporalis, medial pterygoid</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Protrusion</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral pterygoid, medial pterygoid</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Retrusion</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Temporalis (posterior fibers), digastric</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral deviation (chewing)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pterygoids alternately</td></tr></tbody></table><div style="background:#fef2f2"><p><strong>Clinical note:</strong> TMJ dislocation occurs when the condylar head moves anterior to the articular eminence and cannot return. TMJ disorders (TMD) cause pain, clicking, and limited movement; the articular disc can be displaced.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>TMJ = bicondylar complex synovial joint; disc divides into superior (gliding) + inferior (rotation) compartments</li><li>Main ligament: lateral (temporomandibular) ligament — limits posterior displacement</li><li>Depression = lateral pterygoid + digastric | Elevation = masseter + temporalis + medial pterygoid</li></ul></div></div>`},
    {q:10,  text:'Development and growth of the limb, molecular mechanisms, limb defects', content:`<div><div><h2>Q10 — Development & Growth of the Limb</h2><p style="margin-top:4px">Molecular mechanisms, axes of development, and limb defects</p></div><p>The <strong>limbs, shoulder, and pelvic girdles</strong> develop from <strong>limb buds</strong> in the lateral plate mesoderm. Upper limb buds appear at <strong>week 4</strong>; lower limb buds at <strong>week 5</strong>. All limb structures except the epidermis and nerves are derived from <strong>lateral plate mesoderm</strong>. Fingers/toes separate by apoptosis at week 8.</p><h3>Three Axes of Limb Development</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Axis</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Controlled by</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Mechanism</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Proximal → Distal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Apical Ectodermal Ridge (AER)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">AER at the distal tip secretes FGF4 and FGF8 → maintains the progress zone (undifferentiated mesoderm) → drives outgrowth</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior → Posterior</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Zone of Polarizing Activity (ZPA)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">ZPA cells at the posterior margin secrete Sonic Hedgehog (SHH). Highest SHH = posterior (5th digit). Lowest = anterior (thumb/1st digit)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dorsal → Ventral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Surface ectoderm</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Wnt7a → dorsal specification. En-1 (Engrailed-1) → ventral specification; represses Wnt7a ventrally</td></tr></tbody></table><h3>Key Molecular Signals</h3><ul><li><strong>AER (Apical Ectodermal Ridge)</strong> — drives proximal-to-distal outgrowth via FGF secretion.</li><li><strong>FGF4, FGF8</strong> — secreted by AER; maintain the progress zone and mesodermal proliferation.</li><li><strong>SHH (Sonic Hedgehog)</strong> — secreted by ZPA; highest concentration = posterior limb margin (5th digit side).</li><li><strong>HOX genes</strong> — specify segment identity along the proximal-distal axis.</li><li><strong>Wnt7a / En-1</strong> — specify dorsal/ventral identity.</li></ul><h3>Limb Rotation During Development</h3><ul><li><strong>Upper limb</strong> rotates <strong>90° laterally</strong> → elbow points posteriorly; thumb (preaxial) is lateral.</li><li><strong>Lower limb</strong> rotates <strong>90° medially</strong> → knee points anteriorly; big toe (preaxial) is medial.</li></ul><h3>Limb Defects</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Defect</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Cause</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Amelia</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Complete absence of one or more limbs</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Severe AER failure</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Meromelia / Hemimelia</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Partial limb absence (e.g., hand present, no forearm)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Partial AER disruption; thalidomide</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Phocomelia</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Severely shortened proximal limb — hand/foot near trunk ('seal limb')</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Thalidomide — inhibits AER and angiogenesis</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Polydactyly</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Extra digits</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Excess SHH signaling / posterior ZPA duplication</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Syndactyly</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fused digits</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Failure of interdigital apoptosis</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Clubfoot (talipes equinovarus)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Foot inverted + plantarflexed</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Multifactorial</td></tr></tbody></table><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Thalidomide — a sedative used in the 1950s–60s in pregnant women — caused phocomelia and meromelia by inhibiting the AER, disrupting FGF signaling and angiogenesis during the critical window of limb development (weeks 4–8).</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Limb buds: upper week 4; lower week 5; from lateral plate mesoderm</li><li>3 axes: Proximal-distal (AER/FGF) · Anterior-posterior (ZPA/SHH) · Dorsal-ventral (Wnt7a/En-1)</li><li>SHH from ZPA: highest = posterior (5th digit); lowest = anterior (thumb)</li><li>Upper limb rotates 90° laterally (elbow back); lower limb 90° medially (knee forward)</li><li>Polydactyly = excess SHH; Syndactyly = no apoptosis; Phocomelia = thalidomide</li></ul></div></div>`},
    {q:11,  text:'Shoulder joint and elbow joint: structure and movements', content:`<div><div><h2>Q11 — Shoulder Joint & Elbow Joint</h2><p style="margin-top:4px">Structure and movements of both joints</p></div><div style="background:#f1f5f9"><p><strong>Shoulder joint key rule:</strong> Large humeral head + shallow glenoid cavity = most mobile but most unstable joint in the body. Stability comes from: (1) rotator cuff muscles, (2) long head of biceps, (3) bony processes (acromion + coracoid), (4) extracapsular ligaments.</p></div><h3>Part 1 — Shoulder Joint (Glenohumeral)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ball and socket (triaxial)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Head of humerus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Glenoid cavity of scapula</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Capsule</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Attaches to neck of scapula + anatomical neck of humerus; wraps around glenoid labrum + biceps tendon</td></tr></tbody></table><h3>Range of Motion (Shoulder)</h3><ul><li><strong>Anteflexion:</strong> 0–90° (with scapular external rotation → up to 180°)</li><li><strong>Retroflexion:</strong> 0–50°</li><li><strong>Abduction:</strong> 0–90° · <strong>Adduction:</strong> 0–75°</li><li><strong>External rotation:</strong> 0–90° · <strong>Internal rotation:</strong> 0–90°</li></ul><h3>Ligaments of the Shoulder</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ligament</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Course</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Function</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Coracohumeral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Coracoid process → greater tuberosity</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents inferior displacement of humerus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Glenohumeral (3 parts)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior, middle, inferior — anterior view</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Strengthens the capsule anteriorly</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Coracoacromial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Acromion ↔ coracoid process</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Protective arch over humeral head</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse humeral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Greater ↔ lesser tuberosity</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Holds long head of biceps in intertubercular sulcus</td></tr></tbody></table><h3>Accessory Features</h3><ul><li><strong>Glenoid labrum</strong> — fibrocartilaginous rim; enlarges articular cavity; compensates for instability.</li><li><strong>Long head of biceps tendon</strong> — runs through intertubercular sulcus → attaches to supraglenoid tubercle; adds stability.</li><li><strong>Sub-deltoid bursa</strong> — under deltoid; continues with sub-acromial bursa.</li><li><strong>Sub-acromial bursa</strong> — under the acromion.</li><li><strong>Subtendinous bursa of subscapularis</strong> — normally communicates with the glenohumeral
