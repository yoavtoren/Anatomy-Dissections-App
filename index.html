<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127942; Movements of the Subtalar + Talocalcaneonavicular Unit</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#15803d">Supination</span></strong><br>Elevation of <u>medial edge</u> of foot (sole turns inward)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#15803d">Pronation</span></strong><br>Elevation of <u>lateral edge</u> of foot (sole turns outward)</div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Together they produce inversion/eversion of the foot — essential for walking on uneven ground.</strong></span></div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Talocrural = compound hinge; trochlea of talus in mortise of tibia+fibula.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Plantar flexion 0–50°; dorsiflexion 0–20°.</span></li>
<li><span style="color:#dc2626">Lateral ligament (ATFL) most commonly torn in inversion sprains.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Deltoid ligament = 4 parts on medial side.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Subtalar + talocalcaneonavicular = supination/pronation unit.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Spring ligament (plantar calcaneonavicular) supports head of talus.</span></li>
</ul>
</div>
</div>`},
    {q:17, text:'Bones and joints of foot including reading of X-ray images, plantar arches and their support', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">17. Bones and Joints of the Foot — X-Ray Reading, Plantar Arches &amp; Their Support</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The foot has <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>26 bones</strong></span>: <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>7 tarsals</strong></span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>5 metatarsals</strong></span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>14 phalanges.</strong></span> The foot has <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>3 plantar arches</strong></span> that act as a spring — distributing weight, absorbing shock, propelling the body forward.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Dorsal view of the foot X-ray — 7 tarsals (talus, calcaneus, navicular, cuboid, 3 cuneiforms), 5 metatarsals (I-V), phalanges. Mark Chopart's line and Lisfranc's line.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; A) Bones of the Foot</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Tarsals (7)</span></strong><br>&#8226; <strong>Talus</strong> (upper)<br>&#8226; <strong>Calcaneus</strong> (heel — largest tarsal)<br>&#8226; <strong>Navicular</strong><br>&#8226; <strong>Cuboid</strong><br>&#8226; 3 <strong>Cuneiforms</strong> (medial, intermediate, lateral)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Metatarsals (5)</span></strong><br>Numbered I &rarr; V (medial to lateral)<br>I = big toe side</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Phalanges (14)</span></strong><br>Hallux = <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">2 phalanges</span> (proximal + distal)<br>Other toes = <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">3 phalanges</span> each</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128285; B) Joints of the Foot</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Intertarsal joints</strong> — amphiarthrosis; slight gliding between tarsal bones. Calcaneocuboid, cuneonavicular, cuneocuboid, cuboideonavicular, intercuneiform.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Tarsometatarsal joints</strong> — between tarsals and metatarsals. Dorsal + plantar tarsometatarsal + cuneometatarsal ligaments.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Intermetatarsal joints</strong> — between metatarsal bases. Dorsal + interosseous + plantar ligaments.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Metatarsophalangeal (MTP)</strong> — ball and socket. Deep transverse metatarsal + collateral ligaments.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Interphalangeal (PIP + DIP)</strong> — hinge. Plantar plate ligaments + collateral ligaments.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128277; C) Surgical Amputation Lines</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>Chopart's Joint Line</strong><br>Between <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">talus + calcaneus</span> and <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">cuboid + navicular.</span> Used for forefoot + midfoot amputation. <span style="color:#dc2626">Bifurcate ligament must be divided.</span></div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>Lisfranc's Joint Line</strong><br>Between tarsals and metatarsals. Used for forefoot amputation. <span style="color:#dc2626">Line is NOT straight</span> — <span style="color:#dc2626">2nd metatarsal invades proximally</span> between cuneiforms.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128200; D) X-Ray Reading Tips</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Systematic approach:</strong><br>1. Count <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">7 tarsals</span>: talus + calcaneus posteriorly, navicular + cuboid middle, 3 cuneiforms anteriorly<br>2. Count <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">5 metatarsals</span> I–V from medial to lateral<br>3. Phalanges: hallux = 2, others = 3<br>4. Trace Chopart's line and Lisfranc's line</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>Common fractures:</strong><br>&#8226; <span style="color:#dc2626"><strong>5th metatarsal base</strong> (Jones fracture)</span> — tip avulsion or proximal shaft<br>&#8226; <span style="color:#dc2626"><strong>Calcaneus</strong> (Lover's fracture)</span> — fall onto heel<br>&#8226; <span style="color:#dc2626"><strong>Talus</strong></span> — high-energy; risk of <span style="color:#dc2626"><strong>avascular necrosis</strong></span> (like scaphoid in hand)<br>&#8226; Check MTP joints for <span style="color:#dc2626">arthritis (first-MTP gout)</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129337; E) Plantar Arches and Their Support</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>3 plantar arches</strong> act as a spring — distributing weight, absorbing shock, propelling forward.</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">1. Transverse Arch</span></strong><br>Across metatarsophalangeal line.<br>Reinforced by:<br>&#8226; <strong>Deep transverse metatarsal lig.</strong><br>&#8226; <strong>"Stirrup of the foot":</strong> tibialis anterior tendon + fibularis longus tendon</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">2. Medial Longitudinal Arch</span></strong><br>Calcaneus &rarr; talus &rarr; navicular &rarr; cuneiforms &rarr; metatarsals 1–2.<br>Reinforced by:<br>&#8226; <strong>Long plantar ligament</strong><br>&#8226; Abductor hallucis + Flexor hallucis + central muscles</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">3. Lateral Longitudinal Arch</span></strong><br>Calcaneus &rarr; talus &rarr; cuboid &rarr; metatarsals 2–5.<br>Reinforced by:<br>&#8226; <strong>Long plantar ligament</strong><br>&#8226; Abductor digiti minimi + Flexor digiti minimi + lateral central muscles</div>
</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Flat foot (pes planus)</strong></span> = loss of arches. <span style="color:#dc2626"><strong>High-arched foot (pes cavus)</strong></span> = exaggerated medial longitudinal arch.</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Medial view of foot showing 3 arches — transverse (across heads of metatarsals), medial longitudinal (calcaneus to MT1-2), lateral longitudinal (calcaneus to MT2-5). Show reinforcing ligaments and muscle tendons.</p></div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Foot: 7 tarsals + 5 metatarsals + 14 phalanges = 26 bones.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Chopart's line: talus+calcaneus / cuboid+navicular — forefoot+midfoot amputation.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Lisfranc's line: tarsals/metatarsals — forefoot amputation. NOT straight (2nd MT invades).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">3 arches: transverse, medial longitudinal, lateral longitudinal.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Long plantar ligament reinforces both longitudinal arches.</span></li>
<li><span style="color:#dc2626">Jones fracture = 5th metatarsal base. Lover's fracture = calcaneus. AVN risk: talus.</span></li>
</ul>
</div>
</div>`},

function el(tag, attrs={}, ...children){
    const e = document.createElement(tag);
    for(const k in attrs){
        if(k==="class") e.className = attrs[k];
        else if(k==="html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
    }
    for(const c of children){
        if(c==null) continue;
        if(typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
    }
    return e;
}

/* ── Directional term colorizer ── */
function colorizeBlocks(){
    const app = document.getElementById('app');
    if(!app) return;

    const SKIP = new Set(['SCRIPT','STYLE','INPUT','TEXTAREA','CODE','BUTTON','A']);
    const DIR_RE = /\b(superior(?:ly)?|inferior(?:ly)?|lateral(?:ly)?|medial(?:ly)?|anterior(?:ly)?|posterior(?:ly)?|roof|floor|deep(?:ly)?|superficial(?:ly)?|proximal(?:ly)?|distal(?:ly)?|cranial(?:ly)?|caudal(?:ly)?)\b/gi;
    const VERT_RE = /\b([CTLS][1-9][0-2]?(?:[–\-][1-9][0-2]?)?)\b/g;
    const CN_RE   = /\b(CN\s?(?:I{1,3}|IV|VI{0,3}|IX|X{1,2}I{0,2}))\b/g;

    const dirClass = t => ({
        superior:'dir-sup', inferior:'dir-inf', lateral:'dir-lat', medial:'dir-med',
        anterior:'dir-ant', posterior:'dir-pos', roof:'dir-roof', floor:'dir-floor',
        deep:'dir-deep', superficial:'dir-sf', proximal:'dir-prox', distal:'dir-dist',
        cranial:'dir-cran', caudal:'dir-caud',
    })[t.toLowerCase().replace(/ly$/,'')] || 'dir-sup';

    function wrapMatches(text, re, makeSpan){
        re.lastIndex = 0;
        if(!re.test(text)){ re.lastIndex=0; return null; }
        re.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last=0, m;
        while((m=re.exec(text))!==null){
            if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
            frag.appendChild(makeSpan(m[0], m[1]||m[0]));
            last=m.index+m[0].length;
        }
        if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        return frag;
    }

    function walk(root, re, makeSpan){
        const tw = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(n){
                let p=n.parentElement;
                while(p&&p!==root){
                    if(SKIP.has(p.tagName)) return NodeFilter.FILTER_REJECT;
                    if(p.dataset&&p.dataset.nc) return NodeFilter.FILTER_REJECT; // already colored
                    p=p.parentElement;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes=[];
        while(tw.nextNode()) nodes.push(tw.currentNode);
        for(const node of nodes){
            const frag=wrapMatches(node.textContent, re, makeSpan);
            if(frag) node.parentNode.replaceChild(frag, node);
        }
    }

    // Pass 1 — directional terms
    walk(app, DIR_RE, (full, term)=>{
        const s=document.createElement('span');
        s.className=dirClass(term); s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 2 — vertebral levels (bold + sky highlight)
    walk(app, VERT_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-vert'; s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 3 — cranial nerve refs
    walk(app, CN_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-cn'; s.dataset.nc='1'; s.textContent=full; return s;
    });

    // Pass 4 — bold label before first ":" in every list item
    // Must run AFTER passes 1-3 (which may have split text nodes)
    document.querySelectorAll('#app li').forEach(li=>{
        // Skip SCALP-style mnemonic items that start with <b>Letter</b>
        const fc = li.firstChild;
        if(fc && fc.nodeType===Node.ELEMENT_NODE && fc.tagName==='B') return;

        // Find the first non-empty text node in the <li>
        let tNode=null;
        for(const ch of li.childNodes){
            if(ch.nodeType===Node.TEXT_NODE && ch.textContent.trim()){
                tNode=ch; break;
            }
        }
        if(!tNode) return;

        // Match "Label(s): " at the start — label may include parens but not → or newline
        const m = tNode.textContent.match(/^([A-Za-z][^:→\n]{0,70}?):\s/);
        if(!m) return;

        const label = m[1];
        const rest  = tNode.textContent.slice(label.length); // keeps ":" and everything after
        const strong = document.createElement('strong');
        strong.className = 'li-label';
        strong.textContent = label;
        const restNode = document.createTextNode(rest);
        li.insertBefore(strong, tNode);
        li.insertBefore(restNode, tNode);
        li.removeChild(tNode);
    });
}

function renderBlocks(blocks){
    let html = "";
    for(const b of blocks){
        if(b.h){
            if(b.p || b.list){
                html += `<h3>${b.h}</h3>`;
                if(b.p) html += `<p>${b.p}</p>`;
                if(b.list){
                    html += "<ul>";
                    for(const li of b.list) html += `<li>${li}</li>`;
                    html += "</ul>";
                }
            } else {
                html += `<h3>${b.h}</h3>`;
            }
        } else {
            if(b.p) html += `<p>${b.p}</p>`;
            if(b.list){
                html += "<ul>";
                for(const li of b.list) html += `<li>${li}</li>`;
                html += "</ul>";
            }
            if(b.div) html += `<div class="${b.div}">${b.text}</div>`;
            // img blocks silently ignored — pictures removed
        }
    }
    return html;
}

function renderTermList(){
    const q = (document.getElementById("termq")?.value||"").toLowerCase();
    const cat = document.getElementById("termcat")?.value||"";
    const filtered = TERMS.filter(t=>{
        const s = (t.name+" "+t.borders+" "+t.definition+" "+t.category).toLowerCase();
        return (!q || s.includes(q)) && (!cat || t.category===cat);
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const list = document.getElementById("termlist");
    if(!list) return;
    if(!filtered.length){
        list.innerHTML = `<div class="no-results">No terms match your search.</div>`;

        <div class="topic-list">
            ${ch.topics.map(t=>`
            <a class="topic-item" href="#/chapter/${ch.id}/q/${t.q}" style="--cc:${ch.color}">
                <span class="topic-num">Q${t.q}</span>
                <span class="topic-text">${t.text}</span>
                <span class="topic-arrow">›</span>
            </a>`).join('')}
        </div>
    </div>
    <div style="margin-top:24px">
        <a class="btn ghost" href="${region?'#/questions/'+region.id:'#/questions'}">← Back to ${region?region.name:'All Chapters'}</a>
    </div>
    `;
}

/* -------- Individual topic / question detail page -------- */
function viewTopic(chId, qNum){
    const ch=CHAPTERS.find(c=>c.id===chId);
    if(!ch) return '<p>Chapter not found.</p>';
    const q=parseInt(qNum);
    const topic=ch.topics.find(t=>t.q===q);
    if(!topic) return '<p>Topic not found.</p>';
    const region=BODY_REGIONS.find(r=>r.chapters.includes(chId));
    const idx=ch.topics.indexOf(topic);
    const prev=ch.topics[idx-1];
    const next=ch.topics[idx+1];
    return `
    <div class="crumbs">
        <a href="#/questions">Final Question Portal</a>
        ${region?` &rsaquo; <a href="#/questions/${region.id}">${region.name}</a>`:''}
        &rsaquo; <a href="#/chapter/${chId}">Chapter ${ch.num}</a>
        &rsaquo; <span>Q${q}</span>
    </div>
    <div class="chapter-detail-header" style="--cc:${ch.color}">
        <div class="chapter-detail-num">Ch.${ch.num} &nbsp;·&nbsp; Q${q} of ${ch.topics.length}</div>
        <h1>${topic.text}</h1>
    </div>
    <div class="topic-content-body">
        ${topic.content||'<p class="muted" style="padding:40px;text-align:center;font-size:16px">Study content coming soon for this topic.</p>'}
    </div>
    <div class="topic-nav-row">
        ${prev?`<a class="btn ghost" href="#/chapter/${chId}/q/${prev.q}">&#8592; Q${prev.q}</a>`:'<span></span>'}
        <a class="btn ghost" href="#/chapter/${chId}" style="color:var(--cc,${ch.color});border-color:var(--cc,${ch.color})">All Topics</a>
        ${next?`<a class="btn ghost" href="#/chapter/${chId}/q/${next.q}">Q${next.q} &#8594;</a>`:'<span></span>'}
    </div>`;
}

/* -------- viewQuestionPortal: alias kept for safety -------- */
function viewQuestionPortal(){ return viewFinalTopics(); }

/* -------- Terminology, Nomenclature & Special Terms -------- */
function viewTerminology(){
    const cats = [...new Set(TERMS.map(t=>t.category))].sort();
    return `
    <h1>Terminology, Nomenclature &amp; Special Terms</h1>
    <p class="muted">All topographic anatomical terms — focused on borders, contents, and clinical landmarks. ${TERMS.length} terms.</p>
    <div class="term-search">
        <input id="termq" placeholder="Search terms (e.g. McBurney, Hesselbach, Douglas, scalp...)" />
        <select id="termcat">
            <option value="">All categories</option>
            ${cats.map(c=>`<option>${c}</option>`).join("")}
        </select>
    </div>
    <div id="termlist" class="term-list"></div>
    `;
}

/* ====================================================================
   ROUTER
   ==================================================================== */
function route(){
    const h = location.hash || "#/welcome";
    const app = document.getElementById("app");
    let html = "";

    if(h==="#/welcome" || h==="#/" || h===""){
        html = viewWelcome();
    } else if(h==="#/terminology" || h==="#/terms"){
        html = viewTerminology();
    } else if(h==="#/topics"){
        html = viewInteractiveTopics();
    } else if(h==="#/questions"){
        html = viewFinalTopics();
    } else if(h.startsWith("#/questions/")){
        html = viewFinalTopics(h.replace("#/questions/",""));
    } else if(h.startsWith("#/chapter/") && h.includes("/q/")){
        const parts=h.replace("#/chapter/","").split("/q/");
        html=viewTopic(parts[0],parts[1]);
    } else if(h.startsWith("#/chapter/")){
        html = viewChapter(h.replace("#/chapter/",""));
    } else {
        html = viewWelcome();
    }
    app.innerHTML = html;
    setActiveNav();
    applyStoredImages();
    colorizeBlocks();

    if(h==="#/terminology" || h==="#/terms"){
        renderTermList();
        document.getElementById("termq").addEventListener("input", renderTermList);
        document.getElementById("termcat").addEventListener("change", renderTermList);
    }

    window.scrollTo({top:0, behavior:"instant"});
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
window.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLightbox(); });

/* ── Hamburger menu ── */
(function(){
    const toggle = document.getElementById('navToggle');
    const menu   = document.getElementById('topnav');
    if(!toggle || !menu) return;
    toggle.addEventListener('click', () => {
        const open = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    menu.addEventListener('click', e => {
        if(e.target.tagName === 'A'){
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });
    document.addEventListener('click', e => {
        if(!e.target.closest('header.site')){
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });
})();

/* ── PWA service worker ── */
if('serviceWorker' in navigator){
    window.addEventListener('load', () =>
        navigator.serviceWorker.register('./sw.js').catch(() => {})
    );
}
</script>
