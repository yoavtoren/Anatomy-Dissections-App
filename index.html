<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: 3 bone cells side-by-side — Osteoblast (forming, with arrows outward), Osteocyte (maintaining, in lacuna), Osteoclast (resorbing, with ruffled border).</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9881; 1) Desmogenic / Intramembranous Ossification</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Builds: all flat bones + clavicles</strong></span> <em style="color:#6d28d9;font-style:italic">frontal, parietal, occipital bones; mandible; clavicles</em></div>
<div style="background:#eff6ff;border-radius:8px;padding:12px;margin-bottom:14px">
<ol style="margin:0 0 0 16px;font-size:13px">
<li><strong>Mesenchymal stem cells aggregate</strong> &rarr; <span style="color:#15803d">differentiate</span> into <strong>osteoblasts</strong></li>
<li>Osteoblasts form an <strong>ossification center</strong>; collagen appears in matrix</li>
<li>Osteoblasts <span style="color:#15803d">secrete</span> <strong>osteoid</strong> into center — still <u>unmineralized</u></li>
<li>Osteoblasts &rarr; <strong>osteocytes</strong> (maintain matrix)</li>
<li>Osteoid is <span style="color:#15803d">calcified</span> and hardened — <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">within a few days</span></li>
<li><strong>Woven bone</strong> forms; <strong>periosteum</strong> forms (outer <u>fibrous layer</u> + inner <u>cambium/osteogenic layer</u>)</li>
<li>Woven bone &rarr; <strong>lamellar bone</strong> (compact + spongy); spongy stays for <strong>hematopoiesis</strong></li>
</ol>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Intramembranous ossification — mesenchyme clustering &rarr; ossification center &rarr; osteoid secreted &rarr; woven bone with osteocytes &rarr; periosteum forming outside.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9881; 2) Chondrogenic / Endochondral Ossification</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Builds: all bones below the skull, EXCEPT clavicles</strong></span> — starts at <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>8th embryonic week</strong></span></div>
<p style="margin:6px 0 4px"><strong style="color:#1d4ed8">Phase 1:</strong></p>
<div style="background:#f0fdf4;border-radius:8px;padding:12px;margin-bottom:10px">
<ol style="margin:0 0 0 16px;font-size:13px">
<li><strong>Mesenchyme</strong> <span style="color:#15803d">differentiates</span> into <strong>hyaline cartilage</strong></li>
<li>Hyaline cartilage forms a "bony shape"</li>
<li><strong>Perichondrium</strong> is vascularized &rarr; mesenchymal cells &rarr; osteoblasts</li>
<li>Osteoblasts form <strong>bone collar</strong> &rarr; <strong>primary ossification center</strong></li>
</ol>
</div>
<p style="margin:6px 0 4px"><strong style="color:#1d4ed8">Phase 2:</strong></p>
<div style="background:#f0fdf4;border-radius:8px;padding:12px;margin-bottom:14px">
<ol start="5" style="margin:0 0 0 16px;font-size:13px">
<li>Bone collar blocks nutrients &rarr; chondrocytes <span style="color:#dc2626"><strong>hypertrophy and die</strong></span></li>
<li><strong>Periosteal bud</strong> (blood vessel canal) breaks through collar with help of osteoclasts</li>
<li>Bud &rarr; osteoblasts form bone matrix from ossification center</li>
<li><strong>Elongation</strong> of compact (outer) and spongy (inner) bone by osteoblasts</li>
<li><strong>Osteoclasts</strong> create <strong>medullary cavities</strong> for bone marrow</li>
</ol>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Primary + secondary ossification centers</strong> separated by the <strong>epiphyseal disk</strong></span> during childhood. Disk disappears at adulthood &rarr; bone growth stops.</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Endochondral ossification — hyaline cartilage model &rarr; bone collar &rarr; periosteal bud penetrating &rarr; primary ossification center &rarr; medullary cavity forming. Show primary (diaphysis) and secondary (epiphysis) ossification centers.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127968; Epiphyseal Growth Plate — 4 Zones</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Bone elongation occurs from infancy until <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>~20 years</strong></span> years old.</span></div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong style="color:#1d4ed8">1. Reserve zone</strong><br>Small chondrocytes. <u>Anchors plate to epiphysis.</u> No growth.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong style="color:#1d4ed8">2. Proliferative zone</strong><br>Larger chondrocytes. <u>Mitotic division.</u> Replaces ossified cells.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong style="color:#1d4ed8">3. Zone of maturation</strong><br>Newly formed chondrocytes <u>mature and increase in size.</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong style="color:#1d4ed8">4. Zone of calcified matrix</strong><br>Matrix calcifies, chondrocytes <span style="color:#dc2626">die</span>. Osteoblasts + vessels penetrate &rarr; bone tissue.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128295; Bone Remodeling</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Remodeling</strong> = continuous process throughout life.</span> <strong>Resorption</strong> by <span style="color:#dc2626"><strong>osteoclasts</strong></span> + <strong>ossification</strong> by <span style="color:#15803d"><strong>osteoblasts</strong></span>. Responds to mechanical load demands.</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px">Dysfunction of remodeling &rarr; <span style="color:#dc2626"><strong>osteoporosis</strong></span> (bone weakness).</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129312; Bone Fracture Healing</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Broken ends aligned &rarr; <strong>fibroblasts in periosteum proliferate</strong> &rarr; secrete collagen &rarr; form <strong>callus collar</strong> &rarr; callus calcifies &rarr; <span style="color:#dc2626">remodeling</span> &rarr; resorbed and replaced by bone. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">After several months, little evidence of fracture remains.</span></div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Intramembranous &rarr; flat bones + clavicles (mesenchyme directly &rarr; bone).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Endochondral &rarr; all other bones; starts at 8th embryonic week.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">4 growth plate zones: Reserve / Proliferative / Maturation / Calcified matrix.</span></li>
<li><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">Elongation until ~20 years old.</span></li>
<li><span style="color:#dc2626">Remodeling dysfunction &rarr; osteoporosis.</span></li>
</ul>
</div>
</div>`},
    {q:3,  text:'Connection of bones, structure and types of joints', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">3. Connection of Bones — Structure and Types of Joints</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><strong>Joints</strong> are <u>the connections between bones of the skeleton.</u> Main types: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>synarthrosis</strong></span> (immovable — surfaces connected directly by connective tissue) and <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>diarthrosis</strong></span> (movable — articulating surfaces separated by a <strong>joint cavity</strong>).</p>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127988; Classification by Movability</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Synarthrosis</span></strong><br><u>Immovable</u> joint</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Amphiarthrosis</span></strong><br><u>Partially movable</u> joint</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Diarthrosis</span></strong><br><u>Movable</u> joint (synovial)</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129408; 1) Synarthrosis — Immovable</h3>
<p style="margin:0 0 8px;font-size:13px">Classified by connective tissue type:</p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Syndesmosis</span></strong> (fibrous CT)<br><u>Fibrous ligaments/tendons connect bones.</u><br>&#8226; <em style="color:#6d28d9;font-style:italic"><strong>Gomphosis</strong> (dento-alveolar syndesmosis) — teeth in alveolar process</em><br>&#8226; <em style="color:#6d28d9;font-style:italic"><strong>Sutures</strong> — cranium; types: sutura plana (planes), sutura squamosa (overlapping), sutura serrata (saw-like)</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Synchondrosis</span></strong> (hyaline cartilage)<br><u>Hyaline cartilage connects bones.</u><br>&#8226; <em style="color:#6d28d9;font-style:italic">Epiphysis–diaphysis junction (growth plate)</em><br>&#8226; <em style="color:#6d28d9;font-style:italic">Sternum–rib connection</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Synostosis</span></strong> (bone matrix)<br><u>Hardest, most immovable — ossified from another joint during growth.</u><br>&#8226; <em style="color:#6d28d9;font-style:italic">Epiphysis–diaphysis joints in adults</em><br>&#8226; <em style="color:#6d28d9;font-style:italic">Sacrum in vertebral column</em></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127745; 2) Amphiarthrosis — Partially Movable</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Usually a <strong><span style="color:#1d4ed8">Symphysis</span></strong> — made of <u>fibrous cartilage.</u><br>&#8226; <em style="color:#6d28d9;font-style:italic"><strong>Pubic symphysis</strong></em><br>&#8226; <em style="color:#6d28d9;font-style:italic"><strong>Intervertebral discs</strong></em><br>&#8226; <em style="color:#6d28d9;font-style:italic"><strong>Interosseous membranes</strong> (tibia–fibula, ulna–radius)</em></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129417; 3) Diarthrosis — Synovial Joints (Movable)</h3>
<div style="background:#f1f5f9;border-radius:10px;padding:12px;margin-bottom:12px">
<p style="margin:0 0 6px"><strong>Structure of the Articular Capsule — 5 components:</strong></p>
<ol style="margin:0 0 0 16px;font-size:13px">
<li><strong>Articular cartilage</strong> — <u>hyaline cartilage covering articular surfaces</u></li>
<li><strong>Synovial fluid</strong> — <u>lubricates + supplies nutrients</u> to articular cartilage</li>
<li><strong>Fibrous membrane / layer</strong> — <u>dense CT, mechanical support</u>, outer capsule layer</li>
<li><strong>Synovial membrane / layer</strong> — <u>produces synovial fluid</u>, inner layer, vascularized</li>
<li><strong>Articular / joint cavity</strong> — <u>space between bones</u>, filled with synovial fluid</li>
</ol>
</div>
<p style="margin:0 0 6px"><strong>Additional possible features:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Synovial folds</strong> — enlarge surface in contact with fluid; contain <u>synovial villi</u>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Discs and menisci</strong> (fibrocartilage) — compensate for imperfect joint shapes; distribute weight, reduce friction.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Labrum</strong> — elevated margin on articular surface; fibrocartilage.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Bursae</strong> — synovial fluid sacs (mostly no contact with joint cavity); cushion between bones and tendons/muscles.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Fat pads</strong> — fill spaces in the joint cavity; internal streamlining.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Recess</strong> — hollow spaces of articular cavities <em style="color:#6d28d9;font-style:italic">e.g. distal ulna–radius space</em>.</div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligaments</strong> — dense CT, extra- or intracapsular. <u>Support and stabilize joint, limit movement.</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Articular muscle</strong> — prevents capsule from being caught between bones during movement.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127988; Classification of Diarthrosis</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">By articulation</span></strong><br>Simple (2 bones) / Compound (&gt;2 bones) / Complex (cavity divided by disc/meniscus)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">By axes</span></strong><br>Monoaxial (1) / Biaxial (2) / Triaxial (3)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">By shape</span></strong><br>Ball &amp; socket / Plane / Hinge / Pivot / Ellipsoid / Saddle</div>
</div>
<p style="margin:0 0 6px"><strong>Joint shapes at a glance:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Ball and socket</span></strong> — 3 planes, large ROM. <em style="color:#6d28d9;font-style:italic">shoulder joint</em>. Fossa smaller than head.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Plane joint</span></strong> — triaxial sliding, limited. Strong ligaments restrict motion.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Hinge joint</span></strong> — monoaxial, perpendicular axis. Trochlear = cylinder-shaped hinge.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Pivot joint</span></strong> — monoaxial, parallel axis. <em style="color:#6d28d9;font-style:italic">radioulnar joint</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Ellipsoid joint</span></strong> — biaxial (flex/ext + ab/adduction). <em style="color:#6d28d9;font-style:italic">wrist joint</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Saddle joint</span></strong> — biaxial. <em style="color:#6d28d9;font-style:italic">thumb CMC joint</em></div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128284; Joint Positions &amp; Limits of Movement</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Basic position</strong> = anatomical position. <strong>Natural position</strong> = most relaxed capsule (relief position).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Movement limited by: <strong>shape of fossa/head</strong>, <strong>ligaments</strong>, <strong>bony projections</strong>, <strong>soft tissue bulk</strong> (muscle, fat).</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Synarthrosis: syndesmosis (fibrous) / synchondrosis (hyaline cartilage) / synostosis (bone).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Amphiarthrosis = symphysis (fibrocartilage).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Diarthrosis (synovial) has: articular cartilage, synovial fluid, fibrous + synovial membrane, joint cavity.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Synovial joint shapes: ball+socket / plane / hinge / pivot / ellipsoid / saddle.</span></li>
</ul>
</div>
</div>`},
    {q:4,  text:'The osseous nasal cavity, relations to neighboring structures', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">4. The Osseous Nasal Cavity — Relations to Neighboring Structures</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><strong>Nasal cavity</strong> = <u>the space inside the nose.</u> Lies above the <strong>roof of the mouth</strong>; curves down posteriorly to the throat. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Separated into <strong>right and left</strong> halves by the <strong>nasal septum</strong>.</span> Each side has a <strong>lateral wall</strong> and a <strong>medial wall</strong>.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Sagittal section showing nasal cavity — roof, floor, conchae (superior, middle, inferior), 3 meatuses below, throat continuation posteriorly. MOST IMPORTANT SCHEME of this topic.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129521; Boundaries of the Nasal Cavity</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">ROOF</span></strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Frontal &amp; nasal bones</strong> (anterior superior)</span><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Cribriform plate of ethmoid</strong> (middle superior)</span><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Body of sphenoid</strong> (posterior superior)</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">FLOOR</span></strong><br><strong>Hard palate</strong> = <u>palatine process of maxilla</u> + <u>horizontal plate of palatine bone</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">LATERAL WALL</span></strong><br>&#8226; Superior, middle, inferior <strong>nasal conchae</strong> <em style="color:#6d28d9;font-style:italic">sup + mid = ethmoid; inferior = separate bone joined to maxilla</em><br>&#8226; Nasal surface of <strong>maxilla</strong><br>&#8226; Labyrinth of <strong>ethmoid</strong><br>&#8226; <strong>Lacrimal bone</strong><br>&#8226; <strong>Medial pterygoid plate</strong> of sphenoid</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">MEDIAL WALL (nasal septum)</span></strong><br>&#8226; <strong>Perpendicular plate of ethmoid</strong><br>&#8226; <strong>Vomer</strong><br>&#8226; <strong>Septal cartilages</strong></div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Coronal section showing the 3 conchae, 3 meatuses beneath them, and the septum in the midline.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127947; Three Regions Inside Each Cavity</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">1. Nasal vestibule</span></strong><br>Internal to nostrils. Lined by <span style="color:#15803d"><strong>skin</strong></span>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">2. Respiratory region</span></strong><br>Rich <span style="color:#dc2626">neurovascular supply</span>. Lined by <span style="color:#15803d"><strong>respiratory epithelium</strong></span> (<span style="color:#15803d">ciliated + mucous cells</span>).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">3. Olfactory region</span></strong><br>At <u>apex of each cavity</u>. Lined by <span style="color:#15803d"><strong>olfactory epithelium</strong></span> with <span style="color:#15803d">olfaction receptors</span> + <span style="color:#15803d">Bowman's glands</span>.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128171; Paranasal Sinuses (Neighboring Air Spaces)</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Air-containing, mucosa-lined sinuses surrounding the nasal cavities:</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Frontal sinuses</span></strong> — superior anterior</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Ethmoid sinuses</span></strong> — superior</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Paired maxillary sinuses</span></strong> — lateral</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Sphenoid sinuses</span></strong> — posterior</div>
</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">All sinuses drain into the lateral wall via ostia</span> — <strong>EXCEPT the sphenoid</strong>, which drains into the <strong>spheno-ethmoidal recess</strong> (posterior roof).</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128272; Meatuses (spaces beneath each concha)</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:8px;border:1px solid #e2e8f0;text-align:left">Meatus</th><th style="padding:8px;border:1px solid #e2e8f0;text-align:left">Location</th><th style="padding:8px;border:1px solid #e2e8f0;text-align:left">Drains</th></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong>Superior meatus</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Between roof and middle concha</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Sphenoidal sinus</strong>, posterior ethmoidal sinus</td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><strong>Middle meatus</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Between middle and inferior conchae</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Anterior + middle ethmoidal cells</strong>, frontal sinus, maxillary sinus</td></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong>Inferior meatus</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Between inferior concha and floor</td><td style="padding:8px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Nasolacrimal duct</strong></span> <span style="color:#dc2626">— why crying makes your nose run!</span></td></tr>
</table>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Roof: frontal+nasal &rarr; cribriform plate (ethmoid) &rarr; body of sphenoid.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Floor: palatine process of maxilla + horizontal plate of palatine.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Septum: perpendicular plate of ethmoid + vomer + septal cartilages.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">All sinuses drain into lateral wall EXCEPT sphenoid (spheno-ethmoidal recess).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Inferior meatus &rarr; nasolacrimal duct (crying = runny nose).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">3 regions: vestibule (skin) / respiratory (ciliated+mucous) / olfactory (apex).</span></li>
</ul>
</div>
</div>`},
    {q:5,  text:'Bony orbit — walls, relation to neighboring structures, passages', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">5. Bony Orbit — Walls, Relations &amp; Passages</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The orbit is the <u>bony cavity that holds the eye.</u> Shaped like an <strong>irregular four-sided pyramid</strong>. Base = <strong>orbital opening</strong> (front). Apex = <strong>optic canal</strong> (back). <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Orbit axis directed <strong>posteriorly and medially.</strong></span> Medial walls of two orbits are <strong>parallel</strong>. Medial and lateral walls of one orbit form <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>45°</strong></span>.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of empty orbit showing pyramid shape, 7 contributing bones, the 4 walls, and the 4 passages (optic canal, superior orbital fissure, inferior orbital fissure, ethmoidal foramen). MAIN SCHEME.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129506; 7 Bones Forming the Orbit</h3>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Maxilla</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Zygomatic</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Frontal</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Ethmoid</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Lacrimal</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Sphenoid</span></strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Palatine</span></strong></div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Memory: M-Z-F-E-L-S-P</strong> ("My Zebra Finds Eerie Leafy Spots Painting")</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129521; Walls of the Orbit</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">ROOF</span></strong><br>&#8226; <strong>Orbital part of the frontal bone</strong><br>&#8226; <strong>Sphenoid bone</strong> (lesser wing)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">MEDIAL WALL</span></strong><br>&#8226; <strong>Maxilla</strong><br>&#8226; <strong>Lacrimal bone</strong><br>&#8226; <strong>Ethmoid bone</strong><br>&#8226; <strong>Sphenoid bone</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">LATERAL WALL</span></strong><br>&#8226; <strong>Zygomatic bone</strong><br>&#8226; <strong>Greater wing of sphenoid</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">FLOOR</span></strong><br>&#8226; <strong>Orbital surface of maxilla</strong><br>&#8226; <strong>Zygomatic bone</strong> (small part)<br>&#8226; <strong>Palatine bone</strong> (small part)</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128064; Neighboring Structures</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Periorbita</strong> = the <u>periosteum lining the orbit bones.</u> Sends extensions into eyelids = <strong>orbital septa</strong>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Annulus of Zinn</strong> (annular tendon / common tendinous ring) = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><u>ring of fibrous tissue surrounding the optic nerve at the apex.</u></span> It is the <strong>common origin of the four rectus muscles.</strong></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128065; Eyelids</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Anterior structures that protect the eyeball. Space between them when open = <strong>palpebral fissure.</strong></div>
<p style="margin:4px 0 6px"><strong>Layers of the eyelid (anterior &rarr; posterior):</strong></p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Skin</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Subcutaneous tissue</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Orbicularis oculi</strong> (voluntary muscle)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Orbital septum</strong> — attaches to <u>levator palpebrae superioris</u> (upper) and <u>tarsus</u> (lower)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Tarsus</strong> — dense CT plates. Medial &rarr; <u>anterior lacrimal crest of maxilla</u> (medial palpebral ligament). Lateral &rarr; <u>orbital tubercle of zygomatic</u> (lateral palpebral ligament).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Conjunctiva</strong> — thin membrane covering posterior eyelid. Reflects onto <u>sclera</u>. <span style="color:#15803d">Produces mucus + tears</span>, <span style="color:#dc2626">immune surveillance</span>, prevents microbes.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128281; Passages of the Orbit</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:8px;border:1px solid #e2e8f0">Passage</th><th style="padding:8px;border:1px solid #e2e8f0">Location</th><th style="padding:8px;border:1px solid #e2e8f0">Opens to</th><th style="padding:8px;border:1px solid #e2e8f0">Contains</th></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong>Optic canal</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Between 2 roots of lesser wing of sphenoid</td><td style="padding:8px;border:1px solid #e2e8f0">Middle cranial fossa</td><td style="padding:8px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>CN II (optic nerve)</strong> + <strong>ophthalmic artery</strong></span></td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><strong>Superior orbital fissure</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Lateral to optic canal (roof-lateral wall junction)</td><td style="padding:8px;border:1px solid #e2e8f0">Middle cranial fossa</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>CN III, IV, VI</strong>; lacrimal/frontal/nasociliary branches of <strong>V1</strong>; superior ophthalmic vein</td></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong>Inferior orbital fissure</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Lateral wall-floor junction</td><td style="padding:8px;border:1px solid #e2e8f0">Pterygopalatine fossa</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Infraorbital nerve</strong>; <strong>V2</strong> (maxillary nerve)</td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><strong>Ethmoidal foramen</strong></td><td style="padding:8px;border:1px solid #e2e8f0">Frontal-ethmoid junction (anterior + posterior)</td><td style="padding:8px;border:1px solid #e2e8f0">Ethmoidal sinuses / anterior cranial fossa / nasal cavity</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Zygomaticotemporal</strong> + <strong>zygomaticofacial</strong> nerves</td></tr>
</table>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">7 bones: Maxilla, Zygomatic, Frontal, Ethmoid, Lacrimal, Sphenoid, Palatine.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Optic canal: CN II + ophthalmic artery.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Superior orbital fissure: CN III, IV, VI + V1 branches + sup. ophthalmic vein.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Inferior orbital fissure: infraorbital n. + V2.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Annulus of Zinn = common origin of 4 rectus muscles.</span></li>
</ul>
</div>
</div>`},
    {q:6,  text:'Skull, skull of neonate and its development; Vertebrae, vertebral column and its development, connections, curvatures and motility', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">6. Skull &amp; Neonate Skull — Vertebral Column: Development, Connections, Curvatures &amp; Motility</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><strong>Two major parts:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Neurocranium</strong></span> (houses brain/CNS) and <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Viscerocranium</strong></span> (forms the face). The vertebral column has <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>33 vertebrae</strong></span> in 5 groups, with distinct curvatures and joint types.</p>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129504; SKULL — Part 1</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Neurocranium</span></strong><br><u>Houses brain and CNS.</u><br>&#8226; <strong>Membranous part</strong> (flat bones surrounding brain like a vault)<br>&#8226; <strong>Cartilaginous part (chondrocranium)</strong> (base of skull)<br>Source: <em style="color:#6d28d9;font-style:italic">neural crest cells</em> + <em style="color:#6d28d9;font-style:italic">paraxial mesoderm</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Viscerocranium</span></strong><br><u>Forms the face.</u><br>&#8226; Composed of <strong>1st and 2nd pharyngeal arches</strong><br>&#8226; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">ALL viscerocranium bones = <strong>intramembranous ossification</strong></span></div>
</div>

<p style="margin:0 0 6px"><strong>Neurocranium ossification:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Intramembranous</span></strong> (direct)<br>Calvaria: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>frontal, parietal, occipital</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Endochondral</span></strong> (indirect)<br>Skull base: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>ethmoid, sphenoid, temporal</strong></span></div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><em style="color:#6d28d9;font-style:italic">Sphenoid, ethmoid, temporal, and frontal bones are <strong>pneumatized</strong> with air cells/sinuses.</em></div>

<p style="margin:0 0 6px"><strong>Cranial sutures (syndesmoses in the newborn):</strong></p>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Sagittal suture</div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Lambdoid suture</div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Coronal suture</div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Squamous suture</div>
</div>

<p style="margin:0 0 6px"><strong>Fontanelles:</strong></p>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Fontanelle</th><th style="padding:7px;border:1px solid #e2e8f0">Shape</th><th style="padding:7px;border:1px solid #e2e8f0">Ossifies</th><th style="padding:7px;border:1px solid #e2e8f0">Forms</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Anterior</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Diamond</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~3 years</span></td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Bregma</strong></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Posterior</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Triangular</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~3 months</span></td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Lambda</strong></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Sphenoid</strong> (paired)</td><td style="padding:7px;border:1px solid #e2e8f0">—</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~6 months</span></td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pterion</strong></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Mastoid</strong> (paired)</td><td style="padding:7px;border:1px solid #e2e8f0">—</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~18 months</span></td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Asterion</strong> <span style="color:#dc2626">(weakest part of skull)</span></td></tr>
</table>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626">Clinical:</span> Sutures allow skull bones to <strong>overlap during delivery</strong> (molding). <span style="color:#dc2626">Anencephaly</span> = no anterior neural pore closure &rarr; no skull vault. <span style="color:#dc2626">Meningocele</span> = partial vault missing &rarr; dura mater protrudes. <span style="color:#dc2626">Meningomyelocele</span> = brain herniates into protrusion.</div>

<p style="margin:0 0 6px"><strong>Viscerocranium bones:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>1st pharyngeal arch:</strong> Dorsal (maxillary process) &rarr; maxilla, zygomatic, part of temporal. Ventral (mandibular process) &rarr; <strong>Meckel's cartilage</strong> (becomes mandible) + <strong>incus + malleus</strong>. <strong>2nd arch</strong> &rarr; <strong>stapes</strong>. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Ossicles are the first bones to ossify.</strong></span></div>

<p style="margin:0 0 6px"><strong>Cranial fossae (base of skull):</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Anterior cranial fossa</span></strong><br>Contains <u>frontal lobes</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Middle cranial fossa</span></strong><br>Separated from posterior by clivus + petrous crest</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Posterior cranial fossa</span></strong><br>Contains <u>brainstem + cerebellum</u>; between foramen magnum and cerebellar tentorium</div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Superior view of skull base — 3 fossae labeled, major foramina marked.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; VERTEBRAL COLUMN — Part 2</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">33 vertebrae</span></strong> total: <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">7 cervical</span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">12 thoracic</span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">5 lumbar</span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">5 sacral (fused)</span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">4 coccygeal (fused)</span>"</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Vertebral body + 2 pedicles + 2 laminae = <strong>vertebral foramen</strong>. All foramina together = <strong>vertebral canal</strong> (contains spinal cord + spinal nerve roots).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Vertebrae connect at <strong>zygapophyseal joints</strong> = <u>synovial plane joints</u> between articular processes. Allows triaxial sliding (limited by strong ligaments).</div>

<p style="margin:0 0 6px"><strong>Vertebra type comparison:</strong></p>
<table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Type</th><th style="padding:7px;border:1px solid #e2e8f0">Body</th><th style="padding:7px;border:1px solid #e2e8f0">Special feature</th><th style="padding:7px;border:1px solid #e2e8f0">Spinous process</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Cervical (C1-C7)</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Small, kidney-shaped</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Transverse foramen</strong> (vertebral a. + v.)</span></td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Bifid</strong> (except C1, C7)</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Thoracic (T1-T12)</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Heart-shaped</td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Transverse costal facet</strong> + 2 demi-costal facets</td><td style="padding:7px;border:1px solid #e2e8f0">Long, points caudally</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Lumbar (L1-L5)</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Tall, wide, kidney-shaped</td><td style="padding:7px;border:1px solid #e2e8f0"><strong>Costal process</strong> (embryological rib remnant)</td><td style="padding:7px;border:1px solid #e2e8f0">Flat, quadrate</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Sacral (S1-S5 fused)</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Fused</td><td style="padding:7px;border:1px solid #e2e8f0">4 pairs anterior + posterior sacral foramina</td><td style="padding:7px;border:1px solid #e2e8f0">S1-S4 fused &rarr; median sacral crest; S5 &rarr; <strong>sacral hiatus</strong></td></tr>
</table>

<p style="margin:0 0 6px"><strong>Curvatures of the vertebral column:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Primary curvatures</span></strong> (kyphotic) — present from birth: <u>thoracic kyphosis</u> + <u>sacral kyphosis</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Secondary curvatures</span></strong> (lordotic) — develop postnatally: <u>cervical lordosis</u> (when lifting head) + <u>lumbar lordosis</u> (when walking)</div>
</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626">Scoliosis</span> = abnormal lateral curvature. <span style="color:#dc2626">Hyperkyphosis</span> = exaggerated thoracic curve. <span style="color:#dc2626">Hyperlordosis</span> = exaggerated lumbar curve.</div>

<p style="margin:0 0 6px"><strong>Connections of the vertebral column:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Intervertebral disc</strong> = fibrocartilaginous symphysis between vertebral bodies (except C1/C2 and sacrum).<br><strong>Nucleus pulposus</strong> (soft core) + <strong>anulus fibrosus</strong> (fibrous ring). <span style="color:#dc2626">Herniation of nucleus pulposus &rarr; disc prolapse.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligaments:</strong> anterior longitudinal ligament (prevents hyperextension) / posterior longitudinal ligament / ligamenta flava / interspinous / supraspinous ligaments.</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Neurocranium: membranous (intramembranous) + chondrocranium (endochondral).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Fontanelles: anterior (3 yrs/bregma), posterior (3 months/lambda), sphenoid (6 months/pterion), mastoid (18 months/asterion — weakest).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">All viscerocranium = intramembranous ossification.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">33 vertebrae: 7C + 12T + 5L + 5S(fused) + 4Co(fused).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Cervical = transverse foramen; Thoracic = costal facets; Lumbar = costal process.</span></li>
</ul>
</div>
</div>`},
    {q:7,  text:'Craniovertebral joint', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">7. Craniovertebral Joint</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The <strong>craniovertebral joints</strong> connect the <u>skull (occipital bone) to the vertebral column (atlas/C1)</u> and the <u>atlas to the axis (C2)</u>. There are <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>3 main joints:</strong></span> atlanto-occipital, median atlanto-axial, and lateral atlanto-axial.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Posterior view of the upper cervical spine showing all 3 joints — atlanto-occipital (C0-C1), median atlanto-axial (dens in the ring of atlas), lateral atlanto-axial (C1-C2 articular processes). Show the cruciate ligament and alar ligaments.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9679; 1) Atlanto-Occipital Joint (paired)</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> Simple, <span style="color:#1d4ed8">synovial</span><br><strong>Shape:</strong> <span style="color:#1d4ed8">Ellipsoid</span> — oval condyle in elongated cavity<br><strong>Articular head:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Occipital condyle</strong></span><br><strong>Articular fossa:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Superior articular facet of atlas</strong></span></div>
</div>
<div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligaments:</strong><br>&#8226; <strong>Anterior atlanto-occipital membrane</strong> (continuation of anterior longitudinal ligament)<br>&#8226; <strong>Posterior atlanto-occipital membrane</strong> (continues with ligamenta flava)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Movements:</strong> <span style="color:#15803d">ante-flexion</span> / <span style="color:#15803d">retro-flexion</span> / slight <span style="color:#15803d">lateral flexion</span><br><em style="color:#6d28d9;font-style:italic"><strong>The 'YES' joint — lets you nod your head.</strong></em></div>
</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9679; 2) Median Atlanto-Axial Joint (unpaired)</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> Simple, <span style="color:#1d4ed8">synovial</span><br><strong>Shape:</strong> <span style="color:#1d4ed8">Pivot</span> — cylinder rotates inside a ring<br><strong>Articular head:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Dens of the axis</strong></span><br><strong>Articular fossa:</strong> Facet for dens on <u>posterior surface of anterior arch of atlas</u></div>
</div>
<div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligaments:</strong><br>&#8226; <strong>Cruciate ligament</strong> (transverse + longitudinal bands)<br>&#8226; <strong>Alar ligament</strong><br>&#8226; <strong>Tectorial membrane</strong> (covers dorsal surface)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Movements:</strong> <span style="color:#15803d"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>30°</strong></span> rotation</span> of atlas around dens each direction<br><em style="color:#6d28d9;font-style:italic"><strong>The 'NO' joint — lets you turn your head.</strong></em></div>
</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9679; 3) Lateral Atlanto-Axial Joint (paired)</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> Simple, <span style="color:#1d4ed8">synovial</span> | <strong>Shape:</strong> <span style="color:#1d4ed8">Plane</span><br><strong>Articular head:</strong> Inferior articular facet of the lateral mass of atlas<br><strong>Articular fossa:</strong> Superior articular facet of the axis</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligaments:</strong> Cruciate ligament (transverse + longitudinal), <strong>alar ligaments</strong>, <strong>apical ligament of dens</strong>, <strong>tectorial membrane</strong><br><strong>Movements:</strong> <span style="color:#15803d">Very limited in all 3 axes; mainly inclination of the atlas.</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128200; Summary Table</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:8px;border:1px solid #e2e8f0">Joint</th><th style="padding:8px;border:1px solid #e2e8f0">Pairing</th><th style="padding:8px;border:1px solid #e2e8f0">Shape</th><th style="padding:8px;border:1px solid #e2e8f0">Main Movement</th></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Atlanto-occipital</strong></span></td><td style="padding:8px;border:1px solid #e2e8f0">Paired</td><td style="padding:8px;border:1px solid #e2e8f0">Ellipsoid</td><td style="padding:8px;border:1px solid #e2e8f0"><em style="color:#6d28d9;font-style:italic">"YES" — nodding (flex/ext)</em></td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Median atlanto-axial</strong></span></td><td style="padding:8px;border:1px solid #e2e8f0">Unpaired</td><td style="padding:8px;border:1px solid #e2e8f0">Pivot</td><td style="padding:8px;border:1px solid #e2e8f0"><em style="color:#6d28d9;font-style:italic">"NO" — <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">30°</span> rotation each side</em></td></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Lateral atlanto-axial</strong></span></td><td style="padding:8px;border:1px solid #e2e8f0">Paired</td><td style="padding:8px;border:1px solid #e2e8f0">Plane</td><td style="padding:8px;border:1px solid #e2e8f0"><em style="color:#6d28d9;font-style:italic">Limited sliding / inclination</em></td></tr>
</table>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">3 craniovertebral joints: atlanto-occipital (paired), median atlanto-axial (unpaired), lateral atlanto-axial (paired).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Atlanto-occipital = ellipsoid = YES joint (nodding).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Median atlanto-axial = pivot = NO joint (rotation, 30° each side).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Key ligament: cruciate ligament of atlas (transverse + longitudinal bands).</span></li>
<li><span style="color:#dc2626">Dens fracture or transverse ligament rupture &rarr; risk of cord compression.</span></li>
</ul>
</div>
</div>`},
    {q:8,  text:'Skeleton of thorax and its development, connections and motility of ribs', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">8. Skeleton of the Thorax — Development, Connections &amp; Motility of Ribs</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The thorax = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>sternum</strong></span> + <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>12 pairs of ribs</strong></span> + <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>thoracic vertebrae</strong></span>. Ribs divided into: <strong>True ribs (1–7)</strong> (connected directly to sternum), <strong>False ribs (8–10)</strong> (connect to cartilage above), <strong>Floating ribs (11–12)</strong> (no sternal attachment).</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of the thorax — sternum (manubrium, body, xiphoid), 12 ribs with their cartilages, sternal angle of Louis at the 2nd rib level. Label true/false/floating ribs.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; Ribs — General Anatomy</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Head</strong> — articulates with <u>vertebral body</u> via costal facets. Has articular facets separated by a crest (except ribs 1, 10, 11, 12).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Neck + Body</strong> separated by the <strong>tubercle</strong>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Angle</strong> — curvature in the <u>dorsal third</u> of the rib.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Costal groove</strong> — inferior margin of dorsal surface; forms <u>superior border of intercostal space</u>. Contains <strong>intercostal nerve + vessels</strong>.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127775; Atypical Ribs</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Rib</th><th style="padding:7px;border:1px solid #e2e8f0">Special Feature</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Rib 1</strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Shorter and wider</span> — one facet only. Superior surface has <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>two grooves for subclavian vessels</strong></span> (artery + vein).</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Rib 2</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Thinner + longer than rib 1. Two facets. Roughened upper surface = origin of <strong>serratus anterior</strong>.</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Rib 10</strong></td><td style="padding:7px;border:1px solid #e2e8f0">One facet only.</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Ribs 11 &amp; 12</strong></td><td style="padding:7px;border:1px solid #e2e8f0">No neck; one facet. Floating ribs.</td></tr>
</table>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; Sternum</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Manubrium</strong> (cranial part)<br>Has <strong>jugular notch</strong> (jugular fossa), <strong>clavicular notch</strong> (for clavicle), <strong>1st costal notch</strong>. Origin of sternohyoid, sternothyroid, SCM.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Sternal angle of Louis</strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><u>Manubrium + body junction</u> = level of <strong>2nd rib</strong>.</span><br>Important clinical landmark.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Body of sternum</strong><br>Has costal notches for ribs <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">2–7</span>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Xiphoid process</strong><br>Variable length/shape. Can be bifurcated.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129520; Development</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Bony ribs:</strong> from <u>sclerotome cells</u> (paraxial mesoderm) growing from costal processes of thoracic vertebrae.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Costal cartilages:</strong> from sclerotome cells migrating into <u>lateral plate mesoderm</u>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Sternum:</strong> develops independently from <u>parietal layer of lateral plate mesoderm</u>. Two sternal bands fuse &rarr; endochondral ossification.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128285; Connections and Motility of Ribs</h3>

<p style="margin:0 0 6px"><strong>1) Costovertebral Joints</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Joints of head of rib</strong> (rib &harr; vertebral body)<br>Head divided into 2 facets by a crest.<br>Ligaments: <strong>radiate ligaments</strong> + <strong>intra-articular ligament</strong>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Costotransverse joint</strong> (rib &harr; transverse process)<br>Tubercle of rib &harr; transverse costal facet.<br><span style="color:#15803d">Movements: sliding</span><br>Ligaments: costotransverse, superior + lateral costotransverse, lumbocostal ligaments.</div>
</div>

<p style="margin:0 0 6px"><strong>2) Sternocostal Joints</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Cartilage of ribs <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">2–7</span> &harr; costal notches on sternum.<br>Ligaments: <strong>radiate sternocostal ligaments</strong> (form <strong>sternal membrane</strong>) + <strong>costoxiphoid ligament</strong>.<br><em style="color:#6d28d9;font-style:italic">Ribs 1, 6, 7: synchondroses.</em></div>

<p style="margin:0 0 6px"><strong>3) Inter-chondral Joints</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Between costal cartilages of ribs <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">6–9</span>.</div>

<p style="margin:0 0 6px"><strong>4) Sternoclavicular Joint</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Ball and socket, complex</strong></span><br>Articular fossa: clavicular notch on manubrium.<br>Articular head: sternal articular surface of clavicle.<br>Ligaments: interclavicular, anterior/posterior sternoclavicular, costoclavicular (with 1st rib).</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128202; Rib Movements</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Ribs move in a <strong>bucket-handle</strong> and <strong>pump-handle</strong> fashion during breathing. The head of the rib rotates in the costovertebral joint. <span style="color:#dc2626">Costal cartilage calcification with age &rarr; reduced breathing capacity.</span></div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Thorax: sternum + 12 pairs of ribs (true 1-7, false 8-10, floating 11-12).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Sternal angle of Louis = manubrium-body junction = level of 2nd rib.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Rib 1: shorter, wider, one facet, 2 subclavian grooves.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Sternoclavicular joint: ball and socket, complex.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Ribs articulate via costovertebral joints (head) + costotransverse joints (tubercle) + sternocostal joints (cartilage).</span></li>
</ul>
</div>
</div>`},
    {q:9,  text:'Temporomandibular joint — structure and motility', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">9. Temporomandibular Joint (TMJ) — Structure &amp; Motility</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">The <strong>TMJ</strong> = joint between the <strong>mandible (lower jaw)</strong> and the <strong>temporal bone of the skull.</strong></span> It allows you to <u>open/close the mouth, chew, and speak.</u> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>The two TMJs (bilateral) are interrelated — they always move together.</strong></span></p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Lateral view of the TMJ — mandibular fossa of temporal bone, head of mandible, articular disc dividing the joint into upper (gliding) and lower (hinge) cavities. Show 3 ligaments: lateral, sphenomandibular, stylomandibular.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; Structure of the TMJ</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Complex</strong></span> — has an <span style="color:#dc2626"><strong>articular disc</strong></span><br><strong>Shape:</strong> <span style="color:#1d4ed8"><strong>Bicondylar</strong></span> — ovoid condyle in elliptical cavity<br><strong>Articular head:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Head of the mandible</strong></span><br><strong>Articular fossa:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Mandibular fossa of the temporal bone</strong></span><br><strong>Capsule:</strong> <span style="color:#1d4ed8">Loose</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Movements allowed:</strong><br><span style="color:#15803d">flexion, extension, adduction, abduction, circumduction</span><br><br><strong>Cartilage type:</strong> <span style="color:#dc2626"><strong>Fibrocartilage</strong>, NOT hyaline</span> — unique among synovial joints.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129311; 3 Ligaments</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>1. Lateral (temporomandibular) ligament</strong><br>Main reinforcement on <u>lateral side</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>2. Sphenomandibular ligament</strong><br>Runs to the <u>lingula of the mandible</u></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>3. Stylomandibular ligament</strong><br>Runs to the <u>angle of the mandible</u></div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129295; Movements of the TMJ</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:8px;border:1px solid #e2e8f0">Movement</th><th style="padding:8px;border:1px solid #e2e8f0">Main Muscles</th></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Protraction</span></strong> (jaw forward)</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Lateral and medial pterygoid</strong></td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Retraction</span></strong> (jaw backward)</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Temporalis</strong> (posterior fibers), masseter (deep), geniohyoid, digastric</td></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Depression</span></strong> (mouth opens)</td><td style="padding:8px;border:1px solid #e2e8f0">Gravity, <strong>digastric</strong>, geniohyoid, mylohyoid</td></tr>
<tr style="background:#f8fafc"><td style="padding:8px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Elevation</span></strong> (mouth closes)</td><td style="padding:8px;border:1px solid #e2e8f0"><strong>Temporalis</strong>, masseter, medial pterygoid</td></tr>
<tr><td style="padding:8px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Lateropulsion</span></strong> <em style="color:#6d28d9;font-style:italic">"like a camel chewing"</em></td><td style="padding:8px;border:1px solid #e2e8f0">Pterygoid muscles (alternating sides)</td></tr>
</table>
