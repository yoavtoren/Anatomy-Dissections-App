joint → infections can spread to the joint.</li></ul><h3>Rotator Cuff (SITS)</h3><p>4 muscles that attach to the greater and lesser tubercles of the humerus; stabilize the shoulder and aid rotation.</p><ul><li><strong>Greater tubercle:</strong> Supraspinatus · Infraspinatus · Teres minor</li><li><strong>Lesser tubercle:</strong> Subscapularis</li><li><strong>Mnemonic:</strong> SITS (Supraspinatus, Infraspinatus, Teres minor, Subscapularis)</li></ul><p><strong>Innervation:</strong> suprascapular + axillary + lateral pectoral nerves. <strong>Blood supply:</strong> anterior + posterior circumflex humeral arteries + suprascapular artery.</p><hr style="border:none;border-top:1px solid #e8ecf3;margin:32px 0"><h3>Part 2 — Elbow Joint</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Compound synovial — 3 bones in 3 simple joints</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Biaxial hinge joint</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Components</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Humeroradial (ball & socket) + humero-ulnar (hinge) + proximal radioulnar (pivot)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sacciform recess</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pouch within the capsule over the neck of the radius</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ligaments</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ulnar collateral (medial; triangular; ant. + post. parts) · Radial collateral (lateral) · Annular ligament of radius (attaches to ulna; encircles radial head)</td></tr></tbody></table><h3>Movements of the Elbow</h3><ul><li><strong>Flexion:</strong> 0–145° | <strong>Extension:</strong> 0–5° (hyperextension up to 10° physiological in females)</li><li><strong>Pronation:</strong> 0–90° — radius crosses over ulna; palm faces dorsally</li><li><strong>Supination:</strong> 0–90° — radius + ulna parallel; palm faces ventrally</li></ul><h3>Distal Radio-Ulnar Joint</h3><p><strong>Type:</strong> Simple · <strong>Shape:</strong> Pivot. Head of ulna ↔ ulnar notch of radius. Combined with the proximal radioulnar joint as a functional unit for pronation and supination.</p><p><strong>Radio-ulnar syndesmosis:</strong> Interosseous membrane of the forearm (fibers run mediodistally: radius → ulna) + oblique cord (fibers run laterodistally: ulna → radius).</p><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Tennis elbow (lateral epicondylitis) = overuse of the extensor common tendon from the lateral epicondyle. Golfer's elbow (medial epicondylitis) = overuse of the flexor common tendon from the medial epicondyle. Both cause pain + inflammation.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Shoulder: ball-and-socket; most mobile + most unstable; SITS rotator cuff provides stability</li><li>Coracohumeral lig. prevents inferior displacement; subtendinous bursa of subscapularis communicates with joint</li><li>Elbow: compound; humeroradial (ball-socket) + humero-ulnar (hinge) + proximal radioulnar (pivot)</li><li>Annular ligament encircles radial head; hyperextension up to 10° physiological in females</li><li>Pronation/supination = proximal + distal radioulnar joints as a functional unit</li></ul></div></div>`},
    {q:12,  text:'Bones and joints of the hand including reading of X-ray images', content:`<div><div><h2>Q12 — Bones & Joints of the Hand</h2><p style="margin-top:4px">Including X-ray image reading</p></div><div style="background:#f1f5f9"><p><strong>Mnemonic — carpal bones:</strong> "She Looks Too Pretty, Try To Catch Her" — Scaphoid · Lunate · Triquetrum · Pisiform · Trapezium · Trapezoid · Capitate · Hamate</p></div><h3>Carpal Bones — 8 in Two Rows</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Row</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Bones (lateral → medial)</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Proximal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Scaphoid · Lunate · Triquetrum · Pisiform</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pisiform = sesamoid bone in flexor carpi ulnaris tendon; articulates with triquetrum</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Distal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Trapezium · Trapezoid · Capitate · Hamate</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hamate has a hook process; Trapezium articulates with MC1 (saddle joint — thumb)</td></tr></tbody></table><h3>Metacarpal Bones — 5</h3><p>MC1–MC5. <strong>MC1 (thumb)</strong> is the shortest and most robust. Each metacarpal has a base (proximal), shaft, and head (distal). The heads form the knuckles.</p><h3>Phalanges — 14</h3><ul><li><strong>Thumb (digit 1):</strong> 2 phalanges — proximal + distal</li><li><strong>Digits 2–5:</strong> 3 phalanges each — proximal + middle + distal</li></ul><h3>Joints of the Hand</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Joint</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type / Shape</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Articulation</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Movements</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Radiocarpal (wrist)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ellipsoid, biaxial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Distal radius + articular disc ↔ scaphoid + lunate + triquetrum</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension, abduction/adduction, circumduction</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Midcarpal joint</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Irregular compound</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Proximal + distal carpal rows</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Gliding; contributes to wrist ROM</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">1st CMC (thumb)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Saddle, biaxial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Trapezium ↔ MC1</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension, abduction/adduction, opposition</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">CMC 2nd–4th</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane synovial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Distal carpals ↔ MC bases</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Minimal gliding movement</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">MCP joints</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Condyloid/ellipsoid</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">MC head ↔ proximal phalanx base</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension, abduction/adduction</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">IP joints</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hinge, monoaxial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Phalangeal head ↔ phalanx base</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension only</td></tr></tbody></table><h3>X-Ray Reading</h3><ul><li><strong>PA view — identify:</strong> 5 metacarpals, 8 carpal bones (2 rows), 14 phalanges, joint spaces between carpals, sesamoid bones near 1st MCP.</li><li><strong>Scaphoid fracture</strong> — most common carpal fracture; blood supply enters distally → proximal pole at risk of avascular necrosis if untreated. Often missed on initial X-ray.</li><li><strong>Colles fracture</strong> — distal radius fracture; silver-fork deformity.</li><li><strong>Boxer's fracture</strong> — neck of MC5 from direct impact.</li></ul><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>8 carpals: Scaphoid · Lunate · Triquetrum · Pisiform + Trapezium · Trapezoid · Capitate · Hamate</li><li>Mnemonic: She Looks Too Pretty, Try To Catch Her</li><li>Wrist = radiocarpal = ellipsoid (flexion/extension + abduction/adduction)</li><li>Thumb CMC = saddle joint (trapezium ↔ MC1) → opposition</li><li>MCP joints = ellipsoid (flex/ext + ab/adduction); IP joints = hinge (flex/ext only)</li></ul></div></div>`},
    {q:13,  text:'Bony pelvis as a complex: connections, passages, diameters, planes, sexual differences', content:`<div><div><h2>Q13 — Bony Pelvis as a Complex</h2><p style="margin-top:4px">Connections, passages, diameters, planes, and sexual differences</p></div><p>The <strong>pelvic girdle</strong> = left + right <strong>hip bones</strong> + <strong>sacrum</strong>. The <strong>linea terminalis</strong> divides it into: <strong>greater (false) pelvis</strong> above (contains intestines) and <strong>lesser (true) pelvis</strong> below (contains bladder, internal genitals, rectum).</p><h3>The Hip Bone</h3><p>Three fused bones — <strong>ilium</strong> (upper) + <strong>ischium</strong> (posterior-inferior) + <strong>pubis</strong> (anterior) — which articulate at the <strong>acetabulum</strong>, the fossa of the hip joint. In childhood they are connected by hyaline cartilage; this <strong>ossifies at puberty</strong>.</p><h3>Connections of the Pelvis</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Joint</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Shape</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sacroiliac joint</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple (amphiarthrosis)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular surface of sacrum ↔ ilium. Ligaments: anterior, posterior, interosseous. Overloading → thigh-radiating pain.</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pubic symphysis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fibrocartilaginous</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">—</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Unites two pubic bones at the midline; fibrocartilaginous disc; articular surfaces covered by hyaline cartilage. Ligaments: superior + inferior pubic. Relaxin loosens it during pregnancy.</td></tr></tbody></table><h3>Main Passages</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Passage</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Boundaries</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Contents</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Obturator foramen</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ischium + pubis; almost fully closed by obturator membrane + obturator muscles</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Obturator nerve + vessels (via obturator canal)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Greater sciatic foramen — Suprapiriformis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Greater sciatic notch + sacrospinous + sacrotuberous ligaments; above piriformis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Superior gluteal vessels</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Greater sciatic foramen — Infrapiriformis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Below piriformis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sciatic nerve · posterior cutaneous femoral nerve · inferior gluteal vessels · pudendal nerve · internal pudendal vessels</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lesser sciatic foramen</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lesser sciatic notch + ischial spine + sacrospinous + sacrotuberous ligaments</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Internal pudendal vessels · pudendal nerve · nerve to obturator internus · obturator internus tendon</td></tr></tbody></table><h3>External Pelvic Diameters</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Diameter</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Measurement</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Value</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Interspinous distance</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">ASIS to ASIS</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">26 cm</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Intercristal distance</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Iliac crest to iliac crest</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">29 cm</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Intertrochanteric distance</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Greater trochanter to greater trochanter</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">31 cm</td></tr></tbody></table><div style="background:#f1f5f9"><p>Superior → inferior: <strong>Intercristal (29 cm) → Interspinous (26 cm) → Intertrochanteric (31 cm)</strong></p></div><h3>Pelvic Planes and Diameters</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Plane</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Borders</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Key Diameter</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pelvic inlet</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Promontory → linea terminalis → superior symphysis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse 13 cm (widest); diagonal 11 cm; oblique 12.5 cm</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Amplitudo pelvis (width plane)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Middle sacrum → middle symphysis → acetabulum</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Oblique 13.5 cm (longest)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Angustia pelvis (narrow plane)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior symphysis → apex of sacrum → ischial spines</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Straight 11.5 cm (longest)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pelvic outlet</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior symphysis → coccyx apex → ischial tuberosities</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Straight 9.5–11.5 cm (fetus pushes coccyx → 11.5 cm)</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Obstetric (true) conjugate:</strong> posterior symphysis → promontory = <strong>10 cm</strong> — the <strong>smallest diameter in the entire pelvis</strong>. Diagonal conjugate: inferior symphysis → promontory = 13 cm.</p></div><h3>Sexual Differences in the Pelvis</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Male</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Female</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pelvic inlet shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Heart-shaped (sacral promontory projects)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Oval</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pelvic cavity</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Narrower</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">More spacious</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lesser (true) pelvis</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Deeper</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shallow</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pelvic outlet</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Narrower</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Wider (obturator foramina everted)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pubic arch angle</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">V-shape (narrow subpubic angle)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Wider arch (thumb/finger test)</td></tr></tbody></table><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Pelvic girdle: 2 hip bones (ilium + ischium + pubis, fuse at acetabulum) + sacrum</li><li>Linea terminalis: greater (false) pelvis — intestines; lesser (true) pelvis — bladder/genitals/rectum</li><li>External diameters: Interspinous 26 · Intercristal 29 · Intertrochanteric 31 cm</li><li>Obstetric conjugate = 10 cm (smallest in pelvis); diagonal conjugate = 13 cm</li><li>Female pelvis: oval inlet, wider outlet, shallow lesser pelvis, wide pubic arch</li></ul></div></div>`},
    {q:14,  text:'Hip joint: structure, movements, developmental dysplasia of the hip', content:`<div><div><h2>Q14 — Hip Joint — Structure, Movements & Developmental Dysplasia</h2><p style="margin-top:4px">The most stable joint: acetabulum + femoral head</p></div><p>The <strong>hip joint</strong> = articulation between the <strong>head of the femur</strong> and the <strong>acetabulum</strong> of the hip bone. It is a <strong>ball-and-socket joint</strong> — more stable than the shoulder due to the deeper acetabulum and stronger ligaments.</p><h3>Structure</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ball and socket (triaxial; multiaxial)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Head of femur (2/3 of a sphere)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Acetabulum of the hip bone (deepened by acetabular labrum)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Capsule</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Very strong; attaches to acetabular labrum + neck of femur (anteriorly: intertrochanteric line; posteriorly: medial to intertrochanteric crest)</td></tr></tbody></table><h3>Ligaments</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ligament</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Course</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Function</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Iliofemoral (Y-ligament of Bigelow)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">AIIS → intertrochanteric line (inverted Y shape)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Strongest ligament in the body; prevents hyperextension + lateral rotation in extension</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pubofemoral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Pubic ramus → intertrochanteric fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents excessive abduction + lateral rotation</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ischiofemoral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ischium → greater trochanter (spirals posteriorly)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents medial rotation; tightens in extension</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ligamentum capitis femoris (teres)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Acetabular fossa → fovea capitis (inside joint)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Contains artery to femoral head in children</td></tr></tbody></table><p><strong>Acetabular labrum</strong> — fibrocartilaginous ring deepening the acetabulum; increases contact area. <strong>Acetabular fossa</strong> — non-articular area; contains fat pad + ligamentum capitis.</p><p><strong>Innervation:</strong> femoral + obturator + superior gluteal + nerve to quadratus femoris. <strong>Blood supply:</strong> medial + lateral circumflex femoral arteries + obturator artery (ligamentum capitis in children).</p><h3>Range of Motion</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Movement</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Range</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–120° (knee flexed); 0–90° (knee extended)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Limited by hamstrings with knee extended</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Extension</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–20°</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Limited by iliofemoral ligament</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Abduction</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–50°</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Limited by adductors + pubofemoral lig.</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Internal rotation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–40°</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Limited by ischiofemoral lig.</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">External rotation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–60°</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Limited by iliofemoral lig.</td></tr></tbody></table><h3>Developmental Dysplasia of the Hip (DDH)</h3><p><strong>DDH</strong> = abnormal development of the hip joint, ranging from shallow acetabulum (dysplasia) to complete dislocation. Incidence ~1–2/1000 births. More common in females, first-born, breech presentation.</p><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Grade</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dysplasia</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shallow acetabulum (acetabular index > 30°); no dislocation</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Subluxation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Femoral head partially displaced from acetabulum</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dislocation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Femoral head completely outside acetabulum</td></tr></tbody></table><ul><li><strong>Risk factors:</strong> female sex, first-born, breech, family history, oligohydramnios</li><li><strong>Clinical signs:</strong> Ortolani test (relocation click), Barlow test (dislocation click), limited abduction, asymmetric skin folds, Trendelenburg gait (later)</li><li><strong>Treatment &lt;6 months:</strong> Pavlik harness (holds hip in flexion + abduction). Later: closed/open reduction, spica cast, or osteotomy.</li></ul><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Hip = ball-and-socket; head of femur + acetabulum; more stable than shoulder</li><li>Iliofemoral (Y-ligament of Bigelow) = strongest ligament in the body; prevents hyperextension</li><li>Ligamentum capitis teres contains the artery to the femoral head in children</li><li>DDH: female > male; breech + first-born risk; Ortolani + Barlow tests; Pavlik harness < 6 months</li></ul></div></div>`},
    {q:15,  text:'Knee joint: structure, biomechanics, movements', content:`<div><div><h2>Q15 — Knee Joint — Structure, Biomechanics & Movements</h2><p style="margin-top:4px">The most complex synovial joint: femur, tibia, patella, two menisci</p></div><p>The <strong>knee joint</strong> is the most complicated synovial joint in the body. It is a <strong>complex joint</strong> (menisci divide the cavity) + <strong>compound joint</strong> (3 bones) + <strong>bicondylar joint</strong>. The fibula does not directly participate in the knee joint.</p><h3>Components</h3><ul><li><strong>Femorotibial joint</strong> — two femoral condyles ↔ two tibial condyles; main load-bearing joint.</li><li><strong>Patellofemoral joint</strong> — posterior surface of patella ↔ trochlear groove of femur.</li></ul><h3>Menisci</h3><ul><li><strong>Medial meniscus</strong> — C-shaped (semicircular); larger; attached to the tibial collateral ligament and the capsule → <em>less mobile</em> → more prone to injury.</li><li><strong>Lateral meniscus</strong> — more circular (O-shaped); smaller; less firmly attached → <em>more mobile</em> → less prone to injury.</li><li><strong>Functions of menisci:</strong> increase congruity of articular surfaces; distribute weight (shock absorbers); reduce friction; enhance stability.</li></ul><h3>Ligaments</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Ligament</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Course</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Function</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Anterior cruciate (ACL)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tibial intercondylar area (anterior) → lateral femoral condyle (posterior)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents anterior tibial displacement on femur; tightens in extension + internal rotation</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Posterior cruciate (PCL)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tibial intercondylar area (posterior) → medial femoral condyle (anterior)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Prevents posterior tibial displacement; tightens in flexion; strongest knee ligament</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tibial (medial) collateral lig.</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial femoral epicondyle → medial tibial condyle</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Resists valgus stress; attached to medial meniscus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Fibular (lateral) collateral lig.</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral femoral epicondyle → head of fibula</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Resists varus stress; NOT attached to lateral meniscus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Patellar ligament</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Apex of patella → tibial tuberosity</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transmits quadriceps force</td></tr></tbody></table><h3>Movements and Biomechanics</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Movement</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Range</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–135° (active); 0–160° (passive)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">—</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Extension</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0° with slight hyperextension</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">—</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Internal rotation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–10° (only when flexed)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Knee must be in flexion</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">External rotation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">0–30° (only when flexed)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Knee must be in flexion</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Screw-home mechanism:</strong> During the last 15–20° of knee extension, the femur medially rotates (or the tibia externally rotates) → locks the knee in full extension. Unlocked by the <strong>popliteus muscle</strong> (lateral rotation of femur).</p></div><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Unhappy Triad (O'Donoghue): ACL + medial meniscus + tibial collateral ligament — injured together from a valgus + external rotation force. The medial meniscus is attached to the tibial collateral ligament → torn together. Common in contact sports.</p></div><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Knee = complex (menisci divide) + compound (3 bones) + bicondylar; fibula indirect</li><li>Medial meniscus (C-shape) = less mobile, more injury-prone; lateral meniscus (O-shape) = more mobile</li><li>ACL prevents anterior tibial displacement; PCL prevents posterior; both cross inside</li><li>Tibial collateral lig. attached to medial meniscus → unhappy triad (ACL + MCL + medial meniscus)</li><li>Screw-home mechanism: last 15-20° extension = femur medial rotation → locks knee; popliteus unlocks</li></ul></div></div>`},
    {q:16,  text:'Talocrural and subtalar joints: structure and movements', content:`<div><div><h2>Q16 — Talocrural & Subtalar Joints — Structure & Movements</h2><p style="margin-top:4px">The ankle complex: mortise joint + subtalar inversion/eversion</p></div><p>The <strong>talocrural joint</strong> = ankle joint proper (hinge). The <strong>subtalar joint</strong> = talocalcaneal joint (inversion + eversion). Together they form the <strong>ankle complex</strong>.</p><h3>1) Talocrural Joint (Ankle Joint Proper)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Simple synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hinge (trochlear) — monoaxial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular head</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Trochlea of the talus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articular fossa</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ankle mortise: inferior surface of tibia + medial malleolus + lateral malleolus (fibula)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Movements</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Dorsiflexion (0–20°) and plantarflexion (0–50°) — sagittal plane</td></tr></tbody></table><h3>Ligaments of the Ankle</h3><ul><li><strong>Medial (deltoid) ligament</strong> — fan-shaped; tibia → navicular + calcaneus + talus; strong; resists eversion. 4 parts: tibionavicular · tibiocalcaneal · anterior + posterior tibiotalar.</li><li><strong>Lateral ligaments (3 separate):</strong> Anterior talofibular lig. (ATFL) — weakest, most commonly torn in ankle sprain · Posterior talofibular lig. (PTFL) · Calcaneofibular lig. (CFL)</li></ul><h3>2) Subtalar Joint (Talocalcaneal)</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Feature</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Description</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Type</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Compound synovial</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Shape</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane (2 facets: posterior + anterior-middle)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Articulation</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inferior surface of talus ↔ superior surface of calcaneus</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Key ligament</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Interosseous talocalcaneal ligament (in sinus tarsi)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Movements</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inversion (0–35°) and eversion (0–20°); some rotation</td></tr></tbody></table><div style="background:#f1f5f9"><p><strong>Sinus tarsi</strong> — bony tunnel between the talus and calcaneus, containing the interosseous talocalcaneal ligament and fat pad. Easily palpable laterally.</p></div><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Lateral ankle sprain — the most common joint injury. Inversion + plantarflexion force tears ATFL first, then CFL, then PTFL. The deltoid ligament is rarely torn (eversion sprain requires greater force).</p></div><h3>Talocrural vs Subtalar — Summary</h3><ul><li><strong>Talocrural:</strong> dorsiflexion/plantarflexion (sagittal plane, up/down)</li><li><strong>Subtalar:</strong> inversion/eversion (frontal plane, medial/lateral tilting)</li></ul><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>Talocrural = ankle mortise (tibia + both malleoli) + trochlea of talus; hinge; dorsiflexion/plantarflexion</li><li>Lateral ligaments: ATFL → CFL → PTFL; ATFL most commonly torn in inversion sprain</li><li>Deltoid ligament (4 parts, strong); rarely torn</li><li>Subtalar = talocalcaneal; plane joint; inversion + eversion</li></ul></div></div>`},
    {q:17,  text:'Bones and joints of foot including reading of X-ray images, plantar arches and their support', content:`<div><div><h2>Q17 — Bones & Joints of the Foot — Plantar Arches</h2><p style="margin-top:4px">X-ray reading, tarsal bones, and arch support</p></div><h3>Bones of the Foot</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Region</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Bones</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Key Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tarsals (7)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Calcaneus · Talus · Navicular · Cuboid · Medial / Intermediate / Lateral cuneiform</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Calcaneus = largest tarsal; Talus = connects to tibia; Navicular = medial, boat-shaped</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Metatarsals (5)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">MT1–MT5</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">MT1 = shortest and most robust; MT5 has a styloid process (common fracture site)</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Phalanges (14)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hallux = 2; Toes 2–5 = 3 phalanges each</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Same pattern as the hand</td></tr></tbody></table><h3>Key Joints of the Foot</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Joint</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Type</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Articulation</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Movements</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Chopart (transverse tarsal)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Compound</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Calcaneocuboid + talonavicular joints together</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Inversion/eversion</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lisfranc (tarsometatarsal)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plane synovial</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Cuneiforms + cuboid ↔ MT1–5 bases</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Minimal gliding; important for stability</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Metatarsophalangeal (MTP)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Ellipsoid</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">MT head ↔ proximal phalanx base</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension + ab/adduction</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Interphalangeal (IP)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Hinge</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Phalangeal head ↔ phalanx base</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Flexion/extension only</td></tr></tbody></table><h3>Plantar Arches</h3><p>The plantar arches absorb ground-reaction forces during standing and locomotion, distribute body weight, and act as a spring during push-off.</p><ul><li><strong>Medial longitudinal arch</strong> (higher) — calcaneus → talus → navicular → 3 cuneiforms → MT1-3. Keystone: <strong>head of talus</strong>. More flexible → main shock absorber.</li><li><strong>Lateral longitudinal arch</strong> (lower) — calcaneus → cuboid → MT4-5. Keystone: <strong>cuboid</strong>. Less flexible → main stability arch.</li><li><strong>Transverse arch</strong> — across the cuneiforms and cuboid. Keystone: <strong>intermediate cuneiform</strong>.</li></ul><h3>Support of the Plantar Arches</h3><table style="width:100%;border-collapse:collapse;border:1px solid #dde3ef;border-radius:6px;overflow:hidden;margin:0 0 24px;font-family:inherit"><thead><tr><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Structure</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Arch Supported</th><th style="padding:8px 12px;text-align:left;background:#f1f5f9;border-bottom:2px solid #dde3ef;font-size:14px;font-weight:700;color:#1a2030;white-space:nowrap">Notes</th></tr></thead><tbody><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plantar aponeurosis (plantar fascia)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial + lateral longitudinal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Calcaneal tuberosity → toe bases; windlass mechanism — toe dorsiflexion tightens it → raises arch</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Long plantar ligament</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Lateral longitudinal (mainly)</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Calcaneus → cuboid + MT2-5 bases; strongest ligament in the foot</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Plantar calcaneonavicular (spring) lig.</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial longitudinal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Sustentaculum tali → navicular; supports head of talus; contains fibrocartilage</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Tibialis posterior tendon</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Medial longitudinal</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Active support of medial arch</td></tr><tr><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Peroneus longus tendon</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Transverse + lateral</td><td style="padding:7px 12px;border-bottom:1px solid #edf0f5;font-size:14px;vertical-align:top;line-height:1.6">Crosses plantar surface diagonally</td></tr></tbody></table><div style="background:#fef2f2"><p><strong>Clinical note:</strong> Pes planus (flat foot) = loss of medial longitudinal arch. Can be flexible (passively correctable) or rigid. Causes: spring ligament laxity, tibialis posterior dysfunction. Pes cavus (high arch) = excessively high medial arch, often neurological (e.g., Charcot-Marie-Tooth disease).</p></div><h3>X-Ray Reading</h3><ul><li><strong>AP view:</strong> Count 5 metatarsals; identify 7 tarsals; check Lisfranc joint alignment (MT2 base should align with medial border of intermediate cuneiform); look for avulsion fracture at MT5 styloid.</li><li><strong>Lateral view:</strong> Assess medial longitudinal arch height; Böhler angle (normal 25–40°, reduced in calcaneal fracture); assess navicular drop.</li></ul><div style="background:#f0fdf4"><strong>Quick Recap</strong><ul><li>7 tarsals: Calcaneus · Talus · Navicular · Cuboid · 3 Cuneiforms; 5 metatarsals; 14 phalanges</li><li>3 arches: medial longitudinal (talus as keystone, higher) · lateral longitudinal (cuboid) · transverse</li><li>Spring ligament (plantar calcaneonavicular) = key support for medial arch + head of talus</li><li>Windlass mechanism: toe dorsiflexion tightens plantar fascia → raises arch</li><li>Pes planus = flat medial arch; pes cavus = high arch (often neurological)</li></ul></div></div>`}
  ]},

function el(tag, attrs={}, ...children){
    const e = document.createElement(tag);
    for(const k in attrs){
        if(k==="class") e.className = attrs[k];
        else if(k==="html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
    }
    for(const c of children){
        if(c==null) continue;
        if(typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
    }
    return e;
}

/* ── Directional term colorizer ── */
function colorizeBlocks(){
    const app = document.getElementById('app');
    if(!app) return;

    const SKIP = new Set(['SCRIPT','STYLE','INPUT','TEXTAREA','CODE','BUTTON','A']);
    const DIR_RE = /\b(superior(?:ly)?|inferior(?:ly)?|lateral(?:ly)?|medial(?:ly)?|anterior(?:ly)?|posterior(?:ly)?|roof|floor|deep(?:ly)?|superficial(?:ly)?|proximal(?:ly)?|distal(?:ly)?|cranial(?:ly)?|caudal(?:ly)?)\b/gi;
    const VERT_RE = /\b([CTLS][1-9][0-2]?(?:[–\-][1-9][0-2]?)?)\b/g;
    const CN_RE   = /\b(CN\s?(?:I{1,3}|IV|VI{0,3}|IX|X{1,2}I{0,2}))\b/g;

    const dirClass = t => ({
        superior:'dir-sup', inferior:'dir-inf', lateral:'dir-lat', medial:'dir-med',
        anterior:'dir-ant', posterior:'dir-pos', roof:'dir-roof', floor:'dir-floor',
        deep:'dir-deep', superficial:'dir-sf', proximal:'dir-prox', distal:'dir-dist',
        cranial:'dir-cran', caudal:'dir-caud',
    })[t.toLowerCase().replace(/ly$/,'')] || 'dir-sup';

    function wrapMatches(text, re, makeSpan){
        re.lastIndex = 0;
        if(!re.test(text)){ re.lastIndex=0; return null; }
        re.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last=0, m;
        while((m=re.exec(text))!==null){
            if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
            frag.appendChild(makeSpan(m[0], m[1]||m[0]));
            last=m.index+m[0].length;
        }
        if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        return frag;
    }

    function walk(root, re, makeSpan){
        const tw = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(n){
                let p=n.parentElement;
                while(p&&p!==root){
                    if(SKIP.has(p.tagName)) return NodeFilter.FILTER_REJECT;
                    if(p.dataset&&p.dataset.nc) return NodeFilter.FILTER_REJECT; // already colored
                    p=p.parentElement;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes=[];
        while(tw.nextNode()) nodes.push(tw.currentNode);
        for(const node of nodes){
            const frag=wrapMatches(node.textContent, re, makeSpan);
            if(frag) node.parentNode.replaceChild(frag, node);
        }
    }

    // Pass 1 — directional terms
    walk(app, DIR_RE, (full, term)=>{
        const s=document.createElement('span');
        s.className=dirClass(term); s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 2 — vertebral levels (bold + sky highlight)
    walk(app, VERT_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-vert'; s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 3 — cranial nerve refs
    walk(app, CN_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-cn'; s.dataset.nc='1'; s.textContent=full; return s;
    });

    // Pass 4 — bold label before first ":" in every list item
    // Must run AFTER passes 1-3 (which may have split text nodes)
    document.querySelectorAll('#app li').forEach(li=>{
        // Skip SCALP-style mnemonic items that start with <b>Letter</b>
        const fc = li.firstChild;
        if(fc && fc.nodeType===Node.ELEMENT_NODE && fc.tagName==='B') return;

        // Find the first non-empty text node in the <li>
        let tNode=null;
        for(const ch of li.childNodes){
            if(ch.nodeType===Node.TEXT_NODE && ch.textContent.trim()){
                tNode=ch; break;
            }
        }
        if(!tNode) return;

        // Match "Label(s): " at the start — label may include parens but not → or newline
        const m = tNode.textContent.match(/^([A-Za-z][^:→\n]{0,70}?):\s/);
        if(!m) return;

        const label = m[1];
        const rest  = tNode.textContent.slice(label.length); // keeps ":" and everything after
        const strong = document.createElement('strong');
        strong.className = 'li-label';
        strong.textContent = label;
        const restNode = document.createTextNode(rest);
        li.insertBefore(strong, tNode);
        li.insertBefore(restNode, tNode);
        li.removeChild(tNode);
    });
}

function renderBlocks(blocks){
    let html = "";
    for(const b of blocks){
        if(b.h){
            if(b.p || b.list){
                html += `<h3>${b.h}</h3>`;
                if(b.p) html += `<p>${b.p}</p>`;
                if(b.list){
                    html += "<ul>";
                    for(const li of b.list) html += `<li>${li}</li>`;
                    html += "</ul>";
                }
            } else {
                html += `<h3>${b.h}</h3>`;
            }
        } else {
            if(b.p) html += `<p>${b.p}</p>`;
            if(b.list){
                html += "<ul>";
                for(const li of b.list) html += `<li>${li}</li>`;
                html += "</ul>";
            }
            if(b.div) html += `<div class="${b.div}">${b.text}</div>`;
            // img blocks silently ignored — pictures removed
        }
    }
    return html;
}

function initHomeParticles(){
    const canvas = document.getElementById('home-particles');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, motes;
    let raf = null;

    function resize(){
        W = canvas.width  = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
    }

    function spawn(){
        motes = [];
        const count = Math.floor(W * H / 22000);
        for(let i=0;i<count;i++){
            motes.push({
                x:  Math.random()*W,
                y:  Math.random()*H,
                vx: (Math.random()-.5)*.18,
                vy: (Math.random()-.5)*.18,
                r:  Math.random()*.9+.2,
                o:  Math.random()*.07+.02
            });
        }
    }

    function draw(){
        ctx.clearRect(0,0,W,H);
        for(let i=0;i<motes.length;i++){
            const m=motes[i];
            ctx.fillStyle='rgba(180,210,255,'+m.o+')';
            ctx.beginPath();
            ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
            ctx.fill();
            m.x+=m.vx; m.y+=m.vy;
            if(m.x<0||m.x>W) m.vx*=-1;
            if(m.y<0||m.y>H) m.vy*=-1;
        }
        raf = requestAnimationFrame(draw);
    }

    function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }

    resize();
    spawn();
    draw();

    const ro = new ResizeObserver(()=>{ resize(); spawn(); });
    ro.observe(canvas.parentElement);

    window._homeParticlesCleanup = function(){ stop(); ro.disconnect(); window._homeParticlesCleanup=null; };
}

const THEME_KEY = 'aa_theme'; // 'light' | 'dark' | 'auto'

function applyTheme(pref){

/* ====================================================================
   SOUND SYSTEM  (Web Audio API — no external files)
   ==================================================================== */
const SOUND_KEY = 'aa_sound';
let _audioCtx = null;

function _ctx(){
    if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    return _audioCtx;
}

function isSoundOn(){ return localStorage.getItem(SOUND_KEY) !== 'off'; }

function setSoundPref(on){
    localStorage.setItem(SOUND_KEY, on ? 'on' : 'off');
}

function playSound(type){
    if(!isSoundOn()) return;
    try {
        const c = _ctx();
        if(type==='tap'){
            const o = c.createOscillator();
            const g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.type='sine'; o.frequency.setValueAtTime(520, c.currentTime);
            o.frequency.exponentialRampToValueAtTime(380, c.currentTime+.06);
            g.gain.setValueAtTime(.18, c.currentTime);
            g.gain.exponentialRampToValueAtTime(.001, c.currentTime+.09);
            o.start(c.currentTime); o.stop(c.currentTime+.09);
        } else if(type==='swoosh'){
            const buf = c.createBuffer(1,c.sampleRate*.18,c.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.4);
            const src = c.createBufferSource();
            const f = c.createBiquadFilter();
            const g = c.createGain();
            src.buffer=buf; f.type='bandpass'; f.frequency.value=1200; f.Q.value=0.7;
            src.connect(f); f.connect(g); g.connect(c.destination);
            g.gain.setValueAtTime(.22, c.currentTime);
            g.gain.exponentialRampToValueAtTime(.001, c.currentTime+.18);
            src.start(c.currentTime);
        } else if(type==='pop'){
            const o = c.createOscillator();
            const g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.type='sine'; o.frequency.setValueAtTime(700, c.currentTime);
            o.frequency.exponentialRampToValueAtTime(320, c.currentTime+.055);
            g.gain.setValueAtTime(.12, c.currentTime);
            g.gain.exponentialRampToValueAtTime(.001, c.currentTime+.055);
            o.start(c.currentTime); o.stop(c.currentTime+.055);
        } else if(type==='success'){
            const notes=[523,659,784];
            notes.forEach((hz,i)=>{
                const o=c.createOscillator(), g=c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type='sine'; o.frequency.value=hz;
                const t=c.currentTime+i*.09;
                g.gain.setValueAtTime(.14,t);
                g.gain.exponentialRampToValueAtTime(.001,t+.22);
                o.start(t); o.stop(t+.22);
            });
        } else if(type==='gem'){
            const notes=[784,1047];
            notes.forEach((hz,i)=>{
                const o=c.createOscillator(), g=c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type='triangle'; o.frequency.value=hz;
                const t=c.currentTime+i*.07;
                g.gain.setValueAtTime(.1,t);
                g.gain.exponentialRampToValueAtTime(.001,t+.18);
                o.start(t); o.stop(t+.18);
            });
        }
    } catch(e){}
}

const STATS_KEY = 'aa_stats';

function loadStats(){
    const def = { viewed:0, gems:0, streak:0, hardIds:[], lastDate:'' };
    try{ return Object.assign(def, JSON.parse(localStorage.getItem(STATS_KEY)||'{}')); }
    catch(e){ return def; }
}

function saveStats(s){ localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

function awardGem(reason){
    const s = loadStats();
    s.gems = (s.gems||0) + 1;
    const today = new Date().toDateString();
    if(s.lastDate !== today){ s.streak=(s.streak||0)+1; s.lastDate=today; }
    saveStats(s);
    showGemToast(reason||'Gem earned!');
    playSound('gem');
}

function flagHard(id, title){
    const s = loadStats();
    if(!s.hardIds) s.hardIds=[];
    if(!s.hardIds.some(h=>h.id===id)){
        s.hardIds.push({id,title});
        saveStats(s);
        playSound('tap');
    }
}

function unflagHard(id){
    const s = loadStats();
    s.hardIds = (s.hardIds||[]).filter(h=>h.id!==id);
    saveStats(s);
    playSound('pop');
}

function isHard(id){ return (loadStats().hardIds||[]).some(h=>h.id===id); }

function trackView(){
    const s = loadStats();
    s.viewed = (s.viewed||0) + 1;
    if(s.viewed % 5 === 0) awardGem('5 questions explored!');
    saveStats(s);
}

function showGemToast(msg){
    const existing = document.querySelector('.gem-toast');
    if(existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'gem-toast';
    el.innerHTML = `<span style="font-size:18px">💎</span> ${msg}`;
    document.body.appendChild(el);
    setTimeout(()=>{
        el.style.animation = 'gemOut .3s ease forwards';
        setTimeout(()=>el.remove(), 320);
    }, 2200);
}

function renderHardFlag(id, title){
    const flagged = isHard(id);
    return `<button class="hard-flag-btn${flagged?' flagged':''}" title="${flagged?'Remove from hard':'Flag as hard'}"
        onclick="event.stopPropagation();${flagged?`unflagHard('${id}')`:`flagHard('${id}','${(title||'').replace(/'/g,"\\'")}')`};this.classList.toggle('flagged');playSound('tap')"
        >&#x2605;</button>`;
}

function _dictSectionIcons(id){

function renderDictGrid(){
    if(!window.DICT_ENTRIES) return;
    const grid = document.getElementById("dict-grid");
    const bar  = document.getElementById("dict-count-bar");
    if(!grid) return;
    const q = _dictQ.toLowerCase();
    const filtered = window.DICT_ENTRIES.filter(e=>{
        if(_dictSec && e.section!==_dictSec) return false;
        if(!q) return true;
        const s=(e.headword+" "+e.translation+" "+e.etymology+" "+e.description+" "+e.examples.join(" ")+" "+e.counterpart+" "+e.typeForm+" "+e.sectionName).toLowerCase();
        return s.includes(q);
    }).sort((a,b)=>a.headword.localeCompare(b.headword));
    if(bar){
        bar.innerHTML = filtered.length
            ? `Showing <b>${filtered.length}</b> of ${window.DICT_ENTRIES.length} entries${_dictSec?" in "+_dictSec.replace("SECTION ","Section "):""}${q?" matching <em>“"+q+"”</em>":""}`
            : "";
    }
    if(!filtered.length){
        grid.innerHTML=`<div class="no-results" style="grid-column:1/-1">No entries match your search.</div>`;
        return;
    }
    grid.innerHTML = filtered.map(e=>{
        const exHtml = e.examples.length
            ? `<ul class="dict-card-ex">${e.examples.map(ex=>`<li>${ex}</li>`).join("")}</ul>`
            : "";
        const cpHtml = e.counterpart
            ? `<div class="dict-card-cp">⇄ ${e.counterpart}</div>`

            ? `<div class="dict-card-ety">🔤 ${e.etymology}</div>`

            <div class="dict-card-head">

                ${etHtml}
                <div class="dict-card-desc">${e.description}</div>
                ${exHtml}
                ${cpHtml}
            </div>
        </div>`;
    }).join("");
}
