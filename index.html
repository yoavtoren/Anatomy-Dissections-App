            <div class="ao-info-body">
                <p class="ao-desc" id="ao-region-desc">Click any labeled exhibit in the lab to see chapter details and topics.</p>
                <div id="ao-region-subs"></div>
            </div>
            <div class="ao-info-footer">
                <a class="ao-full-link" id="ao-full-link" href="#/questions" style="display:none">Open Chapter &#8594;</a>
            </div>
        </div>
    </div>`;
}

function labSelectChapter(chId, cx, cy){
    const ch=CHAPTERS.find(c=>c.id===chId);
    if(!ch) return;
    // Update right info panel
    const title=document.getElementById('ao-region-title');
    const desc=document.getElementById('ao-region-desc');
    const subs=document.getElementById('ao-region-subs');
    const footer=document.getElementById('ao-full-link');
    const hint=document.getElementById('ao-hint');
    if(title) title.textContent=ch.title;
    if(desc) desc.textContent=ch.focus;
    if(hint) hint.textContent='Chapter '+ch.num+': '+ch.title;
    if(subs) subs.innerHTML=`
        <div class="ao-sec-row">
            <div class="ao-sec-bar"></div>
            <span class="ao-sec-lbl">Chapter ${ch.num} &mdash; ${ch.topics.length} topics</span>
        </div>
        ${ch.topics.map(t=>`
        <div class="ao-sub-card" onclick="location.hash='#/chapter/${ch.id}/q/${t.q}'">
            <span style="font-size:12px;color:var(--ink);flex:1;line-height:1.45">Q${t.q}: ${t.text}</span>
            <span style="color:var(--accent);font-size:16px;flex-shrink:0;margin-left:8px">&#8250;</span>
        </div>`).join('')}`;
    if(footer){footer.href='#/chapter/'+chId;footer.textContent='Open Chapter '+ch.num+' →';footer.style.display='block';}
    document.querySelectorAll('#aoLabSvg .lab-hot').forEach(c=>c.classList.remove('lab-active'));
    const activeG=document.querySelector(`#aoLabSvg .lab-hs[data-chid="${chId}"]`);
    if(activeG){const ac=activeG.querySelector('.lab-hot');if(ac)ac.classList.add('lab-active');}
    // Slide info panel in
    const wrap=document.querySelector('.ao-topo-wrap');
    if(wrap) wrap.classList.add('ao-panel-open');
    playSound('tap');

    // ── Swoosh into exhibit ────────────────────────────────────
    const overviewLayer=document.getElementById('ao-overview-layer');
    if(!overviewLayer) return;
    // Set transform-origin toward the clicked hotspot (SVG coords 2488×1696)
    const fx=((cx||1244)/2488*100).toFixed(1);
    const fy=((cy||848)/1696*100).toFixed(1);
    overviewLayer.style.transformOrigin=`${fx}% ${fy}%`;
    // Populate exhibit first so image loads before it becomes visible
    showExhibit(chId);
    // Both transitions fire in the same frame — true cross-fade, no black gap
    overviewLayer.classList.add('swoosh-out');
}

function closeAtlasPanel(){
    const wrap=document.querySelector('.ao-topo-wrap');
    if(wrap) wrap.classList.remove('ao-panel-open');
    document.querySelectorAll('#aoLabSvg .lab-hot').forEach(c=>c.classList.remove('lab-active'));
    playSound('pop');
}

function showExhibit(chId){
    const ex=document.getElementById('ao-exhibit-layer');
    if(!ex) return;
    const data=EXHIBIT_DATA[chId]||{img:'',color:'#4A6CF7',title:'',marks:[]};
    const ch=CHAPTERS.find(c=>c.id===chId);
    const color=data.color||ch?.color||'#4A6CF7';
    const marksHtml=data.marks.map((m,i)=>`
        <div class="ex-mark" style="left:${m.x}%;top:${m.y}%"
             onclick="location.hash='#/chapter/${chId}'"
             tabindex="0" aria-label="${m.label}">
            <div class="ex-dot"></div>
            <div class="ex-lbl">${m.label}</div>
        </div>`).join('');
    ex.innerHTML=`
        <img class="ao-exhibit-img" src="${data.img}" alt="${data.title}"
             onerror="this.style.display='none';document.getElementById('ex-placeholder-${chId}').style.display='flex'"/>
        <div id="ex-placeholder-${chId}" class="ao-exhibit-placeholder"
             style="display:none;background:linear-gradient(145deg,${color}22,${color}08)">
            <div style="width:72px;height:72px;border-radius:50%;background:${color}33;border:2px solid ${color}66;display:flex;align-items:center;justify-content:center">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <p style="color:${color};font-size:13px;font-weight:600;margin:8px 0 0;text-align:center">${data.title||ch?.title||'Chapter exhibit'}</p>
            <p style="color:rgba(255,255,255,.4);font-size:11px;margin:4px 0 0">Add image: ${data.img}</p>
        </div>
        <div class="ex-marks-wrap">${marksHtml}</div>
        <button class="ao-back-btn" onclick="labGoBack()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to Lab
        </button>
        <div class="ao-exhibit-badge">Ch ${ch?.num||''}  ·  ${data.title||ch?.title||''}</div>`;
    ex.classList.remove('hide-out');
    // Force reflow before adding show
    ex.offsetWidth;
    ex.classList.add('show');
}

function labGoBack(){
    const ex=document.getElementById('ao-exhibit-layer');
    const ov=document.getElementById('ao-overview-layer');
    if(ex){
        ex.classList.remove('show');
        ex.classList.add('hide-out');
    }
    if(ov){
        // Briefly disable transition for instant reset, then restore
        ov.style.transition='none';
        ov.style.transformOrigin='50% 50%';
        ov.classList.remove('swoosh-out');
        ov.offsetWidth; // reflow
        ov.style.transition='';
    }
    setTimeout(()=>{
        if(ex){ ex.classList.remove('hide-out'); ex.innerHTML=''; }
    },400);
}

function initLabHotspots(){
    document.querySelectorAll('#aoLabSvg .lab-hs').forEach(g=>{
        g.addEventListener('click',()=>{
            labSelectChapter(g.dataset.chid, +g.dataset.cx, +g.dataset.cy);
        });
    });
}

/* -------- Portal search helpers -------- */
function hlSearch(text, q){
    if(!q) return text;
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return text.replace(re,'<mark class="search-mark">$1</mark>');
}
function searchPortal(query){
    const q=(query||'').toLowerCase().trim();
    const grid=document.getElementById('portal-chapter-grid');
    const results=document.getElementById('portal-search-results');
    const tabs=document.getElementById('portal-region-tabs');
    if(!grid||!results) return;
    if(!q){
        grid.style.display='';results.style.display='none';
        if(tabs) tabs.style.display='';return;
    }
    grid.style.display='none';if(tabs) tabs.style.display='none';
    results.style.display='block';
    const chMatches=CHAPTERS.filter(ch=>ch.title.toLowerCase().includes(q)||ch.focus.toLowerCase().includes(q));
    const topicMatches=[];
    CHAPTERS.forEach(ch=>ch.topics.forEach(t=>{if(t.text.toLowerCase().includes(q)) topicMatches.push({ch,t});}));
    const chapHtml=chMatches.map(ch=>`
        <a class="search-result-ch" href="#/chapter/${ch.id}" style="--cc:${ch.color}">
            <span class="search-result-ch-num">Ch.&nbsp;${ch.num}</span>
            <span class="search-result-ch-title">${hlSearch(ch.title,query)}</span>
            <span class="search-result-ch-count">${ch.topics.length} topics&nbsp;→</span>
        </a>`).join('');
    const topHtml=topicMatches.slice(0,20).map(({ch,t})=>`
        <a class="search-result-topic" href="#/chapter/${ch.id}" onclick="setTimeout(()=>scrollToQ(${t.q}),400)" style="--cc:${ch.color}">
            <span class="search-result-qnum" style="color:${ch.color}">Q${t.q}</span>
            <span class="search-result-topic-text">${hlSearch(t.text,query)}</span>
            <span class="search-result-ch-tag">${ch.title}</span>
        </a>`).join('');
    results.innerHTML=
        (chMatches.length?`<div class="search-group-label">Chapters (${chMatches.length})</div>${chapHtml}`:'')+
        (topicMatches.length?`<div class="search-group-label">Topics (${topicMatches.length>20?'20+ shown':topicMatches.length})</div>${topHtml}`:'')+
        (!chMatches.length&&!topicMatches.length?`<p class="search-empty">No results for "${query}"</p>`:'');
}

/* -------- Final Question Portal (13-chapter grid) -------- */
function viewFinalTopics(regionFilter){
    const selRegion = regionFilter || null;
    const br = selRegion ? BODY_REGIONS.find(r=>r.id===selRegion) : null;
    const chaptersToShow = br
        ? br.chapters.map(cid=>CHAPTERS.find(c=>c.id===cid)).filter(Boolean)
        : CHAPTERS;

    const regionTabs = BODY_REGIONS.map(r=>`
        <a class="region-tab${selRegion===r.id?' active':''}" href="#/questions/${r.id}" style="--tc:${r.color}">
            <span class="region-tab-icon">${r.icon}</span>
            <span class="region-tab-name">${r.name}</span>
            <span class="region-tab-count">${r.chapters.length} ch.</span>
        </a>`).join('');

    const chapterCards = chaptersToShow.map(ch=>{
        const ex=EXHIBIT_DATA[ch.id];
        const imgStyle=ex&&ex.img?`style="background-image:url('${ex.img}')"`:'' ;
        return `
        <a class="ch-vis-card" href="#/chapter/${ch.id}" style="--cc:${ch.color}">
            ${imgStyle?`<div class="ch-vis-img" ${imgStyle}></div>`:`<div class="ch-vis-no-img"></div>`}
            <div class="ch-vis-overlay"></div>
            <div class="ch-vis-tint"></div>
            <div class="ch-vis-content">
                <div class="ch-vis-top">
                    <span class="ch-vis-badge">Ch.&nbsp;${ch.num}</span>
                    <div class="ch-vis-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="12" height="12"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>
                <div class="ch-vis-bottom">
                    <h3 class="ch-vis-title">${ch.title}</h3>
                    <p class="ch-vis-focus">${ch.focus}</p>
                    <span class="ch-vis-count">${ch.topics.length} questions</span>
                </div>
            </div>
        </a>`;
    }).join('');

    return `
    <div class="portal-hero">
        <h1>Final Question Portal</h1>
        <p>Navigate 13 exam chapters. Search by topic name, keyword, or question number.</p>
        <div class="portal-search-wrap">
            <svg class="p-srch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input class="portal-search-input" id="portal-search" type="search" placeholder="Search topics, chapters, Q-numbers…" oninput="searchPortal(this.value)" autocomplete="off" spellcheck="false"/>
        </div>
        <div class="portal-search-results" id="portal-search-results"></div>
    </div>
    <div id="portal-region-tabs" class="region-tabs">
        <a class="region-tab${!selRegion?' active':''}" href="#/questions" style="--tc:#888">
            <span class="region-tab-icon">🔬</span>
            <span class="region-tab-name">All Chapters</span>
            <span class="region-tab-count">13 ch.</span>
        </a>
        ${regionTabs}
    </div>
    <div class="chapter-grid" id="portal-chapter-grid">
        ${chapterCards}
    </div>`;
}

/* -------- Scroll to a question section within chapter page -------- */
function scrollToQ(q){
    const el = document.getElementById('ch-q-'+q);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
function stripH3Emojis(){
    const emojiRe=/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]/gu;
    document.querySelectorAll('.topic-content-body h3').forEach(h=>{
        h.childNodes.forEach(n=>{
            if(n.nodeType===3) n.textContent=n.textContent.replace(emojiRe,'').trimStart();
        });
    });
}

/* -------- Chapter reading page — all questions continuous -------- */
function viewChapter(id, jumpToQ){
    const ch = CHAPTERS.find(c=>c.id===id);
    if(!ch) return '<p>Chapter not found.</p>';
    const region = BODY_REGIONS.find(r=>r.chapters.includes(id));

    const tocItems = ch.topics.map(t=>`
        <a class="ch-toc-item" style="--cc:${ch.color}" href="javascript:void(0)" onclick="scrollToQ(${t.q})">
            <span class="ch-toc-num">Q${t.q}</span>
            <span>${t.text.length>55?t.text.slice(0,55)+'…':t.text}</span>
        </a>`).join('');

    const questions = ch.topics.map((t,idx)=>{
        const prev=ch.topics[idx-1];
        const next=ch.topics[idx+1];
        return `
        <section class="ch-q-section" id="ch-q-${t.q}" style="--cc:${ch.color}">
            <div class="ch-q-header" style="--cc:${ch.color}">
                <div class="ch-q-num-badge">Q${t.q}</div>
                <h2>${t.text}</h2>
                <div class="ch-q-jump-nav">
                    ${prev?`<a href="javascript:void(0)" onclick="scrollToQ(${prev.q})" title="Q${prev.q}">&#8593;</a>`:''}
                    ${next?`<a href="javascript:void(0)" onclick="scrollToQ(${next.q})" title="Q${next.q}">&#8595;</a>`:''}
                </div>
            </div>
            <div class="topic-content-body">
                ${t.content||'<p class="muted" style="padding:28px;text-align:center;font-size:16px">Study content coming soon.</p>'}
            </div>
            ${idx<ch.topics.length-1?'<div class="ch-q-divider"></div>':''}
        </section>`;
    }).join('');

    return `
    <div class="crumbs">
        <a href="#/questions">Final Question Portal</a>
        ${region?` &rsaquo; <a href="#/questions/${region.id}">${region.name}</a>`:''}
        &rsaquo; <span>${ch.title}</span>
    </div>
    <div class="ch-hero" style="--cc:${ch.color}">
        <div class="ch-hero-label">Chapter ${ch.num} &nbsp;&middot;&nbsp; ${ch.topics.length} Questions</div>
        <h1>${ch.title}</h1>
        <p class="ch-hero-focus">${ch.focus}</p>
    </div>
    <div class="ch-toc" style="--cc:${ch.color}">
        <div class="ch-toc-title">Jump to Question</div>
        <div class="ch-toc-grid">${tocItems}</div>
    </div>
    <div class="ch-questions">${questions}</div>
    <div class="ch-bottom-nav">
        <a class="btn ghost" href="${region?'#/questions/'+region.id:'#/questions'}">&#8592; All Chapters</a>
        <a class="btn ghost" href="javascript:void(0)" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593; Back to Top</a>
    </div>`;
}

/* -------- viewTopic: deep-link → render chapter and scroll -------- */
function viewTopic(chId, qNum){
    const html = viewChapter(chId);
    requestAnimationFrame(()=>requestAnimationFrame(()=>scrollToQ(parseInt(qNum))));
    return html;
}

function viewQuestionPortal(){ return viewFinalTopics(); }

/* -------- Terminology, Nomenclature & Special Terms -------- */
function buildTermsPage(){
    const cats = [...new Set(TERMS.map(t=>t.category))].sort();
    const isDict = _termTab === "dict";
    return `
    <div class="dict-tabs">
        <button class="dict-tab${!isDict?" active":""}" onclick="switchTermTab('topo')">📍 Topographic Terms</button>
        <button class="dict-tab${isDict?" active":""}" onclick="switchTermTab('dict')">📖 Latin &amp; Greek Dictionary</button>
    </div>
    ${isDict ? viewDictionary() : `
    <h1>Term Library</h1>
    <p class="muted">All topographic anatomical terms — focused on borders, contents, and clinical landmarks. <b>${TERMS.length}</b> terms.</p>
    <div class="term-search">
        <input id="termq" placeholder="Search terms (e.g. McBurney, Hesselbach, Douglas, scalp...)" />
        <select id="termcat">
            <option value="">All categories</option>
            ${cats.map(c=>`<option>${c}</option>`).join("")}
        </select>
    </div>
    <div id="termlist" class="term-list"></div>
    `}`;
}

function switchTermTab(tab){
    _termTab = tab;
    if(tab==="dict") _dictQ="";
    const app=document.getElementById("app");
    if(app) app.innerHTML=buildTermsPage();
    afterTermsRoute();
}

function afterTermsRoute(){
    if(_termTab==="dict"){
        renderDictGrid();
        const qi = document.getElementById("dictq");
        if(qi){
            qi.addEventListener("input", function(){ dictSearch(this.value); });
            qi.focus();
        }
    } else {
        renderTermList();
        const ti=document.getElementById("termq");
        const tc=document.getElementById("termcat");
        if(ti) ti.addEventListener("input", renderTermList);
        if(tc) tc.addEventListener("change", renderTermList);
    }
}

function viewTerminology(){
    return buildTermsPage();
}

/* ====================================================================
   ROUTER
   ==================================================================== */
function route(){
    const h = location.hash || "#/welcome";
    const app = document.getElementById("app");
    let html = "";

    if(h==="#/welcome" || h==="#/" || h===""){
        html = viewWelcome();
    } else if(h==="#/terminology" || h==="#/terms"){
        html = viewTerminology();
    } else if(h==="#/topics"){
        html = viewInteractiveTopics();
    } else if(h==="#/questions"){
        html = viewFinalTopics();
    } else if(h.startsWith("#/questions/")){
        html = viewFinalTopics(h.replace("#/questions/",""));
    } else if(h.startsWith("#/chapter/") && h.includes("/q/")){
        const parts=h.replace("#/chapter/","").split("/q/");
        html=viewTopic(parts[0],parts[1]);
    } else if(h.startsWith("#/chapter/")){
        html = viewChapter(h.replace("#/chapter/",""));
    } else if(h==="#/settings"){
        html = viewSettings();
    } else {
        html = viewWelcome();
    }
    const isWelcome = h==="#/welcome"||h==="#/"||h===""||
        (h!="#/terminology"&&h!="#/terms"&&h!="#/topics"&&h!="#/questions"&&h!="#/settings"&&
         !h.startsWith("#/questions/")&&!h.startsWith("#/chapter/"));
    if(window._homeParticlesCleanup) window._homeParticlesCleanup();
    document.body.classList.toggle('home-mode', isWelcome);
    document.body.classList.toggle('atlas-mode', h==="#/topics");
    app.innerHTML = html;
    setActiveNav();
    applyStoredImages();
    colorizeBlocks();
    stripH3Emojis();
    if(h==="#/topics") initLabHotspots();
    if(isWelcome) setTimeout(initHomeParticles, 0);
    if(h.startsWith("#/chapter/") && h.includes("/q/")) {
        const parts=h.replace("#/chapter/","").split("/q/");
        trackView();
    }
    // Update hero question count
    const qEl = document.getElementById('hero-q-count');
    if(qEl){ const tot = CHAPTERS.reduce((s,c)=>s+c.topics.length,0); qEl.textContent=tot; }

    if(h==="#/terminology" || h==="#/terms"){
        afterTermsRoute();
    }

    window.scrollTo({top:0, behavior:"instant"});
    playSound('swoosh');
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", ()=>{ initTheme(); route(); });
window.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLightbox(); });

/* ── Hamburger menu ── */
(function(){
    const toggle = document.getElementById('navToggle');
    const menu   = document.getElementById('topnav');
    if(!toggle || !menu) return;
    toggle.addEventListener('click', () => {
        const open = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    menu.addEventListener('click', e => {
        if(e.target.tagName === 'A'){
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });
    document.addEventListener('click', e => {
        if(!e.target.closest('header.site')){
            menu.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });
})();
