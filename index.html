<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Anatomy — Topography, Terms & CNS/PNS</title>
<style>
/* ============================================================
   GLOBAL STYLES
   ============================================================ */
:root{
    --bg:#0e1726;
    --panel:#16213a;
    --panel-2:#1d2c4a;
    --ink:#e8eefc;
    --muted:#9fb0d0;
    --accent:#5dc1ff;
    --accent-2:#79f1c4;
    --warn:#ffd166;
    --danger:#ff7373;
    --border:#27375a;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header.site{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,rgba(14,23,38,.95),rgba(14,23,38,.85));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
}
.nav{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px}
.brand{font-weight:700;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;color:#fff}
.brand .dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2))}
nav.menu{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
nav.menu a{
    padding:8px 14px;border-radius:10px;color:var(--muted);font-weight:500;font-size:14px;
    border:1px solid transparent;
}
nav.menu a:hover{background:var(--panel);color:#fff;text-decoration:none}
nav.menu a.active{background:var(--panel-2);color:#fff;border-color:var(--border)}
main{max-width:1240px;margin:0 auto;padding:32px 22px 80px}
h1,h2,h3,h4{color:#fff;line-height:1.25}
h1{font-size:34px;margin:0 0 12px}
h2{font-size:24px;margin:32px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
h3{font-size:18px;margin:20px 0 8px;color:var(--accent-2)}
h4{font-size:15px;margin:14px 0 4px;color:var(--accent)}
p{margin:8px 0}
ul,ol{margin:8px 0 14px 22px}
li{margin:3px 0}
hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.muted{color:var(--muted)}
.kbd{background:var(--panel-2);padding:2px 6px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:var(--panel);font-size:12px;color:var(--muted);margin-right:6px}
.tag.green{color:#0c2;border-color:#1f5}
.tag.blue{color:#5cf;border-color:#39c}
.tag.red{color:#f88;border-color:#a44}
.tag.amber{color:#ffd166;border-color:#a78b3a}
.card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;
    box-shadow:var(--shadow);
}
.card + .card{margin-top:14px}
.btn{
    display:inline-block;padding:10px 18px;border-radius:10px;
    background:var(--accent);color:#021;font-weight:600;border:none;cursor:pointer;
    transition:transform .1s ease;
}
.btn:hover{transform:translateY(-1px);text-decoration:none}
.btn.alt{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn.small{padding:6px 12px;font-size:13px}
.grid{display:grid;gap:18px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media (max-width:900px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:600px){.grid{grid-template-columns:1fr !important}}

/* ============================================================
   WELCOME / HERO
   ============================================================ */
.hero{
    background:radial-gradient(1200px 500px at 0% 0%, rgba(93,193,255,.18), transparent 60%),
               radial-gradient(900px 500px at 100% 0%, rgba(121,241,196,.12), transparent 55%),
               linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--border);border-radius:18px;padding:42px 32px;margin-bottom:28px;
    box-shadow:var(--shadow);
}
.hero h1{font-size:42px;margin-bottom:6px}
.hero p.lead{font-size:17px;color:var(--muted);max-width:780px}
.tile{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;cursor:pointer;transition:transform .15s ease, border-color .2s;
    display:block;color:inherit;
}
.tile:hover{transform:translateY(-3px);border-color:var(--accent);text-decoration:none}
.tile h3{margin:0 0 6px;color:#fff;font-size:20px}
.tile p{margin:0;color:var(--muted);font-size:14px}
.tile .icon{
    width:48px;height:48px;border-radius:12px;
    background:linear-gradient(135deg,rgba(93,193,255,.25),rgba(121,241,196,.25));
    display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;
    border:1px solid var(--border);
}

/* ============================================================
   BODY MAP (SVG)
   ============================================================ */
.bodymap-wrap{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
    display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:flex-start;
}
@media(max-width:900px){.bodymap-wrap{grid-template-columns:1fr}}
.bodymap{width:100%;max-width:360px;margin:0 auto;display:block;user-select:none}
.bodymap .silhouette{fill:#22335a;stroke:#3a5587;stroke-width:1.3}
.bodymap .silhouette-2{fill:#1a2643;stroke:#3a5587;stroke-width:1.1}
.bodymap .hot{
    fill:rgba(93,193,255,.16);stroke:var(--accent);stroke-width:1.4;
    cursor:pointer;transition:fill .15s, stroke-width .15s;
}
.bodymap .hot:hover{fill:rgba(93,193,255,.45);stroke-width:2.2}
.bodymap .plus{
    fill:#fff;font-weight:700;font-size:22px;text-anchor:middle;
    pointer-events:none;
}
.bodymap .pulse{
    fill:var(--accent);
    animation:pulse 1.8s ease-out infinite;
    transform-origin:center;
}
@keyframes pulse{
    0%{opacity:.65;r:13}
    50%{opacity:.25;r:18}
    100%{opacity:.65;r:13}
}
.legend{font-size:13px;color:var(--muted)}
.legend ul{list-style:none;padding:0;margin:0}
.legend li{padding:8px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--panel-2);cursor:pointer;transition:background .2s}
.legend li:hover{background:#243962;color:#fff}
.legend li b{color:#fff}

.subregion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:14px}
.subregion-card{
    background:var(--panel-2);border:1px solid var(--border);border-radius:12px;
    padding:14px;cursor:pointer;transition:transform .12s, border-color .2s;
}
.subregion-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.subregion-card h4{margin:0 0 4px;color:#fff;font-size:15px}
.subregion-card p{margin:0;color:var(--muted);font-size:12.5px}

/* ============================================================
   TERM LIBRARY
   ============================================================ */
.term-search{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 16px;
}
.term-search input{
    flex:1 1 280px;padding:12px 14px;border-radius:10px;background:var(--panel-2);
    border:1px solid var(--border);color:#fff;font-size:15px;outline:none;
}
.term-search input:focus{border-color:var(--accent)}
.term-search select{
    padding:10px 12px;border-radius:10px;background:var(--panel-2);
    border:1px solid var(--border);color:#fff;font-size:14px;
}
.term-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.term-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
    transition:border-color .2s;
}
.term-card:hover{border-color:var(--accent)}
.term-card h3{margin:0 0 6px;font-size:16px}
.term-card .cat{font-size:11px;color:var(--accent-2);text-transform:uppercase;letter-spacing:.5px}
.term-card .borders{margin-top:8px;font-size:13.5px}
.term-card .borders b{color:var(--accent)}
.no-results{padding:30px;text-align:center;color:var(--muted)}

/* ============================================================
   REGION DETAIL PAGES
   ============================================================ */
.region-detail{display:grid;grid-template-columns:1fr;gap:18px}
.crumbs{font-size:13px;color:var(--muted);margin-bottom:6px}
.crumbs a{color:var(--accent)}
.region-header{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);border-radius:var(--radius);padding:24px;
}
.region-header h1{margin:0 0 6px}
.region-header p{margin:0;color:var(--muted)}
.section{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
}
.section h2{margin-top:0}
.section h3{margin-top:14px}
.callout{
    border-left:3px solid var(--accent);background:rgba(93,193,255,.08);
    padding:10px 14px;border-radius:8px;margin:12px 0;font-size:14px;
}
.callout.warn{border-left-color:var(--warn);background:rgba(255,209,102,.08)}
.callout.danger{border-left-color:var(--danger);background:rgba(255,115,115,.08)}

/* ============================================================
   IMAGE PLACEHOLDER
   ============================================================ */
.imgbox{
    margin:14px 0;border:2px dashed var(--border);border-radius:12px;
    padding:18px;text-align:center;background:var(--panel-2);color:var(--muted);
    transition:border-color .2s;
}
.imgbox img{max-width:100%;border-radius:8px;display:block;margin:0 auto}
.imgbox.empty::before{
    content:"";display:inline-block;width:48px;height:48px;border-radius:8px;
    background:linear-gradient(135deg,#2a3d68,#1a2643);margin-bottom:10px;
}
.imgbox .ph-label{font-size:13px;color:var(--muted)}
.imgbox .ph-label code{
    background:var(--panel);padding:2px 6px;border-radius:4px;color:var(--accent-2);
    border:1px solid var(--border);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;
}

/* ============================================================
   FOOTER
   ============================================================ */
footer{
    margin-top:60px;padding:24px;color:var(--muted);font-size:13px;
    text-align:center;border-top:1px solid var(--border);
}

/* ============================================================
   PRINT
   ============================================================ */
@media print{
    header.site,.hero,nav.menu{display:none}
    body{background:#fff;color:#000}
    .card,.section,.region-header,.term-card{border-color:#ccc;background:#fff;color:#000}
}
</style>
</head>
<body>

<header class="site">
    <div class="nav">
        <a class="brand" href="#/welcome"><span class="dot"></span> Anatomy Atlas</a>
        <nav class="menu" id="topnav">
            <a href="#/welcome">Welcome</a>
            <a href="#/topography">Topography</a>
            <a href="#/cns-pns">CNS / PNS</a>
            <a href="#/terms">Term Library</a>
        </nav>
    </div>
</header>

<main id="app"></main>

<footer>
    <div>An interactive anatomy study atlas — built for the dissection workshop.</div>
    <div style="margin-top:6px">Content adapted from the provided regional anatomy and dissection workshop resources.</div>
</footer>

<script>
/* ====================================================================
   DATA — All anatomical content lives in this single object so the
   whole site is contained in one file (no external JSON, no servers).
   ==================================================================== */

const TERMS = [
  // ---- HEAD & FACE ----
  {name:"Scalp", category:"Head", borders:"Anteriorly: supraorbital fissure. Posteriorly: superior nuchal line / external occipital protuberance. Laterally: superior temporal line.", definition:"Tissue covering the skull. Five layers (mnemonic SCALP): Skin, dense Connective tissue, Aponeurosis (galea), Loose connective tissue, Pericranium."},
  {name:"Temporal fossa", category:"Head", borders:"Lateral: zygomatic arch. Superior: superior temporal line. Ventral: temporal process of zygomatic bone. Inferior: infratemporal crest of greater wing. Medial: squamous part of temporal bone & temporal surface of greater wing.", definition:"Lateral aspect of the skull. Contains temporal n., anterior/posterior/middle temporal a. & v., zygomaticotemporal n."},
  {name:"Infratemporal fossa", category:"Head", borders:"Cranial: infratemporal surface of greater wing of sphenoid + squamous part of temporal bone. Ventral: maxillary tuberosity. Dorsal: continuous with pre-styloid space. Medial: lateral plate of pterygoid process. Lateral: ramus of mandible.", definition:"Irregularly shaped depression below the temporal fossa, medial and inferior to the zygomatic arch. Not fully enclosed by bone. Communicates with temporal fossa, pterygopalatine fossa (via pterygomaxillary fissure), and middle cranial fossa (via foramen ovale, foramen spinosum)."},
  {name:"Pterygopalatine fossa", category:"Head", borders:"Cranial: maxillary surface of greater wing of sphenoid. Ventral: infratemporal surface of maxilla. Dorsal: pterygoid process of sphenoid. Medial: perpendicular plate of palatine bone. Lateral: pterygomaxillary fissure (connects to infratemporal fossa). Caudal: continues as greater palatine canal.", definition:"Narrow pyramidal gap between the posterior wall of the maxilla and the pterygoid process, with apex pointing downward. Hub for V2 and the pterygopalatine ganglion."},
  {name:"Orbital region", category:"Head", borders:"Extent of orbicularis oculi muscle; includes eyelids (palpebrae) and orbital septum.", definition:"Surrounds the orbit. Contains lacrimal pathway (caruncle, puncta, sac). Supplied by superior & inferior palpebral arches; V1 (upper eyelid) and V2 (lower eyelid)."},
  {name:"Nasal region", category:"Head", borders:"Defined by the bony and cartilaginous skeleton of the nose.", definition:"Contains nasalis and procerus muscles. Supplied by angular a., dorsal nasal a., infraorbital a.; drained by facial v. and nasofrontal v.; innervated by V1 and V2."},
  {name:"Oral region", category:"Head", borders:"Bounded by the nasolabial and mentolabial grooves; formed by upper and lower lips.", definition:"Muscles: orbicularis oris and modiolus. Arteries: superior & inferior labial (from facial a.). Vein: facial v. Glands: submandibular & submental. Nerves: V2 (upper lip), mental n. (lower lip)."},
  {name:"Buccal region", category:"Head", borders:"Between the oral and parotidomasseteric regions.", definition:"Thick skin and buccal fat pads. Supplied by facial a./v.; innervated by facial nerve (motor) and buccal n. (sensory)."},
  {name:"Parotidomasseteric region", category:"Head", borders:"Zygomatic arch superiorly; between masseter and infratemporal region.", definition:"Thick skin overlying the parotid gland, masseter muscle, and the temporomandibular joint."},
  {name:"Mental region", category:"Head", borders:"The chin.", definition:"Chin group of facial expression muscles. Palpation point for V3 (mental nerve)."},
  {name:"Infraorbital region", category:"Head", borders:"Below the orbit, lateral to nasal region.", definition:"Palpation point of V2 (infraorbital nerve, exits the infraorbital foramen)."},

  // ---- BASE OF SKULL ----
  {name:"External cranial base — anterior part", category:"Base of Skull", borders:"From superior incisor teeth to choanae.", definition:"Composed of alveolar processes of maxilla, choanae, and bony palate. Foramina: incisive (nasopalatine n., sphenopalatine a.), greater palatine, lesser palatine."},
  {name:"External cranial base — middle part", category:"Base of Skull", borders:"From the choanae to the anterior margin of foramen magnum.", definition:"Body of sphenoid, petrous parts of temporal bones, basilar part of occipital bone. Openings: foramen lacerum, pterygomaxillary fissure, foramen ovale, foramen spinosum, carotid canal."},
  {name:"External cranial base — posterior part", category:"Base of Skull", borders:"Formed by the occipital bone.", definition:"Contains foramen magnum (medulla, meninges, vertebral aa., CN XI), jugular foramen (CN IX, X, XI; IJV; inferior petrosal sinus), hypoglossal canal (CN XII), condylar canal (occipital emissary v.), canaliculus for tympanic n., mastoid canaliculus (Arnold's canal — CN X auricular branch)."},
  {name:"External cranial base — lateral part", category:"Base of Skull", borders:"Includes zygomatic arch, infratemporal & mandibular fossae, tympanic plate, styloid & mastoid processes.", definition:"Openings: petrotympanic fissure (chorda tympani), stylomastoid foramen (CN VII, stylomastoid a.), external acoustic opening, musculotubal canal, fossula petrosa, cochlear canaliculus."},
  {name:"Anterior cranial fossa", category:"Base of Skull", borders:"Frontal bone (anterolaterally), cribriform plate & crista galli of ethmoid (medially), orbital plate of frontal bone (inferiorly), lesser wings of sphenoid (posteriorly).", definition:"Houses frontal lobe, olfactory bulb & tract, orbital gyri. Openings: anterior ethmoidal foramen (anterior ethmoidal vessels & n.), cribriform foramina (olfactory nn.)."},
  {name:"Middle cranial fossa", category:"Base of Skull", borders:"Body and greater wings of sphenoid; squamous and petrous parts of temporal bone.", definition:"Houses pituitary gland, temporal lobes. Openings: optic canal (CN II, ophthalmic a.), superior orbital fissure (CN III, IV, VI, V1, ophthalmic vv., sympathetics), foramen rotundum (V2), foramen ovale (V3, lesser petrosal n., accessory meningeal a., emissary v.), foramen spinosum (middle meningeal a./v., meningeal br. of V3), foramen lacerum, carotid canal (ICA), hiatus for greater & lesser petrosal nn."},
  {name:"Posterior cranial fossa", category:"Base of Skull", borders:"Dorsum sellae anteriorly, groove for transverse sinus posteriorly. Petrous portion of temporal bone and basilar part of occipital bone.", definition:"Houses cerebellum and brainstem. Openings: internal acoustic meatus (CN VII, VIII, labyrinthine a.), foramen magnum (medulla, vertebral aa., CN XI ascending, dural vv., spinal aa.), opening of vestibular canaliculus, mastoid foramen, hypoglossal canal (CN XII), condylar canal, jugular foramen (CN IX, X, XI descending; IJV; inferior petrosal sinus; sigmoid sinus)."},

  // ---- NECK TRIANGLES ----
  {name:"Anterior triangle of neck", category:"Neck", borders:"Lateral: sternocleidomastoid (SCM). Medial: midline of neck. Superior: lower border of mandible.", definition:"Subdivided into the muscular, carotid, submandibular, and submental triangles by the omohyoid and digastric muscles."},
  {name:"Posterior triangle of neck", category:"Neck", borders:"Anterior: SCM. Posterior: trapezius. Inferior: clavicle.", definition:"Subdivided into the occipital and subclavian (omoclavicular) triangles by the inferior belly of omohyoid."},
  {name:"Submandibular triangle", category:"Neck", borders:"Superior: lower part of body of mandible. Inferoposterior: posterior belly of digastric. Inferoanterior: anterior belly of digastric. Floor: mylohyoid & hyoglossus muscles. Roof: skin, superficial fascia with platysma, deep cervical fascia.", definition:"Contains: submandibular gland, inferior portion of parotid gland, submandibular lymph nodes; mylohyoid & hypoglossal nerves; facial, sublingual & submental arteries and veins."},
  {name:"Lesser's (Pirogov's) triangle", category:"Neck", borders:"Superior: hypoglossal nerve. Inferior: anterior & posterior bellies of digastric.", definition:"Small triangle inside the submandibular triangle. Aids identifying the lingual artery (especially for ligation)."},
  {name:"Carotid triangle", category:"Neck", borders:"Lateral: SCM. Cranial: posterior belly of digastric. Caudoanterior: superior belly of omohyoid.", definition:"Contains common carotid (bifurcates into ECA & ICA within the triangle), IJV, hypoglossal n., spinal accessory n., ansa cervicalis, sympathetic trunk, internal & external laryngeal nn., larynx, thyroid."},
  {name:"Subclavian (omoclavicular) triangle", category:"Neck", borders:"Superior: inferior belly of omohyoid. Inferior: clavicle. Anterior: SCM.", definition:"Part of the lateral neck region, the subclavian a. and brachial plexus traverse this region en route to the upper limb."},
  {name:"Occipital triangle", category:"Neck", borders:"Inferior: inferior belly of omohyoid. Anterior: SCM. Posterior: trapezius.", definition:"Part of the lateral cervical region. Contains spinal accessory nerve (CN XI), cervical plexus branches, and the cervical lymph nodes."},
  {name:"Scalene fissure (interscalene triangle)", category:"Neck", borders:"Anterior: anterior scalene m. Posterior: middle scalene m. Inferior: first rib.", definition:"Triangular gap in the neck. Contains the brachial plexus and subclavian artery. Note: the subclavian vein runs anterior to the anterior scalene."},

  // ---- THORAX / AXILLA / ABDOMINAL WALL ----
  {name:"Axilla", category:"Thorax / Limb", borders:"Pyramidal region with apex (cervicoaxillary canal — between clavicle, 1st rib, and superior border of scapula), base (axillary fascia and skin), 4 walls — anterior (pec major/minor), posterior (subscapularis, teres major, latissimus dorsi), medial (serratus anterior over upper ribs), lateral (intertubercular sulcus of humerus).", definition:"Region beneath the glenohumeral joint of the upper limb and thorax. Contents: axillary a. & v., brachial plexus, axillary lymph nodes (mnemonic APICAL: Apical, Pectoral, Infraclavicular, Central, Axillary [humeral / lateral], Subscapular [posterior])."},
  {name:"Mediastinum", category:"Thorax", borders:"Anterior: thoracic wall (sternum & costal cartilages 1–5). Posterior: superior thoracic vertebral bodies. Lateral: parietal pleura. Superior: superior thoracic aperture. Inferior: diaphragm.", definition:"Region between the pleural cavities. Divided into superior mediastinum (above the sternal angle / T4-T5 disc) and inferior mediastinum (subdivided into anterior, middle, and posterior)."},
  {name:"Intercostal space", category:"Thorax", borders:"Between two adjacent ribs (11 intercostal spaces per side, named for the rib above).", definition:"Contains the neurovascular bundle (intercostal vein, artery, nerve — VAN, from superior to inferior), intercostal lymph nodes, and the intercostal muscles (external, internal, innermost)."},
  {name:"Inguinal canal", category:"Abdominal Wall", borders:"Anterior wall: aponeurosis of external oblique. Posterior wall: conjoint tendon and transversalis fascia. Floor: inguinal ligament. Roof: transversalis fascia, internal oblique, transversus abdominis.", definition:"Oblique passageway in the lower abdominal wall connecting deep inguinal ring (lateral, transversalis fascia → internal spermatic fascia) and superficial inguinal ring (aponeurosis of external oblique). Transmits spermatic cord (males) / round ligament of uterus (females), ilioinguinal n., genital br. of genitofemoral n."},
  {name:"Hesselbach's (inguinal) triangle", category:"Abdominal Wall", borders:"Medial: lateral margin of rectus abdominis. Lateral: inferior epigastric artery and vein. Inferior: inguinal ligament.", definition:"Site of direct inguinal hernias. Differentiates direct (medial to inferior epigastric vessels) from indirect hernias (lateral to inferior epigastric vessels)."},
  {name:"Rectus sheath", category:"Abdominal Wall", borders:"Anterior lamina + posterior lamina formed by aponeuroses of external oblique, internal oblique, and transversus abdominis. Posterior lamina is deficient below the umbilicus — its inferior margin is the arcuate line.", definition:"Fibrous sheath enveloping rectus abdominis. The midline crossing of fibers forms the linea alba, running from xiphoid process to pubic symphysis."},

  // ---- CLINICAL PROJECTION POINTS ----
  {name:"Labbé triangle", category:"Projection / Clinical", borders:"Transpyloric line (left costal arch 9th rib → right costal arch 9th rib) and the right 9th costal arch → left 8th costal arch.", definition:"Surface projection of the stomach onto the anterior abdominal wall."},
  {name:"Desjardin's point", category:"Projection / Clinical", borders:"On the line from apex of right axilla → umbilicus, ~6–7 cm from umbilicus.", definition:"Surface projection of the head of the pancreas and major duodenal papilla."},
  {name:"Murphy's point", category:"Projection / Clinical", borders:"Intersection of the right costal arch with the right midclavicular line.", definition:"Surface projection of the fundus of the gallbladder. Murphy's sign: pain on inspiration during palpation here suggests acute cholecystitis."},
  {name:"McBurney point", category:"Projection / Clinical", borders:"On the line from anterior superior iliac spine (ASIS) → umbilicus, at the lateral one-third (i.e. ~one-third from ASIS).", definition:"Surface projection of the root of the vermiform appendix. Tenderness here is the classic sign of acute appendicitis."},

             "Course: only CN to leave posterior surface of brainstem; passes through lateral wall of cavernous sinus"]},
      {h:"CN V — Trigeminal",
       list:["Nuclei: 3 sensory (mesencephalic, pontine/principal, spinal) + 1 motor (in pons)",
             "Function: facial sensation; muscles of mastication; tensor tympani; tensor veli palatini; mylohyoid; anterior belly of digastric",
             "Branches/Openings: V1 ophthalmic — superior orbital fissure; V2 maxillary — foramen rotundum; V3 mandibular — foramen ovale (carries motor root)"]},
      {h:"CN VI — Abducens",
       list:["Nucleus: floor of 4th ventricle, lower pons",
             "Function: lateral rectus (abduction)",
             "Opening in skull: superior orbital fissure",
             "Course: pontomedullary junction → subarachnoid space → Dorello's canal → cavernous sinus (within sinus, not in lateral wall) → SOF"]},
      {h:"CN VII — Facial",
       list:["Function: motor — muscles of facial expression, stapedius, stylohyoid, posterior belly of digastric; parasympathetic — lacrimal, submandibular, sublingual glands; taste anterior 2/3 of tongue (via chorda tympani); somatic sensation external acoustic meatus",
             "Openings: internal acoustic meatus → facial canal → exits at stylomastoid foramen; chorda tympani → petrotympanic fissure"]},
      {h:"CN VIII — Vestibulocochlear",
       list:["Function: hearing (cochlear) and balance (vestibular)",
             "Opening: internal acoustic meatus"]},
      {h:"CN IX — Glossopharyngeal",
       list:["Function: motor stylopharyngeus; parasympathetic to parotid (via lesser petrosal n. + otic ganglion); sensation oropharynx; taste posterior 1/3 tongue; carotid body/sinus chemo- & baroreceptors",
             "Opening: jugular foramen"]},
      {h:"CN X — Vagus",
       list:["Function: motor — pharynx, larynx, palate (excluding tensor veli palatini & stylopharyngeus); parasympathetic to thoracic & abdominal viscera (down to splenic flexure); sensation external acoustic meatus (auricular branch — Arnold's nerve)",
             "Opening: jugular foramen"]},
      {h:"CN XI — Accessory",
       list:["Function: SCM and trapezius (spinal root)",
             "Opening: jugular foramen (descending — exits the skull)"]},
      {h:"CN XII — Hypoglossal",
       list:["Function: all intrinsic & extrinsic muscles of tongue (except palatoglossus)",
             "Opening: hypoglossal canal"]},
      {img:"cranial-nerves.jpg", caption:"Cranial nerves and their skull base openings"},
    ]
  },

  // -------------------- NECK --------------------
  "anterior-triangle":{
    title:"Anterior triangle of neck",
    parent:"neck",
    body:[
      {h:"Overview",
       p:"The neck is divided into an anterior and a posterior (lateral) triangle by the SCM. The anterior triangle is further subdivided into the muscular, carotid, submandibular and submental triangles by the digastric and omohyoid muscles."},
      {h:"Submandibular triangle — borders",
       list:["Superior: lower part of body of mandible",
             "Inferoposterior: posterior belly of digastric",
             "Inferoanterior: anterior belly of digastric",
             "Floor: mylohyoid & hyoglossus muscles",
             "Roof: skin, superficial fascia (with platysma), deep cervical fascia"]},
      {h:"Lesser's (Pirogov's) triangle — within the submandibular triangle",
       list:["Superior: hypoglossal nerve",
             "Inferior: anterior & posterior bellies of digastric",
             "Use: assists locating the lingual artery (e.g. for ligation procedure)"]},
      {h:"Submandibular triangle — contents",
       list:["Nerves: mylohyoid, hypoglossal",
             "Arteries & veins: facial, sublingual, submental",
             "Submandibular gland",
             "Inferior portion of parotid gland",
             "Submandibular lymph nodes"]},
      {h:"Carotid triangle — borders",
       list:["Lateral: SCM",
             "Cranial: posterior belly of digastric",
             "Caudoanterior: superior belly of omohyoid"]},
      {h:"Carotid triangle — contents",
       list:["Common carotid (bifurcates here into ECA & ICA)",
             "Internal jugular vein",
             "External & internal laryngeal nn. (CN X)",
             "CN XI (spinal accessory), CN XII (hypoglossal)",
             "Ansa cervicalis",
             "Sympathetic trunk",
             "Larynx, thyroid"]},
      {img:"anterior-triangle.jpg", caption:"Subdivisions of the anterior triangle of the neck"},
    ]
  },
  "posterior-triangle":{
    title:"Posterior (lateral) triangle of neck",
    parent:"neck",
    body:[
      {h:"Borders of the posterior (lateral) cervical region",
       list:["Anterior: SCM",
             "Posterior: trapezius",
             "Inferior: clavicle"]},
      {h:"Subdivisions",
       p:"Subdivided by the inferior belly of omohyoid into the occipital triangle (above) and the subclavian (omoclavicular) triangle (below)."},
      {h:"Subclavian triangle",
       list:["Superior: inferior belly of omohyoid",
             "Inferior: clavicle",
             "Anterior: SCM",
             "Contents: 3rd part of subclavian a., subclavian v., trunks of brachial plexus, supraclavicular nerves, EJV (terminal portion)"]},
      {h:"Occipital triangle",
       list:["Inferior: inferior belly of omohyoid",
             "Anterior: SCM",
             "Posterior: trapezius",
             "Contents: spinal accessory n. (CN XI) — most superficial; cervical plexus brs. (lesser occipital, great auricular, transverse cervical, supraclavicular); occipital lymph nodes; transverse cervical a."]},
      {img:"posterior-triangle.jpg", caption:"Posterior cervical triangle and its subdivisions"},
    ]
  },
  "scalene-fissure":{
    title:"Scalene fissure (interscalene triangle)",
    parent:"neck",
    body:[
      {h:"Borders",
       list:["Anteriorly: anterior scalene muscle",
             "Posteriorly: middle scalene muscle",
             "Inferiorly: first rib"]},
      {h:"Contents",
       list:["Brachial plexus (trunks)",
             "Subclavian artery (3rd part)",
             "(Note: the subclavian vein passes anterior to the anterior scalene, NOT through the fissure)"]},
      {img:"scalene-fissure.jpg", caption:"The scalene fissure with brachial plexus and subclavian artery"},
      {h:"Clinical",
       p:"Compression of the neurovascular bundle here is one cause of thoracic outlet syndrome."},
    ]
  },

  // -------------------- CHEST --------------------
  "thoracic-wall":{
    title:"Thoracic wall topography",
    parent:"chest",
    body:[
      {h:"Layers",
       p:"Superficial skin → subcutaneous fat (except sternal area) → superficial common thoracic fascia (covers pectorals, serratus anterior, origin of external oblique; dorsolaterally also covers latissimus dorsi)."},
      {h:"Veins",
       p:"Thoraco-epigastric veins lie in subcutaneous tissue of the anterior and lateral chest walls and drain into the lateral thoracic vein → axillary vein. (Important collateral pathway in caval obstruction.)"},
      {h:"Intercostal space",
       p:"There are 11 intercostal spaces per side (numbered for the rib above). Each contains: intercostal vein, artery, and nerve (VAN, superior → inferior) and intercostal lymph nodes."},
      {img:"intercostal-space.jpg", caption:"Cross-section of an intercostal space (VAN bundle in the costal groove)"},
      {h:"Surface projections of the heart",
       list:["2nd intercostal space, right — 1 cm lateral to the sternum",
             "5th intercostal space, right — near the linea sternalis",
             "5th intercostal space, left — medial to the midclavicular line; corresponds to the apex of the heart",
             "2nd intercostal space, left — 2 cm lateral to the sternum"]},
      {h:"Surface projections of the lungs",
       p:"The apex projects superior to the 1st rib toward the neck. The horizontal pulmonary fissure projects onto the 4th intercostal space medially (right side)."},
      {h:"Pneumothorax",
       list:["Caused by entry of air into the pleural cavity → collapse of the lung",
             "Primary spontaneous — rupture of small subpleural blebs (e.g. with pressure changes; scuba diving)",
             "Secondary spontaneous — due to underlying lung disease",
             "Traumatic — gunshot, stab, blunt thoracic injury",
             "Tension — pleural air pressure exceeds atmospheric → mediastinal shift, decreased venous return",
             "Treatment: chest tube via the 5th–6th intercostal space at the midaxillary line ('nipple level')"]},
      {div:"callout warn", text:"<b>Clinical:</b> The neurovascular bundle runs along the inferior border of each rib — needles for thoracocentesis or chest tubes are inserted along the <b>upper border</b> of the rib below to avoid the bundle."},
    ]
  },
  "mediastinum":{
    title:"Mediastinum",
    parent:"chest",
    body:[
      {h:"Borders",
       list:["Anterior: thoracic wall (sternum & costal cartilages 1–5)",
             "Posterior: superior thoracic vertebral bodies",
             "Lateral: parietal pleura (mediastinal pleura)",
             "Superior: superior thoracic aperture",
             "Inferior: diaphragm"]},
      {h:"Divisions",
       list:["Superior mediastinum — above the thoracic plane (sternal angle to T4–T5 disc)",
             "Inferior mediastinum — below the thoracic plane:",
             "&nbsp;&nbsp;Anterior inferior mediastinum",
             "&nbsp;&nbsp;Middle inferior mediastinum",
             "&nbsp;&nbsp;Posterior inferior mediastinum"]},
      {h:"Key contents by compartment",
       list:["<b>Superior:</b> thymus (or its remnant), great vessels (arch of aorta, brachiocephalic vv. → SVC), trachea, esophagus, thoracic duct, vagus & phrenic nn., sympathetic trunk",
             "<b>Anterior inferior:</b> thymic remnants, lymph nodes, fat",
             "<b>Middle inferior:</b> heart in pericardium, ascending aorta, pulmonary trunk & main bronchi, phrenic nn.",
             "<b>Posterior inferior:</b> thoracic aorta, esophagus, thoracic duct, azygos & hemiazygos vv., sympathetic trunk, splanchnic nn."]},
      {img:"mediastinum.jpg", caption:"Sagittal and transverse divisions of the mediastinum"},
    ]
  },
  "axilla":{
    title:"Axilla",
    parent:"chest",
    body:[
      {h:"Overview",
       p:"The axilla is a pyramidal region under the glenohumeral joint, containing neurovascular structures travelling between the neck/thorax and the upper limb."},
      {h:"Boundaries (pyramid with apex, base, 4 walls)",
       list:["Apex (cervicoaxillary canal): bounded by the clavicle (anteriorly), the 1st rib (medially), and the superior border of the scapula (posteriorly)",
             "Base: skin, superficial fascia, axillary fascia (deep)",
             "Anterior wall: pectoralis major and minor",
             "Posterior wall: subscapularis, teres major, latissimus dorsi",
             "Medial wall: serratus anterior overlying the upper 4–5 ribs",
             "Lateral wall: intertubercular sulcus of humerus"]},
      {h:"Contents",
       list:["Axillary artery (3 parts, divided by pec minor) and axillary vein",
             "Brachial plexus (cords and branches)",
             "Lymph nodes (mnemonic — APICAL):",
             "&nbsp;&nbsp;<b>P</b>ectoral (anterior)",
             "&nbsp;&nbsp;<b>S</b>ubscapular (posterior)",
             "&nbsp;&nbsp;<b>I</b>nfraclavicular",
             "&nbsp;&nbsp;<b>C</b>entral",
             "&nbsp;&nbsp;<b>A</b>pical",
             "&nbsp;&nbsp;<b>H</b>umeral (lateral)"]},
      {img:"axilla.jpg", caption:"Boundaries and contents of the axilla"},
    ]
  },

  // -------------------- ABDOMEN --------------------
  "abdomen-ruq":{
    title:"Right Upper Quadrant (RUQ)",
    parent:"abdomen",
    body:[
      {h:"Definition",
       p:"The RUQ is bounded medially by the median plane and inferiorly by the transumbilical plane."},
      {h:"Main contents",
       list:["Liver — right lobe (and most of the left lobe)",
             "Gallbladder — fundus projects at Murphy's point (right costal arch × midclavicular line)",
             "Pylorus of the stomach",
             "Duodenum (parts 1, 2, and the head of pancreas — Desjardin's point)",
             "Right kidney and right adrenal gland",
             "Hepatic flexure of the colon (right colic flexure)",
             "Portion of transverse colon"]},
      {h:"Common pathology localizing to RUQ",
       list:["Acute cholecystitis (Murphy's sign)",
             "Hepatitis, hepatic abscess",
             "Duodenal ulcer (peptic disease)",
             "Right-sided pyelonephritis"]},
      {img:"abdomen-ruq.jpg", caption:"RUQ — surface and visceral landmarks"},
    ]
  },
  "abdomen-luq":{
    title:"Left Upper Quadrant (LUQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Stomach (most of it; Labbé triangle is its surface projection)",
             "Spleen",
             "Body and tail of pancreas",
             "Left kidney and left adrenal gland",
             "Splenic flexure of colon (left colic flexure)",
             "Portion of transverse and descending colon"]},
      {h:"Common pathology localizing to LUQ",
       list:["Splenic rupture (e.g. trauma; Kehr's sign — referred pain to the left shoulder)",
             "Gastric ulcer",
             "Acute pancreatitis (body/tail)",
             "Left-sided pyelonephritis"]},
      {img:"abdomen-luq.jpg", caption:"LUQ — surface and visceral landmarks"},
    ]
  },
  "abdomen-rlq":{
    title:"Right Lower Quadrant (RLQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Cecum",
             "Vermiform appendix (root projects at McBurney's point — 1/3 from ASIS on the line ASIS → umbilicus; alternative — Lanz point on the interspinous line, 5 cm right of midline for pelvic appendix)",
             "Ascending colon",
             "Terminal ileum",
             "Right ovary & uterine tube (in females)",
             "Right ureter (lower portion)",
             "Right spermatic cord (in males)"]},
      {h:"Common pathology localizing to RLQ",
       list:["Acute appendicitis (McBurney's tenderness; Rovsing, Psoas, Obturator signs)",
             "Crohn's disease (terminal ileitis)",
             "Right ovarian / tubal pathology (e.g. ectopic pregnancy)",
             "Right ureteric stone"]},
      {img:"abdomen-rlq.jpg", caption:"RLQ — surface and visceral landmarks (incl. McBurney's & Lanz points)"},
    ]
  },
  "abdomen-llq":{
    title:"Left Lower Quadrant (LLQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Sigmoid colon",
             "Descending colon",
             "Left ovary & uterine tube (in females)",
             "Left ureter (lower portion)",
             "Left spermatic cord (in males)"]},
      {h:"Common pathology localizing to LLQ",
       list:["Diverticulitis (sigmoid)",
             "Left ovarian / tubal pathology",
             "Left ureteric stone"]},
      {img:"abdomen-llq.jpg", caption:"LLQ — surface and visceral landmarks"},
    ]
  },
  "abdominal-wall":{
    title:"Abdominal wall & rectus sheath",
    parent:"abdomen",
    body:[
      {h:"Layers (superficial → deep)",
       list:["Skin",
             "Camper's fascia — subcutaneous fat",
             "Scarpa's fascia — membranous layer; separates superficial fatty layer from deeper fatty layer",
             "Deep fatty layer — thinner than the superficial layer",
             "Superficial abdominal fascia (of external oblique)",
             "External oblique",
             "Internal oblique",
             "Transversus abdominis",
             "Transversalis fascia (part of parietal abdominal fascia)",
             "Parietal peritoneum"]},
      {img:"abdominal-wall-layers.jpg", caption:"Layers of the abdominal wall"},
      {h:"Rectus sheath",
       list:["Fibrous structure that envelops the rectus abdominis",
             "Formed by the aponeuroses of external oblique, internal oblique, and transversus abdominis",
             "Has anterior & posterior laminae",
             "Posterior lamina is deficient below the umbilicus — its inferior margin forms the <b>arcuate line</b>",
             "Aponeurotic fibers cross in the midline forming the <b>linea alba</b> (xiphoid → pubic symphysis)"]},
      {h:"Neurovasculature — superficial layer",
       list:["Lies between Camper's and Scarpa's fascia",
             "Arteries: superficial epigastric a. (from femoral a.), superficial circumflex iliac a. (from femoral a.)"]},
      {h:"Neurovasculature — deeper layer",
       list:["Posterior intercostal aa.",
             "Subcostal a.",
             "Lumbar aa.",
             "Inferior epigastric a. — runs deep to the lateral umbilical fold"]},
      {h:"Innervation",
       list:["Last 5 intercostal nn. and subcostal n.",
             "Skin of inguinal canal: ilioinguinal & iliohypogastric nn.",
             "Muscles supplied by: intercostal nn., iliohypogastric n., ilioinguinal n."]},
      {h:"Surgical incisions",
       list:["<b>Median (midline) incision</b> through linea alba — minimal blood loss; avoids major nerves; gives broad access to the abdomen",
             "<b>Paramedian incision</b> — lateral to linea alba; gives access to lateral structures (kidney, spleen, adrenals); ligates blood and nerve supply medial to it (causing atrophy of the muscle medially)",
             "<b>Kocher (subcostal) incision</b> — begins inferior to xiphoid and extends inferolaterally parallel to the right costal margin; access to the gallbladder",
             "<b>McBurney / gridiron incision</b> — at McBurney's point, classically for open appendicectomy",
             "<b>Pfannenstiel incision</b> — low transverse curved incision above the pubis (e.g. C-section)"]},
      {div:"callout", text:"<b>Tip:</b> The arcuate line and the linea alba are key surgical landmarks — useful for laparotomy planning and component-separation hernia repair."},
    ]
  },
  "inguinal":{
    title:"Inguinal region",
    parent:"abdomen",
    body:[
      {h:"Overview",
       p:"The inguinal region lies between the anterior superior iliac spine (laterally) and the pubic tubercle (medially). It is the lower lateral part of the abdominal wall, just above the thigh region."},
      {h:"Inguinal canal — overview",
       p:"An oblique passageway between the muscle layers of the lower anterior abdominal wall, with deep (internal) and superficial (external) openings."},
      {h:"Rings",
       list:["<b>Deep inguinal ring</b> — internal opening; an outpouching of transversalis fascia which becomes the internal spermatic fascia (innermost cover of the spermatic cord)",
             "<b>Superficial inguinal ring</b> — opening in the aponeurosis of external oblique; bounded by medial & lateral crura and intercrural fibers; visible only after dissecting off the external spermatic fascia"]},
      {h:"Borders",
       list:["Anterior wall: aponeurosis of external oblique (reinforced laterally by internal oblique)",
             "Posterior wall: transversalis fascia (reinforced medially by conjoint tendon)",
             "Floor: inguinal ligament (and lacunar ligament medially)",
             "Roof: arching fibers of internal oblique and transversus abdominis (conjoint tendon)"]},
      {h:"Contents",
       list:["<b>Spermatic cord</b> (males) / <b>round ligament of uterus</b> (females)",
             "<b>Ilioinguinal n.</b> (lies on top of cord; emerges through superficial ring)",
             "<b>Genital branch of genitofemoral n.</b> (within cord)"]},
      {img:"inguinal-canal.jpg", caption:"Inguinal canal — borders, rings, contents"},
      {h:"Hesselbach's (inguinal) triangle",
       list:["Medial: lateral margin of rectus abdominis",
             "Lateral: inferior epigastric a. & v.",
             "Inferior: inguinal ligament"]},
      {h:"Hernias",
       list:["<b>Indirect inguinal hernia</b> — congenital or acquired; lateral to the inferior epigastric vessels; passes through the deep ring, traverses the canal, exits the superficial ring (may descend into scrotum)",
             "<b>Direct inguinal hernia</b> — acquired; medial to the inferior epigastric vessels; pushes through the Hesselbach's triangle (supravesical fossa) and exits the superficial ring",
             "<b>Femoral hernia</b> — through the femoral ring, emerges inferior to the inguinal ligament; more common in females (proportionally wider pelvis); high risk of strangulation"]},
      {div:"callout warn", text:"<b>Mnemonic:</b> 'MD's don't lie' — <b>M</b>edial = <b>D</b>irect; lateral = indirect (relative to inferior epigastric vessels)."},
    ]
  },
  "peritoneum":{
    title:"Peritoneal cavity",
    parent:"abdomen",
    body:[
      {h:"Overview",
       p:"The peritoneal cavity is subdivided into the greater sac and the lesser sac (omental bursa)."},
      {h:"Greater sac",
       p:"Accounts for most of the space in the peritoneal cavity. Begins at the diaphragm and ends in the pelvic cavity. Contains all peritoneal organs."},
      {h:"Lesser sac (omental bursa)",
       p:"Found behind the stomach, in front of the pancreas. Continuous with the greater sac through the epiploic foramen (foramen of Winslow)."},
      {h:"Borders of the epiploic foramen",
       list:["Anterior: hepatoduodenal ligament (portal triad — bile duct, hepatic a., portal v.)",
             "Posterior: IVC",
             "Superior: caudate lobe of liver",
             "Inferior: superior part of duodenum"]},
      {img:"lesser-sac.jpg", caption:"Transverse section through the lesser sac"},
      {h:"Supra- and infracolic compartments",
       p:"The peritoneal cavity is divided by the transverse mesocolon into a supracolic (above) and infracolic (below) compartment."},
      {h:"Supracolic compartment",
       p:"Contains: liver, gallbladder, stomach, duodenum, pancreas, spleen, lesser omentum (hepatoduodenal & hepatogastric ligaments)."},
      {h:"Infracolic compartment",
       p:"Contains the small intestine, large intestine, and the horizontal & ascending parts of the duodenum. Divided by the root of the mesentery into right and left infracolic spaces, each supplied by unpaired branches of the abdominal aorta."},
      {h:"Peritoneal recesses",
       list:["Duodenojejunal flexure — superior, inferior duodenal folds & fossae",
             "Ileocecal junction — superior & inferior ileocecal recesses",
             "Sigmoid recess — intersigmoid recess (beneath the sigmoid mesocolon)"]},
      {h:"Retroperitoneal organs (mnemonic — SAD PUCKER)",
       list:["<b>S</b>uprarenal (adrenal) glands",
             "<b>A</b>orta and IVC",
             "<b>D</b>uodenum (parts 2–4)",
             "<b>P</b>ancreas (except tail)",
             "<b>U</b>reters",
             "<b>C</b>olon (ascending & descending)",
             "<b>K</b>idneys",
             "<b>E</b>sophagus (lower part)",
             "<b>R</b>ectum (middle and lower thirds)"]},
    ]
  },
  "duodenum-pancreas":{
    title:"Duodenum & pancreas",
    parent:"abdomen",
    body:[
      {h:"Duodenum — four parts (~25 cm long, C-shaped)",
       list:["<b>Superior</b> — projects to the level of L1; intraperitoneal; wider proximal lumen called the duodenal ampulla (cap)",
             "<b>Descending</b> — descends along L1–L3; major duodenal papilla (foregut → midgut transition); minor duodenal papilla above",
             "<b>Horizontal</b> — crosses the vertebral column at L3; passes over the IVC and is crossed anteriorly by the SMA & SMV (superior mesenteric vessels)",
             "<b>Ascending</b> — from inferior border of pancreas to L2; ends at the duodenojejunal junction left of the midline"]},
      {h:"Relationships",
       p:"The duodenum curves from the anterior aspect of the pancreas to the posterolateral aspect, so the head of pancreas lies within the duodenal C."},
      {h:"Pancreas",
       list:["<b>Level of L1</b>: body & tail. The body forms the omental tuberosity (creates the omental bursa behind the stomach). The tail extends to the splenic hilum.",
             "<b>Level of L2</b>: head & uncinate process. The IVC lies posterior to the head; the bile duct enters the head from posterior."]},
      {h:"Vessels",
       list:["Splenic a. — courses along the superior border of body and tail",
             "Splenic v. — posterior to the body; merges with the SMV (posterior to the pancreatic neck) → forms the hepatic portal vein"]},
      {img:"duodenum-pancreas.jpg", caption:"Duodenum & pancreas — topography"},
    ]
  },
  "retroperitoneum":{
    title:"Retroperitoneum",
    parent:"abdomen",
    body:[
      {h:"Definition",
       p:"The retroperitoneum is the part of the dorsal abdominal cavity between the posterior parietal peritoneum and the transversalis fascia. It is continuous with the subperitoneal space."},
      {h:"Spaces (divided by the perirenal/Gerota's fascia)",
       list:["Anterior pararenal space",
             "Perirenal space",
             "Posterior pararenal space"]},
      {h:"Retroperitoneal organs",
       p:"Duodenum (except ampulla), pancreas, ascending and descending colon, kidneys, suprarenal glands, ureters, bladder, uterus, and rectum. Some are 'secondary retroperitoneal' (originally intraperitoneal — duodenum, pancreas, ascending & descending colon)."},
      {h:"Vessels",
       list:["Abdominal aorta and IVC ('great vessels')",
             "Iliac vessels (to the legs)"]},
      {h:"Nerves",
       list:["Branches of lumbar plexus and sacral plexus",
             "Right and left lumbar sympathetic trunks",
             "Thoracic splanchnic nerves (sympathetic)",
             "Four lumbar splanchnic nerves (sympathetic)",
             "Autonomic (prevertebral) plexuses (e.g. abdominal aortic plexus)"]},
      {h:"Lymphatics",
       p:"Lumbar trunks, cisterna chyli, lumbar lymph nodes."},
      {img:"retroperitoneum.jpg", caption:"Retroperitoneal anatomy"},
    ]
  },
  "projection-points":{
    title:"Surface projection points (abdominal landmarks)",
    parent:"abdomen",
    body:[
      {h:"Labbé triangle",
       p:"Surface projection of the stomach. Borders: transpyloric line (left 9th costal arch ↔ right 9th costal arch) and the right 9th costal arch ↔ left 8th costal arch."},
      {h:"Desjardin's point",
       p:"Projection of the head of pancreas and major duodenal papilla. Located on the line: apex of right axilla → umbilicus, ~6–7 cm from umbilicus."},
      {h:"Murphy's point",
       p:"Projection of the fundus of the gallbladder. Intersection of the right costal arch with the right midclavicular line. Tenderness on inspiration here = Murphy's sign (cholecystitis)."},
      {h:"McBurney's point",
       p:"Projection of the root of the vermiform appendix. On the line ASIS → umbilicus, at the lateral one-third (i.e. ~1/3 from ASIS)."},
      {h:"Lanz point",
       p:"Projection of a pelvic appendix. On the interspinous line (right ASIS ↔ left ASIS), 5 cm to the right of midline."},
      {img:"abdominal-projection-points.jpg", caption:"Classic abdominal projection points"},
    ]
  },

  // -------------------- PELVIS --------------------
  "male-pelvis":{
    title:"Male pelvis",
    parent:"pelvis",
    body:[
      {h:"Overview",

function el(tag, attrs={}, ...children){
    const e = document.createElement(tag);
    for(const k in attrs){
        if(k==="class") e.className = attrs[k];
        else if(k==="html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
    }
    for(const c of children){
        if(c==null) continue;
        if(typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
    }
    return e;
}

function setActiveNav(){
    const links = document.querySelectorAll('#topnav a');
    const cur = location.hash || '#/welcome';
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === cur || (cur.startsWith('#/topography') && a.getAttribute('href')==='#/topography') || (cur.startsWith('#/region/') && a.getAttribute('href')==='#/topography') || (cur.startsWith('#/cns/') && a.getAttribute('href')==='#/cns-pns') ));
}

function renderImagePlaceholder(filename, caption){
    return `<figure class="imgbox empty">
      <img alt="${caption||filename}" src="images/${filename}" onerror="this.style.display='none';this.parentNode.classList.add('empty');"/>
      <div class="ph-label">When prompted by Claude Code, upload an image: <code>images/${filename}</code><br><i>${caption||''}</i></div>
    </figure>`;
}

function renderBlocks(blocks){
    let html = "";
    for(const b of blocks){
        if(b.h) html += `<h3>${b.h}</h3>`;
        if(b.p) html += `<p>${b.p}</p>`;
        if(b.list){
            html += "<ul>";
            for(const li of b.list) html += `<li>${li}</li>`;
            html += "</ul>";
        }
        if(b.img) html += renderImagePlaceholder(b.img, b.caption);
        if(b.div) html += `<div class="${b.div}">${b.text}</div>`;
    }
    return html;
}

}

/* -------- Term library -------- */
function viewTerms(){
    const cats = [...new Set(TERMS.map(t=>t.category))].sort();
    return `
    <h1>Term Library</h1>
    <p class="muted">All topographic anatomical terms — focused on borders, contents, and clinical landmarks. ${TERMS.length} terms.</p>
    <div class="term-search">
        <input id="termq" placeholder="Search terms (e.g. McBurney, Hesselbach, Douglas, scalp...)" />
        <select id="termcat">
            <option value="">All categories</option>
            ${cats.map(c=>`<option>${c}</option>`).join("")}
        </select>
    </div>
    <div id="termlist" class="term-list"></div>
    `;
}

function renderTermList(){
    const q = (document.getElementById("termq")?.value||"").toLowerCase();
    const cat = document.getElementById("termcat")?.value||"";
    const filtered = TERMS.filter(t=>{
        const s = (t.name+" "+t.borders+" "+t.definition+" "+t.category).toLowerCase();
        return (!q || s.includes(q)) && (!cat || t.category===cat);
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const list = document.getElementById("termlist");
    if(!list) return;
    if(!filtered.length){
        list.innerHTML = `<div class="no-results">No terms match your search.</div>`;
        return;
    }
    list.innerHTML = filtered.map(t=>`
        <div class="term-card">
            <div class="cat">${t.category}</div>
            <h3>${t.name}</h3>
            <div class="borders"><b>Borders:</b> ${t.borders}</div>
            <p class="muted" style="font-size:13.5px">${t.definition}</p>
        </div>
    `).join("");
}

    {h:"Origin", p:"Originates from three sensory nuclei (mesencephalic, principal/pontine, spinal trigeminal) and one motor nucleus in the pons. The sensory ganglion is the trigeminal (Gasserian / semilunar) ganglion in Meckel's cave."},
    {h:"Branches and skull openings", list:[
      "<b>V1 — Ophthalmic</b>: superior orbital fissure. Branches: lacrimal, frontal (supraorbital + supratrochlear), nasociliary (incl. anterior ethmoidal, infratrochlear, long ciliary)",
      "<b>V2 — Maxillary</b>: foramen rotundum. Branches: zygomatic, infraorbital, superior alveolar, posterior superior nasal",
      "<b>V3 — Mandibular</b>: foramen ovale (carries motor root). Branches: auriculotemporal, inferior alveolar, lingual, buccal; motor to muscles of mastication, mylohyoid, anterior belly of digastric, tensor tympani, tensor veli palatini"
    ]},
    {img:"cn-5-trigeminal.jpg", caption:"Trigeminal nerve V1, V2, V3"},
  ]},
  "cn-6":{parent:"cn", title:"CN VI — Abducens", body:[
    {h:"Nucleus", p:"Lower pons — superior part of the floor of the 4th ventricle (under the facial colliculus)."},
    {h:"Function", p:"Lateral rectus (eye abduction)."},
    {h:"Skull opening", p:"Superior orbital fissure."},
    {h:"Course", p:"Pontomedullary junction → subarachnoid → pierces dura → travels in Dorello's canal → tip of petrous temporal bone → cavernous sinus (within sinus, NOT in lateral wall — most vulnerable to lesion in cavernous sinus syndromes) → SOF → lateral rectus."},
    {img:"cn-6-abducens.jpg", caption:"Abducens course through Dorello's canal"},
  ]},
  "cn-7":{parent:"cn", title:"CN VII — Facial", body:[
    {h:"Function", list:[
      "Motor: muscles of facial expression, stapedius, stylohyoid, posterior belly of digastric",
      "Parasympathetic: lacrimal gland (via greater petrosal), submandibular & sublingual glands (via chorda tympani → submandibular ganglion)",
      "Special sensory (taste): anterior 2/3 of tongue (chorda tympani)",
      "General sensory: external acoustic meatus skin"
    ]},
    {h:"Skull openings", list:["Internal acoustic meatus (entry)","Stylomastoid foramen (exit)","Chorda tympani — petrotympanic fissure"]},
    {h:"Course", p:"Pontomedullary junction → IAM → facial canal (geniculate ganglion → greater petrosal n. → nerve to stapedius → chorda tympani) → exits stylomastoid foramen → enters parotid gland (does not innervate it) → divides into 5 branches: temporal, zygomatic, buccal, mandibular, cervical (mnemonic: 'Two Zebras Bit My Cookie')."},
    {img:"cn-7-facial.jpg", caption:"Facial nerve branches and parasympathetic relays"},
  ]},
  "cn-8":{parent:"cn", title:"CN VIII — Vestibulocochlear", body:[
    {h:"Function", p:"Cochlear division — hearing. Vestibular division — balance and head position."},
    {h:"Skull opening", p:"Internal acoustic meatus."},
    {img:"cn-8-vestibulocochlear.jpg", caption:"Cochlear and vestibular pathways"},
  ]},
  "cn-9":{parent:"cn", title:"CN IX — Glossopharyngeal", body:[
    {h:"Function", list:[
      "Motor: stylopharyngeus",
      "Parasympathetic: parotid gland (via lesser petrosal n. → otic ganglion → auriculotemporal n. of V3)",
      "Special sensory (taste): posterior 1/3 of tongue",
      "General sensory: oropharynx, palatine tonsil, posterior 1/3 tongue, middle ear (Jacobson's nerve), carotid body & sinus"
    ]},
    {h:"Skull opening", p:"Jugular foramen."},
    {img:"cn-9-glossopharyngeal.jpg", caption:"Glossopharyngeal nerve"},
  ]},
  "cn-10":{parent:"cn", title:"CN X — Vagus", body:[
    {h:"Function", list:[
      "Motor: pharynx (except stylopharyngeus), larynx (recurrent laryngeal n.), palate (except tensor veli palatini)",
      "Parasympathetic: thoracic and abdominal viscera (down to splenic flexure of colon)",
      "Special sensory: taste from epiglottis",
      "General sensory: dura of posterior cranial fossa; external acoustic meatus (auricular branch — Arnold's nerve)"
    ]},
    {h:"Skull opening", p:"Jugular foramen."},
    {img:"cn-10-vagus.jpg", caption:"Vagus nerve thoracic and abdominal course"},
  ]},
  "cn-11":{parent:"cn", title:"CN XI — Accessory", body:[
    {h:"Function", p:"Spinal root: motor to sternocleidomastoid (SCM) and trapezius."},
    {h:"Skull opening", p:"Jugular foramen — exits the cranium."},
    {h:"Course", p:"Spinal root arises from the upper cervical cord (C1–C5/C6), ascends through the foramen magnum, joins (then leaves) the cranial root, and exits via the jugular foramen — descends in the posterior triangle of the neck. The cranial root joins CN X."},
    {img:"cn-11-accessory.jpg", caption:"Accessory nerve in the posterior triangle"},
  ]},
  "cn-12":{parent:"cn", title:"CN XII — Hypoglossal", body:[
    {h:"Function", p:"Motor to all intrinsic and extrinsic tongue muscles (genioglossus, hyoglossus, styloglossus) — except palatoglossus (CN X)."},
    {h:"Skull opening", p:"Hypoglossal canal."},
    {h:"Clinical", p:"Lower motor neuron lesion → tongue deviates toward the lesion side on protrusion (the unaffected genioglossus pushes it that way)."},
    {img:"cn-12-hypoglossal.jpg", caption:"Hypoglossal nerve"},
  ]},

  "cervical-plexus":{parent:"plexuses", title:"Cervical plexus (C1–C4)",body:[
    {h:"Cutaneous branches", list:[
      "Lesser occipital n. (C2)",
      "Great auricular n. (C2, C3)",
      "Transverse cervical n. (C2, C3)",
      "Supraclavicular nn. (C3, C4)"
    ]},
    {h:"Motor branches", list:[
      "Ansa cervicalis (C1–C3) — innervates strap muscles (omohyoid, sternohyoid, sternothyroid)",
      "Phrenic n. (C3, C4, C5) — diaphragm; '<b>C3, 4, 5 keep the diaphragm alive</b>'",
      "Direct branches to prevertebral muscles, levator scapulae, and middle scalene"
    ]},
    {img:"cervical-plexus.jpg", caption:"Cervical plexus and its branches"},
  ]},
  "brachial-plexus":{parent:"plexuses", title:"Brachial plexus (C5–T1)",body:[
    {h:"Organization (mnemonic — Real Texans Drink Cold Beer)", list:[
      "<b>R</b>oots — anterior rami of C5–T1",
      "<b>T</b>runks — superior (C5+C6), middle (C7), inferior (C8+T1)",
      "<b>D</b>ivisions — anterior & posterior of each trunk",
      "<b>C</b>ords — lateral, posterior, medial",
      "<b>B</b>ranches — terminal nerves"
    ]},
    {h:"Terminal branches (5 main)", list:[
      "Musculocutaneous n. (lateral cord; C5–C7) — anterior arm flexors",
      "Median n. (lateral + medial cords; C5–T1) — most forearm flexors, thenar eminence",
      "Ulnar n. (medial cord; C8–T1) — intrinsic hand muscles, hypothenar",
      "Axillary n. (posterior cord; C5–C6) — deltoid, teres minor",
      "Radial n. (posterior cord; C5–T1) — all extensors of arm and forearm"
    ]},
    {img:"brachial-plexus.jpg", caption:"Brachial plexus — roots, trunks, divisions, cords, branches"},
  ]},
  "lumbar-plexus":{parent:"plexuses", title:"Lumbar plexus (L1–L4)",body:[
    {h:"Major branches (mnemonic — I, I Get Lots Of Fun)", list:[
      "<b>I</b>liohypogastric n. (L1)",
      "<b>I</b>lioinguinal n. (L1)",
      "<b>G</b>enitofemoral n. (L1, L2)",
      "<b>L</b>ateral femoral cutaneous n. (L2, L3)",
      "<b>O</b>bturator n. (L2–L4)",
      "<b>F</b>emoral n. (L2–L4)"
    ]},
    {img:"lumbar-plexus.jpg", caption:"Lumbar plexus"},
  ]},
  "sacral-plexus":{parent:"plexuses", title:"Sacral plexus (L4–S4)",body:[
    {h:"Major branches", list:[
      "Sciatic n. (L4–S3) — largest nerve in the body; tibial + common fibular components",
      "Superior gluteal n. (L4–S1) — gluteus medius, minimus, TFL",
      "Inferior gluteal n. (L5–S2) — gluteus maximus",
      "Pudendal n. (S2–S4) — perineum, external urethral & anal sphincters",
      "Posterior femoral cutaneous n. (S1–S3) — skin of posterior thigh"
    ]},
    {img:"sacral-plexus.jpg", caption:"Sacral plexus"},
  ]},
  "coccygeal-plexus":{parent:"plexuses", title:"Coccygeal plexus (S4–Co1)", body:[
    {h:"Branches", p:"The anococcygeal nerve provides cutaneous innervation to the skin between the coccyx and the anus."},
    {img:"coccygeal-plexus.jpg", caption:"Coccygeal plexus"},
  ]},

  "sympathetic":{parent:"ans", title:"Sympathetic division", body:[
    {h:"Origin", p:"Thoracolumbar outflow — preganglionic neurons in the intermediolateral cell column of T1–L2."},
    {h:"Pathway", p:"Preganglionic axons exit via the ventral root → white ramus communicans → sympathetic chain (paravertebral) → either synapse there (passing back through gray ramus to spinal n. and reaching effectors via somatic distribution) or pass through to prevertebral (collateral) ganglia (e.g. celiac, superior mesenteric, inferior mesenteric) via splanchnic nerves."},
    {h:"Functions", p:"'Fight or flight'. Increases heart rate, dilates pupils, dilates bronchi, redirects blood to skeletal muscle, mobilizes glucose."},
    {img:"sympathetic.jpg", caption:"Sympathetic outflow"},
  ]},
  "parasympathetic":{parent:"ans", title:"Parasympathetic division", body:[
    {h:"Origin", p:"Craniosacral outflow."},
    {h:"Cranial outflow", list:[
      "CN III — Edinger-Westphal nucleus → ciliary ganglion → short ciliary nn. → sphincter pupillae & ciliary muscle",
      "CN VII — superior salivatory nucleus → greater petrosal → pterygopalatine ganglion → lacrimal gland & nasal/palatine glands; chorda tympani → submandibular ganglion → submandibular & sublingual glands",
      "CN IX — inferior salivatory nucleus → lesser petrosal → otic ganglion → auriculotemporal n. (V3) → parotid gland",
      "CN X — dorsal motor nucleus → thoracic and abdominal viscera (down to splenic flexure)"
    ]},
    {h:"Sacral outflow", p:"S2–S4 → pelvic splanchnic nerves → distal colon (from splenic flexure to anal canal), pelvic viscera (bladder, internal genitalia)."},
    {h:"Function", p:"'Rest and digest'. Slows heart rate, constricts pupils and bronchi, stimulates GI motility and secretions, contracts detrusor (voiding)."},
    {img:"parasympathetic.jpg", caption:"Cranio-sacral parasympathetic outflow"},
  ]},
  "enteric":{parent:"ans", title:"Enteric nervous system", body:[
    {h:"Plexuses", list:[
      "Myenteric plexus (Auerbach's) — between longitudinal and circular layers of muscularis externa; controls motility",
      "Submucosal plexus (Meissner's) — within the submucosa; controls secretion and local blood flow"
    ]},
    {h:"Importance", p:"Capable of independent reflex function (the 'second brain'). Modulated by the parasympathetic and sympathetic systems."},
    {img:"enteric.jpg", caption:"Enteric nervous system layers"},
  ]},
};

function viewCnsSub(id){
    const d = CNS_DETAILS[id];
    if(!d) return `<p>Section not found: ${id}</p>`;
    const sec = CNS_PNS[d.parent];
    return `
    <div class="crumbs">
        <a href="#/cns-pns">CNS / PNS</a> &rsaquo;
        <span>${sec?sec.title:""}</span> &rsaquo;
        <span>${d.title}</span>
    </div>
    <div class="region-header">
        <h1>${d.title}</h1>
    </div>
    <div class="section">
        ${renderBlocks(d.body)}
    </div>
    <div style="margin-top:18px"><a class="btn ghost" href="#/cns-pns">← Back to CNS / PNS</a></div>
    `;
}

/* ====================================================================
   ROUTER
   ==================================================================== */
function route(){
    const h = location.hash || "#/welcome";
    const app = document.getElementById("app");
    let html = "";
    if(h==="#/welcome" || h==="#/" || h===""){
        html = viewWelcome();
    } else if(h==="#/terms"){
        html = viewTerms();
    } else if(h==="#/topography"){
        html = viewTopography();
    } else if(h==="#/cns-pns"){
        html = viewCnsPns();
    } else if(h.startsWith("#/region/")){
        html = viewRegion(h.replace("#/region/",""));
    } else if(h.startsWith("#/sub/")){
        html = viewSub(h.replace("#/sub/",""));
    } else if(h.startsWith("#/cns/")){
        html = viewCnsSub(h.replace("#/cns/",""));
    } else {
        html = viewWelcome();
    }
    app.innerHTML = html;
    setActiveNav();

    // Wire up Term Library search
    if(h==="#/terms"){
        renderTermList();
        document.getElementById("termq").addEventListener("input", renderTermList);
        document.getElementById("termcat").addEventListener("change", renderTermList);
    }
    window.scrollTo({top:0, behavior:"instant"});
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
</script>
