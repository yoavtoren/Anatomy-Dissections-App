<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Anatomy — Topography, Terms & CNS/PNS</title>
<style>
/* ============================================================
   GLOBAL STYLES
   ============================================================ */
:root{
    --bg:#0e1726;
    --panel:#16213a;
    --panel-2:#1d2c4a;
    --ink:#e8eefc;
    --muted:#9fb0d0;
    --accent:#5dc1ff;
    --accent-2:#79f1c4;
    --warn:#ffd166;
    --danger:#ff7373;
    --border:#27375a;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header.site{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,rgba(14,23,38,.95),rgba(14,23,38,.85));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
}
.nav{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px}
.brand{font-weight:700;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;color:#fff}
.brand .dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2))}
nav.menu{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
nav.menu a{
    padding:8px 14px;border-radius:10px;color:var(--muted);font-weight:500;font-size:14px;
    border:1px solid transparent;
}
nav.menu a:hover{background:var(--panel);color:#fff;text-decoration:none}
nav.menu a.active{background:var(--panel-2);color:#fff;border-color:var(--border)}
main{max-width:1240px;margin:0 auto;padding:32px 22px 80px}
h1,h2,h3,h4{color:#fff;line-height:1.25}
h1{font-size:34px;margin:0 0 12px}
h2{font-size:24px;margin:32px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
h3{font-size:18px;margin:20px 0 8px;color:var(--accent-2)}
h4{font-size:15px;margin:14px 0 4px;color:var(--accent)}
p{margin:8px 0}
ul,ol{margin:8px 0 14px 22px}
li{margin:3px 0}
hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.muted{color:var(--muted)}
.kbd{background:var(--panel-2);padding:2px 6px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:var(--panel);font-size:12px;color:var(--muted);margin-right:6px}
.tag.green{color:#0c2;border-color:#1f5}
.tag.blue{color:#5cf;border-color:#39c}
.tag.red{color:#f88;border-color:#a44}
.tag.amber{color:#ffd166;border-color:#a78b3a}
.card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;
    box-shadow:var(--shadow);
}
.card + .card{margin-top:14px}
.btn{
    display:inline-block;padding:10px 18px;border-radius:10px;
    background:var(--accent);color:#021;font-weight:600;border:none;cursor:pointer;
    transition:transform .1s ease;
}
.btn:hover{transform:translateY(-1px);text-decoration:none}
.btn.alt{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn.small{padding:6px 12px;font-size:13px}
.grid{display:grid;gap:18px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media (max-width:900px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:600px){.grid{grid-template-columns:1fr !important}}

/* ============================================================
   WELCOME / HERO
   ============================================================ */
.hero{
    background:radial-gradient(1200px 500px at 0% 0%, rgba(93,193,255,.18), transparent 60%),
               radial-gradient(900px 500px at 100% 0%, rgba(121,241,196,.12), transparent 55%),
               linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--border);border-radius:18px;padding:42px 32px;margin-bottom:28px;
    box-shadow:var(--shadow);
}
.hero h1{font-size:42px;margin-bottom:6px}
.hero p.lead{font-size:17px;color:var(--muted);max-width:780px}
.tile{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;cursor:pointer;transition:transform .15s ease, border-color .2s;
    display:block;color:inherit;
}
.tile:hover{transform:translateY(-3px);border-color:var(--accent);text-decoration:none}
.tile h3{margin:0 0 6px;color:#fff;font-size:20px}
.tile p{margin:0;color:var(--muted);font-size:14px}
.tile .icon{
    width:48px;height:48px;border-radius:12px;
    background:linear-gradient(135deg,rgba(93,193,255,.25),rgba(121,241,196,.25));
    display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;
    border:1px solid var(--border);
}

/* ============================================================
   BODY MAP (SVG)
   ============================================================ */
.bodymap-wrap{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
    display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:flex-start;
}
@media(max-width:900px){.bodymap-wrap{grid-template-columns:1fr}}
.bodymap{width:100%;max-width:360px;margin:0 auto;display:block;user-select:none}
.bodymap .silhouette{fill:#22335a;stroke:#3a5587;stroke-width:1.3}
.bodymap .silhouette-2{fill:#1a2643;stroke:#3a5587;stroke-width:1.1}
.bodymap .hot{
    fill:rgba(93,193,255,.16);stroke:var(--accent);stroke-width:1.4;
    cursor:pointer;transition:fill .15s, stroke-width .15s;
}
.bodymap .hot:hover{fill:rgba(93,193,255,.45);stroke-width:2.2}
.bodymap .plus{
    fill:#fff;font-weight:700;font-size:22px;text-anchor:middle;
    pointer-events:none;
}
.bodymap .pulse{
    fill:var(--accent);
    animation:pulse 1.8s ease-out infinite;
    transform-origin:center;
}
@keyframes pulse{
    0%{opacity:.65;r:13}
    50%{opacity:.25;r:18}
    100%{opacity:.65;r:13}
}
.legend{font-size:13px;color:var(--muted)}
.legend ul{list-style:none;padding:0;margin:0}
.legend li{padding:8px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--panel-2);cursor:pointer;transition:background .2s}
.legend li:hover{background:#243962;color:#fff}
.legend li b{color:#fff}

.subregion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:14px}
.subregion-card{
    background:var(--panel-2);border:1px solid var(--border);border-radius:12px;
    padding:14px;cursor:pointer;transition:transform .12s, border-color .2s;
}
.subregion-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.subregion-card h4{margin:0 0 4px;color:#fff;font-size:15px}
.subregion-card p{margin:0;color:var(--muted);font-size:12.5px}

/* ============================================================
   TERM LIBRARY
   ============================================================ */
.term-search{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 16px;
}
.term-search input{
    flex:1 1 280px;padding:12px 14px;border-radius:10px;background:var(--panel-2);
    border:1px solid var(--border);color:#fff;font-size:15px;outline:none;
}
.term-search input:focus{border-color:var(--accent)}
.term-search select{
    padding:10px 12px;border-radius:10px;background:var(--panel-2);
    border:1px solid var(--border);color:#fff;font-size:14px;
}
.term-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.term-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
    transition:border-color .2s;
}
.term-card:hover{border-color:var(--accent)}
.term-card h3{margin:0 0 6px;font-size:16px}
.term-card .cat{font-size:11px;color:var(--accent-2);text-transform:uppercase;letter-spacing:.5px}
.term-card .borders{margin-top:8px;font-size:13.5px}
.term-card .borders b{color:var(--accent)}
.no-results{padding:30px;text-align:center;color:var(--muted)}

/* ============================================================
   REGION DETAIL PAGES
   ============================================================ */
.region-detail{display:grid;grid-template-columns:1fr;gap:18px}
.crumbs{font-size:13px;color:var(--muted);margin-bottom:6px}
.crumbs a{color:var(--accent)}
.region-header{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);border-radius:var(--radius);padding:24px;
}
.region-header h1{margin:0 0 6px}
.region-header p{margin:0;color:var(--muted)}
.section{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
}
.section h2{margin-top:0}
.section h3{margin-top:14px}
.callout{
    border-left:3px solid var(--accent);background:rgba(93,193,255,.08);
    padding:10px 14px;border-radius:8px;margin:12px 0;font-size:14px;
}
.callout.warn{border-left-color:var(--warn);background:rgba(255,209,102,.08)}
.callout.danger{border-left-color:var(--danger);background:rgba(255,115,115,.08)}

/* ============================================================
   IMAGE PLACEHOLDER
   ============================================================ */
.imgbox{
    margin:14px 0;border:2px dashed var(--border);border-radius:12px;
    padding:18px;text-align:center;background:var(--panel-2);color:var(--muted);
    transition:border-color .2s;
}
.imgbox img{max-width:100%;border-radius:8px;display:block;margin:0 auto}
.imgbox.empty::before{
    content:"";display:inline-block;width:48px;height:48px;border-radius:8px;
    background:linear-gradient(135deg,#2a3d68,#1a2643);margin-bottom:10px;
}
.imgbox .ph-label{font-size:13px;color:var(--muted)}
.imgbox .ph-label code{
    background:var(--panel);padding:2px 6px;border-radius:4px;color:var(--accent-2);
    border:1px solid var(--border);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;
}

/* ============================================================
   FOOTER
   ============================================================ */
footer{
    margin-top:60px;padding:24px;color:var(--muted);font-size:13px;
    text-align:center;border-top:1px solid var(--border);
}

/* ============================================================
   PRINT
   ============================================================ */
@media print{
    header.site,.hero,nav.menu{display:none}
    body{background:#fff;color:#000}
    .card,.section,.region-header,.term-card{border-color:#ccc;background:#fff;color:#000}
}

/* ============================================================
   AO-STYLE TOPOGRAPHY — two-panel layout + animated zoom
   ============================================================ */
.ao-topo-wrap{display:grid;grid-template-columns:1fr 345px;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:590px;box-shadow:var(--shadow)}
@media(max-width:960px){.ao-topo-wrap{grid-template-columns:1fr}}
.ao-figure-panel{position:relative;background:linear-gradient(145deg,#060c17,#0e1726);display:flex;align-items:center;justify-content:center;padding:28px 20px;min-height:570px}
.ao-svg-wrap{width:100%;max-width:285px}
#aoBodySvg{width:100%;display:block;user-select:none;cursor:crosshair}
.ao-lm-set{transition:opacity .45s ease}
#ao-hotspots{transition:opacity .3s ease}
.ao-toolbar{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:8px;z-index:5}
.ao-tool-btn{width:36px;height:36px;border-radius:10px;background:rgba(22,33,58,.92);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s,color .15s;line-height:1;padding:0}
.ao-tool-btn:hover{background:var(--panel-2);color:#fff}
.ao-region-badge{position:absolute;top:14px;right:14px;background:rgba(93,193,255,.15);border:1px solid rgba(93,193,255,.35);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.3px;opacity:0;transition:opacity .3s;pointer-events:none}
.ao-region-badge.show{opacity:1}
.ao-hint-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(14,23,38,.9);border:1px solid var(--border);border-radius:999px;padding:5px 16px;font-size:11.5px;color:var(--muted);white-space:nowrap;pointer-events:none;transition:opacity .3s}
.ao-info-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel)}
.ao-info-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);background:var(--panel-2)}
.ao-info-tag{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.ao-region-title-el{font-size:22px;font-weight:700;color:#fff;margin:0;line-height:1.2}
.ao-info-body{flex:1;overflow-y:auto;padding:16px}
.ao-sec-row{display:flex;align-items:center;gap:8px;margin:0 0 8px}
.ao-sec-bar{width:3px;height:16px;background:var(--accent);border-radius:2px;flex-shrink:0}
.ao-sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted)}
.ao-desc{font-size:13px;color:var(--muted);line-height:1.6;margin:0 0 16px}
.ao-sub-card{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer;background:var(--panel-2);transition:border-color .15s,background .15s;text-decoration:none;color:inherit}
.ao-sub-card:hover{border-color:var(--accent);background:rgba(93,193,255,.07);text-decoration:none}
.ao-sub-icon{width:26px;height:26px;border-radius:7px;background:rgba(93,193,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;margin-right:10px;flex-shrink:0;border:1px solid var(--border)}
.ao-sub-name{font-size:12.5px;font-weight:600;color:#fff;flex:1}
.ao-sub-arrow{color:var(--muted);font-size:15px;font-weight:700}
.ao-info-footer{padding:12px 16px;border-top:1px solid var(--border)}
.ao-full-link{width:100%;padding:12px;background:var(--accent);color:#021;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:transform .1s;display:block;text-align:center;text-decoration:none}
.ao-full-link:hover{transform:translateY(-1px);text-decoration:none}
</style>
</head>
<body>

<header class="site">
    <div class="nav">
        <a class="brand" href="#/welcome"><span class="dot"></span> Anatomy Atlas</a>
        <nav class="menu" id="topnav">
            <a href="#/welcome">Welcome</a>
            <a href="#/topography">Topography</a>
            <a href="#/cns-pns">CNS / PNS</a>
            <a href="#/terms">Term Library</a>
        </nav>
    </div>
</header>

<main id="app"></main>

<footer>
    <div>An interactive anatomy study atlas — built for the dissection workshop.</div>
    <div style="margin-top:6px">Content adapted from the provided regional anatomy and dissection workshop resources.</div>
</footer>

<script>
/* ====================================================================
   DATA — All anatomical content lives in this single object so the
   whole site is contained in one file (no external JSON, no servers).
   ==================================================================== */

/* ====================================================================
   AO-STYLE BODY MAP — zoom data + SVG label helpers + animation
   ==================================================================== */
const ZOOM_DATA = {

// Generate SVG markup for one region's landmark group
function makeLmGroup(regionId, zd){
    const {vb, fs, landmarks} = zd;
    const pillH = fs + 3.5;
    const lineLen = fs * 2.8;
    const charW = fs * 0.58;
    const items = landmarks.map(lm => {
        const isL = lm.dir === "l";
        const dir = isL ? -1 : 1;
        const lx2 = lm.x + dir * lineLen;
        const pillW = Math.max(charW * lm.label.length + 7, 18);
        const rx = isL ? lx2 - pillW : lx2;
        const ry = lm.y - pillH / 2;
        const tx = rx + 2.5;
        const ty = lm.y + fs * 0.36;
        return `<g onclick="location.hash='${lm.sub}';event.stopPropagation()" style="cursor:pointer">
          <circle cx="${lm.x.toFixed(1)}" cy="${lm.y.toFixed(1)}" r="${(fs*0.52).toFixed(1)}" style="fill:var(--accent)"/>
          <line x1="${lm.x.toFixed(1)}" y1="${lm.y.toFixed(1)}" x2="${lx2.toFixed(1)}" y2="${lm.y.toFixed(1)}" style="stroke:var(--accent);stroke-width:${(fs*0.18).toFixed(2)};opacity:.65"/>
          <rect x="${rx.toFixed(1)}" y="${ry.toFixed(1)}" width="${pillW.toFixed(1)}" height="${pillH.toFixed(1)}" rx="${(pillH*0.45).toFixed(1)}" style="fill:#101c33;stroke:#27375a;stroke-width:${(fs*0.11).toFixed(2)}"/>
          <text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" font-size="${fs}" font-weight="600" style="fill:#e8eefc" font-family="Inter,-apple-system,sans-serif">${lm.label}</text>
        </g>`;
    }).join("\n");
    return `<g id="ao-lm-${regionId.replace(/\//g,"-")}" class="ao-lm-set" style="opacity:0;pointer-events:none">${items}</g>`;
}

/* Body map animation state + helpers */
const bm = { cur:[0,0,400,720], tgt:[0,0,400,720], raf:null, active:null };

function _bmTick(){
    const spd = 0.13, svg = document.getElementById("aoBodySvg");
    let moving = false;
    for(let i=0;i<4;i++){
        const d = bm.tgt[i]-bm.cur[i];
        if(Math.abs(d)>0.08){bm.cur[i]+=d*spd;moving=true;}
        else bm.cur[i]=bm.tgt[i];
    }
    if(svg) svg.setAttribute("viewBox",bm.cur.map(n=>n.toFixed(2)).join(" "));
    bm.raf = moving ? requestAnimationFrame(_bmTick) : null;
}

function bmSelectRegion(id){
    if(bm.raf) cancelAnimationFrame(bm.raf);
    const zd = ZOOM_DATA[id]; if(!zd) return;
    bm.tgt=[...zd.vb]; bm.active=id;
    const hs=document.getElementById("ao-hotspots");
    if(hs){hs.style.opacity="0";hs.style.pointerEvents="none";}
    document.querySelectorAll(".ao-lm-set").forEach(g=>{g.style.opacity="0";g.style.pointerEvents="none";});
    setTimeout(()=>{
        const g=document.getElementById("ao-lm-"+id.replace(/\//g,"-"));
        if(g){g.style.opacity="1";g.style.pointerEvents="";}
    },460);
    const badge=document.getElementById("ao-region-badge");
    const reg=REGIONS.find(r=>r.id===id);
    if(badge&&reg){badge.textContent=reg.name;badge.classList.add("show");}
    const hint=document.getElementById("ao-hint");
    if(hint) hint.textContent="Click a label to view anatomical detail";
    bmUpdatePanel(id);
    bm.raf=requestAnimationFrame(_bmTick);
}

function bmReset(){
    if(bm.raf) cancelAnimationFrame(bm.raf);
    bm.tgt=[0,0,400,720]; bm.active=null;
    const hs=document.getElementById("ao-hotspots");
    if(hs){hs.style.opacity="1";hs.style.pointerEvents="";}
    document.querySelectorAll(".ao-lm-set").forEach(g=>{g.style.opacity="0";g.style.pointerEvents="none";});
    const badge=document.getElementById("ao-region-badge");
    if(badge) badge.classList.remove("show");
    const hint=document.getElementById("ao-hint");
    if(hint) hint.textContent="Select a region to explore anatomy";
    bmUpdatePanel(null);
    bm.raf=requestAnimationFrame(_bmTick);
}

function bmUpdatePanel(id){
    const titleEl=document.getElementById("ao-region-title");
    const descEl=document.getElementById("ao-region-desc");
    const subsEl=document.getElementById("ao-region-subs");
    const subsLbl=document.getElementById("ao-subs-label");
    const footerLink=document.getElementById("ao-full-link");
    if(!titleEl) return;
    if(!id){
        titleEl.textContent="Overview";
        if(descEl) descEl.textContent="Select a region to drill into subregion anatomy — click any '+' on the figure or choose below.";
        if(subsLbl) subsLbl.textContent="All Regions";
        if(footerLink) footerLink.style.display="none";
        if(subsEl) subsEl.innerHTML=REGIONS.map(r=>{
            const zd=ZOOM_DATA[r.id];
            return `<div class="ao-sub-card" onclick="bmSelectRegion('${r.id}')">
              <div class="ao-sub-icon">${zd?zd.icon:"+"}</div>
              <span class="ao-sub-name">${r.name}</span>
              <span class="ao-sub-arrow">›</span>
            </div>`;
        }).join("");
    } else {
        const zd=ZOOM_DATA[id];
        const reg=REGIONS.find(r=>r.id===id);
        if(!zd||!reg) return;
        titleEl.textContent=reg.name;
        if(descEl) descEl.textContent=zd.desc;
        if(subsLbl) subsLbl.textContent="Subregions";
        if(footerLink){footerLink.href="#/region/"+id;footerLink.textContent="Open Full Region →";footerLink.style.display="block";}
        if(subsEl&&reg.sub) subsEl.innerHTML=reg.sub.map(s=>`
            <div class="ao-sub-card" onclick="location.hash='#/sub/${s.id}'">
              <div class="ao-sub-icon">📋</div>
              <span class="ao-sub-name">${s.name}</span>
              <span class="ao-sub-arrow">›</span>
            </div>`).join("");
    }
}

const TERMS = [
  // ---- HEAD & FACE ----
  {name:"Scalp", category:"Head", borders:"Anteriorly: supraorbital fissure. Posteriorly: superior nuchal line / external occipital protuberance. Laterally: superior temporal line.", definition:"Tissue covering the skull. Five layers (mnemonic SCALP): Skin, dense Connective tissue, Aponeurosis (galea), Loose connective tissue, Pericranium."},
  {name:"Temporal fossa", category:"Head", borders:"Lateral: zygomatic arch. Superior: superior temporal line. Ventral: temporal process of zygomatic bone. Inferior: infratemporal crest of greater wing. Medial: squamous part of temporal bone & temporal surface of greater wing.", definition:"Lateral aspect of the skull. Contains temporal n., anterior/posterior/middle temporal a. & v., zygomaticotemporal n."},
  {name:"Infratemporal fossa", category:"Head", borders:"Cranial: infratemporal surface of greater wing of sphenoid + squamous part of temporal bone. Ventral: maxillary tuberosity. Dorsal: continuous with pre-styloid space. Medial: lateral plate of pterygoid process. Lateral: ramus of mandible.", definition:"Irregularly shaped depression below the temporal fossa, medial and inferior to the zygomatic arch. Not fully enclosed by bone. Communicates with temporal fossa, pterygopalatine fossa (via pterygomaxillary fissure), and middle cranial fossa (via foramen ovale, foramen spinosum)."},
  {name:"Pterygopalatine fossa", category:"Head", borders:"Cranial: maxillary surface of greater wing of sphenoid. Ventral: infratemporal surface of maxilla. Dorsal: pterygoid process of sphenoid. Medial: perpendicular plate of palatine bone. Lateral: pterygomaxillary fissure (connects to infratemporal fossa). Caudal: continues as greater palatine canal.", definition:"Narrow pyramidal gap between the posterior wall of the maxilla and the pterygoid process, with apex pointing downward. Hub for V2 and the pterygopalatine ganglion."},
  {name:"Orbital region", category:"Head", borders:"Extent of orbicularis oculi muscle; includes eyelids (palpebrae) and orbital septum.", definition:"Surrounds the orbit. Contains lacrimal pathway (caruncle, puncta, sac). Supplied by superior & inferior palpebral arches; V1 (upper eyelid) and V2 (lower eyelid)."},
  {name:"Nasal region", category:"Head", borders:"Defined by the bony and cartilaginous skeleton of the nose.", definition:"Contains nasalis and procerus muscles. Supplied by angular a., dorsal nasal a., infraorbital a.; drained by facial v. and nasofrontal v.; innervated by V1 and V2."},
  {name:"Oral region", category:"Head", borders:"Bounded by the nasolabial and mentolabial grooves; formed by upper and lower lips.", definition:"Muscles: orbicularis oris and modiolus. Arteries: superior & inferior labial (from facial a.). Vein: facial v. Glands: submandibular & submental. Nerves: V2 (upper lip), mental n. (lower lip)."},
  {name:"Buccal region", category:"Head", borders:"Between the oral and parotidomasseteric regions.", definition:"Thick skin and buccal fat pads. Supplied by facial a./v.; innervated by facial nerve (motor) and buccal n. (sensory)."},
  {name:"Parotidomasseteric region", category:"Head", borders:"Zygomatic arch superiorly; between masseter and infratemporal region.", definition:"Thick skin overlying the parotid gland, masseter muscle, and the temporomandibular joint."},
  {name:"Mental region", category:"Head", borders:"The chin.", definition:"Chin group of facial expression muscles. Palpation point for V3 (mental nerve)."},
  {name:"Infraorbital region", category:"Head", borders:"Below the orbit, lateral to nasal region.", definition:"Palpation point of V2 (infraorbital nerve, exits the infraorbital foramen)."},

  // ---- BASE OF SKULL ----
  {name:"External cranial base — anterior part", category:"Base of Skull", borders:"From superior incisor teeth to choanae.", definition:"Composed of alveolar processes of maxilla, choanae, and bony palate. Foramina: incisive (nasopalatine n., sphenopalatine a.), greater palatine, lesser palatine."},
  {name:"External cranial base — middle part", category:"Base of Skull", borders:"From the choanae to the anterior margin of foramen magnum.", definition:"Body of sphenoid, petrous parts of temporal bones, basilar part of occipital bone. Openings: foramen lacerum, pterygomaxillary fissure, foramen ovale, foramen spinosum, carotid canal."},
  {name:"External cranial base — posterior part", category:"Base of Skull", borders:"Formed by the occipital bone.", definition:"Contains foramen magnum (medulla, meninges, vertebral aa., CN XI), jugular foramen (CN IX, X, XI; IJV; inferior petrosal sinus), hypoglossal canal (CN XII), condylar canal (occipital emissary v.), canaliculus for tympanic n., mastoid canaliculus (Arnold's canal — CN X auricular branch)."},
  {name:"External cranial base — lateral part", category:"Base of Skull", borders:"Includes zygomatic arch, infratemporal & mandibular fossae, tympanic plate, styloid & mastoid processes.", definition:"Openings: petrotympanic fissure (chorda tympani), stylomastoid foramen (CN VII, stylomastoid a.), external acoustic opening, musculotubal canal, fossula petrosa, cochlear canaliculus."},
  {name:"Anterior cranial fossa", category:"Base of Skull", borders:"Frontal bone (anterolaterally), cribriform plate & crista galli of ethmoid (medially), orbital plate of frontal bone (inferiorly), lesser wings of sphenoid (posteriorly).", definition:"Houses frontal lobe, olfactory bulb & tract, orbital gyri. Openings: anterior ethmoidal foramen (anterior ethmoidal vessels & n.), cribriform foramina (olfactory nn.)."},
  {name:"Middle cranial fossa", category:"Base of Skull", borders:"Body and greater wings of sphenoid; squamous and petrous parts of temporal bone.", definition:"Houses pituitary gland, temporal lobes. Openings: optic canal (CN II, ophthalmic a.), superior orbital fissure (CN III, IV, VI, V1, ophthalmic vv., sympathetics), foramen rotundum (V2), foramen ovale (V3, lesser petrosal n., accessory meningeal a., emissary v.), foramen spinosum (middle meningeal a./v., meningeal br. of V3), foramen lacerum, carotid canal (ICA), hiatus for greater & lesser petrosal nn."},
  {name:"Posterior cranial fossa", category:"Base of Skull", borders:"Dorsum sellae anteriorly, groove for transverse sinus posteriorly. Petrous portion of temporal bone and basilar part of occipital bone.", definition:"Houses cerebellum and brainstem. Openings: internal acoustic meatus (CN VII, VIII, labyrinthine a.), foramen magnum (medulla, vertebral aa., CN XI ascending, dural vv., spinal aa.), opening of vestibular canaliculus, mastoid foramen, hypoglossal canal (CN XII), condylar canal, jugular foramen (CN IX, X, XI descending; IJV; inferior petrosal sinus; sigmoid sinus)."},

  // ---- NECK TRIANGLES ----
  {name:"Anterior triangle of neck", category:"Neck", borders:"Lateral: sternocleidomastoid (SCM). Medial: midline of neck. Superior: lower border of mandible.", definition:"Subdivided into the muscular, carotid, submandibular, and submental triangles by the omohyoid and digastric muscles."},
  {name:"Posterior triangle of neck", category:"Neck", borders:"Anterior: SCM. Posterior: trapezius. Inferior: clavicle.", definition:"Subdivided into the occipital and subclavian (omoclavicular) triangles by the inferior belly of omohyoid."},
  {name:"Submandibular triangle", category:"Neck", borders:"Superior: lower part of body of mandible. Inferoposterior: posterior belly of digastric. Inferoanterior: anterior belly of digastric. Floor: mylohyoid & hyoglossus muscles. Roof: skin, superficial fascia with platysma, deep cervical fascia.", definition:"Contains: submandibular gland, inferior portion of parotid gland, submandibular lymph nodes; mylohyoid & hypoglossal nerves; facial, sublingual & submental arteries and veins."},
  {name:"Lesser's (Pirogov's) triangle", category:"Neck", borders:"Superior: hypoglossal nerve. Inferior: anterior & posterior bellies of digastric.", definition:"Small triangle inside the submandibular triangle. Aids identifying the lingual artery (especially for ligation)."},
  {name:"Carotid triangle", category:"Neck", borders:"Lateral: SCM. Cranial: posterior belly of digastric. Caudoanterior: superior belly of omohyoid.", definition:"Contains common carotid (bifurcates into ECA & ICA within the triangle), IJV, hypoglossal n., spinal accessory n., ansa cervicalis, sympathetic trunk, internal & external laryngeal nn., larynx, thyroid."},
  {name:"Subclavian (omoclavicular) triangle", category:"Neck", borders:"Superior: inferior belly of omohyoid. Inferior: clavicle. Anterior: SCM.", definition:"Part of the lateral neck region, the subclavian a. and brachial plexus traverse this region en route to the upper limb."},
  {name:"Occipital triangle", category:"Neck", borders:"Inferior: inferior belly of omohyoid. Anterior: SCM. Posterior: trapezius.", definition:"Part of the lateral cervical region. Contains spinal accessory nerve (CN XI), cervical plexus branches, and the cervical lymph nodes."},
  {name:"Scalene fissure (interscalene triangle)", category:"Neck", borders:"Anterior: anterior scalene m. Posterior: middle scalene m. Inferior: first rib.", definition:"Triangular gap in the neck. Contains the brachial plexus and subclavian artery. Note: the subclavian vein runs anterior to the anterior scalene."},

  // ---- THORAX / AXILLA / ABDOMINAL WALL ----
  {name:"Axilla", category:"Thorax / Limb", borders:"Pyramidal region with apex (cervicoaxillary canal — between clavicle, 1st rib, and superior border of scapula), base (axillary fascia and skin), 4 walls — anterior (pec major/minor), posterior (subscapularis, teres major, latissimus dorsi), medial (serratus anterior over upper ribs), lateral (intertubercular sulcus of humerus).", definition:"Region beneath the glenohumeral joint of the upper limb and thorax. Contents: axillary a. & v., brachial plexus, axillary lymph nodes (mnemonic APICAL: Apical, Pectoral, Infraclavicular, Central, Axillary [humeral / lateral], Subscapular [posterior])."},
  {name:"Mediastinum", category:"Thorax", borders:"Anterior: thoracic wall (sternum & costal cartilages 1–5). Posterior: superior thoracic vertebral bodies. Lateral: parietal pleura. Superior: superior thoracic aperture. Inferior: diaphragm.", definition:"Region between the pleural cavities. Divided into superior mediastinum (above the sternal angle / T4-T5 disc) and inferior mediastinum (subdivided into anterior, middle, and posterior)."},
  {name:"Intercostal space", category:"Thorax", borders:"Between two adjacent ribs (11 intercostal spaces per side, named for the rib above).", definition:"Contains the neurovascular bundle (intercostal vein, artery, nerve — VAN, from superior to inferior), intercostal lymph nodes, and the intercostal muscles (external, internal, innermost)."},
  {name:"Inguinal canal", category:"Abdominal Wall", borders:"Anterior wall: aponeurosis of external oblique. Posterior wall: conjoint tendon and transversalis fascia. Floor: inguinal ligament. Roof: transversalis fascia, internal oblique, transversus abdominis.", definition:"Oblique passageway in the lower abdominal wall connecting deep inguinal ring (lateral, transversalis fascia → internal spermatic fascia) and superficial inguinal ring (aponeurosis of external oblique). Transmits spermatic cord (males) / round ligament of uterus (females), ilioinguinal n., genital br. of genitofemoral n."},
  {name:"Hesselbach's (inguinal) triangle", category:"Abdominal Wall", borders:"Medial: lateral margin of rectus abdominis. Lateral: inferior epigastric artery and vein. Inferior: inguinal ligament.", definition:"Site of direct inguinal hernias. Differentiates direct (medial to inferior epigastric vessels) from indirect hernias (lateral to inferior epigastric vessels)."},
  {name:"Rectus sheath", category:"Abdominal Wall", borders:"Anterior lamina + posterior lamina formed by aponeuroses of external oblique, internal oblique, and transversus abdominis. Posterior lamina is deficient below the umbilicus — its inferior margin is the arcuate line.", definition:"Fibrous sheath enveloping rectus abdominis. The midline crossing of fibers forms the linea alba, running from xiphoid process to pubic symphysis."},

  // ---- CLINICAL PROJECTION POINTS ----
  {name:"Labbé triangle", category:"Projection / Clinical", borders:"Transpyloric line (left costal arch 9th rib → right costal arch 9th rib) and the right 9th costal arch → left 8th costal arch.", definition:"Surface projection of the stomach onto the anterior abdominal wall."},
  {name:"Desjardin's point", category:"Projection / Clinical", borders:"On the line from apex of right axilla → umbilicus, ~6–7 cm from umbilicus.", definition:"Surface projection of the head of the pancreas and major duodenal papilla."},
  {name:"Murphy's point", category:"Projection / Clinical", borders:"Intersection of the right costal arch with the right midclavicular line.", definition:"Surface projection of the fundus of the gallbladder. Murphy's sign: pain on inspiration during palpation here suggests acute cholecystitis."},
  {name:"McBurney point", category:"Projection / Clinical", borders:"On the line from anterior superior iliac spine (ASIS) → umbilicus, at the lateral one-third (i.e. ~one-third from ASIS).", definition:"Surface projection of the root of the vermiform appendix. Tenderness here is the classic sign of acute appendicitis."},
  {name:"Lanz point", category:"Projection / Clinical", borders:"On the interspinous line (between right & left ASIS), 5 cm to the right of midline.", definition:"Surface projection of the appendix in pelvic position."},
  {name:"Pouch of Douglas (rectouterine pouch)", category:"Pelvis", borders:"Anterior: posterior fornix of vagina / posterior wall of uterus. Posterior: anterior surface of rectum. Lateral: rectouterine folds.", definition:"Most dependent peritoneal recess in females, between the uterus and rectum. Common site of fluid accumulation (blood in ectopic pregnancy, pus in pelvic abscess); accessible through the posterior vaginal fornix (culdocentesis)."},
  {name:"Vesicouterine pouch", category:"Pelvis", borders:"Anterior: posterior surface of urinary bladder. Posterior: anterior surface of uterus.", definition:"Peritoneal recess between bladder and uterus in females."},
  {name:"Rectovesical pouch", category:"Pelvis", borders:"Anterior: posterior surface of urinary bladder. Posterior: anterior surface of rectum.", definition:"Most dependent peritoneal recess in males, between the bladder and rectum."},

  // ---- PERITONEAL CAVITY ----
  {name:"Greater sac (peritoneal cavity)", category:"Peritoneum", borders:"From diaphragm above to the pelvic cavity below; bounded by the parietal peritoneum.", definition:"The main and largest part of the peritoneal cavity. Contains all peritoneal organs except those in the lesser sac."},
  {name:"Lesser sac (omental bursa)", category:"Peritoneum", borders:"Anterior: stomach + lesser omentum. Posterior: pancreas (and retroperitoneal structures). Communicates with the greater sac through the epiploic (omental) foramen of Winslow.", definition:"Recess of the peritoneal cavity behind the stomach and in front of the pancreas. Allows free movement of the stomach."},
  {name:"Epiploic foramen (foramen of Winslow)", category:"Peritoneum", borders:"Anterior: hepatoduodenal ligament (containing portal triad — bile duct, hepatic artery, portal vein). Posterior: IVC. Superior: caudate lobe of liver. Inferior: superior part of duodenum.", definition:"Sole communication between the greater and lesser sacs. Pringle maneuver compresses the hepatoduodenal ligament here to control bleeding from hepatic vessels."},
  {name:"Supramesocolic compartment", category:"Peritoneum", borders:"Above the transverse mesocolon.", definition:"Contains liver, gallbladder, stomach, duodenum, pancreas, spleen, lesser omentum (hepatoduodenal & hepatogastric ligaments)."},
  {name:"Inframesocolic compartment", category:"Peritoneum", borders:"Below the transverse mesocolon. Divided by the mesentery root into right and left infracolic spaces.", definition:"Contains the small intestine and large intestine; horizontal & ascending parts of duodenum."},

  // ---- GLUTEAL / PELVIC FLOOR ----
  {name:"Gluteal region", category:"Lower Limb", borders:"Roof: iliac crest. Floor: lower border of gluteus maximus.", definition:"Posterolateral region of the pelvic girdle. Superficial muscles: gluteus maximus, tensor fasciae latae. Deep muscles: gluteus medius, gluteus minimus, piriformis, quadratus femoris, triceps coxae (gemellus superior, gemellus inferior, obturator internus). Supplied by superior & inferior gluteal arteries (from internal iliac)."},
  {name:"Greater sciatic foramen", category:"Pelvis", borders:"Suprapiriform: above the piriformis. Infrapiriform: below the piriformis.", definition:"Suprapiriform: superior gluteal n. & vessels. Infrapiriform: inferior gluteal n. & vessels, sciatic n., posterior femoral cutaneous n., n. to quadratus femoris, pudendal n., internal pudendal vessels, n. to obturator internus."},
  {name:"Lesser sciatic foramen", category:"Pelvis", borders:"Bordered by the lesser sciatic notch; mostly filled by the gemelli muscles' origins.", definition:"Transmits: tendon of obturator internus, pudendal nerve, internal pudendal vessels."},
  {name:"Ischioanal (ischiorectal) fossa", category:"Pelvis", borders:"Lateral: obturator internus muscle and ischial tuberosity. Medial: external anal sphincter and levator ani. Superior: pelvic diaphragm. Inferior: skin.", definition:"Wedge-shaped fat-filled space lateral to the anal canal. Allows expansion of the anal canal during defecation. Contains the pudendal canal (Alcock's canal) on its lateral wall — pudendal n. and internal pudendal vessels."},
  {name:"Perineum", category:"Pelvis", borders:"Anterior: pubic symphysis. Posterior: tip of coccyx. Lateral: inferior pubic & ischial rami, sacrotuberous ligament. Roof: pelvic floor. Base: skin and fascia.", definition:"Diamond-shaped region forming the inferior outlet of the pelvis. Divided by a transverse line between the ischial tuberosities into the urogenital triangle (anterior) and anal triangle (posterior)."},
  {name:"Urogenital triangle", category:"Pelvis", borders:"Pubic symphysis (anterior), ischiopubic rami (lateral), interischial line (posterior).", definition:"Anterior half of the perineum. Contains external genitalia and urethra. Has an additional layer of strong deep fascia, the perineal membrane."},
  {name:"Anal triangle", category:"Pelvis", borders:"Coccyx (posterior), sacrotuberous ligaments (lateral), interischial line (anterior).", definition:"Posterior half of the perineum. Contents: anal aperture, external anal sphincter, ischioanal fossae (×2), and the pudendal nerve supplying perineum sensation."},
  {name:"Perineal body (central tendon of perineum)", category:"Pelvis", borders:"Located in the centre of the perineum, between the urogenital and anal triangles.", definition:"Fibromuscular node — common attachment for: bulbospongiosus, superficial & deep transverse perineal muscles, external anal sphincter, levator ani (puborectalis), and external urethral sphincter (in part)."},

  // ---- VERTEBRAL CANAL ----
  {name:"Vertebral canal", category:"Back / Spine", borders:"Formed by successive vertebral foramina; extends from foramen magnum to sacral hiatus.", definition:"Contains spinal cord, meninges, spinal roots, epidural fat, and venous plexus. For clinical use: divided into central zone (between medial margins of facet joints) and lateral zones (subarticular / lateral recess, foraminal, extraforaminal)."},
  {name:"Epidural space", category:"Back / Spine", borders:"Between spinal dura mater and the wall of the vertebral canal.", definition:"Contains epidural fat and the internal vertebral venous plexus (Batson's plexus). Site of epidural anesthesia. Entered in the midline posteriorly where it is deepest."},
  {name:"Lumbar cistern", category:"Back / Spine", borders:"Subarachnoid space below conus medullaris (typically L1–L2 in adults), down to S2.", definition:"Contains CSF, cauda equina, filum terminale. Target for lumbar puncture. Needle path: skin → subcutaneous tissue → supraspinous ligament → interspinous ligament → ligamentum flavum → epidural space → dura mater → arachnoid → subarachnoid space."},

  // ---- MORE TOPOGRAPHIES ----
  {name:"Femoral triangle", category:"Lower Limb", borders:"Superior (base): inguinal ligament. Lateral: medial border of sartorius. Medial: medial border of adductor longus. Floor (lat→med): iliacus, psoas, pectineus, adductor longus. Roof: skin, fascia lata, cribriform fascia.", definition:"Contents (lateral → medial, mnemonic NAVEL): femoral <b>N</b>erve (outside femoral sheath), femoral <b>A</b>rtery, femoral <b>V</b>ein, <b>E</b>mpty space (femoral canal → Cloquet's node), <b>L</b>ymphatics."},
  {name:"Adductor (Hunter's) canal", category:"Lower Limb", borders:"Anterior: sartorius covered by the vastoadductor membrane. Lateral: vastus medialis. Posteromedial: adductor longus + adductor magnus.", definition:"Continuation of the iliopectineal fossa (apex of femoral triangle). Contains: femoral a., femoral v., saphenous n., n. to vastus medialis. The femoral vessels exit the canal through the adductor hiatus to become the popliteal vessels."},
  {name:"Cubital fossa", category:"Upper Limb", borders:"Medial: pronator teres. Lateral: brachioradialis. Superior: intercondylar line between medial & lateral humeral epicondyles. Roof: bicipital aponeurosis & skin. Floor: brachialis & supinator.", definition:"Contents (lateral → medial): radial nerve; biceps tendon; brachial artery (bifurcates into radial & ulnar here); median nerve."},
  {name:"Carpal tunnel", category:"Upper Limb", borders:"Roof: flexor retinaculum (transverse carpal ligament). Floor & walls: carpal bones (concave on their palmar aspect).", definition:"Contains: median nerve + 9 long flexor tendons (4 FDS, 4 FDP, FPL). Carpal tunnel syndrome = compression of the median nerve at the wrist."},
  {name:"Spermatic cord", category:"Abdomen / Male", borders:"Extends from deep inguinal ring to posterior surface of testis. Coverings (superficial → deep): external spermatic fascia (external oblique), cremaster muscle & fascia (internal oblique), internal spermatic fascia (transversalis fascia).", definition:"Contents (3 arteries, 3 veins, 3 nerves, 3 structures): testicular a., a. to ductus deferens, cremasteric a.; pampiniform plexus, cremasteric v., v. of ductus deferens; genital br. of genitofemoral n., sympathetic fibers, ilioinguinal n. (on the cord); ductus deferens, lymphatics, processus vaginalis remnant."},
  {name:"Pudendal (Alcock's) canal", category:"Pelvis", borders:"Located in the lateral wall of the ischioanal fossa within the fascia of the obturator internus.", definition:"Contains the pudendal nerve and internal pudendal vessels. The nerve branches here into inferior rectal, perineal, and dorsal nerve of penis/clitoris."},
  {name:"Pelvic diaphragm", category:"Pelvis", borders:"Forms the inferior boundary of the true pelvis. Components: levator ani (iliococcygeus, pubococcygeus, puborectalis) + coccygeus.", definition:"Innervation: pudendal nerve and anterior rami S2–S4. Supports pelvic contents; maintains anorectal angle (puborectalis sling); elevates pelvic floor and anus."},
  {name:"Koch's triangle", category:"Heart / Clinical", borders:"Anteroinferior: septal leaflet of tricuspid valve. Posterior: tendon of Todaro. Inferior: opening of coronary sinus.", definition:"Triangle on the interatrial septum (right atrial side). Contains the AV node. Critical surgical landmark during tricuspid valve repair."},
  {name:"Iliopectineal fossa", category:"Lower Limb", borders:"Depression at the apex of the femoral triangle where iliopsoas and pectineus muscles meet.", definition:"Continues distally as the adductor (subsartorial / Hunter's) canal. The femoral nerve and vessels occupy this fossa."},

  // ---- FORAMINA & OPENINGS ----
  {name:"Cribriform plate (foramina)", category:"Foramen", borders:"Floor of the anterior cranial fossa (ethmoid bone).", definition:"Transmits: olfactory nerve (CN I) fila olfactoria. Multiple minute foramina through which the 20 olfactory fila pass from the nasal roof into the cranial cavity."},
  {name:"Optic canal", category:"Foramen", borders:"Located in the lesser wing of the sphenoid bone.", definition:"Transmits: optic nerve (CN II) and ophthalmic artery."},
  {name:"Superior orbital fissure (SOF)", category:"Foramen", borders:"Between the greater and lesser wings of the sphenoid, communicates between the middle cranial fossa and orbit.", definition:"Transmits: CN III (oculomotor), CN IV (trochlear), CN VI (abducens), V1 branches (lacrimal, frontal, nasociliary), superior ophthalmic vein, sympathetic fibers from cavernous plexus."},
  {name:"Inferior orbital fissure (IOF)", category:"Foramen", borders:"Between the floor and lateral wall of the orbit, communicating with the pterygopalatine and infratemporal fossae.", definition:"Transmits: CN V2 (maxillary nerve), zygomatic nerve, infraorbital vessels, inferior ophthalmic vein."},
  {name:"Foramen rotundum", category:"Foramen", borders:"Passes through the greater wing of the sphenoid, connecting the middle cranial fossa to the pterygopalatine fossa.", definition:"Transmits: maxillary nerve (CN V2) and accessory meningeal artery."},
  {name:"Foramen ovale", category:"Foramen", borders:"Passes through the greater wing of the sphenoid, connecting the middle cranial fossa to the infratemporal fossa.", definition:"Transmits: mandibular nerve (CN V3), lesser petrosal nerve, accessory meningeal branch of maxillary artery, emissary vein."},
  {name:"Foramen spinosum", category:"Foramen", borders:"In the greater wing of the sphenoid, posterolateral to foramen ovale.", definition:"Transmits: middle meningeal artery and vein; meningeal branch of mandibular nerve (nervus spinosus). The groove of the middle meningeal artery is visible on the inner table of the skull."},
  {name:"Foramen lacerum", category:"Foramen", borders:"Irregular gap at the junction of the sphenoid, temporal, and occipital bones. In life, mostly occluded by fibrocartilage.", definition:"The internal carotid artery passes over (not through) it; the nerve and artery of pterygoid canal pass through the cartilage. Emissary veins also traverse it."},
  {name:"Carotid canal", category:"Foramen", borders:"Begins on the inferior surface of the petrous temporal bone and opens into the middle cranial fossa.", definition:"Transmits: internal carotid artery and the carotid (sympathetic) plexus."},
  {name:"Pterygoid canal (Vidian canal)", category:"Foramen", borders:"Runs through the body of the sphenoid from the foramen lacerum to the pterygopalatine fossa.", definition:"Transmits: nerve of pterygoid canal (Vidian nerve = greater petrosal + deep petrosal nerves), artery of pterygoid canal (from maxillary artery)."},
  {name:"Sphenopalatine foramen", category:"Foramen", borders:"Opening in the medial wall of the pterygopalatine fossa, communicating with the nasal cavity.", definition:"Transmits: sphenopalatine artery (terminal branch of maxillary artery) and nasopalatine, medial & lateral superior posterior nasal nerves (V2 branches). Common source of posterior epistaxis."},
  {name:"Greater palatine canal", category:"Foramen", borders:"Descends through the palatine bone and maxilla from the pterygopalatine fossa to the hard palate.", definition:"Transmits: greater palatine nerve and descending palatine artery and vein."},
  {name:"Lesser palatine canal", category:"Foramen", borders:"Passes through the pyramidal process of the palatine bone.", definition:"Transmits: lesser palatine nerve, artery, and vein."},
  {name:"Palatovaginal (pharyngeal) canal", category:"Foramen", borders:"Between the sphenoid and the palatine bone, opening into the nasopharynx.", definition:"Transmits: pharyngeal nerve (V2 branch) and pharyngeal branch of maxillary artery."},
  {name:"Incisive foramen", category:"Foramen", borders:"In the anterior part of the hard palate, behind the central incisors.", definition:"Transmits: nasopalatine nerve (terminal branch) and sphenopalatine artery (terminal anastomosis with greater palatine artery)."},
  {name:"Mandibular foramen", category:"Foramen", borders:"On the medial surface of the ramus of the mandible.", definition:"Transmits: inferior alveolar nerve, artery, and vein. Site of inferior alveolar nerve block in dentistry."},
  {name:"Mental foramen", category:"Foramen", borders:"On the anterior body of the mandible, usually below the 2nd premolar.", definition:"Transmits: mental nerve and vessels (terminal branches of inferior alveolar nerve and artery)."},
  {name:"Stylomastoid foramen", category:"Foramen", borders:"Between the styloid and mastoid processes of the temporal bone.", definition:"Transmits: facial nerve (CN VII, main motor trunk) and stylomastoid artery (branch of posterior auricular artery)."},
  {name:"Internal acoustic meatus (IAM)", category:"Foramen", borders:"In the posterior surface of the petrous temporal bone, opening into the posterior cranial fossa.", definition:"Transmits: facial nerve (CN VII), vestibulocochlear nerve (CN VIII), and labyrinthine artery."},
  {name:"Jugular foramen", category:"Foramen", borders:"Between the petrous temporal bone and the occipital bone, in the posterior cranial fossa.", definition:"Transmits (anterior → posterior): inferior petrosal sinus; CN IX (glossopharyngeal); CN X (vagus); CN XI (accessory, descending root); internal jugular vein; meningeal branches of ascending pharyngeal and occipital arteries."},
  {name:"Hypoglossal canal", category:"Foramen", borders:"In the occipital bone, above the margin of the foramen magnum.", definition:"Transmits: hypoglossal nerve (CN XII)."},
  {name:"Foramen magnum", category:"Foramen", borders:"Large opening in the base of the occipital bone.", definition:"Transmits: lower medulla, meninges, vertebral arteries, spinal accessory nerve (CN XI ascending root), anterior and posterior spinal arteries, dural veins."},
  {name:"Condylar canal", category:"Foramen", borders:"In the occipital condyle.", definition:"Transmits: occipital emissary vein."},
  {name:"Mastoid foramen", category:"Foramen", borders:"In the mastoid part of the temporal bone.", definition:"Transmits: mastoid emissary vein, branch of occipital artery, posterior meningeal artery."},
  {name:"Petrotympanic fissure", category:"Foramen", borders:"Between the petrous and tympanic parts of the temporal bone.", definition:"Transmits: chorda tympani (CN VII branch), anterior tympanic artery and vein, anterior ligament of malleus."},
  {name:"Pterygomaxillary fissure", category:"Foramen", borders:"Vertical fissure between the lateral pterygoid plate and the posterior surface of the maxilla.", definition:"Connects the infratemporal fossa with the pterygopalatine fossa. Transmits: maxillary artery (3rd part entering pterygopalatine fossa) and pterygoid venous plexus."},
  {name:"Caval hiatus (T8)", category:"Foramen", borders:"Opening in the central tendon of the diaphragm at T8.", definition:"Transmits: inferior vena cava and right phrenic nerve. The IVC is fused to the tendon — the hiatus does not expand, preventing transmission of abdominal pressure."},
  {name:"Esophageal hiatus (T10)", category:"Foramen", borders:"Opening in the muscular part of the diaphragm (right crus) at T10.", definition:"Transmits: esophagus, anterior and posterior vagal trunks, esophageal branches of left gastric artery and vein. Site of hiatal hernias."},
  {name:"Aortic hiatus (T12)", category:"Foramen", borders:"Opening between the two crura of the diaphragm and the vertebral column at T12.", definition:"Transmits: descending aorta, thoracic duct, and azygos vein. Not a true hiatus — formed between diaphragm and spine, so it is not narrowed by diaphragmatic contractions."},

  // ---- ARTERIES ----
  {name:"Common carotid artery (CCA)", category:"Artery", borders:"Right: from bifurcation of brachiocephalic trunk. Left: directly from arch of aorta. Ascends the neck in the carotid sheath (lateral to trachea/esophagus). Bifurcates at C4 (superior margin of thyroid cartilage) into ECA and ICA.", definition:"The CCA gives NO branches in the neck. The bifurcation is within the carotid triangle. The carotid sinus (baroreceptor) and carotid body (chemoreceptor) are at the bifurcation."},
  {name:"External carotid artery (ECA)", category:"Artery", borders:"Originates at the bifurcation of CCA at C4. Ascends posterior to the mandibular neck and anterior to the ear lobule. Terminates within the parotid gland by dividing into superficial temporal and maxillary arteries.", definition:"8 branches (mnemonic — Some Anatomists Like Freaking Out Poor Medical Students): <b>S</b>uperior thyroid, <b>A</b>scending pharyngeal, <b>L</b>ingual, <b>F</b>acial, <b>O</b>ccipital, <b>P</b>osterior auricular, <b>M</b>axillary, <b>S</b>uperficial temporal."},
  {name:"Internal carotid artery (ICA)", category:"Artery", borders:"Originates at bifurcation of CCA at C4. Cervical segment (no branches); enters skull through carotid canal; cavernous segment (within cavernous sinus); supraclinoid segment; divides into ACA and MCA.", definition:"Branches: ophthalmic a., posterior communicating a., anterior choroidal a., anterior cerebral a. (ACA), middle cerebral a. (MCA). Contributes to Circle of Willis."},
  {name:"Maxillary artery", category:"Artery", borders:"Terminal branch of ECA (with superficial temporal a.). Arises in the parotid, traverses the infratemporal fossa, enters the pterygopalatine fossa via the pterygomaxillary fissure.", definition:"Three parts: 1st (mandibular) — deep auricular, anterior tympanic, middle meningeal, accessory meningeal, inferior alveolar; 2nd (pterygoid) — masseteric, deep temporal, pterygoid, buccal; 3rd (pterygopalatine) — posterior superior alveolar, infraorbital, descending palatine, artery of pterygoid canal, pharyngeal, sphenopalatine (terminal)."},
  {name:"Middle meningeal artery", category:"Artery", borders:"Branch of 1st part of maxillary artery. Ascends through foramen spinosum into the middle cranial fossa, runs between the two roots of the auriculotemporal nerve.", definition:"Supplies the dura mater. Most common source of epidural hematoma (with pterion fractures). The groove it makes on the inner table of the skull is an important radiological landmark."},
  {name:"Inferior alveolar artery", category:"Artery", borders:"Branch of 1st part of maxillary a. Follows the inferior alveolar nerve; enters the mandibular canal through the mandibular foramen.", definition:"Branches: mylohyoid branch (before entering foramen); dental and gingival branches within the canal; terminal mental artery (exits mental foramen). Accompanied by the inferior alveolar vein and nerve."},
  {name:"Sphenopalatine artery", category:"Artery", borders:"Terminal branch of 3rd part of maxillary artery. Passes through the sphenopalatine foramen into the nasal cavity.", definition:"Supplies the nasal mucosa (lateral wall and septum — Kiesselbach's area). The most common source of posterior epistaxis."},
  {name:"Infraorbital artery", category:"Artery", borders:"Branch of 3rd part of maxillary a. Passes through the inferior orbital fissure → infraorbital groove → infraorbital canal → exits infraorbital foramen.", definition:"Supplies the lower eyelid, cheek, upper lip, maxillary incisor and canine teeth, and maxillary sinus."},
  {name:"Superior thyroid artery", category:"Artery", borders:"First anterior branch of ECA. Descends to the thyroid gland.", definition:"Supplies thyroid gland (superior pole), larynx (via superior laryngeal branch), and infrahyoid muscles. Accompanies the external laryngeal nerve."},
  {name:"Lingual artery", category:"Artery", borders:"Second anterior branch of ECA, at the level of the greater horn of the hyoid. Passes deep to hyoglossus (within Pirogov's triangle).", definition:"Supplies tongue and floor of mouth. Ligated in Pirogov's triangle or Béclard's angle for hemorrhage control."},
  {name:"Facial artery", category:"Artery", borders:"Third anterior branch of ECA. Loops over the body of the mandible (palpable anterior to the masseter), ascends across the face to the medial canthus (terminates as angular artery).", definition:"Branches: ascending palatine, tonsillar, submental, glandular brs., inferior labial, superior labial, lateral nasal, angular arteries."},
  {name:"Ascending pharyngeal artery", category:"Artery", borders:"Medial branch of ECA. Ascends between the pharynx and ICA.", definition:"Supplies the pharynx, prevertebral muscles, middle ear, and cranial meninges (posterior meningeal artery)."},
  {name:"Occipital artery", category:"Artery", borders:"Posterior branch of ECA. Passes under the posterior belly of digastric; enters the scalp at the superior nuchal line.", definition:"Supplies the posterior scalp (occipital region), SCM, dura via the mastoid foramen, and the meninges."},
  {name:"Posterior auricular artery", category:"Artery", borders:"Small posterior branch of ECA, arising above the occipital artery.", definition:"Branches: stylomastoid artery (enters stylomastoid foramen with CN VII); auricular and occipital branches."},
  {name:"Superficial temporal artery", category:"Artery", borders:"Smaller terminal branch of ECA (with maxillary a.). Ascends anterior to the ear, palpable in the temporal region.", definition:"Branches: transverse facial a., middle temporal a., zygomatico-orbital a., frontal and parietal terminal branches. Biopsy site for giant-cell (temporal) arteritis diagnosis."},
  {name:"Vertebral artery", category:"Artery", borders:"First branch of the subclavian artery. Ascends through transverse foramina of C6 to C1, then enters the foramen magnum.", definition:"Joins the contralateral vertebral artery to form the basilar artery. Branches: anterior & posterior spinal arteries, posterior inferior cerebellar artery (PICA)."},
  {name:"Subclavian artery", category:"Artery", borders:"Right: from brachiocephalic trunk. Left: from arch of aorta. Divided into 3 parts by the anterior scalene muscle (medial, behind, lateral).", definition:"Part 1 (medial): vertebral a., internal thoracic a., thyrocervical trunk (inferior thyroid, suprascapular, transverse cervical aa.). Part 2 (behind scalene): costocervical trunk (deep cervical, supreme intercostal aa.). Part 3 (lateral): dorsal scapular a. (variable). Continues as axillary artery at lateral border of 1st rib."},
  {name:"Internal thoracic (mammary) artery", category:"Artery", borders:"Branch of 1st part of subclavian. Descends behind clavicle and 1st costal cartilage, then 1 cm lateral to the sternum.", definition:"Branches: pericardiacophrenic a. (with phrenic n.); anterior intercostal aa. (upper 6 spaces); sternal, thymic, mediastinal, perforating branches; terminal branches = superior epigastric and musculophrenic aa. Used as the LIMA (left internal mammary artery) in CABG."},
  {name:"Thoracic aorta", category:"Artery", borders:"Continuation of the aortic arch from T4. Descends in the posterior mediastinum, left of the vertebral column; enters abdomen through the aortic hiatus at T12.", definition:"Visceral branches: bronchial aa., esophageal aa., pericardial and mediastinal brs. Parietal branches: 9 pairs of posterior intercostal aa. (3rd–11th), subcostal aa., superior phrenic aa."},
  {name:"Posterior intercostal arteries", category:"Artery", borders:"1st & 2nd from supreme intercostal a. (costocervical trunk). 3rd–11th from posterior surface of thoracic aorta.", definition:"Supplies the thoracic wall including back muscles, vertebral column, spinal cord, and overlying skin."},
  {name:"Anterior intercostal arteries", category:"Artery", borders:"Upper 6 from internal thoracic a.; 7th–9th from musculophrenic a.", definition:"Supplies the anterior thoracic wall, parietal pleura, intercostal muscles, and overlying skin."},
  {name:"Right coronary artery (RCA)", category:"Artery", borders:"Arises from the right aortic sinus (sinus of Valsalva). Runs in the right atrioventricular groove.", definition:"Branches: SA nodal branch (60%), atrial branches, right marginal branch, ventricular branches, posterior interventricular (descending) artery (in right-dominant systems). Supplies right atrium, right ventricle, AV node (in right-dominant), inferior wall of left ventricle."},
  {name:"Left coronary artery (LCA)", category:"Artery", borders:"Arises from the left aortic sinus. Short left main coronary then divides.", definition:"Branches: anterior interventricular artery (LAD — diagonal and ventricular branches), circumflex artery (left marginal, AV branches). Supplies most of the left ventricle, left atrium, and anterior interventricular septum."},
  {name:"Abdominal aorta", category:"Artery", borders:"Continuation of thoracic aorta after the aortic hiatus (T12). Bifurcates into common iliac arteries at L4.", definition:"Parietal branches (paired): inferior phrenic aa., 4 pairs of lumbar aa. (L1–L4), median sacral a. (unpaired). Visceral paired: middle suprarenal, renal, gonadal aa. Visceral unpaired: celiac trunk (T12), superior mesenteric a. (L1), inferior mesenteric a. (L3)."},
  {name:"Celiac trunk", category:"Artery", borders:"First unpaired visceral branch of abdominal aorta, arising anteriorly at T12.", definition:"3 branches: left gastric a. (lesser curvature), splenic a. (along superior border of pancreas, supplies spleen & pancreas; gives short gastric and left gastroepiploic aa.), common hepatic a. (→ proper hepatic + gastroduodenal a.). Supplies the foregut."},
  {name:"Common hepatic artery", category:"Artery", borders:"Branch of celiac trunk.", definition:"Branches: proper hepatic a. (→ right & left hepatic aa., cystic a. [usually from right hepatic], right gastric a.); gastroduodenal a. (→ superior pancreaticoduodenal a. and right gastroepiploic a.)."},
  {name:"Splenic artery", category:"Artery", borders:"Branch of celiac trunk. Tortuous course along the superior border of the body and tail of pancreas.", definition:"Branches: pancreatic branches, short gastric aa., left gastroepiploic a., terminal splenic branches to the hilum of spleen."},
  {name:"Left gastric artery", category:"Artery", borders:"Branch of celiac trunk (smallest). Along the lesser curvature of the stomach; anastomoses with the right gastric artery.", definition:"Esophageal branches form a porto-caval anastomosis with the azygos system (esophageal varices in portal hypertension)."},
  {name:"Gastroduodenal artery", category:"Artery", borders:"Branch of common hepatic artery. Passes posterior to the first part of duodenum (D1).", definition:"Branches: superior pancreaticoduodenal a. (anastomoses with inferior pancreaticoduodenal from SMA); right gastroepiploic (gastro-omental) a. Erosion by a posterior duodenal ulcer causes massive bleeding."},
  {name:"Superior mesenteric artery (SMA)", category:"Artery", borders:"Originates anteriorly from the abdominal aorta at L1 (just below celiac trunk). Crosses anterior to the horizontal part of the duodenum and the uncinate process of the pancreas.", definition:"Supplies the midgut — from the distal duodenum (past the major papilla) to the proximal 2/3 of the transverse colon (Cannon-Böhm point). Branches: inferior pancreaticoduodenal a., jejunal aa., ileal aa. (with arcades and vasa recta), ileocolic a. (with appendicular a.), right colic a., middle colic a."},
  {name:"Inferior mesenteric artery (IMA)", category:"Artery", borders:"Originates anteriorly from the abdominal aorta at L3, ~3–4 cm above the bifurcation.", definition:"Supplies the hindgut — distal 1/3 of the transverse colon → upper rectum. Branches: left colic a., sigmoid aa., superior rectal a. (terminal). Splenic flexure is a watershed zone between SMA and IMA territories."},
  {name:"Marginal artery of Drummond", category:"Artery", borders:"An anastomotic channel along the medial border of the colon, connecting branches of the SMA and IMA.", definition:"Collateral pathway between the SMA and IMA territories. Absent or poorly formed in the splenic flexure in ~5% — watershed zone vulnerable in aortic surgery."},
  {name:"Common iliac artery", category:"Artery", borders:"Originates at the bifurcation of the abdominal aorta at L4. Bifurcates into external and internal iliac at L5/sacral promontory.", definition:"No branches between the aortic bifurcation and its own bifurcation. Right common iliac crosses anterior to the right ureter, then the right common iliac vein, and then the left common iliac vein."},
  {name:"External iliac artery", category:"Artery", borders:"From bifurcation of common iliac → passes under inguinal ligament → becomes femoral artery.", definition:"Branches in the pelvis: inferior epigastric a. (forms lateral border of Hesselbach's triangle); deep circumflex iliac a. (runs along the iliac crest)."},
  {name:"Internal iliac artery", category:"Artery", borders:"Bifurcation of the common iliac artery at L5/sacral promontory. Descends into the pelvis.", definition:"Parietal branches: iliolumbar, lateral sacral, obturator, superior gluteal, inferior gluteal aa. Visceral branches: umbilical a. (→ superior vesical aa.), inferior vesical a. (♂)/vaginal a. (♀), middle rectal a., uterine a. (♀), internal pudendal a."},
  {name:"Internal pudendal artery", category:"Artery", borders:"Branch of the anterior division of the internal iliac a. Exits via greater sciatic foramen (infrapiriform), loops around the ischial spine, then enters via the lesser sciatic foramen into Alcock's canal.", definition:"Branches: inferior rectal a., perineal a., deep and dorsal arteries of the penis/clitoris, artery of the bulb. Supplies the perineum and external genitalia."},
  {name:"Superior gluteal artery", category:"Artery", borders:"Largest branch of the internal iliac a. (posterior division). Exits through the suprapiriform foramen of the greater sciatic foramen.", definition:"Supplies gluteus medius, gluteus minimus, tensor fasciae latae, and the hip joint."},
  {name:"Inferior gluteal artery", category:"Artery", borders:"Branch of anterior division of internal iliac. Exits through the infrapiriform foramen.", definition:"Supplies gluteus maximus, piriformis, obturator internus, gemelli, and quadratus femoris."},
  {name:"Inferior epigastric artery", category:"Artery", borders:"Branch of external iliac a., arising just above the inguinal ligament. Ascends in the lateral umbilical fold, behind rectus abdominis.", definition:"Forms the lateral border of Hesselbach's triangle — differentiates direct (medial) from indirect (lateral) inguinal hernias. Anastomoses with the superior epigastric artery."},
  {name:"Superior epigastric artery", category:"Artery", borders:"Terminal branch of the internal thoracic a. Enters the rectus sheath posteriorly.", definition:"Anastomoses with the inferior epigastric artery. Contributes to collateral circulation in coarctation of the aorta."},
  {name:"Ophthalmic artery", category:"Artery", borders:"First branch of the supraclinoid ICA. Passes through the optic canal into the orbit.", definition:"Branches: central retinal a., lacrimal a., supratrochlear a., supraorbital a., dorsal nasal a., anterior & posterior ethmoidal aa., muscular branches. The central retinal artery is an end-artery (no anastomosis) — occlusion causes sudden painless monocular visual loss."},
  {name:"Femoral artery", category:"Artery", borders:"Continuation of the external iliac a. as it passes under the inguinal ligament. Passes through the femoral triangle → adductor canal → exits via the adductor hiatus to become the popliteal artery.", definition:"Branches in femoral triangle: superficial epigastric, superficial circumflex iliac, superficial external pudendal, deep external pudendal, profunda femoris (deep femoral a.) — which gives medial and lateral circumflex femoral aa. and 3–4 perforating branches."},
  {name:"Pericardiacophrenic artery", category:"Artery", borders:"Branch of internal thoracic a. Descends with the phrenic nerve between the mediastinal pleura and pericardium.", definition:"Supplies the pericardium, pleura, and diaphragm."},
  {name:"Musculophrenic artery", category:"Artery", borders:"Terminal branch of internal thoracic a. Runs along the costal margin.", definition:"Branches: 7th–9th anterior intercostal arteries; also supplies the diaphragm."},

  // ---- VEINS ----
  {name:"Internal jugular vein (IJV)", category:"Vein", borders:"Begins at the jugular foramen (superior bulb, continuation of sigmoid sinus). Descends in the carotid sheath (lateral to CCA). Joins the subclavian vein posterior to the sternal end of the clavicle → brachiocephalic vein.", definition:"Tributaries: inferior petrosal sinus, pharyngeal vv., common facial v. (facial + anterior retromandibular), lingual v., superior thyroid v., middle thyroid v., occipital v. Contains an inferior bulb with a bicuspid valve at its lower end."},
  {name:"External jugular vein (EJV)", category:"Vein", borders:"Formed behind the angle of the mandible (posterior auricular v. + posterior division of retromandibular v.). Crosses the SCM obliquely in the superficial fascia. Pierces the deep investing fascia at the root of the neck → drains into the subclavian vein.", definition:"Tributaries: posterior external jugular, transverse cervical, suprascapular veins. A useful IV access site; often visible when venous pressure is raised."},
  {name:"Retromandibular vein", category:"Vein", borders:"Formed within the parotid gland by the maxillary vein + superficial temporal vein.", definition:"Divides into: anterior division (joins facial v. → common facial v. → IJV) and posterior division (joins posterior auricular v. → EJV)."},
  {name:"Facial vein", category:"Vein", borders:"Begins at the angular vein (medial canthus). Descends across the face. Joins the anterior division of the retromandibular vein → common facial v. → IJV.", definition:"Clinically important — connects with the cavernous sinus via the ophthalmic veins ('danger area' of the face). The facial vein has no valves, allowing retrograde spread of infection."},
  {name:"Pterygoid venous plexus", category:"Vein", borders:"Located around the lateral pterygoid muscle in the infratemporal fossa.", definition:"Drains the eye (via ophthalmic veins), paranasal sinuses, deep face, and infratemporal fossa. Forms the maxillary vein → retromandibular vein. Communicates with the cavernous sinus via emissary veins through the foramen ovale — a route for retrograde spread of facial infection to cavernous sinus."},
  {name:"Cavernous sinus", category:"Vein", borders:"Paired dural venous sinus on either side of the sella turcica (middle cranial fossa).", definition:"Contents: CN III, IV, V1, V2 (in lateral wall); CN VI and ICA (within the sinus); sympathetic plexus. Communications: superior & inferior ophthalmic vv.; pterygoid plexus; superior petrosal sinus → transverse sinus; inferior petrosal sinus → IJV; intercavernous sinuses. Thrombosis → multiple cranial nerve palsies."},
  {name:"Diploic veins", category:"Vein", borders:"Within the diploë (cancellous bone) of the cranial bones.", definition:"Connect intracranially with dural venous sinuses and extracranially with emissary veins and scalp veins. Include frontal, anterior temporal, posterior temporal, and occipital diploic veins."},
  {name:"Emissary veins", category:"Vein", borders:"Pass through foramina in the skull, connecting extracranial veins with intracranial dural sinuses.", definition:"Valveless (bidirectional). Examples: mastoid emissary (sigmoid sinus → posterior auricular v.); parietal emissary (superior sagittal sinus → superficial temporal v.); foramen ovale emissary (cavernous sinus → pterygoid plexus). Route for spread of infection between intracranial and extracranial compartments."},
  {name:"Subclavian vein", category:"Vein", borders:"Continuation of the axillary vein at the lateral border of the 1st rib. Passes anterior to the anterior scalene muscle (unlike the artery, which passes posterior to it). Joins IJV behind the sternal end of the clavicle → brachiocephalic vein.", definition:"Important central venous access site. Subclavian venous catheterization risks pneumothorax and arterial puncture."},
  {name:"Brachiocephalic veins", category:"Vein", borders:"Formed on each side by subclavian + IJV. The right and left brachiocephalic veins unite at the right border of the manubrium to form the SVC.", definition:"The left brachiocephalic vein is longer (~6 cm) and crosses the midline — vulnerable in mediastinal surgery."},
  {name:"Superior vena cava (SVC)", category:"Vein", borders:"Formed by union of right and left brachiocephalic veins. Descends in the superior mediastinum to open into the right atrium.", definition:"Only major tributary: the azygos vein (arches over the right pulmonary hilum at T4). SVC syndrome (compression) → facial oedema, dilated neck and arm veins."},
  {name:"Azygos vein", category:"Vein", borders:"Ascends right of vertebral bodies (through aortic hiatus); arches over the right pulmonary hilum at T4 (azygos arch) → drains into SVC.", definition:"Tributaries: 4th–11th right posterior intercostal vv., hemiazygos and accessory hemiazygos vv., bronchial vv., esophageal vv., pericardial vv. Important collateral pathway if SVC or IVC is obstructed."},
  {name:"Hemiazygos vein", category:"Vein", borders:"Ascends on the left of the vertebral column; crosses behind the aorta at T7–T9 to join the azygos vein.", definition:"Tributaries: lower left posterior intercostal veins; accessory hemiazygos vein (drains middle left intercostal veins). Together drain all left-sided posterior chest wall."},
  {name:"Inferior vena cava (IVC)", category:"Vein", borders:"Formed at the confluence of common iliac veins at L5. Ascends right of the abdominal aorta. Passes through the caval hiatus (T8) → right atrium.", definition:"Tributaries: common iliac vv., lumbar vv., right gonadal v. (left → left renal v.), renal vv., right suprarenal v. (left → left renal v.), inferior phrenic vv., hepatic vv. The IVC is the largest vein in the body."},
  {name:"Hepatic portal vein", category:"Vein", borders:"Formed behind the neck of the pancreas by the splenic vein + superior mesenteric vein.", definition:"Carries nutrient-rich blood from the GI tract and spleen to the liver. Within the hepatoduodenal ligament (portal triad). Porto-caval anastomoses (dilate in portal hypertension): esophageal varices, hemorrhoids, caput medusae (paraumbilical)."},
  {name:"Splenic vein", category:"Vein", borders:"Emerges from the splenic hilum. Runs along the posterior surface of the body of the pancreas. Receives the inferior mesenteric vein, then joins the SMV behind the neck of the pancreas → portal vein.", definition:"The close relationship with the pancreas means splenic vein thrombosis can occur in pancreatitis — causing sinistral (left-sided) portal hypertension."},
  {name:"Superior mesenteric vein (SMV)", category:"Vein", borders:"Ascends to the right of the SMA in the mesentery. Passes behind the neck of the pancreas to join the splenic vein → portal vein.", definition:"Tributaries mirror those of the SMA: jejunal, ileal, ileocolic, right colic, middle colic veins + right gastroepiploic and inferior pancreaticoduodenal veins."},
  {name:"Inferior mesenteric vein (IMV)", category:"Vein", borders:"Ascends in the left infracolic compartment. Usually drains into the splenic vein (sometimes SMV or the junction).", definition:"Tributaries: superior rectal v., sigmoid vv., left colic v."},
  {name:"Porto-caval anastomoses", category:"Vein / Clinical", borders:"Sites where the portal venous system communicates with the systemic venous system.", definition:"1) Esophageal (left gastric v. ↔ esophageal vv. ↔ azygos) → esophageal varices. 2) Rectal (superior rectal v. ↔ middle/inferior rectal vv.) → hemorrhoids. 3) Paraumbilical (paraumbilical vv. ↔ epigastric vv.) → caput medusae. 4) Retroperitoneal (veins of Retzius). All dilate in portal hypertension."},
  {name:"Pampiniform plexus", category:"Vein", borders:"Network of veins in the spermatic cord, draining the testis.", definition:"Forms the testicular vein: right → IVC; left → left renal vein. Thermoregulation (countercurrent heat exchange with testicular artery). Left varicocele more common — left testicular vein drains at right angle into left renal vein, +/- nutcracker compression by SMA."},
  {name:"Cardiac veins", category:"Vein / Heart", borders:"Run alongside the coronary arteries.", definition:"Great cardiac v. (anterior interventricular groove → coronary sinus); middle cardiac v. (posterior interventricular groove); small cardiac v. (right AV groove); oblique vein of Marshall (posterior LA); Thebesian (smallest cardiac) vv. (drain directly into cardiac chambers). All drain to the coronary sinus → right atrium."},
  {name:"Thoraco-epigastric veins", category:"Vein", borders:"In the subcutaneous tissue of the anterolateral thoracic and abdominal walls.", definition:"Drain into the lateral thoracic vein → axillary vein. Important collateral pathway in IVC obstruction."},

  // ---- CRANIAL NERVES (in Term Library) ----
  {name:"CN I — Olfactory", category:"Nerve — Cranial", borders:"Origin: olfactory receptors in nasal mucosa. Opening: cribriform plate of ethmoid.", definition:"Special visceral afferent (smell). Fila olfactoria → olfactory bulb → olfactory tract → periamygdaloid & piriform cortex. Lesion → anosmia."},
  {name:"CN II — Optic", category:"Nerve — Cranial", borders:"Origin: retinal ganglion cells. Opening: optic canal.", definition:"Special somatic afferent (vision). Retina → optic chiasm (partial decussation of nasal fibres) → optic tract → LGN → optic radiation → primary visual cortex (area 17)."},
  {name:"CN III — Oculomotor", category:"Nerve — Cranial", borders:"Origin: anterior midbrain. Opening: superior orbital fissure.", definition:"GSE + GVE (parasympathetic). Supplies SR, IR, MR, IO, LPS (motor); sphincter pupillae & ciliary muscle via ciliary ganglion (parasympathetic). Lesion → dilated pupil, ptosis, 'down & out' eye."},
