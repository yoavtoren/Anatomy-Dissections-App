<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127775; Special Features</h3>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Articular disc</strong> divides joint into <strong>2 separate cavities:</strong></span><br>&#8226; <strong>Upper cavity</strong> &rarr; <span style="color:#15803d">translation / gliding</span> (jaw protracts)<br>&#8226; <strong>Lower cavity</strong> &rarr; <span style="color:#15803d">rotation / hinge</span> (jaw opens/closes)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Lateral pterygoid muscle</strong> inserts directly into the <u>capsule (and articular disc)</u> — it is the <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">muscle most involved in moving the disc and protracting the jaw.</span> It is also the <span style="color:#dc2626">only muscle that opens the jaw.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><em style="color:#6d28d9;font-style:italic"><strong>Both TMJs are interrelated — they always move together.</strong></em></div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">TMJ = mandible + temporal bone.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Type: Complex (articular disc). Shape: Bicondylar.</span></li>
<li><span style="color:#dc2626">Cartilage is fibrocartilage, NOT hyaline — unique!</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Upper cavity = gliding (protraction); Lower cavity = hinge (opening).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Lateral pterygoid inserts into capsule and disc — opens jaw.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Both TMJs always move together.</span></li>
</ul>
</div>
</div>`},
    {q:10, text:'Development and growth of limb, molecular mechanisms, limb defects', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">10. Development and Growth of the Limb — Molecular Mechanisms &amp; Limb Defects</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The <strong>appendicular skeleton</strong> (limbs + girdles) develops from <strong>limb buds.</strong> Upper and lower limb development is very similar — <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">lower limb develops <strong>1–2 days later</strong> than upper limb.</span> All limb bones: <strong>endochondral ossification.</strong></p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Developmental timeline — limb bud at week 4, hand/foot plate at week 6, rotation at week 7. Show AER at distal tip and ZPA at posterior border.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127776; A) Proximal-Distal Development</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Limb buds appear at <strong>end of 4th week</strong> from the ventrolateral body wall. <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>Forelimb first</strong></span>; hindlimb <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">1–2 days later</span>.</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Limb bud structure:</strong><br>&#8226; <strong>Mesenchymal core</strong> (from parietal/somatic layer of lateral plate mesoderm)<br>&#8226; Covered by <strong>ectoderm</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>AER</strong> (apical ectodermal ridge) = thickened ectoderm at distal tip. Signals via <strong>FGF</strong> &rarr; underlying mesenchyme <u>rapidly proliferates but does NOT differentiate</u> = the <strong>progress zone.</strong></div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">As limb grows, cells far from AER begin to <u>differentiate into cartilage</u> &rarr; development is <strong>proximo-distal</strong>. <strong>4 components:</strong></div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Cingulum</span></strong><br>Girdle (immovable)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Stylopod</span></strong><br>Humerus / Femur</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Zeugopod</span></strong><br>Ulna+radius / Tibia+fibula</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Autopod</span></strong><br>Carpals+metacarpals+digits / Tarsals+metatarsals</div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Week 6:</strong> terminal portion flattens &rarr; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>hand plate</strong></span> and <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>footplate.</strong></span> Circular constrictions form wrist/ankle, then elbow/knee.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Fingers/toes</strong> formed by <span style="color:#dc2626"><strong>apoptosis (programmed cell death) in the AER</strong></span> &rarr; separates ridge into 5 parts.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Week 7:</strong> limbs rotate <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>90°</strong></span>: <span style="color:#1d4ed8">lower limb rotates medially</span> / <span style="color:#1d4ed8">upper limb rotates laterally.</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127982; B) Antero-Posterior Development</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>ZPA</strong> (Zone of Polarizing Activity) = special cells at the <u>distal posterior side</u> of developing limb. Secretes <strong>SHH (Sonic Hedgehog)</strong> &rarr; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">specifies the anteroposterior axis (thumb/big toe on anterior side).</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129521; C) Bone Formation</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Mesenchyme condenses &rarr; <span style="color:#15803d">differentiates</span> into chondroblasts &rarr; <strong>hyaline cartilage models</strong> &rarr; endochondral ossification. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">First cartilage model at <strong>week 6.</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Primary ossification centers in all long bones by <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>12th week.</strong></span> At birth: diaphysis ossified; epiphysis = cartilage. Shortly after birth: secondary ossification centers appear.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Epiphyseal growth plates allow elongation until <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>~20 years old.</strong></span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128101; D) Joint &amp; Muscle Development</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Joint:</strong> chondrogenesis stops &rarr; joint interzone induced &rarr; cells condense + die &rarr; <strong>joint cavity</strong> formed &rarr; surrounding cells form <strong>joint capsule.</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Muscle:</strong> cells from somites (myotomes): upper limb C5-T2, lower limb L2-S2. Split into <strong>ventral (flexors)</strong> + <strong>dorsal (extensors)</strong>.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Innervation:</strong> ventral primary rami penetrate limb mesenchyme. Contact with differentiating mesenchyme is <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">critical for functional differentiation.</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128300; E) Molecular Mechanisms</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Molecule</th><th style="padding:7px;border:1px solid #e2e8f0">Role</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>HOX genes</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Control craniocaudal location of limb bud formation</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>TBX5</strong></span></td><td style="padding:7px;border:1px solid #e2e8f0">Specifies the <strong>forelimb</strong></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>TBX4</strong></span></td><td style="padding:7px;border:1px solid #e2e8f0">Specifies the <strong>hindlimb</strong> <em style="color:#6d28d9;font-style:italic">remember: 4 = "lower" — pelvis, tibia 4 letters</em></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>FGF10</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Initiates limb growth</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>FGF4 + FGF8</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Maintain undifferentiated zone (secreted by AER)</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>BMP</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Induces AER formation; expressed in ventral ectoderm</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Radical fringe</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Restricts AER formation to distal tip</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>SHH</strong> (Sonic Hedgehog)</span></td><td style="padding:7px;border:1px solid #e2e8f0">Specifies anteroposterior axis; secreted by ZPA</td></tr>
</table>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#10060; F) Limb Defects</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Amelia</strong></span> = complete absence of a limb</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Meromelia</strong></span> = partial limb absence</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Phocomelia</strong></span> = seal-like limbs (hands/feet attached directly to trunk) — <span style="color:#dc2626">caused by thalidomide</span></div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Syndactyly</strong></span> = failure of apoptosis between digits (fused fingers/toes)</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Polydactyly</strong></span> = extra digits (SHH overexpression)</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Clubfoot (talipes equinovarus)</strong></span> = foot turned inward/downward</div>
</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Limb buds appear end of week 4; upper limb first.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">AER (FGF) = keeps mesenchyme proliferating. ZPA (SHH) = A-P axis.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">4 segments: cingulum / stylopod / zeugopod / autopod.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Week 7: upper limb rotates laterally, lower limb rotates medially.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">TBX5 = forelimb; TBX4 = hindlimb.</span></li>
<li><span style="color:#dc2626">Syndactyly = failed apoptosis. Polydactyly = SHH overexpression. Phocomelia = thalidomide.</span></li>
</ul>
</div>
</div>`},
    {q:11, text:'Shoulder joint — structure and movements; Elbow joint — structure and movements', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">11. Shoulder Joint &amp; Elbow Joint — Structure and Movements</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Shoulder (glenohumeral):</strong></span> large humeral head in shallow glenoid &rarr; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>very mobile but unstable.</strong></span> Stability from: rotator cuff, biceps, bony processes, ligaments. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Elbow:</strong></span> compound joint (3 bones) — hinge + pivot. Both are synovial.</p>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129418; PART 1 — Shoulder Joint (Glenohumeral)</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="color:#1d4ed8">Simple</span><br><strong>Shape:</strong> <span style="color:#1d4ed8">Ball and socket</span><br><strong>Articular head:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Head of the humerus</strong></span><br><strong>Articular fossa:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Glenoid cavity of the scapula</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Range of Motion:</strong><br><span style="color:#15803d">Anteflexion:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–90°</span> (to <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">180°</span> with scapular rotation)<br><span style="color:#15803d">Retroflexion:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–50°</span><br><span style="color:#15803d">Abduction:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–90°</span> / <span style="color:#15803d">Adduction:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–75°</span><br><span style="color:#15803d">Ext. rotation:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–90°</span> / <span style="color:#15803d">Int. rotation:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–90°</span></div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of shoulder joint — head of humerus in glenoid cavity, glenoid labrum, 4 ligaments (coracohumeral, 3 glenohumeral, transverse humeral), subacromial space with sub-deltoid bursa.</p></div>

<p style="margin:0 0 6px"><strong>Capsule:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Attaches to <strong>neck of scapula</strong> + <strong>anatomical neck of humerus.</strong><br><strong>Fibrous membrane:</strong> wraps around glenoid labrum; encloses labrum + biceps tendon head.<br><strong>Synovial membrane:</strong> forms bursae; folds around long head of biceps in intertubercular sulcus.</div>

<p style="margin:0 0 6px"><strong>4 Ligaments:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>1. Coracohumeral ligament</strong><br>Root of coracoid &rarr; greater tuberosity. <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Prevents inferior displacement of humerus.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>2. Glenohumeral ligaments</strong> (3 parts: superior, middle, inferior)<br>Give strength to anterior capsule.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>3. Coracoacromial ligament</strong><br>Connects acromion and coracoid process of scapula. <span style="color:#dc2626">Forms coracoacromial arch &rarr; can impinge on rotator cuff.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>4. Transverse humeral ligament</strong><br>Bridges greater + lesser tuberosities &rarr; holds <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">long head of biceps brachii tendon</span> in intertubercular sulcus.</div>
</div>

<p style="margin:0 0 6px"><strong>Accessory features:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Glenoid labrum</strong> — fibrocartilaginous ring that <u>enlarges the articular cavity</u>. <span style="color:#dc2626">Torn in shoulder dislocations (Bankart lesion).</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Bursae:</strong> sub-deltoid bursa (continuous with sub-acromial bursa) / sub-acromial bursa / subtendinous bursa of subscapularis <span style="color:#dc2626">(communicates with joint — infection can spread!)</span></div>

<p style="margin:0 0 6px"><strong>Rotator Cuff — SITS mnemonic:</strong></p>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>S</strong>upraspinatus<br>&rarr; greater tubercle</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>I</strong>nfraspinatus<br>&rarr; greater tubercle</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>T</strong>eres minor<br>&rarr; greater tubercle</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>S</strong>ubscapularis<br>&rarr; lesser tubercle</div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Innervation:</strong> suprascapular n., axillary n., lateral pectoral n.<br><strong>Blood supply:</strong> anterior + posterior circumflex humeral arteries + suprascapular artery.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128170; PART 2 — Elbow Joint</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Compound synovial joint</strong></span> — 3 bones in 3 simple joints: <strong>humeroradial</strong> (ball+socket) + <strong>humeroulnar</strong> (hinge) + <strong>proximal radioulnar</strong> (pivot)<br><strong>Shape:</strong> <span style="color:#1d4ed8">Biaxial — hinge</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Movements:</strong><br><span style="color:#15803d">Flexion:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–140°</span><br><span style="color:#15803d">Extension:</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0°</span><br><span style="color:#15803d">Supination:</span> via radioulnar joints<br><span style="color:#15803d">Pronation:</span> via radioulnar joints</div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of elbow — humerus, ulna (olecranon, coronoid process), radius (head, neck, tuberosity), sacciform recess. Label the 3 component joints and the 4 ligaments.</p></div>

<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Sacciform recess</strong> — pouch of articular capsule over the <u>neck of the radius</u>. Allows rotation.</div>

<p style="margin:0 0 6px"><strong>Elbow Ligaments:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Medial (ulnar) collateral ligament</strong> — 3 parts: anterior (strongest), posterior, oblique. <span style="color:#dc2626">Torn in valgus stress (pitcher's elbow).</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Lateral (radial) collateral ligament</strong> — from lateral epicondyle &rarr; annular ligament. <span style="color:#dc2626">Torn in varus stress.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Annular ligament</strong> — encircles <strong>head of radius</strong>; holds it against radial notch of ulna. <span style="color:#dc2626">Pulled in 'nursemaid's elbow' in children.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Quadrate ligament</strong> — strengthens inferior capsule of proximal radioulnar joint.</div>
</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Shoulder: ball+socket, simple. Very mobile, unstable. Stabilized by SITS + ligaments + labrum.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Rotator cuff: SITS — Supraspinatus, Infraspinatus, Teres minor (greater tubercle) + Subscapularis (lesser tubercle).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Elbow: compound synovial — humeroradial (ball+socket) + humeroulnar (hinge) + proximal radioulnar (pivot).</span></li>
<li><span style="color:#dc2626">Subtendinous subscapularis bursa communicates with glenohumeral joint.</span></li>
<li><span style="color:#dc2626">Annular ligament pulled off in nursemaid's elbow.</span></li>
</ul>
</div>
</div>`},
    {q:12, text:'Bones and joints of hand including reading of X-ray images', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">12. Bones and Joints of the Hand — Including X-Ray Reading</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The hand has <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>27 bones</strong></span>: <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>8 carpals</strong></span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>5 metacarpals</strong></span> + <span style="background:#fed7aa;padding:1px 4px;border-radius:3px"><strong>14 phalanges.</strong></span> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">The wrist (radiocarpal) joint = radius + scaphoid + lunate.</span></p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: PA X-ray of the hand — 8 carpal bones labeled, 5 metacarpals, phalanges (proximal/middle/distal). Mark scaphoid (most commonly fractured), the carpal tunnel, and the 4 main joints (radiocarpal, midcarpal, CMC, MCP, PIP, DIP).</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128147; A) Carpal Bones (8) — Proximal and Distal Rows</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Mnemonic: "Some Lovers Try Positions That They Can't Handle"</strong><br>Scaphoid · Lunate · Triquetrum · Pisiform · Trapezium · Trapezoid · Capitate · Hamate</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Proximal row:</strong><br>&#8226; <strong>Scaphoid</strong> — <span style="color:#dc2626">most commonly fractured carpal</span><br>&#8226; <strong>Lunate</strong><br>&#8226; <strong>Triquetrum</strong><br>&#8226; <strong>Pisiform</strong> — <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">sesamoid bone in flexor carpi ulnaris tendon</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Distal row:</strong><br>&#8226; <strong>Trapezium</strong> — articulates with thumb (saddle joint)<br>&#8226; <strong>Trapezoid</strong><br>&#8226; <strong>Capitate</strong> — largest carpal<br>&#8226; <strong>Hamate</strong> — has hook of hamate on palmar surface</div>
</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Scaphoid fracture:</strong></span> blood supply runs <span style="color:#dc2626"><strong>distal &rarr; proximal</strong></span>. Fracture through waist &rarr; <span style="color:#dc2626"><strong>avascular necrosis</strong></span> of proximal fragment. Often missed on initial X-ray.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Flexor retinaculum</strong> = membranous band spanning carpal arch &rarr; forms the <u>carpal tunnel</u>. <span style="color:#dc2626">Median nerve compressed &rarr; carpal tunnel syndrome.</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9997; B) Metacarpal Bones (5)</h3>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">MC I<br><em>Thumb</em></div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">MC II<br><em>Index</em></div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">MC III<br><em>Middle</em></div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">MC IV<br><em>Ring</em></div> <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">MC V<br><em>Little</em></div>
</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><span style="color:#dc2626"><strong>Boxer's fracture</strong></span> — fracture of 4th or 5th metacarpal neck (forced fist).<br><span style="color:#dc2626"><strong>Bennett's fracture</strong></span> — fracture-dislocation of base of 1st metacarpal (forced hyper-abduction of thumb).</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129496; C) Blood Supply</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Deep palmar arch</strong> — continuation of <u>radial artery</u>. Wraps around thumb, crosses deep palm. Gives branches to thumb and index finger.</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Superficial palmar arch</strong> — continuation of <u>ulnar artery</u>. Gives off <strong>common digital arteries</strong> &rarr; supply fingers.</div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Princeps pollicis artery</strong> (from deep palmar arch) — largest artery to thumb.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128285; D) Joints of the Hand</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Proximal radioulnar joint</strong> — head of radius &harr; radial notch of ulna.<br><strong>Distal radioulnar joint</strong> — ulnar notch of radius &harr; head of ulna.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Both = <strong>pivot joints</strong> &rarr; <strong>pronation and supination.</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Wrist (Radiocarpal) joint:</strong><br>&#8226; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Radius</strong> + <strong>scaphoid</strong> + <strong>lunate</strong> (= 2/3 of proximal carpal row)</span><br>&#8226; Ulna does NOT articulate with carpals (articular disc separates them)<br>&#8226; <span style="color:#15803d">Movements: flexion, extension, abduction, adduction, circumduction</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Distal Interphalangeal (DIP)</strong> — tip of finger. <span style="color:#dc2626">Arthritic / commonly fractured.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Proximal Interphalangeal (PIP)</strong> — just below DIP. <span style="color:#dc2626">Stiffens easily after injury.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Metacarpophalangeal (MCP)</strong> — the "knuckle." <span style="color:#15803d">Flexion/extension + abduction/adduction (spreading).</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Carpometacarpal (CMC)</strong> — base of each metacarpal. <strong>Thumb CMC (1st CMC)</strong> = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>saddle joint</strong></span> — most mobile, essential for opposition.</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128065; E) X-Ray Reading Tips</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Key things to check on hand X-ray:</strong><br>&#8226; Count 8 carpal bones in 2 rows<br>&#8226; Check scaphoid for radiolucent fracture line near the waist<br>&#8226; Check metacarpal alignment and necks (boxer's fracture)<br>&#8226; Check phalanges for fractures (common at DIP)<br>&#8226; Check radiocarpal and MCP joints for arthritis (loss of joint space)</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">8 carpals: Scaphoid, Lunate, Triquetrum, Pisiform (proximal) + Trapezium, Trapezoid, Capitate, Hamate (distal).</span></li>
<li><span style="color:#dc2626">Scaphoid fracture &rarr; avascular necrosis (blood supply distal-to-proximal).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Wrist joint: radius + scaphoid + lunate.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Thumb CMC = saddle joint (opposition).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Radioulnar joints = pivot (pronation/supination).</span></li>
<li><span style="color:#dc2626">Boxer's fracture = 4th/5th MC neck. Bennett's = 1st MC base.</span></li>
</ul>
</div>
</div>`},
    {q:13, text:'Bony pelvis as complex, connections, passages, diameters, planes, sexual differences', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">13. Bony Pelvis — Connections, Passages, Diameters, Planes &amp; Sexual Differences</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><strong>Pelvic girdle</strong> = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>left + right hip bones</strong></span> + <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>sacrum.</strong></span> Divided by the <strong>linea terminalis</strong> into: <strong>Greater pelvis (false pelvis)</strong> — contains intestines; <strong>Lesser pelvis (true pelvis)</strong> — contains bladder, genital organs, rectum.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of the pelvis — hip bones (ilium/ischium/pubis meeting at acetabulum), sacrum, linea terminalis, pubic symphysis. Label greater vs lesser pelvis.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; The Hip Bone</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">Each hip bone = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>3 fused bones: Ilium + Ischium + Pubis</strong></span> — meet at the <strong>acetabulum</strong> (articular fossa of hip joint). <em style="color:#6d28d9;font-style:italic">In childhood, connected by hyaline cartilage that ossifies at puberty.</em></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128281; Main Passages</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Obturator foramen</strong><br>Surrounded by ischium + pubis.<br>Closed by <strong>obturator membrane</strong>.<br>Canal carries: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>obturator nerve and vessels</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Greater sciatic foramen</strong><br>Greater sciatic notch + sacrospinous + sacrotuberous ligaments.<br>Divided by <strong>piriformis</strong> into:<br>&#8226; Suprapiriformis: <strong>superior gluteal vessels</strong><br>&#8226; Infrapiriformis: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>sciatic nerve, posterior cutaneous femoral n., inferior gluteal vessels, pudendal nerve, internal pudendal vessels</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Lesser sciatic foramen</strong><br>Lesser sciatic notch + ischial spine + ligaments.<br>Contains: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>internal pudendal vessels, pudendal nerve, n. to obturator internus, obturator internus tendon</strong></span></div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128285; Connections of the Pelvis</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Sacroiliac joint</strong><br>Type: <span style="color:#1d4ed8">Simple — amphiarthrosis</span>. Shape: <span style="color:#1d4ed8">Plane.</span><br>Surfaces: sacrum &harr; ilium.<br>Ligaments: anterior, posterior, interosseous sacroiliac lig.<br><span style="color:#dc2626">Overloading &rarr; pain radiating to thigh.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Pubic symphysis</strong><br>Type: <span style="color:#1d4ed8">Fibrocartilaginous joint.</span> Unites two pubic bones.<br>Articular surfaces covered by hyaline cartilage + fibrocartilaginous disc.<br>Ligaments: superior + inferior pubic ligaments.<br><span style="color:#dc2626">In females: relaxin loosens this for parturition.</span></div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128200; External Pelvic Diameters</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Distance</th><th style="padding:7px;border:1px solid #e2e8f0">Length</th><th style="padding:7px;border:1px solid #e2e8f0">Measured between</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Interspinous</strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">26 cm</span></td><td style="padding:7px;border:1px solid #e2e8f0">ASIS to ASIS</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Intercristal</strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">29 cm</span></td><td style="padding:7px;border:1px solid #e2e8f0">Iliac crest to iliac crest</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Intertrochanteric</strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">31 cm</span></td><td style="padding:7px;border:1px solid #e2e8f0">Greater trochanter to trochanter</td></tr>
</table>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>From superior &rarr; inferior: Intercristal (29) &rarr; Interspinous (26) &rarr; Intertrochanteric (31).</strong></span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128203; Pelvic Planes (4)</h3>
<table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Plane</th><th style="padding:7px;border:1px solid #e2e8f0">Borders</th><th style="padding:7px;border:1px solid #e2e8f0">Key diameter</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pelvic Inlet</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Promontory &rarr; linea terminalis &rarr; superior symphysis</td><td style="padding:7px;border:1px solid #e2e8f0">Transverse <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">13 cm</span> / Diagonal <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">11 cm</span> / Oblique <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">12.5 cm</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pelvic Width Plane</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Middle sacrum &rarr; middle symphysis &rarr; acetabulum</td><td style="padding:7px;border:1px solid #e2e8f0">Oblique <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">13.5 cm</span></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pelvic Narrow Plane</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Inferior symphysis &rarr; apex of sacrum &rarr; ischial spines</td><td style="padding:7px;border:1px solid #e2e8f0">Straight <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">11.5 cm</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pelvic Outlet</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Apex of coccyx &rarr; ischial tuberosities &rarr; inferior pubic symphysis</td><td style="padding:7px;border:1px solid #e2e8f0">Transverse <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">11 cm</span></td></tr>
</table>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9878; Sexual Differences</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Feature</th><th style="padding:7px;border:1px solid #e2e8f0">Female</th><th style="padding:7px;border:1px solid #e2e8f0">Male</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Overall shape</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Wide, shallow, oval</td><td style="padding:7px;border:1px solid #e2e8f0">Narrow, deep, heart-shaped</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Subpubic angle</strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">&gt;80&ndash;90&deg;</span> (wide)</td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">&lt;70&deg;</span> (narrow)</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Pelvic inlet</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Oval/round (wider)</td><td style="padding:7px;border:1px solid #e2e8f0">Heart-shaped (narrower)</td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong>Ischial tuberosities</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Everted (wider apart)</td><td style="padding:7px;border:1px solid #e2e8f0">Inverted (closer)</td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong>Sacrum</strong></td><td style="padding:7px;border:1px solid #e2e8f0">Shorter, wider, less curved</td><td style="padding:7px;border:1px solid #e2e8f0">Longer, narrower, more curved</td></tr>
</table>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Hip bone = ilium + ischium + pubis (meet at acetabulum).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Greater sciatic foramen: suprapiriformis = superior gluteal vessels; infrapiriformis = sciatic nerve + pudendal nerve + inferior gluteal vessels.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">External diameters: interspinous 26 cm, intercristal 29 cm, intertrochanteric 31 cm.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Female pelvis: wide, round inlet, &gt;80° subpubic angle.</span></li>
<li><span style="color:#dc2626">Relaxin loosens pubic symphysis for parturition.</span></li>
</ul>
</div>
</div>`},
    {q:14, text:'Hip joint — structure, movements, developmental dysplasia of hip', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">14. Hip Joint — Structure, Movements &amp; Developmental Dysplasia of the Hip (DDH)</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Hip joint</strong> = head of the femur in the acetabulum of the hip bone.</span> Type: <span style="color:#1d4ed8">simple synovial</span>, <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">limited ball and socket</span> — deeper socket than shoulder = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>more stable but less mobile.</strong></span> Connects lower limb to trunk; bears most body weight.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of hip joint — femoral head deep in acetabulum, acetabular lip (labrum) as ring around rim, joint capsule wrapping the neck, zona orbicularis as collar around narrowest part of neck. MAIN SCHEME.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; Structure at a Glance</h3>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Type:</span></strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Simple synovial</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Shape:</span></strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Limited ball and socket</span><br>(very deep socket)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Articular head:</span></strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Head of the femur</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Articular fossa:</span></strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Lunate surface of the acetabulum</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Capsule:</span></strong><br>Outside the acetabular lip. Extracapsular femoral neck is <span style="color:#dc2626"><strong>shorter at the back</strong></span> &rarr; <span style="color:#dc2626">posterior dislocations</span></div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#11088; Accessory Features</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Acetabular lip (labrum)</strong> — <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">made of <strong>fibrocartilage</strong>; deepens the socket and helps grip the femoral head.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Fat pad</strong> — in the acetabular fossa; <u>cushions the joint.</u></div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Cross-section showing lunate surface (C-shape), femoral head fitting in, acetabular lip closing the rim, fat pad in central acetabular fossa.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129327; Movements (limited in all 3 axes)</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Movement</th><th style="padding:7px;border:1px solid #e2e8f0">Range</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Flexion</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–130°</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Extension</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–30°</span> — <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">limited by the <strong>iliofemoral ligament</strong></span></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Abduction</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–45°</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Adduction</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–30°</span></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">External (lateral) rotation</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">up to 45°</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Internal (medial) rotation</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">up to 35°</span></td></tr>
</table>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129335; Ligaments — 5 Total (4 extracapsular + 1 intracapsular)</h3>
<p style="margin:0 0 6px"><strong>Extracapsular (4):</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>1. Iliofemoral ligament</strong><br>AIIS + rim of acetabulum &rarr; intertrochanteric line.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">STRONGEST ligament in the human body — tensile strength <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~Ş50 kg</span></span><br>Function: limits <span style="color:#15803d">extension</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>2. Ischiofemoral ligament</strong><br>Ischium (below acetabulum) &rarr; zona orbicularis &rarr; lateral attachment of iliofemoral lig.<br>Function: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>prevents medial (internal) rotation</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>3. Pubofemoral ligament</strong><br>Obturator crests &rarr; zona orbicularis.<br>Function: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>restricts abduction</strong></span><br><em style="color:#6d28d9;font-style:italic"><strong>Weakest</strong> of the 3 big extracapsular ligaments</em></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>4. Zona orbicularis</strong><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Collar around narrowest part of femoral neck.</strong></span> Receives projections from ischiofemoral + pubofemoral ligaments.<br>Function: <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">maintains contact between head and socket</span></div>

<p style="margin:0 0 6px"><strong>Intracapsular (1):</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Ligamentum teres (ligament of the head of the femur)</strong><br>Acetabular notch &rarr; fovea capitis of femoral head.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>No real mechanical function</strong></span> — main job: carries the <span style="color:#dc2626"><strong>artery to the head of the femur</strong></span> (branch of the obturator artery via acetabular branch).<br><em style="color:#6d28d9;font-style:italic">Head also supplied by medial + lateral circumflex femoral arteries.</em></div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior + posterior views of hip joint side-by-side — iliofemoral (Y-shape anteriorly), pubofemoral (medial-front), ischiofemoral (posterior), zona orbicularis as collar. SECOND KEY SCHEME.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129754; Blood Supply of the Femoral Head</h3>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#dc2626">Acetabular branch of the obturator artery</span></strong><br>Runs through the <strong>ligamentum teres</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Medial circumflex femoral artery</span></strong><br>Main blood supply</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#1d4ed8">Lateral circumflex femoral artery</span></strong><br>Secondary supply</div>
</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#128118; Developmental Dysplasia of the Hip (DDH)</h3>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>DDH</strong> = <span style="color:#dc2626"><strong>congenital deformity</strong></span> of the hip joint. Misshapen <strong>acetabulum</strong> and/or <strong>head + neck of femur</strong> &rarr; misalignment of bone-to-bone contact.<br>If untreated &rarr; <span style="color:#dc2626"><strong>orthopedic problems for life.</strong></span><br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>All newborns screened post-birth with ultrasound.</strong></span></div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Side-by-side — normal infant hip (head fully in acetabulum) vs DDH (head partially out / shallow acetabulum). Add ultrasound icon.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9888; Hip Dislocation &amp; Femoral Neck Fracture</h3>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>Hip dislocation:</strong> caused by high-energy trauma — typically <span style="color:#dc2626"><strong>dashboard injury</strong></span> (knees hit dashboard in car accident). <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">90%</span> are POSTERIOR dislocations</span> — through weak spot between capsule-strengthening ligaments.</div>
<div style="background:#fef2f2;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px;margin-bottom:10px"><strong>Femoral neck fracture:</strong> intracapsular fracture. Neck angle <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~145°</span>. Fracture can <span style="color:#dc2626"><strong>cut off blood supply to femoral head</strong></span> &rarr; <span style="color:#dc2626"><strong>avascular necrosis</strong></span> ("the blood can eat the cartilage").</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Hip = limited ball-and-socket; more stable than shoulder (deeper socket).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">5 ligaments: 4 extracapsular + 1 intracapsular (ligamentum teres).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Iliofemoral = STRONGEST ligament in the body.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Ligamentum teres: no mechanical function, carries artery to femoral head.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">DDH: all newborns screened with ultrasound.</span></li>
<li><span style="color:#dc2626">90% of hip dislocations are posterior (dashboard injury).</span></li>
<li><span style="color:#dc2626">Femoral neck fracture = intracapsular &rarr; avascular necrosis risk.</span></li>
</ul>
</div>
</div>`},
    {q:15, text:'Knee joint — structure, biomechanics, movements', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">15. Knee Joint — Structure, Biomechanics &amp; Movements</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The knee is the <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>most complicated synovial joint in the human body.</strong></span> Type: <span style="color:#1d4ed8">Compound</span> (3 bones) + <span style="color:#1d4ed8">Complex</span> (2 menisci). Shape: <span style="color:#1d4ed8">Bicondylar (hinge).</span> Divided into the <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>femoropatellar</strong></span> and <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>femorotibial</strong></span> sub-joints.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Anterior view of the knee joint — femur condyles, tibia, fibula, patella; medial and lateral menisci; ACL and PCL crossing in the intercondylar space; collateral ligaments. MAIN SCHEME.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; Structure</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Femoropatellar joint</strong><br>Shape: <span style="color:#1d4ed8">Plane</span><br>Head: <strong>Patellar surface of femur</strong><br>Fossa: <strong>Articular surface of patella</strong></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Femorotibial joint</strong><br>Shape: <strong>Hinge + pivot</strong><br>Head: <strong>Condyles of the femur</strong><br>Fossa: <strong>Condyles of the tibia</strong></div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Articular capsule:</strong> fibrous capsule from below epicondyles of femur &rarr; tibia + patella. Synovial membrane lines inside but <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>does NOT cover the cruciate ligaments.</strong></span> <strong>Infrapatellar synovial fold</strong> &rarr; branches into alar folds. <strong>Infrapatellar fat pad</strong> between fibrous and synovial layers.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127775; Accessory Features</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">There are <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~20 bursae</span> and <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">2 recesses</span> around the knee.<br>Communicating: <strong>suprapatellar recess</strong> <span style="color:#dc2626">(needle point — aspiration)</span> / sub-popliteal recess / suprapatellar bursa / gastrocnemio-semimembranosus bursa.<br>Not communicating: anserine bursa / subcutaneous prepatellar + infrapatellar bursae.</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Medial meniscus (C-shaped)</strong><br>Firmly attached to articular capsule + <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">to tibial (medial) collateral ligament</span>. <span style="color:#dc2626">Less mobile &rarr; more prone to injury.</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Lateral meniscus (O-shaped)</strong><br>NOT attached to capsule &rarr; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px">more mobile.</span> Fixed by <strong>popliteus muscle.</strong></div>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Superior view of tibial plateau showing C-shaped medial meniscus, O-shaped lateral meniscus, ACL and PCL attachment sites, and the intercondylar eminence.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#127950; Movements</h3>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
<tr style="background:#f1f5f9"><th style="padding:7px;border:1px solid #e2e8f0">Movement</th><th style="padding:7px;border:1px solid #e2e8f0">Range</th></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Flexion</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–150°</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Extension</span></strong></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0°</span></td></tr>
<tr><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">Internal rotation</span></strong> <em style="color:#6d28d9;font-style:italic">(only when knee is flexed)</em></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">5–10°</span></td></tr>
<tr style="background:#f8fafc"><td style="padding:7px;border:1px solid #e2e8f0"><strong><span style="color:#15803d">External rotation</span></strong> <em style="color:#6d28d9;font-style:italic">(only when knee is flexed)</em></td><td style="padding:7px;border:1px solid #e2e8f0"><span style="background:#fed7aa;padding:1px 4px;border-radius:3px">up to 40°</span></td></tr>
</table>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Rotation only possible when knee is FLEXED</strong> — when fully extended, the knee is "locked" and cannot rotate.</span></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129335; Ligaments (12 total)</h3>
<p style="margin:0 0 6px"><strong>Intra-articular:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>ACL</strong> (Anterior Cruciate Ligament)<br>Lateral femoral condyle (medial surface) &rarr; anterior intercondylar area of tibia.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Restricts anterior displacement of tibia on femur.</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>PCL</strong> (Posterior Cruciate Ligament)<br>Medial femoral condyle (lateral surface) &rarr; posterior intercondylar area of tibia.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Restricts posterior displacement of tibia on femur.</strong></span></div>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Transverse ligament of the knee</strong> — connects both menisci anteriorly.<br><strong>Anterior + posterior meniscofemoral ligaments</strong> — around the PCL.</div>

<p style="margin:0 0 6px"><strong>Collateral ligaments:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>LCL</strong> (Lateral/Fibular Collateral Ligament)<br>Lateral epicondyle of femur &rarr; head of fibula.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Prevents lateral bending.</strong></span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>MCL</strong> (Medial/Tibial Collateral Ligament)<br>Medial epicondyle of femur &rarr; medial proximal tibia.<br><span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Prevents medial bending under valgus force.</strong></span><br><span style="color:#dc2626">Attached to medial meniscus &rarr; concurrent injury common!</span></div>
</div>

<p style="margin:0 0 6px"><strong>Other ligaments:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Patellar ligament</strong> — quadriceps femoris insertion; patella &rarr; tibial tuberosity.<br><strong>Medial + lateral patellar retinaculum</strong> — hold patella in patellar surface.<br><strong>Oblique popliteal ligament</strong> — semimembranosus insertion.<br><strong>Arcuate popliteal ligament</strong> — arch over popliteus tendon.</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129309; Screw-Home Mechanism (Biomechanics)</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px">When the knee approaches full extension, the tibia <span style="color:#15803d">externally rotates</span> <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">~10°</span> on the femur &rarr; <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>"locks" the knee</strong></span> in the close-packed position. Unlocking: popliteus muscle internally rotates the tibia.</div>

<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-top:20px">
<strong>Summary:</strong>
<ul style="margin:6px 0 0 16px">
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Knee: compound (3 bones) + complex (2 menisci). Most complex synovial joint.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">ACL: prevents anterior tibial displacement. PCL: prevents posterior.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">MCL attached to medial meniscus &rarr; unhappy triad (ACL+MCL+medial meniscus).</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Lateral meniscus (O-shape) = more mobile. Medial (C-shape) = less mobile, more torn.</span></li>
<li><span style="background:#fef9c3;padding:1px 4px;border-radius:3px">Rotation only possible when knee is FLEXED.</span></li>
<li><span style="color:#dc2626">Suprapatellar recess = needle point for aspiration.</span></li>
</ul>
</div>
</div>`},
    {q:16, text:'Talocrural and subtalar joints — structure, movements', content:`<div style="font-family:Inter,-apple-system,sans-serif;font-size:13.5px;line-height:1.6;padding:16px;background:#fff;border-radius:10px">
<div style="background:#52C490;padding:14px 18px;border-radius:10px 10px 0 0;margin:-16px -16px 16px;color:#fff"><h2 style="margin:0;font-size:17px;font-weight:700">16. Talocrural and Subtalar Joints — Structure and Movements</h2></div>
<div style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;padding:13px;margin-bottom:14px">
<p style="margin:0">The "ankle complex" = <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>3 closely related joints:</strong></span> (1) <strong>Talocrural</strong> (true ankle), (2) <strong>Subtalar (talocalcaneal)</strong>, (3) <strong>Talocalcaneonavicular.</strong> Subtalar + talocalcaneonavicular act together as one functional unit for foot rotation.</p>
</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Lateral view of the ankle — tibia, fibula (mortise), talus fitting between malleoli, calcaneus below. Show deltoid ligament (medial) and 3-part lateral ligament (ATFL, PTFL, CFL).</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#129456; 1) Talocrural Joint (True Ankle Joint)</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="color:#1d4ed8">Compound</span> (3 bones)<br><strong>Shape:</strong> <span style="color:#1d4ed8">Hinge</span><br><strong>Head:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Superior trochlea of the talus</strong></span><br><strong>Fossa:</strong> <span style="background:#fef9c3;padding:1px 4px;border-radius:3px"><strong>Mortise</strong></span> (distal tibia + fibula grip the trochlea)</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>The mortise is formed by:</strong><br>&#8226; <strong>Inferior articular surface of tibia</strong><br>&#8226; <strong>Medial malleolus of tibia</strong><br>&#8226; <strong>Lateral malleolus of fibula</strong></div>
</div>
<p style="margin:0 0 6px"><strong>Movements:</strong></p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#15803d">Plantar flexion</span></strong> (pointing foot) — <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–50°</span></div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong><span style="color:#15803d">Dorsiflexion</span></strong> (foot up) — <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">0–20°</span></div>
</div>
<p style="margin:0 0 6px"><strong>Ligaments:</strong></p>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Deltoid (Medial Collateral) Ligament</strong> — strong triangular ligament on the medial side; <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">4 parts</span>: anterior tibiotalar / posterior tibiotalar / tibionavicular / tibiocalcaneal (tibia &rarr; <strong>sustentaculum tali</strong>).</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Lateral Collateral Ligament</strong> — <span style="background:#fed7aa;padding:1px 4px;border-radius:3px">3 parts</span> — <span style="color:#dc2626"><strong>most commonly injured in ankle sprains:</strong></span><br>&#8226; <strong>ATFL</strong> (anterior talofibular) — lateral malleolus &rarr; neck of talus. <span style="color:#dc2626">Most commonly torn in inversion sprains.</span><br>&#8226; <strong>PTFL</strong> (posterior talofibular) — lateral malleolus &rarr; posterior talar process<br>&#8226; <strong>CFL</strong> (calcaneofibular) — lateral malleolus &rarr; calcaneus</div>
<div style="border:2px dashed #94a3b8;border-radius:8px;background:#f8fafc;padding:16px;margin:14px 0;min-height:80px"><p style="color:#94a3b8;font-style:italic;font-size:12.5px;margin:0">Illustration: Medial view showing deltoid ligament 4 parts. Lateral view showing ATFL, PTFL, CFL.</p></div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9679; 2) Subtalar (Talocalcaneal) Joint</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="color:#1d4ed8">Simple</span> | <strong>Shape:</strong> <span style="color:#1d4ed8">Cylindrical</span><br><strong>Head:</strong> Posterior articular talar surface of calcaneus<br><strong>Fossa:</strong> Posterior calcaneal articular facet of talus<br><strong>Ligaments (<span style="background:#fed7aa;padding:1px 4px;border-radius:3px">4</span>):</strong> posterior / medial / lateral / interosseous talocalcaneal ligaments</div>

<h3 style="color:#1d4ed8;border-bottom:2px solid #bfdbfe;padding-bottom:6px;margin:20px 0 12px;font-size:15px">&#9679; 3) Talocalcaneonavicular Joint</h3>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px"><strong>Type:</strong> <span style="color:#1d4ed8">Compound</span> (3 bones)<br><strong>Head:</strong> Head of talus + anterior + middle articular talar surfaces of calcaneus<br><strong>Fossa:</strong> Navicular + anterior + middle calcaneal facets + fibrocartilage between talus and navicular<br><strong>Ligaments:</strong> talonavicular / plantar calcaneonavicular <span style="color:#dc2626">(spring ligament — supports head of talus)</span> / bifurcate (calcaneonavicular + calcaneocuboid parts)</div>
