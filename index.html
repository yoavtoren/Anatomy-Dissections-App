            <div class="topic-sec-num">${parent?parent.name:''}</div>
            <h1 class="topic-sec-title" style="font-size:28px!important">${d.title}</h1>
            ${sub ? `<p class="topic-sec-brief">${sub.brief}</p>` : ''}
        </div>
    </div>
    <div class="section">
        ${renderBlocks(d.body)}
    </div>
    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn ghost" href="#/region/${d.parent}">← ${parent?parent.name:""} — all topics</a>
        <a class="btn alt" href="#/topography">All regions</a>
    </div>
    `;
}

function cnsSelect(sec){
    const isBrain = sec === 'brain';
    // Swap image
    document.querySelectorAll('.ao-img-layer[id^="cns-layer-"]').forEach(el=>el.classList.remove('active'));
    const layerId = 'cns-layer-' + (isBrain ? 'brain' : 'overview');
    const layerEl = document.getElementById(layerId);
    if(layerEl) layerEl.classList.add('active');
    // Swap SVG viewBox + hotspot groups
    const svg = document.getElementById('cnsSvg');
    if(svg) svg.setAttribute('viewBox', '0 0 200 125');
    const ov = document.getElementById('cns-overview-spots');
    const br = document.getElementById('cns-brain-spots');
    if(ov){ ov.style.display = isBrain?'none':'block'; }
    if(br){ br.style.display = isBrain?'block':'none'; br.style.pointerEvents = isBrain?'auto':'none'; }
    // Badge
    const badge = document.getElementById('cns-badge');
    if(badge) badge.textContent = CNS_PNS[sec] ? CNS_PNS[sec].title : '';
    // Right panel
    const panel = document.getElementById('cns-info-content');
    if(!panel) return;
    const info = CNS_PNS[sec];
    if(!info){ panel.innerHTML = '<p class="muted" style="padding:16px">Click a region on the figure.</p>'; return; }
    panel.innerHTML = `
        <div style="padding:16px 16px 8px">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:4px">${sec}</div>
            <div style="font-size:19px;font-weight:800;color:var(--ink);line-height:1.2">${info.title}</div>
            <p style="font-size:12.5px;color:var(--muted);margin:6px 0 0;line-height:1.5">${info.intro}</p>
        </div>
        <div style="height:1px;background:var(--border);margin:0 16px"></div>
        <div style="overflow-y:auto;flex:1;padding:10px 12px">
            ${info.sub.map(s=>`
                <div class="cns-sub-card" onclick="location.hash='#/cns/${s.id}'">
                    <div style="flex:1;min-width:0">
                        <div style="font-size:13px;font-weight:700;color:var(--ink);line-height:1.3">${s.name}</div>
                        <div style="font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4">${s.brief}</div>
                    </div>
                    <div style="color:var(--accent);font-size:16px;flex-shrink:0;margin-left:8px">›</div>
                </div>
            `).join('')}
        </div>`;
}

    {h:"Branches and skull openings", list:[
      "<b>V1 — Ophthalmic</b>: superior orbital fissure. Branches: lacrimal, frontal (supraorbital + supratrochlear), nasociliary (incl. anterior ethmoidal, infratrochlear, long ciliary)",
      "<b>V2 — Maxillary</b>: foramen rotundum. Branches: zygomatic, infraorbital, superior alveolar, posterior superior nasal",
      "<b>V3 — Mandibular</b>: foramen ovale (carries motor root). Branches: auriculotemporal, inferior alveolar, lingual, buccal; motor to muscles of mastication, mylohyoid, anterior belly of digastric, tensor tympani, tensor veli palatini"
    ]},
    {img:"cn-5-trigeminal.jpg", caption:"Trigeminal nerve V1, V2, V3"},
  ]},
  "cn-6":{parent:"cn", title:"CN VI — Abducens", body:[
    {h:"Nucleus", p:"Lower pons — superior part of the floor of the 4th ventricle (under the facial colliculus)."},
    {h:"Function", p:"Lateral rectus (eye abduction)."},
    {h:"Skull opening", p:"Superior orbital fissure."},
    {h:"Course", p:"Pontomedullary junction → subarachnoid → pierces dura → travels in Dorello's canal → tip of petrous temporal bone → cavernous sinus (within sinus, NOT in lateral wall — most vulnerable to lesion in cavernous sinus syndromes) → SOF → lateral rectus."},
    {img:"cn-6-abducens.jpg", caption:"Abducens course through Dorello's canal"},
  ]},
  "cn-7":{parent:"cn", title:"CN VII — Facial", body:[
    {h:"Function", list:[
      "Motor: muscles of facial expression, stapedius, stylohyoid, posterior belly of digastric",
      "Parasympathetic: lacrimal gland (via greater petrosal), submandibular & sublingual glands (via chorda tympani → submandibular ganglion)",
      "Special sensory (taste): anterior 2/3 of tongue (chorda tympani)",
      "General sensory: external acoustic meatus skin"
    ]},
    {h:"Skull openings", list:["Internal acoustic meatus (entry)","Stylomastoid foramen (exit)","Chorda tympani — petrotympanic fissure"]},
    {h:"Course", p:"Pontomedullary junction → IAM → facial canal (geniculate ganglion → greater petrosal n. → nerve to stapedius → chorda tympani) → exits stylomastoid foramen → enters parotid gland (does not innervate it) → divides into 5 branches: temporal, zygomatic, buccal, mandibular, cervical (mnemonic: 'Two Zebras Bit My Cookie')."},
    {img:"cn-7-facial.jpg", caption:"Facial nerve branches and parasympathetic relays"},
  ]},
  "cn-8":{parent:"cn", title:"CN VIII — Vestibulocochlear", body:[
    {h:"Function", p:"Cochlear division — hearing. Vestibular division — balance and head position."},
    {h:"Skull opening", p:"Internal acoustic meatus."},
    {img:"cn-8-vestibulocochlear.jpg", caption:"Cochlear and vestibular pathways"},
  ]},
  "cn-9":{parent:"cn", title:"CN IX — Glossopharyngeal", body:[
    {h:"Function", list:[
      "Motor: stylopharyngeus",
      "Parasympathetic: parotid gland (via lesser petrosal n. → otic ganglion → auriculotemporal n. of V3)",
      "Special sensory (taste): posterior 1/3 of tongue",
      "General sensory: oropharynx, palatine tonsil, posterior 1/3 tongue, middle ear (Jacobson's nerve), carotid body & sinus"
    ]},
    {h:"Skull opening", p:"Jugular foramen."},
    {img:"cn-9-glossopharyngeal.jpg", caption:"Glossopharyngeal nerve"},
  ]},
  "cn-10":{parent:"cn", title:"CN X — Vagus", body:[
    {h:"Function", list:[
      "Motor: pharynx (except stylopharyngeus), larynx (recurrent laryngeal n.), palate (except tensor veli palatini)",
      "Parasympathetic: thoracic and abdominal viscera (down to splenic flexure of colon)",
      "Special sensory: taste from epiglottis",
      "General sensory: dura of posterior cranial fossa; external acoustic meatus (auricular branch — Arnold's nerve)"
    ]},
    {h:"Skull opening", p:"Jugular foramen."},
    {img:"cn-10-vagus.jpg", caption:"Vagus nerve thoracic and abdominal course"},
  ]},
  "cn-11":{parent:"cn", title:"CN XI — Accessory", body:[
    {h:"Function", p:"Spinal root: motor to sternocleidomastoid (SCM) and trapezius."},
    {h:"Skull opening", p:"Jugular foramen — exits the cranium."},
    {h:"Course", p:"Spinal root arises from the upper cervical cord (C1–C5/C6), ascends through the foramen magnum, joins (then leaves) the cranial root, and exits via the jugular foramen — descends in the posterior triangle of the neck. The cranial root joins CN X."},
    {img:"cn-11-accessory.jpg", caption:"Accessory nerve in the posterior triangle"},
  ]},
  "cn-12":{parent:"cn", title:"CN XII — Hypoglossal", body:[
    {h:"Function", p:"Motor to all intrinsic and extrinsic tongue muscles (genioglossus, hyoglossus, styloglossus) — except palatoglossus (CN X)."},
    {h:"Skull opening", p:"Hypoglossal canal."},
    {h:"Clinical", p:"Lower motor neuron lesion → tongue deviates toward the lesion side on protrusion (the unaffected genioglossus pushes it that way)."},
    {img:"cn-12-hypoglossal.jpg", caption:"Hypoglossal nerve"},
  ]},

  "cervical-plexus":{parent:"plexuses", title:"Cervical plexus (C1–C4)",body:[
    {h:"Cutaneous branches", list:[
      "Lesser occipital n. (C2)",
      "Great auricular n. (C2, C3)",
      "Transverse cervical n. (C2, C3)",
      "Supraclavicular nn. (C3, C4)"
    ]},
    {h:"Motor branches", list:[
      "Ansa cervicalis (C1–C3) — innervates strap muscles (omohyoid, sternohyoid, sternothyroid)",
      "Phrenic n. (C3, C4, C5) — diaphragm; '<b>C3, 4, 5 keep the diaphragm alive</b>'",
      "Direct branches to prevertebral muscles, levator scapulae, and middle scalene"
    ]},
    {img:"cervical-plexus.jpg", caption:"Cervical plexus and its branches"},
  ]},
  "brachial-plexus":{parent:"plexuses", title:"Brachial plexus (C5–T1)",body:[
    {h:"Organization (mnemonic — Real Texans Drink Cold Beer)", list:[
      "<b>R</b>oots — anterior rami of C5–T1",
      "<b>T</b>runks — superior (C5+C6), middle (C7), inferior (C8+T1)",
      "<b>D</b>ivisions — anterior & posterior of each trunk",
      "<b>C</b>ords — lateral, posterior, medial",
      "<b>B</b>ranches — terminal nerves"
    ]},
    {h:"Terminal branches (5 main)", list:[
      "Musculocutaneous n. (lateral cord; C5–C7) — anterior arm flexors",
      "Median n. (lateral + medial cords; C5–T1) — most forearm flexors, thenar eminence",
      "Ulnar n. (medial cord; C8–T1) — intrinsic hand muscles, hypothenar",
      "Axillary n. (posterior cord; C5–C6) — deltoid, teres minor",
      "Radial n. (posterior cord; C5–T1) — all extensors of arm and forearm"
    ]},
    {img:"brachial-plexus.jpg", caption:"Brachial plexus — roots, trunks, divisions, cords, branches"},
  ]},
  "lumbar-plexus":{parent:"plexuses", title:"Lumbar plexus (L1–L4)",body:[
    {h:"Major branches (mnemonic — I, I Get Lots Of Fun)", list:[
      "<b>I</b>liohypogastric n. (L1)",
      "<b>I</b>lioinguinal n. (L1)",
      "<b>G</b>enitofemoral n. (L1, L2)",
      "<b>L</b>ateral femoral cutaneous n. (L2, L3)",
      "<b>O</b>bturator n. (L2–L4)",
      "<b>F</b>emoral n. (L2–L4)"
    ]},
    {img:"lumbar-plexus.jpg", caption:"Lumbar plexus"},
  ]},
  "sacral-plexus":{parent:"plexuses", title:"Sacral plexus (L4–S4)",body:[
    {h:"Major branches", list:[
      "Sciatic n. (L4–S3) — largest nerve in the body; tibial + common fibular components",
      "Superior gluteal n. (L4–S1) — gluteus medius, minimus, TFL",
      "Inferior gluteal n. (L5–S2) — gluteus maximus",
      "Pudendal n. (S2–S4) — perineum, external urethral & anal sphincters",
      "Posterior femoral cutaneous n. (S1–S3) — skin of posterior thigh"
    ]},
    {img:"sacral-plexus.jpg", caption:"Sacral plexus"},
  ]},
  "coccygeal-plexus":{parent:"plexuses", title:"Coccygeal plexus (S4–Co1)", body:[
    {h:"Branches", p:"The anococcygeal nerve provides cutaneous innervation to the skin between the coccyx and the anus."},
    {img:"coccygeal-plexus.jpg", caption:"Coccygeal plexus"},
  ]},

  "sympathetic":{parent:"ans", title:"Sympathetic division", body:[
    {h:"Origin", p:"Thoracolumbar outflow — preganglionic neurons in the intermediolateral cell column of T1–L2."},
    {h:"Pathway", p:"Preganglionic axons exit via the ventral root → white ramus communicans → sympathetic chain (paravertebral) → either synapse there (passing back through gray ramus to spinal n. and reaching effectors via somatic distribution) or pass through to prevertebral (collateral) ganglia (e.g. celiac, superior mesenteric, inferior mesenteric) via splanchnic nerves."},
    {h:"Functions", p:"'Fight or flight'. Increases heart rate, dilates pupils, dilates bronchi, redirects blood to skeletal muscle, mobilizes glucose."},
    {img:"sympathetic.jpg", caption:"Sympathetic outflow"},
  ]},
  "parasympathetic":{parent:"ans", title:"Parasympathetic division", body:[
    {h:"Origin", p:"Craniosacral outflow."},
    {h:"Cranial outflow", list:[
      "CN III — Edinger-Westphal nucleus → ciliary ganglion → short ciliary nn. → sphincter pupillae & ciliary muscle",
      "CN VII — superior salivatory nucleus → greater petrosal → pterygopalatine ganglion → lacrimal gland & nasal/palatine glands; chorda tympani → submandibular ganglion → submandibular & sublingual glands",
      "CN IX — inferior salivatory nucleus → lesser petrosal → otic ganglion → auriculotemporal n. (V3) → parotid gland",
      "CN X — dorsal motor nucleus → thoracic and abdominal viscera (down to splenic flexure)"
    ]},
    {h:"Sacral outflow", p:"S2–S4 → pelvic splanchnic nerves → distal colon (from splenic flexure to anal canal), pelvic viscera (bladder, internal genitalia)."},
    {h:"Function", p:"'Rest and digest'. Slows heart rate, constricts pupils and bronchi, stimulates GI motility and secretions, contracts detrusor (voiding)."},
    {img:"parasympathetic.jpg", caption:"Cranio-sacral parasympathetic outflow"},
  ]},
  "enteric":{parent:"ans", title:"Enteric nervous system", body:[
    {h:"Plexuses", list:[
      "Myenteric plexus (Auerbach's) — between longitudinal and circular layers of muscularis externa; controls motility",
      "Submucosal plexus (Meissner's) — within the submucosa; controls secretion and local blood flow"
    ]},
    {h:"Importance", p:"Capable of independent reflex function (the 'second brain'). Modulated by the parasympathetic and sympathetic systems."},
    {img:"enteric.jpg", caption:"Enteric nervous system layers"},
  ]},

"neural-tube-development":{parent:"spinal",title:"Neural tube development & vesiculation",
  body:[
    {h:"Origin (week 3)", p:"Notochord & prechordal mesoderm release growth factors &rarr; ectoderm thickens (proliferation) &rarr; forms the neural plate (pseudostratified columnar neuroectoderm)."},
    {h:"Neurulation", p:"Lateral edges of plate elevate as neural folds, with the depressed midline forming the neural groove. Folds approach midline, fuse &rarr; neural tube (closure complete by day 21)."},
    {h:"Neuropores", p:"Anterior (cranial) neuropore closes day 25; posterior (caudal) neuropore closes day 27."},
    {h:"Primary vesicles (weeks 4–5)", list:[
      "Prosencephalon (forebrain) &rarr; Telencephalon (cerebral hemispheres) + Diencephalon (with optic outgrowth)",
      "Mesencephalon (midbrain) &rarr; remains as midbrain",
      "Rhombencephalon (hindbrain) &rarr; Metencephalon (pons + cerebellum) + Myelencephalon (medulla)"
    ]},
    {h:"Flexures", list:[
      "Cephalic flexure — at midbrain",
      "Cervical flexure — at hindbrain–spinal cord boundary",
      "Pontine flexure — between metencephalon and myelencephalon"
    ]},
    {h:"Wall structure after closure", list:[
      "Neuroepithelial cells &rarr; neuroblasts &rarr; mantle layer (future grey matter)",
      "Basal plates (ventral) &rarr; motor (somatic + visceral efferent groups)",
      "Alar plates (dorsal) &rarr; sensory (somatic + visceral afferent groups)",
      "Sulcus limitans — groove between basal and alar plates",
      "Roof plate + floor plate — pathways for crossing fibres, no neuroblasts",
      "Intermediate horn — only T1–T12 + L2–L3 (sympathetic outflow)"
    ]},
    {h:"Cord topographic shift", p:"At 3rd month spinal cord = full vertebral column. Vertebral column then grows faster &rarr; cord shifts cranially. At birth ends at L3; in adult ends at L1–L2. Creates obliquely descending nerve roots (cauda equina) and the filum terminale + coccygeal ligament."},
    {img:"neural-tube.jpg", caption:"Neural tube development & vesiculation"}
  ]
},

"neural-tube-defects":{parent:"spinal",title:"Neural tube closure defects (spina bifida + brain defects)",
  body:[
    {h:"Spina bifida", p:"Vertebral arch fusion failure (4th week)."},
    {h:"Types of spina bifida", list:[
      "Spina bifida occulta — split arches at S1–S2; skin-covered, often with hair tuft; usually asymptomatic",
      "Meningocele — meninges herniate; cord stays inside",
      "Myelomeningocele — meninges + cord protrude; lumbosacral; neurological deficits, no intellectual disability"
    ]},
    {h:"Brain defects", list:[
      "Holoprosencephaly — loss of midline; brain & face malformation; severe = single eye + undivided cerebrum; corpus callosum + olfactory tracts often absent",
      "Anencephaly — cranial neural tube fails to close; calvaria absent; brain tissue degenerates; only brainstem remains",
      "Hydrocephalus — typically blockage of cerebral aqueduct; head enlarges (sutures unfused) due to CSF accumulation"
    ]},
    {img:"neural-tube-defects.jpg", caption:"Neural tube closure defects"}
  ]
},

"spinal-cord-segments":{parent:"spinal",title:"Spinal cord segments, positional changes, cauda equina & Chipault's rule",
  body:[
    {h:"Topography", p:"Continuation of medulla oblongata (foramen magnum) &rarr; ends at L1–L2 in adults (L3 at birth) as the conus medullaris &rarr; filum terminale (anchors cord) &rarr; coccygeal ligament. Occupies upper ~2/3 of vertebral canal."},
    {h:"Enlargements", list:[
      "Cervical enlargement (C4–T1) — origin of brachial plexus",
      "Lumbar enlargement (T11–S1) — origin of lumbosacral plexi"
    ]},
    {h:"External markings", p:"Anterior median fissure (deep, ventral); posterior median sulcus (dorsal)."},
    {h:"Spinal nerves (31 pairs)", p:"8 cervical (1st pair between occiput & atlas) · 12 thoracic · 5 lumbar · 5 sacral · 1 coccygeal."},
    {h:"Roots", p:"Anterior (motor) + posterior (sensory, with dorsal root ganglion) &rarr; unite at intervertebral foramen &rarr; spinal nerve &rarr; divides into anterior ramus (limbs, anterolateral trunk; forms plexuses) and posterior ramus (deep back muscles + skin over vertebral column; segmental)."},
    {h:"Cauda equina", p:"L2–S5 nerve roots descending below the conus inside the dural sac; lumbar puncture safe target below L2."},
    {h:"Chipault's rule (vertebra to cord segment offset)", list:[
      "Cranial cervical vertebrae — same segment",
      "Caudal cervical — segment + 1 (e.g. C7 vertebra &rarr; C8 segment)",
      "Cranial thoracic — segment + 2 (T3 vertebra &rarr; T5 segment)",
      "Caudal thoracic — segment + 3",
      "T10–T12 vertebrae &rarr; lumbar segments (L1–L4)",
      "T12–L1 vertebrae &rarr; L5–S2 segments",
      "L1–L2 vertebrae &rarr; S3–S5 + coccygeal"
    ]},
    {img:"spinal-cord-segments.jpg", caption:"Spinal cord segments & positional changes"}
  ]
},

"spinal-cord-cross-section":{parent:"spinal",title:"Spinal cord cross-section (gray + white matter, Rexed laminae)",
  body:[
    {h:"Gray matter — H-shape", p:"Anterior + posterior horns connected by gray commissure (with central canal). Lateral horn = only T1–L2 (sympathetic) and S2–S4 (parasympathetic). Largest at cervical & lumbosacral enlargements."},
    {h:"Anterior (motor) horn nuclei", list:[
      "Medial motor neurons — axial muscles, neck, trunk (incl. intercostals + abdominals)",
      "Central group — phrenic nucleus C3–C5 (diaphragm), accessory spinal nucleus C1–C5 (SCM + trapezius), Onuf's nucleus S2–S4 (external anal & urethral sphincters; erection/ejaculation muscles)",
      "Lateral motor neurons — only in C5–T1 + L2–S3 — limb muscles (distal)"
    ]},
    {h:"Posterior (sensory) horn nuclei", list:[
      "Posterior marginal nucleus (lamina I) — pain & temperature (A-delta fast pain)",
      "Substantia gelatinosa of Rolandi (lamina II–III) — pain, temperature, touch (C-fibre slow pain); becomes spinal nucleus of CN V in medulla",
      "Nucleus proprius (lamina IV) — 1st synapse of spinothalamic — touch, pain, temperature, vibration, proprioception",
      "Nucleus dorsalis (Clarke's column, lamina VII core, C8–L3) — origin of spinocerebellar tracts"
    ]},
    {h:"Zona intermedia & lateral horn", p:"Intermediomedial nucleus (visceral efferent T1–L3, sympathetic). Lateral horn: intermediolateral cell column C8–L3 sympathetic preganglionics; S2–S4 parasympathetic preganglionics."},
    {h:"Rexed laminae I–X", list:[
      "I — apex of dorsal horn (spinothalamic; pain & temperature)",
      "II + III — interneurons + 1st synapse of spinothalamic = substantia gelatinosa",
      "IV + V — relay cells; origin of spinothalamic, spino-reticular, spino-tectal tracts",
      "VI — origin of spinocerebellar + spino-olivary (proprioception); contains nucleus dorsalis",
      "VII — largest; receives most descending tracts; contains interneurons",
      "VIII — motor neurons + interneurons; vestibulospinal + reticulospinal tracts terminate here",
      "IX — alpha motor neurons (limb movement); lateral motor nucleus",
      "X — surrounds central canal; decussating fibres"
    ]},
    {h:"White matter", list:[
      "Posterior funiculus — only ascending; highly myelinated (gracilis + cuneatus)",
      "Anterior + lateral funiculi — both ascending and descending",
      "Tract types: Ascending (sensory) · Descending (motor) · Intersegmental · Association · Commissural"
    ]},
    {img:"spinal-cord-cross-section.jpg", caption:"Spinal cord cross-section"}
  ]
},

"ascending-tracts":{parent:"spinal",title:"Ascending tracts (overview + three-neuron rule)",
  body:[
    {h:"Three-neuron sensory pathway", list:[
      "1st-order — dorsal root ganglion (PNS) &rarr; enters cord",
      "2nd-order — dorsal horn (or medullary nucleus) &rarr; crosses",
      "3rd-order — thalamus &rarr; sensory cortex"
    ]},
    {h:"Spinothalamic tracts", list:[
      "Anterior spinothalamic (anterior column) — light touch & pressure; crosses in cord &rarr; spinal lemniscus",
      "Lateral spinothalamic (lateral column) — pain & temperature; crosses in cord &rarr; spinal lemniscus",
      "Spino-tectal (lateral) — spino-visual reflexes; crosses in cord &rarr; superior colliculus",
      "Spinal lemniscus = anterior + lateral spinothalamic + spino-tectal; ascends together from medulla"
    ]},
    {h:"Other ascending tracts", list:[
      "Spino-olivary (anterior + lateral) — cutaneous + proprioceptive; crosses in cord &rarr; inferior olive &rarr; cerebellum",
      "Spino-reticular (lateral) — alertness; mostly uncrossed &rarr; reticular formation",
      "Anterior spinocerebellar (lateral) — unconscious proprioception; crosses in cord, crosses back in cerebellum &rarr; superior cerebellar peduncle",
      "Posterior spinocerebellar (lateral) — unconscious proprioception; uncrossed &rarr; inferior cerebellar peduncle"
    ]},
    {h:"Posterior column tracts", list:[
      "Fasciculus cuneatus (posterior) — discrimination, vibration, conscious proprioception (upper limb + trunk); crosses in medulla",
      "Fasciculus gracilis (posterior) — discrimination, vibration, conscious proprioception (lower limb + trunk); crosses in medulla"
    ]},
    {h:"Medial lemniscus", p:"Continuation of cuneatus + gracilis after their decussation in medulla &rarr; ascends to ventral posterolateral (VPL) thalamic nucleus &rarr; 3rd-order to postcentral gyrus."},
    {img:"ascending-tracts.jpg", caption:"Ascending tracts overview"}
  ]
},

"descending-tracts":{parent:"spinal",title:"Descending tracts (motor pathways)",
  body:[
    {h:"Three-neuron motor pathway", p:"Cortex (1st-order) &rarr; interneuron in ventral horn (2nd-order) &rarr; alpha-motor neuron (3rd-order) &rarr; muscle."},
    {h:"Corticospinal tracts", list:[
      "Lateral corticospinal (lateral column) — voluntary skilled limb movement; crosses at medullary pyramidal decussation (~75% of fibres)",
      "Anterior corticospinal (anterior column) — voluntary axial trunk movement; crosses at level of synapse in cord (primitive system)"
    ]},
    {h:"Brainstem motor tracts", list:[
      "Tecto-spinal (anterior) — head/neck reflex movements to visual & auditory stimuli; crosses in midbrain",
      "Vestibulo-spinal (anterior) — extensor (anti-gravity) tone, balance; uncrossed (lateral vestibular nucleus)",
      "Reticulo-spinal (anterior + lateral) — alpha/gamma motor neuron activity; mostly uncrossed",
      "Rubro-spinal (lateral) — facilitates flexors, inhibits extensors (cerebellar indirect pathway); crosses in midbrain (red nucleus)",
      "Interstitio-spinal (anterior) — eye–head/neck coordination; uncrossed; from interstitial nucleus of Cajal",
      "Olivo-spinal (anterior) — from inferior olivary nucleus (medulla); existence sometimes disputed"
    ]},
    {img:"descending-tracts.jpg", caption:"Descending tracts (motor pathways)"}
  ]
},

"medulla-oblongata":{parent:"brain",title:"Medulla oblongata (external + internal structure)",
  body:[
    {h:"External anatomy", list:[
      "Connects pons (pontomedullary sulcus, sup) with spinal cord (pyramidal decussation, inf). Conical shape.",
      "Pyramids — paired anterior swellings lateral to anterior median fissure; ~75% of fibres cross at decussation of the pyramids",
      "Anterior external arcuate fibres — pass posterolaterally to cerebellum from arcuate nuclei",
      "Olives — paired swellings posterolateral to pyramids; contain inferior olivary nuclei",
      "CN XII (hypoglossal) rootlets — arise from ventrolateral sulcus",
      "CN IX, X, XI (cranial roots) — arise in groove between olive and inferior cerebellar peduncle",
      "Cuneate + gracile tubercles — posterior; formed by underlying nuclei"
    ]},
    {h:"Cross-section 1: decussation of pyramids", p:"Corticospinal fibres cross to lateral corticospinal tract; gracilis + cuneatus ascend; spinal nucleus of CN V continues; posterior + anterior spinocerebellar tracts; lateral spinothalamic tract visible."},
    {h:"Cross-section 2: decussation of medial lemnisci", p:"Internal arcuate fibres emerge from gracilis + cuneatus nuclei &rarr; cross &rarr; form medial lemniscus ascending through medulla, pons, midbrain. Spinal lemniscus lateral."},
    {h:"Cross-section 3: through the olives", p:"Olivary nuclear complex (inferior olivary nucleus + medial + dorsal accessory); cochlear nuclear complex; vestibular nuclei; nucleus ambiguus (somatic motor of CN IX, X, XI); arcuate nuclei; medial lemniscus next to midline; medial longitudinal fasciculus connecting CN III, IV, VI, VIII."},
    {h:"Cross-section 4: superior olive", p:"Same as level 3 except inferior vestibular nucleus replaced by lateral vestibular nucleus."},
    {h:"Reticular formation centres", p:"Cardiac, vasomotor, respiratory, GIT centres within medullary reticular formation."},
    {img:"medulla.jpg", caption:"Medulla oblongata"}
  ]
},

"pons":{parent:"brain",title:"Pons (external + internal structure)",
  body:[
    {h:"External anatomy", list:[
      "Anterior to cerebellum, between medulla (medullopontine sulcus) and midbrain",
      "Transverse pontine fibres converge laterally &rarr; middle cerebellar peduncle",
      "Basilar groove — for basilar artery on anterior surface",
      "CN V (trigeminal) arises anterolaterally — sensory root (larger, lateral) + motor root (smaller, medial)",
      "In groove between pons and medulla (medial to lateral): CN VI, VII, VIII arise",
      "Posterior surface: facial colliculus (CN VII fibres looping around CN VI nucleus), locus coeruleus (stress/panic), area vestibuli (vestibular nuclei)"
    ]},
    {h:"Internal — inferior section through facial colliculus", list:[
      "Tegmentum: medial lemniscus; nucleus of CN VII whose fibres loop around abducens nucleus = internal genu; medial longitudinal fasciculus (beneath floor of 4th ventricle); trapezoid body (cochlear fibres decussate); spinal nucleus of CN V",
      "Basilar part: pontine nuclei; transverse pontine fibres cross midline &rarr; contralateral cerebellum via middle cerebellar peduncle; intersect corticospinal + corticonuclear tracts"
    ]},
    {h:"Internal — superior section through trigeminal nucleus", p:"Additionally contains CN V nuclei — principal sensory nucleus (fine touch) + motor nucleus (muscles of mastication). Superior cerebellar peduncle posterolateral to trigeminal nuclei carrying anterior spinocerebellar tract fibres."},
    {img:"pons.jpg", caption:"Pons — external and internal structure"}
  ]
},

"midbrain":{parent:"brain",title:"Midbrain (mesencephalon — external + internal)",
  body:[
    {h:"External anatomy", list:[
      "Connects pons + cerebellum with forebrain; ascends through tentorial notch",
      "Posterior: 4 colliculi (paired superior + inferior); CN IV (trochlear) emerges below inferior colliculi — only CN to leave dorsal brainstem",
      "Lateral: superior brachium (&rarr; lateral geniculate body); inferior brachium (&rarr; medial geniculate body)",
      "Anterior: interpeduncular fossa; CN III (oculomotor) arises medial to each cerebral crus",
      "Cerebral aqueduct runs through midbrain (3rd &rarr; 4th ventricle)"
    ]},
    {h:"Internal divisions", p:"Cerebral peduncle (anterior to aqueduct) split by substantia nigra into cerebral crus (corticospinal + corticonuclear in middle 2/3) + tegmentum. Tectum (posterior to aqueduct) = superior + inferior colliculi."},
    {h:"Cross-section 1: through inferior colliculi", p:"Inferior colliculus receives lateral lemniscus terminals (auditory pathway). Trochlear nucleus in central gray. Decussation of superior cerebellar peduncles in tegmentum. Mesencephalic nucleus of CN V at lateral border of central gray."},
    {h:"Cross-section 2: through superior colliculi", p:"Superior colliculus — visual reflexes. Pretectal nucleus — afferent end of pupillary light reflex. Oculomotor nucleus in central gray posterior to MLF. Red nucleus — large round mass (reddish from iron + vascularity); afferents from cerebral cortex, superior cerebellar peduncle, hypothalamus; efferents to spinal cord (rubrospinal), reticular formation, thalamus, substantia nigra."},
    {img:"midbrain.jpg", caption:"Midbrain — external and internal"}
  ]
},

"rhomboid-fossa":{parent:"brain",title:"Floor of 4th ventricle / rhomboid fossa",
  body:[
    {h:"Definition & borders", p:"Diamond-shape floor of the 4th ventricle. Borders of 4th ventricle: Sup — midbrain aqueduct; Inf — central canal of cord; Lateral — superior, middle, inferior cerebellar peduncles; Floor — posterior pons + posterior superior medulla; Roof — superior + inferior medullary vela."},
    {h:"Connections", list:[
      "Inferior — central canal",
      "Superior — cerebral aqueduct",
      "Foramen of Magendie (median) — cerebellomedullary cistern",
      "Foramina of Luschka (lateral, paired) — cerebellopontine cisterns"
    ]},
    {h:"Surface structures (medial to lateral)", list:[
      "Posterior median sulcus — midline",
      "Medial eminence — lateral to midline",
      "Facial colliculus — inferior swelling of medial eminence (CN VII fibres around CN VI nucleus)",
      "Sulcus limitans — lateral to medial eminence",
      "Locus coeruleus — superior end of sulcus limitans (norepinephrine, stress/panic)",
      "Substantia ferruginea — within locus coeruleus (gray-blue pigmented cells)",
      "Vestibular area — lateral to sulcus limitans (vestibular nuclei)",
      "Stria medullaris — horizontal fibres from posterior median sulcus &rarr; cerebellum via inferior cerebellar peduncle"
    ]},
    {h:"Inferior triangles", list:[
      "Hypoglossal triangle — medial; over hypoglossal nucleus",
      "Vagal triangle — lateral; over dorsal vagal nucleus",
      "Area postrema — between vagal triangle and lateral margin (chemoreceptor trigger zone — vomiting)"
    ]},
    {img:"rhomboid-fossa.jpg", caption:"Floor of 4th ventricle / rhomboid fossa"}
  ]
},

"reticular-formation":{parent:"brain",title:"Reticular formation",
  body:[
    {h:"Definition", p:"Net-like structure of nerve cell bodies + fibres in the brainstem (medulla, pons, midbrain), strategically located next to important tracts and nuclei."},
    {h:"Three longitudinal columns", list:[
      "Median column — intermediate-sized neurons; raphe nuclei (serotonin; pain inhibition)",
      "Medial column — large neurons; long connections",
      "Lateral column — small neurons; connections to medial column"
    ]},
    {h:"Afferents", p:"Spinal cord (spino-reticular); cerebellum (cerebello-reticular); cerebral cortex (cortico-reticular); subthalamus; thalamus; hypothalamus; corpus striatum; limbic system; cranial nerve nuclei; medial lemniscus + spinothalamics."},
    {h:"Efferents", p:"Cerebral cortex; spinal cord (reticulospinal); motor nuclei of cranial nerves; corpus striatum; cerebellum; substantia nigra; red nucleus; tectum; thalamus; subthalamus; hypothalamus."},
    {h:"Functions", list:[
      "Skeletal muscle control — reticulospinal modulates alpha + gamma motor neurons (tone, reflexes)",
      "Emotion–facial expression linkage (limbic system bridge)",
      "Modulation of somatic + visceral sensation (gating ascending tracts)",
      "Endocrine influence (via hypothalamus); autonomic influence (sympathetic + parasympathetic outflows)",
      "Reticular activating system — sensory input &rarr; cortex &rarr; wakefulness; ACh-rich",
      "Raphe nuclei — serotonin &rarr; cognition, mood, sleep",
      "Locus coeruleus — noradrenaline &rarr; sleep, cognition, mood",
      "Respiratory (pneumotaxic) + cardiovascular centres in medullary reticular formation"
    ]},
    {img:"reticular-formation.jpg", caption:"Reticular formation"}
  ]
},

"cerebellum-structure":{parent:"brain",title:"Cerebellum — structure, lobes, functional zones, nuclei",
  body:[
    {h:"Functions & overview", p:"Posture & balance, tone of muscles, coordination of movement. Works ipsilaterally. Located in posterior cranial fossa, beneath tentorium cerebelli, posterior to medulla, pons, and 4th ventricle."},
    {h:"Three lobes", list:[
      "Anterior lobe — superior surface; muscle tone; cerebral cortex connection. Separated from middle by primary fissure",
      "Middle (posterior) lobe — largest; coordination; spinal cord connection. Separated from flocculonodular lobe by uvulonodular (posterolateral) fissures",
      "Flocculonodular lobe — most primitive; balance; vestibular system connection"
    ]},
    {h:"Functional zones", list:[
      "Vestibulocerebellum = flocculonodular lobe + lingula &rarr; vestibular nuclei &rarr; balance & ocular reflexes",
      "Spinocerebellum = anterior lobe + accompanying vermis + pyramid + uvula &rarr; spinocerebellar tracts &rarr; proprioception",
      "Cerebrocerebellum (largest) = middle/posterior lobe + part of vermis &rarr; planning, motor learning, coordination, visually guided movement"
    ]},
    {h:"Deep cerebellar nuclei (lateral to medial — 'Don't Eat Greasy Food')", list:[
      "Dentate — largest",
      "Emboliform",
      "Globose",
      "Fastigial — close to midline"
    ]},
    {h:"Cerebellar cortex (3 layers)", list:[
      "Molecular (outer) — basket + stellate cells",
      "Purkinje cell layer — Purkinje cells (dendrites into molecular; axons myelinated to deep nuclei)",
      "Granular (inner) — granular cells + Golgi cells; granule cell axons enter molecular and bifurcate as parallel fibres"
    ]},
    {h:"Mechanism of cortex", list:[
      "Climbing fibres (from inferior olive) — synapse with Purkinje dendrites; aspartate; 1 climbing fibre per Purkinje",
      "Mossy fibres (all other afferents) — granular layer &rarr; synapse with granular cells; glutamate",
      "Purkinje cells inhibit deep nuclei (GABA)",
      "Inhibitory interneurons: basket + stellate inhibit Purkinje; Golgi inhibit granular",
      "Net: incoming sensory excites deep nuclei &rarr; Purkinjes inhibit them shortly after &rarr; deep-nuclear efferents modulate coordination + muscle tone"
    ]},
    {img:"cerebellum.jpg", caption:"Cerebellum — structure and functional zones"}
  ]
},

"cerebellar-afferents":{parent:"brain",title:"Cerebellar afferent connections",
  body:[
    {h:"From cerebral cortex", list:[
      "Cortico-pontocerebellar — corticopontine fibres &rarr; corona radiata + internal capsule &rarr; pontine nuclei &rarr; transverse pontine fibres cross &rarr; contralateral cerebellar hemisphere via middle cerebellar peduncle",
      "Cerebro-olivocerebellar — cortico-olivary &rarr; bilateral inferior olivary nuclei &rarr; olivocerebellar fibres cross &rarr; cerebellum via inferior cerebellar peduncle (form climbing fibres)",
      "Cerebro-reticulo-cerebellar — cortico-reticular &rarr; reticular formation of pons + medulla (some cross) &rarr; reticulocerebellar via inferior cerebellar peduncle (ipsilateral)"
    ]},
    {h:"From spinal cord", list:[
      "Posterior spinocerebellar (uncrossed) — unconscious proprioception from lower limb + trunk; nucleus dorsalis (Clarke C8–L3); ascends &rarr; inferior cerebellar peduncle &rarr; cerebellar cortex",
      "Anterior spinocerebellar — unconscious proprioception trunk + lower + upper limb; most cross in cord; ascend through cord, medulla, pons &rarr; superior cerebellar peduncle &rarr; crossed fibres cross back (terminate ipsilaterally)"
    ]},
    {h:"Other afferent pathways", list:[
      "Cuneo-cerebellar (uncrossed) — from nucleus cuneatus of medulla &rarr; inferior cerebellar peduncle &rarr; conscious proprioception upper limb + upper thorax",
      "Vestibulo-cerebellar (uncrossed) — vestibular nerve fibres directly or via vestibular nuclei &rarr; inferior cerebellar peduncle &rarr; flocculonodular lobe",
      "Small bundles from red nucleus + tectum"
    ]},
    {img:"cerebellar-afferents.jpg", caption:"Cerebellar afferent connections"}
  ]
},

"cerebellar-efferents":{parent:"brain",title:"Cerebellar intrinsic + efferent connections + function",
  body:[
    {h:"Efferent pathways", list:[
      "Cerebello-rubral — emboliform + globose nuclei &rarr; superior cerebellar peduncle &rarr; decussate at midbrain &rarr; contralateral red nucleus &rarr; rubrospinal tract &rarr; crosses again &rarr; ipsilateral spinal cord",
      "Dento-thalamic — dentate nucleus &rarr; superior cerebellar peduncle &rarr; decussate &rarr; contralateral ventral lateral nucleus of thalamus &rarr; primary motor cortex. Net effect = ipsilateral side of body",
      "Fastigial-vestibular — fastigial nucleus &rarr; bilateral lateral vestibular nuclei via inferior cerebellar peduncle &rarr; vestibulospinal (uncrossed) &rarr; ipsilateral extensor tone",
      "Fastigial-reticular — fastigial nucleus &rarr; reticular formation (same side) via inferior cerebellar peduncle &rarr; reticulospinal"
    ]},
    {h:"Functional summary", list:[
      "Receives cerebral cortex + spinal proprioception + vestibular afferents",
      "Constantly compares cortex intended movement with actual proprioception",
      "Corrects errors by adjusting alpha/gamma motor neuron firing through efferent pathways",
      "Inhibits or facilitates antagonist muscle tone"
    ]},
    {img:"cerebellar-efferents.jpg", caption:"Cerebellar efferent connections"}
  ]
},

"diencephalon":{parent:"brain",title:"Diencephalon — overview & subdivisions",
  body:[
    {h:"Definition & major parts", p:"Central inner core of the cerebrum. Forms boundaries of the 3rd ventricle. Four major parts: Thalamus · Subthalamus · Epithalamus · Hypothalamus."},
    {h:"Surfaces", list:[
      "Inferior (only exposed surface) — optic chiasm &rarr; optic tract; infundibulum + tuber cinereum + median eminence; mammillary bodies",
      "Superior — hidden by fornix; roof of 3rd ventricle (ependyma) covered by tela choroidea &rarr; choroid plexus of 3rd ventricle",
      "Lateral — internal capsule",
      "Medial = lateral wall of 3rd ventricle; thalamus (sup) + hypothalamus (inf) separated by hypothalamic sulcus"
    ]},
    {h:"Subthalamus", p:"Narrow gray strip below thalamus, between thalamus and midbrain tegmentum. Contains subthalamic nuclei, zona incerta, and key white matter fields: fasciculus thalamicus (H1), fasciculus lenticularis (H2), ansa lenticularis, fasciculus subthalamicus."},
    {h:"Epithalamus", list:[
      "Habenular nuclei — afferents from amygdala via stria medullaris thalami + olfactory; efferents to tectum, thalamus, reticular formation",
      "Pineal gland — conical, projects backward; endocrine; melatonin (circadian rhythm, sleep, gonads)"
    ]},
    {img:"diencephalon.jpg", caption:"Diencephalon — overview"}
  ]
},

"thalamus":{parent:"brain",title:"Thalamus — nuclei, connections, function",
  body:[
    {h:"Anatomy", p:"Large ovoid mass on each side of 3rd ventricle. Posteriorly = pulvinar. Lateral geniculate body = small elevation on lower aspect of pulvinar. Internal medullary lamina = Y-shaped white matter dividing thalamus into anterior, medial, and lateral parts."},
    {h:"Anterior thalamic nuclei", p:"Receive mammillothalamic tract from mammillary nuclei. Functions: emotional tone, recent memory. Part of Papez circuit: hippocampus &rarr; fornix &rarr; mammillary body &rarr; anterior thalamic nuclei &rarr; cingulate &rarr; hippocampus."},
    {h:"Medial thalamic nuclei", p:"Large dorso-medial nucleus + smaller nuclei. Two-way connections with prefrontal cortex + hypothalamus + other thalamic nuclei. Function: integrates somatic, visceral, olfactory + relates to emotional state; behaviour modulation."},
    {h:"Lateral thalamic — ventral tier (cranial to caudal)", list:[
      "Ventral anterior — motor relay from basal ganglia",
      "Ventral lateral — cerebellar + basal ganglia &rarr; motor cortex",
      "Ventral posterolateral (VPL) — body sensation (lemniscal + spinothalamic)",
      "Ventral posteromedial (VPM) — head sensation (trigeminal + taste)",
      "Medial geniculate — auditory relay",
      "Lateral geniculate — visual relay"
    ]},
    {h:"Function", p:"Cell station for all main sensory pathways (except olfactory). Important relay for sensorimotor loops involving cerebellum + basal nuclei. Every thalamic nucleus projects to specific cortical area + receives reciprocal cortical fibres."},
    {img:"thalamus.jpg", caption:"Thalamus — nuclei and connections"}
  ]
},

"hypothalamus":{parent:"brain",title:"Hypothalamus — subdivisions, connections, function",
  body:[
    {h:"Size & importance", p:"0.3% of brain mass; controls ANS + endocrine system; site of converging/diverging pathways at the centre of the limbic system."},
    {h:"Anteroposterior subdivisions", list:[
      "Anterior (chiasmatic) region — anterior cerebral + anterior communicating aa.",
      "Middle (tuberal) region — posterior communicating a.",
      "Posterior (mammillary) region — posterior communicating, posterior cerebral, basilar aa."
    ]},
    {h:"Key nuclei (medial zone)", p:"Preoptic · Anterior · Suprachiasmatic · Paraventricular · Supraoptic · Dorsomedial · Ventromedial · Infundibular (arcuate) · Posterior. Medial forebrain bundle (MFB) in lateral region — massive bidirectional pathway connecting hypothalamus to limbic system + brainstem."},
    {h:"Afferent connections", list:[
      "Somatic + visceral via lemniscal collaterals + tractus solitarius + reticular formation",
      "Visual — retina &rarr; suprachiasmatic",
      "Olfactory — via medial forebrain bundle",
      "Hippocampo-hypothalamic — fornix &rarr; mammillary body (main limbic output)",
      "Amygdalo-hypothalamic — stria terminalis + ventral amygdaloid pathway",
      "Cortico-hypothalamic — frontal lobe"
    ]},
    {h:"Efferent connections", list:[
      "Descending fibres — brainstem + spinal cord ANS preganglionics (T1–L2 sympathetic; S2–S4 parasympathetic)",
      "Mammillothalamic tract — mammillary body &rarr; anterior thalamic nuclei &rarr; cingulate (Papez)",
      "Mammillo-tegmental tract — mammillary body &rarr; midbrain reticular tegmentum"
    ]},
    {h:"Functions", list:[
      "Autonomic control — anterior + preoptic = parasympathetic responses; posterior + lateral = sympathetic responses",
      "Endocrine control — releasing/inhibiting hormones to anterior pituitary",
      "Neurosecretion — ADH (supraoptic) + oxytocin (paraventricular) &rarr; posterior pituitary",
      "Temperature regulation — anterior dilates skin vessels + sweating; posterior vasoconstriction + inhibits sweating",
      "Food + water intake — lateral = hunger + thirst centres; medial = satiety centre",
      "Circadian rhythms — suprachiasmatic nucleus receives retina input &rarr; modulates nuclei &rarr; habenular nuclei + pineal"
    ]},
    {img:"hypothalamus.jpg", caption:"Hypothalamus — subdivisions and function"}
  ]
},

"hypothalamo-hypophyseal":{parent:"brain",title:"Hypothalamo-hypophyseal regulation",
  body:[
    {h:"Pituitary gland", p:"Small oval-shape in hypophyseal fossa, covered by diaphragm sellae. Adenohypophysis (anterior) = endocrine epithelial cells + sinusoids. Neurohypophysis (posterior) = pituicytes (glia) + axon terminations from supraoptic + paraventricular nuclei."},
    {h:"Pathway 1 — hypothalamo-hypophyseal tract", p:"Nerve fibres from supraoptic + paraventricular nuclei &rarr; axonal transport &rarr; terminate in neurohypophysis as Herring bodies. Releases ADH (vasopressin) + oxytocin directly into capillary network."},
    {h:"Pathway 2 — portal system", p:"Neurosecretory cells release releasing/inhibiting hormones from arcuate nuclei &rarr; median eminence &rarr; primary capillary plexus (from superior hypophyseal a.) &rarr; portal venules &rarr; secondary capillary plexus in adenohypophysis &rarr; modulate hormone release."},
    {h:"Blood supply", list:[
      "Superior hypophyseal a. — median eminence + infundibular stalk &rarr; primary plexus",
      "Inferior hypophyseal a. — neurohypophysis; anastomosis with adenohypophyseal capillaries",
      "Drainage of secondary plexus &rarr; superficial veins &rarr; cavernous sinus"
    ]},
    {h:"Anterior pituitary hormones", p:"ACTH · FSH · GH · LH · MSH · PRL · TSH."},
    {h:"Posterior pituitary hormones", list:[
      "ADH (vasopressin) — from supraoptic nucleus; vasoconstrictor + antidiuretic; supraoptic = osmoreceptor",
      "Oxytocin — from paraventricular nucleus; uterine smooth muscle contraction; milk letdown (myoepithelial contraction)"
    ]},
    {h:"Tuberoinfundibular pathway", p:"Dopamine neurons in arcuate nucleus &rarr; median eminence &rarr; regulate prolactin secretion (inhibition)."},
    {img:"hypothalamo-hypophyseal.jpg", caption:"Hypothalamo-hypophyseal regulation"}
  ]
},

"basal-ganglia":{parent:"brain",title:"Basal ganglia + Parkinsonism",
  body:[
    {h:"Components", list:[
      "Corpus striatum = caudate nucleus + lentiform nucleus",
      "Striatum = caudate + putamen",
      "Lentiform nucleus = globus pallidus + putamen",
      "+ Amygdaloid nucleus + Claustrum"
    ]},
    {h:"Caudate nucleus", p:"Large C-shaped, lateral to thalamus, related to lateral ventricle. Head — lateral wall of anterior horn; Body — floor of lateral ventricle; Tail — posteroinferiorly in roof of inferior horn &rarr; ends at amygdaloid nucleus. Nucleus accumbens = ventral striatum; reward centre (addiction)."},
    {h:"Lentiform nucleus", p:"Paler globus pallidus (myelinated) + putamen. Medially: internal capsule (separates from thalamus + caudate); laterally: external capsule."},
    {h:"Afferents to striatum", list:[
      "Cortico-striate — from all cortex (largest from sensorimotor); ipsilateral; glutamate",
      "Thalamo-striate — from intralaminar thalamic nuclei",
      "Nigro-striate — from substantia nigra; dopamine",
      "Brainstem-striatal — from raphe; serotonin"
    ]},
    {h:"Direct pathway", p:"Cortex &rarr; Striatum &rarr; GPi/SNr &rarr; Thalamus &rarr; Cortex: striatum inhibits GPi/SNr &rarr; disinhibits thalamus &rarr; cortex excitation &rarr; enables movement (positive feedback)."},
    {h:"Indirect pathway", p:"Cortex &rarr; Striatum &rarr; GPe &rarr; Subthalamic n. &rarr; GPi &rarr; Thalamus &rarr; Cortex: striatum inhibits GPe &rarr; disinhibits subthalamic &rarr; excites GPi &rarr; inhibits thalamus &rarr; suppresses unwanted movements."},
    {h:"Dopamine effect (nigrostriatal from SNc)", list:[
      "D1 receptors (direct pathway) — excited by dopamine &rarr; enables movement",
      "D2 receptors (indirect pathway) — inhibited by dopamine &rarr; less suppression of movement"
    ]},
    {h:"Parkinsonism", p:"Degeneration of SNc &rarr; reduced dopamine in striatum &rarr; hypersensitivity of dopamine receptors &rarr; no inhibition of indirect, no stimulation of direct &rarr; tremor (rest), postural disturbance, rigidity (cog-wheel/lead-pipe), akinesia (difficulty initiating movement)."},
    {h:"Huntington's disease (AD)", p:"Degeneration of cortex–striatum &rarr; dementia + chorea (involuntary, quick, clumsy). Hyperkinetic disorders = indirect-pathway dysfunction."},
    {img:"basal-ganglia.jpg", caption:"Basal ganglia — pathways and Parkinsonism"}
  ]
},


"frontal-lobe-motor":{parent:"brain",title:"Frontal lobe — motor cortex (primary, secondary, supplementary, FEF, Broca's)",
  body:[
    {h:"Primary motor cortex (Brodmann 4)", p:"Precentral gyrus + paracentral lobule. Controls muscles contralaterally. Afferents from premotor, thalamus, basal ganglia, sensory cortex. Final station — executes movement. Motor homunculus — proportional to skill (paracentral lobule = vesical + anal sphincters)."},
    {h:"Secondary motor (premotor) cortex (Brodmann 6)", p:"Anterior part of precentral gyrus + posterior superior/middle/inferior frontal gyri. Stores motor programs from past experience. Afferents from thalamus, sensory cortex, basal ganglia. Most output to primary motor cortex; some directly to brainstem + spinal cord."},
    {h:"Supplementary motor cortex (Brodmann 6 medial)", p:"Paracentral lobule + anterior to it; planning + organizing movement."},
    {h:"Frontal eye field (Brodmann 8)", p:"Middle frontal gyrus; afferents from medial dorsal thalamic nucleus + sensory cortex; efferents to superior colliculus + pretectal area; horizontal conjugate eye movements (mostly away from stimulus) + voluntary scanning."},
    {h:"Cingulate premotor area (Brodmann 23, 24)", p:"Cingulate gyrus; connects limbic + motor (motions tied to emotions); efferents to spinal interneurons."},
    {h:"Broca's area (Brodmann 44, 45)", p:"Inferior frontal gyrus (pars opercularis + triangularis); word formation via efferents to primary motor cortex (larynx, mouth, tongue, respiration). Usually dominant on left hemisphere. Lesion &rarr; expressive (Broca's) aphasia — patient understands and writes, but cannot produce speech."},
    {img:"frontal-motor.jpg", caption:"Frontal lobe motor areas"}
  ]
},

"prefrontal-cortex":{parent:"brain",title:"Frontal lobe — prefrontal cortex (non-motor)",
  body:[
    {h:"Location", p:"Greater parts of superior, middle, inferior frontal gyri + anterior part of cingulate gyrus + orbital gyri (Brodmann 9, 10, 11, 12). Granular cortex."},
    {h:"Connections", p:"Bidirectional with many cortical areas, hypothalamus, thalamus, corpus striatum; cerebellum via pontine nuclei. Genu + minor forceps of corpus callosum connect both sides."},
    {h:"Function", p:"Personality, depth of feelings, judgement, decision-making, planning."},
    {h:"Lesion", p:"Personality changes (classic — Phineas Gage type)."},
    {img:"prefrontal.jpg", caption:"Prefrontal cortex"}
  ]
},

"parietal-lobe":{parent:"brain",title:"Parietal lobe — somatosensory cortex + association",
  body:[
    {h:"Primary somatosensory cortex (Brodmann 1, 2, 3)", p:"Postcentral gyrus + posterior paracentral lobule. Afferents from VPL + VPM thalamic nuclei. Efferents to primary motor cortex, basal ganglia, thalamus, sensory CN nuclei, dorsal horn, reticular formation. Mostly contralateral. Sensory homunculus — area proportional to receptor density."},
    {h:"Secondary somatosensory cortex (Brodmann 5, 7)", p:"Superior parietal lobule. Interpretation + integration with past experience; stereognosis (size, texture, shape from touch)."},
    {h:"Posterior parietal area", p:"Integrates proprioception, touch, pressure, visual &rarr; body image."},
    {h:"Precuneus", p:"Medial parietal lobe, rostral to parieto-occipital sulcus; integrates multiple sensory inputs; connections with prefrontal cortex; consciousness, self-awareness, problem-solving, planning."},
    {img:"parietal-lobe.jpg", caption:"Parietal lobe — somatosensory cortex"}
  ]
},

"temporal-lobe":{parent:"brain",title:"Temporal lobe — auditory + Wernicke's",
  body:[
    {h:"Primary auditory cortex (Brodmann 41, 42)", p:"Heschl's gyrus on superior temporal gyrus. Afferents from medial geniculate body (MGB) of thalamus. Tonotopic — anterior part = low frequencies; posterior = high frequencies. Bilateral input but contralateral dominant."},
    {h:"Secondary auditory cortex (Brodmann 22)", p:"Surrounds primary posteriorly. Integration with other senses + cortical speech areas."},
    {h:"Wernicke's area (Brodmann 22 posterior)", p:"Superior temporal gyrus extending around posterior end of lateral sulcus. Afferents from auditory cortex + visual cortex. Efferents to Broca's via arcuate fasciculus. Understanding of written + spoken language. Dominant hemisphere (typically left). Lesion &rarr; receptive (Wernicke's) aphasia — patient cannot understand language; produces fluent but nonsensical speech without awareness of error."},
    {img:"temporal-lobe.jpg", caption:"Temporal lobe — auditory and Wernicke's area"}
  ]
},

"occipital-lobe":{parent:"brain",title:"Occipital lobe + visual cortex",
  body:[
    {h:"Primary visual cortex (V1, Brodmann 17)", p:"Banks of calcarine sulcus; granular cortex; contains the stria of Gennari. Afferents from lateral geniculate body (LGB). Receives ipsilateral temporal retina + contralateral nasal retina. Inferior visual field &rarr; superior visual cortex; macula = posterior visual cortex; periphery = anterior visual cortex."},
    {h:"Secondary visual cortex (Brodmann 18, 19)", p:"Surrounds V1; afferents from V1 + thalamus + cortex; connects new visual info with past experience."},
    {h:"Occipital eye field", p:"Within secondary visual cortex; connected to contralateral OEF + superior colliculus; unconscious/reflexive conjugate eye movement following objects (compare with frontal eye field — voluntary)."},
    {img:"occipital-lobe.jpg", caption:"Occipital lobe — visual cortex"}
  ]
},

"other-cortical-areas":{parent:"brain",title:"Other cortical areas (gustatory, vestibular, insula) + association areas + cerebral dominance",
  body:[
    {h:"Gustatory area (Brodmann 43)", p:"Inferior part of postcentral gyrus + superior wall of lateral sulcus + adjoining insula. Solitary nucleus &rarr; VPM thalamus &rarr; here."},
    {h:"Vestibular area", p:"Postcentral gyrus next to face area; head/neck position; eye + trunk muscle activity."},
    {h:"Insula", p:"Cortex within lateral sulcus floor. Posterior = granular; anterior = agranular. Believed to plan movements for speech (and many other functions)."},
    {h:"Three main association regions", list:[
      "Anterior temporal area — stores past sensory experiences",
      "Posterior parietal area — integrates proprioception + touch + pressure + visual &rarr; stereognosis + body image",
      "Prefrontal cortex — personality + behaviour"
    ]},
    {h:"Cerebral dominance", p:"Hand control + speech + language are dominant on one hemisphere (left in most). Spatial perception, face recognition, music = non-dominant."},
    {img:"other-cortex.jpg", caption:"Other cortical areas and association regions"}
  ]
},

"white-matter-fibres":{parent:"brain",title:"White matter — association, commissural, projection fibres + internal capsule",
  body:[
    {h:"Commissural fibres", list:[
      "Corpus callosum (largest) — rostrum (thin anterior end), genu (anterior), body (arches posteriorly), splenium (thick posterior end); forceps minor (frontal lobe), forceps major (occipital), radiation of corpus callosum, tapetum (roof + lateral wall of posterior horn)",
      "Anterior commissure — connects 2 temporal lobes",
      "Posterior commissure — pretectal area fibres for pupillary light reflex cross here",
      "Fornix — myelinated fibres from hippocampus &rarr; mammillary bodies",
      "Habenular commissure — connects habenular nuclei"
    ]},
    {h:"Association fibres (long fasciculi)", list:[
      "Uncinate fasciculus — temporal lobe &rarr; inferior frontal lobe (motor speech)",
      "Cingulum fasciculus — long curved, in cingulate gyrus &rarr; parahippocampal area",
      "Superior longitudinal fasciculus (largest) — anterior frontal lobe &rarr; occipital + temporal lobes",
      "Inferior longitudinal fasciculus — occipital &rarr; temporal",
      "Vertical occipital fasciculus — within occipital lobe",
      "Fronto-occipital fasciculus — frontal &rarr; occipital + temporal"
    ]},
    {h:"Internal capsule (projection fibres)", p:"White matter band between brainstem and cortex. Lateral to thalamus + caudate; medial to lentiform nucleus. Three parts: Anterior limb (lateral to head of caudate); genu; posterior limb (lateral to thalamus) — most posterior fibres = optic radiation + acoustic radiation. Ascending through corona radiata (all projecting fibres between cortex + internal capsule)."},
    {h:"Septum pellucidum", p:"Between fornix + corpus callosum. 2 layers white + gray with central cavity. Partition between anterior horns of lateral ventricles."},
    {img:"white-matter.jpg", caption:"White matter — fibre types and internal capsule"}
  ]
},

"ventricles-csf":{parent:"brain",title:"Ventricles, CSF circulation, hydrocephalus",
  body:[
    {h:"Ventricle connections", list:[
      "3rd &rarr; lateral ventricles via interventricular foramina of Monro",
      "3rd &rarr; 4th ventricle via cerebral aqueduct of Sylvius",
      "4th &rarr; central canal of spinal cord"
    ]},
    {h:"Lateral ventricles", p:"C-shaped, in each hemisphere. Body (parietal); Anterior (frontal) horn; Posterior (occipital) horn; Inferior (temporal) horn. Roof = corpus callosum; floor + lateral = caudate + thalamus; medial = septum pellucidum."},
    {h:"3rd ventricle", p:"Between two thalami. Lateral wall = medial thalamus (sup) + hypothalamus (inf) separated by hypothalamic sulcus. Interthalamic adhesion crosses interior. Floor = optic chiasm, infundibulum, tuber cinereum, mammillary bodies, midbrain tegmentum. Recesses: supraoptic, infundibular, pineal, suprapineal."},
    {h:"4th ventricle", p:"Between pons + superior medulla anteriorly, cerebellum posteriorly. Foramen of Magendie (median) &rarr; cerebellomedullary cistern. Foramina of Luschka (lateral, paired) &rarr; cerebellopontine cisterns."},
    {h:"CSF", list:[
      "Volume — 150 mL; clear, like blood but 1/2 glucose, very few cells (only lymphocytes)",
      "Functions: cushion + buoyancy, metabolism support, hormone transport",
      "Production — 0.5 mL/min via choroid plexus (each ventricle) + ependymal cells",
      "Circulation: lateral ventricle &rarr; interventricular foramen &rarr; 3rd ventricle &rarr; cerebral aqueduct &rarr; 4th ventricle &rarr; Magendie + Luschka &rarr; subarachnoid space",
      "Reabsorption — arachnoid granulations into dural sinuses (mainly superior sagittal sinus)"
    ]},
    {h:"Hydrocephalus", list:[
      "Communicating hydrocephalus — flow between ventricles + subarachnoid OK; problem beyond",
      "Non-communicating — block between choroid plexus and subarachnoid (e.g. aqueductal stenosis)",
      "Hydrocephalus ex vacuo — ventricular expansion after brain atrophy (Alzheimer's, etc)",
      "Treatment: address cause; ventriculoperitoneal shunt for drainage"
    ]},
    {img:"ventricles.jpg", caption:"Ventricles and CSF circulation"}
  ]
},

"spinal-meninges":{parent:"spinal",title:"Spinal meninges, cord vasculature, lumbar puncture",
  body:[
    {h:"Three meninges", list:[
      "Dura mater — most external; foramen magnum &rarr; filum terminale; epidural space (loose CT + internal vertebral venous plexus); dural sleeve fuses with epineurium at IV foramen",
      "Arachnoid mater — delicate; subarachnoid space contains CSF; lumbar cistern distal to conus medullaris (LP target + spinal anesthesia)",
      "Pia mater — innermost; covers cord, roots, vessels; denticulate ligaments between roots &rarr; suspend cord"
    ]},
    {h:"Lumbar puncture", p:"Needle inserted to lumbar cistern below L1/L2. Cauda equina nerves move out of needle's way. Use: diagnose meningitis, subarachnoid haemorrhage; spinal anesthesia."},
    {h:"Vasculature", list:[
      "Anterior spinal a. — from vertebral aa.; runs in anterior median fissure",
      "Posterior spinal aa. (paired) — from vertebral or PICA; anastomose in pia",
      "Great anterior medullary a. of Adamkiewicz — from aorta; supplies anterior 2/3 of cord (lumbar enlargement)",
      "Segmental spinal aa. — from deep cervical, intercostal, lumbar aa."
    ]},
    {h:"Venous drainage", p:"3 anterior + 3 posterior spinal vv. &rarr; anastomose along surface &rarr; drain into internal + external vertebral plexuses &rarr; systemic segmental veins; internal plexus also drains into dural sinuses superiorly."},
    {img:"spinal-meninges.jpg", caption:"Spinal meninges and vasculature"}
  ]
},

"brain-vasculature":{parent:"brain",title:"Brain vessels, blood-brain barrier, vascular occlusion / stroke",
  body:[
    {h:"Arterial supply — Circle of Willis", p:"2 internal carotid + 2 vertebral aa. &rarr; anastomose in Circle of Willis."},
    {h:"Internal carotid a. branches", list:[
      "Ophthalmic a. — through optic canal; supplies eye (central retinal a.) + orbital structures",
      "Posterior communicating a. — runs above CN III; joins PCA",
      "Anterior choroidal a. — lateral geniculate, crus cerebri, optic tract, internal capsule",
      "Anterior cerebral a. — into longitudinal fissure; pericallosal a.; cortical brs. &rarr; medial cortex up to parieto-occipital sulcus",
      "Middle cerebral a. — laterally in lateral sulcus; cortical brs. &rarr; entire lateral hemisphere except superior strip + occipital pole; central brs. (lateral lenticulostriate) &rarr; internal capsule, lentiform, caudate"
    ]},
    {h:"Vertebral/basilar branches", list:[
      "PICA — inferior cerebellum + central cerebellar nuclei + 4th-ventricle choroid + medulla",
      "AICA — anterior + inferior cerebellum",
      "Labyrinthine a. — inner ear",
      "Superior cerebellar a. — superior cerebellum + pineal",
      "Posterior cerebral a. — visual cortex + inferolateral + medial temporal lobe; thalamus, lentiform, pineal, medial geniculate"
    ]},
    {h:"Venous drainage", list:[
      "Superficial cerebral veins &rarr; dural sinuses (superior sagittal, cavernous, transverse, petrosal)",
      "Great cerebral vein of Galen (unpaired) = R + L internal cerebral; under splenium &rarr; straight sinus"
    ]},
    {h:"Blood-brain barrier (BBB)", p:"Endothelial tight junctions + thicker basement membrane + astrocytic foot processes. Gases + water pass; glucose + electrolytes less; plasma proteins almost impermeable. No-BBB regions: pineal · neurohypophysis · wall of optic recess · tuber cinereum · area postrema."},
    {h:"Vascular occlusion / stroke", list:[
      "ACA occlusion — contralateral hemiparesis (foot/leg) + hemisensory loss + apathy + personality change",
      "MCA occlusion — contralateral hemiparesis + hemisensory loss (face + upper limb), aphasia (if dominant), visual problems",
      "PCA occlusion — visual deficits, memory impairment",
      "Stroke types: thrombosis (local clot), embolism (clot from elsewhere), hypoperfusion, hemorrhage"
    ]},
    {img:"brain-vasculature.jpg", caption:"Brain vessels, BBB, and stroke"}
  ]
},

"lemniscal-system":{parent:"brain",title:"Lemniscal (dorsal column) system + sensory loss",
  body:[
    {h:"Modalities", p:"Discriminative touch · vibration · conscious proprioception · two-point discrimination."},
    {h:"Tracts in dorsal funiculus", list:[
      "Fasciculus gracilis — entire cord; lower limb + lower trunk",
      "Fasciculus cuneatus — only above T6; upper limb + upper trunk + neck"
    ]},
    {h:"Pathway (3 neurons)", list:[
      "1st-order: DRG &rarr; axons enter dorsal horn, ascend in posterior columns",
      "2nd-order: synapse in nucleus gracilis + nucleus cuneatus (medulla); axons = internal arcuate fibres &rarr; cross at decussation of medial lemnisci &rarr; form medial lemniscus",
      "3rd-order: VPL nucleus of thalamus &rarr; axons through posterior limb of internal capsule + corona radiata &rarr; postcentral gyrus"
    ]},
    {h:"Sensory loss syndromes", list:[
      "Brown-Sequard syndrome (hemisection): ipsilateral spastic paralysis + discriminative/vibration loss; contralateral pain + temperature loss (2–3 segments below)",
      "Syringomyelia — central canal abnormality; bilateral pain + temperature loss in injured dermatomes; LMN weakness in hands",
      "Dorsal column syndrome — loss of conscious proprioception + impaired coordination + discrimination + vibration",
      "Epiconus syndrome (L4–S2) — lower limb paraparesis; loss of sensation below knee; automatic bladder",
      "Conus syndrome (S3–S5) — sphincter loss; saddle sensory loss",
      "Cauda equina syndrome — root lesion below L2; low back pain + sciatica; saddle sensory loss; bladder/bowel dysfunction"
    ]},
    {img:"lemniscal-system.jpg", caption:"Lemniscal (dorsal column) system"}
  ]
},

"anterolateral-system":{parent:"brain",title:"Anterolateral system (spinothalamic, spinoreticular, spinotectal) + pain",
  body:[
    {h:"Lateral spinothalamic tract", p:"Pain + temperature. A-delta fibres — fast pain (sharp); myelinated. C fibres — slow pain (aching/burning); unmyelinated. 1st-order DRG &rarr; dorsal horn &rarr; ascends/descends 1–2 segments &rarr; synapse in substantia gelatinosa &rarr; 2nd-order axons cross obliquely via anterior gray + white commissures &rarr; contralateral lateral spinothalamic. In tract: sacral fibres lateral, cervical medial; temperature posterior to pain."},
    {h:"Anterior spinothalamic tract", p:"Light touch + pressure. 1st-order DRG &rarr; posterolateral tract of Lissauer &rarr; synapse in substantia gelatinosa 1–2 segments away &rarr; 2nd-order axons cross &rarr; anterior spinothalamic. Same brain pathway as lateral."},
    {h:"Related tracts", list:[
      "Spinotectal tract — afferents for spino-visual reflexes; cross &rarr; superior colliculus",
      "Spinoreticular tract — alertness; mostly uncrossed &rarr; reticular formation of medulla, pons, midbrain",
      "Spino-olivary tract — double-cross; cutaneous + proprioceptive to cerebellum via inferior olivary nucleus"
    ]},
    {h:"Pain pathways", list:[
      "Fast pain — A-delta; mechanical/thermal; ~0.1 s; localized; sharp; skin only. Glutamate. 2nd-order crosses &rarr; lateral spinothalamic &rarr; VPL &rarr; postcentral gyrus",
      "Slow pain — C fibres; mechanical/thermal/chemical; ~1 s; aching/burning; every tissue. Glutamate + substance P. Multiple relays &rarr; lateral spinothalamic &rarr; reticular formation; poor localization",
      "Cortical pain processing: postcentral gyrus (interpretation), cingulate gyrus (emotional), insular gyrus (visceral organ pain — autonomic)"
    ]},
    {img:"anterolateral-system.jpg", caption:"Anterolateral system and pain pathways"}
  ]
},

"pyramidal-tract":{parent:"brain",title:"Corticospinal + corticonuclear tracts (pyramidal)",
  body:[
    {h:"Origin of corticospinal fibres", list:[
      "1/3 from primary motor cortex",
      "1/3 from secondary motor cortex",
      "1/3 from parietal lobe (net: 2/3 precentral, 1/3 postcentral)"
    ]},
    {h:"Course", p:"Corona radiata &rarr; posterior limb of internal capsule (cervical-controlling fibres closest to genu) &rarr; middle 1/3 of crus cerebri &rarr; broken into bundles in pons by transverse pontocerebellar fibres &rarr; pyramids in medulla &rarr; 75% cross at pyramidal decussation."},
    {h:"Tracts", list:[
      "Lateral corticospinal (entire cord) &rarr; ventral horn interneurons &rarr; alpha + some gamma motor neurons",
      "Anterior corticospinal (anterior column) — uncrossed; eventually cross in cord &rarr; bilateral axial muscle innervation"
    ]},
    {h:"Corticonuclear (corticobulbar) tract", p:"Head + neck movement. From primary motor cortex &rarr; corona radiata &rarr; genu of internal capsule &rarr; middle 1/3 of crus cerebri &rarr; pons + medulla pyramids &rarr; CN motor nuclei."},
    {h:"Innervation patterns of cranial nuclei", list:[
      "Bilateral innervation: oculomotor, trigeminal motor, superior facial nucleus, nucleus ambiguus",
      "Contralateral (crossed): hypoglossal, abducens, inferior facial nucleus",
      "Ipsilateral (uncrossed): trochlear nucleus",
      "Clinical: forehead muscles bilaterally innervated &rarr; spared in central facial palsy (UMN); peripheral (LMN, CN VII) &rarr; entire ipsilateral hemiface"
    ]},
    {img:"corticospinal.jpg", caption:"Pyramidal tract — corticospinal and corticonuclear"}
  ]
},

"extrapyramidal-motor":{parent:"brain",title:"Extrapyramidal motor pathways + UMN/LMN lesions + paralysis types",
  body:[
    {h:"Extrapyramidal tracts", list:[
      "Reticulospinal — alpha + gamma tone; pontine reticulospinal (pons &rarr; anterior column, mostly uncrossed); medullary reticulospinal (medulla &rarr; lateral column; some cross)",
      "Tectospinal — reflex postural movements to visual stimuli; from superior colliculus &rarr; cross &rarr; anterior column next to MLF &rarr; upper cervical interneurons",
      "Rubrospinal — facilitates flexors, inhibits extensors; from red nucleus &rarr; cross &rarr; lateral column &rarr; ventral horn interneurons",
      "Vestibulospinal — extensor (anti-gravity) tone; from lateral vestibular nucleus &rarr; uncrossed &rarr; anterior column",
      "Descending autonomic tracts — hypothalamus &rarr; reticulospinal &rarr; lateral horns (sympathetic T1–L2; parasympathetic S2–S4)",
      "Interstitio-spinal — uncrossed; from interstitial nucleus of Cajal; coordinates eye + head/neck via III, IV, VI nuclei"
    ]},
    {h:"UMN lesion (corticospinal)", list:[
      "Babinski (dorsiflexion of great toe to lateral sole stroke)",
      "Absent superficial abdominal reflexes",
      "Absent cremasteric reflex (L1)",
      "Loss of fine skilled movements (especially distal limbs)"
    ]},
    {h:"UMN lesion (extrapyramidal)", list:[
      "Severe paralysis with little/no atrophy",
      "Spasticity/hypertonicity; legs extended, arms flexed",
      "Clonus (rhythmic involuntary contractions)",
      "Clasp-knife phenomenon"
    ]},
    {h:"LMN lesions", list:[
      "Flaccid paralysis + absent tendon reflexes",
      "Atrophy, loss of reflexes, antagonist muscle contracture"
    ]},
    {h:"Paralysis types", list:[
      "Hemiplegia — one side (trunk + UE + LE)",
      "Monoplegia — single limb",
      "Paraplegia — both UE or both LE",
      "Quadriplegia — all 4 limbs"
    ]},
    {img:"extrapyramidal.jpg", caption:"Extrapyramidal pathways and lesion patterns"}
  ]
},

"auditory-pathway":{parent:"brain",title:"Auditory pathway",
  body:[
    {h:"Stages", list:[
      "Hair cells of cochlea &rarr; bipolar cells of spiral ganglion (1st-order) &rarr; cochlear nerve (CN VIII cochlear division) &rarr; cochlear nuclei (anterior + posterior, in medulla; 2nd-order)",
      "2nd-order axons &rarr; mostly cross in trapezoid body &rarr; ascend in lateral lemniscus of opposite side; some ascend ipsilaterally; some synapse in superior olivary nucleus + nucleus of trapezoid body",
      "Inferior colliculus (3rd-order) &rarr; fibres via inferior brachium &rarr; medial geniculate body of thalamus (4th-order)",
      "4th-order axons &rarr; acoustic radiation (sublentiform part of internal capsule) &rarr; primary auditory cortex (Heschl's gyrus, superior temporal gyrus, Brodmann 41/42)"
    ]},
    {h:"Tonotopic arrangement", p:"Frequency mapped at every level (cochlea, cochlear nuclei, inferior colliculus, MGB, primary cortex)."},
    {h:"Other features", list:[
      "Bilateral input — primary cortex receives both ears, contralateral dominant",
      "Non-lemniscal pathways — branches to reflexes, attention, integration, emotion",
      "Descending auditory pathway — feedback fibres from each level to lower nuclei + organ of Corti (suppress/enhance sounds)"
    ]},
    {img:"auditory-pathway.jpg", caption:"Auditory pathway"}
  ]
},

"visual-pathway":{parent:"brain",title:"Visual pathway, cortical areas, reflexes",
  body:[
    {h:"5-neuron visual pathway", list:[
      "1st — photoreceptor (rod/cone) in retina",
      "2nd — bipolar neuron in retina",
      "3rd — ganglion cell (retina); axons form optic nerve at optic disc",
      "4th — lateral geniculate body (LGB) of thalamus",
      "5th — visual cortex"
    ]},
    {h:"Course & decussation", p:"Optic n. &rarr; optic canal &rarr; optic chiasm (junction of floor + anterior wall of 3rd ventricle). Nasal (medial) half retina + macula cones cross at chiasm. Temporal (lateral) half retina + macula continue ipsilateral. Optic tract &rarr; postero-laterally around cerebral peduncle &rarr; LGB &rarr; optic radiation &rarr; V1."},
    {h:"Image projection", list:[
      "Right visual field &rarr; projects on left nasal half + right temporal half of retina &rarr; left optic tract carries image of right field",
      "Upper visual field &rarr; lower retina &rarr; lower visual cortex; lower visual field &rarr; upper retina &rarr; upper visual cortex",
      "Macula &rarr; most posterior visual cortex; periphery &rarr; anterior"
    ]},
    {h:"Visual reflexes", list:[
      "Pupillary light reflex — optic tract fibres &rarr; pretectal nucleus &rarr; both Edinger-Westphal nuclei &rarr; CN III preganglionics &rarr; ciliary ganglion &rarr; short ciliary nn. &rarr; sphincter pupillae. Direct + consensual.",
      "Corneal reflex — V1 (cornea/conjunctiva) &rarr; trigeminal sensory nucleus &rarr; MLF &rarr; motor nucleus of CN VII &rarr; orbicularis oculi &rarr; blink",
      "Accommodation reflex — optic n. &rarr; chiasm &rarr; tract &rarr; LGB &rarr; visual cortex &rarr; precentral nucleus &rarr; CN III + Edinger-Westphal (convergence + pupil constriction + lens thickening)",
      "Pupillary skin reflex — pain stimulus &rarr; lateral horn &rarr; preganglionic sympathetic &rarr; superior cervical ganglion &rarr; dilator pupillae"
    ]},
    {img:"visual-pathway.jpg", caption:"Visual pathway and reflexes"}
  ]
},

"olfactory-gustatory":{parent:"brain",title:"Olfactory + gustatory pathways",
  body:[
    {h:"Gustatory pathway", list:[
      "Tongue innervation: CN VII (chorda tympani) &rarr; anterior 2/3; CN IX &rarr; posterior 1/3; CN X (superior laryngeal n.) &rarr; small areas anterior to epiglottis",
      "1st-order — geniculate ganglion (CN VII), inferior/petrosal ganglion (CN IX), inferior/nodose ganglion (CN X)",
      "2nd-order — nucleus solitarius (medulla)",
      "3rd-order — VPM thalamus (some relayed via parabrachial nuclei in pons; cross midline)",
      "4th-order — gustatory area of cortex (Brodmann 43)",
      "Collaterals to: hypothalamus (endocrine), dorsal vagal nucleus (gastric secretion), salivatory nuclei (saliva)"
    ]},
    {h:"Olfactory epithelium", p:"Olfactory cells (bipolar, with apical olfactory vesicle + non-motile cilia = chemoreceptors) + supporting columnar cells + basal stem cells (replace olfactory cells every 2–3 months) + Bowman's glands (serous)."},
    {h:"Olfactory pathway", list:[
      "CN I (olfactory) — axons from basal end of olfactory cells; unmyelinated; pass through cribriform foramina &rarr; synapse in olfactory bulb",
      "Olfactory bulb — mitral cells synapse with olfactory n. fibres = synaptic glomeruli",
      "Olfactory tract (myelinated) &rarr; anterior perforated substance &rarr; splits: medial olfactory stria (through anterior commissure to contralateral bulb) + lateral olfactory stria (to olfactory cortex)",
      "Primary olfactory cortex — periamygdaloid + piriform",
      "Secondary olfactory cortex — entorhinal area (Brodmann 28) — appreciation of smell",
      "Note: Olfaction is the only sensory modality NOT relayed by the thalamus."
    ]},
    {img:"olfactory-gustatory.jpg", caption:"Olfactory and gustatory pathways"}
  ]
},

"limbic-system":{parent:"brain",title:"Limbic system",
  body:[
    {h:"Functions", p:"Emotion, behaviour, drive; memory; rich connections to hypothalamus mediate physiological + biochemical changes from emotional state."},
    {h:"Components", list:[
      "Subcallosal gyrus",
      "Cingulate gyrus",
      "Parahippocampal gyrus",
      "Hippocampal formation (hippocampus, dentate gyrus, subiculum, parahippocampal gyrus)",
      "Amygdaloid nucleus",
      "Mammillary bodies",
      "Anterior thalamic nucleus",
      "Connecting pathways: alveus + fimbria of fornix, mammillothalamic tract, stria terminalis"
    ]},
    {h:"Hippocampal formation", list:[
      "Hippocampus — curved gray elevation along entire floor of inferior horn of lateral ventricle; anterior end = pes hippocampus",
      "Alveus — thin layer of white matter on ventricular surface; converges to form fimbria",
      "Dentate gyrus — narrow band between fimbria + parahippocampal gyrus; posteriorly continues as indusium griseum",
      "Parahippocampal gyrus — between hippocampal fissure + collateral sulcus"
    ]},
    {h:"Papez circuit", p:"Hippocampus &rarr; fornix &rarr; mammillary body &rarr; anterior thalamic nucleus (via mammillothalamic tract) &rarr; cingulate gyrus &rarr; parahippocampal area &rarr; hippocampus. Also: mammillo-tegmental tract &rarr; reticular tegmentum; hippocampal efferents &rarr; nucleus accumbens (motor responses)."},
    {h:"Amygdaloid nucleus", p:"Anterior + superior to inferior horn of lateral ventricle. Provides affective connotation to experience (especially social). Efferents = stria terminalis &rarr; wall of lateral ventricle &rarr; hypothalamus."},
    {h:"Functional summary", p:"Information from world &rarr; parieto-occipital association areas &rarr; frontal association (planned behaviour) + inferior temporal (meaning) &rarr; amygdala (motivation/emotion) + hippocampal formation (episodic memory) &rarr; motor (via nucleus accumbens) + autonomic (via hypothalamus)."},
    {img:"limbic-system.jpg", caption:"Limbic system and Papez circuit"}
  ]
},

"neurotransmitter-systems":{parent:"brain",title:"Neurotransmitters in the CNS — main brain chemical systems",
  body:[
    {h:"Cholinergic system (ACh)", list:[
      "Production: forebrain cholinergic nuclei (FCN) = septal nuclei + nucleus basalis of Meynert (substantia innominata) + diagonal band of Broca; reticular formation (brainstem)",
      "Projections: FCN &rarr; hippocampus, olfactory bulb, amygdala, cerebral cortex; reticular formation &rarr; thalamus",
      "Function: memory, learning, motor, emotion, mood",
      "Dysfunction: Alzheimer's disease"
    ]},
    {h:"Serotonergic system (5-HT)", list:[
      "Production: raphe nuclei (Raphael system) of reticular formation",
      "Projections: raphe &rarr; essentially all brain + cord",
      "Function: thermoregulation, emotion + mood, sensory perception",
      "Dysfunction: excess &rarr; confusion, unconsciousness, increased HR + BP; deficit &rarr; depression + sleep disorders"
    ]},
    {h:"Noradrenergic system (NE)", list:[
      "Production: locus coeruleus in pons",
      "Projections: locus coeruleus &rarr; cortex, cerebellum, amygdala, hippocampus, hypothalamus, thalamus, brainstem, spinal cord",
      "Function: nociception, regulation of circulation + respiration, negative emotional memory, anxiety"
    ]},
    {h:"Dopaminergic system (DA)", list:[
      "Production: substantia nigra pars compacta + ventral tegmental area",
      "Projections: SNc &rarr; striatum (nigrostriatal); VTA &rarr; nucleus accumbens, amygdala, hippocampus, olfactory bulb, prefrontal cortex (mesolimbic + mesocortical)",
      "Function: emotion + mood, motor function, reward, sexual arousal",
      "Dysfunction: Parkinsonism (loss); schizophrenia (excess in mesolimbic); tuberoinfundibular pathway regulates prolactin"
    ]},
    {h:"GABAergic system (GABA)", p:"Inhibitory; local interneurons in cerebellar cortex, thalamus, hippocampus, cerebral cortex. Striatum + globus pallidus efferents are GABAergic."},
