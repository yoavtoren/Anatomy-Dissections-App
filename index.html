        "Esophageal branches → esophageal plexus (left + right vagal contributions)"
      ]}
    ]
  },

  "sympathetic-trunk-thorax":{
    title:"Sympathetic Trunk + Splanchnic Nerves",
    parent:"chest",
    body:[
      {h:"Thoracic sympathetic trunk",list:[
        "Paired paravertebral chain, anterior to heads of ribs",
        "12 thoracic ganglia (T1–T12); T1 often fuses with inferior cervical ganglion = stellate ganglion",
        "Pre-ganglionic outflow: T1–L2 (white rami communicantes) — thoracolumbar outflow"
      ]},
      {h:"Thoracic splanchnic nerves (preganglionic — do NOT synapse in paravertebral chain)",list:[
        "Greater splanchnic n. (T5–T9): pierces diaphragmatic crus → celiac ganglion → postganglionic to foregut",
        "Lesser splanchnic n. (T10–T11): pierces crus → superior mesenteric / aorticorenal ganglia → midgut + kidney",
        "Least splanchnic n. (T12): pierces crus → renal plexus"
      ]},
      {h:"Adrenal medulla",p:"Receives preganglionic sympathetic fibres DIRECTLY (no synapse). Chromaffin cells are modified postganglionic neurons that secrete epinephrine (80%) + norepinephrine (20%) into bloodstream."},
      {h:"Clinical",list:[
        "Horner's syndrome: T1 preganglionic damage (Pancoast tumour) → ptosis, miosis, anhydrosis, enophthalmos",
        "Splanchnicectomy: surgical treatment of chronic pancreatitis pain (interrupts greater splanchnic)"
      ]}
    ]
  },

  "azygos-system":{
    title:"Azygos / Hemiazygos System",
    parent:"chest",
    body:[
      {h:"Azygos vein",list:[
        "Formed from: right ascending lumbar v. + right subcostal v. at T12",
        "Ascends right of vertebral column in posterior mediastinum",
        "Arches over RIGHT pulmonary hilum at T4 → drains into SVC",
        "Tributaries: right posterior intercostal vv. (4th–11th), hemiazygos v., accessory hemiazygos v., right bronchial vv., esophageal vv."
      ]},
      {h:"Hemiazygos vein",list:[
        "Formed from: left ascending lumbar v. + left subcostal v.",
        "Ascends left side, level T8–T9",
        "Crosses behind aorta, thoracic duct, and esophagus at T7–T9 → joins azygos"
      ]},
      {h:"Accessory hemiazygos vein",list:[
        "Drains left posterior intercostal vv. (4th–8th)",
        "Descends on left side",
        "Crosses midline at T7–T8 → joins azygos (or hemiazygos)"
      ]},
      {h:"Clinical significance",list:[
        "Cavo-caval anastomoses: azygos system connects IVC territory (lumbar vv.) to SVC territory",
        "Critical collateral pathway when SVC or IVC is obstructed",
        "Dilated azygos = sign of SVC obstruction (superior mediastinal mass)",
        "Batson's valveless plexus connects azygos to vertebral venous plexuses → metastatic spread"
      ]}
    ]
  },

  "esophageal-constrictions":{
    title:"Esophageal Constrictions",
    parent:"chest",
    body:[
      {h:"Three anatomical constrictions",list:[
        "Upper (pharyngoesophageal): C6, behind cricoid cartilage — cricopharyngeus muscle (Killian's dehiscence between thyropharyngeus + cricopharyngeus = Zenker's diverticulum site). 15 cm from incisors",
        "Middle (bronchoaortic): T4, where aortic arch + left main bronchus cross the esophagus. 25 cm from incisors",
        "Lower (diaphragmatic): T10, esophageal hiatus. 40 cm from incisors"
      ]},
      {h:"Clinical importance",list:[
        "Sites of foreign body lodging (coins, fish bones)",
        "Sites of peptic stricture (lower — from GERD)",
        "Sites of malignant stricture formation",
        "Endoscopy uses these distances from incisors as landmarks",
        "Achalasia: lower esophageal sphincter failure → dilation above"
      ]}
    ]
  },

  "chest-tube":{
    title:"Pneumothorax Puncture Site",
    parent:"chest",
    body:[
      {h:"Safe triangle for chest tube",list:[
        "Anterior border: lateral edge of pectoralis major",
        "Posterior border: anterior border of latissimus dorsi",
        "Inferior border: nipple line (5th ICS)",
        "Apex: axilla",
        "Standard placement: 4th or 5th ICS, mid-axillary line"
      ]},
      {h:"VAN bundle — neurovascular bundle rule",list:[
        "V (Vein) — superior in costal groove",
        "A (Artery) — middle in costal groove",
        "N (Nerve) — inferior in costal groove",
        "All run on INFERIOR border of upper rib in intercostal space",
        "Insert tube/needle along UPPER border of lower rib to avoid VAN"
      ]},
      {h:"Tension pneumothorax decompression",list:[
        "Emergency needle decompression: 2nd ICS, midclavicular line",
        "Large-bore needle/cannula",
        "Converts tension → simple pneumothorax"
      ]},
      {h:"Layers traversed",list:[
        "Skin",
        "Subcutaneous tissue",
        "External intercostal muscle",
        "Internal intercostal muscle",
        "Innermost intercostal muscle",
        "Endothoracic fascia",
        "Parietal pleura"
      ]}
    ]
  },

  "sentinel-lns":{
    title:"Sentinel Lymph Nodes",
    parent:"chest",
    body:[
      {h:"Sorgius's node",list:[
        "Location: axillary lymph node, pectoral (lateral/anterior) group",
        "Clinical: first lymph node draining the lateral breast",
        "Used in sentinel lymph node biopsy (SLNB) for breast cancer staging",
        "Identified with radiotracer ± blue dye"
      ]},
      {h:"Virchow's node (Troisier's sign)",list:[
        "Location: left supraclavicular lymph node",
        "Receives drainage via thoracic duct from abdominal viscera",
        "Enlarged Virchow's node = Troisier sign = classically gastric carcinoma",
        "Also: other GI cancers (pancreas, colon), testicular cancer, lymphoma",
        "Supraclavicular LNs drain to left venous angle via thoracic duct"
      ]},
      {h:"Bayer's nodes",list:[
        "Location: parauterine lymph nodes",
        "Clinical: sentinel nodes for uterine (endometrial) cancer",
        "Drain along uterine lymphatics"
      ]}
    ]
  },

  // ======================================================================
  // ABDOMEN  A-01 → A-22
  // ======================================================================
  "abdominal-aorta":{
    title:"Branches of the Abdominal Aorta",
    parent:"abdomen",
    body:[
      {h:"Course",p:"Enters abdomen through aortic hiatus (T12) → bifurcates into common iliac aa. at L4 (slightly left of midline). Lies on anterior surface of vertebral bodies."},
      {h:"Parietal branches (paired)",list:[
        "Inferior phrenic aa. (T12): first branches, supply diaphragm inferior surface + give superior suprarenal aa.",
        "Lumbar aa. (4 pairs, L1–L4): posterior abdominal wall, spinal cord supply"
      ]},
      {h:"Visceral branches (paired)",list:[
        "Middle suprarenal aa. (L1): to adrenal glands",
        "Renal aa. (L1–L2): to kidneys. Right renal a. passes POSTERIOR to IVC",
        "Gonadal aa. (L2): testicular or ovarian. Cross ureter anteriorly"
      ]},
      {h:"Celiac trunk (T12) — foregut",list:[
        "Left gastric a.: lesser curvature, esophageal branches",
        "Splenic a.: largest branch, tortuous; gives short gastric aa., left gastroepiploic a., pancreatic branches",
        "Common hepatic a. → proper hepatic a. (right + left hepatic aa. + cystic a. + right gastric a.) + gastroduodenal a. (superior pancreaticoduodenal + right gastroepiploic a.)"
      ]},
      {h:"SMA (L1) — midgut (D2 distal → 2/3 transverse colon)",list:[
        "Inferior pancreaticoduodenal a.",
        "Jejunal + ileal aa. (4–6 branches each)",
        "Ileocolic a. → anterior cecal a. + posterior cecal a. + appendicular a.",
        "Right colic a.",
        "Middle colic a."
      ]},
      {h:"IMA (L3) — hindgut (left 1/3 transverse colon → upper rectum)",list:[
        "Left colic a.: ascending (splenic flexure) + descending branches",
        "Sigmoid aa. (2–4): sigmoid colon",
        "Superior rectal a.: terminal IMA branch, supplies upper rectum"
      ]},
      {h:"Unpaired terminal",list:[
        "Median sacral a.: small, arises just above bifurcation"
      ]}
    ]
  },

  "iliac-branches":{
    title:"Iliac Artery Branches + Corona Mortis",
    parent:"abdomen",
    body:[
      {h:"External iliac artery",list:[
        "Descends along medial border of psoas → passes under inguinal lig. → becomes femoral a.",
        "Inferior epigastric a.: arises just above inguinal lig. → lateral border of Hesselbach's triangle → enters rectus sheath",
        "Deep circumflex iliac a.: runs along inguinal lig. toward ASIS"
      ]},
      {h:"Internal iliac — posterior division (parietal only)",list:[
        "Iliolumbar a.: posterior abdominal wall + iliacus m.",
        "Lateral sacral aa.: sacral canal + dorsal sacrum",
        "Superior gluteal a.: exits suprapiriform foramen → gluteal muscles (largest branch internal iliac)"
      ]},
      {h:"Internal iliac — anterior division (parietal)",list:[
        "Obturator a.: exits obturator canal → medial thigh adductors",
        "Inferior gluteal a.: exits infrapiriform foramen → gluteus maximus",
        "Internal pudendal a.: exits infrapiriform → around ischial spine → lesser sciatic foramen → pudendal canal → perineum"
      ]},
      {h:"Internal iliac — anterior division (visceral)",list:[
        "Umbilical a. → superior vesical aa. (bladder) + a. to ductus deferens",
        "Inferior vesical a. (♂) / vaginal a. (♀): bladder + seminal vesicles / vagina",
        "Middle rectal a.: middle rectum",
        "Uterine a. (♀): crosses over ureter ('water under the bridge') → uterus, anastomoses with ovarian a."
      ]},
      {h:"Corona mortis — crown of death",list:[
        "Anastomosis (~30% of people) between pubic branch of inferior epigastric a. + pubic branch of obturator a.",
        "Crosses superior pubic ramus posterior to lacunar ligament",
        "At risk during femoral hernia repair, pelvic trauma, pubic ramus ORIF",
        "Can cause catastrophic haemorrhage if unrecognised"
      ]}
    ]
  },

  "gut-arterial-anastomoses":{
    title:"Anastomoses Between the Unpaired Aortic Trunks",
    parent:"abdomen",
    body:[
      {h:"Celiac ↔ SMA anastomosis",list:[
        "Superior pancreaticoduodenal a. (from gastroduodenal a. ← celiac) anastomoses with inferior pancreaticoduodenal a. (from SMA)",
        "Runs in the pancreaticoduodenal arcades around the head of pancreas",
        "Clinically important: SMA occlusion proximal to this → gut can be perfused from celiac via this arcade"
      ]},
      {h:"SMA ↔ IMA anastomosis",list:[
        "Marginal artery of Drummond: continuous loop along mesenteric border of colon (SMA + IMA colonic branches)",
        "Arc of Riolan (meandering mesenteric a.): proximal anastomosis within mesentery between middle colic (SMA) + left colic (IMA)",
        "Critical at Griffith's point (splenic flexure) — watershed zone"
      ]},
      {h:"IMA ↔ Internal iliac anastomosis",list:[
        "Superior rectal a. (terminal IMA) ↔ middle rectal a. (internal iliac anterior division) ↔ inferior rectal a. (internal pudendal)",
        "Allows pelvic/lower rectal perfusion in IMA occlusion"
      ]},
      {h:"Foregut/midgut boundary",p:"Major duodenal papilla (D2) — bile enters here from celiac-derived hepatic system, and inferior pancreaticoduodenal from SMA."},
      {h:"Midgut/hindgut boundary",p:"Cannon–Böhm point: splenic flexure of colon — SMA → IMA arterial transition + vagal → sacral parasympathetic transition."}
    ]
  },

  "colon-anastomoses":{
    title:"Drummond / Riolan / Sudeck / Griffith Anastomoses",
    parent:"abdomen",
    body:[
      {h:"Marginal artery of Drummond",list:[
        "Continuous anastomotic loop along the mesenteric border of the entire colon",
        "Formed by colonic branches of SMA + IMA",
        "Allows collateral flow between SMA + IMA territories"
      ]},
      {h:"Arc of Riolan (meandering mesenteric artery)",list:[
        "Proximal anastomosis within the mesentery itself between middle colic a. (SMA) and left colic a. (IMA)",
        "More direct/central than Drummond's marginal artery",
        "Major collateral vessel in chronic mesenteric ischaemia — if large = sign of significant SMA or IMA stenosis"
      ]},
      {h:"Griffith's critical point",list:[
        "Splenic flexure of colon",
        "Watershed between SMA (middle colic a.) and IMA (left colic a.) territories",
        "Most vulnerable zone during ischaemia — may not have complete Drummond arcade here",
        "Risk during aortic surgery, left colectomy"
      ]},
      {h:"Sudeck's critical point",list:[
        "Rectosigmoid junction",
        "Watershed between lowest sigmoid branches and superior rectal a. (terminal IMA)",
        "Risk: if IMA ligated distally to sigmoid branches → superior rectal may be insufficient → rectal ischaemia",
        "Relevant in anterior resection, aortoiliac surgery"
      ]}
    ]
  },

  "portal-system":{
    title:"Portal Venous System",
    parent:"abdomen",
    body:[
      {h:"Formation",list:[
        "SMV + splenic vein unite POSTERIOR to the neck of pancreas",
        "IMV usually drains into splenic vein (left of SMA); sometimes into SMV or SMV–splenic confluence"
      ]},
      {h:"Course",list:[
        "Portal vein ascends in hepatoduodenal ligament (posterior position)",
        "Enters liver at porta hepatis → divides right + left portal vein branches",
        "Blood flows through liver sinusoids → central veins → hepatic vv. → IVC"
      ]},
      {h:"Portal triad in hepatoduodenal ligament",list:[
        "Bile duct: anterolateral RIGHT",
        "Proper hepatic a.: anterolateral LEFT",
        "Portal vein: POSTERIOR"
      ]},
      {h:"Tributaries",list:[
        "Splenic v. (receives IMV, short gastric vv., left gastroepiploic v.)",
        "Superior mesenteric v.",
        "Left + right gastric vv. (coronary v.) — drains lesser curvature",
        "Paraumbilical vv. — run in falciform lig.",
        "Cystic v. — from gallbladder",
        "Prepyloric v. (Mayo's v.) — over pylorus"
      ]},
      {h:"Function",p:"Delivers nutrient-rich, partially-oxygenated blood from gut to liver for first-pass metabolism. Liver also receives oxygenated blood via proper hepatic a. (25% of flow, 50% of O2)."}
    ]
  },

  "porto-caval":{
    title:"Porto-Caval Anastomoses",
    parent:"abdomen",
    body:[
      {h:"Four main sites",list:[
        "Esophageal: left gastric v. (portal) ↔ esophageal tributaries of azygos system (systemic) → ESOPHAGEAL VARICES (catastrophic upper GI bleed in portal hypertension)",
        "Rectal: superior rectal v. (portal, via IMV) ↔ middle rectal v. (internal iliac) + inferior rectal v. (internal pudendal) → INTERNAL HAEMORRHOIDS",
        "Paraumbilical: paraumbilical vv. in falciform lig. (portal) ↔ superficial epigastric vv. (systemic) → CAPUT MEDUSAE (radiating dilated veins around umbilicus)",
        "Retroperitoneal (Retzius veins): colonic veins + retroperitoneal portal tributaries ↔ retroperitoneal systemic veins → clinically silent usually"
      ]},
      {h:"Clinical — portal hypertension",list:[
        "Normal portal pressure ~5–10 mmHg; portal hypertension >10 mmHg",
        "Causes: prehepatic (portal v. thrombosis), intrahepatic (cirrhosis), posthepatic (Budd-Chiari)",
        "TIPSS (transjugular intrahepatic portosystemic shunt): artificial connection hepatic v. ↔ portal v. via percutaneous route — reduces portal pressure",
        "Splenomegaly + hypersplenism develop from congestion"
      ]}
    ]
  },

  "ivc":{
    title:"Inferior Vena Cava + Tributaries",
    parent:"abdomen",
    body:[
      {h:"Formation + course",list:[
        "Formed at L5 by confluence of right + left common iliac vv. (just inferior to aortic bifurcation, slightly right of midline)",
        "Ascends on right side of abdominal aorta",
        "Passes through caval hiatus (T8) in central tendon of diaphragm",
        "Drains into right atrium"
      ]},
      {h:"Tributaries (inferior → superior)",list:[
        "Common iliac vv. (L5)",
        "Lumbar vv. (4 pairs, L1–L4) — via ascending lumbar vv.",
        "Right gonadal v. (left gonadal v. drains into LEFT renal v.)",
        "Renal vv. (L1–L2) — left renal v. crosses anterior to aorta",
        "Right suprarenal v. (left suprarenal v. drains into LEFT renal v.)",
        "Inferior phrenic vv.",
        "Hepatic vv. (right, middle, left) — just before diaphragm"
      ]},
      {h:"Left-sided asymmetry",list:[
        "Left gonadal v. + left suprarenal v. drain into LEFT renal v. (not IVC directly)",
        "Left renal v. longer, crosses aorta anteriorly",
        "Left varicocele: left gonadal v. joins left renal v. at 90° angle + nutcracker effect from aorta-SMA — higher pressure → varicocele"
      ]},
      {h:"Clinical",list:[
        "RCC (renal cell carcinoma): tumour thrombus extends along renal v. → IVC → right atrium",
        "IVC filter: placed below renal veins to prevent PE from lower limb DVT",
        "IVC obstruction → collateral via azygos system + superficial abdominal veins"
      ]}
    ]
  },

  "cavo-caval":{
    title:"Cavo-Caval Anastomoses",
    parent:"abdomen",
    body:[
      {h:"Three main routes",list:[
        "Vertebral plexus (Batson's): internal vertebral venous plexus (epidural) + external vertebral venous plexus connect lumbar vv. (IVC) to azygos (SVC) to dural sinuses. VALVELESS → bidirectional flow",
        "Azygos system: lumbar vv. → ascending lumbar vv. → azygos / hemiazygos → SVC",
        "Thoraco-epigastric route: inferior epigastric v. (→ femoral → IVC) ↔ superior epigastric v. (→ internal thoracic → SVC); also superficial epigastric v. ↔ lateral thoracic v."
      ]},
      {h:"Clinical significance",list:[
        "IVC obstruction: superficial abdominal veins dilate (upward flow toward axilla — distinguishes from portal hypertension where caput medusae flows away from umbilicus)",
        "Batson's plexus: cancer metastasis route — prostate, breast, lung → vertebral column/brain WITHOUT passing through lungs. Explains 'skip' metastases",
        "Varicocele treatment: must ligate testicular v. below renal vein level",
        "In pregnancy: IVC compression by gravid uterus → blood diverts via ascending lumbar → azygos"
      ]}
    ]
  },

  "projection-points-checklist":{
    title:"Surface Projections — Murphy / McBurney / Lanz / Desjardin",
    parent:"abdomen",
    body:[
      {h:"Murphy's point",list:[
        "Structure: fundus of gallbladder",
        "Location: intersection of right costal arch + right midclavicular line",
        "Murphy's sign: deep palpation at this point during inspiration → arrest of inspiration due to pain = acute cholecystitis (inflamed gallbladder contacts examining hand)"
      ]},
      {h:"McBurney's point",list:[
        "Structure: base of appendix",
        "Location: junction of lateral 1/3 and medial 2/3 of line from ASIS to umbilicus (line of Monro)",
        "Maximum tenderness in appendicitis. McBurney's incision (skin crease at this point) for open appendicectomy"
      ]},
      {h:"Lanz's point",list:[
        "Structure: pelvic-position appendix",
        "Location: interspinous line (connecting both ASISs), approximately 5 cm to the right of midline",
        "Used when appendix is in pelvic position (obturator sign positive)"
      ]},
      {h:"Desjardin's point",list:[
        "Structure: major duodenal papilla + head of pancreas",
        "Location: line from apex of right axilla to umbilicus, 6–7 cm from umbilicus",
        "Tenderness here + jaundice + Courvoisier's gallbladder = pancreatic head pathology"
      ]},
      {h:"Labbé's triangle",list:[
        "Structure: anterior surface projection of stomach",
        "Borders: transpyloric line (L1) + line connecting right 9th costal cartilage to left 8th costal cartilage",
        "Percussion over this area for gastric air bubble"
      ]}
    ]
  },

  "liver":{
    title:"Liver — Lobes, Attachments + Ducts",
    parent:"abdomen",
    body:[
      {h:"Anatomical lobes",list:[
        "Right lobe: largest, separated from left by falciform lig. (anterior) and fissures",
        "Left lobe: smaller, extends to epigastrium",
        "Caudate lobe: between IVC (right) + ligamentum venosum (left); receives blood from both portal branches, drains directly to IVC",
        "Quadrate lobe: between gallbladder fossa (right) + ligamentum teres (left); functionally = left lobe"
      ]},
      {h:"Couinaud functional segments",list:[
        "8 segments based on hepatic vein drainage + portal supply",
        "Segment I: caudate",
        "Segments II–IV: left functional lobe (IIa, IIb, III = left, IV = quadrate)",
        "Segments V–VIII: right functional lobe",
        "Each segment can be resected independently"
      ]},
      {h:"Peritoneal attachments",list:[
        "Falciform ligament: anterior abdominal wall → liver. Free edge = ligamentum teres hepatis (remnant left umbilical v.)",
        "Coronary ligament: liver → diaphragm. Bounds the 'bare area' (no peritoneum)",
        "Right + left triangular ligaments: lateral extremities of coronary lig.",
        "Hepatogastric ligament: liver → lesser curvature (thin, transparent — window for lesser sac)",
        "Hepatoduodenal ligament: liver → D1. Contains portal triad. FREE EDGE of lesser omentum",
        "Ligamentum venosum: remnant ductus venosus, in fissure between caudate + left lobe"
      ]},
      {h:"Biliary tree",list:[
        "Right hepatic duct + left hepatic duct → common hepatic duct (~2–4 cm)",
        "Cystic duct joins → bile duct (choledochus, ~8–10 cm)",
        "Choledochus runs in hepatoduodenal lig. → behind D1 → through pancreatic head → drains at major duodenal papilla with pancreatic duct"
      ]}
    ]
  },

  "gallbladder":{
    title:"Gallbladder + Biliary Tree + 4 Parts of Choledochus",
    parent:"abdomen",
    body:[
      {h:"Gallbladder anatomy",list:[
        "Fundus: palpable below right costal arch at MCL (Murphy's point); projects beyond liver edge",
        "Body: lies in gallbladder fossa on visceral surface of right liver lobe",
        "Infundibulum (Hartmann's pouch): dilated posterior part of neck; gallstone may impact here",
        "Neck: S-shaped, joins cystic duct",
        "Cystic duct: spiral valves of Heister; joins common hepatic duct"
      ]},
      {h:"Calot's triangle",list:[
        "Lateral boundary: cystic duct",
        "Medial boundary: common hepatic duct",
        "Superior boundary: inferior surface of liver",
        "Contents: cystic artery (usually from right hepatic a.) + Lund's node (cystic LN)",
        "Critical view of safety: in laparoscopic cholecystectomy, dissect Calot's triangle to see only 2 structures entering gallbladder before clipping"
      ]},
      {h:"4 parts of the bile duct (choledochus)",list:[
        "Pars supraduodenalis: in hepatoduodenal lig., above D1; bile duct on right, hepatic a. on left, portal v. posterior",
        "Pars retroduodenalis: passes behind D1",
        "Pars pancreatica: runs through substance of pancreatic head (groove on posterior surface or embedded)",
        "Pars inframuralis: passes obliquely through wall of D2 → opens at major duodenal papilla (of Vater); joins pancreatic duct of Wirsung at sphincter of Oddi"
      ]}
    ]
  },

  "duodenum":{
    title:"Duodenum — Parts + Papillae",
    parent:"abdomen",
    body:[
      {h:"D1 — Superior (cap)",list:[
        "Level: L1",
        "Only INTRAPERITONEAL part of duodenum (has short mesoduodenum)",
        "Radiologically: 'duodenal cap' on barium meal — most common site of peptic ulcer",
        "Posterior relation: gastroduodenal a., bile duct, portal v."
      ]},
      {h:"D2 — Descending",list:[
        "Level: L1–L3, retroperitoneal",
        "Major duodenal papilla (of Vater): on posteromedial wall, ~8–10 cm from pylorus",
        "Receives: bile duct + pancreatic duct of Wirsung at sphincter of Oddi",
        "Minor duodenal papilla: ~2 cm above major, receives accessory duct of Santorini",
        "Foregut/midgut junction at major papilla"
      ]},
      {h:"D3 — Horizontal (inferior)",list:[
        "Level: L3, retroperitoneal",
        "Crossed anteriorly by: SMA + SMV (potential for SMA syndrome if angle < 22°)"
      ]},
      {h:"D4 — Ascending",list:[
        "Level: L3–L2, retroperitoneal",
        "Ends at duodenojejunal (DJ) junction at left of L2",
        "Held by suspensory ligament of Treitz (muscle + fibrous band from right diaphragmatic crus to DJ junction)",
        "Landmark for DJ flexure during surgery (Treitz = start of jejunum)"
      ]}
    ]
  },

  "pancreas":{
    title:"Pancreas — Parts + Ducts",
    parent:"abdomen",
    body:[
      {h:"Five parts",list:[
        "Head: within C-loop of duodenum, at L2. Posterior to SMV. Receives bile duct through posterior groove",
        "Uncinate process: hook-shaped projection from head, passes BEHIND SMA + SMV",
        "Neck: over SMV/portal vein formation; anterior surface forms posterior wall of pyloric antrum",
        "Body: crosses midline, posterior to stomach, forms posterior wall of lesser sac. Anterior surface of body has retroperitoneal attachment",
        "Tail: ONLY intraperitoneal part; lies in splenorenal ligament; reaches splenic hilum"
      ]},
      {h:"Ductal system",list:[
        "Main duct of Wirsung: runs full length → drains at major duodenal papilla",
        "Accessory duct of Santorini: drains anterior head → minor duodenal papilla",
        "In 30%: both ducts open at major papilla; in 10%: Santorini is dominant (pancreas divisum variants)"
      ]},
      {h:"Vascular supply",list:[
        "Arterial: pancreaticoduodenal arcades (superior from gastroduodenal a. ← celiac; inferior from SMA) + splenic a. dorsal pancreatic, great pancreatic (arteria pancreatica magna), caudal pancreatic branches",
        "Venous: veins drain into splenic v. + SMV → portal v.",
        "Splenic a. runs along superior border of pancreas body (tortuous)"
      ]},
      {h:"Relations",list:[
        "Anterior: lesser sac / stomach",
        "Posterior: aorta, IVC, portal v., left kidney + adrenal, splenic v.",
        "Superior: celiac trunk + splenic a.",
        "Inferior: root of transverse mesocolon"
      ]}
    ]
  },

  "jejunum-ileum":{
    title:"Jejunum vs Ileum",
    parent:"abdomen",
    body:[
      {h:"Common features",list:[
        "Both intraperitoneal, suspended by mesentery proper",
        "Blood supply: SMA → jejunal/ileal branches → arcades → vasa recta → SMV → portal v.",
        "Combined length: ~5–7 m; jejunum = proximal 2/5, ileum = distal 3/5"
      ]},
      {h:"Jejunum characteristics",list:[
        "Location: upper left abdomen",
        "Thicker wall, wider lumen",
        "Tall, numerous plicae circulares (valves of Kerckring) → feathery pattern on barium",
        "Long vasa recta + single-tier arcades",
        "Less fat in mesentery (mesenteric windows visible)",
        "Redder (more vascular)",
        "Fewer Peyer's patches"
      ]},
      {h:"Ileum characteristics",list:[
        "Location: lower right + pelvis",
        "Thinner wall, narrower lumen",
        "Few, low plicae circulares (smooth appearance on barium)",
        "Short vasa recta + multiple-tier arcades (4–5 tiers)",
        "More fat in mesentery (no windows visible)",
        "Pinker (less vascular)",
        "Many Peyer's patches — especially terminal ileum"
      ]},
      {h:"Terminal ileum",list:[
        "Supplied by ileocolic a. (SMA) → anterior cecal a. + posterior cecal a. + appendicular a.",
        "Ileocecal valve: prevents reflux but allows slow transit into cecum",
        "Meckel's diverticulum: 2 feet (60 cm) from ileocecal valve, 2% of population, 2 cm long, 2% symptomatic"
      ]}
    ]
  },

  "appendix":{
    title:"Appendix — Position + Variations",
    parent:"abdomen",
    body:[
      {h:"Anatomy",list:[
        "Blind-ended diverticulum from posteromedial cecum",
        "Length: typically 6–10 cm (range 2–20 cm)",
        "Base at convergence of 3 taeniae coli → reliable surgical landmark",
        "Wall contains lymphoid tissue (function: immune — tonsil of the gut)"
      ]},
      {h:"McBurney's point",list:[
        "Lateral 1/3 of line from ASIS to umbilicus (line of Monro)",
        "Site of maximal tenderness in appendicitis",
        "McBurney's incision: skin crease perpendicular to this line"
      ]},
      {h:"Positional variations",list:[
        "Retrocecal / retrocolic: ~65% — most common. Psoas sign positive (pain on hip extension). Atypical pain presentation",
        "Pelvic / descending: ~30%. Obturator sign positive (pain on internal rotation of flexed hip). Pelvic peritonitis",
        "Subcecal: anterior to cecum, pointing inferiorly",
        "Pre-ileal: anterior to terminal ileum",
        "Post-ileal: posterior to terminal ileum",
        "Paracecal: alongside the cecum"
      ]},
      {h:"Blood supply + clinical",list:[
        "Appendicular a.: branch of posterior cecal a. (from ileocolic a. ← SMA)",
        "End-artery: thrombosis in appendicitis → gangrene → perforation",
        "Lanz's point: alternative surface marking for pelvic appendix"
      ]}
    ]
  },

  "large-intestine":{
    title:"Large Intestine — Characteristics + Cannon–Böhm",
    parent:"abdomen",
    body:[
      {h:"Three distinctive features",list:[
        "Taeniae coli: 3 longitudinal bands of smooth muscle (condensed outer longitudinal layer). Named: mesocolic, free (anterior), omental (posterior). Absent on rectum (complete circular coat) + appendix",
        "Haustra: sacculations of wall between taeniae, caused by taenial shortening",
        "Omental (epiploic) appendages: pedunculated fat-filled peritoneal protrusions. Absent on cecum + rectum. May twist → epiploic appendagitis"
      ]},
      {h:"Semilunar folds",p:"Internal folds between haustra — seen on colonoscopy."},
      {h:"Cannon–Böhm point",list:[
        "Location: junction of middle + left third of transverse colon, near splenic flexure",
        "Arterial watershed: SMA territory (middle colic a.) → IMA territory (left colic a.)",
        "Autonomic transition: vagal parasympathetics (CN X) → sacral parasympathetics (S2–S4 pelvic splanchnics)",
        "Clinical: prone to ischaemia + different innervation pattern either side — relevant in Hirschsprung disease transition zone"
      ]},
      {h:"Parts of the large intestine",list:[
        "Cecum (intraperitoneal) → ascending colon (retroperitoneal) → right (hepatic) flexure → transverse colon (intraperitoneal, mobile) → left (splenic) flexure → descending colon (retroperitoneal) → sigmoid colon (intraperitoneal, mobile) → rectum (retroperitoneal, then subperitoneal)"
      ]}
    ]
  },

  "abdominal-wall-layers":{
    title:"Abdominal Wall Layers",
    parent:"abdomen",
    body:[
      {h:"Layers — superficial to deep",list:[
        "1. Skin",
        "2. Camper's fascia: superficial fatty layer of superficial fascia",
        "3. Scarpa's fascia: deep membranous layer of superficial fascia. Continues into perineum as Colles' fascia (limits urine extravasation in urethral rupture)",
        "4. External oblique m. + aponeurosis: fibres inferolateral → inferomedial. Lower border forms inguinal ligament (ASIS → pubic tubercle)",
        "5. Internal oblique m. + aponeurosis: fibres inferolateral → superomedial (right angles to EO). Gives rise to cremaster muscle",
        "6. Transversus abdominis m. + aponeurosis: horizontal fibres",
        "7. Transversalis fascia: deep fascia lining abdominal cavity",
        "8. Extraperitoneal (preperitoneal) fat",
        "9. Parietal peritoneum"
      ]},
      {h:"Rectus sheath",list:[
        "ABOVE arcuate line (midway between umbilicus + pubis): Anterior = EO aponeurosis + anterior leaf of IO. Posterior = posterior leaf of IO + TA aponeurosis",
        "BELOW arcuate line: Anterior = all three aponeuroses (EO + IO + TA). Posterior = only transversalis fascia (no posterior sheath)",
        "Arcuate line = where posterior sheath ends"
      ]},
      {h:"Vessels",list:[
        "Superficial epigastric a.: from femoral a. → upward through Scarpa's fascia",
        "Superficial circumflex iliac a.: from femoral a. → toward ASIS",
        "Inferior epigastric a.: from external iliac a. → lateral to rectus → enters rectus sheath. Forms lateral border of Hesselbach's triangle",
        "Superior epigastric a.: from internal thoracic a. → enters rectus sheath from above. Anastomoses with inferior epigastric"
      ]},
      {h:"Hesselbach's triangle",list:[
        "Medial: lateral border of rectus abdominis",
        "Lateral: inferior epigastric vessels",
        "Inferior: inguinal ligament",
        "Direct inguinal hernia pushes through this triangle"
      ]}
    ]
  },

  "omenta":{
    title:"Greater + Lesser Omentum",
    parent:"abdomen",
    body:[
      {h:"Lesser omentum",list:[
        "Double peritoneal fold from lesser curvature of stomach + D1 to liver",
        "Hepatogastric ligament: liver → lesser curvature. Thin, transparent",
        "Hepatoduodenal ligament: liver → D1 (first part of duodenum). Thick free edge. Contains the portal triad"
      ]},
      {h:"Portal triad in hepatoduodenal ligament",list:[
        "Bile duct: anterolateral right",
        "Proper hepatic artery: anterolateral left",
        "Portal vein: posterior"
      ]},
      {h:"Greater omentum",list:[
        "4-layered peritoneal apron from greater curvature of stomach",
        "Hangs anteriorly to cover small intestine",
        "Folds back superiorly to attach to anterior surface of transverse colon",
        "'Abdominal policeman': migrates to sites of inflammation/infection, walls off peritonitis"
      ]},
      {h:"Ligaments from the greater curvature",list:[
        "Gastrophrenic ligament: stomach → diaphragm (left dome). Contains no vessels of note",
        "Gastrosplenic ligament: stomach → splenic hilum. Contains short gastric aa. + left gastroepiploic a./v.",
        "Gastrocolic ligament: stomach → transverse colon. = anterior 2 layers of greater omentum",
        "Splenorenal ligament: spleen → left kidney. Contains splenic a. + splenic v. + tail of pancreas"
      ]}
    ]
  },

  "omental-bursa":{
    title:"Omental Bursa + Epiploic Foramen",
    parent:"abdomen",
    body:[
      {h:"Omental bursa (lesser sac) — 6 borders",list:[
        "Anterior: lesser omentum (hepatogastric + hepatoduodenal ligaments) + posterior stomach + gastrocolic lig.",
        "Posterior: pancreas + left adrenal + upper left kidney",
        "Right: epiploic foramen of Winslow (communication with greater sac)",
        "Left: gastrosplenic lig. + splenorenal lig. + spleen",
        "Superior: caudate lobe of liver",
        "Inferior: transverse mesocolon (roof of infracolic compartment)"
      ]},
      {h:"Recesses of the lesser sac",list:[
        "Superior recess: behind caudate lobe",
        "Inferior recess: between anterior + posterior layers of greater omentum",
        "Splenic recess: extends to left toward splenic hilum"
      ]},
      {h:"Epiploic foramen of Winslow — 4 borders",list:[
        "Anterior: hepatoduodenal ligament (portal triad — bile duct, hepatic a., portal v.)",
        "Posterior: IVC + right diaphragmatic crus",
        "Superior: caudate lobe of liver",
        "Inferior: D1 (first part of duodenum)"
      ]},
      {h:"Pringle manoeuvre",p:"Compress hepatoduodenal lig. between thumb (in epiploic foramen, posterior) and index finger (anterior) to control hepatic bleeding. Interrupts portal v. + hepatic a. inflow."},
      {h:"Clinical",list:[
        "Pancreatic pseudocyst: fluid from pancreatitis tracks into lesser sac → lesser sac pseudocyst",
        "Posterior gastric ulcer: perforates into lesser sac → retroperitoneal fat necrosis or epigastric mass"
      ]}
    ]
  },

  "mesentery":{
    title:"Mesentery — Parts + Root",
    parent:"abdomen",
    body:[
      {h:"Root of the mesentery",list:[
        "Length: ~15–20 cm, oblique",
        "Start: left side of L2 at duodenojejunal junction (ligament of Treitz)",
        "End: right sacroiliac joint at ileocecal junction",
        "Structures crossed by the root (left to right): D3, abdominal aorta, IVC, right ureter, right psoas, right gonadal vessels"
      ]},
      {h:"Parts of the mesentery",list:[
        "Mesentery proper: suspends jejunum + ileum. Connects to posterior abdominal wall along root",
        "Transverse mesocolon: connects transverse colon to posterior wall. Mobile. Divides abdomen into supracolic (liver, stomach, spleen) + infracolic compartments",
        "Mesosigmoid: suspends sigmoid colon. Mobile. Apex at left ureter",
        "Mesorectum: connects rectum to sacrum"
      ]},
      {h:"Secondary retroperitoneal mesocolons",list:[
        "Right mesocolon: fused to posterior wall → ascending colon is retroperitoneal",
        "Left mesocolon: fused to posterior wall → descending colon is retroperitoneal",
        "Transverse + sigmoid mesocolons remain intraperitoneal and mobile"
      ]}
    ]
  },

  "retroperitoneum-checklist":{
    title:"Retroperitoneal Organs — SAD PUCKER",
    parent:"abdomen",
    body:[
      {h:"Mnemonic — SAD PUCKER",list:[
        "S — Suprarenal (adrenal) glands",
        "A — Aorta + IVC",
        "D — Duodenum (D2–D4 retroperitoneal; D1 intraperitoneal)",
        "P — Pancreas (except tail, which is intraperitoneal in splenorenal lig.)",
        "U — Ureters",
        "C — Colon: ascending + descending (transverse + sigmoid = intraperitoneal)",
        "K — Kidneys",
        "E — Esophagus (lower abdominal portion, ~2 cm)",
        "R — Rectum (middle + lower thirds)"
      ]},
      {h:"Primary vs secondary retroperitoneal",list:[
        "PRIMARY (never had mesentery): kidneys, ureters, adrenal glands, aorta, IVC",
        "SECONDARY (started intraperitoneal, fused to posterior wall during development): pancreas (except tail), D2–D4, ascending colon, descending colon",
        "Distinction matters: secondary retroperitoneal organs can be 'mobilised' (Kocher / Cattell-Braasch manoeuvre) during surgery"
      ]},
      {h:"Clinical",list:[
        "Retroperitoneal haematoma: often from lumbar fracture, renal trauma, or ruptured AAA",
        "Retroperitoneal fibrosis (Ormond's disease): ureters encased → hydronephrosis",
        "Retroperitoneal lymphadenopathy: testicular cancer spreads to para-aortic LNs here"
      ]}
    ]
  },

  "transpyloric-plane-checklist":{
    title:"Transpyloric Plane — Addison's Plane",
    parent:"abdomen",
    body:[
      {h:"Level",list:[
        "L1 vertebral level",
        "Halfway between jugular notch (suprasternal) + pubic symphysis",
        "At sternal ends of 9th costal cartilages (tips)"
      ]},
      {h:"Structures at this level",list:[
        "Pylorus of stomach",
        "D1 (first part duodenum, intraperitoneal)",
        "Neck of pancreas",
        "Origin of SMA (anterior to aorta, behind neck of pancreas)",
        "Formation of portal vein (SMV + splenic v., posterior to neck of pancreas)",
        "Conus medullaris (~L1–L2) — tip of spinal cord",
        "Hila of kidneys (right slightly lower than left due to liver)",
        "Fundus of gallbladder",
        "Tips of 9th costal cartilages"
      ]},
      {h:"Clinical",list:[
        "Pancreatic neck carcinoma: compresses portal vein at this level",
        "SMA syndrome: SMA compresses D3 against aorta when angle is acute",
        "Level for lumbar puncture: L3–L4 (below conus medullaris at L1–L2 to avoid cord injury)"
      ]}
    ]
  },

  // ======================================================================
  // URINARY  U-01 → U-03
  // ======================================================================
  "kidneys":{
    title:"Kidneys — Position, Fat Layers, Segments, Blood Supply",
    parent:"abdomen",
    body:[
      {h:"Position",list:[
        "Retroperitoneal, T12–L3",
        "Right kidney: slightly lower (displaced by liver)",
        "Hila face anteromedially at L1",
        "Surrounded by perirenal fat within Gerota's fascia"
      ]},
      {h:"Fat layers — deep to superficial",list:[
        "True fibrous capsule: directly on kidney parenchyma",
        "Perirenal (perinephric) fat: within Gerota's fascia. Rich fat — preserved in renal cancer staging (T2 vs T3)",
        "Renal (Gerota's / Zuckerkandl's) fascia: encloses kidney + adrenal gland. Open inferiorly → urine/blood can track down into pelvis",
        "Retrorenal (paranephric / posterior pararenal) fat: outside Gerota's, mainly posterior",
        "Transversalis fascia: outermost"
      ]},
      {h:"5 renal segments (end-arteries — no anastomoses)",list:[
        "Apical segment: upper pole",
        "Upper anterior segment",
        "Middle anterior segment: lateral",
        "Lower (anterior) segment: lower pole",
        "Posterior segment: back of kidney",
        "Clinical: each segment has own segmental artery (end-artery) — partial nephrectomy must respect segment boundaries"
      ]},
      {h:"Blood supply",list:[
        "Renal aa. from aorta at L1–L2",
        "Right renal a. passes POSTERIOR to IVC (longer course)",
        "Left renal v. crosses ANTERIOR to aorta (under SMA) — nutcracker syndrome = compression here",
        "Left gonadal v. + left suprarenal v. drain into LEFT renal v.",
        "Renal a. → 5 segmental aa. → interlobar → arcuate → interlobular aa. → afferent arterioles"
      ]}
    ]
  },

  "ureter":{
    title:"Ureter — Course + Constrictions",
    parent:"abdomen",
    body:[
      {h:"Course",list:[
        "Length: ~25–30 cm, entirely retroperitoneal",
        "Begins at renal pelvis at L2",
        "Descends on anterior surface of psoas major",
        "Crosses common iliac bifurcation at pelvic brim (anterior to sacroiliac joint)",
        "Runs along lateral pelvic wall",
        "Male: crossed by ductus deferens ('water under the bridge' — ureter = water, deferens = bridge)",
        "Female: crossed by uterine artery at lateral fornix ('water=ureter under the bridge=uterine a.')",
        "Enters bladder posterolaterally, oblique intramural course (prevents reflux)"
      ]},
      {h:"Three constrictions (sites of stone impaction)",list:[
        "1. Pelviureteric junction (PUJ): where renal pelvis narrows to ureter",
        "2. Pelvic brim: where ureter crosses common iliac vessels",
        "3. Vesicoureteric junction (VUJ): narrowest — intramural segment through bladder wall"
      ]},
      {h:"Distinguishing ureter from gonadal vessels",list:[
        "Ureter vermiculates (peristalsis) when pinched/touched",
        "Ureter crosses gonadal vessels obliquely from medial to lateral",
        "Gonadal vessels originate from aorta at L2 and run ANTERIOR to ureter",
        "Ureter is more medial, gonadal vessels more lateral"
      ]},
      {h:"Blood supply",list:[
        "Upper ureter: renal a.",
        "Middle ureter: gonadal a. + aortic branches",
        "Lower/pelvic ureter: internal iliac branches (superior vesical, inferior vesical/vaginal, uterine aa.)",
        "Medial to lateral blood supply is important during surgery"
      ]}
    ]
  },

  "urinary-bladder":{
    title:"Urinary Bladder",
    parent:"abdomen",
    body:[
      {h:"Position + parts",list:[
        "Subperitoneal in lesser pelvis, posterior to pubic symphysis",
        "Apex: superior, connected to umbilicus by median umbilical ligament (urachus remnant)",
        "Body: main part",
        "Fundus (base): posterior, triangular — receives ureters",
        "Neck: inferior, continuous with urethra; most fixed part"
      ]},
      {h:"Trigone",list:[
        "Smooth triangular area on internal fundus between 2 ureteric orifices + internal urethral orifice",
        "Derived from absorbed mesonephric (Wolffian) duct",
        "Always smooth (no rugae) — different from rugose body",
        "Ureteric ridge (interureteric crest) between ureteric orifices"
      ]},
      {h:"Peritoneal relations",list:[
        "Male: peritoneum covers superior + posterior bladder → rectovesical pouch between posterior bladder + anterior rectum",
        "Female: peritoneum covers superior bladder → vesicouterine pouch between posterior bladder + anterior uterus. Posterior uterus + rectum → rectouterine pouch (Douglas)"
      ]},
      {h:"Innervation",list:[
        "Sympathetic (T11–L2 via hypogastric n.): inhibit detrusor, contract internal urethral sphincter (males — prevents retrograde ejaculation). 'Fight or flight — hold it in'",
        "Parasympathetic (S2–S4 pelvic splanchnic nn.): contract detrusor (micturition), relax internal sphincter. 'S2,3,4 keep the bladder off the floor'",
        "Somatic (pudendal n. S2–S4): external urethral sphincter (voluntary)"
      ]}
    ]
  },

  // ======================================================================
  // PELVIS  P-01 → P-13
  // ======================================================================
  "subperitoneal-organs":{
    title:"Subperitoneal Organs",
    parent:"pelvis",
    body:[
      {h:"Definition",p:"Organs located below the level of the pelvic peritoneum, in the subperitoneal space (extraperitoneal pelvic space)."},
      {h:"List of subperitoneal structures",list:[
        "Lower 1/3 of rectum",
        "Most of urinary bladder",
        "Urethra",
        "Prostate gland (♂)",
        "Seminal vesicles + ampullae of ductus deferentes (♂)",
        "Distal ureters",
        "Most of vagina (♀)",
        "Most of cervix (♀)",
        "Pelvic sidewall vessels (internal iliac branches)",
        "Inferior hypogastric plexus (pelvic plexus) — bilaterally"
      ]},
      {h:"Surgical significance",list:[
        "Extraperitoneal access: Retzius space (space of Retzius/prevesical space) allows bladder surgery without entering peritoneum",
        "Lymphatic drainage differs: internal iliac + sacral LNs (NOT mesenteric)",
        "Total mesorectal excision (TME): dissection within mesorectal fascia preserves subperitoneal autonomic nerves"
      ]}
    ]
  },

  "lumbar-plexus-checklist":{
    title:"Lumbar Plexus — SIIGLOFL",
    parent:"pelvis",
    body:[
      {h:"Roots",p:"Anterior rami of L1–L4 with contribution from T12. Forms within substance of psoas major muscle."},
      {h:"Mnemonic — SIIGLOFL",list:[
        "S — Subcostal n. (T12): lateral abdominal wall, skin below 12th rib",
        "I — Iliohypogastric n. (L1): hypogastric skin (suprapubic), motor to internal oblique + transversus abdominis",
        "I — Ilioinguinal n. (L1): runs through inguinal canal on spermatic cord → skin of upper medial thigh, anterior scrotum/labia",
        "G — Genitofemoral n. (L1–L2): genital branch = cremaster + skin of scrotum/labia; femoral branch = skin of upper anterior thigh below inguinal lig.",
        "L — Lateral femoral cutaneous n. (L2–L3): exits under lateral inguinal lig. near ASIS → anterolateral thigh skin. Compression = meralgia paresthetica",
        "O — Obturator n. (L2–L4): exits obturator canal → adductor compartment (all adductors) + medial thigh skin",
        "F — Femoral n. (L2–L4): exits lateral to psoas, under inguinal lig. → anterior thigh (quadriceps, iliacus, sartorius, pectineus). Longest branch = saphenous n. (medial leg, medial ankle)",
        "L — Lumbosacral trunk (L4 + L5): descends over pelvic brim to join sacral plexus"
      ]},
      {h:"Clinical",list:[
        "Meralgia paresthetica: lateral femoral cutaneous n. entrapment at ASIS (obesity, tight belts)",
        "Femoral n. palsy: unable to extend knee, weak hip flexion, absent knee jerk, medial leg sensory loss",
        "Obturator n. injury: adductor weakness, medial thigh sensory loss (e.g., during femoral hernia repair)",
        "Ilioinguinal n.: at risk in herniorrhaphy → groin/scrotal numbness"
      ]}
    ]
  },

  "sacral-plexus-checklist":{
    title:"Sacral Plexus — SIPPS",
    parent:"pelvis",
    body:[
      {h:"Roots",p:"Lumbosacral trunk (L4 + L5) + anterior rami of S1–S4. Forms on piriformis muscle on posterior pelvic wall."},
      {h:"Mnemonic — SIPPS",list:[
        "S — Superior gluteal n. (L4–S1): exits suprapiriform foramen → gluteus medius, gluteus minimus, tensor fascia lata. Trendelenburg gait if damaged",
        "I — Inferior gluteal n. (L5–S2): exits infrapiriform foramen → gluteus maximus only. Unable to rise from chair if damaged",
        "P — Pudendal n. (S2–S4): exits infrapiriform → around ischial spine → lesser sciatic foramen → pudendal (Alcock's) canal. Branches: inferior rectal n., perineal n., dorsal n. of penis/clitoris",
        "P — Posterior femoral cutaneous n. (S1–S3): exits infrapiriform → posterior thigh skin, perineal branches (posterior scrotum/labia)",
        "S — Sciatic n. (L4–S3): largest nerve in body. Exits infrapiriform → posterior thigh. Tibial component: all hamstrings + all posterior leg + foot. Common fibular: short head biceps femoris + anterior + lateral leg + dorsal foot"
      ]},
      {h:"Pelvic splanchnic nerves (NOT named in SIPPS)",list:[
        "S2–S4 anterior rami give pelvic splanchnic nn. (nervi erigentes)",
        "Parasympathetic to all pelvic organs + hindgut (via inferior hypogastric plexus)",
        "Responsible for erection, micturition, defecation"
      ]},
      {h:"Clinical",list:[
        "Piriformis syndrome: sciatic n. compression by piriformis → posterior thigh/leg pain",
        "Pudendal n. block: inject at ischial spine. Used in obstetrics (perineal analgesia)",
        "Superior gluteal n. injury: Trendelenburg sign (contralateral pelvic drop on single-leg stance)"
      ]}
    ]
  },

  "pelvic-pouches":{
    title:"Pelvic Pouches",
    parent:"pelvis",
    body:[
      {h:"Female pouches",list:[
        "Vesicouterine pouch: between posterior bladder + anterior body of uterus. Peritoneal fold. Not as deep as Douglas pouch",
        "Pouch of Douglas (rectouterine pouch): between posterior surface of uterus/upper vagina + anterior rectum. MOST DEPENDENT part of female peritoneal cavity. Blood, pus, ascites collect here first",
        "Access: culdocentesis through posterior vaginal fornix → enter Douglas pouch (used in ectopic pregnancy diagnosis + PID aspiration)"
      ]},
      {h:"Male pouch",list:[
        "Rectovesical pouch: between posterior bladder + anterior rectum. MOST DEPENDENT part of male peritoneal cavity"
      ]},
      {h:"Lateral fossae (both sexes)",list:[
        "Paravesical fossae: peritoneal depressions lateral to bladder on each side",
        "Pararectal fossae: peritoneal depressions lateral to rectum on each side"
      ]},
      {h:"Clinical",list:[
        "Ectopic pregnancy: haemoperitoneum collects in Douglas pouch → posterior fornix pain + bulging on vaginal exam",
        "Metastatic deposits from ovarian cancer seed preferentially to Douglas pouch and paracolic gutters",
        "Drainage of pelvic abscess: via posterior vaginal fornix (culdocentesis) or transrectally"
      ]}
    ]
  },

  "posterior-abdominal-muscles":{
    title:"Psoas, Iliacus, Quadratus Lumborum, Rectus Abdominis",
    parent:"pelvis",
    body:[
      {h:"Psoas major",list:[
        "Origin: T12–L5 (vertebral bodies, transverse processes, intervertebral discs)",
        "Insertion: lesser trochanter (via iliopsoas tendon)",
        "Innervation: anterior rami L1–L3 (direct branches)",
        "Action: chief hip flexor, trunk flexion (bilateral)",
        "Fascial compartment: fascia over psoas contributes to inguinal lig. (iliac fascia)"
      ]},
      {h:"Iliacus",list:[
        "Origin: iliac fossa + iliac crest",
        "Insertion: lesser trochanter (joins psoas → iliopsoas)",
        "Innervation: femoral nerve (L2–L4)",
        "Action: hip flexion"
      ]},
      {h:"Quadratus lumborum",list:[
        "Origin: iliac crest + iliolumbar lig.",
        "Insertion: 12th rib + transverse processes L1–L4",
        "Innervation: subcostal n. (T12) + anterior rami L1–L4",
        "Action: lateral flexion of trunk, depresses 12th rib (fixes during inspiration)"
      ]},
      {h:"Rectus abdominis",list:[
        "Origin: pubic crest + symphysis",
        "Insertion: xiphoid process + costal cartilages 5–7",
        "Innervation: T7–T12 (segmental intercostal nn.)",
        "Action: trunk flexion, increases intra-abdominal pressure",
        "Enclosed in rectus sheath; 3 tendinous intersections (adhered to anterior sheath only)"
      ]},
      {h:"Clinical",list:[
        "Psoas sign: pain on hip extension → retrocecal appendicitis (inflamed appendix on psoas)",
        "Psoas abscess: fluid tracks in psoas fascia → presents as swelling below inguinal lig. (cold abscess in TB)",
        "Rectus abdominis flap (TRAM/DIEP): reconstructive breast surgery"
      ]}
    ]
  },

  "uterus":{
    title:"Uterus — Ligaments + Blood Supply",
    parent:"pelvis",
    body:[
      {h:"Position + parts",list:[
        "Normal position: anteverted (tilted forward relative to vagina, ~90°) + anteflexed (body bent forward on cervix, ~170°)",
        "Parts: fundus (above tubal openings) → body → isthmus (narrow) → cervix (supravaginal + vaginal portions, external os)"
      ]},
      {h:"Ligaments",list:[
        "Round ligament: uterine horn → inguinal canal (deep ring) → labium majus. Maintains anteversion. Contains Sampson's a. (from uterine a.). Embryological remnant of gubernaculum",
        "Broad ligament: double peritoneal fold lateral to uterus. Three parts: mesometrium (below tubes), mesosalpinx (around fallopian tube), mesovarium (around ovary)",
        "Cardinal (Mackenrodt's) ligament: condensed connective tissue from cervix + lateral fornices → lateral pelvic wall (base of broad lig.). Contains uterine a. + ureter passes INFERIOR to it",
        "Uterosacral ligament: cervix → sacrum. Maintains anteflexion"
      ]},
      {h:"Water under the bridge — ureter relation",list:[
        "Uterine a. (bridge) crosses SUPERIOR to ureter (water)",
        "At lateral fornix level, ureter passes ~2 cm lateral to cervix",
        "Risk during hysterectomy: ureter ligation during uterine a. ligation"
      ]},
      {h:"Blood supply",list:[
        "Uterine a.: anterior division of internal iliac a. Anastomoses superiorly with ovarian a.",
        "Ovarian a. supplies fundus + upper tube",
        "Vaginal a. supplies cervix + upper vagina"
      ]},
      {h:"Lymphatic drainage",list:[
        "Fundus → para-aortic LNs (L1–L2) — via ovarian lymphatics",
        "Body → external iliac LNs",
        "Cervix → internal iliac + sacral LNs (also obturator + external iliac)"
      ]}
    ]
  },

  "ovary":{
    title:"Ovary — Suspensory Ligament + Blood Supply",
    parent:"pelvis",
    body:[
      {h:"Location",list:[
        "Lateral pelvic wall in the ovarian fossa (bounded by external iliac v. + internal iliac vessels)",
        "Near obturator n. and ureter",
        "Intraperitoneal — covered by germinal (surface) epithelium, NOT mesothelium (peritoneum)"
      ]},
      {h:"Suspensory ligament of ovary (infundibulopelvic ligament)",list:[
        "From upper pole of ovary → lateral pelvic wall",
        "Contains: ovarian artery, ovarian vein, lymphatics, autonomic nerves",
        "Must be ligated when performing oophorectomy"
      ]},
      {h:"Proper (ovarian) ligament",list:[
        "From lower pole of ovary → uterine horn",
        "Continuous with round ligament (separated by fallopian tube entry)",
        "Both = remnants of gubernaculum"
      ]},
      {h:"Blood supply + drainage",list:[
        "Ovarian a.: from abdominal aorta at L2 (paired, not from internal iliac)",
        "Anastomoses with uterine a. in broad ligament",
        "Right ovarian v. → IVC directly",
        "Left ovarian v. → LEFT renal v. (same asymmetry as gonadal veins)"
      ]},
      {h:"Lymphatic drainage",list:[
        "Para-aortic LNs at L1–L2 (NOT inguinal or iliac!)",
        "Same as testicular drainage (both derived from same embryological level)",
        "Clinical: ovarian cancer can spread to para-aortic LNs"
      ]}
    ]
  },

  "hypogastric-plexuses":{
    title:"Superior + Inferior Hypogastric Plexus",
    parent:"pelvis",
    body:[
      {h:"Superior hypogastric plexus",list:[
        "Location: anterior to L5 vertebra / sacral promontory, between common iliac vessels",
        "Largely sympathetic: receives lumbar splanchnic nn. (L1–L2 from aortic plexus)",
        "Divides into LEFT + RIGHT hypogastric nerves → inferior plexuses"
      ]},
      {h:"Inferior hypogastric plexus (pelvic plexus)",list:[
        "Paired, on lateral pelvic wall alongside rectum/seminal vesicles/vagina",
        "Receives: hypogastric nn. (sympathetic, from superior plexus) + pelvic splanchnic nn. (parasympathetic, S2–S4) + sacral splanchnic nn. (sympathetic from sacral sympathetic chain)"
      ]},
      {h:"Subplexuses",list:[
        "Rectal plexus → sigmoid + rectum",
        "Vesical plexus → bladder",
        "Prostatic plexus (♂) → prostate + seminal vesicles + penile erection nerves",
        "Uterovaginal plexus / Frankenhäuser's plexus (♀) → uterus + vagina",
        "Middle rectal plexus"
      ]},
      {h:"Clinical — nerve-sparing pelvic surgery",list:[
        "Rectal resection: inferior hypogastric plexus at risk → sexual + urinary dysfunction",
        "Radical prostatectomy: neurovascular bundles (NVB) of Walsh run posterolateral to prostate → erection nerve supply",
        "Nerve-sparing: identify + preserve NVB → improved potency rates"
      ]}
    ]
  },

  "testis-layers":{
    title:"Layers of the Testis",
    parent:"pelvis",
    body:[
      {h:"Layers — superficial to deep",list:[
        "1. Skin of scrotum: thin, rugose, highly pigmented",
        "2. Dartos muscle + fascia: smooth muscle (from Camper's + Scarpa's fascia); thermoregulation by wrinkling skin",
        "3. External spermatic fascia: from external oblique aponeurosis (at superficial inguinal ring)",
        "4. Cremaster muscle + fascia: from internal oblique; cremasteric reflex (genital br. genitofemoral n. afferent, L1–L2; cremasteric contraction); absent in varicocele repair",
        "5. Internal spermatic fascia: from transversalis fascia (at deep inguinal ring)",
        "6. Tunica vaginalis (parietal + visceral): peritoneal remnant (processus vaginalis); fluid = hydrocele; normally closed",
        "7. Tunica albuginea: dense fibrous capsule",
        "8. Tunica vasculosa: vascular layer on inner surface of albuginea",
        "9. Testicular parenchyma: seminiferous tubules → rete testis → efferent ductules → epididymis → vas deferens"
      ]},
      {h:"Spermatic cord — 3-3-3",list:[
        "3 Arteries: testicular a. (from aorta at L2), a. to ductus deferens (from superior vesical), cremasteric a. (from inferior epigastric)",
        "3 Veins: pampiniform plexus (drains to testicular v. → right to IVC, left to left renal v.)",
        "3 Nerves: genital branch genitofemoral n. (motor to cremaster), ilioinguinal n. (lies on cord, not within fascia), sympathetic fibres on artery",
        "Also: ductus deferens, lymphatics (→ para-aortic LNs at L1–L2)"
      ]},
      {h:"Clinical",list:[
        "Hydrocele: fluid in tunica vaginalis — transilluminates",
        "Varicocele: dilated pampiniform plexus ('bag of worms'); left >> right; risk of infertility",
        "Testicular torsion: twists on spermatic cord — surgical emergency. Bell-clapper deformity predisposes",
        "Testicular cancer: lymph drainage to para-aortic LNs — NOT inguinal (unless scrotal skin invaded)"
      ]}
    ]
  },

  "inguinal-canal":{
    title:"Inguinal Canal + Hernias",
    parent:"pelvis",
    body:[
      {h:"Canal walls — 4 borders",list:[
        "Anterior wall: external oblique aponeurosis (reinforced laterally by fibres of internal oblique)",
        "Posterior wall: transversalis fascia (reinforced medially by conjoint tendon = fused IO + TA aponeurosis)",
        "Floor: inguinal ligament (lateral) + lacunar ligament (medially at pubic tubercle)",
        "Roof: arching fibres of internal oblique + transversus abdominis (form conjoint tendon medially)"
      ]},
      {h:"Two rings",list:[
        "Deep (internal) inguinal ring: outpouching of transversalis fascia, ~1.5 cm above inguinal lig. midpoint. LATERAL to inferior epigastric vessels",
        "Superficial (external) inguinal ring: triangular opening in external oblique aponeurosis, above + medial to pubic tubercle. Medial + lateral crura + intercrural fibres"
      ]},
      {h:"Contents",list:[
        "Male: spermatic cord (testicular a., pampiniform plexus, ductus deferens, lymphatics, fascias)",
        "Female: round ligament of uterus",
        "Both: ilioinguinal n. (lies on cord/round lig. — NOT within fascias); genital branch genitofemoral n. (within internal spermatic fascia)"
      ]},
      {h:"Hernias",list:[
        "Indirect inguinal hernia: enters deep ring (LATERAL to inferior epigastric vessels) → traverses entire canal → may exit superficial ring into scrotum/labia. Congenital (patent processus vaginalis) or acquired. Most common overall hernia",
        "Direct inguinal hernia: pushes directly through posterior wall of canal MEDIAL to inferior epigastric vessels, through Hesselbach's triangle. Acquired (weakness of transversalis fascia). Rarely into scrotum",
        "Mnemonic: MD's don't lie — Medial = Direct, lateral = indirect"
      ]},
      {h:"Hesselbach's triangle",list:[
        "Medial: lateral border of rectus abdominis",
        "Lateral: inferior epigastric vessels",
        "Inferior: inguinal ligament"
      ]}
    ]
  },

  "femoral-triangle-hernias":{
    title:"Femoral Triangle + Femoral Hernia",
    parent:"pelvis",
    body:[
      {h:"Femoral triangle — borders",list:[
        "Superior (base): inguinal ligament",
        "Lateral: medial border of sartorius",
        "Medial: medial border of adductor longus",
        "Floor: iliacus + psoas (laterally) + pectineus + adductor longus (medially)",
        "Roof: skin + fascia lata + cribriform fascia (over femoral canal)"
      ]},
      {h:"Contents — lateral to medial (NAVEL)",list:[
        "N — femoral Nerve (outside femoral sheath, lateral)",
        "A — femoral Artery (in sheath)",
        "V — femoral Vein (in sheath)",
        "E — Empty space = femoral canal (contains Cloquet's LN + lymphatics)",
        "L — Lymphatics (deepest)"
      ]},
      {h:"Femoral sheath",list:[
        "Funnel of transversalis fascia (anterior) + iliopsoas fascia (posterior) extending 3–4 cm below inguinal lig.",
        "Encloses: femoral a. + femoral v. + femoral canal",
        "Does NOT enclose femoral n. (lateral, outside sheath)"
      ]},
      {h:"Femoral canal",list:[
        "Medial compartment of femoral sheath (normally empty, allows vein to expand)",
        "Femoral ring: superior opening. Bounded by: femoral vein (lateral), lacunar lig. (medial), inguinal lig. (anterior), pectineal / Cooper's lig. (posterior)",
        "Femoral hernia: gut/omentum enters femoral ring → canal → exits at saphenous opening"
      ]},
      {h:"Femoral hernia vs inguinal hernia",list:[
        "Femoral: below + lateral to pubic tubercle. Inguinal: above + medial to pubic tubercle",
        "Femoral more common in females (wider pelvis)",
        "High strangulation risk: rigid lacunar ligament medially + inguinal lig. anteriorly = tight ring",
        "Lacunar lig. incised medially to reduce strangulated femoral hernia (beware corona mortis!)"
      ]}
    ]
  },

  "umbilical-hernia":{
    title:"Umbilical Hernias",
    parent:"pelvis",
    body:[
      {h:"Types",list:[
        "Omphalocele (exomphalos): congenital, hernia through umbilical ring, covered by peritoneum + amnion (no skin). Contains liver ± bowel. Surgical emergency",
        "Infantile umbilical hernia: protrusion through weak umbilical ring. Usually closes spontaneously by 2–4 years. Repair if persists beyond 4–5 yrs or symptomatic",
        "Adult / paraumbilical hernia: acquired, through linea alba defect near umbilicus (often supraumbilical). Predisposed by obesity, multiparity, ascites, previous surgery"
      ]},
      {h:"Gastroschisis (distinct entity)",list:[
        "Full-thickness defect of anterior abdominal wall LATERAL to umbilicus (right side, right of umbilical cord insertion)",
        "No peritoneal covering — bowel freely herniated",
        "No amnion covering — bowel inflamed, matted",
        "Lower risk of other anomalies compared to omphalocele"
      ]},
      {h:"Common contents",list:[
        "Omentum (most common)",
        "Small bowel loops",
        "Colon (occasionally)"
      ]}
    ]
  },

  "umbilical-folds":{
    title:"Median, Medial, Lateral Umbilical Folds",
    parent:"pelvis",
    body:[
      {h:"Three pairs/single fold on anterior abdominal wall (inner surface)",list:[
        "Median umbilical fold (1, single, midline): from apex of bladder to umbilicus. Contains median umbilical ligament = urachus remnant (allantois derivative — connects bladder to umbilicus in fetus)",
        "Medial umbilical folds (2, paired, ~3 cm lateral to median): contain medial umbilical ligaments = obliterated umbilical arteries (distal portions of fetal umbilical arteries)",
        "Lateral umbilical folds (2, paired, most lateral ~6 cm): contain inferior epigastric vessels (LIVING vessels — arteries + veins)"
      ]},
      {h:"Fossae between folds",list:[
        "Supravesical fossa: between median + medial folds",
        "Medial inguinal fossa (= Hesselbach's triangle): between medial + lateral folds → site of DIRECT inguinal hernia",
        "Lateral inguinal fossa (= deep inguinal ring): lateral to lateral fold → site of INDIRECT inguinal hernia"
      ]},
      {h:"Surgical significance",list:[
        "Lateral umbilical fold (inferior epigastric vessels) = key laparoscopic landmark",
        "Medial to inferior epigastric vessels = Hesselbach's triangle = direct hernia",
        "Lateral to inferior epigastric vessels = indirect hernia",
        "Laparoscopic hernia repair (TEP/TAPP) uses these peritoneal folds for orientation"
      ]}
    ]
  },

  // ======================================================================
  // GENERAL  G-01 → G-05
  // ======================================================================
  "specimen-orientation":{
    title:"Specimen Orientation",
    parent:"pelvis",
    body:[
      {h:"General systematic approach",list:[
        "1. Identify the organ (what is it?)",
        "2. Orient: anterior/posterior, superior/inferior, left/right",
        "3. Identify hilum / vascular pedicle",
        "4. Describe surfaces + surface markings (impressions, grooves, notches)",
        "5. Identify structures entering and exiting (vessels, nerves, ducts)"
      ]},
      {h:"Heart orientation",list:[
        "Apex: points down, left, forward (5th ICS midclavicular)",
        "RV = anterior surface (faces the sternum)",
        "Aorta: arches to the left",
        "Pulmonary trunk: anterior to ascending aorta",
        "Right side: IVC/SVC enter from below/above; right ventricle pushes forward"
      ]},
      {h:"Lung orientation",list:[
        "Right lung: 3 lobes (superior, middle, inferior); horizontal + oblique fissures; RALS (artery anterior to bronchus)",
        "Left lung: 2 lobes; cardiac notch + lingula; LSPA (artery superior to bronchus)",
        "Identify: hilum structures (artery, bronchus, pulmonary veins), apex, costal surface, mediastinal surface with impressions"
      ]},
      {h:"Pluck (heart + lungs en bloc) orientation",list:[
        "Trachea: C-shaped cartilaginous rings, posterior membranous wall (trachealis m.)",
        "Esophagus: posterior to trachea, collapses (no cartilage)",
        "Great vessels: identify ascending aorta, aortic arch branches, SVC, pulmonary trunk",
        "Pericardium: fibrous sac enclosing heart"
      ]}
    ]
  },

  "topographic-method":{
    title:"Topographic Method — Borders then Contents",
    parent:"pelvis",
    body:[
      {h:"5-step template",list:[
        "1. Define the region: 'X is the region / space / triangle bounded by…'",
        "2. Borders: all 6 surfaces (superior, inferior, anterior, posterior, medial, lateral) — or roof/floor/walls",
        "3. Communications: foramina, openings, connections to adjacent spaces",
        "4. Contents: muscles, vessels (arteries then veins), nerves (motor then sensory), lymphatics, viscera",
        "5. Clinical relevance: pathology, surgical approaches, procedures"
      ]},
      {h:"Always start with borders",p:"Examiner expects: 'The infratemporal fossa is bounded superiorly by the infratemporal surface of the greater wing of sphenoid and squamous temporal bone, anteriorly by the maxillary tuberosity…' Then contents."},
      {h:"Order within contents",list:[
        "Muscles (from attachments)",
        "Arteries (from proximal to distal)",
        "Veins + lymphatics",
        "Nerves (motor then sensory; from root to target)",
        "Viscera / other structures"
      ]}
    ]
  },

  "id-nerves-arteries":{
    title:"ID Nerves + Arteries — Skull Base / Neck",
    parent:"pelvis",
    body:[
      {h:"General strategy",list:[
        "1. Identify the foramen/region you are in",
        "2. Recall contents using mnemonics (ROS for middle cranial fossa, VAN for carotid sheath, SOF for superior orbital fissure, jugular foramen IX-X-XI)",
        "3. Trace structure PROXIMALLY to confirm origin",
        "4. Trace DISTALLY to confirm territory / organ / muscles innervated"
      ]},
      {h:"For unknown nerves",list:[
        "Trace to the muscles it innervates → identify nerve from function",
        "Note size (motor = thicker), direction, adjacent structures",
        "Check for ganglion = likely parasympathetic",
        "Multiple roots joining = plexus branch"
      ]},
      {h:"For unknown arteries",list:[
        "Trace proximally to parent vessel → identify by territory and level",
        "Note branches given off along course",
        "Adjacent nerve usually names the artery (or vice versa)"
      ]},
      {h:"Key mnemonics to recall",list:[
        "SOF: CN III, IV, VI, V1 + ophthalmic veins",
        "Jugular foramen: CN IX, X, XI + sigmoid sinus + inferior petrosal sinus",
        "Carotid sheath VAN: Vein (IJV lateral) + Artery (CCA/ICA) + Nerve (vagus posterior)",
        "ROS: foramen Rotundum (V2), Ovale (V3), Spinosum (middle meningeal a.)",
        "Stylomastoid foramen: CN VII exits here"
      ]}
    ]
  },

  "re-anchor":{
    title:"Re-Anchor — What Structure Are You Holding?",
    parent:"pelvis",
    body:[
      {h:"Principle",p:"Before describing ANY structure on the cadaver, state its identity and side. This prevents tangential drift during a viva examination."},
      {h:"Protocol",list:[
        "Look at what is in your hand / under your forceps",
        "State: 'This is the [name] on the [left/right] side'",
        "Then proceed: position → relations → neurovascular supply → clinical"
      ]},
      {h:"When to re-anchor",list:[
        "Whenever the examiner redirects you to a new structure",
        "When you have been describing one structure for >30 seconds",
        "When you feel unsure — anchor to something you DO know first"
      ]},
      {h:"Why it works",p:"Examiners give marks for systematic approach, not just content. Re-anchoring shows methodical thinking and prevents partial-credit loss from incomplete or disorganised answers."}
    ]
  },

  "study-priority":{
    title:"Study Priority — Nerves and Arteries First",
    parent:"pelvis",
    body:[
      {h:"Rule",p:"For each anatomical region, always begin by listing and learning all nerves and arteries before studying muscles, bones, or viscera."},
      {h:"Why nerves + arteries first",list:[
        "Hardest identification questions on unlabelled cadavers are neurovascular structures",
        "Most clinical implications (injury, surgical risk, referred pain) are neurovascular",
        "Most mnemonics organise anatomical content around neurovascular structures",
        "Muscles and bones follow logically once you know what supplies them"
      ]},
      {h:"Approach per region",list:[
        "Step 1: List all arteries (proximal → distal) + anastomoses",
        "Step 2: List all veins + drainage territory",
        "Step 3: List all nerves (root → target)",
        "Step 4: Map muscles to their nerve supply",
        "Step 5: Note viscera / bones as context"
      ]},
      {h:"Practice",p:"Cover a diagram and name every vessel and nerve visible before uncovering. Repeat for each body region at the start of each study session."}
    ]
  },

};

function el(tag, attrs={}, ...children){
    const e = document.createElement(tag);
    for(const k in attrs){
        if(k==="class") e.className = attrs[k];
        else if(k==="html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
    }
    for(const c of children){
        if(c==null) continue;
        if(typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
    }
    return e;
}

/* ── Directional term colorizer ── */
function colorizeBlocks(){
    const app = document.getElementById('app');
    if(!app) return;

    const SKIP = new Set(['SCRIPT','STYLE','INPUT','TEXTAREA','CODE','BUTTON','A']);
    const DIR_RE = /\b(superior(?:ly)?|inferior(?:ly)?|lateral(?:ly)?|medial(?:ly)?|anterior(?:ly)?|posterior(?:ly)?|roof|floor|deep(?:ly)?|superficial(?:ly)?|proximal(?:ly)?|distal(?:ly)?|cranial(?:ly)?|caudal(?:ly)?)\b/gi;
    const VERT_RE = /\b([CTLS][1-9][0-2]?(?:[–\-][1-9][0-2]?)?)\b/g;
    const CN_RE   = /\b(CN\s?(?:I{1,3}|IV|VI{0,3}|IX|X{1,2}I{0,2}))\b/g;

    const dirClass = t => ({
        superior:'dir-sup', inferior:'dir-inf', lateral:'dir-lat', medial:'dir-med',
        anterior:'dir-ant', posterior:'dir-pos', roof:'dir-roof', floor:'dir-floor',
        deep:'dir-deep', superficial:'dir-sf', proximal:'dir-prox', distal:'dir-dist',
        cranial:'dir-cran', caudal:'dir-caud',
    })[t.toLowerCase().replace(/ly$/,'')] || 'dir-sup';

    function wrapMatches(text, re, makeSpan){
        re.lastIndex = 0;
        if(!re.test(text)){ re.lastIndex=0; return null; }
        re.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last=0, m;
        while((m=re.exec(text))!==null){
            if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
            frag.appendChild(makeSpan(m[0], m[1]||m[0]));
            last=m.index+m[0].length;
        }
        if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        return frag;
    }

    function walk(root, re, makeSpan){
        const tw = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(n){
                let p=n.parentElement;
                while(p&&p!==root){
                    if(SKIP.has(p.tagName)) return NodeFilter.FILTER_REJECT;
                    if(p.dataset&&p.dataset.nc) return NodeFilter.FILTER_REJECT; // already colored
                    p=p.parentElement;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes=[];
        while(tw.nextNode()) nodes.push(tw.currentNode);
        for(const node of nodes){
            const frag=wrapMatches(node.textContent, re, makeSpan);
            if(frag) node.parentNode.replaceChild(frag, node);
        }
    }

    // Pass 1 — directional terms
    walk(app, DIR_RE, (full, term)=>{
        const s=document.createElement('span');
        s.className=dirClass(term); s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 2 — vertebral levels (bold + sky highlight)
    walk(app, VERT_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-vert'; s.dataset.nc='1'; s.textContent=full; return s;
    });
    // Pass 3 — cranial nerve refs
    walk(app, CN_RE, (full)=>{
        const s=document.createElement('span');
        s.className='hl-cn'; s.dataset.nc='1'; s.textContent=full; return s;
    });

    // Pass 4 — bold label before first ":" in every list item
    // Must run AFTER passes 1-3 (which may have split text nodes)
    document.querySelectorAll('#app li').forEach(li=>{
        // Skip SCALP-style mnemonic items that start with <b>Letter</b>
        const fc = li.firstChild;
        if(fc && fc.nodeType===Node.ELEMENT_NODE && fc.tagName==='B') return;

        // Find the first non-empty text node in the <li>
        let tNode=null;
        for(const ch of li.childNodes){
            if(ch.nodeType===Node.TEXT_NODE && ch.textContent.trim()){
                tNode=ch; break;
            }
        }
        if(!tNode) return;

        // Match "Label(s): " at the start — label may include parens but not → or newline
        const m = tNode.textContent.match(/^([A-Za-z][^:→\n]{0,70}?):\s/);
        if(!m) return;

        const label = m[1];
        const rest  = tNode.textContent.slice(label.length); // keeps ":" and everything after
        const strong = document.createElement('strong');
        strong.className = 'li-label';
        strong.textContent = label;
        const restNode = document.createTextNode(rest);
        li.insertBefore(strong, tNode);
        li.insertBefore(restNode, tNode);
        li.removeChild(tNode);
    });
}

             onchange="onSecImgChange(this,'${imgFile}')"/>

           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>

function renderBlocks(blocks){
    let html = "";
    for(const b of blocks){
        if(b.h){
            // Every heading block gets a side image slot
            const imgFile = b.img || (_hSlug(b.h)+'.jpg');
            let inner = `<h3>${b.h}</h3>`;
            if(b.p) inner += `<p>${b.p}</p>`;
            if(b.list){
                inner += "<ul>";
                for(const li of b.list) inner += `<li>${li}</li>`;
                inner += "</ul>";
            }
            html += `<div class="sec-with-img">
              <div class="sec-content">${inner}</div>
              ${_secFig(imgFile, b.h, _secUid++)}
            </div>`;
        } else {
            if(b.p) html += `<p>${b.p}</p>`;
            if(b.img) html += renderImagePlaceholder(b.img, b.caption);
            if(b.div) html += `<div class="${b.div}">${b.text}</div>`;
        }
    }
    return html;
}

function viewRegion(id){
    const r = REGIONS.find(x=>x.id===id);

        back:"linear-gradient(135deg,#52C490,#2A9D60)",
    };
    const grad = regionGradients[id] || regionGradients.head;
    const regIcon = REGION_IMAGES[id] ? REGION_IMAGES[id].icon : '🔬';

    /* ── Jump nav ── */
    const jumpNav = r.sub.map(s=>{
        const emoji = TOPIC_EMOJI[s.id] || '🔬';

        pelvis:"linear-gradient(135deg,#C47AE0,#9040C8)",
        back:"linear-gradient(135deg,#52C490,#2A9D60)",
    };
    const grad = regionGradients[d.parent] || regionGradients.head;
    const sub = parent ? parent.sub.find(s=>s.id===id) : null;
    return `
    <div class="crumbs">
        <a href="#/topography">Topography</a> &rsaquo;
        <a href="#/region/${d.parent}">${parent?parent.name:""}</a> &rsaquo;
        <span>${d.title}</span>
    </div>
    <div class="topic-sec-head" style="margin-bottom:20px">
        <div class="topic-sec-icon" style="background:${grad}">${emoji}</div>
