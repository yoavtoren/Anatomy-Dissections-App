  {name:"Cervical fascia layers",category:"Neck",borders:"Superficial fascia (platysma, cutaneous nerves, EJV). Deep: 1) Investing — encircles neck, encloses SCM + trapezius. 2) Pretracheal — encloses thyroid + larynx + trachea (+ buccopharyngeal fascia posteriorly). 3) Prevertebral — encircles vertebral column + scalenes + plexuses.",definition:"Carotid sheath: contributions from all 3 deep layers; contents VAN (vein–artery–nerve). Alar fascia between prevertebral and buccopharyngeal layers defines the 'danger space' of deep neck infections (extends to diaphragm)."},
  {name:"Punctum nervosum (Erb's point)",category:"Neck",borders:"Posterior border of SCM at junction of upper and middle thirds (~6–7 cm above clavicle).",definition:"Four cutaneous branches of cervical plexus converge here: lesser occipital (C2), great auricular (C2–C3), transverse cervical (C2–C3), supraclavicular (C3–C4). Distinct from brachial plexus 'Erb's point' (C5–C6 union → upper trunk)."},
  {name:"Sensory innervation of neck skin",category:"Neck",borders:"Cervical plexus cutaneous branches from Erb's point supply the neck. Greater occipital n. (C2) supplies posterior scalp. V3 covers angle of mandible.",definition:"Lesser occipital (C2): posterior auricle + scalp. Great auricular (C2–C3): angle of mandible, parotid skin, auricle. Transverse cervical (C2–C3): anterior neck. Supraclavicular (C3–C4): clavicle, upper chest, shoulder. Dermatomes: C2 back of head; C3 back/side neck; C4 shoulder cape."},
  {name:"Neck triangles",category:"Neck",borders:"Anterior triangle (SCM / midline / mandible), posterior triangle (SCM / trapezius / clavicle). Subdivisions: carotid, submandibular, submental, muscular (anterior); occipital, subclavian (posterior).",definition:"Béclard's angle: posterior belly digastric + greater horn hyoid (landmark for lingual artery ligation). Pirogov's triangle: hypoglossal n. / posterior mylohyoid / intermediate digastric tendon (lingual a. ligation). Scalene fissure: anterior/middle scalene + 1st rib; contents: brachial plexus trunks + 3rd subclavian a. (subclavian vein passes anterior to anterior scalene — NOT through fissure)."},
  {name:"Cervical plexus (C1–C4)",category:"Neck",borders:"Anterior rami C1–C4. Four cutaneous branches at Erb's point. Motor: ansa cervicalis (C1–C3), phrenic n. (C3–C5), direct muscular branches.",definition:"Ansa cervicalis: superior root (C1 via CN XII → geniohyoid + thyrohyoid) + inferior root (C2–C3 → sternohyoid, sternothyroid, omohyoid). Phrenic n. (C3,4,5 keep the diaphragm alive) runs on anterior scalene, sole motor to diaphragm."},
  {name:"Cervical ansae",category:"Neck",borders:"Superficial ansa: transverse cervical n. (C2–C3) + cervical br. of facial n. (VII). Deep ansa (ansa cervicalis): superior root (C1 via XII) + inferior root (C2–C3), loop over IJV.",definition:"Superficial ansa: sensory loop on lateral neck. Ansa cervicalis: motor loop on carotid sheath supplying infrahyoid strap muscles (sternohyoid, sternothyroid, both bellies of omohyoid). Superior root also gives off n. to thyrohyoid + geniohyoid."},
  {name:"Brachial plexus",category:"Neck",borders:"Roots (C5–T1) in scalene fissure → Trunks (3) → Divisions (6, behind clavicle) → Cords (3, named relative to axillary a.) → Branches. Mnemonic: 'Real Texans Drink Cold Beer'.",definition:"Supraclavicular branches: dorsal scapular (C5), long thoracic (C5–C7), suprascapular (C5–C6), n. to subclavius. Infraclavicular (5 main): musculocutaneous (lateral cord), median (lat+med cords), ulnar (medial cord), axillary (posterior cord), radial (posterior cord)."},
  {name:"Carotid sheath",category:"Neck",borders:"Formed by all 3 deep cervical fascial layers. Contents VAN: IJV (lateral), CCA/ICA (medial), vagus n. (between + posterior). Ansa cervicalis on anterior surface.",definition:"Anterior: SCM + omohyoid (intermediate tendon tethered to clavicle by fascial sling — tug during yawning compresses IJV). Posterior: prevertebral fascia + sympathetic trunk + prevertebral muscles + transverse processes. Medially: trachea, esophagus, thyroid, larynx."},
  {name:"Phrenic nerve (C3–C5)",category:"Neck",borders:"Formed on anterior surface of anterior scalene (under prevertebral fascia). Runs with transverse cervical + suprascapular aa. Crosses anterior to subclavian a. → thorax.",definition:"'C3, 4, 5 keep the diaphragm alive.' Sole motor to diaphragm; sensory to mediastinal pleura, fibrous + parietal pericardium, central diaphragmatic peritoneum. Right phrenic through caval hiatus (T8); left pierces diaphragm alone. Referred shoulder pain (C3–C5 dermatome) = Kehr's sign."},
  {name:"Suprahyoid + infrahyoid muscles",category:"Neck",borders:"Suprahyoid (depress mandible/elevate hyoid): digastric (V3/VII), mylohyoid (V3), geniohyoid (C1/XII), stylohyoid (VII). Infrahyoid strap muscles (depress hyoid): sternohyoid, sternothyroid, thyrohyoid, omohyoid (ansa cervicalis/C1/XII).",definition:"Suprahyoid muscles elevate the hyoid for swallowing and tongue movement. Infrahyoid (strap) muscles anchor hyoid for phonation. All infrahyoid muscles supplied by ansa cervicalis except thyrohyoid (C1 via XII)."},
  {name:"Styloid muscles + styloid septum",category:"Neck",borders:"Three muscles from styloid process: styloglossus (CN XII, retracts tongue), stylohyoid (CN VII, elevates hyoid), stylopharyngeus (CN IX — only IX-innervated muscle, elevates pharynx).",definition:"Stylomandibular ligament + adjacent fascia = styloid septum, separating parotid (lateral) from submandibular (medial) compartments. Two ligaments: stylohyoid (to lesser horn hyoid) and stylomandibular (to mandibular angle)."},
  {name:"Cricothyrotomy + tracheostomy",category:"Neck",borders:"Cricothyrotomy site: cricothyroid membrane between thyroid cartilage (inferior border) and cricoid cartilage (superior border) — at C6. Tracheostomy: between tracheal rings 2 and 3 (or 3 and 4).",definition:"Cricothyrotomy layers: skin → SC tissue → superficial fascia (platysma) → deep investing fascia → cricothyroid membrane. Tracheostomy risks: inferior thyroid vv., thyroid ima a. (~10%), recurrent laryngeal n. Thyroid isthmus overlies tracheal rings 2–4."},
  {name:"Thyroid gland",category:"Neck",borders:"Anterior neck C5–T1, anterolateral to larynx/trachea. Right + left lobes joined by isthmus (anterior to tracheal rings 2–4). Pyramidal lobe (~50%) = thyroglossal duct remnant.",definition:"Blood supply: superior thyroid a. (1st branch ECA, with external br. superior laryngeal n. — ligate close to gland), inferior thyroid a. (thyrocervical trunk, with RLN — ligate away from gland), thyroid ima (~10%). Veins: superior + middle → IJV; inferior → left brachiocephalic v."},
  {name:"Brachiocephalic trunk + veins",category:"Neck",borders:"Brachiocephalic trunk: 1st branch of aortic arch → right CCA + right subclavian a. (posterior to right sternoclavicular joint). No left equivalent.",definition:"Brachiocephalic veins: each formed by subclavian v. + IJV behind medial clavicle. Right BCV short + vertical. Left BCV longer, crosses behind manubrium → joins right BCV → SVC at right manubrium border. Left BCV receives thoracic duct."},
  {name:"Jugular venous system",category:"Neck",borders:"Anterior jugular: from chin, near midline, pierces deep investing fascia → suprasternal space → turns lateral deep to SCM → drains to EJV or subclavian. External jugular: posterior auricular v. + post. div. retromandibular v. → crosses SCM → pierces deep investing fascia → subclavian v. Internal jugular: sigmoid sinus continuation at jugular foramen → carotid sheath → brachiocephalic v.",definition:"IJV tributaries: inferior petrosal sinus, pharyngeal vv., common facial v., lingual v., superior + middle thyroid vv. EJV provides visible landmark for IV access. Anterior jugular veins connected by jugular venous arch in suprasternal space."},
  {name:"Lymphatic drainage head/neck",category:"Neck",borders:"Right lymphatic duct → right venous angle (right IJV + right subclavian v.): drains right head/neck, right upper limb, right hemithorax. Thoracic duct → left venous angle: drains everything else.",definition:"Thoracic duct: origin = cisterna chyli (L1–L2) → aortic hiatus → posterior mediastinum between aorta (left) + azygos (right) → crosses to left at T5 → arches over left subclavian a. at C7. Deep cervical chain along IJV is final pathway for head/neck lymph."},
  {name:"Omohyoid innervation",category:"Neck",borders:"Superior belly (intermediate tendon → hyoid): superior root of ansa cervicalis (C1–C2). Inferior belly (scapula → intermediate tendon): inferior root of ansa cervicalis (C2–C3).",definition:"Intermediate tendon tethered to clavicle by fascial sling from investing layer. Depresses hyoid. Subdivides triangles: posterior → occipital + subclavian; anterior → carotid + muscular triangles."},
  {name:"Rule of 4 (C4/T4/L4)",category:"Neck",borders:"C4: CCA bifurcates at upper border of thyroid cartilage. T4/T4–T5: tracheal bifurcation (carina); aortic arch begins/ends; sternal angle. L4: abdominal aorta bifurcates into common iliacs; level of iliac crest.",definition:"Sternal angle (T4–T5 / angle of Louis) also marks: thoracic duct crosses to left, superior/inferior mediastinal boundary, root of pulmonary trunk, azygos v. arches into SVC. L4 = umbilicus level in many adults standing."},
  {name:"Subclavian artery",category:"Neck",borders:"Right: from brachiocephalic trunk. Left: directly from aortic arch. Three parts relative to anterior scalene: 1st (medial), 2nd (posterior), 3rd (lateral).",definition:"1st part branches: VIT = Vertebral a., Internal thoracic a., Thyrocervical trunk (inferior thyroid + suprascapular + transverse cervical aa.). 2nd part: Costocervical trunk (deep cervical a. + supreme intercostal a.). 3rd part: Dorsal scapular a. (variable). Continues as axillary a. at lateral border of 1st rib."},
  {name:"Thyroid blood supply",category:"Neck",borders:"Arteries: superior thyroid a. (ECA), inferior thyroid a. (thyrocervical trunk), thyroid ima (~10%). Veins: superior + middle thyroid → IJV; inferior thyroid → left brachiocephalic v.",definition:"RLN runs with inferior thyroid a. — ligate artery AWAY from gland. External br. of SLN runs with superior thyroid a. — ligate close to gland. RLN injury → hoarseness; bilateral injury → airway emergency. External SLN injury → monotone voice (loss of vocal cord tension)."},
  {name:"Larynx + Galen's anastomosis",category:"Neck",borders:"Cricothyroid muscle: innervated by external br. of superior laryngeal n. (CN X). All other intrinsic laryngeal muscles: recurrent laryngeal n. (CN X). Sensory: above cords = internal br. SLN; below cords = RLN.",definition:"Galen's anastomosis: communication between internal br. SLN and RLN, deep to thyroid lamina. Provides cross-innervation. Key: posterior cricoarytenoid is the ONLY abductor of vocal cords — bilateral RLN injury → adducted cords + airway emergency."},
  {name:"Cervical sympathetic ganglia",category:"Neck",borders:"Three ganglia anterior to prevertebral fascia, behind carotid sheath: Superior (C1–C2, largest), Middle (C6, smallest), Inferior (C7, often fused with T1 ganglion = stellate ganglion).",definition:"Horner's syndrome (sympathetic chain interruption): ptosis (superior tarsal m.), miosis (unopposed sphincter), anhydrosis (ipsilateral face), enophthalmos (apparent), flushing. SCG distributes via carotid plexuses to dilator pupillae, superior tarsal m. (Müller's), facial sweat glands, salivary glands."},
  {name:"External carotid artery (ECA)",category:"Neck",borders:"Origin: CCA bifurcation at C4 (carotid triangle). Course: ascends posterior to mandibular neck → terminates in parotid as superficial temporal a. + maxillary a.",definition:"8 branches mnemonic: 'Some Anatomists Like Freaking Out Poor Medical Students' — Superior thyroid, Ascending pharyngeal, Lingual, Facial (anastomoses with ophthalmic a. at medial canthus), Occipital, Posterior auricular, Maxillary, Superficial temporal. Last two are terminal."},

  // ---- THORAX ----
  {name:"Mediastinum divisions",category:"Thorax",borders:"Superior (above T4/sternal angle): thymus/fat, great veins, arch of aorta, trachea, esophagus. Inferior: anterior (thymic remnants), middle (heart + pericardium), posterior (descending aorta, esophagus, azygos, sympathetic trunks).",definition:"Superior thoracic aperture (inlet): manubrium + 1st ribs + T1 body. Transmits trachea, esophagus, thoracic duct, apices of lungs, great vessels, CN X, phrenic nn., recurrent laryngeal nn., sympathetic trunk."},
  {name:"Thoracic duct + cisterna chyli",category:"Thorax",borders:"Cisterna chyli: at L1–L2, between aorta and right diaphragmatic crus. Receives right + left lumbar trunks + intestinal trunk.",definition:"Thoracic duct largest lymphatic vessel. Ascends through aortic hiatus, posterior mediastinum between aorta (left) and azygos (right). Crosses to left at T5. Empties at left venous angle. Right lymphatic duct → right venous angle. Thoracic duct drains everything EXCEPT what the right lymphatic duct drains."},
  {name:"Lungs + pleural recesses (RALS)",category:"Thorax",borders:"Right: 3 lobes (oblique + horizontal fissures). Left: 2 lobes (oblique fissure, cardiac notch, lingula). Parietal pleura lines thoracic wall; visceral pleura covers lungs.",definition:"RALS: Right = Anterior (pulmonary a. anterior to bronchus), Left = Superior (pulmonary a. superior to bronchus). Recesses: costodiaphragmatic (most inferior, fluid collects), costomediastinal (anterior). Pleura innervation: parietal = somatic (intercostal nn. + phrenic) — has pain; visceral = autonomic only, no pain."},
  {name:"Tracheal bifurcation + bronchi",category:"Thorax",borders:"Carina at sternal angle (T4–T5). Right main bronchus: wider, shorter, more vertical (trifurcates → 3 lobar bronchi). Left: narrower, longer, more horizontal (bifurcates → 2 lobar bronchi).",definition:"Aspirated foreign bodies preferentially lodge in right main bronchus (wider, shorter, more vertical). Subdivisions: lobar → segmental (10 right; 8–10 left) → subsegmental → bronchioles → terminal → respiratory → alveolar ducts → alveolar sacs → alveoli."},
  {name:"Heart — auscultation + chambers + supply",category:"Thorax",borders:"Auscultation (APTM): Aortic (2nd right ICS, parasternal), Pulmonary (2nd left ICS), Tricuspid (4th–5th left sternal border), Mitral (5th left ICS midclavicular — apex). Coronary aa. are FIRST branches of ascending aorta.",definition:"RCA: right AV groove → SA node (60%), right marginal, posterior interventricular a. LCA: LAD (diagonal + septal brs.) + circumflex (left marginal). Cardiac veins → coronary sinus → right atrium. Pericardium: fibrous outer + serous inner. Phrenic n. provides somatic sensation → referred shoulder pain."},
  {name:"Fetal circulation",category:"Thorax",borders:"Three shunts: ductus venosus (umbilical v. → IVC, bypasses liver → ligamentum venosum), foramen ovale (RA → LA, bypasses lungs → fossa ovalis), ductus arteriosus (pulmonary trunk → aortic arch, bypasses lungs → ligamentum arteriosum).",definition:"Umbilical vein (1, oxygenated): placenta → liver → ductus venosus → IVC. Umbilical arteries (2, deoxygenated): internal iliacs → placenta → close to medial umbilical ligaments + superior vesical aa. Median umbilical ligament = urachus remnant."},
  {name:"Internal thoracic artery",category:"Thorax",borders:"Origin: 1st part subclavian a. Course: behind clavicle + 1st costal cartilage → 1 cm lateral to sternum → between costal cartilages and parietal pleura → bifurcates at 6th ICS into superior epigastric a. + musculophrenic a.",definition:"Branches (PAST BPM): Pericardiacophrenic a. (runs with phrenic n. between mediastinal pleura and pericardium), Anterior intercostals (upper 6), Sternal, Thymic, Bronchial, Perforating (to breast), Mediastinal. LIMA = preferred coronary bypass conduit."},
  {name:"Thoracic aorta + branches",category:"Thorax",borders:"Origin: continuation of arch at T4. Passes through aortic hiatus at T12. Left of vertebral column in posterior mediastinum.",definition:"Visceral branches: bronchial aa. (1 right from 3rd posterior intercostal, 2 left from aorta), esophageal aa., pericardial, mediastinal. Parietal branches: posterior intercostal aa. (3rd–11th; 1st + 2nd from supreme intercostal a. of costocervical trunk), subcostal aa. (12th), superior phrenic aa."},
  {name:"Diaphragm + hiatuses (T8/T10/T12)",category:"Thorax",borders:"Origin: sternal (xiphoid), costal (ribs 7–12), lumbar (crura: right to L3, left to L2; + arcuate ligaments). Insertion: central tendon. Innervation: phrenic n. (C3,4,5).",definition:"Hiatuses mnemonic 'I 8 10 EGGs AT 12': T8 = caval hiatus (IVC + right phrenic n.); T10 = esophageal hiatus (esophagus + anterior/posterior vagal trunks + esophageal brs. left gastric a.); T12 = aortic hiatus (descending aorta + thoracic duct + azygos v.). Greater + lesser splanchnic nn. pierce through crura."},
  {name:"Vagus nerve — thoracic course",category:"Thorax",borders:"Right vagus: loops right recurrent laryngeal n. under right subclavian a. → posterior to right lung hilum → posterior to esophagus → right (posterior) vagal trunk. Left vagus: loops left recurrent laryngeal n. under aortic arch (posterior to ligamentum arteriosum) → posterior to left lung hilum → anterior to esophagus → left (anterior) vagal trunk.",definition:"Mnemonic: 'Phrenic in front of, vagus behind, the hilum.' Left RLN vulnerable to aortic arch pathology (lymphoma, aortic aneurysm). Right RLN loops under right subclavian a. — vulnerable to right apical lung tumours and right subclavian surgery."},
  {name:"Sympathetic trunk + splanchnic nerves",category:"Thorax",borders:"Thoracic splanchnic nerves pierce diaphragm: Greater splanchnic (T5–T9) → celiac ganglion (foregut). Lesser splanchnic (T10–T11) → superior mesenteric/aorticorenal ganglion (midgut + kidney). Least splanchnic (T12) → renal plexus.",definition:"Sympathetic trunk paravertebral bilateral chain. Preganglionic outflow T1–L2 (white rami). Adrenal medulla receives preganglionics directly (chromaffin cells = postganglionic neurons without synapse). Total cervical ganglia: SCG, middle, stellate (inferior cervical + T1)."},
  {name:"Azygos / hemiazygos system",category:"Thorax",borders:"Azygos: right of vertebral column, ascends through aortic hiatus, arches over right pulmonary hilum at T4 → SVC. Hemiazygos: ascends left, crosses behind aorta at T7–T9 → azygos. Accessory hemiazygos: left 4th–8th posterior intercostals → crosses at T7–T8 → azygos.",definition:"Brachiocephalic veins: subclavian + IJV each side → SVC at right manubrium border. Left BCV receives left highest intercostal v. + thoracic duct. Azygos system = critical cavo-caval collateral pathway when SVC or IVC is obstructed."},
  {name:"Esophageal constrictions",category:"Thorax",borders:"Upper (pharyngoesophageal): C6, behind cricoid, cricopharyngeus. Middle (bronchoaortic): T4, where aortic arch + left main bronchus cross. Lower (diaphragmatic): T10, esophageal hiatus.",definition:"Distances from incisors: upper 15 cm, middle 25 cm, lower 40 cm. Sites of foreign-body lodging and peptic/malignant stricture formation. Endoscopy uses these landmarks."},
  {name:"Chest tube / pneumothorax site",category:"Thorax",borders:"Safe triangle: anterior border = lateral edge pectoralis major; posterior border = anterior edge latissimus dorsi; inferior = 5th ICS (nipple level). Standard site: 4th–5th ICS mid-axillary line.",definition:"VAN bundle (Vein, Artery, Nerve) runs in costal groove on inferior border of rib above each space. Needle/tube enters along UPPER border of rib below to avoid VAN. Tension pneumothorax decompression: 2nd ICS midclavicular (large-bore needle). Layers: skin → SC tissue → ext. intercostal → int. intercostal → innermost intercostal → endothoracic fascia → parietal pleura."},
  {name:"Sentinel lymph nodes",category:"Thorax",borders:"Sorgius's node: axillary (lateral/pectoral group) — first node draining breast cancer. Virchow's node: left supraclavicular (Troisier sign) — drains via thoracic duct from abdominal/gastric cancer. Bayer's nodes: parauterine — sentinel for uterine cancer.",definition:"Virchow's node palpable enlargement = Troisier sign (classically gastric carcinoma). Sorgius's node used in sentinel node biopsy for breast cancer staging. Bayer's nodes drain uterine body tumours along uterine lymphatics."},

  // ---- ABDOMEN ----
  {name:"Abdominal aorta branches",category:"Abdomen",borders:"T12 (aortic hiatus) → bifurcates into common iliacs at L4. Paired parietal: inferior phrenic aa., 4 pairs lumbar aa., median sacral a. (unpaired). Paired visceral: middle suprarenals (L1), renal aa. (L1–L2), gonadal aa. (L2).",definition:"Unpaired visceral: Celiac trunk (T12, foregut — left gastric, splenic, common hepatic aa.), SMA (L1, midgut — D2 distal to 2/3 transverse colon), IMA (L3, hindgut — left colic, sigmoid, superior rectal aa.)."},
  {name:"Internal + external iliac branches",category:"Abdomen",borders:"External iliac: inferior epigastric a. (lateral border Hesselbach's triangle) + deep circumflex iliac a. → femoral a. under inguinal lig. Internal iliac: posterior division (parietal: iliolumbar, lateral sacral, superior gluteal). Anterior: parietal (obturator, inferior gluteal, internal pudendal) + visceral (umbilical, inferior vesical/vaginal, middle rectal, uterine/a. to ductus).",definition:"Corona mortis ('crown of death', ~30%): anastomosis between pubic br. of inferior epigastric a. and pubic br. of obturator a., crossing superior pubic ramus posterior to lacunar lig. — catastrophic haemorrhage if injured during femoral hernia repair."},
  {name:"Anastomoses between aortic trunks",category:"Abdomen",borders:"Celiac–SMA: superior pancreaticoduodenal a. (from gastroduodenal a.) ↔ inferior pancreaticoduodenal a. (from SMA) — around head of pancreas. SMA–IMA: marginal artery of Drummond + arc of Riolan. IMA–internal iliac: superior rectal a. ↔ middle rectal a. ↔ inferior rectal a.",definition:"These anastomoses are critical collateral pathways when any trunk is stenotic/occluded. The foregut–midgut boundary is at the major duodenal papilla (D2). The midgut–hindgut boundary is at the splenic flexure (Cannon–Böhm point)."},
  {name:"Colon anastomoses (Drummond / Riolan / Sudeck / Griffith)",category:"Abdomen",borders:"Marginal artery of Drummond: continuous anastomotic loop along mesenteric border of colon (SMA + IMA colonic branches). Arc of Riolan: proximal anastomosis between middle colic a. (SMA) and left colic a. (IMA) within the mesentery.",definition:"Sudeck's critical point: rectosigmoid junction watershed between lowest sigmoid br. and superior rectal a. (terminal IMA). Griffith's critical point: splenic flexure watershed between SMA (middle colic) and IMA (left colic) territories — most vulnerable to ischaemic colitis."},
  {name:"Portal venous system",category:"Abdomen",borders:"Portal vein formed by SMV + splenic v. posterior to neck of pancreas. IMV usually drains into splenic v. Portal v. ascends in hepatoduodenal lig. (posterior), enters porta hepatis.",definition:"Portal triad in hepatoduodenal lig.: bile duct (anterolateral right), proper hepatic a. (anterolateral left), portal v. (posterior). Function: nutrient-rich + partially oxygenated blood → liver sinusoids for first-pass metabolism. Liver also receives proper hepatic a. (fully oxygenated)."},
  {name:"Porto-caval anastomoses",category:"Abdomen",borders:"Esophageal: left gastric v. (portal) ↔ esophageal vv. (azygos, systemic). Rectal: superior rectal v. (portal via IMV) ↔ middle/inferior rectal vv. (systemic). Paraumbilical: paraumbilical vv. of liver (portal) ↔ epigastric vv. (systemic). Retroperitoneal (Retzius veins): colonic vv. ↔ retroperitoneal vv.",definition:"Clinical manifestations of portal hypertension: esophageal varices (catastrophic upper GI bleed), hemorrhoids (internal), caput medusae (radiating dilated veins around umbilicus). TIPSS creates artificial portocaval shunt to relieve portal hypertension."},
  {name:"Inferior vena cava (IVC)",category:"Abdomen",borders:"Origin: confluence of common iliac vv. at L5. Ascends right of aorta → caval hiatus (T8) → right atrium. Tributaries (inf→sup): common iliacs, lumbar vv. (4 pairs), right gonadal v., renal vv., right suprarenal v., inferior phrenic vv., hepatic vv.",definition:"Left gonadal v. + left suprarenal v. drain into LEFT renal v. (not IVC directly). Asymmetry: left-sided varicocele often due to left gonadal v. draining into left renal v. (higher pressure). Renal cell carcinoma can extend tumour thrombus along IVC into right atrium."},
  {name:"Cavo-caval anastomoses",category:"Abdomen",borders:"Three routes: Vertebral plexus (Batson's), Azygos system, Thoraco-epigastric / superficial epigastric route.",definition:"Batson's plexus: valveless internal + external vertebral venous plexuses connect IVC to dural sinuses — explains metastatic spread of prostate/breast cancer to vertebrae/brain. Azygos: lumbar vv. → ascending lumbar vv. → azygos → SVC. Thoraco-epigastric: subcutaneous thoracoabdominal vv. visible in IVC obstruction."},
  {name:"Surface projection of abdominal organs",category:"Abdomen",borders:"Murphy's point: fundus of gallbladder, right costal arch + right midclavicular line. McBurney's point: lateral 1/3 of ASIS–umbilicus line (appendix). Lanz's point: 5 cm right of midline on interspinous line (pelvic appendix). Desjardin's point: major duodenal papilla, on line apex right axilla – umbilicus, 6–7 cm from umbilicus.",definition:"Labbé triangle (gastric surface projection): borders formed by the transpyloric line and a line connecting right 9th costal cartilage to left 8th. McBurney's = line of Monro. Desjardin's = pancreatic head landmark."},
  {name:"Liver — lobes + attachments + ducts",category:"Abdomen",borders:"Anatomical lobes: right (largest), left, caudate (between IVC + ligamentum venosum), quadrate (between gallbladder fossa + ligamentum teres). 8 Couinaud segments. Peritoneal attachments: falciform lig. (with ligamentum teres), coronary lig. (bare area), triangular ligaments, hepatogastric + hepatoduodenal ligaments (lesser omentum).",definition:"Biliary: R + L hepatic ducts → common hepatic duct → cystic duct joins → bile duct (choledochus) → major duodenal papilla with pancreatic duct. Ligamentum venosum = remnant ductus venosus (fissure between caudate + left lobe). Ligamentum teres = remnant left umbilical vein (free edge of falciform lig.)."},
  {name:"Gallbladder + biliary tree",category:"Abdomen",borders:"Gallbladder parts: fundus → body → infundibulum (Hartmann's pouch) → neck → cystic duct (spiral valves of Heister). Calot's triangle: cystic duct (lateral), common hepatic duct (medial), inferior surface of liver (superior) — contains cystic a. + cystic LN of Lund.",definition:"4 parts of bile duct: pars supraduodenalis (above D1) → pars retroduodenalis (behind D1) → pars pancreatica (through pancreatic head) → pars inframuralis (intramural/sphincter of Oddi through D2 wall → major duodenal papilla joining pancreatic duct of Wirsung). Critical view of safety in laparoscopic cholecystectomy = only two structures into gallbladder visible before clipping."},
  {name:"Duodenum — 4 parts + papillae",category:"Abdomen",borders:"D1 Superior (L1, intraperitoneal). D2 Descending (L1–L3, retroperitoneal, receives papillae on medial wall). D3 Horizontal (L3, retroperitoneal, SMA + SMV cross anteriorly). D4 Ascending (L3–L2, retroperitoneal, ends at duodenojejunal junction held by ligament of Treitz).",definition:"Major duodenal papilla (of Vater) in D2: receives bile duct + pancreatic duct of Wirsung at sphincter of Oddi. Minor duodenal papilla: above major, receives accessory pancreatic duct of Santorini. D1 is the only intraperitoneal part."},
  {name:"Pancreas — parts + ducts",category:"Abdomen",borders:"Five parts: head (within C of duodenum, L2), uncinate process (behind SMA/SMV), neck (over SMV/portal v. formation), body (behind stomach, posterior wall lesser sac), tail (in splenorenal lig. — only intraperitoneal part, reaches splenic hilum).",definition:"Main duct of Wirsung: runs full length → major duodenal papilla. Accessory duct of Santorini: drains anterior head → minor papilla. Vessels: pancreaticoduodenal arcades (superior from celiac via gastroduodenal; inferior from SMA) + pancreatic brs. of splenic a. Veins: splenic v. + SMV → portal v."},
  {name:"Jejunum vs ileum",category:"Abdomen",borders:"Both intraperitoneal, suspended by mesentery. Jejunum = proximal 2/5 (upper left), ileum = distal 3/5 (lower right + pelvis). Blood supply: SMA via jejunal/ileal branches → arcades → vasa recta → SMV → portal.",definition:"Jejunum: thicker wall, wider, many tall plicae circulares, long vasa recta, single arcade, few mesenteric fat windows, fewer Peyer's patches, redder. Ileum: thinner, narrower, fewer low plicae, short vasa recta, multiple arcades, more fat, many Peyer's patches (especially terminal ileum), pinker."},
  {name:"Appendix — positions + variations",category:"Abdomen",borders:"Blind-ended diverticulum from cecum, ~6–10 cm. Base at convergence of three taeniae coli. McBurney's point (lateral 1/3 ASIS–umbilicus).",definition:"6 positional variants: retrocecal/retrocolic (most common, ~65%, psoas sign +), pelvic/descending (~30%, obturator sign +), subcecal, pre-ileal, post-ileal, paracecal. Appendicular a. = end-artery from ileocolic a. (SMA); thrombosis in appendicitis."},
  {name:"Large intestine features",category:"Abdomen",borders:"Distinctive features: taeniae coli (3 longitudinal bands of smooth muscle), haustra (sacculations), omental (epiploic) appendages (fat-filled peritoneal protrusions, absent on cecum + rectum), semilunar folds.",definition:"Cannon–Böhm point: middle of transverse colon at splenic flexure. Marks: SMA–IMA arterial territory transition + vagal–sacral parasympathetic transition. Taeniae absent on rectum (continuous longitudinal coat) and on appendix (complete). Taeniae absent on rectum."},
  {name:"Abdominal wall layers",category:"Abdomen",borders:"Superficial → deep: skin, Camper's fascia (fatty), Scarpa's fascia (membranous → Colles' fascia of perineum), EO aponeurosis, internal oblique, transversus abdominis, transversalis fascia, extraperitoneal fat, parietal peritoneum.",definition:"Rectus sheath: above arcuate line = anterior (EO aponeurosis + ant. IO) + posterior (post. IO + TA). Below arcuate line = all 3 aponeuroses anterior, only transversalis fascia behind. Inferior epigastric a. (lateral to rectus). Scarpa's fascia continues into perineum as Colles' fascia."},
  {name:"Greater + lesser omentum",category:"Abdomen",borders:"Lesser omentum: hepatogastric lig. (thin, liver → lesser curvature) + hepatoduodenal lig. (thick free edge, contains portal triad). Greater omentum: 4-layered apron from greater curvature → transverse colon anteriorly.",definition:"Extensions from greater curvature: gastrophrenic lig. (to diaphragm), gastrosplenic lig. (to spleen, contains short gastric + left gastroepiploic vessels), gastrocolic lig. (to transverse colon = anterior layers of greater omentum), splenorenal lig. (to left kidney, contains splenic a./v. + tail of pancreas). Greater omentum = 'abdominal policeman' — migrates to sites of inflammation."},
  {name:"Omental bursa + epiploic foramen",category:"Abdomen",borders:"Omental bursa (lesser sac) borders: anterior = lesser omentum + posterior stomach + gastrocolic lig.; posterior = pancreas + adrenal + left kidney; right = epiploic foramen of Winslow; left = gastrosplenic + splenorenal ligaments + spleen; superior = caudate lobe; inferior = transverse mesocolon.",definition:"Winslow's epiploic foramen: anterior = hepatoduodenal lig. (portal triad), posterior = IVC + right diaphragmatic crus, superior = caudate lobe, inferior = D1. Pringle manoeuvre clamps hepatoduodenal lig. to control hepatic bleeding. Lesser sac recesses: superior (behind caudate), inferior (in greater omentum layers), splenic."},
  {name:"Mesentery (parts + root)",category:"Abdomen",borders:"Mesentery proper (jejunum + ileum). Transverse mesocolon (mobile, colic flexure to flexure). Mesosigmoid (around sigmoid). Root of mesentery: ~15–20 cm, oblique from left of L2 (duodenojejunal junction, Treitz lig.) to right sacroiliac joint (ileocecal junction).",definition:"Root of mesentery crosses: D3, abdominal aorta, IVC, right ureter, right psoas, right gonadal vessels. Transverse mesocolon = surgical boundary between supracolic and infracolic compartments. Right + left mesocolons = secondarily retroperitoneal (fused to posterior abdominal wall)."},
  {name:"Retroperitoneal organs (SAD PUCKER)",category:"Abdomen",borders:"S: Suprarenal glands. A: Aorta + IVC. D: Duodenum (D2–D4; D1 intraperitoneal). P: Pancreas (except tail). U: Ureters. C: Colon ascending + descending. K: Kidneys. E: Esophagus (lower portion). R: Rectum (middle + lower thirds).",definition:"'Secondary' retroperitoneal organs (started intraperitoneal, fused to posterior wall in development): pancreas (except tail), D2–D4, ascending colon, descending colon. 'Primary' retroperitoneal (never had a mesentery): kidneys, ureters, adrenal glands, great vessels."},
  {name:"Transpyloric plane (Addison's)",category:"Abdomen",borders:"Horizontal line through sternal ends of 9th costal cartilages, halfway between jugular notch and pubic symphysis. Corresponds to L1 vertebral level.",definition:"Crosses: pylorus of stomach, D1, neck of pancreas, origin of SMA, formation of portal vein (behind pancreatic neck), conus medullaris (~L1–L2), hila of kidneys (right slightly lower), fundus of gallbladder. Divides supracolic from infracolic compartments along with transverse mesocolon."},

  // ---- URINARY ----
  {name:"Kidneys — position + fat layers + segments",category:"Abdomen",borders:"Retroperitoneal T12–L3. Right slightly lower (liver). Hila face anteromedially. Fat layers deep→shallow: true capsule, perirenal (perinephric) fat (within Gerota's fascia), renal (Gerota's) fascia, retrorenal (pararenal) fat, transversalis fascia.",definition:"5 renal segments (based on segmental aa., end-arteries — no anastomoses): apical, upper anterior, middle anterior, lower anterior, posterior. Renal a. (from aorta L1–L2) → 5 segmental aa. → interlobar → arcuate → interlobular → afferent arterioles. Left renal v. crosses anterior to aorta under SMA (nutcracker syndrome site)."},
  {name:"Ureter — course + constrictions",category:"Abdomen",borders:"~25–30 cm, retroperitoneal throughout. Begins at renal pelvis (L2) → descends on psoas → crosses common iliac bifurcation at pelvic brim → pelvis → enters bladder posterolaterally. Three constrictions: pelviureteric junction (PUJ), crossing of common iliac vessels, vesicoureteric junction (VUJ, narrowest).",definition:"In males: crossed by ductus deferens ('water under the bridge'). In females: passes inferior to uterine artery at lateral fornix ('water under the bridge'). Distinguishing from gonadal vessels: ureter vermiculates (peristalsis) when touched; gonadal a. originates from aorta at L2 and runs ANTERIOR to ureter."},
  {name:"Urinary bladder",category:"Abdomen",borders:"Subperitoneal, lesser pelvis, posterior to pubic symphysis. Parts: apex (→ median umbilical lig. = urachus), body, fundus (posterior), neck. Internal: trigone (smooth, between ureteric orifices + internal urethral orifice).",definition:"Male relations: superiorly peritoneum + ileum/sigmoid; posteriorly seminal vesicles + ductus deferens ampullae + rectum (rectovesical pouch above); inferiorly prostate. Female: posteriorly vagina + cervix; superiorly uterus (vesicouterine pouch). Innervation: sympathetic (T11–L2, internal urethral sphincter contraction in males), parasympathetic S2–S4 (detrusor contraction), somatic pudendal n. (external urethral sphincter)."},

  // ---- PELVIS ----
  {name:"Subperitoneal organs",category:"Pelvis",borders:"Organs below pelvic peritoneum: lower rectum, most of bladder, urethra, prostate (♂), seminal vesicles + ductus deferens ampullae (♂), distal ureters, most of vagina + cervix (♀), pelvic sidewall vessels, inferior hypogastric plexuses.",definition:"Different surgical access planes (extraperitoneal approaches). Different lymphatic drainage (internal iliac/sacral chains rather than mesenteric). Subperitoneal space connects with retroperitoneum."},
  {name:"Lumbar plexus (SIIGLOFL)",category:"Pelvis",borders:"Roots: anterior rami L1–L4 (with T12). Mnemonic: 'So Interested In Getting Laid On Friday' — Subcostal (T12), Iliohypogastric (L1), Ilioinguinal (L1), Genitofemoral (L1–L2), Lateral femoral cutaneous (L2–L3), Obturator (L2–L4), Femoral (L2–L4), Lumbosacral trunk (L4+L5).",definition:"Ilioinguinal n. runs in inguinal canal (on top of cord) → skin of upper medial thigh, root of penis/mons, anterior scrotum/labia. Lateral femoral cutaneous n. under inguinal lig. → meralgia paresthetica. Femoral n. → quadriceps + anterior thigh skin + saphenous n. (medial leg). Obturator → adductors + medial thigh skin."},
  {name:"Sacral plexus (SIPPS)",category:"Pelvis",borders:"Roots: lumbosacral trunk (L4+L5) + S1–S4. Five major branches (SIPPS): Superior gluteal (L4–S1, through suprapiriform foramen, gluteus medius/minimus/TFL), Inferior gluteal (L5–S2, through infrapiriform foramen, gluteus maximus), Pudendal (S2–S4, infrapiriform → ischial spine → lesser sciatic foramen → pudendal canal), Posterior femoral cutaneous (S1–S3), Sciatic (L4–S3, largest nerve in body).",definition:"Pudendal nerve branches in pudendal canal (Alcock's canal): inferior rectal n., perineal n., dorsal n. of penis/clitoris. Sciatic: tibial component (hamstrings + leg/foot via tibial n.) + common fibular component (short head biceps femoris + leg/foot via fibular n.). Pelvic splanchnic nn. (S2–S4) = pelvic parasympathetics."},
  {name:"Pelvic pouches",category:"Pelvis",borders:"Vesicouterine pouch (♀): between posterior bladder + anterior uterus. Douglas pouch / rectouterine pouch (♀): between posterior fornix/uterus + anterior rectum — most dependent female peritoneal recess. Rectovesical pouch (♂): between posterior bladder + anterior rectum — most dependent male peritoneal recess.",definition:"Pouch of Douglas accessible by culdocentesis through posterior vaginal fornix — blood from ectopic pregnancy, pus from PID collects here. Paravesical fossae (lateral to bladder) + pararectal fossae (lateral to rectum) — bilateral."},
  {name:"Posterior abdominal muscles",category:"Pelvis",borders:"Psoas major (T12–L5 → lesser trochanter, L1–L3 direct branches, chief hip flexor). Iliacus (iliac fossa → lesser trochanter, femoral n. L2–L4, hip flexion). Quadratus lumborum (iliac crest → 12th rib + TP L1–L4, subcostal n. T12 + L1–L4, lateral flexion). Rectus abdominis (pubic crest → xiphoid + CCs 5–7, T7–T12, trunk flexion).",definition:"Iliopsoas = psoas major + iliacus combined, chief flexor of the hip. Psoas sign: pain on hip extension (appendicitis with retrocecal appendix on psoas). Quadratus lumborum depresses 12th rib (fixes during inspiration)."},
  {name:"Uterus — ligaments + blood supply",category:"Pelvis",borders:"Round ligament: uterine horn → deep inguinal ring → inguinal canal → labium majus. Maintains anteversion. Broad ligament: double peritoneal fold lateral wall → lateral pelvic wall (three parts: mesometrium, mesosalpinx, mesovarium). Cardinal (Mackenrodt's) ligament: cervix + lateral fornices → lateral pelvic wall. Contains uterine a. + ureter (ureter passes UNDER uterine a.).",definition:"Uterine a. from anterior division internal iliac; anastomoses superiorly with ovarian a. Uterosacral lig. (cervix → sacrum). Pubocervical lig. (pubic symphysis → cervix). Lymph: fundus → para-aortic LNs; body → external iliac LNs; cervix → internal iliac + sacral LNs."},
  {name:"Ovary — suspensory lig. + blood supply",category:"Pelvis",borders:"Intraperitoneal (covered by germinal epithelium, not peritoneum). Suspensory lig. of ovary (infundibulopelvic lig.): upper pole of ovary → lateral pelvic wall — contains ovarian a. + v. + lymphatics + nerves. Proper (ovarian) ligament: lower pole of ovary → uterine horn (continuous with round lig. — both are remnants of gubernaculum).",definition:"Blood supply: ovarian a. from abdominal aorta at L2 (direct, paired). Anastomoses with uterine a. in broad lig. Drainage: right ovarian v. → IVC; left ovarian v. → left renal v. Lymph: para-aortic LNs at L1–L2 (NOT inguinal — important for cancer spread)."},
  {name:"Superior + inferior hypogastric plexus",category:"Pelvis",borders:"Superior hypogastric plexus: anterior to L5/sacral promontory, largely sympathetic (from lumbar splanchnic nn. L1–L2). Continues as hypogastric nerves → inferior plexus. Inferior hypogastric plexus (paired, lateral pelvic wall): receives hypogastric nn. (sympathetic) + pelvic splanchnic nn. (parasympathetic, S2–S4) + sacral splanchnic nn. (sympathetic).",definition:"Subplexuses: rectal, vesical, prostatic, uterovaginal (Frankenhäuser's), middle rectal plexuses. Function: micturition, defecation, sexual response, parturition. Nerve-sparing surgery (rectal/prostate): preserving the inferior hypogastric plexus essential for sexual + urinary function."},
  {name:"Testis layers",category:"Pelvis",borders:"Layers superficial→deep (derived from anterior abdominal wall): skin, dartos m. + fascia (from Camper's + Scarpa's), external spermatic fascia (from external oblique), cremaster m. + fascia (from internal oblique), internal spermatic fascia (from transversalis fascia), tunica vaginalis (parietal + visceral, peritoneal remnant), tunica albuginea, tunica vasculosa, testicular parenchyma.",definition:"Spermatic cord contents (3-3-3): Arteries: testicular a., a. to ductus deferens, cremasteric a. Veins: pampiniform plexus → testicular v. Nerves: genital br. genitofemoral n., autonomic fibres, ilioinguinal n. (lies on cord). Other: ductus deferens, lymphatics (→ para-aortic LNs!). Hydrocele = fluid in tunica vaginalis."},
  {name:"Inguinal canal + hernias",category:"Pelvis",borders:"Anterior wall: EO aponeurosis (+ IO laterally). Posterior wall: transversalis fascia (+ conjoint tendon medially). Floor: inguinal lig. + lacunar lig. medially. Roof: arching IO + TA (conjoint tendon medially). Deep ring: transversalis fascia outpouching, lateral to inferior epigastric vessels. Superficial ring: opening in EO aponeurosis.",definition:"Indirect hernia: lateral to inferior epigastric vessels, through deep ring → entire canal (may reach scrotum). Direct hernia: medial to inferior epigastric vessels, through Hesselbach's triangle. Mnemonic: 'MD's don't lie' — Medial = Direct. Femoral hernia: through femoral ring below + lateral to pubic tubercle (inguinal = above + medial)."},
  {name:"Femoral triangle + hernia",category:"Pelvis",borders:"Femoral triangle: superior (base) = inguinal lig.; lateral = medial border sartorius; medial = medial border adductor longus. Contents (lat→med, NAVEL): Nerve (outside femoral sheath), Artery, Vein, Empty space (femoral canal + Cloquet's node), Lymphatics.",definition:"Femoral sheath: funnel of transversalis + iliopsoas fasciae, encloses artery + vein + femoral canal (NOT nerve). Femoral canal: lateral = femoral v.; medial = lacunar lig.; anterior = inguinal lig.; posterior = pectineal/Cooper's lig. Femoral hernia: more common in females, high strangulation risk (rigid lacunar lig.), presents below + lateral to pubic tubercle."},
  {name:"Umbilical hernias",category:"Pelvis",borders:"Through umbilical ring (defect in linea alba). Types: congenital (omphalocele, covered by peritoneum + amnion), infantile (closes spontaneously by 2–4 years), adult/acquired (paraumbilical, through linea alba near umbilicus — obesity, multiparity, ascites).",definition:"Gastroschisis: different entity — full-thickness defect lateral to umbilicus (usually right), no peritoneal covering. Adult paraumbilical hernia is through linea alba near umbilicus (often supraumbilical), not in the true umbilical ring. Contents usually: omentum + small bowel."},
  {name:"Umbilical folds",category:"Pelvis",borders:"Median umbilical fold (single, midline): overlies median umbilical lig. = urachus remnant. Medial umbilical folds (paired, ~3 cm lateral): overlies medial umbilical ligaments = obliterated umbilical arteries. Lateral umbilical folds (paired, most lateral, ~6 cm lateral): overlies inferior epigastric vessels (living vessels).",definition:"Fossae between folds: supravesical fossa (median–medial folds), medial inguinal fossa = Hesselbach's triangle (medial–lateral folds → direct inguinal hernia), lateral inguinal fossa = deep inguinal ring (lateral to lateral fold → indirect inguinal hernia). Lateral fold = key surgical landmark."},

  // ---- GENERAL ----
  {name:"Orient + describe a specimen",category:"General",borders:"Heart: apex down-left-forward; RV = anterior surface; LV = posterior-left. Lung: apex above 1st rib; identify lobes, fissures, hilum. Organ complex (pluck): trachea, esophagus, great vessels, pericardium.",definition:"Systematic approach: 1) Identify organ. 2) Orient anterior/posterior, superior/inferior, left/right. 3) Identify hilum/vascular pedicle. 4) Describe surfaces + surface markings. 5) Identify entering/exiting structures. RALS for lung hilum position."},
  {name:"Topographic method (borders first)",category:"General",borders:"Always start with: define the region → borders (superior, inferior, anterior, posterior, medial, lateral, roof, floor) → communications → contents (muscles, vessels, nerves, lymphatics, viscera) → clinical relevance.",definition:"Standard dissection answer template for any fossa, triangle, or region. Triggered by 'Tell me about the X' — always begin 'X is the region bounded by…' This structure ensures complete, systematic coverage."},
  {name:"Identify nerves + arteries on base of skull/neck",category:"General",borders:"Approach: identify foramen/region first → recall contents using mnemonics (ROS, VAN, SOF, jugular foramen contents) → trace proximally and distally.",definition:"For unknown nerves: trace to muscles innervated or gland supplied. For unknown arteries: trace to organ supplied or territory. Use adjacent structures (carotid, trachea, thyroid) as landmarks."},
  {name:"Re-anchor to structure being held",category:"General",borders:"Always look at what's in your hand/under tongs before answering. State: the structure name, the side (right/left), then proceed to describe.",definition:"Prevents getting lost in tangential descriptions. Useful in viva exams when redirected mid-description. Anchoring maintains logical flow: structure → position → relations → neurovascular → clinical."},
  {name:"Study priority: nerves + arteries first",category:"General",borders:"Begin each region by drawing/listing all nerves and arteries. Then add muscles, viscera, and bones.",definition:"Nerves and arteries are the hardest exam questions (identification on unlabeled cadavers). Most topographic relationships, clinical implications, and mnemonics focus on neurovascular content. Muscles and bones follow more naturally once vessels and nerves are understood."},
];
