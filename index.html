  {name:"CN IV — Trochlear", category:"Nerve — Cranial", borders:"Origin: dorsal midbrain (only CN leaving dorsal surface; only CN with full decussation). Opening: superior orbital fissure.", definition:"GSE. Supplies superior oblique (depresses, intorts, abducts). Lesion → vertical diplopia, head tilt away from affected side."},
  {name:"CN V — Trigeminal", category:"Nerve — Cranial", borders:"Origin: pons. V1 — SOF; V2 — foramen rotundum; V3 — foramen ovale (motor root).", definition:"GSA (facial sensation) + SVE (muscles of mastication). V1: upper face, scalp to vertex, cornea. V2: middle face, maxillary teeth, palate. V3: lower face, mandibular teeth, anterior 2/3 tongue sensation, mastication muscles."},
  {name:"CN VI — Abducens", category:"Nerve — Cranial", borders:"Origin: lower pons. Opening: superior orbital fissure (passes through Dorello's canal & cavernous sinus).", definition:"GSE. Supplies lateral rectus (abduction). Longest intracranial course — vulnerable in raised ICP. Lesion → medial squint, diplopia on lateral gaze."},
  {name:"CN VII — Facial", category:"Nerve — Cranial", borders:"Origin: pons. Opens: internal acoustic meatus → facial canal → stylomastoid foramen (motor root).", definition:"SVE (facial expression, stapedius, digastric posterior belly) + GVE (lacrimal, submandibular, sublingual glands via pterygopalatine & submandibular ganglia) + SVA (taste anterior 2/3 tongue via chorda tympani) + GSA (external acoustic meatus). Branches in parotid: temporal, zygomatic, buccal, marginal mandibular, cervical (Two Zebras Bit My Cookie)."},
  {name:"CN VIII — Vestibulocochlear", category:"Nerve — Cranial", borders:"Origin: cerebellopontine angle. Opening: internal acoustic meatus.", definition:"SSA. Cochlear component: hearing. Vestibular component: balance and head position. Lesion → sensorineural hearing loss, tinnitus, vertigo."},
  {name:"CN IX — Glossopharyngeal", category:"Nerve — Cranial", borders:"Origin: medulla. Opening: jugular foramen.", definition:"SVE (stylopharyngeus) + GVE (parotid via otic ganglion) + SVA (taste posterior 1/3 tongue) + GSA (oropharynx, middle ear) + GVA (carotid body & sinus). Tympanic branch (Jacobson's) → tympanic plexus → lesser petrosal → otic ganglion → parotid."},
  {name:"CN X — Vagus", category:"Nerve — Cranial", borders:"Origin: medulla. Opening: jugular foramen.", definition:"SVE (pharynx, larynx, palate) + GVE (parasympathetic thoracic & abdominal viscera to splenic flexure) + SVA (taste epiglottis) + GSA (external acoustic meatus, Arnold's nerve) + GVA (thoracic & abdominal viscera). RLN loops around right subclavian a. (right) and aortic arch (left)."},
  {name:"CN XI — Accessory", category:"Nerve — Cranial", borders:"Spinal root: upper cervical cord → foramen magnum → jugular foramen. Cranial root: nucleus ambiguus → jugular foramen.", definition:"SVE (spinal root). Supplies SCM and trapezius. Cranial root functionally part of vagus. Lesion → weakness of SCM (turning head) and trapezius (shoulder shrug)."},
  {name:"CN XII — Hypoglossal", category:"Nerve — Cranial", borders:"Origin: medulla. Opening: hypoglossal canal.", definition:"GSE. Supplies all intrinsic + most extrinsic tongue muscles (not palatoglossus = CN X). LMN lesion → tongue deviates toward the affected side on protrusion."},

  // ---- NERVES — PERIPHERAL ----
  {name:"Cervical plexus (C1–C4)", category:"Nerve — Peripheral", borders:"Anterior rami of C1–C4. Surface branches emerge at the punctum nervosum (posterior border of SCM, junction of upper and middle thirds).", definition:"Cutaneous: greater auricular, lesser occipital, transverse cervical, supraclavicular nn. Motor: ansa cervicalis (sternohyoid, sternothyroid, omohyoid); phrenic n. (C3–5); direct branches to prevertebral muscles."},
  {name:"Phrenic nerve (C3–C5)", category:"Nerve — Peripheral", borders:"Originates from cervical plexus (C3, C4, C5). Crosses the anterior surface of the anterior scalene → enters thorax, passing anterior to the subclavian artery → between mediastinal pleura and pericardium → diaphragm.", definition:"Sole motor supply to the diaphragm. Sensory to mediastinal pleura, pericardium, central diaphragm, and inferior diaphragmatic peritoneum. Mnemonic: 'C3, 4, 5 keep the diaphragm alive.'"},
  {name:"Brachial plexus (C5–T1)", category:"Nerve — Peripheral", borders:"Roots C5–T1 between anterior and middle scalene muscles (within the scalene fissure). Trunks in the posterior triangle. Divisions behind the clavicle. Cords in the axilla around the axillary artery.", definition:"Organisation (mnemonic RTDCB — Real Texans Drink Cold Beer): Roots → Trunks (superior C5+C6, middle C7, inferior C8+T1) → Divisions (6) → Cords (lateral, posterior, medial) → Branches. Terminal branches: musculocutaneous, median, ulnar, axillary, radial nerves."},
  {name:"Lumbar plexus (L1–L4)", category:"Nerve — Peripheral", borders:"Formed within the psoas major from the ventral rami of L1–L4.", definition:"Mnemonic — I, I Get Lots Of Fun: <b>I</b>liohypogastric (L1), <b>I</b>lioinguinal (L1), <b>G</b>enitofemoral (L1–L2), <b>L</b>ateral femoral cutaneous (L2–L3), <b>O</b>bturator (L2–L4), <b>F</b>emoral (L2–L4). Supplies anterior thigh and medial leg."},
  {name:"Sacral plexus (L4–S4)", category:"Nerve — Peripheral", borders:"Formed on the anterior surface of the piriformis muscle from the lumbosacral trunk (L4–L5) and sacral ventral rami S1–S4.", definition:"Branches: sciatic n. (L4–S3, largest nerve in body), superior gluteal n. (L4–S1), inferior gluteal n. (L5–S2), pudendal n. (S2–S4), posterior femoral cutaneous n. (S1–S3), nerves to quadratus femoris, obturator internus, piriformis."},
  {name:"Pudendal nerve (S2–S4)", category:"Nerve — Peripheral", borders:"Exits through the greater sciatic foramen (infrapiriform), loops around the ischial spine, re-enters via the lesser sciatic foramen → pudendal canal (Alcock's).", definition:"Branches: inferior rectal n., perineal n. (deep & superficial branches), dorsal nerve of penis/clitoris. Motor to external urethral & anal sphincters, perineal muscles. Sensory to perineum and external genitalia. Blocked for perineal surgery (pudendal block at the ischial spine)."},
  {name:"Auriculotemporal nerve", category:"Nerve — Peripheral", borders:"Branch of posterior division of V3. Two roots encircle the middle meningeal artery. Passes between the mandibular condyle and external acoustic meatus.", definition:"Carries postganglionic parasympathetic fibers from the otic ganglion (originally CN IX via lesser petrosal) to the parotid gland. Sensory: anterior auricle, lateral temple, anterior external acoustic meatus, anterior tympanic membrane, TMJ."},
  {name:"Chorda tympani", category:"Nerve — Peripheral", borders:"Branch of CN VII (facial nerve) within the facial canal. Enters the tympanic cavity, exits via the petrotympanic fissure, joins the lingual nerve in the infratemporal fossa.", definition:"Carries: taste fibers (anterior 2/3 tongue) + preganglionic parasympathetic fibers → submandibular ganglion → submandibular & sublingual glands. Damaged in middle ear surgery, temporomandibular joint surgery, or parotidectomy."},
  {name:"Lingual nerve", category:"Nerve — Peripheral", borders:"Branch of posterior division of V3. Descends into the floor of the mouth, passes below the submandibular duct (hooks around it).", definition:"Carries general sensation to the anterior 2/3 of tongue, floor of mouth, and lingual gingiva. Joined by chorda tympani (CN VII) which adds taste and parasympathetic fibers to submandibular ganglion."},
  {name:"Inferior alveolar nerve", category:"Nerve — Peripheral", borders:"Branch of posterior division of V3. Gives off the mylohyoid nerve before entering the mandibular foramen → travels in the mandibular canal → terminates as the mental nerve.", definition:"Sensation to mandibular teeth, gingiva, lower lip, and chin (mental branch). Motor via mylohyoid nerve to mylohyoid and anterior belly of digastric. Blocked at the mandibular foramen for dental anesthesia."},
  {name:"Recurrent laryngeal nerve (RLN)", category:"Nerve — Peripheral", borders:"Branch of CN X. Right RLN loops around the right subclavian artery. Left RLN loops around the arch of aorta. Both ascend in the tracheoesophageal groove to the larynx.", definition:"Motor: all intrinsic muscles of the larynx except cricothyroid. Sensory: laryngeal mucosa below the vocal folds. Injury (e.g. thyroidectomy) → hoarseness; bilateral injury → airway emergency requiring intubation."},
  {name:"Greater petrosal nerve", category:"Nerve — Peripheral", borders:"Branch of CN VII from the geniculate ganglion. Exits through the hiatus for the greater petrosal nerve → crosses the middle cranial fossa → enters the pterygoid canal (fuses with deep petrosal n. to form Vidian nerve).", definition:"Carries preganglionic parasympathetic fibers (superior salivatory nucleus) → pterygopalatine ganglion → lacrimal gland, nasal, palatine, and pharyngeal glands. Also carries taste fibers from the soft palate."},
  {name:"Lesser petrosal nerve", category:"Nerve — Peripheral", borders:"Branch of CN IX (via tympanic plexus). Exits through the hiatus for the lesser petrosal nerve → foramen ovale → otic ganglion.", definition:"Carries preganglionic parasympathetic fibers (inferior salivatory nucleus) → otic ganglion → auriculotemporal nerve → parotid gland."},
  {name:"Nerve of pterygoid canal (Vidian nerve)", category:"Nerve — Peripheral", borders:"Formed at the foramen lacerum by fusion of greater petrosal (parasympathetic) + deep petrosal (sympathetic). Traverses the pterygoid canal → pterygopalatine fossa.", definition:"Synapse in pterygopalatine ganglion (parasympathetic only — sympathetic fibers pass through). Postganglionic fibers distributed via V2 branches."},
  {name:"Pelvic splanchnic nerves (S2–S4)", category:"Nerve — Peripheral", borders:"Arise from sacral ventral rami S2–S4 (not from the sympathetic chain). Emerge through pelvic sacral foramina → inferior hypogastric plexus.", definition:"Preganglionic parasympathetic fibers. Supply distal 1/3 transverse colon → rectum (from Cannon-Böhm point); urinary bladder (detrusor contraction); erectile bodies; internal genitalia (except gonads)."},
  {name:"Thoracic splanchnic nerves", category:"Nerve — Peripheral", borders:"Greater splanchnic (T5–T9), lesser splanchnic (T10–T11), least splanchnic (T12). Pierce the diaphragm and synapse in prevertebral ganglia.", definition:"Preganglionic sympathetic fibers. Synapse in celiac, superior mesenteric, and aorticorenal ganglia. Uniquely, fibers to adrenal medulla pass without synapsing (chromaffin cells are modified neurons)."},

  // ---- GANGLIA & ANS ----
  {name:"Ciliary ganglion", category:"Ganglion / ANS", borders:"Located in the orbit between the optic nerve and lateral rectus muscle.", definition:"Parasympathetic ganglion. Preganglionic: CN III (Edinger-Westphal nucleus). Postganglionic: short ciliary nerves → sphincter pupillae (pupil constriction) and ciliary muscle (accommodation). Sympathetic and sensory fibers pass through without synapsing."},
  {name:"Pterygopalatine ganglion", category:"Ganglion / ANS", borders:"Located in the pterygopalatine fossa, attached to V2.", definition:"Largest parasympathetic ganglion. Preganglionic: CN VII (greater petrosal nerve via Vidian nerve). Postganglionic: lacrimal gland (via zygomatic → lacrimal nerves), nasal, palatine, and pharyngeal glands (via V2 branches)."},
  {name:"Submandibular ganglion", category:"Ganglion / ANS", borders:"Suspended from the lingual nerve above the submandibular gland.", definition:"Parasympathetic ganglion. Preganglionic: CN VII via chorda tympani → lingual nerve. Postganglionic: submandibular and sublingual glands."},
  {name:"Otic ganglion", category:"Ganglion / ANS", borders:"Located in the infratemporal fossa, just below the foramen ovale, medial to V3.", definition:"Parasympathetic ganglion. Preganglionic: CN IX via lesser petrosal nerve. Postganglionic: auriculotemporal nerve (V3) → parotid gland."},
  {name:"Sympathetic trunk", category:"Ganglion / ANS", borders:"Paired paravertebral chain extending from the skull base to the coccyx (ganglion impar).", definition:"3 cervical ganglia (superior, middle, inferior — the inferior often fused with T1 as the stellate/cervicothoracic ganglion), 11–12 thoracic, 4–5 lumbar, 4–5 sacral ganglia. Connected to spinal nerves by white (preganglionic) and gray (postganglionic) rami communicantes."},
  {name:"Celiac plexus (solar plexus)", category:"Ganglion / ANS", borders:"Dense network of sympathetic ganglia and nerves surrounding the celiac trunk, anterior to the abdominal aorta at T12.", definition:"Receives preganglionic sympathetic fibers from greater & lesser splanchnic nerves. Parasympathetic fibers from vagal trunks pass through without synapsing. Supplies the foregut viscera. Celiac plexus block used for pain management in pancreatic cancer."},
  {name:"Superior mesenteric plexus", category:"Ganglion / ANS", borders:"Around the origin of the superior mesenteric artery.", definition:"Sympathetic (lesser splanchnic nn. + lumbar splanchnics) and parasympathetic (vagus). Supplies midgut organs."},
  {name:"Inferior mesenteric plexus", category:"Ganglion / ANS", borders:"Around the inferior mesenteric artery.", definition:"Sympathetic (lumbar splanchnics → inferior mesenteric ganglion). Parasympathetic (pelvic splanchnics — ascend retrograde). Supplies hindgut from Cannon-Böhm point distally."},
  {name:"Superior hypogastric plexus", category:"Ganglion / ANS", borders:"Anterior to the L5 vertebra and sacral promontory ('presacral nerve').", definition:"Mostly sympathetic (from aortic plexus and lumbar splanchnics). Sends hypogastric nerves to the inferior hypogastric plexus. Damaged in anterior L5/S1 disc surgery → ejaculatory failure."},
  {name:"Inferior hypogastric plexus", category:"Ganglion / ANS", borders:"On the lateral walls of the rectum and other pelvic viscera.", definition:"Contains sympathetic (sacral splanchnics), parasympathetic (pelvic splanchnics), and visceral afferent fibers. Supplies pelvic viscera (bladder, rectum, internal genitalia). Damage → sexual and bladder dysfunction."},
  {name:"Enteric nervous system", category:"Ganglion / ANS", borders:"Intrinsic nervous system within the wall of the gastrointestinal tract.", definition:"Myenteric plexus (Auerbach's) — between longitudinal and circular muscle layers, controls peristalsis. Submucosal plexus (Meissner's) — within submucosa, controls secretion and local blood flow. Largely autonomous; the 'second brain'."},
  {name:"Cannon-Böhm point", category:"ANS / Clinical", borders:"Junction of the middle and left thirds of the transverse colon, at the splenic flexure.", definition:"Boundary between vagal (CN X) parasympathetic supply and pelvic splanchnic (S2–S4) supply; marks the midgut–hindgut embryological transition."},

  // ---- LIGAMENTS & PERITONEAL FOLDS ----
  {name:"Falciform ligament", category:"Ligament", borders:"Double fold of peritoneum connecting the anterior surface of the liver to the anterior abdominal wall and diaphragm.", definition:"Free edge contains the ligamentum teres hepatis (round ligament — remnant of the left umbilical vein). In portal hypertension, the ligamentum teres may recanalize."},
  {name:"Ligamentum teres hepatis (round ligament of liver)", category:"Ligament", borders:"Free edge of the falciform ligament, from the umbilicus to the porta hepatis.", definition:"Fibrous remnant of the left umbilical vein. Can recanalize in portal hypertension."},
  {name:"Ligamentum venosum", category:"Ligament", borders:"In the fissure for the ligamentum venosum on the visceral surface of the liver, from the porta hepatis to the IVC.", definition:"Fibrous remnant of the ductus venosus."},
  {name:"Lesser omentum", category:"Ligament", borders:"Double fold of peritoneum from the lesser curvature of the stomach and first 2 cm of duodenum to the liver.", definition:"Components: hepatogastric ligament (liver → lesser curvature) and hepatoduodenal ligament (liver → duodenum). The hepatoduodenal ligament contains the portal triad: common bile duct (anterior right), proper hepatic artery (anterior left), and portal vein (posterior)."},
  {name:"Greater omentum", category:"Ligament", borders:"Four layers of visceral peritoneum descending from the greater curvature of the stomach and the transverse colon.", definition:"Apron-like structure; acts as the 'abdominal policeman' (migrates to sites of infection/inflammation). Subdivisions: gastrophrenic ligament (stomach → diaphragm), gastrosplenic ligament (stomach → spleen, contains short gastric & left gastroepiploic vessels), gastrocolic ligament (stomach → transverse colon)."},
  {name:"Splenorenal (lienorenal) ligament", category:"Ligament", borders:"Connects the spleen and tail of the pancreas to the left kidney.", definition:"Contains the splenic artery and vein, and the tail of the pancreas."},
  {name:"Round ligament of uterus", category:"Ligament", borders:"From the uterine horn → broad ligament → deep inguinal ring → inguinal canal → labium majus.", definition:"Maintains the uterus in anteversion. Homologue of the gubernaculum testis. Accompanied by the ilioinguinal nerve in the inguinal canal."},
  {name:"Broad ligament of uterus", category:"Ligament", borders:"Double fold of peritoneum from the lateral margins of the uterus to the lateral pelvic wall.", definition:"Three parts: mesometrium (lower — uterus), mesosalpinx (upper — uterine tubes), mesovarium (posterior — ovary). Contains the round ligament, uterine tube, ovarian ligament, uterine and ovarian vessels, and nerves."},
  {name:"Cardinal (Mackenrodt's) ligament", category:"Ligament", borders:"The basal part of the broad ligament, from the cervix and isthmus to the lateral pelvic wall.", definition:"Provides the most important support for the uterine cervix. Contains the uterine artery and ureter (the ureter passes beneath the uterine artery — 'water under the bridge')."},
  {name:"Uterosacral (rectouterine) ligament", category:"Ligament", borders:"From the cervix → sacrum; forms the rectouterine fold of peritoneum.", definition:"Maintains uterine position. Involved in endometriosis-associated pelvic pain. Forms the lateral borders of the Pouch of Douglas."},
  {name:"Suspensory ligament of ovary (infundibulopelvic ligament)", category:"Ligament", borders:"From the upper pole of the ovary to the pelvic brim/lateral pelvic wall.", definition:"Contains the ovarian artery and vein. Divided in surgical oophorectomy."},
  {name:"Inguinal ligament (Poupart's)", category:"Ligament", borders:"Reflected lower border of the external oblique aponeurosis, from ASIS to pubic tubercle.", definition:"Forms the floor of the inguinal canal and the upper boundary of the femoral triangle. Differentiates inguinal hernia (above) from femoral hernia (below)."},
  {name:"Lacunar ligament (Gimbernat's)", category:"Ligament", borders:"Triangular medial reflection of the inguinal ligament onto the pectineal line of the pubis.", definition:"Forms the medial border of the femoral ring. Notoriously sharp medial edge — may need to be incised during reduction of a strangulated femoral hernia."},
  {name:"Pectineal ligament (Cooper's)", category:"Ligament", borders:"Along the pectineal line of the superior pubic ramus, continuous with the lacunar ligament.", definition:"Strong ligament used as an anchor for repair of hernias (Cooper's ligament repair / McVay repair)."},
  {name:"Sacrotuberous ligament", category:"Ligament", borders:"From the sacrum, coccyx, and posterior superior iliac spine → ischial tuberosity.", definition:"Converts the greater sciatic notch into the greater sciatic foramen (with the sacrospinous ligament). Resists nutation of the sacrum."},
  {name:"Sacrospinous ligament", category:"Ligament", borders:"From the sacrum and coccyx → ischial spine.", definition:"Converts the lesser sciatic notch into the lesser sciatic foramen (with the sacrotuberous ligament). Site of the pudendal nerve block (injected near the ischial spine)."},
  {name:"Coronary ligament (of liver)", category:"Ligament", borders:"Peritoneal reflections from the liver to the diaphragm and right kidney/adrenal. Forms the margins of the bare area of the liver.", definition:"Right and left triangular ligaments are formed at the lateral extremes of the coronary ligament where its leaves fuse."},

  // ---- LYMPHATICS ----
  {name:"Thoracic duct", category:"Lymphatic", borders:"Begins as the cisterna chyli (~L1–L2 behind the aorta). Ascends through the aortic hiatus → posterior mediastinum between the aorta and azygos vein → crosses left at T5 → arches over the left subclavian artery → drains into the left venous angle.", definition:"Largest lymphatic vessel. Drains everything except the right upper quadrant of the body (right upper limb, right hemithorax, right head & neck). Damage during left-sided neck surgery → chylothorax."},
  {name:"Right lymphatic duct", category:"Lymphatic", borders:"Short trunk at the root of the neck formed by the right jugular, right subclavian, and right bronchomediastinal trunks. Drains into the right venous angle.", definition:"Drains: right upper limb, right hemithorax, right side of the head and neck."},
  {name:"Cisterna chyli", category:"Lymphatic", borders:"Dilated sac at the origin of the thoracic duct, at L1–L2, posterior to the abdominal aorta between the two crura of the diaphragm.", definition:"Receives: right and left lumbar trunks (from lower limbs and pelvic organs) and the intestinal trunk (from gut). Starting point of the thoracic duct."},
  {name:"Axillary lymph nodes", category:"Lymphatic", borders:"Five groups within the axilla, arranged around the axillary vessels.", definition:"Groups (mnemonic APICAL): <b>A</b>pical (level III — medial to pec minor), <b>P</b>ectoral (level I — anterior), <b>I</b>nfraclavicular, <b>C</b>entral (level II), <b>A</b>xillary (humeral / lateral, level I), <b>L</b>ymph nodes (subscapular / posterior, level I). Drain upper limb and breast."},
  {name:"Virchow's node (sentinel for gastric/abdominal cancer)", category:"Lymphatic / Clinical", borders:"Left supraclavicular lymph node, at the junction of the thoracic duct and the left subclavian vein.", definition:"Enlargement (Troisier's sign) indicates metastatic spread of thoracic or abdominal malignancy (especially gastric cancer). Named after Rudolf Virchow."},
  {name:"Deep cervical lymph nodes", category:"Lymphatic", borders:"A chain of nodes along the internal jugular vein, from the skull base to the root of the neck.", definition:"Final common pathway for lymph drainage from the head and neck → jugular trunk → venous angle. Subdivided into superior and inferior groups relative to the omohyoid."},

  // ---- SURFACE PROJECTIONS (additional) ----
  {name:"Transpyloric plane (of Addison)", category:"Projection / Clinical", borders:"Horizontal plane halfway between the jugular notch and the pubic symphysis (~L1). Corresponds to the lower margin of 9th costal cartilages bilaterally.", definition:"Crosses: pylorus, neck of pancreas, SMA origin, formation of portal vein, duodenojejunal junction, fundus of gallbladder, hila of kidneys, 1st lumbar vertebra."},
  {name:"Heart — auscultation areas", category:"Projection / Clinical", borders:"Aortic valve: 2nd right intercostal space, parasternal. Pulmonary valve: 2nd left intercostal space, parasternal. Tricuspid valve: 4th–5th left, lower sternal border. Mitral valve: 5th left intercostal space at midclavicular line (apex).", definition:"Mnemonic: 'All Physicians Take Money'. Sound radiates toward the great vessel from each valve — so the aortic area is superior right and mitral area is at the apex."},
  {name:"Sternal angle (angle of Louis)", category:"Projection / Clinical", borders:"Manubriosternal joint at the level of the T4–T5 intervertebral disc.", definition:"Marks: attachment of 2nd costal cartilage (landmark for rib counting); division between superior and inferior mediastinum; level of tracheal bifurcation (carina); aortic arch begins and ends; azygos vein drains into SVC."},

  // ---- CLINICAL LANDMARKS ----
  {name:"Pterion", category:"Clinical", borders:"H-shaped junction of the frontal, parietal, greater wing of sphenoid, and squamous temporal bones.", definition:"Thinnest part of the skull vault. Underlying middle meningeal artery — fracture here causes rupture → epidural hematoma. Surgical landmark for burr holes."},
  {name:"Calot's triangle (cystohepatic)", category:"Clinical", borders:"Cystic duct (lateral), common hepatic duct (medial), and inferior surface of the liver (superior).", definition:"Contains the cystic artery (usually from right hepatic a.) and the cystic lymph node of Lund. The 'critical view of safety' during laparoscopic cholecystectomy must be achieved within this triangle before clipping."},
  {name:"Esophageal constrictions", category:"Clinical", borders:"1. Upper (pharyngoesophageal) — behind cricoid cartilage at C6. 2. Middle (bronchoaortic) — where aortic arch and left main bronchus cross the esophagus. 3. Lower (diaphragmatic) — esophageal hiatus at T10.", definition:"Sites where foreign bodies lodge and strictures form (caustic ingestion, malignancy). Radiologically visible as 3 indentations on barium swallow."},
  {name:"Pringle maneuver", category:"Clinical", borders:"Manual or clamp compression of the hepatoduodenal ligament at the epiploic foramen of Winslow.", definition:"Temporarily occludes all inflow to the liver (hepatic artery + portal vein) to control hemorrhage during hepatic surgery. Normal liver can tolerate 15–20 minutes warm ischaemia."},
  {name:"Macewen's triangle", category:"Clinical", borders:"Superior: posterior root of the zygomatic arch. Anterior: posterior border of the EAM. Posterior: a horizontal line through the superior border of the EAM.", definition:"Surface marking of the mastoid antrum. Landmark for cortical mastoidectomy and approach to the middle ear."},
  {name:"Sella turcica", category:"Clinical / Bone", borders:"On the body of the sphenoid bone. Components: tuberculum sellae, pituitary fossa (hypophysial fossa), dorsum sellae, and posterior clinoid processes.", definition:"Contains the pituitary gland (hypophysis). Enlarged in pituitary tumors. Seen on lateral skull X-rays and MRI. Transsphenoidal approach for pituitary surgery passes through the nasal cavity, sphenoid sinus, and sella floor."},

  // ---- MUSCLES (TOPOGRAPHIC ONLY) ----
  {name:"Sternocleidomastoid (SCM)", category:"Muscle", borders:"Origin: manubrium of sternum + medial third of clavicle. Insertion: mastoid process + superior nuchal line.", definition:"Innervation: spinal accessory nerve (CN XI) + C2–C3 proprioception. Action: ipsilateral lateral flexion + contralateral rotation; bilateral — neck flexion and elevation of thorax. Divides neck into anterior and posterior triangles."},
  {name:"Trapezius", category:"Muscle", borders:"Origin: external occipital protuberance, superior nuchal line, nuchal ligament, C7–T12 spinous processes. Insertion: posterior border of lateral clavicle, acromion, spine of scapula.", definition:"Innervation: spinal accessory nerve (CN XI) + C3–C4 proprioception. Action: upper fibres elevate scapula; middle retract; lower depress and rotate. Forms the posterior border of the posterior triangle."},
  {name:"Digastric", category:"Muscle", borders:"Two bellies: Anterior — digastric fossa of mandible → intermediate tendon on hyoid. Posterior — mastoid notch → intermediate tendon.", definition:"Anterior belly: innervation V3 (mylohyoid nerve). Posterior belly: innervation CN VII. Action: depresses mandible, elevates hyoid. Forms the superior borders of submandibular and carotid triangles."},
  {name:"Mylohyoid", category:"Muscle", borders:"Origin: mylohyoid line of mandible. Insertion: median raphe and body of hyoid.", definition:"Innervation: mylohyoid nerve (V3). Action: elevates floor of mouth and tongue; depresses mandible. Forms the muscular floor of the mouth (oral diaphragm)."},
  {name:"Hyoglossus", category:"Muscle", borders:"Origin: greater horn and body of hyoid bone. Insertion: side of tongue.", definition:"Innervation: CN XII (hypoglossal nerve). Action: depresses and retracts the tongue. The lingual artery passes deep to hyoglossus; the lingual nerve and submandibular ganglion are superficial to it."},
  {name:"Omohyoid", category:"Muscle", borders:"Two bellies joined at an intermediate tendon (attached to clavicle). Superior belly: hyoid → tendon. Inferior belly: tendon → superior border of scapula.", definition:"Innervation: ansa cervicalis (C1–C3). Action: depresses hyoid bone (after swallowing); tenses infrahyoid fascia; subdivides the anterior and posterior triangles."},
  {name:"Anterior scalene", category:"Muscle", borders:"Origin: anterior tubercles of transverse processes C3–C6. Insertion: scalene tubercle of the first rib.", definition:"Innervation: anterior rami C4–C6. Separates the subclavian vein (anterior) from the subclavian artery and brachial plexus (posterior). Forms the anterior wall of the scalene fissure. Surgical landmark in subclavian vessel exposure."},
  {name:"Middle scalene", category:"Muscle", borders:"Origin: posterior tubercles of transverse processes C2–C7. Insertion: upper surface of 1st rib (posterior to subclavian groove).", definition:"Forms the posterior wall of the scalene fissure. With the anterior scalene, it bounds the passage of the brachial plexus and subclavian artery."},
  {name:"Temporalis", category:"Muscle of Mastication", borders:"Origin: temporal fossa and temporal fascia. Insertion: coronoid process of mandible and anterior border of ramus.", definition:"Innervation: deep temporal nerves (anterior and posterior, from V3). Action: elevates mandible (closes mouth); posterior fibres retract the mandible. Strongest jaw elevator."},
  {name:"Masseter", category:"Muscle of Mastication", borders:"Origin: zygomatic arch. Insertion: lateral surface of mandibular ramus and angle.", definition:"Innervation: masseteric nerve (V3). Action: elevates mandible (closes mouth). Palpable when clenching. Hypertrophy in bruxism."},
  {name:"Lateral pterygoid", category:"Muscle of Mastication", borders:"Superior head: greater wing of sphenoid. Inferior head: lateral pterygoid plate. Insertion: pterygoid fovea of mandibular condyle + articular disc of TMJ.", definition:"Innervation: V3. Action: protrusion and depression (opening) of mandible; lateral grinding movements. The only jaw muscle active during opening."},
  {name:"Medial pterygoid", category:"Muscle of Mastication", borders:"Superficial head: maxillary tuberosity. Deep head: medial surface of lateral pterygoid plate. Insertion: medial surface of mandibular ramus and angle.", definition:"Innervation: V3. Action: elevates mandible; protrudes mandible; lateral grinding. Forms the medial part of the pterygoid sling with masseter."},
  {name:"Levator palpebrae superioris (LPS)", category:"Muscle", borders:"Origin: lesser wing of sphenoid. Insertion: upper eyelid (tarsal plate and skin).", definition:"Innervation: CN III (superior branch — striated muscle) + superior tarsal muscle (smooth muscle within LPS — sympathetic). Action: elevates upper eyelid. Paralysis → ptosis (CN III lesion — complete ptosis; Horner's syndrome — partial ptosis)."},
  {name:"Extraocular muscles (EOMs)", category:"Muscle", borders:"All arise from the common tendinous ring (annulus of Zinn) at the apex of the orbit, except the inferior oblique.", definition:"LR6, SO4, rest 3: Lateral rectus — CN VI (abduction); Superior oblique — CN IV (depression, intorsion, abduction); Superior, inferior recti, inferior oblique, LPS — CN III. Clinical testing: each muscle acts in a specific gaze position; RAPD assesses afferent pupillary defect (CN II)."},
  {name:"Levator ani", category:"Muscle / Pelvic Floor", borders:"Origin: body of pubis + tendinous arch of obturator fascia + ischial spine. Insertion: perineal body, coccyx, anococcygeal ligament.", definition:"Components: pubococcygeus (pubovaginalis, puboprostaticus, puborectalis), iliococcygeus. Forms the pelvic diaphragm. Innervation: pudendal nerve + direct branches S3–S4. Puborectalis sling maintains the anorectal angle (~90° at rest)."},
  {name:"Gluteus maximus", category:"Muscle", borders:"Origin: posterior gluteal line, dorsum of sacrum & coccyx, sacrotuberous ligament. Insertion: gluteal tuberosity of femur + iliotibial tract.", definition:"Innervation: inferior gluteal nerve (L5, S1, S2). Largest muscle in the body. Action: powerful extension and external rotation of hip. Main 'antigravity' muscle for rising from seated and climbing stairs."},
  {name:"Gluteus medius & minimus", category:"Muscle", borders:"Origin: gluteal surface of ilium (between anterior and posterior gluteal lines for medius; between anterior and inferior gluteal lines for minimus). Insertion: greater trochanter.", definition:"Innervation: superior gluteal nerve (L4, L5, S1). Action: hip abduction and internal rotation; maintain level pelvis during single-leg stance (Trendelenburg sign if damaged). Key muscles for intramuscular injections."},
  {name:"Piriformis", category:"Muscle", borders:"Origin: anterior sacrum (between S1–S4 foramina). Insertion: greater trochanter.", definition:"Innervation: branches from L5, S1, S2. Action: external rotation, abduction (when flexed), extension of hip. Divides the greater sciatic foramen into suprapiriform and infrapiriform compartments. Piriformis syndrome can compress the sciatic nerve."},

  // ---- GLANDS & DUCTS ----
  {name:"Parotid gland", category:"Gland", borders:"Lies in the parotidomasseteric region — superficial to masseter, anterior to the ear. Extends to the posterior belly of digastric.", definition:"Purely serous gland. Duct (Stensen's) pierces buccinator and opens opposite the 2nd upper molar. Structures within parotid: facial nerve (5 terminal branches), retromandibular vein, ECA (terminates). Innervation: parasympathetic via CN IX → lesser petrosal → otic ganglion → auriculotemporal nerve."},
  {name:"Submandibular gland", category:"Gland", borders:"In the submandibular triangle. Superficial part below mylohyoid; deep part wraps around the posterior border of mylohyoid.", definition:"Mixed (mostly serous) gland. Duct (Wharton's) opens at the sublingual papilla beside the frenulum. Innervation: parasympathetic via chorda tympani → submandibular ganglion. Stones (calculi) most common here."},
  {name:"Sublingual gland", category:"Gland", borders:"Beneath the floor of the mouth in the sublingual fossa.", definition:"Mixed (mostly mucous) gland. Many small ducts open onto the sublingual fold. Innervation: as submandibular (chorda tympani via submandibular ganglion)."},
  {name:"Lacrimal gland", category:"Gland", borders:"In the lacrimal fossa of the frontal bone, superolateral orbit.", definition:"Serous gland, ~12 ducts open into the superior conjunctival fornix. Innervation: parasympathetic via CN VII — greater petrosal → pterygopalatine ganglion → zygomatic branch of V2 → lacrimal nerve of V1. Sympathetic (dries secretion) from superior cervical ganglion."},
  {name:"Thyroid gland", category:"Gland", borders:"In the anterior neck (muscular / omotracheal triangle), at C5–T1 level. Butterfly-shaped, 2 lobes joined by isthmus over the 2nd–4th tracheal rings.", definition:"Arterial supply: superior thyroid a. (ECA) + inferior thyroid a. (thyrocervical trunk). Veins: superior, middle → IJV; inferior thyroid v. → brachiocephalic v. RLN at risk in thyroidectomy. Parathyroid glands embedded posteriorly."},
  {name:"Parathyroid glands", category:"Gland", borders:"Usually 4 glands on the posterior surface of the thyroid gland (superior and inferior pairs).", definition:"Secrete PTH (parathyroid hormone) — raises serum calcium. Superior parathyroid glands from 4th pharyngeal pouch (with thyroid); inferior from 3rd pouch (with thymus). At risk during thyroidectomy (hypoparathyroidism → hypocalcaemia → tetany)."},
  {name:"Adrenal (suprarenal) glands", category:"Gland", borders:"Supreromedial to each kidney. Right is pyramidal; left is semilunar.", definition:"Arterial supply: superior suprarenal a. (inferior phrenic), middle suprarenal a. (aorta), inferior suprarenal a. (renal a.). Right suprarenal v. → IVC (directly); left suprarenal v. → left renal v. Medulla: chromaffin cells, secretes epinephrine & norepinephrine. Cortex: zona glomerulosa (aldosterone), zona fasciculata (cortisol), zona reticularis (sex steroids)."},
  {name:"Pancreas", category:"Gland", borders:"Secondarily retroperitoneal (except the tail). Head within the duodenal C-loop (anterior to L2), neck over the SMV, body crosses L1, tail in the splenorenal ligament reaching the splenic hilum.", definition:"Arterial supply: superior pancreaticoduodenal a. (from gastroduodenal), inferior pancreaticoduodenal a. (from SMA), pancreatic branches of splenic a. Ducts: main (Wirsung) joins bile duct at major duodenal papilla; accessory (Santorini) opens at minor papilla."},
  {name:"Gallbladder", category:"Gland / Organ", borders:"In the gallbladder fossa on the inferior surface of the liver (between right and quadrate lobes). Parts: fundus (Murphy's point), body, neck, cystic duct.", definition:"Stores and concentrates bile. Arterial supply: cystic artery (usually from right hepatic a., within Calot's triangle). Cystic vein → right branch of portal vein (or right hepatic vein). Parasympathetic stimulation contracts the gallbladder."},
  {name:"Spleen", category:"Gland / Organ", borders:"In the LUQ behind ribs 9–11 on the left. Long axis follows the 10th rib. Contacts the stomach, left kidney, left adrenal gland, and tail of pancreas.", definition:"Arterial supply: splenic artery (celiac trunk). Splenic vein → portal system. Intraperitoneal. Splenomegaly — various causes (haematological, infective, portal hypertension). Notched anterior border helps distinguish palpable spleen from kidney."},
  {name:"Bile duct (common bile duct)", category:"Gland / Organ", borders:"Formed by union of cystic duct + common hepatic duct. Descends through the hepatoduodenal ligament (anterior right in portal triad), passes posterior to D1, traverses the head of pancreas, and joins the pancreatic duct at the major duodenal papilla.", definition:"Normal diameter <8 mm on ultrasound (or <10 mm post-cholecystectomy). Dilates in distal obstruction (gallstone, pancreatic cancer). The ampulla of Vater is surrounded by the sphincter of Oddi."},

  // ---- HEART ----
  {name:"Right atrium", category:"Heart", borders:"Forms the right border of the heart.", definition:"Features: right auricle; fossa ovalis (embryological foramen ovale); crista terminalis (SA node at its superior end); openings of SVC, IVC (with Eustachian valve), coronary sinus (with Thebesian valve); pectinate muscles; tricuspid valve orifice. Koch's triangle contains the AV node."},
  {name:"Right ventricle", category:"Heart", borders:"Anterior-most cardiac chamber, inferior right heart.", definition:"Features: tricuspid valve (3 leaflets — anterior, posterior, septal); papillary muscles (anterior, posterior, septal) with chordae tendineae; trabeculae carneae; trabecula septomarginalis (moderator band — carries right bundle branch). Pumps to pulmonary circulation through pulmonary valve."},
  {name:"Left atrium", category:"Heart", borders:"Posterior-most cardiac chamber; forms the posterior surface of the heart.", definition:"Features: left auricle; openings of 4 pulmonary veins (2 right, 2 left); mitral valve orifice; smooth wall (unlike the right atrium). The oblique sinus is posterior to the left atrium. Most commonly involved in AF."},
  {name:"Left ventricle", category:"Heart", borders:"Forms the apex and left border of the heart.", definition:"Features: mitral valve (bicuspid — anterior + posterior leaflets); aortic valve (semilunar — right, left, non-coronary cusps); papillary muscles (anterior, posterior); chordae tendineae; much thicker myocardium than RV. Wall motion abnormalities indicate ischemia."},
  {name:"Cardiac conducting system", category:"Heart", borders:"From the SA node at the superior end of the crista terminalis → AV node (Koch's triangle) → bundle of His (interventricular septum) → right and left bundle branches → Purkinje fibres.", definition:"SA node: pacemaker, 60–100 bpm. AV node: delay 0.1 s. Right bundle branch → right ventricle. Left bundle branch divides into anterior and posterior fascicles. Blood supply: SA node — right coronary a. (60%) or left circumflex (40%); AV node — right coronary a. (right-dominant)."},
  {name:"Pericardium", category:"Heart", borders:"Fibroserous sac enclosing the heart and roots of great vessels.", definition:"Layers: fibrous pericardium (tough outer sac, fused with central tendon of diaphragm + great vessels); serous pericardium — parietal (lines inside of fibrous) + visceral (epicardium, lines heart). Pericardial cavity contains ~50 mL fluid. Sinuses: transverse sinus (between arterial and venous ends) and oblique sinus (behind left atrium). Cardiac tamponade → Becks triad (hypotension, muffled heart sounds, raised JVP)."},

  // ---- BONES & JOINTS ----
  {name:"Iliac crest", category:"Bone / Landmark", borders:"Superior margin of the ilium, from ASIS (anterior) to PSIS (posterior).", definition:"Highest point corresponds to L4/L5 disc level — landmark for lumbar puncture (Tuffier's line). Palpable along its entire length. Bone graft harvested here. Origin of external oblique, internal oblique, and transversus abdominis muscles."},
  {name:"Anterior superior iliac spine (ASIS)", category:"Bone / Landmark", borders:"Palpable projection at the anterior end of the iliac crest.", definition:"Anchor of inguinal ligament (with pubic tubercle). Reference point for McBurney's (appendix) and Lanz (appendix, pelvic position) points. Anterior superior iliac spine + umbilicus line = McBurney's line."},
  {name:"Pubic tubercle", category:"Bone / Landmark", borders:"Small prominence on the superior surface of the pubic body, ~2.5 cm from the midline.", definition:"Medial attachment of the inguinal ligament. Key landmark: inguinal hernia passes above and medial to pubic tubercle; femoral hernia passes below and lateral to it."},
  {name:"Xiphisternal joint", category:"Bone / Landmark", borders:"Cartilaginous joint between the body of the sternum and the xiphoid process.", definition:"Level of T9. Lower limit of the thoracic cage anteriorly. Landmark for CPR (heel of hand 2 finger-breadths above this joint)."},
  {name:"Pubic symphysis", category:"Bone / Landmark", borders:"Secondary cartilaginous joint (symphysis) between the right and left pubic bones in the midline.", definition:"Anterior boundary of the pelvis and perineum. Separated in pelvic girdle instability (diastasis pubis). Anterior approach to hip joint (Smith-Petersen) passes near it."},
  {name:"Greater sciatic notch", category:"Bone / Landmark", borders:"C-shaped notch in the posterior ilium, from posterior inferior iliac spine to the ischial spine. Converted to the greater sciatic foramen by the sacrospinous and sacrotuberous ligaments.", definition:"The piriformis passes through it. Suprapiriform and infrapiriform compartments transmit gluteal vessels and nerves."},
