      {img:"face-regions.jpg", caption:"Superficial regions of the face"},
    ]
  },
  "infratemporal":{
    title:"Infratemporal & pterygopalatine fossae",
    parent:"head",
    body:[
      {h:"Infratemporal fossa — overview",
       p:"An irregularly-shaped depression below the temporal fossa, situated below and medial to the zygomatic arch. It is not fully enclosed by bone."},
      {h:"Borders",
       list:["Cranial: infratemporal surface of greater wing of sphenoid + squamous part of temporal bone",
             "Ventral: maxillary tuberosity",
             "Dorsal: continuous with the prestyloid space",
             "Medial: lateral plate of pterygoid process of sphenoid",
             "Lateral: ramus of mandible"]},
      {h:"Passages of infratemporal fossa",
       list:["Foramen ovale — V3, venous plexus of foramen ovale",
             "Foramen spinosum — middle meningeal a. & v., meningeal br. of V3",
             "Mandibular foramen — inferior alveolar n., a., v.",
             "Pterygomaxillary fissure — maxillary a., pterygoid plexus",
             "Pterygotympanic fissure — chorda tympani, anterior tympanic a. & v., anterior ligament of malleus",
             "Foramen lacerum",
             "Foramen petrosum — lesser petrosal n.",
             "Alveolar foramina of maxillary tuberosity — posterior superior alveolar n. (V2 br.) & vessels"]},
      {h:"Contents",
       list:["Medial pterygoid muscle",
             "Lateral pterygoid muscle",
             "Temporalis muscle (lower portion)",
             "Maxillary artery (with branches: middle meningeal, inferior alveolar, buccal, deep temporal, anterior tympanic)",
             "Pterygoid venous plexus",
             "Otic ganglion — relays lesser petrosal n. for parotid secretomotor",
             "Mandibular n. (V3) — auriculotemporal, inferior alveolar, lingual, buccal nn.",
             "Chorda tympani (joins lingual n.)",
             "Buccal fat pad of Bichat"]},
      {img:"infratemporal-fossa.jpg", caption:"Infratemporal fossa boundaries and contents"},
      {h:"Pterygopalatine fossa — overview",
       p:"A small narrow pyramidal space (apex pointing inferiorly) between the posterior wall of the maxilla and the pterygoid process of sphenoid. It is the central crossroads of V2 and the pterygopalatine ganglion."},
      {h:"Borders",
       list:["Cranial: maxillary surface of greater wing of sphenoid",
             "Ventral: infratemporal surface of maxilla",
             "Dorsal: pterygoid process of sphenoid",
             "Medial: perpendicular plate of palatine bone",
             "Lateral: pterygomaxillary fissure (connects to infratemporal fossa)",
             "Caudal: continues as the greater palatine canal"]},
      {h:"Passages",
       list:["<b>To the orbit:</b> foramen rotundum (V2); inferior orbital fissure (zygomatic n., infraorbital n. & a., inferior ophthalmic vein, orbitalis)",
             "<b>To the palate:</b> greater palatine canal (greater palatine n., descending palatine a. & v.); lesser palatine canal (lesser palatine n., a., v.); pterygoid canal (n., a. & v. of pterygoid canal)",
             "<b>To the nasal cavity:</b> sphenopalatine foramen (sphenopalatine a. & v., medial & lateral superior posterior nasal branches of V2)",
             "<b>From infratemporal fossa:</b> pterygomaxillary fissure (maxillary a., pterygoid plexus)"]},
      {h:"Contents",
       list:["Pterygopalatine ganglion + pterygopalatine n.",
             "Maxillary nerve (V2) — zygomatic, infraorbital, posterior superior alveolar nn.",
             "Nerve of pterygoid canal — fused greater (parasympathetic) + deep (sympathetic) petrosal nerves",
             "Greater palatine n.",
             "Maxillary artery — infraorbital a., sphenopalatine a.",
             "Pterygoid venous plexus"]},
      {img:"pterygopalatine-fossa.jpg", caption:"Pterygopalatine fossa with V2 and pterygopalatine ganglion"},
    ]
  },
  "skull-base":{
    title:"Cranial base — external & internal",
    parent:"head",
    body:[
      {h:"External cranial base — overview",
       p:"Extends from the superior incisor teeth anteriorly to the external occipital protuberance posteriorly. Divided into anterior, middle, posterior, and lateral parts."},
      {h:"Anterior part",
       list:["Alveolar processes of maxilla with the dental alveoli",
             "Choanae (posterior opening of nasal cavity to nasopharynx)",
             "Bony palate — palatine process of maxilla anteriorly + horizontal plate of palatine posteriorly",
             "Foramina: incisive (nasopalatine n., sphenopalatine a.); greater palatine; lesser palatine"]},
      {h:"Middle part — choanae → anterior margin of foramen magnum",
       list:["Body of sphenoid; petrous parts of temporal bones; basilar part of occipital",
             "Foramen lacerum — mostly cartilage; transmits artery & nerve of pterygoid canal",
             "Pterygomaxillary fissure — terminal part of maxillary a., superior alveolar n.",
             "Foramen ovale — V3, lesser petrosal n., accessory meningeal br. of maxillary a., emissary v.",
             "Foramen spinosum — middle meningeal a., meningeal br. of V3",
             "Carotid canal — internal carotid a., carotid (sympathetic) plexus"]},
      {h:"Posterior part — formed by occipital bone",
       list:["Foramen magnum — lower medulla, meninges, vertebral aa., spinal accessory n. (CN XI)",
             "Jugular foramen — anterior to posterior: inferior petrosal sinus, CN IX, X, XI, IJV",
             "Hypoglossal canal — CN XII",
             "Condylar canal — occipital emissary v. (to suboccipital plexus, occipital sinus, sigmoid sinus)",
             "Canaliculus for tympanic n. — CN IX tympanic br.",
             "Mastoid canaliculus / Arnold's canal — CN X auricular br."]},
      {h:"Lateral part",
       list:["Zygomatic arch; infratemporal fossa; mandibular fossa; tympanic plate of temporal bone; styloid & mastoid processes",
             "Petrotympanic fissure — chorda tympani (CN VII)",
             "Stylomastoid foramen — CN VII & stylomastoid a.",
             "External acoustic opening",
             "Musculotubal canal — auditory tube and tensor tympani; lies in front of the carotid canal",
             "Fossula petrosa — tympanic ganglion of CN IX",
             "Cochlear canaliculus — cochlear aqueduct"]},
      {img:"external-skull-base.jpg", caption:"External cranial base — landmarks and foramina"},
      {h:"Internal cranial base — three fossae",
       p:"The internal cranial base is concave-like; it is divided into anterior, middle, and posterior cranial fossae."},
      {h:"Anterior cranial fossa",
       list:["Borders: cribriform plate & crista galli (ethmoid), orbital plate of frontal bone (inferiorly), lesser wings of sphenoid (posteriorly), frontal bone (anterolaterally)",
             "Structures: frontal lobe of cerebral cortex; olfactory bulb & tract; orbital gyri",
             "Openings: anterior ethmoidal foramen (anterior ethmoidal vessels & n.); cribriform foramina (olfactory nn.)"]},
      {h:"Middle cranial fossa",
       list:["Borders: body & greater wings of sphenoid; squamous & petrous parts of temporal bone",
             "Structures: pituitary gland (sella turcica); temporal lobes",
             "Openings: optic canal (CN II, ophthalmic a.); superior orbital fissure (CN III, IV, VI, V1, ophthalmic vv., sympathetics from cavernous plexus); foramen rotundum (V2); foramen ovale (V3, lesser petrosal n., accessory meningeal a., emissary v.); foramen spinosum (middle meningeal a. & v., meningeal br. V3); foramen lacerum; carotid canal (ICA); hiatus for greater & lesser petrosal nn."]},
      {h:"Posterior cranial fossa",
       list:["Borders: dorsum sellae anteriorly; groove for transverse sinus posteriorly; petrous portion of temporal bone & basilar part of occipital bone; laterally parts of occipital bone",
             "Structures: cerebellum (in cerebellar fossae); brainstem",
             "Openings: internal acoustic meatus (CN VII, VIII, labyrinthine a.); foramen magnum (medulla, meninges, vertebral aa., spinal accessory n. ascending, dural vv., anterior & posterior spinal aa.); opening of vestibular canaliculus (vestibular aqueduct); mastoid foramen (mastoid emissary v., br. of occipital a., posterior meningeal a.); hypoglossal canal (CN XII); condylar canal (occipital emissary v.); jugular foramen (CN IX, X, XI [descending]; IJV; inferior petrosal sinus; sigmoid sinus; meningeal brs. of ascending pharyngeal & occipital aa.)"]},
      {img:"internal-skull-base.jpg", caption:"Internal cranial base — three fossae and their openings"},
    ]
  },
  "cranial-nerves":{
    title:"Cranial nerves I–XII",
    parent:"head",
    body:[
      {h:"CN I — Olfactory",
       list:["Function: smell",
             "Opening in skull: cribriform plate of ethmoid",
             "Course: olfactory receptors in nasal epithelium → fila olfactoria pierce cribriform plate → olfactory bulb (anterior cranial fossa) → olfactory tract → primary olfactory cortex (periamygdaloid & piriform cortex), secondary in entorhinal area 28"]},
      {h:"CN II — Optic",
       list:["Function: vision",
             "Opening in skull: optic canal",
             "Course: retinal ganglion cell axons → optic nerve → optic canal → optic chiasm (middle cranial fossa) → optic tract → lateral geniculate nucleus (LGN) → optic radiation → primary visual cortex (Brodmann area 17, occipital lobe)"]},
      {h:"CN III — Oculomotor",
       list:["Nuclei: main motor + accessory parasympathetic (Edinger-Westphal) — anterior to cerebral aqueduct at level of superior colliculus",
             "Function: motor to most extraocular muscles, pupil constriction (parasympathetic), accommodation",
             "Opening in skull: superior orbital fissure",
             "Course: anterior midbrain → cavernous sinus (lateral wall) → SOF → divides into superior branch (sup. rectus, levator palpebrae sup.; carries sympathetics to superior tarsal m.) and inferior branch (inf. rectus, med. rectus, inf. oblique; pre-ganglionic parasympathetics to ciliary ganglion → sphincter pupillae & ciliary muscle)"]},
      {h:"CN IV — Trochlear",
       list:["Nucleus: floor of cerebral aqueduct in dorsal midbrain at level of inferior colliculus",
             "Function: superior oblique m. (depresses, intorts, abducts the eye)",
             "Opening in skull: superior orbital fissure",
             "Course: only CN to leave posterior surface of brainstem; passes through lateral wall of cavernous sinus"]},
      {h:"CN V — Trigeminal",
       list:["Nuclei: 3 sensory (mesencephalic, pontine/principal, spinal) + 1 motor (in pons)",
             "Function: facial sensation; muscles of mastication; tensor tympani; tensor veli palatini; mylohyoid; anterior belly of digastric",
             "Branches/Openings: V1 ophthalmic — superior orbital fissure; V2 maxillary — foramen rotundum; V3 mandibular — foramen ovale (carries motor root)"]},
      {h:"CN VI — Abducens",
       list:["Nucleus: floor of 4th ventricle, lower pons",
             "Function: lateral rectus (abduction)",
             "Opening in skull: superior orbital fissure",
             "Course: pontomedullary junction → subarachnoid space → Dorello's canal → cavernous sinus (within sinus, not in lateral wall) → SOF"]},
      {h:"CN VII — Facial",
       list:["Function: motor — muscles of facial expression, stapedius, stylohyoid, posterior belly of digastric; parasympathetic — lacrimal, submandibular, sublingual glands; taste anterior 2/3 of tongue (via chorda tympani); somatic sensation external acoustic meatus",
             "Openings: internal acoustic meatus → facial canal → exits at stylomastoid foramen; chorda tympani → petrotympanic fissure"]},
      {h:"CN VIII — Vestibulocochlear",
       list:["Function: hearing (cochlear) and balance (vestibular)",
             "Opening: internal acoustic meatus"]},
      {h:"CN IX — Glossopharyngeal",
       list:["Function: motor stylopharyngeus; parasympathetic to parotid (via lesser petrosal n. + otic ganglion); sensation oropharynx; taste posterior 1/3 tongue; carotid body/sinus chemo- & baroreceptors",
             "Opening: jugular foramen"]},
      {h:"CN X — Vagus",
       list:["Function: motor — pharynx, larynx, palate (excluding tensor veli palatini & stylopharyngeus); parasympathetic to thoracic & abdominal viscera (down to splenic flexure); sensation external acoustic meatus (auricular branch — Arnold's nerve)",
             "Opening: jugular foramen"]},
      {h:"CN XI — Accessory",
       list:["Function: SCM and trapezius (spinal root)",
             "Opening: jugular foramen (descending — exits the skull)"]},
      {h:"CN XII — Hypoglossal",
       list:["Function: all intrinsic & extrinsic muscles of tongue (except palatoglossus)",
             "Opening: hypoglossal canal"]},
      {img:"cranial-nerves.jpg", caption:"Cranial nerves and their skull base openings"},
    ]
  },

  // -------------------- NECK --------------------
  "anterior-triangle":{
    title:"Anterior triangle of neck",
    parent:"neck",
    body:[
      {h:"Overview",
       p:"The neck is divided into an anterior and a posterior (lateral) triangle by the SCM. The anterior triangle is further subdivided into the muscular, carotid, submandibular and submental triangles by the digastric and omohyoid muscles."},
      {h:"Submandibular triangle — borders",
       list:["Superior: lower part of body of mandible",
             "Inferoposterior: posterior belly of digastric",
             "Inferoanterior: anterior belly of digastric",
             "Floor: mylohyoid & hyoglossus muscles",
             "Roof: skin, superficial fascia (with platysma), deep cervical fascia"]},
      {h:"Lesser's (Pirogov's) triangle — within the submandibular triangle",
       list:["Superior: hypoglossal nerve",
             "Inferior: anterior & posterior bellies of digastric",
             "Use: assists locating the lingual artery (e.g. for ligation procedure)"]},
      {h:"Submandibular triangle — contents",
       list:["Nerves: mylohyoid, hypoglossal",
             "Arteries & veins: facial, sublingual, submental",
             "Submandibular gland",
             "Inferior portion of parotid gland",
             "Submandibular lymph nodes"]},
      {h:"Carotid triangle — borders",
       list:["Lateral: SCM",
             "Cranial: posterior belly of digastric",
             "Caudoanterior: superior belly of omohyoid"]},
      {h:"Carotid triangle — contents",
       list:["Common carotid (bifurcates here into ECA & ICA)",
             "Internal jugular vein",
             "External & internal laryngeal nn. (CN X)",
             "CN XI (spinal accessory), CN XII (hypoglossal)",
             "Ansa cervicalis",
             "Sympathetic trunk",
             "Larynx, thyroid"]},
      {img:"anterior-triangle.jpg", caption:"Subdivisions of the anterior triangle of the neck"},
    ]
  },
  "posterior-triangle":{
    title:"Posterior (lateral) triangle of neck",
    parent:"neck",
    body:[
      {h:"Borders of the posterior (lateral) cervical region",
       list:["Anterior: SCM",
             "Posterior: trapezius",
             "Inferior: clavicle"]},
      {h:"Subdivisions",
       p:"Subdivided by the inferior belly of omohyoid into the occipital triangle (above) and the subclavian (omoclavicular) triangle (below)."},
      {h:"Subclavian triangle",
       list:["Superior: inferior belly of omohyoid",
             "Inferior: clavicle",
             "Anterior: SCM",
             "Contents: 3rd part of subclavian a., subclavian v., trunks of brachial plexus, supraclavicular nerves, EJV (terminal portion)"]},
      {h:"Occipital triangle",
       list:["Inferior: inferior belly of omohyoid",
             "Anterior: SCM",
             "Posterior: trapezius",
             "Contents: spinal accessory n. (CN XI) — most superficial; cervical plexus brs. (lesser occipital, great auricular, transverse cervical, supraclavicular); occipital lymph nodes; transverse cervical a."]},
      {img:"posterior-triangle.jpg", caption:"Posterior cervical triangle and its subdivisions"},
    ]
  },
  "scalene-fissure":{
    title:"Scalene fissure (interscalene triangle)",
    parent:"neck",
    body:[
      {h:"Borders",
       list:["Anteriorly: anterior scalene muscle",
             "Posteriorly: middle scalene muscle",
             "Inferiorly: first rib"]},
      {h:"Contents",
       list:["Brachial plexus (trunks)",
             "Subclavian artery (3rd part)",
             "(Note: the subclavian vein passes anterior to the anterior scalene, NOT through the fissure)"]},
      {img:"scalene-fissure.jpg", caption:"The scalene fissure with brachial plexus and subclavian artery"},
      {h:"Clinical",
       p:"Compression of the neurovascular bundle here is one cause of thoracic outlet syndrome."},
    ]
  },

  // -------------------- CHEST --------------------
  "thoracic-wall":{
    title:"Thoracic wall topography",
    parent:"chest",
    body:[
      {h:"Layers",
       p:"Superficial skin → subcutaneous fat (except sternal area) → superficial common thoracic fascia (covers pectorals, serratus anterior, origin of external oblique; dorsolaterally also covers latissimus dorsi)."},
      {h:"Veins",
       p:"Thoraco-epigastric veins lie in subcutaneous tissue of the anterior and lateral chest walls and drain into the lateral thoracic vein → axillary vein. (Important collateral pathway in caval obstruction.)"},
      {h:"Intercostal space",
       p:"There are 11 intercostal spaces per side (numbered for the rib above). Each contains: intercostal vein, artery, and nerve (VAN, superior → inferior) and intercostal lymph nodes."},
      {img:"intercostal-space.jpg", caption:"Cross-section of an intercostal space (VAN bundle in the costal groove)"},
      {h:"Surface projections of the heart",
       list:["2nd intercostal space, right — 1 cm lateral to the sternum",
             "5th intercostal space, right — near the linea sternalis",
             "5th intercostal space, left — medial to the midclavicular line; corresponds to the apex of the heart",
             "2nd intercostal space, left — 2 cm lateral to the sternum"]},
      {h:"Surface projections of the lungs",
       p:"The apex projects superior to the 1st rib toward the neck. The horizontal pulmonary fissure projects onto the 4th intercostal space medially (right side)."},
      {h:"Pneumothorax",
       list:["Caused by entry of air into the pleural cavity → collapse of the lung",
             "Primary spontaneous — rupture of small subpleural blebs (e.g. with pressure changes; scuba diving)",
             "Secondary spontaneous — due to underlying lung disease",
             "Traumatic — gunshot, stab, blunt thoracic injury",
             "Tension — pleural air pressure exceeds atmospheric → mediastinal shift, decreased venous return",
             "Treatment: chest tube via the 5th–6th intercostal space at the midaxillary line ('nipple level')"]},
      {div:"callout warn", text:"<b>Clinical:</b> The neurovascular bundle runs along the inferior border of each rib — needles for thoracocentesis or chest tubes are inserted along the <b>upper border</b> of the rib below to avoid the bundle."},
    ]
  },
  "mediastinum":{
    title:"Mediastinum",
    parent:"chest",
    body:[
      {h:"Borders",
       list:["Anterior: thoracic wall (sternum & costal cartilages 1–5)",
             "Posterior: superior thoracic vertebral bodies",
             "Lateral: parietal pleura (mediastinal pleura)",
             "Superior: superior thoracic aperture",
             "Inferior: diaphragm"]},
      {h:"Divisions",
       list:["Superior mediastinum — above the thoracic plane (sternal angle to T4–T5 disc)",
             "Inferior mediastinum — below the thoracic plane:",
             "&nbsp;&nbsp;Anterior inferior mediastinum",
             "&nbsp;&nbsp;Middle inferior mediastinum",
             "&nbsp;&nbsp;Posterior inferior mediastinum"]},
      {h:"Key contents by compartment",
       list:["<b>Superior:</b> thymus (or its remnant), great vessels (arch of aorta, brachiocephalic vv. → SVC), trachea, esophagus, thoracic duct, vagus & phrenic nn., sympathetic trunk",
             "<b>Anterior inferior:</b> thymic remnants, lymph nodes, fat",
             "<b>Middle inferior:</b> heart in pericardium, ascending aorta, pulmonary trunk & main bronchi, phrenic nn.",
             "<b>Posterior inferior:</b> thoracic aorta, esophagus, thoracic duct, azygos & hemiazygos vv., sympathetic trunk, splanchnic nn."]},
      {img:"mediastinum.jpg", caption:"Sagittal and transverse divisions of the mediastinum"},
    ]
  },
  "axilla":{
    title:"Axilla",
    parent:"chest",
    body:[
      {h:"Overview",
       p:"The axilla is a pyramidal region under the glenohumeral joint, containing neurovascular structures travelling between the neck/thorax and the upper limb."},
      {h:"Boundaries (pyramid with apex, base, 4 walls)",
       list:["Apex (cervicoaxillary canal): bounded by the clavicle (anteriorly), the 1st rib (medially), and the superior border of the scapula (posteriorly)",
             "Base: skin, superficial fascia, axillary fascia (deep)",
             "Anterior wall: pectoralis major and minor",
             "Posterior wall: subscapularis, teres major, latissimus dorsi",
             "Medial wall: serratus anterior overlying the upper 4–5 ribs",
             "Lateral wall: intertubercular sulcus of humerus"]},
      {h:"Contents",
       list:["Axillary artery (3 parts, divided by pec minor) and axillary vein",
             "Brachial plexus (cords and branches)",
             "Lymph nodes (mnemonic — APICAL):",
             "&nbsp;&nbsp;<b>P</b>ectoral (anterior)",
             "&nbsp;&nbsp;<b>S</b>ubscapular (posterior)",
             "&nbsp;&nbsp;<b>I</b>nfraclavicular",
             "&nbsp;&nbsp;<b>C</b>entral",
             "&nbsp;&nbsp;<b>A</b>pical",
             "&nbsp;&nbsp;<b>H</b>umeral (lateral)"]},
      {img:"axilla.jpg", caption:"Boundaries and contents of the axilla"},
    ]
  },

  // -------------------- ABDOMEN --------------------
  "abdomen-ruq":{
    title:"Right Upper Quadrant (RUQ)",
    parent:"abdomen",
    body:[
      {h:"Definition",
       p:"The RUQ is bounded medially by the median plane and inferiorly by the transumbilical plane."},
      {h:"Main contents",
       list:["Liver — right lobe (and most of the left lobe)",
             "Gallbladder — fundus projects at Murphy's point (right costal arch × midclavicular line)",
             "Pylorus of the stomach",
             "Duodenum (parts 1, 2, and the head of pancreas — Desjardin's point)",
             "Right kidney and right adrenal gland",
             "Hepatic flexure of the colon (right colic flexure)",
             "Portion of transverse colon"]},
      {h:"Common pathology localizing to RUQ",
       list:["Acute cholecystitis (Murphy's sign)",
             "Hepatitis, hepatic abscess",
             "Duodenal ulcer (peptic disease)",
             "Right-sided pyelonephritis"]},
      {img:"abdomen-ruq.jpg", caption:"RUQ — surface and visceral landmarks"},
    ]
  },
  "abdomen-luq":{
    title:"Left Upper Quadrant (LUQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Stomach (most of it; Labbé triangle is its surface projection)",
             "Spleen",
             "Body and tail of pancreas",
             "Left kidney and left adrenal gland",
             "Splenic flexure of colon (left colic flexure)",
             "Portion of transverse and descending colon"]},
      {h:"Common pathology localizing to LUQ",
       list:["Splenic rupture (e.g. trauma; Kehr's sign — referred pain to the left shoulder)",
             "Gastric ulcer",
             "Acute pancreatitis (body/tail)",
             "Left-sided pyelonephritis"]},
      {img:"abdomen-luq.jpg", caption:"LUQ — surface and visceral landmarks"},
    ]
  },
  "abdomen-rlq":{
    title:"Right Lower Quadrant (RLQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Cecum",
             "Vermiform appendix (root projects at McBurney's point — 1/3 from ASIS on the line ASIS → umbilicus; alternative — Lanz point on the interspinous line, 5 cm right of midline for pelvic appendix)",
             "Ascending colon",
             "Terminal ileum",
             "Right ovary & uterine tube (in females)",
             "Right ureter (lower portion)",
             "Right spermatic cord (in males)"]},
      {h:"Common pathology localizing to RLQ",
       list:["Acute appendicitis (McBurney's tenderness; Rovsing, Psoas, Obturator signs)",
             "Crohn's disease (terminal ileitis)",
             "Right ovarian / tubal pathology (e.g. ectopic pregnancy)",
             "Right ureteric stone"]},
      {img:"abdomen-rlq.jpg", caption:"RLQ — surface and visceral landmarks (incl. McBurney's & Lanz points)"},
    ]
  },
  "abdomen-llq":{
    title:"Left Lower Quadrant (LLQ)",
    parent:"abdomen",
    body:[
      {h:"Main contents",
       list:["Sigmoid colon",
             "Descending colon",
             "Left ovary & uterine tube (in females)",
             "Left ureter (lower portion)",
             "Left spermatic cord (in males)"]},
      {h:"Common pathology localizing to LLQ",
       list:["Diverticulitis (sigmoid)",
             "Left ovarian / tubal pathology",
             "Left ureteric stone"]},
      {img:"abdomen-llq.jpg", caption:"LLQ — surface and visceral landmarks"},
    ]
  },
  "abdominal-wall":{
    title:"Abdominal wall & rectus sheath",
    parent:"abdomen",
    body:[
      {h:"Layers (superficial → deep)",
       list:["Skin",
             "Camper's fascia — subcutaneous fat",
             "Scarpa's fascia — membranous layer; separates superficial fatty layer from deeper fatty layer",
             "Deep fatty layer — thinner than the superficial layer",
             "Superficial abdominal fascia (of external oblique)",
             "External oblique",
             "Internal oblique",
             "Transversus abdominis",
             "Transversalis fascia (part of parietal abdominal fascia)",
             "Parietal peritoneum"]},
      {img:"abdominal-wall-layers.jpg", caption:"Layers of the abdominal wall"},
      {h:"Rectus sheath",
       list:["Fibrous structure that envelops the rectus abdominis",
             "Formed by the aponeuroses of external oblique, internal oblique, and transversus abdominis",
             "Has anterior & posterior laminae",
             "Posterior lamina is deficient below the umbilicus — its inferior margin forms the <b>arcuate line</b>",
             "Aponeurotic fibers cross in the midline forming the <b>linea alba</b> (xiphoid → pubic symphysis)"]},
      {h:"Neurovasculature — superficial layer",
       list:["Lies between Camper's and Scarpa's fascia",
             "Arteries: superficial epigastric a. (from femoral a.), superficial circumflex iliac a. (from femoral a.)"]},
      {h:"Neurovasculature — deeper layer",
       list:["Posterior intercostal aa.",
             "Subcostal a.",
             "Lumbar aa.",
             "Inferior epigastric a. — runs deep to the lateral umbilical fold"]},
      {h:"Innervation",
       list:["Last 5 intercostal nn. and subcostal n.",
             "Skin of inguinal canal: ilioinguinal & iliohypogastric nn.",
             "Muscles supplied by: intercostal nn., iliohypogastric n., ilioinguinal n."]},
      {h:"Surgical incisions",
       list:["<b>Median (midline) incision</b> through linea alba — minimal blood loss; avoids major nerves; gives broad access to the abdomen",
             "<b>Paramedian incision</b> — lateral to linea alba; gives access to lateral structures (kidney, spleen, adrenals); ligates blood and nerve supply medial to it (causing atrophy of the muscle medially)",
             "<b>Kocher (subcostal) incision</b> — begins inferior to xiphoid and extends inferolaterally parallel to the right costal margin; access to the gallbladder",
             "<b>McBurney / gridiron incision</b> — at McBurney's point, classically for open appendicectomy",
             "<b>Pfannenstiel incision</b> — low transverse curved incision above the pubis (e.g. C-section)"]},
      {div:"callout", text:"<b>Tip:</b> The arcuate line and the linea alba are key surgical landmarks — useful for laparotomy planning and component-separation hernia repair."},
    ]
  },
  "inguinal":{
    title:"Inguinal region",
    parent:"abdomen",
    body:[
      {h:"Overview",
       p:"The inguinal region lies between the anterior superior iliac spine (laterally) and the pubic tubercle (medially). It is the lower lateral part of the abdominal wall, just above the thigh region."},
      {h:"Inguinal canal — overview",
       p:"An oblique passageway between the muscle layers of the lower anterior abdominal wall, with deep (internal) and superficial (external) openings."},
      {h:"Rings",
       list:["<b>Deep inguinal ring</b> — internal opening; an outpouching of transversalis fascia which becomes the internal spermatic fascia (innermost cover of the spermatic cord)",
             "<b>Superficial inguinal ring</b> — opening in the aponeurosis of external oblique; bounded by medial & lateral crura and intercrural fibers; visible only after dissecting off the external spermatic fascia"]},
      {h:"Borders",
       list:["Anterior wall: aponeurosis of external oblique (reinforced laterally by internal oblique)",
             "Posterior wall: transversalis fascia (reinforced medially by conjoint tendon)",
             "Floor: inguinal ligament (and lacunar ligament medially)",
             "Roof: arching fibers of internal oblique and transversus abdominis (conjoint tendon)"]},
      {h:"Contents",
       list:["<b>Spermatic cord</b> (males) / <b>round ligament of uterus</b> (females)",
             "<b>Ilioinguinal n.</b> (lies on top of cord; emerges through superficial ring)",
             "<b>Genital branch of genitofemoral n.</b> (within cord)"]},
      {img:"inguinal-canal.jpg", caption:"Inguinal canal — borders, rings, contents"},
      {h:"Hesselbach's (inguinal) triangle",
       list:["Medial: lateral margin of rectus abdominis",
             "Lateral: inferior epigastric a. & v.",
             "Inferior: inguinal ligament"]},
      {h:"Hernias",
       list:["<b>Indirect inguinal hernia</b> — congenital or acquired; lateral to the inferior epigastric vessels; passes through the deep ring, traverses the canal, exits the superficial ring (may descend into scrotum)",
             "<b>Direct inguinal hernia</b> — acquired; medial to the inferior epigastric vessels; pushes through the Hesselbach's triangle (supravesical fossa) and exits the superficial ring",
             "<b>Femoral hernia</b> — through the femoral ring, emerges inferior to the inguinal ligament; more common in females (proportionally wider pelvis); high risk of strangulation"]},
      {div:"callout warn", text:"<b>Mnemonic:</b> 'MD's don't lie' — <b>M</b>edial = <b>D</b>irect; lateral = indirect (relative to inferior epigastric vessels)."},
    ]
  },
  "peritoneum":{
    title:"Peritoneal cavity",
    parent:"abdomen",
    body:[
      {h:"Overview",
       p:"The peritoneal cavity is subdivided into the greater sac and the lesser sac (omental bursa)."},
      {h:"Greater sac",
       p:"Accounts for most of the space in the peritoneal cavity. Begins at the diaphragm and ends in the pelvic cavity. Contains all peritoneal organs."},
      {h:"Lesser sac (omental bursa)",
       p:"Found behind the stomach, in front of the pancreas. Continuous with the greater sac through the epiploic foramen (foramen of Winslow)."},
      {h:"Borders of the epiploic foramen",
       list:["Anterior: hepatoduodenal ligament (portal triad — bile duct, hepatic a., portal v.)",
             "Posterior: IVC",
             "Superior: caudate lobe of liver",
             "Inferior: superior part of duodenum"]},
      {img:"lesser-sac.jpg", caption:"Transverse section through the lesser sac"},
      {h:"Supra- and infracolic compartments",
       p:"The peritoneal cavity is divided by the transverse mesocolon into a supracolic (above) and infracolic (below) compartment."},
      {h:"Supracolic compartment",
       p:"Contains: liver, gallbladder, stomach, duodenum, pancreas, spleen, lesser omentum (hepatoduodenal & hepatogastric ligaments)."},
      {h:"Infracolic compartment",
       p:"Contains the small intestine, large intestine, and the horizontal & ascending parts of the duodenum. Divided by the root of the mesentery into right and left infracolic spaces, each supplied by unpaired branches of the abdominal aorta."},
      {h:"Peritoneal recesses",
       list:["Duodenojejunal flexure — superior, inferior duodenal folds & fossae",
             "Ileocecal junction — superior & inferior ileocecal recesses",
             "Sigmoid recess — intersigmoid recess (beneath the sigmoid mesocolon)"]},
      {h:"Retroperitoneal organs (mnemonic — SAD PUCKER)",
       list:["<b>S</b>uprarenal (adrenal) glands",
             "<b>A</b>orta and IVC",
             "<b>D</b>uodenum (parts 2–4)",
             "<b>P</b>ancreas (except tail)",
             "<b>U</b>reters",
             "<b>C</b>olon (ascending & descending)",
             "<b>K</b>idneys",
             "<b>E</b>sophagus (lower part)",
             "<b>R</b>ectum (middle and lower thirds)"]},
    ]
  },
  "duodenum-pancreas":{
    title:"Duodenum & pancreas",
    parent:"abdomen",
    body:[
      {h:"Duodenum — four parts (~25 cm long, C-shaped)",
       list:["<b>Superior</b> — projects to the level of L1; intraperitoneal; wider proximal lumen called the duodenal ampulla (cap)",
             "<b>Descending</b> — descends along L1–L3; major duodenal papilla (foregut → midgut transition); minor duodenal papilla above",
             "<b>Horizontal</b> — crosses the vertebral column at L3; passes over the IVC and is crossed anteriorly by the SMA & SMV (superior mesenteric vessels)",
             "<b>Ascending</b> — from inferior border of pancreas to L2; ends at the duodenojejunal junction left of the midline"]},
      {h:"Relationships",
       p:"The duodenum curves from the anterior aspect of the pancreas to the posterolateral aspect, so the head of pancreas lies within the duodenal C."},
      {h:"Pancreas",
       list:["<b>Level of L1</b>: body & tail. The body forms the omental tuberosity (creates the omental bursa behind the stomach). The tail extends to the splenic hilum.",
             "<b>Level of L2</b>: head & uncinate process. The IVC lies posterior to the head; the bile duct enters the head from posterior."]},
      {h:"Vessels",
       list:["Splenic a. — courses along the superior border of body and tail",
             "Splenic v. — posterior to the body; merges with the SMV (posterior to the pancreatic neck) → forms the hepatic portal vein"]},
      {img:"duodenum-pancreas.jpg", caption:"Duodenum & pancreas — topography"},
    ]
  },
  "retroperitoneum":{
    title:"Retroperitoneum",
    parent:"abdomen",
    body:[
      {h:"Definition",
       p:"The retroperitoneum is the part of the dorsal abdominal cavity between the posterior parietal peritoneum and the transversalis fascia. It is continuous with the subperitoneal space."},
      {h:"Spaces (divided by the perirenal/Gerota's fascia)",
       list:["Anterior pararenal space",
             "Perirenal space",
             "Posterior pararenal space"]},
      {h:"Retroperitoneal organs",
       p:"Duodenum (except ampulla), pancreas, ascending and descending colon, kidneys, suprarenal glands, ureters, bladder, uterus, and rectum. Some are 'secondary retroperitoneal' (originally intraperitoneal — duodenum, pancreas, ascending & descending colon)."},
      {h:"Vessels",
       list:["Abdominal aorta and IVC ('great vessels')",
             "Iliac vessels (to the legs)"]},
      {h:"Nerves",
       list:["Branches of lumbar plexus and sacral plexus",
             "Right and left lumbar sympathetic trunks",
             "Thoracic splanchnic nerves (sympathetic)",
             "Four lumbar splanchnic nerves (sympathetic)",
             "Autonomic (prevertebral) plexuses (e.g. abdominal aortic plexus)"]},
      {h:"Lymphatics",
       p:"Lumbar trunks, cisterna chyli, lumbar lymph nodes."},
      {img:"retroperitoneum.jpg", caption:"Retroperitoneal anatomy"},
    ]
  },
  "projection-points":{
    title:"Surface projection points (abdominal landmarks)",
    parent:"abdomen",
    body:[
      {h:"Labbé triangle",
       p:"Surface projection of the stomach. Borders: transpyloric line (left 9th costal arch ↔ right 9th costal arch) and the right 9th costal arch ↔ left 8th costal arch."},
      {h:"Desjardin's point",
       p:"Projection of the head of pancreas and major duodenal papilla. Located on the line: apex of right axilla → umbilicus, ~6–7 cm from umbilicus."},
      {h:"Murphy's point",
       p:"Projection of the fundus of the gallbladder. Intersection of the right costal arch with the right midclavicular line. Tenderness on inspiration here = Murphy's sign (cholecystitis)."},
      {h:"McBurney's point",
       p:"Projection of the root of the vermiform appendix. On the line ASIS → umbilicus, at the lateral one-third (i.e. ~1/3 from ASIS)."},
      {h:"Lanz point",
       p:"Projection of a pelvic appendix. On the interspinous line (right ASIS ↔ left ASIS), 5 cm to the right of midline."},
      {img:"abdominal-projection-points.jpg", caption:"Classic abdominal projection points"},
    ]
  },

  // -------------------- PELVIS --------------------
  "male-pelvis":{
    title:"Male pelvis",
    parent:"pelvis",
    body:[
      {h:"Overview",
       p:"The male pelvis is located in the lower part of the abdomen and contains the urinary bladder, urethra, ureters, rectum, ductus deferens (with ampullae), seminal glands, and prostate."},
      {h:"Bony pelvis comparison (male vs. female)",
       list:["Male outlet narrower and less oval; pelvic inlet narrower dorsally",
             "Pubic arch — closer to 60° in males, closer to 90° in females",
             "Sacrum — more curved in males, less curved in females; tends to impinge upon the outlet"]},
      {h:"Sagittal anatomy (anterior → posterior)",
       list:["Pubic symphysis",
             "Urinary bladder → prostatic urethra → membranous urethra → spongy urethra (penis)",
             "Prostate (surrounding the prostatic urethra), seminal vesicles, ductus deferens (ampulla)",
             "Rectovesical pouch (peritoneal recess between bladder and rectum — most dependent in males)",
             "Rectum, anal canal"]},
      {img:"male-pelvis-sagittal.jpg", caption:"Sagittal section of the male pelvis"},
    ]
  },
  "female-pelvis":{
    title:"Female pelvis & continence",
    parent:"pelvis",
    body:[
      {h:"Topography",
       list:["<b>Uterus</b> — posterosuperior to the urinary bladder, anterior to the rectum",
             "Anterior part of the uterus is covered by peritoneum, creating the <b>vesico-uterine pouch</b> anteriorly and the <b>recto-uterine pouch (Pouch of Douglas)</b> posteriorly",
             "Normal uterus is anteverted (relative to vagina) and anteflexed (relative to cervix)",
             "The peritoneal fold from the uterus is the <b>broad ligament</b>; basal part = <b>cardinal ligament</b> (lateral cervical lig.) — runs from cervix to lateral pelvic wall",
             "<b>Uterine tube</b> — on its posterior wall the ovary hangs on the mesovarium; proper ligament of ovary (lower pole → uterine horn); suspensory ligament of ovary (upper pole → pelvic wall); these subdivide the broad ligament into mesosalpinx (upper) and mesometrium (lower)",
             "<b>Vagina</b> — touches ventrally the posterior surface of the bladder and urethra; rectum is posterior; enveloped by the urethrovaginal sphincter as it passes the urogenital diaphragm; posterior fornix contacts the peritoneum at the bottom of the rectouterine pouch (culdocentesis target)",
             "<b>Urethra</b> — surrounded below by the external urethral sphincter; posterior wall contacts the inferior anterior vaginal wall"]},
      {img:"female-pelvis-sagittal.jpg", caption:"Sagittal section of the female pelvis"},
      {h:"Mechanism of continence",
       p:"As the bladder fills, pressure is low and detrusor remains relaxed. Increasing fullness raises bladder afferent activity to the dorsal horn → spinal interneurons activate somatic pudendal and sympathetic hypogastric efferents. Pudendal somatic activation contracts the striated urethral sphincter and increases pelvic-diaphragm tone. Hypogastric sympathetic activation inhibits detrusor and contracts urethral smooth muscle. Information also reaches the pontine continence center, periaqueductal gray, and right anterior cingulate cortex — all promote continence."},
      {h:"Voiding",
       p:"When permitted, bladder afferents reach the periaqueductal gray → activate the pontine micturition center → parasympathetic pelvic efferents to detrusor → contraction; concurrently, sympathetic and somatic efferents to the urethra are inhibited → urethral relaxation and urine flow."},
      {div:"callout", text:"Continence also depends on intact anatomic supports of the pelvic organs and sufficient urethral pressure (especially the levator ani's puborectalis and pubovaginalis components)."},
    ]
  },
  "pelvic-floor":{
    title:"Pelvic floor & ischioanal fossa",
    parent:"pelvis",
    body:[
      {h:"Pelvic floor — overview",
       p:"Closure of the trunk inferiorly and posteriorly. Formed by the pelvic diaphragm and the urogenital diaphragm. Provides passage for the rectum, vagina, urethra. Part of the deep stabilizing system."},
      {h:"Pelvic diaphragm — Levator ani + coccygeus",
       list:["<b>Iliococcygeus</b> — origin: ischial spine + tendinous arch of levator ani; insertion: coccyx (lateral) + iliococcygeal raphe",
             "<b>Pubococcygeus</b> — muscular band between pubis and coccyx; encircles pelvic organs",
             "<b>Puborectalis</b> — origin: superior ramus of pubis; encircles the rectum (forming the anorectal angle)",
             "Functions: maintains intra-abdominal pressure; supports pelvic contents; closes the rectum; elevates pelvic floor and anus",
             "Innervation: pudendal n., anterior rami S2–S4"]},
      {h:"Coccygeus (ischiococcygeus)",
       list:["Thin muscle merging with the sacrospinous ligament",
             "Origin: ischial spine, sacrospinous ligament, pelvic wall",
             "Insertion: coccyx, S5 vertebra",
             "Function: pulls coccyx ventrally during defecation and delivery",
             "Innervation: anterior ramus S4"]},
      {h:"External anal sphincter",
       list:["Subcutaneous part — below the internal anal sphincter",
             "Superficial part — encircles the caudal portion of the internal anal sphincter",
             "Deep part — encircles cranial part of the internal anal sphincter; partially merges with puborectalis",
             "Function: compresses the anal canal; maintains anorectal continence",
             "Innervation: pudendal n., anterior rami S3–S4"]},
      {h:"Urogenital diaphragm",
       list:["Mainly the deep transverse perineal muscle (origin: ischial ramus & inferior ramus, internal surfaces; insertion: urogenital hiatus)",
             "Superficial transverse perineal muscle (only in men) — origin: ischial tuberosity; insertion: perineal body central tendon",
             "Innervation: deep branch of perineal n. (pudendal, S2–S4)",
             "Function: support and stabilize pelvic organs and the central tendon",
             "Transverse perineal ligament — anterior; completes the urogenital diaphragm"]},
      {h:"Pelvic & UG diaphragm fasciae",
       p:"Both diaphragms are covered above and below by superior and inferior fasciae (perineal membrane = inferior UG diaphragmatic fascia)."},
      {h:"Ischioanal (ischiorectal) fossa",
       p:"Wedge-shaped, fat-filled space between the pelvic and urogenital diaphragms; opens posteriorly. Contains the pudendal canal (Alcock's canal) on its lateral wall, which transmits the pudendal n. and internal pudendal vessels."},
      {img:"pelvic-floor-frontal.jpg", caption:"Frontal section of the pelvis showing the ischioanal fossa"},
    ]
  },
  "perineum":{
    title:"Perineum",
    parent:"pelvis",
    body:[
      {h:"Overview",
       p:"The perineum is the most inferior part of the pelvic outlet, between the thighs. It supports the urogenital and gastrointestinal systems and is essential for micturition, defecation, sexual intercourse, and childbirth."},
      {h:"Anatomical borders",
       list:["Anterior: pubic symphysis",
             "Posterior: tip of the coccyx",
             "Lateral: inferior pubic & ischial rami; sacrotuberous ligament",
             "Roof: pelvic floor",
             "Base: skin and fascia"]},
      {h:"Surface borders",
       list:["Anterior: mons pubis (♀) / base of penis (♂)",
             "Lateral: medial surfaces of the thighs",
             "Posterior: superior end of the intergluteal cleft"]},
      {h:"Subdivision",
       p:"A theoretical line drawn between the ischial tuberosities divides the perineum into the urogenital triangle (anterior) and the anal triangle (posterior)."},
      {h:"Urogenital triangle",
       list:["Bounded by pubic symphysis, ischiopubic rami, and the interischial line",
             "Has an additional layer of strong deep fascia — the perineal membrane",
             "Contents: external genitalia and urethra",
             "Pouches: superficial perineal pouch (above perineal membrane); deep perineal pouch"]},
      {h:"Anal triangle",
       list:["Bounded by coccyx, sacrotuberous ligaments, and the interischial line",
             "Contents: anal aperture, external anal sphincter, ischioanal fossae (×2)",
             "Pudendal n. supplies somatic fibres to the perineum"]},
      {h:"Perineal fascia",
       list:["Deep fascia: covers superficial perineal muscles and protruding structures (penis, clitoris)",
             "Superficial fascia — two layers:",
             "&nbsp;&nbsp;Superficial layer (continuous with Camper's fascia)",
             "&nbsp;&nbsp;Deep layer — Colles' fascia (continuous with Scarpa's fascia)"]},
      {h:"Perineal body (central tendon)",
       p:"Fibrous node in the centre of the perineum — common origin/insertion for: bulbospongiosus, superficial & deep transverse perineal mm., external anal sphincter, fibres of levator ani (especially puborectalis), and external urethral sphincter (in part)."},
      {img:"perineum.jpg", caption:"Diamond-shaped perineum: urogenital and anal triangles"},
    ]
  },

  // -------------------- BACK / VERTEBRAL CANAL --------------------
  "vertebral-canal":{
    title:"Vertebral canal — topography",
    parent:"back",
    body:[
      {h:"Overview",
       p:"Formed by the vertebral foramina of successive vertebrae of the articulated vertebral column. Extends from the foramen magnum to the sacral hiatus and follows the vertebral curves."},
      {h:"Regional shape",
       list:["Cervical and lumbar regions — large and triangular (free mobility)",
             "Thoracic region — small and circular (less movement)",
             "Lumbar region — gradually decreases in size from L1 to L5; relatively wider in females"]},
      {h:"Clinical zones",
       list:["<b>Central zone</b> — between medial margins of facet joints",
             "<b>Lateral zones</b> (×2) — beneath facet joints, entering the intervertebral foramina",
             "Lateral zones subdivided into: subarticular (lateral recess), foraminal, and extraforaminal regions"]},
      {img:"vertebral-canal.jpg", caption:"Vertebral canal — central and lateral zones"},
    ]
  },
  "lumbar-puncture":{
    title:"Lumbar puncture & epidural anesthesia",
    parent:"back",
    body:[
      {h:"Epidural space",
       p:"Lies between the spinal dura and the wall of the vertebral canal. Contains epidural fat and the internal vertebral venous plexus (Batson's plexus)."},
      {h:"Epidural anesthesia",
       p:"Access to the epidural space is usually obtained in the lumbar region for the administration of anesthetic and analgesic drugs (and for endoscopy). The caudal route is mainly used for analgesic injections. Always entered in the midline posteriorly, where the depth of the space is greatest."},
      {h:"Lumbar puncture — adult technique",
       list:["Patient sitting or lying on the side on a flat surface",
             "Lumbar spine flexed maximally to separate the vertebral spines and expose the ligamentum flavum at the interlaminar window",
             "A line drawn between the highest points of the iliac crests almost always intersects the L4/L5 body",
             "Skin and soft tissues are anaesthetized; a needle is inserted between the spines of L3/L4 or L4/L5",
             "Needle angled in horizontal and sagittal planes to pierce the ligamentum flavum"]},
      {h:"Layers traversed by the needle (in order)",
       p:"<b>Skin → Subcutaneous tissue → Supraspinous ligament → Interspinous ligament → Ligamentum flavum → Epidural space → Dura → Arachnoid → Subarachnoid space</b>"},
      {h:"Lumbar puncture — neonates and infants",
       list:["Spinal cord usually terminates between L1–L5 in children aged 1–7; conus medullaris between T12–L3",
             "Position the baby (lying or sitting) for maximum convex curvature of the lumbar spine",
             "Needle and trocar inserted between L3 and L4 — approximately level with the iliac crests; insert immediately above or below the iliac crests",
             "Distance from skin to subarachnoid space ≈ 1.4 cm in neonates; increases with age"]},
      {div:"callout danger", text:"<b>Caution:</b> never enter above L2 in adults (risk of cord injury). Always confirm the iliac crest landmark and aim midline."},
      {img:"lumbar-puncture.jpg", caption:"Lumbar puncture technique and needle path"},
    ]
  },

  // -------------------- LIMBS --------------------
  "axilla-2":{
    title:"Axilla — boundaries & contents",
    parent:"upper-limb",
    body:[
      {h:"See chest → axilla",
       p:"For full content, see the Axilla page in the Chest region. Boundaries: pyramid with apex (cervicoaxillary canal), base (skin & axillary fascia) and 4 walls — anterior (pec major/minor), posterior (subscap, teres major, lat dorsi), medial (serratus anterior), lateral (intertubercular sulcus)."},
      {h:"Contents",
       list:["Axillary artery (3 parts) and axillary vein",
             "Cords and branches of the brachial plexus",
             "Axillary lymph nodes — APICAL (pectoral, subscapular, infraclavicular, central, apical, humeral)"]},
    ]
  },
  "upper-limb-regions":{
    title:"Upper limb regions",
    parent:"upper-limb",
    body:[
      {h:"Brachial region",
       p:"Anterior compartment — biceps brachii, brachialis, coracobrachialis (musculocutaneous n., brachial a.). Posterior compartment — triceps brachii (radial n., profunda brachii a.). Cubital fossa: medial — pronator teres; lateral — brachioradialis; superior — line between epicondyles. Roof — bicipital aponeurosis. Floor — brachialis & supinator. Contents — brachial a. & median n. medially; biceps tendon centrally; radial n. laterally."},
      {h:"Antebrachial region",
       p:"Anterior compartment — flexors and pronators (median & ulnar nn., radial & ulnar aa.). Posterior compartment — extensors and supinator (radial n.)."},
      {h:"Hand",
       p:"Thenar (median n.), hypothenar (ulnar n.), midpalmar and adductor compartments. Carpal tunnel: roof — flexor retinaculum; floor — carpal bones; contents — median n. + 9 long flexor tendons (4 FDS, 4 FDP, FPL)."},
    ]
  },
  "gluteal":{
    title:"Gluteal region",
    parent:"lower-limb",
    body:[
      {h:"Borders",
       list:["Roof: iliac crest",
             "Floor: lower border of gluteus maximus"]},
      {h:"Muscles — superficial layer",
       list:["Gluteus maximus",
             "Tensor fasciae latae"]},
      {h:"Muscles — deep layer",
       list:["Gluteus medius",
             "Gluteus minimus",
             "Piriformis",
             "Quadratus femoris",
             "Triceps coxae — gemellus inferior, gemellus superior, obturator internus"]},
      {h:"Nerves of the gluteal region",
       list:["Superficial — cluneal nerves: superior, middle, and inferior (cutaneous)",
             "Deep — branches of the sacral plexus:",
             "&nbsp;&nbsp;Superior gluteal n. — gluteus medius, gluteus minimus, tensor fasciae latae",
             "&nbsp;&nbsp;Inferior gluteal n. — gluteus maximus",
             "&nbsp;&nbsp;Sciatic n. — passes through; not innervating gluteal structures",
             "&nbsp;&nbsp;Posterior femoral cutaneous n. — skin of posterior thigh, buttock, posterior scrotum/labia",
             "&nbsp;&nbsp;Nerve to quadratus femoris",
             "&nbsp;&nbsp;Nerve to obturator internus",
             "&nbsp;&nbsp;Pudendal n. — sensory to external genitalia and skin around anus, anal canal, perineum; motor to pelvic muscles, external urethral & anal sphincters"]},
      {h:"Blood supply",
       p:"Superior and inferior gluteal arteries (from internal iliac a.). Veins follow a similar pattern, draining to the internal iliac vein. The superior gluteal a. supplies gluteal muscles, TFL and the hip joint. The inferior gluteal a. supplies gluteus maximus, piriformis, obturator internus, gemelli, and quadratus femoris."},
      {h:"Deep fascia of the gluteal region",
       p:"Lies under subcutaneous tissue. Thickens over gluteus medius to form an aponeurosis. Anteriorly attaches to inguinal ligament and superior pubic ramus; posteriorly to sacrum and coccyx."},
      {h:"Ligaments and bursae deep to the gluteus maximus",
       list:["Ligaments: sacrotuberous, sacrospinous, ischiofemoral",
             "Bursae: trochanteric bursa; ischial bursa; bursa between gluteus maximus and vastus lateralis"]},
      {h:"Greater sciatic foramen — structures passing",
       list:["<b>Suprapiriform:</b> superior gluteal n.; superior gluteal vessels",
             "<b>Infrapiriform:</b> inferior gluteal n.; inferior gluteal vessels; sciatic n.; posterior cutaneous n. of thigh; n. to quadratus femoris; pudendal n.; internal pudendal vessels; n. to obturator internus"]},
      {h:"Lesser sciatic foramen",
       list:["Tendon of obturator internus",
             "Pudendal nerve",
             "Internal pudendal vessels",
             "Note: gemellus muscles' origins fill most of the foramen"]},
      {div:"callout warn", text:"<b>Clinical:</b> intramuscular injections are given in the <b>anterosuperior quadrant</b> of the gluteal region (gluteus medius / minimus) to avoid the sciatic nerve."},
      {img:"gluteal.jpg", caption:"Gluteal region — superficial & deep muscles, sciatic foramina"},
    ]
  },
  "anterior-thigh":{
    title:"Anterior thigh — iliopectineal fossa, femoral triangle",
    parent:"lower-limb",
    body:[
      {h:"Femoral triangle — borders",
       list:["Superior (base): inguinal ligament",
             "Lateral: medial border of sartorius",
             "Medial: medial border of adductor longus"]},

function el(tag, attrs={}, ...children){
    const e = document.createElement(tag);
    for(const k in attrs){
        if(k==="class") e.className = attrs[k];
        else if(k==="html") e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
    }
    for(const c of children){
        if(c==null) continue;
        if(typeof c === "string") e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
    }
    return e;
}

function setActiveNav(){
    const links = document.querySelectorAll('#topnav a');
    const cur = location.hash || '#/welcome';
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === cur || (cur.startsWith('#/topography') && a.getAttribute('href')==='#/topography') || (cur.startsWith('#/region/') && a.getAttribute('href')==='#/topography') || (cur.startsWith('#/cns/') && a.getAttribute('href')==='#/cns-pns') ));
}

function renderImagePlaceholder(filename, caption){
    return `<figure class="imgbox empty">
      <img alt="${caption||filename}" src="images/${filename}" onerror="this.style.display='none';this.parentNode.classList.add('empty');"/>
      <div class="ph-label">When prompted by Claude Code, upload an image: <code>images/${filename}</code><br><i>${caption||''}</i></div>
    </figure>`;
}

function renderBlocks(blocks){
    let html = "";
    for(const b of blocks){
        if(b.h) html += `<h3>${b.h}</h3>`;
        if(b.p) html += `<p>${b.p}</p>`;
        if(b.list){
            html += "<ul>";
            for(const li of b.list) html += `<li>${li}</li>`;
            html += "</ul>";
        }
        if(b.img) html += renderImagePlaceholder(b.img, b.caption);
        if(b.div) html += `<div class="${b.div}">${b.text}</div>`;
    }
    return html;
}

function renderTermList(){
    const q = (document.getElementById("termq")?.value||"").toLowerCase();
    const cat = document.getElementById("termcat")?.value||"";
    const filtered = TERMS.filter(t=>{
        const s = (t.name+" "+t.borders+" "+t.definition+" "+t.category).toLowerCase();
        return (!q || s.includes(q)) && (!cat || t.category===cat);
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const list = document.getElementById("termlist");
    if(!list) return;
    if(!filtered.length){
        list.innerHTML = `<div class="no-results">No terms match your search.</div>`;

    list.innerHTML = filtered.map(t=>`
        <div class="term-card">

            <div class="borders"><b>Borders:</b> ${t.borders}</div>

function viewCnsSub(id){
    const d = CNS_DETAILS[id];
    if(!d) return `<p>Section not found: ${id}</p>`;
    const sec = CNS_PNS[d.parent];
    return `
    <div class="crumbs">
        <a href="#/cns-pns">CNS / PNS</a> &rsaquo;
        <span>${sec?sec.title:""}</span> &rsaquo;
        <span>${d.title}</span>
    </div>
    <div class="region-header">
        <h1>${d.title}</h1>
    </div>
    <div class="section">
        ${renderBlocks(d.body)}
    </div>
    <div style="margin-top:18px"><a class="btn ghost" href="#/cns-pns">← Back to CNS / PNS</a></div>
    `;
}

/* ====================================================================
   ROUTER
   ==================================================================== */
function route(){
    const h = location.hash || "#/welcome";
    const app = document.getElementById("app");
    let html = "";
    if(h==="#/welcome" || h==="#/" || h===""){
        html = viewWelcome();
    } else if(h==="#/terms"){
        html = viewTerms();
    } else if(h==="#/topography"){
        html = viewTopography();
    } else if(h==="#/cns-pns"){
        html = viewCnsPns();
    } else if(h.startsWith("#/region/")){
        html = viewRegion(h.replace("#/region/",""));
    } else if(h.startsWith("#/sub/")){
        html = viewSub(h.replace("#/sub/",""));
    } else if(h.startsWith("#/cns/")){
        html = viewCnsSub(h.replace("#/cns/",""));
    } else {
        html = viewWelcome();
    }
    app.innerHTML = html;
    setActiveNav();

    // Initialize body map panel after topography HTML is injected
    if(h==="#/topography"){
        bm.cur=[0,0,400,720]; bm.tgt=[0,0,400,720]; bm.active=null;
        if(bm.raf){cancelAnimationFrame(bm.raf);bm.raf=null;}
        bmUpdatePanel(null);
    }

    // Wire up Term Library search
    if(h==="#/terms"){
        renderTermList();
        document.getElementById("termq").addEventListener("input", renderTermList);
        document.getElementById("termcat").addEventListener("change", renderTermList);
    }
    window.scrollTo({top:0, behavior:"instant"});
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
