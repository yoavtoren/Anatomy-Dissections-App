<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Anatomy — Topography, Terms & CNS/PNS</title>
<style>
/* ============================================================
   PASTEL THEME — white base, red / yellow / blue palette
   ============================================================ */
:root{
    --bg:#FFFDF9;
    --panel:#FFFFFF;
    --panel-2:#F4F7FF;
    --ink:#2C3550;
    --muted:#7A8BAC;
    --accent:#5B8EF8;       /* pastel blue  */
    --accent-2:#FF8C8C;     /* pastel red   */
    --warn:#FFD166;         /* pastel yellow*/
    --danger:#FF7B7B;
    --border:#DDE8FF;
    --shadow:0 8px 24px rgba(91,142,248,.11);
    --radius:14px;
    --p-red:#FFADAD;
    --p-yellow:#FFD6A5;
    --p-blue:#A8C4F8;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}

/* ── Background: fixed pastel blobs + dot grid ── */
body{
    margin:0;padding:0;
    background-color:var(--bg);
    background-image:
        radial-gradient(ellipse 600px 500px at -8% -6%, rgba(168,196,248,.42), transparent 60%),
        radial-gradient(ellipse 500px 400px at 108% 12%, rgba(255,173,173,.32), transparent 55%),
        radial-gradient(ellipse 450px 360px at 52% 108%, rgba(255,214,165,.4), transparent 58%),
        radial-gradient(ellipse 280px 240px at 100% 75%, rgba(168,196,248,.22), transparent 60%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
}
body::before{
    content:"";position:fixed;inset:0;
    background-image:radial-gradient(circle, rgba(91,142,248,.09) 1.5px, transparent 1.5px);
    background-size:30px 30px;
    pointer-events:none;z-index:0;
}
header.site,#app,footer{position:relative;z-index:1}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Header ── */
header.site{
    position:sticky;top:0;z-index:20;
    background:rgba(255,253,249,.93);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    box-shadow:0 2px 14px rgba(91,142,248,.1);
}
header.site::after{
    content:"";position:absolute;bottom:0;left:0;right:0;height:2.5px;
    background:linear-gradient(90deg,var(--p-red) 0%,var(--p-yellow) 50%,var(--p-blue) 100%);
}
.nav{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px}
.brand{font-weight:700;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;color:var(--ink)}
.brand .dot{
    width:13px;height:13px;border-radius:50%;
    background:linear-gradient(135deg,var(--p-red),var(--p-yellow),var(--p-blue));
    box-shadow:0 2px 8px rgba(91,142,248,.3);
}
nav.menu{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
nav.menu a{
    padding:8px 14px;border-radius:10px;color:var(--muted);font-weight:500;font-size:14px;
    border:1px solid transparent;transition:all .15s;
}
nav.menu a:hover{background:rgba(91,142,248,.1);color:var(--ink);text-decoration:none;border-color:var(--border)}
nav.menu a.active{background:rgba(91,142,248,.13);color:var(--accent);border-color:rgba(91,142,248,.3);font-weight:600}
main{max-width:1240px;margin:0 auto;padding:32px 22px 80px}

/* ── Typography ── */
h1,h2,h3,h4{color:var(--ink);line-height:1.25}
h1{font-size:34px;margin:0 0 12px}
h2{font-size:24px;margin:32px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
h3{font-size:18px;margin:20px 0 8px;color:var(--accent)}
h4{font-size:15px;margin:14px 0 4px;color:var(--accent-2)}
p{margin:8px 0}
ul,ol{margin:8px 0 14px 22px}
li{margin:3px 0}
hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.muted{color:var(--muted)}
.kbd{background:var(--panel-2);padding:2px 6px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink)}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);background:var(--panel);font-size:12px;color:var(--muted);margin-right:6px}
.tag.green{color:#2A9D5C;border-color:#9FE0BB;background:#F0FFF8}
.tag.blue{color:#3A7CF0;border-color:#A8C4F8;background:#F0F5FF}
.tag.red{color:#D04040;border-color:#FFADAD;background:#FFF5F5}
.tag.amber{color:#CC8800;border-color:#FFD6A5;background:#FFFBF0}

/* ── Cards & Panels ── */
.card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;
    box-shadow:0 4px 16px rgba(91,142,248,.08);
}
.card+.card{margin-top:14px}
.btn{
    display:inline-block;padding:10px 18px;border-radius:10px;
    background:var(--accent);color:#fff;font-weight:600;border:none;cursor:pointer;
    transition:transform .1s ease,box-shadow .15s;
    box-shadow:0 4px 14px rgba(91,142,248,.35);
}
.btn:hover{transform:translateY(-1px);text-decoration:none;box-shadow:0 6px 20px rgba(91,142,248,.48)}
.btn.alt{background:transparent;color:var(--accent);border:1.5px solid var(--accent);box-shadow:none}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border);box-shadow:none}
.btn.small{padding:6px 12px;font-size:13px}
.grid{display:grid;gap:18px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media(max-width:900px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:600px){.grid{grid-template-columns:1fr !important}}

/* ── Hero / Welcome ── */
.hero{
    background:linear-gradient(140deg,#0D1B2A 0%,#162844 55%,#0D1B2A 100%);
    border:none;border-radius:22px;padding:0;margin-bottom:36px;
    box-shadow:0 20px 60px rgba(0,0,0,.22);
    position:relative;overflow:hidden;
    display:grid;grid-template-columns:1fr auto;align-items:stretch;
}
.hero::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(91,142,248,.12) 1px,transparent 1px);
    background-size:28px 28px;pointer-events:none;
}
.hero-glow{position:absolute;top:-100px;right:80px;width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle,rgba(91,142,248,.18),transparent 70%);pointer-events:none}
.hero-left{padding:56px 52px;position:relative;z-index:1}
.hero h1{font-size:46px;margin:0 0 14px;color:#fff;letter-spacing:-.5px;line-height:1.1;font-weight:800}
.hero h1 span{color:#7EB3FF}
.hero p.lead{font-size:16px;color:rgba(255,255,255,.58);max-width:480px;line-height:1.65;margin:0 0 32px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hero-btns .btn{background:#5B8EF8;color:#fff;border:none;padding:11px 22px;font-size:14px}
.hero-btns .btn:hover{background:#4A7EE8;box-shadow:0 6px 20px rgba(91,142,248,.45)}
.hero-btns .btn-outline{padding:10px 20px;border-radius:10px;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s}
.hero-btns .btn-outline:hover{border-color:rgba(255,255,255,.5);color:#fff;text-decoration:none}
.hero-right{display:flex;flex-direction:column;justify-content:center;gap:10px;padding:40px 44px 40px 0;position:relative;z-index:1}
.hero-chip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;cursor:pointer;transition:background .15s,border-color .15s;text-decoration:none}
.hero-chip:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.22);text-decoration:none}
.hero-chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hero-chip span{color:rgba(255,255,255,.8);font-size:13px;font-weight:600;white-space:nowrap}

/* Welcome page topography spotlight */
.topo-spot{display:grid;grid-template-columns:1fr 1fr;border-radius:20px;overflow:hidden;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.1);border:1px solid var(--border);margin-bottom:36px;transition:box-shadow .2s,transform .15s}
.topo-spot:hover{box-shadow:0 16px 48px rgba(0,0,0,.15);transform:translateY(-2px)}
.topo-spot-left{background:linear-gradient(145deg,#0D1B2A,#1A3460);padding:48px 44px;display:flex;flex-direction:column;justify-content:center}
.topo-spot-left h2{color:#fff;font-size:26px;margin:0 0 12px;border:none;padding:0;font-weight:800;line-height:1.2}
.topo-spot-left p{color:rgba(255,255,255,.58);font-size:14px;line-height:1.6;margin:0 0 24px;max-width:340px}
.topo-spot-right{position:relative;min-height:300px;overflow:hidden}
.topo-spot-right img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block}

/* Welcome tiles redesign */
.welcome-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
.w-tile{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:28px 24px;display:block;color:inherit;text-decoration:none;transition:transform .15s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden}
.w-tile::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,var(--accent));border-radius:3px 3px 0 0;opacity:0;transition:opacity .2s}
.w-tile:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,.1);border-color:rgba(91,142,248,.25);text-decoration:none;color:inherit}
.w-tile:hover::after{opacity:1}
.w-tile-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px;background:var(--ti,rgba(91,142,248,.1))}
.w-tile h3{font-size:17px;font-weight:700;margin:0 0 8px;color:var(--ink)}
.w-tile p{font-size:13px;color:var(--muted);margin:0;line-height:1.55}
.w-tile-arrow{position:absolute;bottom:20px;right:20px;color:var(--muted);font-size:18px;opacity:0;transition:opacity .15s,transform .15s}
.w-tile:hover .w-tile-arrow{opacity:1;transform:translateX(3px)}
.tile{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;cursor:pointer;transition:transform .15s,border-color .2s,box-shadow .2s;
    display:block;color:inherit;box-shadow:0 4px 14px rgba(91,142,248,.07);
}
.tile:hover{transform:translateY(-3px);border-color:var(--accent);text-decoration:none;box-shadow:0 8px 26px rgba(91,142,248,.17)}
.tile h3{margin:0 0 6px;color:var(--ink);font-size:20px}
.tile p{margin:0;color:var(--muted);font-size:14px}
.tile .icon{
    width:48px;height:48px;border-radius:12px;
    background:linear-gradient(135deg,rgba(168,196,248,.45),rgba(255,173,173,.3));
    display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;
    border:1px solid var(--border);
}

/* ── Body map SVG ── */
.bodymap-wrap{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
    display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:flex-start;
    box-shadow:0 4px 16px rgba(91,142,248,.08);
}
@media(max-width:900px){.bodymap-wrap{grid-template-columns:1fr}}
.bodymap{width:100%;max-width:360px;margin:0 auto;display:block;user-select:none}
.bodymap .silhouette{fill:#D4E5FF;stroke:#8CBCF0;stroke-width:1.3}
.bodymap .silhouette-2{fill:#EAF2FF;stroke:#A8C8F4;stroke-width:1.1}
.bodymap .hot{
    fill:rgba(91,142,248,.18);stroke:var(--accent);stroke-width:1.6;
    cursor:pointer;transition:fill .15s,stroke-width .15s;
}
.bodymap .hot:hover{fill:rgba(91,142,248,.42);stroke-width:2.4}
.bodymap .plus{
    fill:var(--accent);font-weight:700;font-size:22px;text-anchor:middle;
    pointer-events:none;
}
.bodymap .pulse{fill:var(--accent);animation:pulse 1.8s ease-out infinite;transform-origin:center}
@keyframes pulse{0%{opacity:.65;r:13}50%{opacity:.25;r:18}100%{opacity:.65;r:13}}
.legend{font-size:13px;color:var(--muted)}
.legend ul{list-style:none;padding:0;margin:0}
.legend li{padding:8px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--panel-2);cursor:pointer;transition:background .2s,border-color .2s}
.legend li:hover{background:rgba(91,142,248,.1);border-color:var(--accent);color:var(--ink)}
.legend li b{color:var(--ink)}

.subregion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:14px}
.subregion-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:14px;cursor:pointer;transition:transform .12s,border-color .2s,box-shadow .2s;
    box-shadow:0 3px 10px rgba(91,142,248,.07);
}
.subregion-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 18px rgba(91,142,248,.15)}
.subregion-card h4{margin:0 0 4px;color:var(--ink);font-size:15px}
.subregion-card p{margin:0;color:var(--muted);font-size:12.5px}

/* ── Term Library ── */
.term-search{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 16px}
.term-search input{
    flex:1 1 280px;padding:12px 14px;border-radius:10px;
    background:var(--panel);border:1px solid var(--border);color:var(--ink);font-size:15px;outline:none;
    box-shadow:0 2px 8px rgba(91,142,248,.07);
}
.term-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,142,248,.14)}
.term-search select{padding:10px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--border);color:var(--ink);font-size:14px}
.term-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.term-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
    transition:border-color .2s,box-shadow .2s;box-shadow:0 3px 10px rgba(91,142,248,.07);
}
.term-card:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(91,142,248,.14)}
.term-card h3{margin:0 0 6px;font-size:16px;color:var(--ink)}
.term-card .cat{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.term-card .borders{margin-top:8px;font-size:13.5px;color:var(--ink)}
.term-card .borders b{color:var(--accent-2)}
.no-results{padding:30px;text-align:center;color:var(--muted)}

/* ── Region detail pages ── */
.region-detail{display:grid;grid-template-columns:1fr;gap:18px}
.crumbs{font-size:13px;color:var(--muted);margin-bottom:6px}
.crumbs a{color:var(--accent)}
.region-header{
    background:linear-gradient(135deg,rgba(168,196,248,.22),rgba(255,173,173,.12));
    border:1px solid var(--border);border-radius:var(--radius);padding:24px;
    box-shadow:0 4px 14px rgba(91,142,248,.08);
}
.region-header h1{margin:0 0 6px;color:var(--ink)}
.region-header p{margin:0;color:var(--muted)}
.section{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
    box-shadow:0 4px 14px rgba(91,142,248,.07);
}
.section h2{margin-top:0}
.callout{border-left:3px solid var(--accent);background:rgba(91,142,248,.07);padding:10px 14px;border-radius:8px;margin:12px 0;font-size:14px}
.callout.warn{border-left-color:var(--warn);background:rgba(255,209,102,.1)}
.callout.danger{border-left-color:var(--danger);background:rgba(255,123,123,.1)}

/* ── Image placeholder ── */
.imgbox{margin:14px 0;border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;background:var(--panel-2);color:var(--muted);transition:border-color .2s}
.imgbox img{max-width:100%;border-radius:8px;display:block;margin:0 auto}
.imgbox.empty::before{content:"";display:inline-block;width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,rgba(168,196,248,.5),rgba(255,173,173,.35));margin-bottom:10px}
.imgbox .ph-label{font-size:13px;color:var(--muted)}
.imgbox .ph-label code{background:var(--panel);padding:2px 6px;border-radius:4px;color:var(--accent);border:1px solid var(--border);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}

/* ── Section with inline right-side image ── */
.sec-with-img{display:grid;grid-template-columns:1fr 220px;gap:18px;align-items:start;margin-bottom:2px}
.sec-with-img .sec-content{min-width:0}
.sec-with-img .sec-content h3{margin-top:20px}
.sec-img{margin:0;position:relative;width:100%}
.sec-img img{width:100%;display:block;border-radius:10px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.08)}
.sec-img figcaption{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;line-height:1.4;font-style:italic}
.sec-img-ph{width:100%;height:150px;border:2px dashed var(--border);border-radius:10px;background:var(--panel-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted)}
.sec-img-ph span{font-size:28px}
.sec-img-ph small{font-size:11px;font-family:ui-monospace,monospace;color:var(--muted);text-align:center;padding:0 8px;word-break:break-all}
/* Action buttons row on figure */
.sec-img-actions{position:absolute;top:5px;right:5px;z-index:2;display:flex;gap:4px}
.sec-img-act{width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,.13);background:rgba(255,255,255,.93);color:var(--accent);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.15);backdrop-filter:blur(4px)}
.sec-img-act:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Directional / border term colour coding ── */
[class^="dir-"]{font-weight:700;padding:1px 4px;border-radius:4px;font-size:.92em;letter-spacing:.01em;white-space:nowrap}
.dir-sup  {color:#1D4ED8;background:rgba(59,130,246,.13);border-bottom:2px solid rgba(59,130,246,.35)}   /* superior   — blue   */
.dir-inf  {color:#B91C1C;background:rgba(239,68,68,.12); border-bottom:2px solid rgba(239,68,68,.35)}    /* inferior   — red    */
.dir-lat  {color:#15803D;background:rgba(34,197,94,.13); border-bottom:2px solid rgba(34,197,94,.35)}    /* lateral    — green  */
.dir-med  {color:#C2410C;background:rgba(249,115,22,.13);border-bottom:2px solid rgba(249,115,22,.35)}   /* medial     — orange */
.dir-ant  {color:#6D28D9;background:rgba(139,92,246,.13);border-bottom:2px solid rgba(139,92,246,.35)}   /* anterior   — violet */
.dir-pos  {color:#92400E;background:rgba(217,119,6,.13); border-bottom:2px solid rgba(217,119,6,.35)}    /* posterior  — amber  */
.dir-roof {color:#9D174D;background:rgba(236,72,153,.13);border-bottom:2px solid rgba(236,72,153,.35)}   /* roof       — pink   */
.dir-floor{color:#0F766E;background:rgba(20,184,166,.13);border-bottom:2px solid rgba(20,184,166,.35)}   /* floor      — teal   */
.dir-deep {color:#075985;background:rgba(14,165,233,.13);border-bottom:2px solid rgba(14,165,233,.35)}   /* deep       — sky    */
.dir-sf   {color:#3F6212;background:rgba(132,204,22,.16);border-bottom:2px solid rgba(132,204,22,.4)}    /* superficial— lime   */
.dir-prox {color:#5B21B6;background:rgba(167,139,250,.17);border-bottom:2px solid rgba(167,139,250,.4)}  /* proximal   — purple */
.dir-dist {color:#9F1239;background:rgba(251,113,133,.16);border-bottom:2px solid rgba(251,113,133,.4)}  /* distal     — rose   */
.dir-cran {color:#1E3A8A;background:rgba(99,102,241,.13);border-bottom:2px solid rgba(99,102,241,.35)}   /* cranial    — indigo */
.dir-caud {color:#7F1D1D;background:rgba(252,165,165,.2);border-bottom:2px solid rgba(252,165,165,.5)}   /* caudal     — peach  */
/* General highlight classes applied by colorizeBlocks */
.hl-vert  {font-weight:700;color:#0369A1;background:rgba(186,230,253,.35);padding:0 3px;border-radius:3px}  /* vertebral levels C2, T8… */
.hl-cn    {font-weight:700;color:#7C3AED;background:rgba(221,214,254,.35);padding:0 3px;border-radius:3px}  /* CN I–XII */
.hl-arrow {font-weight:600;color:var(--accent)}                                                               /* → relationship arrows */
/* Bold terms in lists look like a marker */
li b,li strong,.sec-content li b,.sec-content li strong{background:rgba(251,191,36,.28);padding:0 2px;border-radius:2px;font-weight:700}
/* Label before ":" — stronger emphasis */
strong.li-label{background:none;color:var(--ink);font-weight:800;letter-spacing:-.01em;padding:0}

#img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;cursor:zoom-out}

#img-lightbox .lb-caption{color:rgba(255,255,255,.75);font-size:13px;max-width:700px;text-align:center;font-style:italic}
#img-lightbox .lb-close{position:absolute;top:16px;right:22px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;line-height:1;opacity:.7}
#img-lightbox .lb-close:hover{opacity:1}

/* ── CNS viewer sub-cards & quick-links ── */
.cns-sub-card{
    display:flex;align-items:center;gap:8px;padding:10px 12px;
    border-radius:10px;cursor:pointer;
    border:1px solid var(--border);background:var(--panel);
    margin-bottom:6px;transition:border-color .15s,background .15s,transform .12s;
}
.cns-sub-card:hover{border-color:var(--accent);background:var(--panel-2);transform:translateX(2px)}
.cns-ql-btn{
    width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);
    background:var(--panel);color:var(--ink);font-size:13px;font-weight:600;
    cursor:pointer;text-align:left;transition:border-color .15s,background .15s;
}
.cns-ql-btn:hover{border-color:var(--accent);background:rgba(91,142,248,.07)}
/* CNS SVG hotspots reuse #aoBodySvg rules via id override */
#cnsSvg{width:100%;height:100%;display:block;user-select:none}
#cnsSvg .hot{
    fill:#5B8EF8;stroke:rgba(255,255,255,.55);stroke-width:2;
    cursor:pointer;transition:fill .18s;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.55));
}
#cnsSvg .hot:hover{fill:#3A6BD4;stroke:rgba(255,255,255,.9);stroke-width:2.5}
#cnsSvg .plus{
    fill:#fff;font-weight:800;font-size:9px;text-anchor:middle;
    pointer-events:none;dominant-baseline:central;
}

/* ── Continuous region page ── */
.rj-wrap{
    position:sticky;top:57px;z-index:15;
    background:var(--bg);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    margin:18px -22px 0;
    padding:8px 0;
}
.rj-inner{
    max-width:1240px;margin:0 auto;
    display:flex;gap:6px;overflow-x:auto;
    padding:0 22px;scrollbar-width:none;
}
.rj-inner::-webkit-scrollbar{display:none}
.rj-btn{
    flex-shrink:0;padding:5px 12px;
    border-radius:20px;border:1px solid var(--border);
    background:var(--panel);color:var(--ink);
    font-size:12px;font-weight:500;cursor:pointer;
    white-space:nowrap;
    transition:border-color .15s,background .15s,color .15s;
    display:flex;align-items:center;gap:5px;
}
.rj-btn:hover{border-color:var(--accent);background:rgba(91,142,248,.09);color:var(--accent)}
.topic-section{
    padding:38px 0;
    border-top:1px solid var(--border);
    scroll-margin-top:120px;
}
.topic-section:first-child{border-top:none;padding-top:28px}
.topic-sec-head{
    display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;
}
.topic-sec-icon{
    width:52px;height:52px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;flex-shrink:0;
}
.topic-sec-meta{flex:1;min-width:0}
.topic-sec-num{
    font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.1em;color:var(--accent);margin:0 0 3px;
}
.topic-sec-title{
    font-size:22px!important;font-weight:800!important;color:var(--ink)!important;
    margin:0 0 5px!important;
    border-bottom:none!important;padding-bottom:0!important;
}
.topic-sec-brief{font-size:13.5px;color:var(--muted);margin:0;line-height:1.55}

/* ── Footer ── */
footer{margin-top:60px;padding:24px;color:var(--muted);font-size:13px;text-align:center;border-top:1px solid var(--border)}

/* ── Print ── */
@media print{header.site,.hero,nav.menu{display:none}body{background:#fff;color:#000}.card,.section,.region-header,.term-card{border-color:#ccc;background:#fff;color:#000}}

/* ── Topography teaser on welcome page ── */
/* topo-teaser legacy — replaced by topo-spot on welcome page */
.topo-teaser{display:none}

/* ── AO-style subregion cards (region pages) ── */
.ao-reg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
.ao-reg-card{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:16px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;
    transition:transform .13s,border-color .2s,box-shadow .2s;
    box-shadow:0 3px 10px rgba(91,142,248,.07);
}
.ao-reg-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 22px rgba(91,142,248,.15)}
.ao-reg-card-icon{
    width:50px;height:50px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;
}
.ao-reg-card-body{flex:1;min-width:0}
.ao-reg-card-title{font-size:14.5px;font-weight:700;color:var(--ink);margin:0 0 5px;line-height:1.3}
.ao-reg-card-brief{font-size:12px;color:var(--muted);margin:0 0 10px;line-height:1.5}
.ao-reg-card-cta{
    display:inline-flex;align-items:center;gap:4px;
    font-size:12px;color:var(--accent);font-weight:600;
    padding:4px 11px;border-radius:20px;
    background:rgba(91,142,248,.1);border:1px solid rgba(91,142,248,.2);
}

.ao-sub-initial{
    width:30px;height:30px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#fff;margin-right:10px;
}

   AO-STYLE TOPOGRAPHY — photo background + glass SVG overlay
   ============================================================ */
.ao-topo-wrap{display:grid;grid-template-columns:1fr 345px;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(91,142,248,.12)}

.ao-figure-panel{
    position:relative;
    background:#060911;
    overflow:hidden;
    height:620px;
}

.ao-img-layer{
    position:absolute;inset:0;opacity:0;transition:opacity .6s ease;
    pointer-events:none;display:flex;align-items:center;justify-content:center;
}
.ao-img-layer.active{opacity:1}
.ao-body-img{
    width:100%;height:100%;object-fit:contain;user-select:none;display:block;
}

.ao-svg-wrap{position:absolute;inset:0;z-index:2;}

#aoBodySvg .hot{
    fill:#4A90D9;stroke:rgba(255,255,255,.55);stroke-width:2;
    cursor:pointer;
    transition:fill .18s,r .18s;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.55));
}
#aoBodySvg .hot:hover{fill:#2B6FC4;stroke:rgba(255,255,255,.9);stroke-width:2.5}
#aoBodySvg .plus{
    fill:#fff;font-weight:800;font-size:16px;text-anchor:middle;
    pointer-events:none;dominant-baseline:central;
}

.ao-lm-set{transition:opacity .42s ease}
#ao-hotspots{transition:opacity .3s ease}

    transition:all .15s;line-height:1;padding:0;

.ao-sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted)}
.ao-desc{font-size:13px;color:var(--muted);line-height:1.6;margin:0 0 16px}

.ao-sub-name{font-size:12.5px;font-weight:600;color:var(--ink);flex:1}
.ao-sub-arrow{color:var(--muted);font-size:15px;font-weight:700}
.ao-info-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.ao-full-link{
    width:100%;padding:12px;
    background:linear-gradient(135deg,var(--accent) 0%,#89B4FF 100%);
    color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;

.ao-full-link:hover{transform:translateY(-1px);text-decoration:none;box-shadow:0 6px 22px rgba(91,142,248,.5)}

// Generate SVG landmark pill group for one region (used when zoomed)
function makeLmGroup(id, ri){
    if(!ri.landmarks||!ri.landmarks.length) return "";
    const {fs} = ri;
    const pillH = fs + 3.5, lineLen = fs * 2.8, charW = fs * 0.58;
    const items = ri.landmarks.map(lm => {
        const isL = lm.dir==="l";
        const dir = isL ? -1 : 1;
        const lx2 = lm.x + dir*lineLen;
        const pillW = Math.max(charW*lm.label.length+7, 18);
        const rx = isL ? lx2-pillW : lx2;
        const ry = lm.y - pillH/2;
        const tx = rx+2.5, ty = lm.y+fs*0.36;
        return `<g onclick="location.hash='${lm.sub}';event.stopPropagation()" style="cursor:pointer">
          <circle cx="${lm.x.toFixed(1)}" cy="${lm.y.toFixed(1)}" r="${(fs*0.52).toFixed(1)}" fill="var(--accent)"/>
          <line x1="${lm.x.toFixed(1)}" y1="${lm.y.toFixed(1)}" x2="${lx2.toFixed(1)}" y2="${lm.y.toFixed(1)}" stroke="var(--accent)" stroke-width="${(fs*0.18).toFixed(2)}" opacity=".65"/>
          <rect x="${rx.toFixed(1)}" y="${ry.toFixed(1)}" width="${pillW.toFixed(1)}" height="${pillH.toFixed(1)}" rx="${(pillH*0.45).toFixed(1)}" fill="rgba(255,255,255,.94)" stroke="rgba(200,215,255,.5)" stroke-width="${(fs*0.1).toFixed(2)}"/>
          <text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" font-size="${fs}" font-weight="600" fill="#1a2040" font-family="Inter,-apple-system,sans-serif">${lm.label}</text>
        </g>`;
    }).join("\n");
    return `<g id="ao-lm-${id.replace(/\//g,"-")}" class="ao-lm-set" style="opacity:0;pointer-events:none">${items}</g>`;
}

/* Body map state — viewBox animation + active region */
const bm = { cur:[0,0,400,720], tgt:[0,0,400,720], raf:null, active:null };

function _bmRevealLabels(){
    if(bm.active){
        const g=document.getElementById("ao-lm-"+bm.active.replace(/\//g,"-"));
        if(g){g.style.opacity="1";g.style.pointerEvents="";}
    }
}
function _bmTick(){
    const spd=0.18, svg=document.getElementById("aoBodySvg");
    let moving=false;
    for(let i=0;i<4;i++){
        const d=bm.tgt[i]-bm.cur[i];
        if(Math.abs(d)>0.08){bm.cur[i]+=d*spd;moving=true;}
        else bm.cur[i]=bm.tgt[i];
    }
    if(svg) svg.setAttribute("viewBox",bm.cur.map(n=>n.toFixed(2)).join(" "));
    if(moving){
        bm.raf=requestAnimationFrame(_bmTick);
    } else {
        bm.raf=null;
        _bmRevealLabels();
    }
}

function bmSelectRegion(id){
    const ri=REGION_IMAGES[id]; if(!ri) return;
    if(bm.raf) cancelAnimationFrame(bm.raf);
    bm.tgt=[...ri.vb]; bm.active=id;
    // Fade background: overview out → region in
    document.querySelectorAll(".ao-img-layer").forEach(l=>l.classList.remove("active"));
    const layer=document.getElementById("ao-layer-"+id.replace(/\//g,"-"));
    if(layer) layer.classList.add("active");
    // Hide SVG hotspots; labels will appear when animation completes (via _bmTick)
    const hs=document.getElementById("ao-hotspots");
    if(hs){hs.style.opacity="0";hs.style.pointerEvents="none";}
    document.querySelectorAll(".ao-lm-set").forEach(g=>{g.style.opacity="0";g.style.pointerEvents="none";});
    const badge=document.getElementById("ao-region-badge");
    const reg=REGIONS.find(r=>r.id===id);
    if(badge&&reg){badge.textContent=reg.name;badge.classList.add("show");}
    const hint=document.getElementById("ao-hint");
    if(hint) hint.textContent="Click a label to view anatomical detail";
    bmUpdatePanel(id);
    bm.raf=requestAnimationFrame(_bmTick);
    // Fallback: guarantee labels appear even if animation finishes faster than rAF fires
    setTimeout(()=>{ if(bm.active===id) _bmRevealLabels(); }, 600);
}

function bmReset(){
    if(bm.raf) cancelAnimationFrame(bm.raf);
    bm.tgt=[0,0,400,720]; bm.active=null;
    // Fade background: region out → overview in
    document.querySelectorAll(".ao-img-layer").forEach(l=>l.classList.remove("active"));
    const ov=document.getElementById("ao-layer-overview");
    if(ov) ov.classList.add("active");
    // Show hotspots, hide all landmark groups
    const hs=document.getElementById("ao-hotspots");
    if(hs){hs.style.opacity="1";hs.style.pointerEvents="";}
    document.querySelectorAll(".ao-lm-set").forEach(g=>{g.style.opacity="0";g.style.pointerEvents="none";});
    const badge=document.getElementById("ao-region-badge");
    if(badge) badge.classList.remove("show");
    const hint=document.getElementById("ao-hint");
    if(hint) hint.textContent="Select a region to explore anatomy";
    bmUpdatePanel(null);
    bm.raf=requestAnimationFrame(_bmTick);
}

function bmUpdatePanel(id){
    const titleEl=document.getElementById("ao-region-title");
    const descEl=document.getElementById("ao-region-desc");
    const subsEl=document.getElementById("ao-region-subs");
    const subsLbl=document.getElementById("ao-subs-label");
    const footerLink=document.getElementById("ao-full-link");
    if(!titleEl) return;
    const panelGrads={head:"#5B8EF8",neck:"#00C9BD",chest:"#FF8C8C",abdomen:"#FFB347",pelvis:"#C47AE0",back:"#52C490"};
    if(!id){
        titleEl.textContent="Overview";
        if(descEl) descEl.textContent="Select a region to explore anatomy — click any '+' on the figure or choose a region below.";
        if(subsLbl) subsLbl.textContent="All Regions";
        if(footerLink) footerLink.style.display="none";
        if(subsEl) subsEl.innerHTML=REGIONS.map(r=>{
            const ri=REGION_IMAGES[r.id];
            const col=panelGrads[r.id]||"#5B8EF8";
            return `<div class="ao-sub-card" onclick="bmSelectRegion('${r.id}')">
              <div class="ao-sub-initial" style="background:${col}">${ri?ri.icon:"+"}</div>
              <span class="ao-sub-name">${r.name}</span>
              <span class="ao-sub-arrow">›</span>
            </div>`;
        }).join("");
    } else {
        const ri=REGION_IMAGES[id];
        const reg=REGIONS.find(r=>r.id===id);
        if(!ri||!reg) return;
        titleEl.textContent=reg.name;
        if(descEl) descEl.textContent=ri.desc;
        if(subsLbl) subsLbl.textContent="Subregions";
        if(footerLink){footerLink.href="#/region/"+id;footerLink.textContent="Open Full Region →";footerLink.style.display="block";}
        const col=panelGrads[id]||"#5B8EF8";
        if(subsEl&&reg.sub) subsEl.innerHTML=reg.sub.map(s=>{
            const emoji = TOPIC_EMOJI[s.id] || '🔬';
            return `<div class="ao-sub-card" onclick="location.hash='#/sub/${s.id}'">
              <div class="ao-sub-initial" style="background:${col};font-size:14px">${emoji}</div>
              <span class="ao-sub-name">${s.name}</span>
              <span class="ao-sub-arrow">›</span>
            </div>`;
        }).join("");
    }
}

const TERMS = [
  // ---- HEAD ----
  {name:"Scalp (SCALP layers)",category:"Head",borders:"Anteriorly: supraorbital margin. Posteriorly: superior nuchal line. Laterally: superior temporal line.",definition:"Five-layer tissue covering the skull (SCALP): Skin, dense Connective tissue (neurovascular), Aponeurosis (galea), Loose connective tissue (danger zone with emissary veins), Pericranium. Lacerations bleed profusely; subgaleal infections may spread intracranially."},
  {name:"Cranial nerves I–XII",category:"Head",borders:"Skull openings sequence: cribriform plate (I) → optic canal (II) → SOF (III,IV,VI,V1) → foramen rotundum (V2) → foramen ovale (V3) → IAM (VII,VIII) → jugular foramen (IX,X,XI) → hypoglossal canal (XII).",definition:"Twelve paired nerves. Mnemonic for order: 'On Old Olympus Towering Top A Finn And German Viewed Some Hops'. Fiber-type mnemonic: 'Some Say Marry Money But My Brother Says Big Brains Matter More' (S=Sensory, M=Motor, B=Both)."},
  {name:"Parasympathetic head ganglia",category:"Head",borders:"Ciliary (CN III), Pterygopalatine (CN VII via greater petrosal), Submandibular (CN VII via chorda tympani), Otic (CN IX via lesser petrosal).",definition:"Four head parasympathetic ganglia. Ciliary → sphincter pupillae + ciliary m. Pterygopalatine → lacrimal + palatine + nasal glands. Submandibular → submandibular + sublingual glands. Otic → parotid gland (via auriculotemporal n. of V3)."},
  {name:"Ganglia passing fibres",category:"Head",borders:"All four head ganglia transmit sympathetic and sensory fibres that pass through without synapsing.",definition:"Each ganglion has synapsing parasympathetics plus passing sympathetics (from carotid plexus) and sensory fibres (from V1–V3). Only parasympathetics synapse in the ganglion."},
  {name:"Mandibular nerve (V3)",category:"Head",borders:"Exits through foramen ovale. Anterior division (mostly motor) + posterior division (mostly sensory). Auriculotemporal loops around middle meningeal a.; inferior alveolar gives mylohyoid n. before mandibular foramen.",definition:"Largest CN V division. Anterior: deep temporals, masseteric, lateral pterygoid, buccal (sensory). Posterior: auriculotemporal (parasympathetics to parotid), lingual (chorda tympani joins), inferior alveolar → mental n. (foramen below 2nd premolar)."},
  {name:"Trigeminal pressure points",category:"Head",borders:"V1: supraorbital foramen/notch at supraorbital margin. V2: infraorbital foramen ~1 cm below inferior orbital margin. V3: mental foramen below 2nd lower premolar.",definition:"Three vertically aligned foramina screen trigeminal neuralgia and dermatomal sensory loss. All align in the midpupillary line. Used to localise cranial nerve V lesions rapidly."},
  {name:"Facial & masticatory muscles",category:"Head",borders:"Mimetic muscles (CN VII, 2nd arch). Masticatory: masseter, temporalis, medial + lateral pterygoids (CN V3, 1st arch).",definition:"Masticatory function: elevation (masseter, temporalis, medial pterygoid), protrusion + depression (lateral pterygoid). Jacobson's anastomosis: tympanic n. (IX) + caroticotympanic nn. (sympathetic) form tympanic plexus → lesser petrosal n. → otic ganglion → auriculotemporal n. → parotid."},
  {name:"Facial nerve branches",category:"Head",borders:"Exits stylomastoid foramen → enters parotid → 5 terminal branches: Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical (TZBMC).",definition:"Bell's palsy = LMN lesion: all ipsilateral facial muscles affected including forehead (distinguishes from UMN stroke which spares forehead). Loss of corneal reflex efferent, hyperacusis, taste loss anterior 2/3 tongue. Mnemonic: 'To Zanzibar By Motor Car'."},
  {name:"Head veins (facial / retromandibular)",category:"Head",borders:"Facial v. (angular v. → IJV via common facial v.). Retromandibular v. (maxillary v. + superficial temporal v.) → ant. div. (→ IJV) + post. div. (→ EJV).",definition:"Pterygoid plexus connects to cavernous sinus via foramen ovale emissary v. and inferior ophthalmic v. Danger triangle (mouth corner to nose bridge): valveless veins allow retrograde spread of facial infections to cavernous sinus → cavernous sinus thrombosis."},
  {name:"Temporomandibular joint",category:"Head",borders:"Mandibular fossa + articular tubercle (temporal bone) above; head of mandible below. Articular disc divides into superior (translation) and inferior (rotation) cavities.",definition:"Modified synovial hinge joint. Ligaments: lateral (temporomandibular), sphenomandibular, stylomandibular. Movements: depression, elevation, protrusion, retrusion, lateral excursion. Dislocation: condyle anterior to articular tubercle — reduce by pressing molars down and chin back."},
  {name:"Orbit — borders + contents",category:"Head",borders:"Roof: frontal bone. Floor: maxilla. Lateral: zygomatic + greater wing sphenoid. Medial: frontal process maxilla, lacrimal, orbital plate ethmoid, sphenoid body. Apex: optic canal.",definition:"Communications: optic canal (CN II, ophthalmic a.), SOF (III,IV,VI,V1, ophthalmic vv.), inferior orbital fissure (V2, infraorbital vessels). Contains: eyeball + 7 extraocular muscles + lacrimal gland + ciliary ganglion + ophthalmic a./v. + orbital fat."},
  {name:"Extraocular muscles + palsies",category:"Head",borders:"LR6 SO4 — all the rest CN3. SR, IR, MR, IO, LPS = CN III. SO = CN IV. LR = CN VI.",definition:"CN III palsy: 'down and out', ptosis, mydriasis (blown pupil = PCom aneurysm). CN IV palsy: vertical diplopia on downgaze, head tilts away (Bielschowsky). CN VI palsy: failure of abduction, medially deviated eye; longest intracranial course = most vulnerable to raised ICP."},
  {name:"Parotid gland",category:"Head",borders:"Between mastoid/SCM (posterior), ramus/masseter (anterior), zygomatic arch (superior), angle of mandible (inferior).",definition:"Structures within (superficial→deep): facial nerve (7 branches), retromandibular vein, external carotid artery. Stensen's duct opens opposite 2nd upper molar. Frey's syndrome after parotidectomy: parasympathetics reinnervate sweat glands → gustatory sweating. Innervation: CN IX → tympanic plexus → lesser petrosal → otic ganglion → auriculotemporal n."},
  {name:"Retromandibular fossa",category:"Head",borders:"Anterior: posterior ramus. Posterior: mastoid/SCM. Medial: styloid process. Lateral: parotid fascia.",definition:"Contains bulk of parotid gland, facial nerve, retromandibular vein, external carotid a., auriculotemporal n., great auricular n., parotid lymph nodes. Key surgical access plane for parotidectomy."},
  {name:"Infratemporal fossa",category:"Head",borders:"Cranial: infratemporal surface of greater wing sphenoid + squamous temporal. Anterior: maxillary tuberosity. Medial: lateral pterygoid plate. Lateral: mandibular ramus.",definition:"Foramina: foramen ovale, spinosum, mandibular foramen, pterygomaxillary fissure. Contents: medial + lateral pterygoid muscles, maxillary artery (1st + 2nd parts), pterygoid venous plexus, otic ganglion, V3 branches, chorda tympani."},
  {name:"Pterygopalatine fossa",category:"Head",borders:"Cranial: greater wing sphenoid. Anterior: maxillary tuberosity. Posterior: pterygoid process. Medial: palatine bone. Lateral: pterygomaxillary fissure.",definition:"Hub communicating with 7 regions. Contains V2 (maxillary nerve), pterygopalatine ganglion, and 3rd part of maxillary artery. Foramen rotundum (V2) and pterygoid canal (Vidian n.) open into it from the middle cranial fossa."},
  {name:"Dural venous sinuses",category:"Head",borders:"Unpaired: superior + inferior sagittal, straight, occipital, intercavernous. Paired: cavernous, superior + inferior petrosal, transverse, sigmoid, sphenoparietal.",definition:"Main drainage: sup. sagittal + straight + occipital → confluence of sinuses → transverse → sigmoid → IJV. Cavernous sinus contents: lateral wall = III, IV, V1, V2; within sinus = VI + ICA. Thrombosis → CN palsies + chemosis + proptosis."},
  {name:"Dural reflections",category:"Head",borders:"Falx cerebri (vertical, between hemispheres). Tentorium cerebelli (horizontal, separates occipital lobes from cerebellum — tentorial notch around midbrain). Falx cerebelli (vertical, between cerebellar hemispheres). Diaphragma sellae (over sella turcica).",definition:"Herniation syndromes: subfalcine (cingulate under falx), transtentorial/uncal (medial temporal lobe over tentorium → CN III), tonsillar (cerebellar tonsils through foramen magnum). Sinuses run along edges of each fold."},
  {name:"Three meninges",category:"Head",borders:"Outer → inner: Dura mater, Arachnoid mater, Pia mater (leptomeninges = arachnoid + pia). Spaces: epidural (potential, middle meningeal a.), subdural (potential, bridging veins), subarachnoid (real, CSF + cerebral arteries).",definition:"CSF path: lateral ventricles (choroid plexus) → Monro → 3rd ventricle → aqueduct → 4th ventricle → Magendie/Luschka → subarachnoid cisterns → arachnoid granulations → superior sagittal sinus. Bridging veins in subdural space rupture → subdural haematoma."},
  {name:"Skull base foramina (ROS)",category:"Head",borders:"Middle cranial fossa, anteromedial → posterolateral on greater wing of sphenoid: Rotundum (V2), Ovale (V3 + lesser petrosal + accessory meningeal a.), Spinosum (middle meningeal a./v. + meningeal br. V3).",definition:"ROS mnemonic for the three sphenoid foramina. Additional: cribriform plate (I), optic canal (II), SOF (III,IV,VI,V1), foramen lacerum, carotid canal (ICA), IAM (VII,VIII), jugular foramen (IX,X,XI), hypoglossal canal (XII), foramen magnum (medulla, vertebral aa., XI ascending)."},
  {name:"Internal carotid + Circle of Willis",category:"Head",borders:"ICA segments: cervical (C1, no branches) → petrous (C2) → lacerum (C3) → cavernous siphon (C4) → clinoid (C5) → ophthalmic (C6) → communicating (C7).",definition:"Circle of Willis: ACA pair joined by anterior communicating a.; PCAs joined to ICAs by posterior communicating aa. Common Berry aneurysm sites: anterior communicating (most common), MCA bifurcation, PCom. Cavernous segment = ICA siphon (with sympathetic plexus and CN VI alongside)."},
  {name:"Maxillary artery (DAM I AM…)",category:"Head",borders:"Three parts relative to lateral pterygoid: 1st retromandibular (5 branches to bone/dura/ear), 2nd infratemporal — pterygoid (4 branches to muscles), 3rd pterygopalatine (8 terminal branches).",definition:"Mnemonic: 1st part DAM IA = Deep auricular, Anterior tympanic, Middle meningeal, Inferior alveolar, Accessory meningeal. 2nd part MPDB = Masseteric, Pterygoid, Deep temporal, Buccal. 3rd part = Sphenopalatine (terminal, posterior epistaxis source) + descending palatine + infraorbital + PSA + MSA + pharyngeal + ASA + artery of pterygoid canal."},
  {name:"Facial nerve terminal branches (TZBMC)",category:"Head",borders:"Five motor branches within parotid: Temporal, Zygomatic, Buccal, Marginal mandibular, Cervical.",definition:"Cervical branch joins transverse cervical n. (C2–C3 of cervical plexus) → superficial cervical ansa (motor to platysma, sensory to anterior neck skin). Traced from ~2 cm anterior to tragus where trunk exits stylomastoid foramen and enters parotid."},
