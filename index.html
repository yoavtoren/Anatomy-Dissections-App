         "Nerve block at pterygopalatine fossa anaesthetises all V2 sensory passing branches — used for facial pain, sinus surgery",
         "Frey's syndrome: after parotidectomy, auriculotemporal n. (normally carrying post-ganglionic parotid secretomotor fibres) regrows to supply sweat glands → paradoxical sweating with eating"
       ]}
    ]
  },

  "v3-mandibular":{
    title:"Mandibular nerve V3 — branches & identification",
    parent:"head",
    body:[
      {h:"Origin and exit",
       list:[
         "Sensory root from trigeminal ganglion (Meckel's cave) + motor root from motor nucleus (pons)",
         "Exit: Foramen ovale (infratemporal fossa)",
         "Immediately divides into small anterior division (mainly motor) and large posterior division (mainly sensory)"
       ]},
      {h:"Anterior division branches",
       list:[
         "Masseteric n. (motor: masseter)",
         "Deep temporal nn. — anterior + posterior (motor: temporalis)",
         "Lateral pterygoid n. (motor: lateral pterygoid)",
         "Buccal n. (sensory only — cheek mucosa and skin; does NOT supply buccinator muscle)"
       ]},
      {h:"Posterior division branches",
       list:[
         "Auriculotemporal n.: loops around middle meningeal a. (2 roots), then passes posterior to TMJ; carries post-ganglionic parasympathetic to parotid; sensory to temporomandibular region, auricle, external acoustic meatus, scalp",
         "Lingual n.: sensory to anterior 2/3 tongue (GSA) + taste via chorda tympani (SVA); floor of mouth; gingiva",
         "Inferior alveolar n.: enters mandibular foramen → inferior alveolar canal → supplies lower teeth → mental n. (exits mental foramen: chin + lower lip)",
         "Nerve to mylohyoid: branches before IA enters canal; motor to mylohyoid + anterior belly of digastric"
       ]},
      {h:"Key identification feature",
       p:"The auriculotemporal nerve characteristically forms a loop around the middle meningeal artery — this is a classic exam and viva point. The 2 roots of the auriculotemporal n. embrace the artery before uniting."},
      {h:"Other muscles supplied by V3 motor root",
       list:[
         "Tensor veli palatini (opens Eustachian tube during swallowing)",
         "Tensor tympani (dampens tympanic membrane vibration)",
         "Mylohyoid",
         "Anterior belly of digastric"
       ]},
      {h:"Clinical",
       list:[
         "Inferior alveolar nerve block: injection at mandibular foramen — anaesthetises ipsilateral lower teeth, lip, chin",
         "Trigeminal neuralgia (tic douloureux): V2 and V3 most affected; electric-shock pain triggered by touch",
         "V3 lesion at foramen ovale: jaw deviates TOWARD lesion on opening (unopposed contralateral pterygoids)"
       ]},
      {img:"infratemporal-fossa.jpg", caption:"V3 branches in the infratemporal fossa"}
    ]
  },

  "trigeminal-pressure-points":{
    title:"Trigeminal pressure points — V1, V2, V3",
    parent:"head",
    body:[
      {h:"Concept",
       p:"Each division of CN V (trigeminal) exits the skull through a foramen and emerges superficially where it can be palpated. These 'pressure points' are used clinically to elicit pain (trigeminal neuralgia testing) or deliver local anaesthesia."},
      {h:"V1 — Supraorbital point",
       list:[
         "Nerve: Supraorbital nerve (branch of frontal n., from V1 ophthalmic)",
         "Location: Supraorbital notch / foramen — palpable on the medial third of the supraorbital margin",
         "Area served: Forehead, scalp to vertex, upper eyelid, dorsum of nose",
         "Block use: Forehead/scalp anaesthesia"
       ]},
      {h:"V2 — Infraorbital point",
       list:[
         "Nerve: Infraorbital nerve (continuation of maxillary n. through infraorbital canal)",
         "Location: Infraorbital foramen — 1 cm below the midpoint of the inferior orbital margin (palpate as a small notch)",
         "Area served: Lower eyelid, lateral nose, upper lip, anterior cheek, upper teeth",
         "Block use: Upper lip/cheek surgery, cleft palate repair"
       ]},
      {h:"V3 — Mental point",
       list:[
         "Nerve: Mental nerve (terminal branch of inferior alveolar n., V3)",
         "Location: Mental foramen — on the mandible below the 2nd premolar tooth (about midway between upper and lower mandibular border)",
         "Area served: Lower lip, chin, vestibular gingiva of lower incisors/canines/premolars",
         "Block use: Lower lip/chin surgery"
       ]},
      {h:"Vertical alignment",
       p:"All three foramina lie approximately in a vertical line through the mid-pupil (when eyes looking straight ahead): supraorbital → infraorbital → mental."},
      {h:"Clinical use",
       list:[
         "Testing in trigeminal neuralgia: gentle pressure at these points reproduces the pain",
         "Nerve blocks: injecting local anaesthetic at these sites achieves reliable regional anaesthesia",
         "Trauma assessment: tenderness at infraorbital foramen suggests zygomaticomaxillary complex (ZMC) fracture"
       ]}
    ]
  },

  "face-muscles":{
    title:"Facial & masticatory muscles",
    parent:"head",
    body:[
      {h:"Muscles of facial expression (mimetic muscles) — CN VII",
       list:[
         "Embryological origin: 2nd pharyngeal arch → all supplied by CN VII (facial nerve)",
         "Function: Move facial skin (no bony insertion on one end — insert into skin)",
         "Key muscles: Frontalis (raises eyebrow), orbicularis oculi (closes eye), corrugator supercilii (frowns), orbicularis oris (closes mouth), buccinator (compresses cheek), zygomaticus major/minor (smile), risorius, platysma (neck — tenses neck skin), nasalis, procerus, depressor anguli oris, mentalis"
       ]},
      {h:"Buccinator — special note",
       list:[
         "Muscle of facial expression (CN VII) — NOT a muscle of mastication",
         "Origin: Pterygomandibular raphe, alveolar processes of maxilla and mandible",
         "Action: Compresses cheek (keeps food between teeth); important for blowing, suckling",
         "Parotid duct (Stensen's) pierces buccinator to enter oral cavity"
       ]},
      {h:"Muscles of mastication — CN V3 (motor root)",
       list:[
         "Masseter: Zygomatic arch → ramus of mandible; elevation + protrusion of mandible",
         "Temporalis: Temporal fossa → coronoid process; elevation + retraction of mandible",
         "Medial pterygoid: Medial surface of lateral pterygoid plate → medial surface of mandibular ramus; elevation + side-to-side (grinding)",
         "Lateral pterygoid: Lateral pterygoid plate + greater wing sphenoid → condylar neck + articular disc; depression + protrusion + side-to-side"
       ]},
      {h:"Jacobson's anastomosis",
       list:[
         "Jacobson's nerve = tympanic branch of CN IX (Jacobson) on the promontory of the middle ear",
         "Anastomotic loop: CN IX tympanic branch ↔ CN VII (via communications on promontory)",
         "Clinical relevance: Glomus tympanicum tumour arises from this plexus; lesion can affect both CN VII and IX"
       ]},
      {h:"Summary — which nerve to which muscle",
       list:[
         "CN V3 motor: All 4 masticatory muscles + tensor palati + tensor tympani + mylohyoid + ant. belly digastric",
         "CN VII: All muscles of facial expression + stapedius + stylohyoid + post. belly digastric"
       ]}
    ]
  },

  "facial-n-branches":{
    title:"Facial nerve — branches & Bell's palsy",
    parent:"head",
    body:[
      {h:"Course of CN VII",
       list:[
         "Nucleus (pons) → CPA → IAM → facial canal (geniculate ganglion) → posterior genu → exits stylomastoid foramen",
         "Branches within temporal bone: Greater petrosal n. (parasympathetic lacrimal), nerve to stapedius, chorda tympani (taste + parasympathetic submandibular/sublingual)",
         "After stylomastoid foramen: posterior auricular n. (occipitalis + auricular muscles), nerve to posterior belly digastric + stylohyoid, then enters parotid"
       ]},
      {h:"5 terminal motor branches — mnemonic TZBMC",
       list:[
         "'To Zanzibar By Motor Car'",
         "<b>T</b>emporal — frontalis, orbicularis oculi (upper), corrugator",
         "<b>Z</b>ygomatic — orbicularis oculi (lower), zygomatic muscles",
         "<b>B</b>uccal — buccinator, orbicularis oris, upper lip muscles",
         "<b>M</b>arginal mandibular — lower lip + chin depressors",
         "<b>C</b>ervical — platysma"
       ]},
      {h:"Superficial cervical ansa (loop)",
       list:[
         "Communicating loop between cervical branch of CN VII and transverse cervical nerve (C2/C3) of cervical plexus",
         "Provides additional supply to platysma and communicates with great auricular n.",
         "Surgically relevant: dissection in posterior triangle"
       ]},
      {h:"Bell's palsy — LMN vs UMN",
       list:[
         "LMN (Bell's palsy, parotid tumour, skull base fracture, Ramsay Hunt): ALL ipsilateral facial muscles weak including FOREHEAD (cannot raise eyebrow or close eye) — eye closure failure → exposure keratopathy",
         "UMN (stroke): Contralateral lower face weak; FOREHEAD SPARED (bilateral cortical representation of forehead — upper motor neurones from both hemispheres supply forehead CN VII nucleus)",
         "Bell's phenomenon: on attempted eye closure in LMN palsy, globe rolls upward (normal reflex; protects cornea partially)"
       ]},
      {h:"Clinical testing of CN VII",
       list:[
         "Raise eyebrows (temporal branch)",
         "Close eyes tightly (zygomatic + temporal)",
         "Puff cheeks / show teeth (buccal)",
         "Depress lower lip corner (marginal mandibular)",
         "Neck platysma tightening (cervical)"
       ]},
      {img:"facial-n-branches.jpg", caption:"Facial nerve TZBMC terminal branches emerging from parotid"}
    ]
  },

  "head-veins":{
    title:"Head veins — facial, retromandibular, pterygoid plexus, cavernous sinus",
    parent:"head",
    body:[
      {h:"Facial vein",
       list:[
         "Origin: Angular vein (medial canthus; junction of supratrochlear + supraorbital veins)",
         "Course: Descends along face (posterior to facial artery); no valves",
         "Tributaries: Superior + inferior labial veins, deep facial vein (from pterygoid plexus), submental v.",
         "Drains into: Internal jugular vein (at level of hyoid) OR facial vein joins retromandibular vein",
         "DANGER TRIANGLE: Upper lip to nose to nasal bridge — veins communicate with cavernous sinus via ophthalmic veins + angular vein; valveless = infection can spread intracranially"
       ]},
      {h:"Retromandibular vein",
       list:[
         "Formed: Superficial temporal v. + maxillary v. (within parotid gland)",
         "Divided into: Anterior division (joins facial v. → common facial v. → IJV) + Posterior division (joins posterior auricular v. → external jugular v.)",
         "Surgical landmark: Key structure within parotid; lies deep to facial nerve, superficial to ECA"
       ]},
      {h:"Pterygoid venous plexus",
       list:[
         "Location: Infratemporal fossa around medial and lateral pterygoid muscles",
         "Communications: Deep facial vein (to facial v.), inferior ophthalmic v. (to cavernous sinus), emissary veins through foramen lacerum / foramen ovale",
         "Drains via: Maxillary vein → retromandibular vein",
         "Clinical: Provides collateral venous drainage; infection from teeth can spread via pterygoid plexus to cavernous sinus"
       ]},
      {h:"Cavernous sinus — connections",
       list:[
         "Receives: Superior ophthalmic v. (from facial v. via angular v.), inferior ophthalmic v. (from pterygoid plexus), sphenoparietal sinus, superficial middle cerebral v.",
         "Drains via: Superior petrosal sinus → sigmoid sinus → IJV; inferior petrosal sinus → IJV",
         "Contents of cavernous sinus: CN III, IV, V1, V2 in lateral wall (top to bottom); CN VI and ICA (with sympathetic plexus) within the sinus",
         "Cavernous sinus thrombosis: danger triangle infection; Staph aureus most common; proptosis, chemosis, pain, ophthalmoplegia, fever"
       ]},
      {h:"Summary of venous drainage pathway",
       list:[
         "Scalp → superficial temporal v., occipital v., posterior auricular v.",
         "Face → facial v. → common facial v. → IJV",
         "Deep face → pterygoid plexus → maxillary v. → retromandibular v. → IJV / EJV",
         "Intracranial → dural sinuses → sigmoid sinus → IJV"
       ]}
    ]
  },

  "tmj":{
    title:"Temporomandibular joint (TMJ)",
    parent:"head",
    body:[
      {h:"Joint type",
       list:[
         "Synovial, modified hinge + gliding (bicondylar, condyloid)",
         "Only joint in the body with an intra-articular disc dividing it into 2 separate synovial cavities (upper + lower joint spaces)"
       ]},
      {h:"Articular surfaces",
       list:[
         "Mandibular condyle (convex)",
         "Mandibular fossa (concave) + articular tubercle (eminence) of temporal bone",
         "Surfaces lined with fibrocartilage (NOT hyaline) — important for repair"
       ]},
      {h:"Articular disc",
       list:[
         "Fibrocartilaginous, biconcave",
         "Attached anteriorly to lateral pterygoid (superior head) — pulled forward during mouth opening/protrusion",
         "Divides joint: lower space = rotation (hinge; mouth opening 1st ~25 mm); upper space = translation (gliding; wider opening + protrusion)"
       ]},
      {h:"Movements",
       list:[
         "Depression (mouth opening): lateral pterygoid (both) + suprahyoid muscles; condyle rotates then translates forward",
         "Elevation (closing): masseter + temporalis + medial pterygoid",
         "Protrusion: lateral pterygoid (both) + medial pterygoid",
         "Retraction: posterior fibres of temporalis + posterior digastric",
         "Lateral (side-to-side/grinding): alternating pterygoid action"
       ]},
      {h:"Capsule and ligaments",
       list:[
         "Fibrous capsule: encloses both joint spaces",
         "Lateral (temporomandibular) ligament: thickening of capsule; prevents posterior dislocation",
         "Sphenomandibular ligament: from spine of sphenoid to lingula of mandibular foramen; remnant of Meckel's cartilage (1st arch)",
         "Stylomandibular ligament: from styloid process to posterior mandibular ramus; separates parotid from submandibular gland"
       ]},
      {h:"Dislocation",
       list:[
         "Anterior dislocation: condyle moves anterior to articular eminence and cannot return; jaw locked open + deviated to contralateral side",
         "Reduction: downward + backward pressure on mandibular molars"
       ]},
      {h:"Innervation",
       list:[
         "Auriculotemporal n. (V3) — main supply",
         "Masseteric n. + deep temporal nn. (V3)"
       ]}
    ]
  },

  "orbit":{
    title:"Orbit — borders, walls & communications",
    parent:"head",
    body:[
      {h:"Shape and orientation",
       p:"Pyramid-shaped bony cavity with apex directed posteromedially. The optic axis is directed slightly laterally; the orbital axis is directed about 23° laterally and 15° superiorly from the optic axis."},
      {h:"Roof (superior wall)",
       list:["Orbital plate of frontal bone + lesser wing of sphenoid (posterior)"]},
      {h:"Floor (inferior wall)",
       list:["Orbital plate of maxilla + zygomatic bone + orbital process of palatine bone; thinnest wall — #1 site of blowout fracture → inferior rectus entrapment"]},
      {h:"Medial wall",
       list:["Lacrimal bone + orbital plate of ethmoid (lamina papyracea — very thin) + frontal process of maxilla + body of sphenoid; ethmoid sinusitis spreads medially through lamina papyracea"]},
      {h:"Lateral wall",
       list:["Zygomatic bone (anterior) + greater wing of sphenoid (posterior); strongest wall"]},
      {h:"Communications",
       list:[
         "Optic canal (lesser wing sphenoid): CN II + ophthalmic artery (+ CSF in optic nerve sheath)",
         "Superior orbital fissure (SOF): CN III, IV, V1 (lacrimal, frontal, nasociliary), CN VI, superior ophthalmic vein, sympathetic fibres — 'LFT on the SOFa': Lacrimal, Frontal, Trochlear (outside annular ring); then inside annular ring: oculomotor (sup + inf), nasociliary, abducens",
         "Inferior orbital fissure: CN V2 (infraorbital n. + zygomatic n.), infraorbital vessels, inferior ophthalmic vein (to pterygoid plexus)",
         "Lacrimal fossa → nasolacrimal duct → inferior meatus of nasal cavity",
         "Anterior + posterior ethmoidal canals (medial wall): ethmoidal vessels + nerves to anterior cranial fossa"
       ]},
      {h:"Contents of the orbit",
       list:[
         "Eyeball, 6 extraocular muscles + levator palpebrae superioris",
         "Optic nerve (+ meningeal sheaths, CSF)",
         "Ophthalmic artery and its branches (central retinal a., posterior ciliary aa., muscular aa., lacrimal a., supraorbital a., supratrochlear a., ethmoidal aa., palpebral aa.)",
         "Ophthalmic veins (superior + inferior → cavernous sinus)",
         "CN III, IV, V1, VI, sympathetic plexus",
         "Lacrimal gland (superolateral)"
       ]},
      {h:"Clinical",
       list:[
         "Blowout fracture: direct blow to eye → increased intraorbital pressure → floor fractures → inferior rectus/fat herniate into maxillary sinus → diplopia on upgaze + enophthalmos",
         "Orbital cellulitis: spreads from ethmoid sinusitis (children); emergency — risk of cavernous sinus thrombosis"
       ]},
      {img:"infratemporal-fossa.jpg", caption:"Orbital communications — SOF, optic canal, inferior orbital fissure"}
    ]
  },

  "eom":{
    title:"Extraocular muscles — LR6 SO4 rest CN3 & palsies",
    parent:"head",
    body:[
      {h:"Mnemonic: LR6 SO4 rest CN3",
       list:[
         "Lateral Rectus → CN VI (abducens)",
         "Superior Oblique → CN IV (trochlear)",
         "All other 4 muscles (Superior Rectus, Inferior Rectus, Medial Rectus, Inferior Oblique) + Levator Palpebrae Superioris → CN III (oculomotor)"
       ]},
      {h:"Actions — primary positions",
       list:[
         "Medial rectus: adduction",
         "Lateral rectus: abduction",
         "Superior rectus: elevation + adduction + intorsion",
         "Inferior rectus: depression + adduction + extorsion",
         "Superior oblique: depression + abduction + intorsion (trochlea redirects pull)",
         "Inferior oblique: elevation + abduction + extorsion"
       ]},
      {h:"Testing obliques — key points",
       list:[
         "Superior oblique depresses in ADDUCTION (look down and in) — tested by asking patient to look toward nose then down",
         "Inferior oblique elevates in ADDUCTION — tested by looking toward nose then up"
       ]},
      {h:"CN III palsy (oculomotor)",
       list:[
         "Eye: 'Down and out' (lateral rectus + superior oblique unopposed)",
         "Ptosis: levator palpebrae superioris paralysed",
         "Pupil: Fixed dilated (mydriasis) — loss of parasympathetic constriction",
         "Surgical CN III palsy (PComm aneurysm): pupil INVOLVED (compresses parasympathetic fibres on outside of nerve)",
         "Medical CN III palsy (diabetic microvascular): pupil SPARED (ischaemia affects central fibres first)"
       ]},
      {h:"CN IV palsy (trochlear)",
       list:[
         "Inability to depress adducted eye → diplopia going downstairs",
         "Head tilt toward opposite shoulder (Bielschowsky test) to compensate",
         "Most common isolated CN palsy post-head trauma"
       ]},
      {h:"CN VI palsy (abducens)",
       list:[
         "Medial deviation of eye (esotropia) — medial rectus unopposed",
         "Convergent squint, diplopia on lateral gaze to affected side",
         "False localising sign in raised ICP (long intracranial course)"
       ]}
    ]
  },

  "parotid":{
    title:"Parotid gland — location, layers & Frey's syndrome",
    parent:"head",
    body:[
      {h:"Location and shape",
       list:[
         "Largest salivary gland; lies in parotid region (retromandibular fossa)",
         "Wedge-shaped: superficial + deep lobes (divided by facial nerve plane — not true anatomical lobes)",
         "Enclosed in parotid fascia (dense extension of investing layer of deep cervical fascia)"
       ]},
      {h:"Key structures within parotid — layers from superficial to deep (mnemonic)",
       list:[
         "From superficial to deep: Facial nerve → retromandibular vein → external carotid artery",
         "Mnemonic: 'Face, Retro, External' OR: 'facial nerve is most superficial' — critical for parotidectomy",
         "Parotid duct (Stensen's duct) exits anterior border → crosses masseter → pierces buccinator → opens opposite upper 2nd molar"
       ]},
      {h:"Relations",
       list:[
         "Anterior: Masseter, ramus of mandible, medial pterygoid",
         "Posterior: External acoustic meatus, mastoid process, SCM",
         "Superior: Zygomatic arch",
         "Medial: Parapharyngeal space, styloid process + muscles (ICA, IJV)"
       ]},
      {h:"Blood supply and innervation",
       list:[
         "Arterial: External carotid artery (branches within gland)",
         "Venous: Retromandibular vein",
         "Secretomotor (parasympathetic): CN IX → lesser petrosal n. → otic ganglion → auriculotemporal n. (V3) → parotid",
         "Sympathetic: Plexus on external carotid artery (vasomotor, reduces secretion)"
       ]},
      {h:"Frey's syndrome (auriculotemporal syndrome)",
       list:[
         "Complication of parotidectomy or parotid trauma",
         "Mechanism: Severed auriculotemporal nerve parasympathetic fibres regenerate aberrantly to sweat glands in skin",
         "Result: Gustatory sweating — flushing and sweating over parotid region when eating",
         "Test: Minor's starch-iodine test (skin darkens with sweating)",
         "Treatment: Antiperspirant, botulinum toxin injection, interposition flap (SMAS) during surgery"
       ]},
      {h:"Parotid tumours",
       list:[
         "80% benign; 80% of benign = pleomorphic adenoma (mixed tumour)",
         "Warthin's tumour: 2nd most common benign; bilateral in 10%; bilateral hot spot on Tc-99m scan",
         "Malignant: mucoepidermoid carcinoma (most common), adenoid cystic carcinoma (perineural invasion)",
         "Facial nerve palsy with parotid mass = malignancy until proven otherwise"
       ]}
    ]
  },

  "retromandibular-fossa":{
    title:"Retromandibular fossa — borders & contents",
    parent:"head",
    body:[
      {h:"Definition",
       p:"The retromandibular (or parotid) fossa is the space located posterior to the mandibular ramus that is largely filled by the parotid gland."},
      {h:"Borders",
       list:[
         "Anterior: Posterior border of mandibular ramus + medial pterygoid",
         "Posterior: Mastoid process + anterior border of SCM",
         "Superior: External acoustic meatus + posterior articular tubercle",
         "Inferior: No clear floor — continuous with upper neck",
         "Medial: Styloid process + styloid muscles (styloglossus, stylopharyngeus, stylohyoid) — these form the 'styloid diaphragm' separating parotid from parapharyngeal space"
       ]},
      {h:"Contents",
       list:[
         "Parotid gland (superficial + deep lobes spanning styloid diaphragm)",
         "Facial nerve (CN VII) — enters posterior part; fans out into TZBMC within gland",
         "Retromandibular vein (formed within gland)",
         "External carotid artery (gives terminal branches: maxillary a. + superficial temporal a. within gland)",
         "Auriculotemporal nerve (V3) — roof of fossa",
         "Great auricular nerve (C2/C3) — overlies the gland superficially",
         "Parotid lymph nodes (pre-auricular + intra-parotid)"
       ]},
      {h:"Parotidectomy plane",
       list:[
         "Superficial parotidectomy: removes superficial lobe while preserving CN VII",
         "Facial nerve identified at stylomastoid foramen (between mastoid tip and styloid process) → followed forward through gland",
         "Retromandibular vein is the key deep limit of the superficial lobe"
       ]}
    ]
  },

  "infratemporal-fossa":{
    title:"Infratemporal fossa — borders, foramina & contents",
    parent:"head",
    body:[
      {h:"Borders",
       list:[
         "Anterior: Posterior surface of maxilla",
         "Posterior: Styloid process + tympanic plate of temporal bone",
         "Superior: Infratemporal surface of greater wing of sphenoid (infratemporal crest above)",
         "Lateral: Medial surface of zygomatic arch + ramus of mandible",
         "Medial: Lateral pterygoid plate",
         "No true inferior wall — opens into neck"
       ]},
      {h:"Communications / foramina",
       list:[
         "Foramen ovale (superior): V3 + lesser petrosal n. → enters ITF",
         "Foramen spinosum (superior): middle meningeal a. + n. (V3 meningeal branch) → enters ITF",
         "Inferior orbital fissure (anterior-superior): maxillary n. (V2) + infraorbital vessels",
         "Pterygomaxillary fissure (medial): leads to pterygopalatine fossa (maxillary a. 3rd part, V2)",
         "Mandibular foramen (medial surface of ramus): inferior alveolar n. + a. enter mandibular canal"
       ]},
      {h:"Contents",
       list:[
         "V3 (mandibular nerve) — main nerve of ITF; divides into anterior + posterior divisions",
         "Chorda tympani — joins lingual n. (V3) in ITF",
         "Otic ganglion — parasympathetic; just below foramen ovale, medial to V3",
         "Maxillary artery — 1st part (mandibular): between neck of mandible and sphenomandibular ligament; 2nd part (pterygoid): between pterygoids; 3rd part (pterygopalatine): passes through pterygomaxillary fissure",
         "Pterygoid venous plexus — around pterygoid muscles",
         "Medial + lateral pterygoid muscles",
         "Maxillary vein"
       ]},
      {h:"Maxillary artery — 1st and 2nd part branches (in ITF)",
       list:[
         "1st part (mandibular): Deep auricular a., anterior tympanic a., middle meningeal a. (foramen spinosum), inferior alveolar a. (mandibular foramen), accessory meningeal a.",
         "2nd part (pterygoid): Deep temporal aa. (ant + post), masseteric a., pterygoid branches, buccal a."
       ]},
      {img:"infratemporal-fossa.jpg", caption:"Infratemporal fossa contents — V3, maxillary artery, pterygoid muscles"}
    ]
  },

  "pterygopalatine-fossa":{
    title:"Pterygopalatine fossa — 7 communications, V2 & maxillary artery 3rd part",
    parent:"head",
    body:[
      {h:"Location",
       p:"A small, cone-shaped fossa deep to the infratemporal fossa, between the posterior maxilla (anterior), pterygoid process (posterior), and palatine bone (medial). It is a crossroads for nerves and vessels."},
      {h:"Borders",
       list:[
         "Anterior: Posterior surface of body of maxilla",
         "Posterior: Pterygoid process + greater wing of sphenoid",
         "Medial: Perpendicular plate of palatine bone",
         "Lateral: Pterygomaxillary fissure (open — communication with ITF)",
         "Roof: Body of sphenoid (floor of orbit)"
       ]},
      {h:"7 Communications — mnemonic: FOR MOPS (+ lateral)",
       list:[
         "1. Foramen rotundum (posterior wall) → middle cranial fossa: V2 maxillary nerve enters PPF",
         "2. Pterygoid canal (posterior wall) → foramen lacerum: nerve of pterygoid canal (greater + deep petrosal)",
         "3. Pharyngeal canal (medial wall) → nasopharynx: pharyngeal branch of V2",
         "4. Infraorbital groove/canal (roof → floor of orbit) → inferior orbital fissure: infraorbital n. + vessels",
         "5. Greater palatine canal (inferior) → greater + lesser palatine foramina: greater + lesser palatine nn. + vessels",
         "6. Sphenopalatine foramen (medial) → nasal cavity: nasopalatine n., lateral posterior nasal nn., sphenopalatine vessels",
         "7. Pterygomaxillary fissure (lateral) → infratemporal fossa: maxillary artery enters PPF"
       ]},
      {h:"Contents",
       list:[
         "V2 (maxillary nerve): enters via foramen rotundum; branches: zygomatic n., infraorbital n., posterior superior alveolar n., palatine nn., nasopalatine n., pharyngeal n.",
         "Pterygopalatine ganglion: suspended from V2; parasympathetic ganglion (pre-ganglionic via greater petrosal n.; post-ganglionic to lacrimal, nasal, palatine glands)",
         "Maxillary artery 3rd part (pterygopalatine part): enters via pterygomaxillary fissure → branches: posterior superior alveolar a., infraorbital a., descending palatine a., sphenopalatine a. (main blood supply nasal cavity), artery of pterygoid canal, pharyngeal branch"
       ]},
      {h:"Clinical",
       list:[
         "Maxillary nerve block at PPF: via pterygopalatine approach (through pterygomaxillary fissure) — used in dental surgery, facial pain",
         "Angiofibroma: highly vascular tumour of PPF (adolescent males); fed by maxillary artery 3rd part",
         "PPF is a route of perineural spread for maxillary sinus malignancies"
       ]}
    ]
  },

  "dural-sinuses":{
    title:"Dural venous sinuses — drainage pathway",
    parent:"head",
    body:[
      {h:"Overview",
       p:"Dural venous sinuses are endothelium-lined channels between the periosteal and meningeal layers of dura mater. They drain the brain and skull and do not have valves."},
      {h:"Unpaired sinuses",
       list:[
         "Superior sagittal sinus (SSS): along superior border of falx cerebri; drains cortical + bridging veins; → confluens sinuum (torcular Herophili)",
         "Inferior sagittal sinus: along inferior free border of falx cerebri; → joins great cerebral vein → straight sinus",
         "Straight sinus: junction of falx cerebri and tentorium cerebelli; receives inferior sagittal sinus + great cerebral vein of Galen → confluens sinuum",
         "Occipital sinus: in falx cerebelli; → confluens sinuum"
       ]},
      {h:"Paired sinuses",
       list:[
         "Transverse sinuses: from confluens sinuum → sigmoid sinuses (follow groove on occipital bone then temporal bone)",
         "Sigmoid sinuses: S-shaped; → internal jugular vein (at jugular foramen)",
         "Cavernous sinuses: lateral to body of sphenoid (sella turcica); paired, communicate across midline via intercavernous sinuses",
         "Superior petrosal sinus: cavernous sinus → transverse/sigmoid junction",
         "Inferior petrosal sinus: cavernous sinus → internal jugular vein",
         "Sphenoparietal sinus: under lesser wing sphenoid → cavernous sinus"
       ]},
      {h:"Main drainage pathway",
       list:[
         "Cerebral cortex veins → SSS → confluens sinuum → transverse sinus → sigmoid sinus → internal jugular vein (IJV)",
         "Deep cerebral veins → great cerebral vein → straight sinus → confluens → as above"
       ]},
      {h:"Cavernous sinus contents (lateral wall, medial to lateral)",
       list:[
         "Lateral wall (top to bottom): CN III (oculomotor), CN IV (trochlear), CN V1 (ophthalmic), CN V2 (maxillary)",
         "Within the sinus itself: ICA (siphon) + sympathetic plexus, CN VI (abducens) — runs medially alongside ICA",
         "Mnemonic: 'O TOM CAT' — Oculomotor, Trochlear, Ophthalmic, Maxillary, Carotid Artery with Trochlear (or simply 3, 4, V1, V2 in wall; 6 and ICA inside)"
       ]},
      {h:"Emissary veins",
       list:[
         "Connect dural sinuses to extracranial veins through foramina; valveless",
         "Parietal emissary: SSS ↔ scalp veins",
         "Mastoid emissary: sigmoid sinus ↔ posterior auricular/occipital vein",
         "Condylar emissary: sigmoid sinus ↔ vertebral venous plexus",
         "Cavernous: connections via foramen ovale + foramen lacerum ↔ pterygoid plexus"
       ]},
      {img:"dural-sinuses.jpg", caption:"Dural venous sinuses — drainage pathways and cavernous sinus"}
    ]
  },

  "dural-reflections":{
    title:"Dural reflections & herniation syndromes",
    parent:"head",
    body:[
      {h:"Overview",
       p:"The meningeal layer of dura mater forms 4 major folds (reflections) that partially divide the cranial cavity, providing support to the brain."},
      {h:"1. Falx cerebri",
       list:[
         "Shape: Sickle-shaped vertical fold in longitudinal fissure between cerebral hemispheres",
         "Attachment: Crista galli (anterior) → internal occipital protuberance (posterior)",
         "Upper border: Superior sagittal sinus",
         "Lower free border: Inferior sagittal sinus",
         "Herniation: Subfalcine herniation — cingulate gyrus herniates under free edge → ACA compression"
       ]},
      {h:"2. Tentorium cerebelli",
       list:[
         "Shape: Horizontal 'tent' separating occipital lobes from cerebellum",
         "Attachment: Petrous ridges + posterior clinoid processes; inner border = tentorial notch (incisura)",
         "Sinuses enclosed: Transverse sinuses (posterior border), superior petrosal sinuses (lateral border), straight sinus (posterior midline)",
         "Tentorial notch: Contains brainstem + CN III + PCA + SCA",
         "Herniation: Transtentorial (uncal) herniation — medial temporal lobe (uncus) herniates through notch → CN III palsy (fixed dilated pupil FIRST), then ipsilateral then contralateral Babinski; Kernohan's notch (false localising) — contralateral cerebral peduncle compressed by edge"
       ]},
      {h:"3. Falx cerebelli",
       list:[
         "Small vertical fold between cerebellar hemispheres in posterior fossa",
         "Contains occipital sinus"
       ]},
      {h:"4. Diaphragma sellae",
       list:[
         "Horizontal fold forming roof of pituitary fossa (sella turcica)",
         "Central opening for pituitary stalk",
         "Clinical: Pituitary tumours can expand upward through opening → compress optic chiasm → bitemporal hemianopia"
       ]},
      {h:"Herniation syndromes summary",
       list:[
         "Subfalcine: cingulate gyrus → under falx → ACA territory infarct, leg weakness",
         "Uncal (transtentorial): uncus → tentorial notch → CN III palsy (ipsilateral fixed dilated pupil), hemiplegia (contralateral or ipsilateral Kernohan's notch)",
         "Central (transtentorial): diencephalon herniates through notch bilaterally → coma, bilateral Babinski",
         "Tonsillar (foramen magnum): cerebellar tonsils → foramen magnum → brainstem compression → cardiorespiratory arrest (Cushing's triad)"
       ]}
    ]
  },

  "meninges":{
    title:"Three meninges, spaces & CSF circulation",
    parent:"head",
    body:[
      {h:"Three layers (outer → inner)",
       list:[
         "Dura mater ('tough mother'): thick, fibrous, 2 layers — periosteal (attached to inner skull) + meningeal (inner layer = dural reflections); dural sinuses lie between 2 layers",
         "Arachnoid mater: delicate, avascular; inner surface separated from pia by subarachnoid space",
         "Pia mater ('tender mother'): thin, vascular; closely adheres to brain surface, dips into sulci"
       ]},
      {h:"Spaces",
       list:[
         "Epidural (extradural) space: between skull + periosteal dura — POTENTIAL space (dura adheres to skull); contains middle meningeal artery; epidural haematoma = lens-shaped (biconvex) on CT — arterial bleeding",
         "Subdural space: between dural meningeal layer + arachnoid — POTENTIAL space; bridging veins cross it; subdural haematoma = crescent-shaped on CT — venous bleeding (elderly, anticoagulated)",
         "Subarachnoid space: between arachnoid + pia — REAL space; filled with CSF; bridging veins + cerebral arteries run here; SAH = blood in this space (thunderclap headache)"
       ]},
      {h:"CSF circulation",
       list:[
         "Production: Choroid plexus (mainly lateral ventricles) → 500 mL/day produced; total volume ≈ 150 mL",
         "Flow: Lateral ventricles → foramen of Monro → 3rd ventricle → aqueduct of Sylvius → 4th ventricle → foramina of Magendie (median) + Luschka (lateral) → subarachnoid space",
         "Reabsorption: Arachnoid granulations (Pacchionian bodies) → dural sinuses (mainly SSS) → venous system",
         "Lumbar cistern (L2–S2): CSF-filled extension below conus medullaris — sampled by lumbar puncture"
       ]},
      {h:"Bridging veins",
       list:[
         "Drain cortical veins from brain surface → cross subdural space → enter dural sinuses (mainly SSS)",
         "At risk in acceleration-deceleration injuries (subdural haematoma)",
         "Stretched by cerebral atrophy (elderly) → increased vulnerability"
       ]},
      {h:"Clinical",
       list:[
         "Meningitis: inflammation of meninges; nuchal rigidity, Kernig's, Brudzinski's signs",
         "Lumbar puncture: needle at L3/4 or L4/5 space (below conus); layers pierced: skin → SC fascia → supraspinous lig. → interspinous lig. → ligamentum flavum → epidural space → dura → arachnoid → subarachnoid space",
         "Normal CSF: clear, protein 15–45 mg/dL, glucose 2/3 of serum glucose, <5 WBC"
       ]}
    ]
  },

  "skull-base-foramina":{
    title:"Skull base foramina — ROS + all key foramina",
    parent:"head",
    body:[
      {h:"Anterior cranial fossa",
       list:[
         "Cribriform plate (ethmoid): CN I (olfactory fila) + anterior ethmoidal n. + vessels",
         "Foramen cecum: emissary vein (nose → SSS); usually obliterated"
       ]},
      {h:"Middle cranial fossa — key mnemonic ROS",
       list:[
         "<b>R</b>otundum: V2 (maxillary nerve) → pterygopalatine fossa",
         "<b>O</b>vale: V3 (mandibular nerve) + lesser petrosal n. + accessory meningeal a. → infratemporal fossa",
         "<b>S</b>pinosum: Middle meningeal artery + vein + meningeal branch of V3 → enter middle cranial fossa",
         "Foramen lacerum: ICA (passes over / through its superior portion, not truly through fibrocartilage); greater petrosal n. + deep petrosal n. join here to form nerve of pterygoid canal",
         "Superior orbital fissure: CN III, IV, V1 (frontal, lacrimal, nasociliary), CN VI, superior ophthalmic vein, sympathetic fibres",
         "Optic canal: CN II + ophthalmic artery (+ CSF in optic nerve sheath)",
         "Carotid canal: ICA enters skull here; enters foramen lacerum then cavernous sinus"
       ]},
      {h:"Posterior cranial fossa",
       list:[
         "Internal acoustic meatus (IAM): CN VII + CN VIII + labyrinthine artery",
         "Jugular foramen: CN IX, X, XI + IJV (sigmoid sinus → IJV) + inferior petrosal sinus",
         "Hypoglossal canal: CN XII",
         "Foramen magnum: brainstem (medulla/spinal cord junction) + vertebral arteries + CN XI spinal root + anterior/posterior spinal arteries"
       ]},
      {h:"Memory aid — middle fossa foramina by content type",
       list:[
         "Sensory nerves: Rotundum (V2), Ovale (V3), cribriform plate (CN I)",
         "Arteries: Spinosum (middle meningeal), Carotid canal (ICA), Foramen lacerum (ICA over it)",
         "Mixed: SOF (III, IV, V1, VI + ophthalmic vein), Ovale (V3 + lesser petrosal)"
       ]}
    ]
  },

  "ica-circle-of-willis":{
    title:"ICA, carotid siphon & Circle of Willis",
    parent:"head",
    body:[
      {h:"ICA segments — mnemonic C1 to C7 or 'CPOCCLC'",
       list:[
         "C1 Cervical: from carotid bifurcation (C3/4) to carotid canal; no branches",
         "C2 Petrous: within carotid canal; branches — caroticotympanic a., pterygoid canal a.",
         "C3 Lacerum: over foramen lacerum (covered by fibrocartilage); no branches",
         "C4 Cavernous: within cavernous sinus; branches — meningohypophyseal trunk, inferolateral trunk; forms carotid siphon (S-shape with C5)",
         "C5 Clinoid: exits cavernous sinus; short segment; dural rings",
         "C6 Ophthalmic: gives ophthalmic artery + superior hypophyseal artery",
         "C7 Communicating: posterior communicating a. + anterior choroidal a.; ends at bifurcation → ACA + MCA"
       ]},
      {h:"Carotid siphon",
       list:[
         "S-shaped bend formed by C4 (cavernous) + C5 (clinoid) segments",
         "Visible on lateral angiogram",
         "ICA is enclosed by sympathetic plexus through cavernous sinus — Horner's syndrome with C4 lesions"
       ]},
      {h:"Circle of Willis (circulus arteriosus)",
       list:[
         "Complete circle: ACA (both) + A-comm (anterior communicating) + ICA (both) + PComm (both) + PCA (both from basilar)",
         "Anterior: ACA + anterior communicating artery",
         "Posterior: PCA (from basilar) + posterior communicating a. (connects ICA to PCA)",
         "Complete in only ~20% of population (one or more vessels hypoplastic in 80%)"
       ]},
      {h:"Berry aneurysm sites",
       list:[
         "Most common locations (junction of vessels):",
         "Anterior communicating artery — most common overall (~35%)",
         "Posterior communicating artery (ICA–PComm junction) — presents with CN III palsy",
         "Middle cerebral artery bifurcation — largest; may present with intracerebral haemorrhage",
         "Basilar tip — PCA + SCA compression; dorsal midbrain syndrome",
         "PICA origin (vertebral–PICA junction) — Wallenberg syndrome on rupture"
       ]},
      {h:"Clinical",
       list:[
         "ICA occlusion (C7): major ACA + MCA territory infarct",
         "PComm aneurysm: expanding → CN III compression → fixed dilated pupil, eye 'down and out', ptosis",
         "SAH from Berry aneurysm: worst headache of life (thunderclap), sentinel bleed, xanthochromia on LP"
       ]},
      {img:"ica-circle-of-willis.jpg", caption:"Circle of Willis and ICA segments — aneurysm sites marked"}
    ]
  },

  "maxillary-artery":{
    title:"Maxillary artery — DAM I AM mnemonic (3 parts, 18+ branches)",
    parent:"head",
    body:[
      {h:"Origin and overview",
       list:[
         "Terminal branch of external carotid artery (with superficial temporal a.) — divides within or behind parotid gland",
         "Runs through infratemporal fossa → enters pterygopalatine fossa",
         "3 parts based on relation to lateral pterygoid muscle"
       ]},
      {h:"Part 1 — Mandibular (medial to neck of mandible/sphenomandibular ligament)",
       p:"Mnemonic: DAM = Deep auricular, Anterior tympanic, Middle meningeal, accessory meningeal, inferior alveolar",
       list:[
         "<b>D</b>eep auricular a. → external acoustic meatus",
         "<b>A</b>nterior tympanic a. → tympanic membrane",
         "<b>M</b>iddle meningeal a. → foramen spinosum → epidural space (between dura layers); anterior branch most commonly torn in temporal bone fracture → epidural haematoma",
         "Accessory meningeal a. → foramen ovale → meninges",
         "Inferior alveolar a. → mandibular foramen → mandibular canal → lower teeth → mental a. (exit mental foramen)"
       ]},
      {h:"Part 2 — Pterygoid (between pterygoid muscles)",
       p:"Mnemonic: I AM = masseteric, deep temporal (ant + post), pterygoid branches, buccal",
       list:[
         "Masseteric a. (through mandibular notch → masseter)",
         "Deep temporal aa. — anterior + posterior (→ temporalis)",
         "Pterygoid branches (→ pterygoid muscles)",
         "Buccal a. (→ buccinator + cheek)"
       ]},
      {h:"Part 3 — Pterygopalatine (in pterygopalatine fossa, entered via pterygomaxillary fissure)",
       p:"Mnemonic: branches of 3rd part: SIDA + pharyngeal + artery of pterygoid canal",
       list:[
         "Posterior superior alveolar a. → upper molar teeth + maxillary sinus",
         "Infraorbital a. → enters inferior orbital fissure → infraorbital canal → supplies anterior face + upper anterior teeth",
         "Descending palatine a. → greater + lesser palatine aa. → hard + soft palate",
         "Sphenopalatine a. (terminal) → sphenopalatine foramen → nasal cavity (main supply to nasal mucosa; 'artery of epistaxis' — posterior nasal bleeding)",
         "Artery of pterygoid canal → Vidian canal → nasopharynx",
         "Pharyngeal branch → roof of nasopharynx"
       ]},
      {h:"Clinical",
       list:[
         "Epistaxis (posterior): sphenopalatine artery ligation or embolisation",
         "Epidural haematoma: middle meningeal artery (Part 1) torn after temporal bone fracture — lucid interval then rapid deterioration",
         "Maxillary artery embolisation: for tumour supply (juvenile angiofibroma), epistaxis"
       ]}
    ]
  },

  "facial-tzbmc":{
    title:"Facial nerve TZBMC motor branches & superficial cervical ansa",
    parent:"head",
    body:[
      {h:"Mnemonic — To Zanzibar By Motor Car",
       list:[
         "<b>T</b>emporal branch: exits superior parotid → crosses zygomatic arch → frontalis (raises brow), orbicularis oculi (upper, closes eye), corrugator supercilii, procerus",
         "<b>Z</b>ygomatic branch: crosses zygoma + cheek → orbicularis oculi (lower), zygomatic major/minor, levator labii superioris",
         "<b>B</b>uccal branch: horizontal across cheek → buccinator, orbicularis oris, upper lip depressors/levators (buccal communicates with zygomatic — most common anastomosis between branches)",
         "<b>M</b>arginal mandibular branch: runs along mandible lower border → depressor anguli oris, depressor labii inferioris, mentalis; most commonly injured in submandibular incisions",
         "<b>C</b>ervical branch: descends into neck → platysma + communicates with transverse cervical n."
       ]},
      {h:"Branch anastomoses",
       list:[
         "Zygomatic ↔ Buccal: most common; explains why isolated upper buccal branch injury may recover (collateral supply)",
         "Cervical ↔ Transverse cervical n. (C2/C3): forms superficial cervical ansa (loop)"
       ]},
      {h:"Superficial cervical ansa",
       list:[
         "Communication loop between cervical branch of CN VII and transverse cervical nerve (C2/C3) of cervical plexus",
         "Supplies: Platysma (both CN VII + C2/3 contribution)",
         "Also connects with great auricular nerve",
         "Surgically relevant: during neck dissection and parotidectomy"
       ]},
      {h:"Marginal mandibular nerve — surgical importance",
       list:[
         "Runs below mandibular border (up to 1.2 cm below) in 20% of people — highly vulnerable",
         "Injury: unable to depress lower lip corner → asymmetric smile (marginal mandibular palsy)",
         "At risk: submandibular gland surgery, neck dissection, face-lift"
       ]},
      {h:"Testing each branch",
       list:[
         "T — Raise eyebrows (frontalis)",
         "Z — Close eyes tightly (orbicularis oculi)",
         "B — Puff cheeks / show upper teeth",
         "M — Depress lower lip corners / show lower teeth",
         "C — Neck platysma tension (ask patient to grimace)"
       ]}
    ]
  },
