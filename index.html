  "cervical-fascia":{
    title:"Cervical fascia — layers",
    parent:"neck",
    body:[
      {h:"Overview",
       p:"The neck is divided into functional compartments by fascial layers that guide surgical planes, limit the spread of infection, and form important surgical landmarks."},
      {h:"Superficial fascia",
       list:[
         "Contains platysma (thin sheet of muscle — CN VII), cutaneous nerves of neck, and superficial veins (external jugular vein)",
         "Lies immediately deep to the skin; does not form a distinct defined sheet",
         "Platysma tenses the neck skin and depresses the mandible; innervated by cervical branch of CN VII"
       ]},
      {h:"Deep cervical fascia — 3 named layers",
       list:[
         "<b>1. Investing (superficial) layer</b>: Encircles the entire neck deep to superficial fascia. Splits to enclose SCM (laterally) and trapezius (posteriorly). Forms the roof of the posterior triangle (pierced by EJV and cutaneous cervical plexus branches). Anteriorly attaches to mandible, hyoid, sternum, clavicle; posteriorly to occipital bone, nuchal ligament, spine of scapula.",
         "<b>2. Pretracheal layer</b>: Anterior part — encloses thyroid, parathyroids, larynx, trachea. Posterior part = buccopharyngeal fascia (encloses pharyngeal constrictors and buccinator).",
         "<b>3. Prevertebral layer</b>: Encircles the vertebral column, cervical plexus roots, brachial plexus, sympathetic chain, scalene muscles, and deep cervical muscles (longus colli, longus capitis). Continues laterally as the axillary sheath. Forms the floor of the posterior triangle."
       ]},
      {h:"Carotid sheath",
       list:[
         "A fascial tube formed by contributions from all 3 deep cervical layers",
         "Contents (VAN from lateral to medial): IJV, CCA/ICA, vagus nerve (posterior between)",
         "Ansa cervicalis lies on anterior surface of sheath",
         "Lymph nodes along IJV are embedded in it"
       ]},
      {h:"Alar fascia",
       list:[
         "A thin fascial layer between the prevertebral and buccopharyngeal fasciae",
         "Defines the 'danger space' (retrovisceral space) of deep neck infections",
         "Communicates inferiorly all the way to the posterior mediastinum and diaphragm — pathway for descending necrotizing mediastinitis"
       ]},
      {h:"Spaces formed by fascial layers",
       list:[
         "Pretracheal space: between pretracheal fascia and trachea — anterior to trachea, communicates with anterior mediastinum",
         "Retropharyngeal space: between buccopharyngeal fascia and alar fascia — between spine and pharynx/esophagus; communicates with posterior mediastinum",
         "Danger space: between alar fascia and prevertebral fascia — extends from skull base to diaphragm",
         "Prevertebral space: between prevertebral fascia and vertebrae"
       ]},
      {h:"Clinical",
       list:[
         "Deep neck infections spread preferentially along fascial planes — Ludwig's angina (submandibular space), retropharyngeal abscess, parapharyngeal abscess",
         "Danger space infections can descend to diaphragm — medical emergency",
         "Surgical dissection planes (e.g., thyroidectomy, carotid endarterectomy) follow fascial layers"
       ]},
      {img:"cervical-fascia.jpg", caption:"Cervical fascia layers — cross-section at C5 showing all compartments"}
    ]
  },

  "punctum-nervosum":{
    title:"Punctum nervosum — Erb's point of the cervical plexus",
    parent:"neck",
    body:[
      {h:"Definition and location",
       list:[
         "The punctum nervosum (Erb's point of the cervical plexus) is the point on the posterior border of the SCM where the four cutaneous branches of the cervical plexus emerge",
         "Located at the junction of the upper and middle thirds of the SCM — approximately 6–7 cm above the clavicle",
         "Clinically palpable as a spot where multiple nerves are superficial and close together"
       ]},
      {h:"Four cutaneous branches emerging at the punctum nervosum",
       list:[
         "<b>Lesser occipital nerve (C2)</b>: Ascends along posterior border of SCM; sensory to posterior superior auricle and adjacent scalp. Mnemonic: 'Lesser' = highest, goes UP",
         "<b>Great auricular nerve (C2–C3)</b>: Largest cutaneous branch; wraps around posterior SCM and crosses it; sensory to angle of mandible, lower auricle, parotid skin",
         "<b>Transverse cervical nerve (C2–C3)</b>: Runs horizontally across SCM; sensory to anterior neck skin (platysma overlying region)",
         "<b>Supraclavicular nerves (C3–C4)</b>: Descend to supply skin over clavicle, upper anterior chest (including pectoral region to 2nd rib), and shoulder (tip)"
       ]},
      {h:"Distinction from brachial plexus 'Erb's point'",
       list:[
         "Brachial plexus Erb's point: the union of C5 and C6 anterior rami to form the upper trunk of the brachial plexus — in the scalene fissure",
         "Brachial plexus Erb-Duchenne palsy (C5–C6 lesion): 'waiter's tip' — shoulder adducted, arm internally rotated, forearm pronated, wrist flexed",
         "The two 'Erb's points' overlap in nomenclature but are anatomically distinct — context determines which is meant"
       ]},
      {h:"Clinical relevance",
       list:[
         "All four cervical plexus cutaneous branches are accessible at this point for nerve blocks (cervical plexus block)",
         "Great auricular nerve must be identified and preserved during parotidectomy and posterior triangle neck dissection",
         "Supraclavicular nerve injury during surgery causes 'cape anesthesia' — numbness over shoulder/upper chest"
       ]},
      {img:"punctum-nervosum.jpg", caption:"Punctum nervosum — 4 cutaneous branches at posterior border of SCM"}
    ]
  },

  "neck-skin-innervation":{
    title:"Sensory innervation of neck skin",
    parent:"neck",
    body:[
      {h:"Overview",
       p:"The skin of the neck is supplied entirely by the cervical plexus (C2–C4) with contributions from CN V3 (mandibular) and greater occipital nerve (C2 dorsal ramus)."},
      {h:"Anterior neck",
       list:[
         "Transverse cervical nerve (C2–C3): horizontal strip across the anterior neck; emerges at punctum nervosum and runs anterior to SCM",
         "Supraclavicular nerves (C3–C4): skin below — over clavicle, upper pectoral region, and shoulder tip"
       ]},
      {h:"Lateral neck",
       list:[
         "Great auricular nerve (C2–C3): skin over the parotid gland, angle of mandible, and lower part of the auricle; largest cutaneous branch of cervical plexus",
         "Lesser occipital nerve (C2): posterior part of auricle, adjacent scalp above the ear"
       ]},
      {h:"Posterior neck",
       list:[
         "Greater occipital nerve (C2 dorsal ramus — medial branch): major sensory nerve of the posterior scalp; emerges at the inferior border of inferior oblique muscle; supplies posterior scalp to vertex",
         "Lesser occipital nerve (C2 anterior ramus): posterior scalp behind ear",
         "Third occipital nerve (C3 dorsal ramus): small strip of skin across the occiput"
       ]},
      {h:"Suboccipital / posterior triangle boundary",
       list:[
         "Greater occipital n. can be compressed at the superior nuchal line or in the suboccipital triangle — causes occipital neuralgia",
         "C1 dorsal ramus (suboccipital nerve) is motor-only — no cutaneous branch"
       ]},
      {h:"Angle of mandible — important boundary",
       list:[
         "The angle of the mandible is supplied by GREAT AURICULAR NERVE (C2–C3), NOT by V3",
         "This is a key clinical test: if anesthesia of the angle of mandible is present after a stroke, it suggests a hemispheric lesion (not trigeminal nucleus) because V3 does not supply this region"
       ]},
      {h:"Dermatomes summary",
       list:[
         "C2: back of head and upper posterior neck + posterior ear (via greater occipital and lesser occipital)",
         "C3: back and side of neck; angle of mandible skin; posterior scalp crown",
         "C4: shoulder 'cape' region; skin over clavicle"
       ]},
      {img:"neck-skin-innervation.jpg", caption:"Sensory cutaneous map of the neck — cervical plexus distribution"}
    ]
  },

  "neck-triangles":{
    title:"Neck triangles — borders & contents",
    parent:"neck",
    body:[
      {h:"Overview",
       p:"The neck is divided by the SCM into the anterior triangle (medial) and the posterior triangle (lateral). Each is further subdivided."},
      {h:"Carotid triangle",
       list:[
         "Borders: Lateral — SCM; Cranial — posterior belly of digastric + stylohyoid; Caudoanterior — superior belly of omohyoid",
         "Contents: CCA bifurcation (at C4), IJV, CN X (vagus), CN XII (hypoglossal), CN XI (accessory — crosses laterally through), ansa cervicalis, external + internal laryngeal nerves, superior thyroid and lingual arteries",
         "Carotid sinus (at bifurcation) — baroreceptors (CN IX afferents); carotid body — chemoreceptors"
       ]},
      {h:"Submandibular (digastric) triangle",
       list:[
         "Borders: Superior — body of mandible; Inferoposterior — posterior belly of digastric; Inferoanterior — anterior belly of digastric",
         "Floor: mylohyoid (anterior) + hyoglossus (posterior)",
         "Contents: Submandibular gland (superficial + deep parts + submandibular duct of Wharton); submandibular lymph nodes; hypoglossal nerve (CN XII) on hyoglossus; lingual nerve (V3) above; mylohyoid nerve (V3); facial artery + vein; submental vessels; submandibular ganglion (suspended from lingual n.)"
       ]},
      {h:"Submental triangle",
       list:[
         "Borders: Lateral — anterior bellies of digastric (×2); Posterior — body of hyoid",
         "Floor: mylohyoid muscles (×2) meeting at midline raphe",
         "Contents: Submental lymph nodes (drain tip of tongue, anterior floor of mouth, central lower lip, chin); submental branch of facial artery and vein; platysma"
       ]},
      {h:"Suboccipital triangle (posterior neck — not a true neck triangle but classical)",
       list:[
         "Borders: Superomedial — rectus capitis posterior major; Superolateral — obliquus capitis superior; Inferolateral — obliquus capitis inferior",
         "Floor: Posterior atlanto-occipital membrane + posterior arch of atlas",
         "Contents: Vertebral artery (3rd part — V3, looping over posterior arch of atlas); suboccipital nerve (C1 dorsal ramus — motor only); suboccipital venous plexus"
       ]},
      {h:"Béclard's angle",
       list:[
         "Angle between posterior belly of digastric and greater horn of hyoid bone",
         "The lingual artery dips deep to hyoglossus here — surgical landmark for ligation of lingual artery",
         "Used by surgeons when approaching the ECA or lingual artery from the anterior triangle"
       ]},
      {h:"Pirogov's triangle (within submandibular/digastric triangle)",
       list:[
         "Borders: Superior — hypoglossal nerve (CN XII); Posteroinferior — posterior border of mylohyoid muscle; Inferior — intermediate tendon of digastric",
         "The lingual artery passes deep to hyoglossus muscle here — classical site for lingual artery ligation",
         "Pirogov's triangle is the LINGUAL artery ligation site; Béclard's angle is a related ECA landmark"
       ]},
      {h:"Scalene fissure (interscalene triangle)",
       list:[
         "Borders: Anterior — anterior scalene; Posterior — middle scalene; Inferior — 1st rib",
         "Contents: Trunks of brachial plexus (C5–T1) + 3rd part of subclavian artery",
         "NOTE: Subclavian vein passes ANTERIOR to the anterior scalene (not through the fissure) — important for pacemaker wire complications and thoracic outlet anatomy"
       ]},
      {h:"Clinical: Posterior triangle",
       list:[
         "Roof: investing fascia of deep cervical fascia (with EJV and cutaneous cervical plexus branches piercing it)",
         "Floor: prevertebral fascia (covering scalene muscles + splenius capitis + levator scapulae)",
         "Contents: CN XI (accessory nerve) crossing obliquely — at risk in lymph node biopsy causing dropped shoulder",
         "Inferior subclavian triangle (subdivision): between omohyoid and clavicle — subclavian artery 3rd part, brachial plexus, suprascapular vessels"
       ]},
      {img:"neck-triangles.jpg", caption:"Anterior + posterior triangles of the neck with subdivisions"}
    ]
  },

  "cervical-plexus":{
    title:"Cervical plexus (C1–C4)",
    parent:"neck",
    body:[
      {h:"Formation",
       list:[
         "Formed by anterior rami of C1–C4, lying deep to the SCM and anterior to the scalenus medius and levator scapulae",
         "Branches emerge at Erb's point (punctum nervosum) on the posterior border of SCM"
       ]},
      {h:"Cutaneous (sensory) branches — emerge at Erb's point",
       list:[
         "Lesser occipital nerve (C2): posterior auricle + adjacent scalp",
         "Great auricular nerve (C2–C3): angle of mandible, parotid skin, auricle",
         "Transverse cervical nerve (C2–C3): anterior neck",
         "Supraclavicular nerves (C3–C4): clavicle, upper chest, shoulder — medial, intermediate, lateral branches"
       ]},
      {h:"Motor branches",
       list:[
         "<b>Ansa cervicalis (C1–C3)</b> — supplies infrahyoid strap muscles (see cervical ansae entry)",
         "<b>Phrenic nerve (C3–C5)</b> — sole motor supply of diaphragm (see phrenic nerve entry)",
         "Direct muscular branches to prevertebral muscles: C1–C3 → rectus capitis anterior + lateralis, longus capitis, longus colli",
         "Branches to levator scapulae (C3–C4)",
         "Branch to middle scalene (C3–C4)"
       ]},
      {h:"Communicating branches",
       list:[
         "Cervical branch of facial nerve (CN VII) communicates with transverse cervical nerve — superficial cervical ansa",
         "C1 fibers travel with CN XII to supply geniohyoid and thyrohyoid before joining ansa cervicalis superior root",
         "Phrenic nerve receives contributions from C3, C4, C5 (with C4 being dominant)"
       ]},
      {h:"Cervical plexus block — clinical",
       list:[
         "Superficial block at Erb's point: anaesthetises cutaneous branches — used for carotid endarterectomy under local anaesthesia, thyroid surgery, neck dissection",
         "Deep block: injected adjacent to C2–C4 transverse processes — risk of phrenic nerve block (contralateral phrenic must be intact)"
       ]},
      {img:"cervical-plexus.jpg", caption:"Cervical plexus — roots, branches, and distribution"}
    ]
  },

  "cervical-ansae":{
    title:"Superficial + deep cervical ansa",
    parent:"neck",
    body:[
      {h:"Superficial cervical ansa",
       list:[
         "A communicating loop on the lateral neck",
         "Formed between: Transverse cervical nerve (C2–C3) of cervical plexus + Cervical branch of facial nerve (CN VII)",
         "Purely sensory — provides sensory supply to anterior neck skin",
         "Significance: explains why the cervical branch of CN VII has some sensory overlap with the cervical plexus; also explains variable platysma innervation"
       ]},
      {h:"Deep cervical ansa = ansa cervicalis",
       list:[
         "A motor loop on the anterior surface of the carotid sheath / IJV",
         "Formed by:",
         "  — Superior root (descendens hypoglossi): C1 fibers that hitch a ride with CN XII; descends from CN XII in the carotid triangle",
         "  — Inferior root (descendens cervicalis): C2–C3 fibers descend from cervical plexus",
         "The two roots unite anterior to (or on) the IJV to form the loop"
       ]},
      {h:"Muscles supplied by ansa cervicalis",
       list:[
         "Sternohyoid — C1–C3",
         "Sternothyroid — C2–C3",
         "Superior belly of omohyoid — C1–C2 (via superior root)",
         "Inferior belly of omohyoid — C2–C3 (via inferior root)"
       ]},
      {h:"Muscles NOT supplied by ansa cervicalis",
       list:[
         "Thyrohyoid — C1 fibers via CN XII (superior root branch, NOT the ansa loop itself)",
         "Geniohyoid — C1 fibers via CN XII",
         "Digastric (posterior belly) — CN VII; (anterior belly) — V3",
         "Mylohyoid — V3 (mylohyoid nerve)",
         "Stylohyoid — CN VII"
       ]},
      {h:"Clinical",
       list:[
         "The ansa cervicalis is the reinnervation nerve used in laryngeal reinnervation procedures (e.g., after RLN injury)",
         "During carotid endarterectomy, the ansa cervicalis is seen on the carotid sheath anterior wall — care taken to avoid dividing it",
         "CN XII is often pushed medially by carotid sheath dissection — the superior root of the ansa cervicalis (traveling with XII) may be damaged"
       ]}
    ]
  },

  "brachial-plexus-checklist":{
    title:"Brachial plexus — supra- and infraclavicular",
    parent:"neck",
    body:[
      {h:"Overview — mnemonic: Real Texans Drink Cold Beer",
       list:[
         "<b>R</b>oots → <b>T</b>runks → <b>D</b>ivisions → <b>C</b>ords → <b>B</b>ranches",
         "Roots: Anterior rami C5–T1 (with variable C4 and T2 contributions)",
         "Formed in the scalene fissure (between anterior + middle scalene) and continues into the axilla"
       ]},
      {h:"Roots (C5–T1) — in scalene fissure",
       list:[
         "Each root exits its intervertebral foramen and passes laterally between scalene muscles",
         "C5+C6 → Superior trunk",
         "C7 alone → Middle trunk",
         "C8+T1 → Inferior trunk"
       ]},
      {h:"Trunks (3) — in scalene fissure / posterior triangle",
       list:[
         "Each trunk divides into anterior and posterior divisions behind the clavicle",
         "Anterior divisions supply flexor compartments; posterior divisions supply extensor compartments"
       ]},
      {h:"Cords (3) — named by relation to axillary artery",
       list:[
         "Lateral cord: anterior divisions of superior + middle trunks (C5–C7)",
         "Medial cord: anterior division of inferior trunk (C8–T1)",
         "Posterior cord: all 3 posterior divisions (C5–T1)"
       ]},
      {h:"Supraclavicular branches (from roots and trunks)",
       list:[
         "<b>Dorsal scapular nerve (C5)</b>: rhomboids + levator scapulae — medial scapular winging if injured",
         "<b>Long thoracic nerve (C5–C7)</b>: serratus anterior — 'winging scapula' (Bell's nerve). Runs along the lateral chest wall, vulnerable in radical mastectomy",
         "<b>Suprascapular nerve (C5–C6)</b>: supraspinatus + infraspinatus; may be compressed in suprascapular notch",
         "<b>Nerve to subclavius (C5–C6)</b>: subclavius"
       ]},
      {h:"Infraclavicular branches — 5 main terminal nerves",
       list:[
         "<b>Musculocutaneous nerve (C5–C7, lateral cord)</b>: flexors of arm (biceps brachii, brachialis, coracobrachialis) → continues as lateral cutaneous nerve of forearm",
         "<b>Median nerve (C5–T1, lateral + medial cords)</b>: most flexors of forearm + thenar muscles + lateral two lumbricals; sensory lateral 3½ fingers palm",
         "<b>Ulnar nerve (C8–T1, medial cord)</b>: most intrinsic hand muscles + flexor carpi ulnaris + medial FDP; sensory medial 1½ fingers",
         "<b>Axillary nerve (C5–C6, posterior cord)</b>: deltoid + teres minor; sensory regimental badge area",
         "<b>Radial nerve (C5–T1, posterior cord)</b>: all extensors of arm + forearm; sensory posterior arm/forearm + dorsum of hand (lateral 3½ fingers)"
       ]},
      {h:"Additional infraclavicular branches",
       list:[
         "Medial cutaneous nerves of arm + forearm (medial cord)",
         "Thoracodorsal nerve (C6–C8) — latissimus dorsi",
         "Subscapular nerves (upper + lower, C5–C6) — subscapularis + teres major",
         "Medial pectoral (C8–T1) + Lateral pectoral (C5–C7) — pectoralis major + minor"
       ]},
      {h:"Common palsies",
       list:[
         "Erb-Duchenne palsy (C5–C6, upper trunk): 'waiter's tip' — shoulder adducted, arm internally rotated, forearm pronated, wrist flexed. Cause: shoulder dystocia or lateral neck trauma",
         "Klumpke palsy (C8–T1, lower trunk/medial cord): claw hand + intrinsic hand muscle weakness. Cause: traction on abducted arm (birth), Pancoast tumour, thoracic outlet syndrome. + Horner's syndrome if T1 rami (carries sympathetics)"
       ]},
      {img:"brachial-plexus.jpg", caption:"Brachial plexus — Roots to Branches (RTDCB) with key nerves and territories"}
    ]
  },

  "carotid-sheath":{
    title:"Carotid sheath — relations & fascial origin",
    parent:"neck",
    body:[
      {h:"Structure",
       list:[
         "A cylindrical fascial tube running from the skull base (jugular foramen) to the root of the neck",
         "Formed by contributions from all THREE deep cervical fascial layers: investing layer (anterior wall), pretracheal layer (medial wall), prevertebral layer (posterior wall)"
       ]},
      {h:"Contents — VAN (from lateral to medial)",
       list:[
         "<b>V</b>ein — Internal jugular vein (IJV): lateral and slightly anterior within the sheath",
         "<b>A</b>rtery — Common carotid (below C4) and Internal carotid (above C4): medial",
         "<b>N</b>erve — Vagus nerve (CN X): posterior, between vein and artery",
         "Also: ansa cervicalis on the anterior surface (not inside the sheath); deep cervical lymph nodes adjacent; sympathetic trunk runs posterior/medial to the sheath (NOT within it)"
       ]},
      {h:"Anterior relations",
       list:[
         "SCM (the main covering muscle)",
         "Omohyoid (intermediate tendon tethered to the clavicle by a fascial sling — its tug during yawning or deep inspiration gently compresses the IJV, creating a pressure wave used clinically to assess venous pressure)"
       ]},
      {h:"Posterior relations",
       list:[
         "Prevertebral fascia",
         "Sympathetic trunk (just posterior/medial to the sheath — runs on longus colli)",
         "Prevertebral muscles (longus colli, longus capitis)",
         "Transverse processes of cervical vertebrae"
       ]},
      {h:"Medial relations",
       list:[
         "Trachea + larynx",
         "Esophagus (more posterior)",
         "Thyroid gland",
         "Recurrent laryngeal nerve (in tracheoesophageal groove, just medial to sheath)"
       ]},
      {h:"Clinical",
       list:[
         "Carotid endarterectomy: incision along anterior border of SCM, sheath opened, CCA/ICA dissected within sheath",
         "Carotid sheath infections can track from neck spaces (retropharyngeal) → mediastinum",
         "Central venous access via IJV: needle enters IJV just lateral to CCA; nerve (vagus) is deep and between",
         "Subclavian approach: alternative — enter subclavian vein medial to deltopectoral groove"
       ]},
      {img:"carotid-sheath.jpg", caption:"Carotid sheath cross-section — VAN contents, anterior SCM, posterior prevertebral fascia"}
    ]
  },

  "phrenic-nerve":{
    title:"Phrenic nerve (C3–C5)",
    parent:"neck",
    body:[
      {h:"Origin and mnemonic",
       list:[
         "Arises from anterior rami of C3, C4, C5 — predominantly C4",
         "Mnemonic: 'C3, 4, 5 keep the diaphragm alive'"
       ]},
      {h:"Cervical course",
       list:[
         "Forms on the anterior surface of the anterior scalene muscle (under the prevertebral fascia)",
         "Runs with the transverse cervical artery and suprascapular artery (branches of thyrocervical trunk) on the anterior scalene",
         "Crosses anterior to the subclavian artery (between the subclavian artery and subclavian vein) to enter the thorax",
         "Covered by the investing layer of deep cervical fascia anteriorly"
       ]},
      {h:"Thoracic course",
       list:[
         "Enters thorax passing between subclavian artery (posterior) and subclavian vein (anterior)",
         "Descends between mediastinal pleura and pericardium (with pericardiacophrenic artery and vein)",
         "Passes anterior to the lung root (hilum) — mnemonic: 'phrenic in front of, vagus behind, the hilum'",
         "Right phrenic: passes through caval hiatus at T8 with IVC; runs to right dome",
         "Left phrenic: pierces the left dome of the diaphragm separately (lateral to IVC hiatus), near the cardiac apex"
       ]},
      {h:"Function",
       list:[
         "Motor: sole motor supply to the diaphragm (contraction = descent for inspiration)",
         "Sensory: mediastinal pleura, fibrous pericardium and parietal pericardium, central tendon area of diaphragmatic peritoneum",
         "Peripheral diaphragmatic peritoneum is supplied by lower intercostal nerves (T6–T12) — NOT the phrenic"
       ]},
      {h:"Clinical",
       list:[
         "Referred shoulder-tip pain (C3–C4 dermatome): irritation of diaphragm/pericardium causes pain felt at shoulder tip. Kehr's sign: left shoulder pain with splenic rupture (diaphragm irritated by blood)",
         "Phrenic nerve palsy: hemidiaphragm elevation on chest X-ray (paradoxical movement on fluoroscopy sniff test); bilateral palsy = respiratory failure",
         "Phrenic nerve crush (historic): used to collapse a lung in TB treatment — now not done",
         "Hiccough (singultus): phrenic nerve irritation (C3–C5) — central or peripheral causes"
       ]},
      {img:"phrenic-nerve.jpg", caption:"Phrenic nerve — cervical origin, course on anterior scalene, thoracic path"}
    ]
  },

  "hyoid-muscles":{
    title:"Suprahyoid + infrahyoid muscles",
    parent:"neck",
    body:[
      {h:"Suprahyoid muscles (above the hyoid — elevate hyoid or depress mandible)",
       list:[
         "<b>Digastric</b>: Anterior belly — mandible to intermediate tendon; V3 (mylohyoid nerve). Posterior belly — mastoid to intermediate tendon (intermediate tendon held to hyoid by fibrous sling); CN VII. Both together: open mouth + elevate hyoid for swallowing.",
         "<b>Mylohyoid</b>: Mylohyoid line of mandible → hyoid (and median raphe). V3 (mylohyoid nerve). Forms the floor of the mouth. Supports the tongue, elevates hyoid/floor of mouth for swallowing.",
         "<b>Geniohyoid</b>: Inferior mental spine of mandible → body of hyoid. C1 fibers traveling with CN XII. Pulls hyoid forward/up; short, stout muscle.",
         "<b>Stylohyoid</b>: Styloid process → hyoid (splits around intermediate tendon of digastric). CN VII. Elevates and retracts hyoid."
       ]},
      {h:"Infrahyoid (strap) muscles — below the hyoid; depress hyoid/larynx; strap-like flat muscles",
       list:[
         "<b>Sternohyoid</b>: Manubrium + medial clavicle → body of hyoid. Ansa cervicalis (C1–C3). Depresses hyoid after swallowing.",
         "<b>Sternothyroid</b>: Posterior manubrium → oblique line of thyroid cartilage. Ansa cervicalis (C2–C3). Depresses larynx.",
         "<b>Thyrohyoid</b>: Oblique line of thyroid cartilage → body + greater horn of hyoid. C1 via CN XII (NOT ansa cervicalis). Depresses hyoid or elevates larynx.",
         "<b>Omohyoid</b>: Superior border of scapula → intermediate tendon → body of hyoid. Superior belly: ansa cervicalis superior root (C1–C2). Inferior belly: ansa cervicalis inferior root (C2–C3). Depresses hyoid; fascial sling tethers tendon to clavicle compressing IJV."
       ]},
      {h:"Functional significance",
       list:[
         "Suprahyoid muscles: elevate hyoid during swallowing (pharynx + larynx pulled upward) — also depress mandible (mouth opening)",
         "Infrahyoid muscles: reposition hyoid after swallowing; anchor hyoid for tongue movements; depress larynx for low-pitched phonation",
         "Thyrohyoid is unique: C1 via CN XII — damaged by high CN XII lesion (not ansa)"
       ]},
      {img:"hyoid-muscles.jpg", caption:"Suprahyoid and infrahyoid muscles — origins, insertions, innervation"}
    ]
  },

  "styloid-septum":{
    title:"Styloid septum + innervation of styloid muscles",
    parent:"neck",
    body:[
      {h:"Styloid apparatus",
       p:"The styloid process of the temporal bone gives rise to three muscles and two ligaments collectively called the styloid apparatus. They radiate from the styloid toward their respective targets."},
      {h:"Three muscles of the styloid process",
       list:[
         "<b>Styloglossus</b>: Styloid process → lateral tongue (interdigitates with hyoglossus). Innervation: <b>CN XII (hypoglossal)</b>. Function: retracts and elevates tongue.",
         "<b>Stylohyoid</b>: Styloid process → body of hyoid (splits around intermediate digastric tendon). Innervation: <b>CN VII (facial)</b>. Function: elevates and retracts hyoid bone.",
         "<b>Stylopharyngeus</b>: Styloid process → between superior and middle pharyngeal constrictors into the thyroid cartilage + pharyngeal mucosa. Innervation: <b>CN IX (glossopharyngeal) — the ONLY muscle supplied by CN IX</b>. Function: elevates the pharynx + larynx during swallowing + phonation."
       ]},
      {h:"Two ligaments of the styloid process",
       list:[
         "<b>Stylohyoid ligament</b>: Styloid process → lesser horn (cornu minus) of hyoid. Remnant of Reichert's cartilage (2nd pharyngeal arch).",
         "<b>Stylomandibular ligament</b>: Styloid process → posterior border and angle of mandible. Thickened part of the parotid capsule. Separates the parotid gland (lateral) from the submandibular gland (medial)."
       ]},
      {h:"The styloid septum",
       list:[
         "The stylomandibular ligament + the adjacent deep fascia form a fascial septum (the styloid septum or stylomandibular septum)",
         "It separates: Parotid region (laterally) from Submandibular/parapharyngeal region (medially)",
         "This septum limits the spread of parotid infections from reaching the deep neck"
       ]},
      {h:"Eagle's syndrome",
       list:[
         "An elongated styloid process (>3 cm) or calcified stylohyoid ligament can compress adjacent structures",
         "Symptoms: throat pain, dysphagia, globus sensation, pain on turning the head, carotid artery compression",
         "Treatment: surgical shortening of styloid process"
       ]},
      {img:"styloid-septum.jpg", caption:"Styloid muscles — XII (styloglossus), VII (stylohyoid), IX (stylopharyngeus) + styloid septum"}
    ]
  },

  "crico-tracheostomy":{
    title:"Cricothyrotomy + tracheostomy",
    parent:"neck",
    body:[
      {h:"Cricothyrotomy (coniotomy) — emergency airway",
       list:[
         "<b>Site</b>: Cricothyroid membrane — the depression between the lower border of the thyroid cartilage and upper border of the cricoid cartilage. At the level of <b>C6</b>.",
         "<b>Dimensions</b>: ~22 mm wide × 9 mm tall; vessels run superiorly (cricothyroid arteries — branches of superior thyroid aa.) so incision is made in the INFERIOR THIRD to avoid them",
         "<b>Indication</b>: Cannot-intubate, cannot-oxygenate (CICO) emergency; temporary airway only",
         "<b>Landmark</b>: Find the laryngeal prominence ('Adam's apple') of thyroid cartilage — 2 finger-breadths below is the cricothyroid membrane (laryngeal handshake technique)"
       ]},
      {h:"Layers traversed in cricothyrotomy",
       list:[
         "Skin",
         "Subcutaneous tissue",
         "Superficial cervical fascia (with platysma fibers)",
         "Deep (investing) cervical fascia",
         "Cricothyroid membrane (fibrous, pale yellow — made of conus elasticus / fibroelastic cricothyroid ligament)"
       ]},
      {h:"Tracheostomy — surgical airway",
       list:[
         "<b>Site</b>: Through the anterior tracheal wall, between tracheal rings 2 and 3 (or 3 and 4)",
         "High tracheostomy (above thyroid isthmus): emergency, between ring 1 and 2 — risk of subglottic stenosis",
         "Mid tracheostomy (standard): through isthmus (divided); rings 2–3",
         "Low tracheostomy (below isthmus): rings 3–4; risks brachiocephalic artery erosion in infants"
       ]},
      {h:"Layers traversed in tracheostomy (midline approach)",
       list:[
         "Skin",
         "Superficial fascia + platysma",
         "Deep investing fascia (midline raphe)",
         "Infrahyoid strap muscles (separated in midline — sternohyoid, sternothyroid)",
         "Pretracheal fascia (thyroid isthmus at this level — retracted or divided)",
         "Anterior tracheal wall (cut between rings)"
       ]},
      {h:"Risks of tracheostomy",
       list:[
         "Bleeding: inferior thyroid veins (anterior tracheal surface), thyroid ima artery (~10% of patients — single vessel from brachiocephalic trunk or arch)",
         "Nerve injury: Recurrent laryngeal nerves run in the tracheoesophageal groove — lateral to the trachea — damaged if incision deviates laterally",
         "Tube misplacement: paratracheal fat pocket, right main bronchus (if tube too long)"
       ]},
      {h:"Percutaneous dilational tracheostomy (PDT)",
       list:[
         "Seldinger technique: needle puncture between ring 1–2 or 2–3 → guide wire → serial dilation → tracheostomy tube",
         "Done at bedside in ICU",
         "Bronchoscopic guidance recommended"
       ]},
      {img:"crico-tracheostomy.jpg", caption:"Cricothyroid membrane anatomy + standard tracheostomy site — layers and landmarks"}
    ]
  },

  "thyroid-gland":{
    title:"Thyroid gland — anatomy, pyramidal lobe, embryology",
    parent:"neck",
    body:[
      {h:"Location and relationships",
       list:[
         "Anterior neck at C5–T1, anterolateral to the larynx and trachea",
         "Encased by the pretracheal fascia (visceral fascia) — this is separate from the true fibrous capsule of the gland",
         "Anteriorly: strap muscles (sternothyroid, sternohyoid) + investing fascia + platysma + SCM",
         "Posteriorly: larynx + trachea (isthmus) + pharynx/esophagus (lobes) + carotid sheath laterally"
       ]},
      {h:"Parts",
       list:[
         "Right lobe + left lobe: each about 5 cm tall × 3 cm wide × 2 cm deep",
         "Isthmus: connects lower thirds of the two lobes; overlies tracheal rings 2–4",
         "Pyramidal lobe: superiorly directed projection (~50% of people), usually from the isthmus or left lobe — embryological remnant of the thyroglossal duct. May extend to the hyoid bone."
       ]},
      {h:"Blood supply — arteries",
       list:[
         "<b>Superior thyroid artery</b>: first anterior branch of ECA. Descends with the external branch of the superior laryngeal nerve (risk of nerve injury if artery ligated away from gland — 'ligate close to the gland')",
         "<b>Inferior thyroid artery</b>: from the thyrocervical trunk (1st part of subclavian). Ascends and crosses posterior to the carotid sheath; enters gland from behind. Closely related to the recurrent laryngeal nerve — 'ligate away from gland'",
         "<b>Thyroid ima artery</b>: variant (~10%), arising from the brachiocephalic trunk or aortic arch — single unpaired vessel to the isthmus; risk during tracheostomy"
       ]},
      {h:"Blood supply — veins",
       list:[
         "Superior thyroid vein: drains to IJV",
         "Middle thyroid vein: drains to IJV (no accompanying artery)",
         "Inferior thyroid vein(s): drain to left brachiocephalic vein (or directly to SVC)"
       ]},
      {h:"At-risk structures during thyroid surgery",
       list:[
         "<b>Recurrent laryngeal nerve</b>: runs in tracheoesophageal groove — injured by traction, ligation, or diathermy → hoarseness (unilateral) or airway emergency (bilateral)",
         "<b>External branch of superior laryngeal nerve</b>: runs with superior thyroid artery; supplies cricothyroid muscle — injury causes monotone voice (cannot tense vocal cords)",
         "<b>Parathyroid glands</b>: 4 glands (2 per side), posterior to thyroid; vascularised by inferior thyroid artery branches — inadvertent devascularisation → hypocalcaemia"
       ]},
      {h:"Embryology",
       list:[
         "Develops from endoderm at the base of the tongue (foramen cecum) at 3–4 weeks",
         "Descends along the thyroglossal duct through the tongue, floor of mouth, hyoid, and pretracheal muscles",
         "Thyroglossal duct normally obliterates — remnants → thyroglossal duct cysts (midline, moves up on tongue protrusion or swallowing)"
       ]},
      {img:"thyroid-gland.jpg", caption:"Thyroid gland — lobes, pyramidal lobe variation, blood supply + at-risk structures"}
    ]
  },

  "brachiocephalic":{
    title:"Brachiocephalic trunk + brachiocephalic veins",
    parent:"neck",
    body:[
      {h:"Brachiocephalic trunk (innominate artery)",
       list:[
         "First (and largest) branch of the arch of the aorta",
         "Origin: posterior to the manubrium, to the right of midline",
         "Bifurcates posterior to the right sternoclavicular joint into: Right common carotid artery + Right subclavian artery",
         "No left equivalent: left CCA and left subclavian arise directly and separately from the aortic arch",
         "Lies anterior to the trachea; the left brachiocephalic vein crosses anterior to it"
       ]},
      {h:"Brachiocephalic veins (left and right)",
       list:[
         "Each formed posterior to the medial end of the clavicle by the union of subclavian vein + internal jugular vein (= venous angle)",
         "Right brachiocephalic vein: short (~2–3 cm), near vertical",
         "Left brachiocephalic vein: longer (~6 cm), crosses behind the manubrium from left to right, anterior to the arch vessels",
         "The two brachiocephalic veins unite at the right border of the manubrium to form the superior vena cava (SVC)"
       ]},
      {h:"Tributaries of brachiocephalic veins",
       list:[
         "Vertebral vein",
         "Internal thoracic vein (internal mammary)",
         "Inferior thyroid vein (drains to LEFT brachiocephalic vein)",
         "Superior intercostal vein (1st and 2nd intercostal spaces)",
         "Left brachiocephalic vein ALSO receives: Thoracic duct (at LEFT venous angle = junction of left IJV + left subclavian)"
       ]},
      {h:"Superior vena cava (SVC)",
       list:[
         "Formed by union of right + left brachiocephalic veins at the right border of the manubrium",
         "Drains head, neck, upper limbs, and upper thorax to right atrium",
         "SVC syndrome: obstruction (by lung cancer, lymphoma, mediastinal mass) → facial/neck swelling, arm swelling, dilated chest wall veins"
       ]},
      {h:"Clinical",
       list:[
         "Innominate (brachiocephalic) artery aneurysm: pulsatile mass in superior mediastinum / suprasternal notch",
         "Central venous catheter tip should sit above the right atrium (at SVC/RA junction) — verified by CXR",
         "Thoracic duct drains to left venous angle — right-sided chylothorax is uncommon (thoracic duct injury usually gives left-sided chylothorax)"
       ]},
      {img:"brachiocephalic.jpg", caption:"Brachiocephalic trunk + brachiocephalic veins → SVC formation"}
    ]
  },

  "jugular-veins":{
    title:"Jugular venous system — anterior, external, internal",
    parent:"neck",
    body:[
      {h:"Anterior jugular vein",
       list:[
         "Origin: small veins below the chin, descends near the midline",
         "Descends superficially, close to midline, beneath platysma",
         "Pierces the deep investing fascia just above the sternal notch → runs laterally through the suprasternal space of Burns (between investing layer and pretracheal fascia)",
         "Turns laterally deep to SCM → drains into the external jugular vein (or directly into subclavian vein)",
         "The two anterior jugular veins communicate via the jugular venous arch in the suprasternal space of Burns",
         "Risk: Division during low tracheostomy if poorly identified; may bleed profusely due to valveless connections"
       ]},
      {h:"External jugular vein (EJV)",
       list:[
         "Origin: Posterior to the angle of the mandible, formed by union of posterior auricular vein + posterior division of retromandibular vein",
         "Courses obliquely inferoposterior across the surface of SCM (visible at surface with Valsalva)",
         "Pierces the deep investing fascia of the neck just above the clavicle → drains into the subclavian vein (occasionally IJV)",
         "The EJV is the landmark for Erb's point as it pierces the investing fascia near where the cutaneous branches emerge",
         "Used clinically for IV access when arm veins are unavailable"
       ]},
      {h:"Internal jugular vein (IJV)",
       list:[
         "Origin: Continuation of the sigmoid dural sinus exiting the skull at the jugular foramen (superior bulb); initially covered by posterior belly of digastric",
         "Descends in the carotid sheath, lateral to the CCA/ICA, posterior to the carotid artery",
         "Joins the subclavian vein posterior to the medial clavicle (inferior bulb with valve) → brachiocephalic vein",
         "Contains a valve at the inferior end (inferior bulb) — prevents retrograde flow"
       ]},
      {h:"IJV tributaries",
       list:[
         "Inferior petrosal sinus",
         "Pharyngeal veins",
         "Common facial vein (facial v. + anterior div. retromandibular v.)",
         "Lingual vein",
         "Superior thyroid vein",
         "Middle thyroid vein",
         "Occipital vein"
       ]},
      {h:"Clinical",
       list:[
         "Jugular venous pressure (JVP): IJV pressure reflects right atrial pressure — assessed with patient at 45°; visible pulsation lateral to SCM",
         "Central line via IJV: ultrasound-guided, between carotid (medial) and IJV (lateral) — vagus between, posterior",
         "EJV: visible landmark for IV access, central line placement when IJV approach fails",
         "Jugular venous arch connects the two anterior jugular veins — may bleed significantly during tracheostomy"
       ]},
      {img:"jugular-system.jpg", caption:"Jugular venous system — anterior, external, and internal jugular veins"}
    ]
  },

  "lymphatic-drainage-neck":{
    title:"Lymphatic drainage — head/neck (right vs left venous angles)",
    parent:"neck",
    body:[
      {h:"General principle — two terminal drainage sites",
       list:[
         "<b>Right lymphatic duct</b>: drains into the RIGHT venous angle (junction of right IJV + right subclavian vein)",
         "<b>Thoracic duct</b>: drains into the LEFT venous angle (junction of left IJV + left subclavian vein)",
         "The right lymphatic duct drains: RIGHT side of head + neck, right upper limb, right hemithorax, right lung, right heart",
         "The thoracic duct drains: EVERYTHING ELSE — left side of body + both lower limbs + all abdominal/pelvic organs"
       ]},
      {h:"Cervical lymph node groups",
       list:[
         "Submental group (level IA): drains tip of tongue, anterior floor of mouth, central lower lip, chin",
         "Submandibular group (level IB): drains most of the face, tongue, mouth, nasal cavity",
         "Upper deep cervical (level II — jugulodigastric): drains from submental/submandibular + direct drainage from pharynx/larynx/thyroid; includes Sorgius node (axillary, for breast)",
         "Middle deep cervical (level III — jugulo-omohyoid): drains from upper deep cervical + remaining head/neck",
         "Lower deep cervical (level IV — supraclavicular): drains from levels II–III + thorax; VIRCHOW'S NODE here (left supraclavicular) — see sentinel LNs",
         "Posterior triangle group (level V): drains posterior scalp, occipital region; includes spinal accessory chain nodes"
       ]},
      {h:"Deep cervical chain along IJV",
       list:[
         "Main collecting chain for all head and neck lymph",
         "Drains to the jugular trunk",
         "Jugular trunk → right lymphatic duct (right) or thoracic duct (left)"
       ]},
      {h:"Key sentinel/eponymous nodes",
       list:[
         "<b>Virchow's (Troisier's) node</b>: Left supraclavicular node; palpable enlargement = Troisier's sign — metastasis from GI/abdominal cancer (via thoracic duct)",
         "<b>Jugulodigastric node</b>: Level IIA, at the angle of mandible + posterior belly of digastric junction — drains the tonsil/oropharynx; first node enlarged in tonsillitis",
         "<b>Jugulo-omohyoid node</b>: At the crossing of IJV + omohyoid — drains the tongue"
       ]},
      {h:"Thoracic duct in the neck",
       list:[
         "Ascends from posterior mediastinum, arches over the left subclavian artery at C7",
         "Lies on the anterior surface of the prevertebral fascia + anterior scalene",
         "Runs posterior to the carotid sheath, drains into the LEFT venous angle",
         "Injury during left neck dissection / central venous line placement → chylothorax or chyle leak"
       ]},
      {img:"lymphatic-drainage-neck.jpg", caption:"Head and neck lymphatic drainage — levels I–V and venous angle terminations"}
    ]
  },

  "omohyoid-innervation":{
    title:"Omohyoid — superior and inferior belly innervation",
    parent:"neck",
    body:[
      {h:"Anatomy of the omohyoid",
       list:[
         "A two-bellied strap muscle of the infrahyoid group",
         "Superior belly: from the intermediate tendon → to the body of the hyoid bone",
         "Inferior belly: from the superior border of the scapula (medial to scapular notch) → to the intermediate tendon",
         "The intermediate tendon is tethered to the clavicle and first rib by a fascial sling from the investing layer of deep cervical fascia"
       ]},
      {h:"Innervation",
       list:[
         "<b>Superior belly</b>: Superior root of the ansa cervicalis (C1–C2 fibers)",
         "<b>Inferior belly</b>: Inferior root of the ansa cervicalis (C2–C3 fibers)",
         "Both bellies are innervated by different roots of the same ansa cervicalis loop"
       ]},
      {h:"Function",
       list:[
         "Depresses the hyoid bone (after it is elevated during swallowing)",
         "Tenses the investing fascia of the neck — the fascial sling on the intermediate tendon compresses the IJV gently during yawning/swallowing, producing a venous pulse wave",
         "Subdivides the posterior triangle into the occipital triangle (above) and the omoclavicular/subclavian triangle (below)"
       ]},
      {h:"Surgical relevance",
       list:[
         "The omohyoid crosses the carotid sheath at the level of the cricoid cartilage — a useful landmark for the carotid bifurcation",
         "In neck dissections and thyroid surgery, the superior belly of omohyoid is a landmark for the carotid triangle",
         "The omohyoid is typically divided and reflected during comprehensive neck dissection (modified radical neck dissection)"
       ]}
    ]
  },

  "rule-of-4":{
    title:"Rule of 4 — C4 / T4 / L4",
    parent:"neck",
    body:[
      {h:"The three '4' levels",
       list:[
         "<b>C4</b> — Bifurcation of the common carotid artery into external + internal carotid arteries; at the upper border of the thyroid cartilage, in the carotid triangle",
         "<b>T4 / sternal angle (angle of Louis)</b> — Tracheal bifurcation (carina); the aortic arch begins and ends; thoracic duct crosses from right to left; boundary between superior and inferior mediastinum; azygos vein arches forward to join SVC; right and left main bronchi divide here; pulmonary trunk bifurcates",
         "<b>L4</b> — Abdominal aorta bifurcates into right and left common iliac arteries; surface landmark = line joining the two iliac crests (intercristal/supracristal plane = Tuffier's line) at L3/4 disc → L4 vertebral body"
       ]},
      {h:"Additional 'rule of 4' extensions — bonus anchor points",
       list:[
         "C6: cricoid cartilage (pharynx → esophagus transition; larynx → trachea transition; middle cervical sympathetic ganglion; vertebral artery enters foramen transversarium at C6)",
         "T1: superior thoracic aperture (thoracic inlet); stellate ganglion; brachial plexus exits; subclavian vessels arch over 1st rib",
         "L1: transpyloric plane of Addison; origin of SMA; conus medullaris (L1–L2); pylorus; fundus of gallbladder",
         "L2: origin of gonadal arteries from aorta; end of spinal cord (conus) in adults",
         "L4/S1: lumbosacral trunk"
       ]},
      {h:"Clinical applications",
       list:[
         "C4 carotid bifurcation: site for carotid endarterectomy incision; carotid Doppler landmarks",
         "T4 carina: key landmark on CT; tumors at carina often inoperable (bilateral bronchial involvement); carina widening = lymphadenopathy",
         "L4 aortic bifurcation: FAST exam for abdominal aortic aneurysm; landmark for lumbar puncture (iliac crests at L4 level)"
       ]},
      {img:"rule-of-4.jpg", caption:"Rule of 4 — C4 (carotid bifurcation), T4 (carina/sternal angle), L4 (aortic bifurcation)"}
    ]
  },

  "subclavian-artery":{
    title:"Subclavian artery — 3 parts + branches",
    parent:"neck",
    body:[
      {h:"Origins",
       list:[
         "Right subclavian: from the brachiocephalic trunk, posterior to the right sternoclavicular joint",
         "Left subclavian: directly from the arch of the aorta (2nd branch after left CCA)"
       ]},
      {h:"Three parts — relative to the anterior scalene muscle",
       list:[
         "<b>1st part</b>: Medial to the anterior scalene (from origin to medial border of anterior scalene)",
         "<b>2nd part</b>: Posterior to the anterior scalene (in the scalene fissure between anterior and middle scalene)",
         "<b>3rd part</b>: Lateral to the anterior scalene (from lateral border of anterior scalene to lateral border of 1st rib → becomes axillary artery)"
       ]},
      {h:"Branches — 1st part mnemonic: VIT",
       list:[
         "<b>V</b> — Vertebral artery: ascends through foramina transversaria C6–C1; supplies brainstem, cerebellum, posterior cerebral hemisphere; enters foramen magnum; joins contralateral VA → basilar artery",
         "<b>I</b> — Internal thoracic artery (internal mammary): descends posterior to clavicle → sternum → terminates at 6th ICS → superior epigastric + musculophrenic arteries",
         "<b>T</b> — Thyrocervical trunk: short trunk giving 3 branches: (1) Inferior thyroid artery, (2) Suprascapular artery, (3) Transverse cervical artery (+ dorsal scapular in some)"
       ]},
      {h:"Branches — 2nd part",
       list:[
         "Costocervical trunk: bifurcates into Deep cervical artery (ascending in posterior neck) + Supreme (highest) intercostal artery (gives 1st + 2nd posterior intercostal arteries)"
       ]},
      {h:"Branches — 3rd part",
       list:[
         "Dorsal scapular artery (variable — may come from transverse cervical): rhomboids + levator scapulae"
       ]},
      {h:"Subclavian vein",
       list:[
         "Runs ANTERIOR to the anterior scalene (NOT through the scalene fissure — brachial plexus and subclavian artery pass through the fissure)",
         "Joins IJV to form brachiocephalic vein at the venous angle",
         "Used for central venous access and port-a-cath placement"
       ]},
      {h:"Clinical",
       list:[
         "Thoracic outlet syndrome: compression of subclavian artery/vein/brachial plexus between anterior scalene and 1st rib (or cervical rib) — arm claudication, Raynaud's, arm swelling",
         "Subclavian steal syndrome: stenosis of left subclavian proximal to vertebral origin → retrograde flow in left vertebral artery from basilar → posterior circulation ischaemia with arm exercise",
         "LIMA (left internal mammary): from internal thoracic — gold standard for CABG to LAD"
       ]},
      {img:"subclavian-artery.jpg", caption:"Subclavian artery — 3 parts relative to anterior scalene + all branches (VIT + costocervical)"}
    ]
  },

  "thyroid-blood-supply":{
    title:"Blood supply of the thyroid gland",
    parent:"neck",
    body:[
      {h:"Arterial supply — three sources",
       list:[
         "<b>Superior thyroid artery</b>: First anterior branch of the external carotid artery. Descends with the external branch of the superior laryngeal nerve (lateral to the nerve). Divides into anterior + posterior branches on the thyroid gland. Surgical rule: <b>ligate close to the gland</b> (to preserve the external laryngeal nerve which runs alongside the artery proximally).",
         "<b>Inferior thyroid artery</b>: Branch of the thyrocervical trunk (1st part subclavian). Ascends, loops posteriorly behind the carotid sheath, then passes medially to enter the posterior surface of the gland. Intimately related to the recurrent laryngeal nerve — the nerve may pass anterior, posterior, or between branches. Surgical rule: <b>ligate away from the gland</b> (to preserve the RLN by leaving the gland-side stump as a reference).",
         "<b>Thyroid ima artery</b>: Present in ~10% of people; arises from brachiocephalic trunk or aortic arch. Single unpaired vessel to the isthmus. Risk of catastrophic hemorrhage during emergency tracheostomy."
       ]},
      {h:"Venous drainage — three pairs",
       list:[
         "<b>Superior thyroid vein</b>: Accompanies superior thyroid artery. Drains into IJV.",
         "<b>Middle thyroid vein</b>: No accompanying artery. Short, direct. Drains into IJV. Important landmark: ligated early in thyroid mobilization.",
         "<b>Inferior thyroid vein(s)</b>: Multiple veins descending from the lower pole and isthmus. Drain into the LEFT brachiocephalic vein (or directly to SVC). Run anterior to trachea — at risk during low tracheostomy."
       ]},
      {h:"At-risk nerves — surgical mnemonic",
       list:[
         "'Close to the pole, close to the nerve' is a risk — the real rule is:",
         "<b>Superior thyroid artery</b>: Ligate CLOSE to gland (protects external laryngeal nerve which runs with it proximally)",
         "<b>Inferior thyroid artery</b>: Ligate FAR from gland / AWAY from gland (protects RLN which runs between artery branches at the gland)"
       ]},
      {h:"Parathyroid blood supply",
       list:[
         "All four parathyroid glands usually supplied by the inferior thyroid artery (even superior parathyroids in many cases)",
         "Inadvertent devascularization → immediate postoperative hypocalcemia (tetany, carpopedal spasm, Chvostek's + Trousseau's signs)",
         "Treatment: IV calcium, calcitriol + calcium supplements long-term"
       ]},
      {img:"thyroid-blood-supply.jpg", caption:"Thyroid gland vasculature — 3 arteries, 3 veins + at-risk recurrent laryngeal and external laryngeal nerves"}
    ]
  },

  "larynx":{
    title:"Larynx + laryngeal muscles + Galen's anastomosis",
    parent:"neck",
    body:[
      {h:"Cartilages",
       list:[
         "<b>Unpaired</b>: Thyroid cartilage (largest; two laminae at 90° in males / 120° in females; laryngeal prominence = 'Adam's apple'), Cricoid cartilage (only complete ring of cartilage in airway; signet ring shape — narrow arch anteriorly, broad lamina posteriorly), Epiglottis (leaf-shaped, attached to posterior thyroid cartilage at petiole; deflects food into piriform recesses during swallowing)",
         "<b>Paired</b>: Arytenoid cartilages (pyramidal; vocal process = attachment of vocal fold, muscular process = attachment of posterior and lateral cricoarytenoid muscles), Corniculate (apex of arytenoid), Cuneiform (in aryepiglottic fold)"
       ]},
      {h:"Intrinsic muscles + innervation",
       list:[
         "<b>Cricothyroid muscle</b>: Between cricoid and thyroid cartilages; <b>External branch of superior laryngeal nerve (CN X)</b>. Action: tilts thyroid forward, lengthening and tensing vocal folds (raises pitch). The ONLY laryngeal muscle supplied by the external SLN.",
         "<b>ALL other intrinsic laryngeal muscles</b>: Supplied by the <b>Recurrent laryngeal nerve (RLN) of CN X</b>:",
         "  — Posterior cricoarytenoid (PCA): ONLY abductor of the vocal cord (opens the glottis — essential for breathing); bilateral injury = stridor + asphyxia",
         "  — Lateral cricoarytenoid: adducts vocal cords (closes glottis)",
         "  — Thyroarytenoid + vocalis: relaxes and shortens vocal cord; forms bulk of vocal fold",
         "  — Transverse + oblique arytenoids: adduct arytenoids (close posterior glottis)"
       ]},
      {h:"Sensory innervation",
       list:[
         "<b>Above the vocal folds</b>: Internal branch of superior laryngeal nerve (CN X). Passes through thyrohyoid membrane with superior laryngeal vessels.",
         "<b>Below the vocal folds</b>: Recurrent laryngeal nerve (CN X)."
       ]},
      {h:"Galen's anastomosis (Ramus communicans of Galen)",
       list:[
         "A communication (anastomotic loop) between: <b>Internal branch of superior laryngeal nerve</b> + <b>Recurrent laryngeal nerve</b>",
         "Located deep to the thyroid lamina, in the posterior submucosal layer",
         "Carries both sensory and possibly some motor fibers across the innervation boundary",
         "Clinical: after RLN injury, Galen's anastomosis may allow partial sensory + motor recovery via the SLN internal branch"
       ]},
      {h:"Clinical pearls",
       list:[
         "RLN injury (unilateral): hoarseness, breathy voice, aspiration — vocal fold lies in paramedian position",
         "RLN injury (bilateral): aphonia + severe stridor — emergency airway (tracheostomy)",
         "PCA is the ONLY abductor — bilateral PCA loss = vocal cords adducted, airway closed",
         "Cricothyroid (external SLN): loss = monotone voice, cannot increase pitch (no vocal fold lengthening)"
       ]},
      {img:"larynx-muscles.jpg", caption:"Laryngeal cartilages + intrinsic muscles — external SLN (cricothyroid) + RLN (all others)"}
    ]
  },

  "cervical-sympathetic":{
    title:"Cervical sympathetic ganglia — superior, middle, inferior/stellate",
    parent:"neck",
    body:[
      {h:"Overview",
       list:[
         "The sympathetic trunk descends from the skull base to the coccyx. In the neck, it lies posterior to the carotid sheath (between it and the prevertebral fascia), on the longus colli muscle.",
         "Three cervical ganglia (occasionally only 2 are identifiable) condense the sympathetic chain in the neck.",
         "All preganglionic fibers for the head and neck originate from T1–T4 (upper thoracic) sympathetic outflow — they ascend in the sympathetic trunk to synapse in the cervical ganglia."
       ]},
      {h:"Superior cervical ganglion (SCG)",
       list:[
         "Location: Anterior to C1–C2 vertebrae (occasionally extends to C4)",
         "Largest of the 3 cervical ganglia; fusiform shape",
         "Postganglionic distributions:",
         "  — Internal carotid plexus → cavernous sinus → superior tarsal muscle (Müller's), dilator pupillae, facial sweat glands, salivary vasoconstriction",
         "  — External carotid plexus → branches along ECA and its branches",
         "  — Deep petrosal nerve → joins greater petrosal nerve → nerve of pterygoid canal → pterygopalatine ganglion (passes through without synapsing)",
         "  — Gray rami communicantes to upper cervical spinal nerves (C1–C4)",
         "  — Superior cardiac branch → cardiac plexus"
       ]},
      {h:"Middle cervical ganglion",
       list:[
         "Location: Anterior to C5–C6 (at the level of the cricoid cartilage) — smallest and most inconstant",
         "Postganglionics: Gray rami to C5–C6 spinal nerves; middle cardiac branch"
       ]},
      {h:"Inferior cervical ganglion + stellate ganglion",
       list:[
         "Inferior cervical ganglion: anterior to C7, small, may be absent as a separate entity",
         "Stellate ganglion (cervicothoracic ganglion): fusion of the inferior cervical ganglion with the first thoracic ganglion (~80% of people)",
         "Location: Anterior to the head of the 1st rib / neck of 1st rib / transverse process of C7, posterior to the subclavian artery",
         "Postganglionics: Vertebral nerve (plexus on vertebral artery), inferior cardiac branch, gray rami to C7–T1, innervation of upper limb via brachial plexus branches"
       ]},
      {h:"Horner's syndrome — interruption at any level of the cervical sympathetic chain",
       list:[
         "Mnemonic: <b>PHAME</b>",
         "<b>P</b>tosis (partial) — loss of superior tarsal muscle (Müller's) innervation; eye half-closed",
         "<b>H</b>ydrosis loss (anhidrosis) — loss of sweat gland innervation to ipsilateral face",
         "<b>A</b>nhydrosis / flushing — vasodilation from loss of vasoconstriction",
         "<b>M</b>iosis — loss of dilator pupillae; sphincter pupillae unopposed; small pupil",
         "<b>E</b>nophthalmos (apparent) — loss of inferior tarsal muscle tone",
         "Causes by level: Central (hypothalamus → C8/T1 cord — Pancoast, cord lesion); Preganglionic (C8–T2 — Pancoast, aneurysm, neck surgery); Postganglionic (ICA dissection, cavernous sinus, cluster headache)"
       ]},
      {img:"cervical-sympathetic.jpg", caption:"Cervical sympathetic chain — SCG, middle, stellate ganglia + Horner's syndrome pathway"}
    ]
  },

  "eca-branches":{
    title:"External carotid artery — branches (Some Anatomists Like Freaking Out Poor Medical Students)",
    parent:"neck",
    body:[
      {h:"Origin",
       list:[
         "Bifurcation of the common carotid artery at C4 (upper border of thyroid cartilage), in the carotid triangle",
         "Initially medial to the ICA; spirals to become lateral at the level of the parotid gland",
         "Identified intraoperatively: ECA has branches in the neck (ICA has none)"
       ]},
      {h:"Course",
       list:[
         "Ascends through the carotid triangle, medial to the posterior belly of digastric and stylohyoid",
         "Passes through the substance of the parotid gland",
         "Terminates posterior to the neck of the mandible (at level of mandibular neck + TMJ) by dividing into 2 terminal branches: superficial temporal artery + maxillary artery"
       ]},
      {h:"8 branches — mnemonic: Some Anatomists Like Freaking Out Poor Medical Students",
       list:[
         "<b>S</b> — Superior thyroid artery: 1st branch; anterior; descends to superior pole of thyroid with external SLN",
         "<b>A</b> — Ascending pharyngeal artery: 2nd branch (or 1st, variable); medial; thin vessel ascending between ICA and pharynx; supplies pharynx, meninges, middle ear (via tympanic branch)",
         "<b>L</b> — Lingual artery: loops anteriorly, passes deep to hyoglossus; supplies tongue (deep lingual artery), sublingual gland, floor of mouth",
         "<b>F</b> — Facial artery: loops over submandibular gland → hooks over mandible at anterior masseter border → tortuous course on face to medial canthus (angular artery). Anastomoses with ophthalmic artery (ICA territory) — important collateral if ICA occluded",
         "<b>O</b> — Occipital artery: posterior; crosses hypoglossal nerve (CN XII); anastomoses with vertebral artery; supplies posterior scalp + sternocleidomastoid",
         "<b>P</b> — Posterior auricular artery: small; posterior; supplies scalp behind ear + parotid",
         "<b>M</b> — Maxillary artery: terminal; larger; enters infratemporal fossa (see maxillary artery entry for its 3 parts and 18+ branches)",
         "<b>S</b> — Superficial temporal artery: terminal; smaller; crosses zygomatic arch anterior to ear; pulsatile (used to palpate temporal pulse); branches to scalp, face, parotid, temporalis"
       ]},
      {h:"Relations",
       list:[
         "ECA branches give surgeons landmarks: facial artery pulsation at mandible border; occipital artery at SCM insertion; superior thyroid artery at upper pole of thyroid",
         "In parotidectomy: ECA is found deep within the parotid gland (deeper than facial nerve and retromandibular vein)"
       ]},
      {h:"Clinical",
       list:[
         "ECA vs ICA distinction: ECA branches in neck (ICA does not); ECA branches can be temporarily occluded without neurological deficit",
         "Epistaxis: sphenopalatine artery (branch of maxillary = ECA) is the most common source — can be embolized or ligated",
         "Temporal arteritis (GCA): affects superficial temporal artery (ECA); jaw claudication; visual loss from ophthalmic artery (ICA) involvement"
       ]},
      {img:"eca-branches.jpg", caption:"External carotid artery — 8 branches with mnemonic SALFOPMS"}
    ]
  },

  "mediastinum-checklist":{
    title:"Mediastinum — Divisions + Superior Aperture",
    parent:"chest",
    body:[
      {h:"Superior thoracic aperture (inlet)",list:[
        "Bordered by: manubrium (anterior), 1st ribs (lateral), body of T1 (posterior)",
        "Transmits: trachea, esophagus, thoracic duct, great vessels (SVC, aortic arch branches), vagus nn., phrenic nn., recurrent laryngeal nn., sympathetic trunk"
      ]},
      {h:"Division — sternal angle plane (T4–T5)",p:"The sternal angle divides mediastinum into Superior and Inferior. Inferior = Anterior + Middle + Posterior."},
      {h:"Superior mediastinum contents",list:[
        "Thymus (or fat remnant)",
        "Brachiocephalic veins (BCV) + SVC formation",
        "Aortic arch + 3 branches (brachiocephalic trunk, left CCA, left subclavian)",
        "Trachea + esophagus",
        "Thoracic duct",
        "Vagus nn., phrenic nn., recurrent laryngeal nn.",
        "Sympathetic trunk"
      ]},
      {h:"Anterior inferior mediastinum",list:[
        "Thymic remnants + fat",
        "Parasternal (internal mammary) lymph nodes",
        "Internal thoracic vessels"
      ]},
      {h:"Middle inferior mediastinum",list:[
        "Heart + fibrous pericardium",
        "Ascending aorta + pulmonary trunk",
        "SVC (lower part) + IVC (short intrathoracic segment)",
        "Main bronchi + pulmonary veins",
        "Phrenic nn. (run between pericardium + mediastinal pleura)"
      ]},
      {h:"Posterior inferior mediastinum",list:[
        "Descending thoracic aorta",
        "Esophagus + vagal plexus (anterior vagal trunk from left vagus, posterior from right)",
        "Thoracic duct",
        "Azygos + hemiazygos system",
        "Sympathetic trunks + greater/lesser/least splanchnic nn.",
        "Posterior mediastinal lymph nodes"
      ]}
    ]
  },

  "thoracic-duct-checklist":{
    title:"Thoracic Duct + Cisterna Chyli",
    parent:"chest",
    body:[
      {h:"Cisterna chyli",list:[
        "Large lymphatic sac at L1–L2, posterior to abdominal aorta + right diaphragmatic crus",
        "Receives: right lumbar trunk, left lumbar trunk, intestinal trunk"
      ]},
      {h:"Thoracic duct course",list:[
        "Enters thorax through aortic hiatus (T12) — between aorta (left) and azygos (right)",
        "Ascends posterior mediastinum on right side of vertebral column",
        "Crosses midline to LEFT at T5 (level of sternal angle)",
        "Arches over left subclavian artery at C7",
        "Empties into LEFT venous angle (junction of left IJV + left subclavian v.)"
      ]},
      {h:"Right lymphatic duct",list:[
        "Short vessel (1–2 cm) at right venous angle",
        "Drains: right side of head + neck, right upper limb, right hemithorax",
        "Formed by right jugular trunk + right subclavian trunk + right bronchomediastinal trunk"
      ]},
      {h:"Thoracic duct drainage territory",p:"Everything EXCEPT what the right lymphatic duct drains: left side of head/neck, left upper limb, both lower limbs, abdominal viscera, left hemithorax."},
      {h:"Clinical",list:[
        "Chylothorax: injury during thoracic surgery → milky pleural effusion (high triglycerides)",
        "Virchow's node (left supraclavicular) = enlarged via thoracic duct from abdominal malignancy"
      ]}
    ]
  },

  "lungs-pleura":{
    title:"Lungs + Pleura (RALS)",
    parent:"chest",
    body:[
      {h:"Right lung",list:[
        "3 lobes: superior, middle, inferior",
        "2 fissures: oblique (separates inferior from superior+middle) + horizontal (separates superior from middle)",
        "Impressions: IVC (inferior), esophagus, SVC, azygos arch, right subclavian a."
      ]},
      {h:"Left lung",list:[
        "2 lobes: superior, inferior",
        "1 fissure: oblique",
        "Cardiac notch (anterior, superior lobe) + lingula (tongue-like projection below cardiac notch)",
        "Impressions: aortic arch (groove), descending aorta, esophagus, left subclavian a., cardiac impression (larger than right)"
      ]},
      {h:"RALS mnemonic — hilum arrangement",list:[
        "R = Right lung hilum: pulmonary Artery is Anterior to the bronchus",
        "L = Left lung hilum: pulmonary artery is Superior to the bronchus",
        "Mnemonic: RALS (Right=Anterior, Left=Superior)"
      ]},
      {h:"Pleural recesses",list:[
        "Costodiaphragmatic recess: most inferior; between thoracic wall + diaphragm; fluid collects here first",
        "Costomediastinal recess: anterior; between anterior chest wall + mediastinum",
        "Phrenicomediastinal recess: between diaphragm + mediastinum"
      ]},
      {h:"Pleural innervation",list:[
        "Parietal pleura: somatic innervation — intercostal nn. (costal + peripheral diaphragmatic parts) + phrenic n. (mediastinal + central diaphragmatic parts) → PAIN sensation, referred to chest wall / shoulder",
        "Visceral pleura: autonomic innervation only — NO pain sensation"
      ]}
    ]
  },

  "tracheal-bifurcation":{
    title:"Tracheal Bifurcation + Bronchi",
    parent:"chest",
    body:[
      {h:"Bifurcation",list:[
        "Carina at sternal angle (T4–T5) — palpable landmark",
        "Gives rise to right and left main bronchi",
        "Carina is highly sensitive to cough reflex; widening = subcarinal lymphadenopathy"
      ]},
      {h:"Right main bronchus",list:[
        "Wider, shorter (~2.5 cm), more vertical (25° from vertical)",
        "Aspirated foreign bodies lodge here preferentially",
        "Trifurcates into 3 lobar bronchi (superior, middle, inferior)"
      ]},
      {h:"Left main bronchus",list:[
        "Narrower, longer (~5 cm), more horizontal (45° from vertical)",
        "Passes under aortic arch, anterior to esophagus",
        "Bifurcates into 2 lobar bronchi (superior, inferior)"
      ]},
      {h:"Bronchial subdivisions",list:[
        "Lobar bronchi → segmental bronchi (10 right; 8–10 left)",
        "Segmental → subsegmental → bronchioles → terminal bronchioles",
        "Terminal bronchioles → respiratory bronchioles → alveolar ducts → alveolar sacs → alveoli",
        "Respiratory bronchioles = beginning of gas exchange zone (acinus)"
      ]}
    ]
  },

  "heart-overview":{
    title:"Heart — Chambers, Blood Supply, Pericardium",
    parent:"chest",
    body:[
      {h:"Auscultation — All Physicians Take Money",list:[
        "Aortic: 2nd right ICS, parasternal",
        "Pulmonary: 2nd left ICS, parasternal",
        "Tricuspid: 4th–5th left sternal border (lower)",
        "Mitral: 5th left ICS midclavicular line (apex beat)"
      ]},
      {h:"Chambers",list:[
        "RA: receives SVC (superior), IVC (inferior), coronary sinus (posteroinferior). Smooth posterior wall (sinus venarum) + trabeculated anterior wall (pectinate mm.).",
        "RV: tricuspid valve (3 cusps), moderator band (septomarginal trabecula, carries right bundle branch), pulmonary valve. Anterior surface of heart.",
        "LA: receives 4 pulmonary veins (2 right, 2 left). Smooth-walled posterior. Mitral orifice + fossa ovalis (remnant of foramen ovale).",
        "LV: mitral valve + aortic valve. Thickest myocardium (3× RV). Posterior-left surface."
      ]},
      {h:"Blood supply",list:[
        "Coronary arteries = FIRST branches of ascending aorta (from aortic sinuses, just above valve cusps)",
        "RCA: right aortic sinus → right AV groove → SA nodal branch (60%), right marginal a., posterior interventricular a. (PDA in right-dominant, 85%)",
        "LCA: left aortic sinus → short left main → LAD (diagonal + septal brs., supplies anterior 2/3 of IVS + anterior wall) + Circumflex (obtuse marginal brs., lateral wall)",
        "Coronary sinus drains venous blood into RA"
      ]},
      {h:"Pericardium",list:[
        "Fibrous pericardium: tough outer layer fused to central tendon of diaphragm",
        "Serous pericardium: parietal (lines fibrous) + visceral (epicardium, covers heart surface)",
        "Pericardial cavity (potential space) between parietal + visceral layers",
        "Phrenic n. innervates pericardium → referred shoulder pain (diaphragmatic irritation pattern)",
        "Pericardial sinuses: transverse sinus (between aorta+pulmonary trunk and atria) + oblique sinus (posterior)"
      ]}
    ]
  },

  "fetal-circulation":{
    title:"Fetal Circulation",
    parent:"chest",
    body:[
      {h:"Three shunts",list:[
        "Ductus venosus: umbilical vein → IVC, bypasses hepatic sinusoids → becomes ligamentum venosum (in fissure between caudate + left lobe)",
        "Foramen ovale: RA → LA, bypasses lungs (right-to-left shunt) → becomes fossa ovalis",
        "Ductus arteriosus: pulmonary trunk → aortic arch, bypasses lungs → becomes ligamentum arteriosum. Left recurrent laryngeal n. loops around it"
      ]},
      {h:"Umbilical vessels",list:[
        "Umbilical vein (1): oxygenated blood from placenta → liver → ductus venosus → IVC → RA",
        "Umbilical arteries (2): deoxygenated blood from fetal internal iliac aa. → placenta",
        "After birth: umbilical vein → ligamentum teres hepatis (free edge of falciform lig.)",
        "Umbilical arteries (distal) → medial umbilical ligaments; proximal portions → superior vesical arteries"
      ]},
      {h:"Median umbilical ligament",p:"Remnant of the urachus (allantoic stalk connecting bladder to umbilicus). Runs from apex of bladder to umbilicus in the median umbilical fold."},
      {h:"Oxygenation pattern",list:[
        "Most oxygenated blood: umbilical vein → ductus venosus → IVC → RA → through foramen ovale → LA → LV → ascending aorta (brain + heart get best-oxygenated blood)",
        "Less oxygenated: SVC blood → RA → tricuspid → RV → pulmonary trunk → ductus arteriosus → descending aorta (placenta + lower body)"
      ]}
    ]
  },

  "internal-thoracic-artery":{
    title:"Internal Thoracic Artery",
    parent:"chest",
    body:[
      {h:"Origin + course",list:[
        "Origin: inferior surface of 1st part of subclavian a. (opposite thyrocervical trunk)",
        "Descends behind clavicle + 1st costal cartilage",
        "Runs ~1 cm lateral to sternum, between costal cartilages and parietal pleura anteriorly / transversus thoracis m. posteriorly",
        "Ends at 6th ICS by dividing into superior epigastric a. + musculophrenic a."
      ]},
      {h:"Branches — mnemonic PAST BPM",list:[
        "P — Pericardiacophrenic a.: runs with phrenic n. between mediastinal pleura + pericardium → diaphragm",
        "A — Anterior intercostal aa.: upper 6 intercostal spaces",
        "S — Sternal branches: periosteal supply",
        "T — Thymic branches",
        "B — Bronchial branches (variable)",
        "P — Perforating branches: pierce internal intercostals + pectoralis major → skin + breast",
        "M — Mediastinal branches"
      ]},
      {h:"Terminal branches",list:[
        "Superior epigastric a.: descends into rectus sheath, anastomoses with inferior epigastric a. (from external iliac) — important collateral in coarctation of aorta",
        "Musculophrenic a.: runs along costal margin to diaphragm + lower intercostal spaces"
      ]},
      {h:"Clinical",p:"LIMA (left internal mammary/thoracic a.) = gold-standard conduit for LAD coronary artery bypass graft (CABG). Superior long-term patency vs saphenous vein grafts."}
    ]
  },

  "thoracic-aorta":{
    title:"Thoracic Aorta + Branches",
    parent:"chest",
    body:[
      {h:"Course",list:[
        "Continuation of aortic arch at T4 (level of sternal angle)",
        "Descends in posterior mediastinum, left of vertebral column",
        "Gradually moves to midline",
        "Passes through aortic hiatus (T12) to become abdominal aorta"
      ]},
      {h:"Visceral branches",list:[
        "Bronchial aa.: 2 left (from aorta at T4–T5) + 1 right (from 3rd posterior intercostal or right bronchial — variable); supply bronchial tree + visceral pleura",
        "Esophageal branches (4–5): supply middle thoracic esophagus",
        "Pericardial branches: small, to posterior pericardium",
        "Mediastinal branches: supply posterior mediastinal lymph nodes + connective tissue"
      ]},
      {h:"Parietal branches",list:[
        "Posterior intercostal aa. (3rd–11th): paired, run in costal groove with VAN (vein superior, artery middle, nerve inferior). 1st + 2nd spaces from supreme intercostal a. of costocervical trunk",
        "Subcostal aa. (12th pair): below 12th rib",
        "Superior phrenic aa.: supply superior diaphragm surface"
      ]}
    ]
  },

  "diaphragm":{
    title:"Diaphragm + Phrenic Nerve",
    parent:"chest",
    body:[
      {h:"Origin — three parts",list:[
        "Sternal part: 2 slips from xiphoid process",
        "Costal part: inner surfaces of lower 6 ribs + costal cartilages (ribs 7–12)",
        "Lumbar part: crura (right crus L1–L3, left crus L1–L2) + medial arcuate lig. (over psoas) + lateral arcuate lig. (over quadratus lumborum)"
      ]},
      {h:"Insertion",p:"Central tendon — trefoil-shaped fibrous sheet with no muscular insertion."},
      {h:"Innervation",list:[
        "Motor: phrenic n. ONLY (C3, C4, C5 — 'keeps the diaphragm alive') — entire motor supply",
        "Sensory: phrenic n. (central diaphragm, mediastinal pleura, pericardium) + lower intercostal nn. (peripheral diaphragm)",
        "Referred pain to shoulder/neck (C4 dermatome) — Kehr's sign"
      ]},
      {h:"Three hiatuses — mnemonic: I 8 10 EGGs AT 12",list:[
        "T8 — Caval hiatus: IVC + RIGHT phrenic n. (left phrenic pierces left dome alone)",
        "T10 — Esophageal hiatus: esophagus + anterior vagal trunk + posterior vagal trunk + esophageal branches of left gastric a./v.",
        "T12 — Aortic hiatus: descending aorta + thoracic duct + azygos v. (behind median arcuate lig. — technically not through the muscle)"
      ]},
      {h:"Additional structures",list:[
        "Greater + lesser splanchnic nn.: pierce through crura",
        "Sympathetics: behind medial arcuate ligament",
        "Left phrenic n.: pierces left dome separately (muscle substance)",
        "Hemiazygos v.: variable — may pierce crus"
      ]}
    ]
  },

  "vagus-thorax":{
    title:"Vagus Nerve — Thoracic Course",
    parent:"chest",
    body:[
      {h:"Right vagus",list:[
        "Enters thorax across right subclavian a. — here gives off RIGHT recurrent laryngeal n. (loops under right subclavian a.)",
        "Descends posterior to right lung hilum",
        "Continues posterior to esophagus → forms POSTERIOR vagal trunk (right vagus → posterior)",
        "Passes through esophageal hiatus with esophagus"
      ]},
      {h:"Left vagus",list:[
        "Enters thorax anterior to aortic arch",
        "Crosses aortic arch → gives off LEFT recurrent laryngeal n. (loops under arch, posterior to ligamentum arteriosum)",
        "Descends posterior to left lung hilum",
        "Continues anterior to esophagus → forms ANTERIOR vagal trunk (left vagus → anterior)",
        "Passes through esophageal hiatus with esophagus"
      ]},
      {h:"Mnemonic",p:"'Phrenic in front of, vagus behind, the hilum' — helps orient structures at the lung root."},
      {h:"Branches in thorax",list:[
        "Recurrent laryngeal nn. (see above)",
        "Cardiac branches (superior + inferior cervical cardiac nn. in thorax) → cardiac plexus",
        "Pulmonary branches → anterior + posterior pulmonary plexuses at lung hilum",
